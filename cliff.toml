# git-cliff configuration for supernovae-agi monorepo
# https://git-cliff.org

[changelog]
# Changelog header
header = """
# Changelog

All notable changes to supernovae-agi are documented in this file.

Format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/).
This project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

> **Note:** Version 0.x indicates pre-production status. Breaking changes bump MINOR.

"""
# Template for changelog body
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.github.username %} by @{{ commit.github.username }}{% endif %}\
            {% if commit.github.pr_number %} in [#{{ commit.github.pr_number }}](https://github.com/supernovae-st/supernovae-agi/pull/{{ commit.github.pr_number }}){% endif %}
    {%- endfor %}
{% endfor %}\n
"""
# Changelog footer
footer = """
---
*Generated by [git-cliff](https://git-cliff.org)*
"""
# Remove leading/trailing whitespace
trim = true

[git]
# Parse conventional commits
conventional_commits = true
# Filter out unconventional commits
filter_unconventional = true
# Process each line of a commit as an individual commit
split_commits = false
# Regex for preprocessing commit messages
commit_preprocessors = [
    # Remove issue numbers from commits
    { pattern = '\((\w+\s)}amdings?, currentDate=#\d+\)', replace = "" },
    # Co-authored-by cleanup
    { pattern = "Co-Authored-By:.*", replace = "" },
]
# Regex for parsing and grouping commits
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps.*\\)", skip = true },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },
    { message = "^chore|^ci", group = "Miscellaneous" },
    { body = ".*security", group = "Security" },
    { message = "^revert", group = "Reverted" },
]
# Protect breaking changes from being skipped
protect_breaking_commits = true
# Filter out commits by patterns
filter_commits = false
# Tag pattern for version extraction
tag_pattern = "v[0-9].*"
# Skip tags matching pattern
skip_tags = ""
# Ignore tags matching pattern
ignore_tags = ""
# Sort commits by date
date_order = false
# Sort commits by newest
sort_commits = "newest"

# Link parsers for GitHub integration
link_parsers = [
    { pattern = "#(\\d+)", href = "https://github.com/supernovae-st/supernovae-agi/issues/$1" },
    { pattern = "RFC(\\d+)", text = "ietf-rfc-$1", href = "https://datatracker.ietf.org/doc/html/rfc$1" },
]

# Remote configuration for GitHub
[remote.github]
owner = "supernovae-st"
repo = "supernovae-agi"
