# 🌌 ARMADA: git-cliff Configuration
# Changelog generator for NovaNet releases
# Part of ARMADA quality checkpoints
# https://git-cliff.org/docs/configuration
#
# Template: SuperNovae Studio styled release notes
# - ASCII banner with version and tagline
# - "What's Changed" section with emoji bullets
# - Stats and branding signature

[changelog]
header = """
# Changelog

All notable changes to NovaNet are documented in this file.

Format: [Keep a Changelog](https://keepachangelog.com/en/1.1.0/)
Versioning: [Semantic Versioning](https://semver.org/spec/v2.0.0.html)

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}

{% else %}\
## [Unreleased]

{% endif %}\
### What's Changed

{% for group, commits in commits | group_by(attribute="group") %}
**{{ group | striptags | trim | upper_first }}**

{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.github.username %} by @{{ commit.github.username }}{%- endif %}\
{% if commit.github.pr_number %} ([#{{ commit.github.pr_number }}](https://github.com/supernovae-st/novanet/pull/{{ commit.github.pr_number }})){%- endif %}
{% endfor %}
{% endfor %}

---

**✨ SuperNovae Studio** • 🪽

"""
footer = """
---
*Generated by [git-cliff](https://git-cliff.org) | 🌌 Part of ARMADA*
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_parsers = [
    { message = "^feat", group = "✨ Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^doc", group = "📝 Documentation" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "🔧 Refactoring" },
    { message = "^style", group = "🎨 Styling" },
    { message = "^test", group = "🧪 Testing" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps\\)", group = "📦 Dependencies" },
    { message = "^chore", group = "🔨 Miscellaneous" },
    { message = "^ci", group = "👷 CI/CD" },
    { message = "^build", group = "🏗️ Build" },
    { message = "^revert", group = "⏪ Reverts" },
    { message = "^security", group = "🔒 Security" },
    { body = ".*security", group = "🔒 Security" },
]

filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"

[remote.github]
owner = "supernovae-st"
repo = "novanet"
