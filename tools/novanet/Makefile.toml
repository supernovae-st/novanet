# ═══════════════════════════════════════════════════════════════════════════════
# DEV - Development Helpers and Watch Modes
# ═══════════════════════════════════════════════════════════════════════════════

[tasks.watch]
category = "Dev"
description = "Watch mode with bacon (clippy)"
script_runner = "@shell"
script = '''
#!/bin/bash
if command -v bacon &> /dev/null; then
    bacon clippy
else
    echo "bacon not installed. Install with: cargo install bacon"
    echo "Falling back to cargo watch..."
    cargo watch -x clippy
fi
'''

[tasks.watch-test]
category = "Dev"
description = "Watch mode for tests"
script_runner = "@shell"
script = '''
#!/bin/bash
if command -v bacon &> /dev/null; then
    bacon test
else
    echo "bacon not installed. Install with: cargo install bacon"
    echo "Falling back to cargo watch..."
    cargo watch -x "test --lib"
fi
'''

[tasks.watch-run]
category = "Dev"
description = "Watch mode: rebuild and run TUI"
script_runner = "@shell"
script = '''
#!/bin/bash
if command -v cargo-watch &> /dev/null; then
    cargo watch -x "run -- tui"
else
    echo "cargo-watch not installed. Install with: cargo install cargo-watch"
    exit 1
fi
'''

[tasks.tui]
category = "Dev"
description = "Run the TUI directly"
command = "cargo"
args = ["run", "--release", "--", "tui"]

[tasks.bench]
category = "Dev"
description = "Run benchmarks (criterion)"
script_runner = "@shell"
script = '''
#!/bin/bash
if [ -d "benches" ]; then
    cargo bench
else
    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    echo "  No benches/ directory found."
    echo ""
    echo "  To add benchmarks:"
    echo "    1. Create benches/benchmarks.rs"
    echo "    2. Add to Cargo.toml:"
    echo "       [[bench]]"
    echo "       name = \"benchmarks\""
    echo "       harness = false"
    echo "    3. Add criterion as dev-dependency"
    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
fi
'''

# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD - Continuous Integration Pipelines
# ═══════════════════════════════════════════════════════════════════════════════

[tasks.pre-commit]
category = "CI"
description = "Pre-commit validation (fast feedback)"
script_runner = "@shell"
script = '''
#!/bin/bash
set -e
echo "╔═══════════════════════════════════════════════════════════════════════════╗"
echo "║  PRE-COMMIT VALIDATION                                                    ║"
echo "╚═══════════════════════════════════════════════════════════════════════════╝"
echo ""

echo "► [1/4] Checking formatting..."
cargo fmt --check || { echo "  Run 'cargo fmt' to fix"; exit 1; }
echo ""

echo "► [2/4] Running clippy..."
cargo clippy --all-targets -- -D warnings || exit 1
echo ""

echo "► [3/4] Running tests..."
cargo test --lib || exit 1
echo ""

echo "► [4/4] Running semantic audit..."
cargo make semantic-audit || exit 1
echo ""

echo "════════════════════════════════════════════════════════════════════════════"
echo "  PRE-COMMIT PASSED - Ready to commit"
echo "════════════════════════════════════════════════════════════════════════════"
'''

[tasks.pre-push]
category = "CI"
description = "Pre-push validation (thorough)"
dependencies = ["ci"]

[tasks.ci]
category = "CI"
description = "Full CI pipeline"
script_runner = "@shell"
script = '''
#!/bin/bash
set -e
START_TIME=$(date +%s)

echo "╔═══════════════════════════════════════════════════════════════════════════╗"
echo "║  CI PIPELINE                                                              ║"
echo "╚═══════════════════════════════════════════════════════════════════════════╝"
echo ""

echo "► [1/6] Checking formatting..."
cargo fmt --check || { echo "  Formatting check failed"; exit 1; }
echo ""

echo "► [2/6] Running clippy..."
cargo clippy --all-targets -- -D warnings || { echo "  Clippy failed"; exit 1; }
echo ""

echo "► [3/6] Running cargo-deny..."
cargo deny check || { echo "  cargo-deny failed"; exit 1; }
echo ""

echo "► [4/6] Running tests..."
cargo test || { echo "  Tests failed"; exit 1; }
echo ""

echo "► [5/6] Running semantic audit..."
cargo make semantic-audit || { echo "  Semantic audit failed"; exit 1; }
echo ""

echo "► [6/6] Building release..."
cargo build --release || { echo "  Build failed"; exit 1; }
echo ""

END_TIME=$(date +%s)
DURATION=$((END_TIME - START_TIME))

echo "════════════════════════════════════════════════════════════════════════════"
echo "  CI PIPELINE PASSED (${DURATION}s)"
echo "════════════════════════════════════════════════════════════════════════════"
'''

[tasks.ci-quick]
category = "CI"
description = "Quick CI (no build, faster feedback)"
run_task = { name = ["fmt-check", "clippy"], parallel = true }
dependencies = ["test", "semantic-audit"]

[tasks.ci-full]
category = "CI"
description = "Extended CI (includes coverage and security)"
script_runner = "@shell"
script = '''
#!/bin/bash
set -e
START_TIME=$(date +%s)

echo "╔═══════════════════════════════════════════════════════════════════════════╗"
echo "║  FULL CI PIPELINE (Extended)                                              ║"
echo "╚═══════════════════════════════════════════════════════════════════════════╝"
echo ""

# Run standard CI first
cargo make ci || exit 1
echo ""

echo "► [7/9] Running security audit..."
cargo audit || { echo "  Security audit failed"; exit 1; }
echo ""

echo "► [8/9] Checking for unused dependencies..."
cargo machete || { echo "  Found unused dependencies"; exit 1; }
echo ""

echo "► [9/9] Generating coverage report..."
cargo llvm-cov --lcov --output-path lcov.info || { echo "  Coverage failed"; exit 1; }
echo ""

END_TIME=$(date +%s)
DURATION=$((END_TIME - START_TIME))

echo "════════════════════════════════════════════════════════════════════════════"
echo "  FULL CI PIPELINE PASSED (${DURATION}s)"
echo "  Coverage report: lcov.info"
echo "════════════════════════════════════════════════════════════════════════════"
'''

