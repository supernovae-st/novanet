# cargo-deny configuration for NovaNet CLI/TUI
# https://embarkstudios.github.io/cargo-deny/

[graph]
# Target platforms to check
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]

# =============================================================================
# Advisories - Check for known security vulnerabilities
# =============================================================================
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Ignore unmaintained crates from transitive dependencies
# These are upstream issues we cannot control - review quarterly
ignore = [
    "RUSTSEC-2025-0012",  # backoff (neo4rs → backoff)
    "RUSTSEC-2024-0384",  # instant (neo4rs → backoff → instant)
    "RUSTSEC-2025-0119",  # number_prefix (indicatif) - cosmetic
    "RUSTSEC-2024-0436",  # paste (neo4rs → paste)
    "RUSTSEC-2025-0134",  # rustls-pemfile (neo4rs → rustls-pemfile)
    "RUSTSEC-2026-0009",  # time (ratatui-widgets → time) - DoS via stack, low risk for TUI
]

# =============================================================================
# Licenses - Ensure all dependencies use approved licenses
# =============================================================================
[licenses]
# Allow these licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",  # webpki-roots (TLS certificates)
]
# Confidence threshold for detecting license
confidence-threshold = 0.8

# Exception for our proprietary crate
[[licenses.exceptions]]
name = "novanet"
allow = ["LicenseRef-Proprietary"]

# Clarify license for crates with non-standard license files
[[licenses.clarify]]
name = "novanet"
expression = "LicenseRef-Proprietary"
license-files = []

# =============================================================================
# Bans - Deny specific crates or versions
# =============================================================================
[bans]
# Deny multiple versions of the same crate
multiple-versions = "warn"
# Allow wildcards in version requirements (not recommended but sometimes needed)
wildcards = "allow"
# Highlight when crates have been yanked
highlight = "all"

# Deny specific crates
deny = []

# Skip duplicate detection for these crates (known to have multiple versions)
skip = []

# =============================================================================
# Sources - Ensure dependencies come from trusted sources
# =============================================================================
[sources]
# Only allow crates.io
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
