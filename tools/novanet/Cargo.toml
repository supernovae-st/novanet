[package]
name = "novanet"
version = "0.17.2"
edition = "2024"
rust-version = "1.86"  # Minimum supported (ratatui 0.30 requires 1.86+)
license = "LicenseRef-Proprietary"
description = "NovaNet context graph CLI + TUI"

[dependencies]
# CLI
clap = { version = "4", features = ["derive", "env"] }
clap_complete = "4"                # Shell completion generation

# TUI (feature-gated)
ratatui = { version = "0.30", optional = true }
crossterm = { version = "0.29", features = ["event-stream"], optional = true }
arboard = { version = "3", optional = true }  # Cross-platform clipboard

# Async
tokio = { workspace = true }
futures = { workspace = true }  # StreamExt for crossterm EventStream

# Neo4j
neo4rs = { workspace = true }   # Pin minor: breaking changes between 0.x

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = "0.9"            # Maintained YAML library (serde_yml has soundness issues)
toml = "0.8"                  # TOML config files (~/.novanet/config.toml)

# Hashing
sha2 = "0.10"                 # SHA-256 for cypher query hashing (cross-validation)

# Template engine
minijinja = "2"               # 1 dep, better errors than tera (15+ deps), by Armin Ronacher
chrono = "0.4"                # Timestamp for generated file headers

# Output
tabled = "0.17"

# Search
nucleo-matcher = "0.3"        # Low-level fuzzy matcher (TUI search overlay)

# Graph
rayon = "1.10"                # Parallel YAML processing
walkdir = "2"                 # Recursive YAML file discovery

# Data parsing
csv = "1.3"                   # CSV parsing for locale import
regex = "1"                   # Regex for ATH markdown parsing

# Performance optimizations
terminal_size = "0.4"         # Terminal width detection for blueprint ASCII
rustc-hash = "2.0"            # FxHashSet/FxHashMap - faster hashing for string keys
smallvec = "1.13"             # Stack-allocated small vectors (properties, edges)
indexmap = { version = "2", features = ["serde"] }  # Preserve YAML property order
unicode-width = "0.2"         # Display width for CJK, emoji (UAX#11)
unicode-segmentation = "1.11" # Grapheme cluster iteration

# Error handling
thiserror = { workspace = true }  # Library-style errors (NovaNetError enum)
color-eyre = "0.6"            # Rich error reports with context
dirs = "6"                    # Cross-platform home directory (~/.novanet/crash.log)

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[features]
default = ["tui"]
tui = ["dep:ratatui", "dep:crossterm", "dep:arboard"]

[dev-dependencies]
insta = { version = "1", features = ["yaml"] }  # Snapshot testing
pretty_assertions = "1"       # Colorful diffs for assert_eq!
proptest = "1"                # Property-based testing (edge cases)
serial_test = "3"             # Run integration tests serially (shared YAML via symlink)
tempfile = "3"                # Temporary files for parser tests
tokio-test = "0.4"            # Async test utilities

# NOTE: [profile.release] and [profile.dev] moved to workspace root (tools/Cargo.toml)

