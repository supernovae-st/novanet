# 🌌 ARMADA: Release-plz Configuration
# Automated release management for NovaNet
# Part of ARMADA quality checkpoints
# https://release-plz.ieni.dev/docs/config

[workspace]
# Allow release-plz to release new versions
allow_dirty = false
# Repo URL for links
repo_url = "https://github.com/supernovae-st/novanet"
# PR labels for release PRs
pr_labels = ["release", "automated", "armada"]
# Create GitHub releases
git_release_enable = true
# Draft releases for review before publishing
git_release_draft = false

# Package-specific configuration
[[package]]
name = "novanet"
# Path to the crate changelog
changelog_path = "tools/novanet/CHANGELOG.md"
# Publish to crates.io (disabled for now)
publish = false
# Semver check
semver_check = true
# Git tag format
git_tag_name = "v{{ version }}"

# MCP Server package (if separate)
[[package]]
name = "novanet-mcp"
changelog_path = "tools/novanet-mcp/CHANGELOG.md"
publish = false
semver_check = true
git_tag_enable = false  # Use main novanet tag
