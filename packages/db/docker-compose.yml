# NovaNet Docker Configuration
# Single source of truth for all Docker services

name: novanet

services:
  neo4j:
    image: neo4j:5.26.0-community
    container_name: novanet-neo4j
    ports:
      - "7474:7474"   # Browser HTTP
      - "7687:7687"   # Bolt
    environment:
      # SECURITY: Use environment variable for password in production
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/novanetpassword}
      - NEO4J_PLUGINS=["apoc"]
      # UTF-8 encoding for proper diacritics support (é, ü, ñ, etc.)
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
      - NEO4J_server_jvm_additional=-Dfile.encoding=UTF-8
      # APOC file operations (restricted to /import directory)
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      # SECURITY: Restrict APOC to safe read-only procedures only
      # Blocked: apoc.cypher.*, apoc.periodic.*, apoc.trigger.*, apoc.custom.*
      - NEO4J_dbms_security_procedures_unrestricted=
      - NEO4J_dbms_security_procedures_allowlist=apoc.meta.*,apoc.help,apoc.schema.*,apoc.coll.*,apoc.convert.*,apoc.create.uuid,apoc.date.*,apoc.text.*,apoc.map.*,apoc.path.*,apoc.algo.*
    volumes:
      - novanet_neo4j_data:/data
      - novanet_neo4j_logs:/logs
      - novanet_neo4j_plugins:/plugins
      - ../core/neo4j/seed:/import
    networks:
      - novanet-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  novanet_neo4j_data:
    name: novanet_neo4j_data
  novanet_neo4j_logs:
    name: novanet_neo4j_logs
  novanet_neo4j_plugins:
    name: novanet_neo4j_plugins

networks:
  novanet-network:
    driver: bridge
