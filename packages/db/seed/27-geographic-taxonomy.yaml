      Focus on value and necessity. Emphasize cost savings and essential benefits.
      Avoid luxury positioning. Mobile-first, low-bandwidth optimized content.
      Local language essential. Trust-building important.
    market_characteristics: |
      Price-sensitive consumers. Cash/mobile money predominant. Informal economies.
      Word-of-mouth marketing important. Family/community decision-making.
      Mobile-first internet users. Low brand loyalty, high price sensitivity.
    llm_context: |
      USE: for low-income markets. GNI <= $1,135 per capita.
      TRIGGERS: low income, lic, developing, emerging, budget market.
