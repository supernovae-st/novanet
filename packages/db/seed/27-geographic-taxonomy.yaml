# CULTURAL REALMS (6)
# Broek & Webb cultural geography classification
# ═══════════════════════════════════════════════════════════════════════════════

cultural_realms:
  - key: "occidental"
    display_name: "Occidental"
    description: "Western civilization rooted in Greco-Roman and Judeo-Christian traditions"
    primary_religion: "Christianity (Catholic, Protestant, Orthodox)"
    core_values:
      - "Individualism - personal achievement and autonomy valued"
      - "Rationalism - evidence-based reasoning, scientific method"
      - "Linear time - punctuality, planning, progress"
      - "Low-context communication - explicit, direct messaging"
      - "Separation of church and state"
      - "Rule of law and contractual relationships"
    communication_style: "low-context"
    power_distance: "low"
    content_taboos:
      - "Avoid religious proselytizing in secular contexts"
      - "Gender/race discrimination language strictly prohibited"
      - "Political partisanship in commercial contexts"
      - "Excessive nationalism or xenophobia"
    llm_context: |
      USE: for Western Europe, Americas, Australia/NZ, and Western-influenced markets.
      TRIGGERS: western, occidental, european, american, australian.
      VALUES: individualism, directness, efficiency, innovation.
      STYLE: direct, factual, benefit-focused. Avoid excessive formality.
      TABOOS: discrimination, religious preaching, extreme politics.

  - key: "islamic"
    display_name: "Islamic"
    description: "Civilization centered on Islam, spanning Middle East, North Africa, South Asia"
    primary_religion: "Islam"
    core_values:
      - "Ummah - global Muslim community solidarity"
      - "Taqwa - God-consciousness in daily life"
      - "Hospitality - generosity to guests and strangers"
      - "Family honor and reputation"
      - "Respect for elders and authority"
      - "Halal/haram ethical framework"
    communication_style: "high-context"
    power_distance: "high"
    content_taboos:
      - "Pork and alcohol references"
      - "Criticism of Islam or the Prophet"
      - "Images of humans in some contexts"
      - "Immodest dress in imagery"
      - "Left-hand references (considered unclean)"
      - "Dog references in some cultures (considered unclean)"
      - "Interest/usury (riba) in financial contexts"
    llm_context: |
      USE: for Middle East, North Africa, Pakistan, Bangladesh, Indonesia, Malaysia.
      TRIGGERS: islamic, muslim, arab, middle east, maghreb.
      VALUES: faith, family, hospitality, modesty, halal.
      STYLE: respectful, formal, relationship-first. Religious references appropriate.
      TABOOS: pork, alcohol, immodesty, criticism of religion, usury.

  - key: "indic"
    display_name: "Indic"
    description: "South Asian civilization centered on Hindu-Buddhist traditions"
    primary_religion: "Hinduism, Buddhism, Jainism, Sikhism"
    core_values:
      - "Dharma - duty, moral order, righteous living"
      - "Karma - actions have consequences"
      - "Ahimsa - non-violence, especially to cows"
      - "Family and caste social structures"
      - "Respect for elders and gurus"
      - "Vegetarianism prevalent"
      - "Cyclical time concept"
    communication_style: "high-context"
    power_distance: "high"
    content_taboos:
      - "Beef references (sacred cow)"
      - "Leather from cattle"
      - "Disrespect to religious figures or scriptures"
      - "Caste discrimination (legally prohibited but sensitive)"
      - "Displays of affection considered private"
    llm_context: |
      USE: for India, Nepal, Sri Lanka, and Hindu/Buddhist diaspora.
      TRIGGERS: indic, hindu, indian, south asian, vedic.
      VALUES: family, respect for elders, duty, karma, vegetarianism common.
      STYLE: polite, respectful, hierarchy-aware. Festivals/auspicious timing matter.
      TABOOS: beef, leather, disrespecting elders/religion, public intimacy.

  - key: "east-asian"
    display_name: "East Asian"
    description: "Sinosphere civilization based on Confucian and Buddhist traditions"
    primary_religion: "Confucianism, Buddhism, Taoism, Shinto"
    core_values:
      - "Confucian hierarchy - respect for elders, authority"
      - "Face (mianzi) - reputation and social standing"
      - "Collectivism - group harmony over individual needs"
      - "Education and self-improvement"
      - "Filial piety - duty to parents"
      - "Hard work and perseverance"
      - "Guanxi - relationship networks"
    communication_style: "high-context"
    power_distance: "high"
    content_taboos:
      - "Direct criticism or confrontation (causes loss of face)"
      - "Number 4 unlucky (sounds like death)"
      - "White color for funerals (varies by context)"
      - "Pointing feet at people (some countries)"
      - "Sensitive political topics (Taiwan, Tibet, Hong Kong)"
    llm_context: |
      USE: for China, Japan, Korea, Taiwan, and Sinosphere diaspora.
      TRIGGERS: east asian, confucian, sinosphere, chinese, japanese, korean.
      VALUES: education, face, hierarchy, hard work, family duty.
      STYLE: indirect, polite, face-saving. Honorifics matter. Avoid number 4.
      TABOOS: direct criticism, political sensitivities, causing loss of face.

  - key: "southeast-asian"
    display_name: "Southeast Asian"
    description: "Diverse region blending Buddhist, Hindu, Islamic, and indigenous traditions"
    primary_religion: "Buddhism, Islam, Hinduism, Christianity (mixed)"
    core_values:
      - "Sanuk - fun and enjoyment in daily life (Thai)"
      - "Face and social harmony"
      - "Respect for elders and authority"
      - "Hospitality and generosity"
      - "Religious tolerance and syncretism"
      - "Blend of modern and traditional"
    communication_style: "high-context"
    power_distance: "high"
    content_taboos:
      - "Disrespect to royalty (Thailand, Cambodia, Brunei)"
      - "Disrespect to religion (varies by country)"
      - "Head touching (head is sacred)"
      - "Pointing feet at people or Buddha images"
      - "Political criticism (varies by country)"
      - "Pork and alcohol (Muslim-majority areas)"
    llm_context: |
      USE: for Thailand, Vietnam, Indonesia, Malaysia, Philippines, Singapore, etc.
      TRIGGERS: southeast asian, asean, indochina, malay world.
      VALUES: harmony, respect, religious tolerance, hospitality.
      STYLE: polite, indirect, avoid confrontation. Adapt to local religion.
      TABOOS: royal criticism, religious disrespect, head/feet etiquette.

  - key: "meso-african"
    display_name: "Meso-African"
    description: "Sub-Saharan African traditional cultures with indigenous, Christian, and Islamic influences"
    primary_religion: "Traditional, Christianity, Islam (mixed)"
    core_values:
      - "Ubuntu - I am because we are (communal interdependence)"
      - "Respect for elders and ancestors"
      - "Extended family networks"
      - "Oral traditions and storytelling"
      - "Hospitality to strangers"
      - "Community consensus decision-making"
    communication_style: "high-context"
    power_distance: "high"
    content_taboos:
      - "Disrespect to elders or ancestors"
      - "Individual over community messaging (context-dependent)"
      - "Colonial stereotypes or patronizing tone"
      - "Poverty porn or deficit framing"
      - "Religious disrespect (varies by region)"
    llm_context: |
      USE: for Sub-Saharan Africa.
      TRIGGERS: sub-saharan, african, ubuntu, bantu.
      VALUES: community, elders, family, hospitality, storytelling.
      STYLE: warm, respectful, community-focused. Avoid stereotypes.
      TABOOS: disrespecting elders, colonial tropes, poverty porn.

