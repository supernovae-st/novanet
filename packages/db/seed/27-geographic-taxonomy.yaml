        - "Brown"
      additional_features:
        - "Polynesians: typically larger build"
        - "Melanesians: diverse, some have natural blonde hair"
        - "Aboriginal Australians: distinctive features, wavy hair"
    primary_regions:
      - "Polynesia (Hawaii, Samoa, Tonga, Tahiti, Maori NZ)"
      - "Melanesia (Papua New Guinea, Fiji, Solomon Islands)"
      - "Micronesia"
      - "Australia (Aboriginal, Torres Strait Islander)"
    llm_context: |
      IMAGE GENERATION: Use for Pacific Islander and Aboriginal Australian contexts.
      DIVERSITY: Melanesians among the most diverse (blonde hair occurs naturally in some).
      BUILD: Polynesians typically larger-framed. Significant inter-island variation.
      NOTE: Very different from Asian populations despite geographic proximity.

