    branches:
      - "Finno-Ugric (Finnish, Hungarian, Estonian, Sami)"
      - "Samoyedic (Nenets, Nganasan)"
    llm_context: |
      USE: for Finnish, Hungarian, Estonian.
      TRIGGERS: uralic, finno-ugric, finnish, hungarian, estonian.
      SHARED: extensive case systems, vowel harmony, no grammatical gender.
      NOTE: Finnish and Hungarian not mutually intelligible despite family relationship.

