    speaker_estimate: "3.2 billion"
    primary_cultural_realm: "occidental"
    writing_systems: ["latin", "cyrillic", "greek", "armenian", "devanagari", "arabic"]
    description: "Largest language family including Romance, Germanic, Slavic, Indo-Iranian branches"
    branches:
      - "Romance (Spanish, French, Italian, Portuguese, Romanian)"
      - "Germanic (English, German, Dutch, Swedish, Norwegian)"
      - "Slavic (Russian, Polish, Ukrainian, Serbian, Czech)"
      - "Indo-Iranian (Hindi, Urdu, Bengali, Farsi, Punjabi)"
      - "Celtic (Irish, Welsh, Breton)"
      - "Hellenic (Greek)"
      - "Baltic (Lithuanian, Latvian)"
      - "Albanian"
      - "Armenian"
    llm_context: |
      USE: for most European, Iranian, and Indian languages.
      TRIGGERS: indo-european, romance, germanic, slavic, indo-iranian.
      SHARED: cognate vocabulary, similar grammatical structures within branches.
      NOTE: Branches share roots but modern forms diverged significantly.

  - key: "sit"
    display_name: "Sino-Tibetan"
    iso_639_5_code: "sit"
    speaker_estimate: "1.4 billion"
    primary_cultural_realm: "east-asian"
