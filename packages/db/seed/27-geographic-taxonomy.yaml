    description: "Second largest family including Mandarin, Cantonese, Burmese, Tibetan"
    branches:
      - "Sinitic (Mandarin, Cantonese, Wu, Min, Hakka)"
      - "Tibeto-Burman (Tibetan, Burmese, Karen)"
    llm_context: |
      USE: for Chinese languages, Tibetan, Burmese.
      TRIGGERS: sino-tibetan, chinese, sinitic, tibeto-burman.
      SHARED: tonal languages, classifier systems, topic-prominent syntax.
      NOTE: Sinitic languages sometimes mutually unintelligible despite shared script.

  - key: "nic"
    display_name: "Niger-Congo"
    iso_639_5_code: "nic"
    speaker_estimate: "700 million"
    primary_cultural_realm: "meso-african"
    writing_systems: ["latin", "n'ko", "vai"]
    description: "Largest African family including Bantu, Yoruba, Igbo, Swahili"
    branches:
      - "Bantu (Swahili, Zulu, Xhosa, Shona, Lingala)"
      - "Volta-Congo (Yoruba, Igbo, Akan)"
      - "Mande (Mandinka, Bambara)"
      - "Atlantic (Wolof, Fulani)"
    llm_context: |
      USE: for Sub-Saharan African languages.
      TRIGGERS: niger-congo, bantu, african languages.
      SHARED: noun class systems, tone, agglutinative morphology.
      NOTE: Swahili is regional lingua franca in East Africa.

  - key: "afa"
    display_name: "Afro-Asiatic"
    iso_639_5_code: "afa"
    speaker_estimate: "500 million"
    primary_cultural_realm: "islamic"
    writing_systems: ["arabic", "hebrew", "ge'ez", "latin"]
    description: "Includes Arabic, Hebrew, Amharic, Hausa, Berber"
    branches:
      - "Semitic (Arabic, Hebrew, Amharic, Tigrinya)"
      - "Berber (Tamazight, Kabyle)"
      - "Chadic (Hausa)"
      - "Cushitic (Somali, Oromo)"
      - "Egyptian (extinct, Coptic liturgical)"
    llm_context: |
      USE: for Arabic, Hebrew, Ethiopian, Hausa, Berber languages.
      TRIGGERS: afro-asiatic, semitic, hamito-semitic.
      SHARED: triconsonantal roots, VSO word order tendency, gender.
      NOTE: Arabic has many regional dialects that differ significantly.

  - key: "map"
    display_name: "Austronesian"
    iso_639_5_code: "map"
    speaker_estimate: "400 million"
    primary_cultural_realm: "southeast-asian"
    writing_systems: ["latin", "baybayin", "javanese", "balinese"]
    description: "Includes Indonesian/Malay, Filipino, Polynesian languages"
    branches:
      - "Malayo-Polynesian (Indonesian, Malay, Filipino, Javanese)"
      - "Oceanic (Hawaiian, Samoan, Maori, Fijian)"
      - "Formosan (Taiwan indigenous languages)"
    llm_context: |
      USE: for Indonesian, Malay, Filipino, Pacific Island languages.
      TRIGGERS: austronesian, malayo-polynesian, oceanic.
      SHARED: focus system, reduplication, relatively simple phonology.
      NOTE: Indonesian/Malay mutually intelligible. Pacific languages diverge.

  - key: "dra"
    display_name: "Dravidian"
    iso_639_5_code: "dra"
    speaker_estimate: "250 million"
    primary_cultural_realm: "indic"
    writing_systems: ["tamil", "telugu", "kannada", "malayalam"]
    description: "South Indian languages - Tamil, Telugu, Kannada, Malayalam"
    branches:
      - "South Dravidian (Tamil, Malayalam, Kannada)"
      - "South-Central Dravidian (Telugu, Gondi)"
      - "Central Dravidian (Kolami)"
      - "Northern Dravidian (Brahui, Kurukh)"
    llm_context: |
      USE: for South Indian languages.
      TRIGGERS: dravidian, tamil, telugu, south indian.
      SHARED: retroflex consonants, SOV word order, complex agglutination.
      NOTE: Distinct from Indo-Aryan (Hindi/Bengali). Different scripts per language.

  - key: "trk"
    display_name: "Turkic"
    iso_639_5_code: "trk"
    speaker_estimate: "200 million"
    primary_cultural_realm: "islamic"
    writing_systems: ["latin", "arabic", "cyrillic"]
    description: "Turkish, Azerbaijani, Uzbek, Kazakh and related languages"
    branches:
      - "Common Turkic (Turkish, Azerbaijani, Turkmen, Uzbek, Kazakh, Kyrgyz)"
      - "Siberian Turkic (Yakut, Tuvan)"
    llm_context: |
      USE: for Turkish, Central Asian, Azerbaijani languages.
      TRIGGERS: turkic, turkish, altaic, turk.
      SHARED: vowel harmony, agglutination, SOV order, no grammatical gender.
      NOTE: High mutual intelligibility especially Turkish-Azerbaijani.

  - key: "jpx"
    display_name: "Japonic"
    iso_639_5_code: "jpx"
    speaker_estimate: "130 million"
    primary_cultural_realm: "east-asian"
    writing_systems: ["hiragana", "katakana", "kanji"]
    description: "Japanese and Ryukyuan languages"
    branches:
      - "Japanese"
      - "Ryukyuan (Okinawan)"
    llm_context: |
      USE: for Japanese and Okinawan.
      TRIGGERS: japonic, japanese, nihongo.
      SHARED: SOV order, agglutinative, topic-prominent, complex honorifics.
      NOTE: Three writing systems (hiragana, katakana, kanji). Keigo (honorifics) essential.

  - key: "aav"
    display_name: "Austroasiatic"
    iso_639_5_code: "aav"
    speaker_estimate: "117 million"
    primary_cultural_realm: "southeast-asian"
    writing_systems: ["latin", "khmer", "thai"]
    description: "Vietnamese, Khmer, and Mon-Khmer languages"
    branches:
      - "Mon-Khmer (Vietnamese, Khmer, Mon)"
      - "Munda (Santali, Mundari - India)"
    llm_context: |
      USE: for Vietnamese, Khmer, and related languages.
      TRIGGERS: austroasiatic, mon-khmer, vietnamese, khmer.
      SHARED: monosyllabic tendency, rich vowel systems, some tonal.
      NOTE: Vietnamese highly tonal (6 tones). Khmer non-tonal but complex script.

  - key: "tai"
    display_name: "Tai-Kadai"
    iso_639_5_code: "tai"
    speaker_estimate: "100 million"
    primary_cultural_realm: "southeast-asian"
    writing_systems: ["thai", "lao", "tai_tham"]
    description: "Thai, Lao, and related languages"
    branches:
      - "Kam-Tai (Thai, Lao, Shan)"
      - "Kadai (Li, Zhuang)"
    llm_context: |
      USE: for Thai, Lao, and related languages.
      TRIGGERS: tai-kadai, thai, lao, siamese.
      SHARED: tonal (5-6 tones), analytic/isolating, SVO order.
      NOTE: Thai and Lao highly similar. Thai has complex honorific system.

  - key: "kor"
    display_name: "Koreanic"
    iso_639_5_code: "kor"
    speaker_estimate: "80 million"
    primary_cultural_realm: "east-asian"
    writing_systems: ["hangul", "hanzi"]
    description: "Korean language"
    branches:
      - "Korean"
      - "Jeju (sometimes considered separate)"
    llm_context: |
      USE: for Korean.
      TRIGGERS: koreanic, korean, hangul.
      SHARED: SOV order, agglutinative, complex honorifics (7 speech levels).
      NOTE: Hangul is featural alphabet. Formality levels critical in business.

  - key: "ura"
    display_name: "Uralic"
    iso_639_5_code: "ura"
    speaker_estimate: "25 million"
    primary_cultural_realm: "occidental"
    writing_systems: ["latin", "cyrillic"]
