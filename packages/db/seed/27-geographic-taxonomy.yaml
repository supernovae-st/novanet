# RELATIONSHIPS
# Arc definitions for connecting taxonomy nodes
# ═══════════════════════════════════════════════════════════════════════════════

relationships:
  # Geographic hierarchy
  - type: "IN_CONTINENT"
    from: "GeoRegion"
    to: "Continent"
    description: "Geographic region belongs to continent"

  - type: "IN_REGION"
    from: "GeoSubRegion"
    to: "GeoRegion"
    description: "Geographic sub-region belongs to region"

  - type: "IN_SUBREGION"
    from: "Locale"
    to: "GeoRegion"
    description: "Locale belongs to geographic region"

  # Language hierarchy
  - type: "BRANCH_OF"
    from: "LanguageBranch"
    to: "LanguageFamily"
    description: "Language branch belongs to family"

  - type: "SPEAKS_BRANCH"
    from: "Locale"
    to: "LanguageBranch"
    description: "Locale speaks language from this branch"

  # Cultural hierarchy
  - type: "PART_OF_REALM"
    from: "CulturalSubRealm"
    to: "CulturalRealm"
    description: "Cultural sub-realm part of major realm"

  - type: "IN_CULTURAL_SUBREALM"
    from: "Locale"
    to: "CulturalSubRealm"
    description: "Locale belongs to cultural sub-realm"

  # Economic classification
  - type: "HAS_INCOME_LEVEL"
    from: "Locale"
    to: "IncomeGroup"
    description: "Locale classified in income group"

  # Population cluster
  - type: "CLUSTER_OF"
    from: "PopulationSubCluster"
    to: "PopulationCluster"
    description: "Population sub-cluster part of macro cluster"

  - type: "HAS_PRIMARY_POPULATION"
    from: "Locale"
    to: "PopulationCluster"
    description: "Locale's primary population cluster"

# ═══════════════════════════════════════════════════════════════════════════════
# METADATA
# ═══════════════════════════════════════════════════════════════════════════════

metadata:
  total_continents: 6
  total_geo_regions: 22
  total_income_groups: 4
  total_language_families: 12
  total_cultural_realms: 6
  total_population_clusters: 7

  sources:
    - name: "UN M49"
      url: "https://unstats.un.org/unsd/methodology/m49/"
      description: "Geographic classification of countries"
    - name: "World Bank"
      url: "https://datahelpdesk.worldbank.org/knowledgebase/articles/906519"
      description: "Income classification FY2026"
    - name: "ISO 639-5"
      url: "https://www.loc.gov/standards/iso639-5/"
      description: "Language family codes"
    - name: "Broek & Webb"
      description: "Cultural geography classification"
    - name: "Hofstede Insights"
      url: "https://www.hofstede-insights.com/"
      description: "Cultural dimensions"

  usage:
    spreading_activation: |
      Geographic taxonomy nodes participate in spreading activation for context assembly.
      When generating content for a Locale:
        1. Traverse geographic hierarchy (Locale -> GeoRegion -> Continent)
        2. Traverse language family (Locale -> LanguageBranch -> LanguageFamily)
        3. Traverse cultural realm (Locale -> CulturalSubRealm -> CulturalRealm)
        4. Include IncomeGroup for pricing/messaging context
        5. Include PopulationCluster for image generation diversity

    llm_context_assembly: |
      Each taxonomy node has llm_context property optimized for LLM consumption.
      Format: USE/TRIGGERS/STYLE/TABOOS pattern.
      Designed for efficient token usage while providing actionable guidance.

    image_generation: |
      PopulationCluster visual_traits provide prompt guidance for diverse image generation.
      Use to ensure representative imagery for each Locale.
