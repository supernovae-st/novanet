# packages/core/models/arc-kinds/mining/targets-thing.yaml
# ArcKind: TARGETS_THING — SEO keyword targets a Schema

arc:
  name: TARGETS_THING
  family: mining
  scope: intra_realm
  source: SEOKeywordL10n
  target: Thing
  cardinality: many_to_many
  properties:
    - name: relevance_score
      type: string
      required: false
    - name: is_primary
      type: string
      required: false
  llm_context: SEO keyword targets a Schema.org Thing entity. For entity-based SEO linking keywords to
    universal concepts.
  cypher_pattern: (SEOKeywordL10n)-[:TARGETS_THING {relevance_score, is_primary}]->(Thing)
