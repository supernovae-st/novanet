# packages/core/models/arc-kinds/mining/targets-keyword.yaml
# ArcKind: TARGETS_KEYWORD — Intent expressed through localized SEO keyword

arc:
  name: TARGETS_KEYWORD
  family: mining
  scope: intra_realm
  source: SearchIntent
  target: SEOKeyword
  cardinality: one_to_many
  properties:
    - name: match_type
      type: string
      required: false
    - name: volume_share
      type: string
      required: false
  llm_context: "Intent expressed through localized SEO keyword. match_type: exact/phrase/broad.
    volume_share: 0.0-1.0."
  cypher_pattern: (SearchIntent)-[:TARGETS_KEYWORD {match_type, volume_share}]->(SEOKeyword)
