# packages/core/models/arc-kinds/ownership/has-expressions.yaml
# v10.7: Simplified to 1:1 - register is a property on Expression atoms
arc:
  name: HAS_EXPRESSIONS
  family: ownership
  scope: intra_realm
  source: Locale
  target: ExpressionSet
  cardinality: one_to_one
  llm_context: |
    USE: when loading idiomatic expressions for a locale.
    TRIGGERS: locale expressions, idioms, phrases, locale-specific text.
    NOT: individual expressions (use CONTAINS_EXPRESSION), terminology (use HAS_TERMS).
    RELATES: Locale (source), ExpressionSet (target), 1:1 cardinality.
  cypher_pattern: (Locale)-[:HAS_EXPRESSIONS]->(ExpressionSet)
