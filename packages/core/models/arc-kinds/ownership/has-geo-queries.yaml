# arc-kinds/ownership/has-geo-queries.yaml
# HAS_GEO_QUERIES - Locale owns GEO queries (v10.7)
#
# v10.7: GEO Schema v1
#        - Locale owns GEOQuery (same pattern as HAS_SEO_KEYWORDS)
#        - GEO queries are locale-specific knowledge
#
# v11.5: scope fix (cross_realm → intra_realm)
#        - Locale (shared/config) → GEOQuery (shared/knowledge)
#        - Both in shared realm

arc:
  name: HAS_GEO_QUERIES
  family: ownership
  scope: intra_realm
  source: Locale
  target: GEOQuery
  cardinality: one_to_many
  llm_context: |
    Locale owns its GEO queries. Similar to HAS_SEO_KEYWORDS.
    Use to load all AI visibility queries for a locale's GEO strategy.
    v10.7: New arc for Generative Engine Optimization tracking.

  cypher_pattern: (Locale)-[:HAS_GEO_QUERIES]->(GEOQuery)

  example:
    description: "Get all GEO queries for a locale"
    cypher: |
      MATCH (l:Locale {key: $locale})-[:HAS_GEO_QUERIES]->(q:GEOQuery)
      RETURN q.value, q.ai_visibility_score, q.share_of_voice
      ORDER BY q.ai_visibility_score DESC
