# packages/core/models/arc-kinds/ownership/has-taboos.yaml
arc:
  name: HAS_TABOOS
  family: ownership
  scope: intra_realm
  source: Locale
  target: TabooSet
  cardinality: one_to_many
  llm_context: |
    USE: when loading taboo constraints for a locale by severity.
    TRIGGERS: taboos, cultural constraints, avoid topics, sensitive content, taboo set.
    NOT: individual taboos (use CONTAINS_TABOO), culture values (use HAS_CULTURE_SET).
    RELATES: Locale (source), TabooSet (target), severity (property: avoid/careful/legal).
  cypher_pattern: "(Locale)-[:HAS_TABOOS {severity: $severity}]->(TabooSet)"
  properties:
    severity:
      type: string
      required: true
      description: "Taboo severity (avoid, careful, legal)"
