# packages/core/models/arc-kinds/ownership/default-locale.yaml
# ArcKind: DEFAULT_LOCALE — Exactly one per project — the primary/fallback locale

arc:
  name: DEFAULT_LOCALE
  family: ownership
  scope: cross_realm  # Project (org) → Locale (shared)
  source: Project
  target: Locale
  cardinality: many_to_one
  llm_context: |
    USE: when loading primary locale for fallback content.
    TRIGGERS: default locale, primary locale, fallback language, base locale.
    NOT: all supported locales (use SUPPORTS_LOCALE), locale config.
    RELATES: Project (source), Locale (target), cross_realm (scope).
  cypher_pattern: (Project)-[:DEFAULT_LOCALE]->(Locale)
