# arc-kinds/ownership/has-seo-keywords.yaml
# HAS_SEO_KEYWORDS - Locale owns SEOKeywordSet container (v11.4)
#
# v10.2: New arc for GLOBAL/seo ownership
#        - Locale owns SEOKeyword (same pattern as HAS_TERMS, HAS_PATTERNS)
#        - Replaces FOR_LOCALE (which was localization, not ownership)
#
# v11.4: Container pattern (ADR-016 consistency)
#        - Changed target: SEOKeyword → SEOKeywordSet
#        - Changed cardinality: one_to_many → one_to_one
#        - Two-hop traversal: Locale → SEOKeywordSet → SEOKeyword
#
# v11.5: scope fix (cross_realm → intra_realm)
#        - Locale (shared/config) → SEOKeywordSet (shared/knowledge)
#        - Both in shared realm

arc:
  name: HAS_SEO_KEYWORDS
  family: ownership
  scope: intra_realm
  source: Locale
  target: SEOKeywordSet
  cardinality: one_to_one
  llm_context: |
    USE: when loading SEO keyword container for a locale.
    TRIGGERS: locale keywords, SEO strategy, keyword research, SEO keyword set.
    NOT: individual keywords (use CONTAINS_SEO_KEYWORD), entity keywords (use HAS_KEYWORD).
    RELATES: Locale (source), SEOKeywordSet (target), 1:1 cardinality.

  example:
    description: "Get all keywords for a locale via container"
    cypher: |
      MATCH (l:Locale {key: $locale})-[:HAS_SEO_KEYWORDS]->(set:SEOKeywordSet)
            -[:CONTAINS_SEO_KEYWORD]->(kw:SEOKeyword)
      RETURN kw.value, kw.volume, kw.difficulty
      ORDER BY kw.volume DESC
