# packages/core/models/arc-kinds/ownership/child-of.yaml
# ArcKind: CHILD_OF — Inverse of HAS_CHILD — Entity points to its parent

arc:
  name: CHILD_OF
  family: ownership
  scope: intra_realm

  source: Entity
  target: Entity

  cardinality: many_to_many  # Matches HAS_CHILD (symlinks supported)

  inverse_of: HAS_CHILD

  llm_context: |
    USE: when traversing Entity hierarchy upward (child to parent).
    TRIGGERS: parent entity, parent category, URL parent.
    NOT: downward traversal (use HAS_CHILD).
    RELATES: Entity (both source and target), HAS_CHILD (inverse).

  cypher_pattern: "(Entity:child)-[:CHILD_OF]->(Entity:parent)"
