# packages/core/models/arc-kinds/ownership/cluster-of.yaml
# ArcKind: CLUSTER_OF - PopulationSubCluster belongs to PopulationCluster
# v10.8: Geographic Taxonomy

arc:
  name: CLUSTER_OF
  family: ownership
  scope: intra_realm

  source: PopulationSubCluster
  target: PopulationCluster
  cardinality: many_to_one

  inverse: HAS_SUBCLUSTER

  llm_context: |
    PopulationSubCluster belongs to exactly one PopulationCluster.
    Use to find related populations: MATCH (ps:PopulationSubCluster)-[:CLUSTER_OF]->(pc:PopulationCluster)
    Example: Northern European -[:CLUSTER_OF]-> West Eurasian

  cypher_pattern: "(PopulationSubCluster)-[:CLUSTER_OF]->(PopulationCluster)"
