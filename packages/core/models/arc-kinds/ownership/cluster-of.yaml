# packages/core/models/arc-kinds/ownership/cluster-of.yaml
# ArcKind: CLUSTER_OF - PopulationSubCluster belongs to PopulationCluster
# v10.8: Geographic Taxonomy

arc:
  name: CLUSTER_OF
  family: ownership
  scope: intra_realm

  source: PopulationSubCluster
  target: PopulationCluster
  cardinality: many_to_one

  inverse: HAS_SUBCLUSTER

  llm_context: |
    USE: when finding population cluster for a sub-cluster.
    TRIGGERS: population cluster, genetic group, related populations.
    NOT: sub-cluster children (use HAS_SUBCLUSTER), geographic regions.
    RELATES: PopulationSubCluster (source), PopulationCluster (target), HAS_SUBCLUSTER (inverse).

  cypher_pattern: "(PopulationSubCluster)-[:CLUSTER_OF]->(PopulationCluster)"
