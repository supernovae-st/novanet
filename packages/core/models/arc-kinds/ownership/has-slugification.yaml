# packages/core/models/arc-kinds/ownership/has-slugification.yaml
arc:
  name: HAS_SLUGIFICATION
  family: ownership
  scope: intra_realm
  source: Locale
  target: Slugification
  cardinality: one_to_one
  llm_context: |
    USE: when loading URL slug rules for a locale.
    TRIGGERS: slugification, URL generation, slug rules, locale URLs, transliteration.
    NOT: locale formatting (use HAS_FORMATTING), locale style (use HAS_STYLE).
    RELATES: Locale (source), Slugification (target), 1:1 cardinality.
  cypher_pattern: (Locale)-[:HAS_SLUGIFICATION]->(Slugification)
