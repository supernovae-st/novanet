# arc-kinds/ownership/has-comparisons.yaml
# HAS_COMPARISONS - SEOKeyword owns comparison keywords (v10.6)
#
# v10.6: SEO Schema v2
#        - Links parent keyword to ATP-derived comparisons
#        - Each comparison links to two Entities (COMPARES_A, COMPARES_B)

arc:
  name: HAS_COMPARISONS
  family: ownership
  scope: intra_realm
  source: SEOKeyword
  target: SEOComparison
  cardinality: one_to_many

  llm_context: |
    SEOKeyword owns its comparison variations from Answer The Public.
    Comparisons link two entities (X vs Y).
    Use to find competitive content opportunities.
    Pattern: "qr code" → "qr code vs barcode", "qr code or datamatrix"

  example:
    description: "Get all comparisons for a keyword"
    cypher: |
      MATCH (kw:SEOKeyword {key: $keyword_key})-[:HAS_COMPARISONS]->(c:SEOComparison)
      MATCH (c)-[:COMPARES_A]->(ea:Entity)
      MATCH (c)-[:COMPARES_B]->(eb:Entity)
      RETURN c.value, c.volume, ea.key AS entity_a, eb.key AS entity_b
      ORDER BY c.volume DESC
