# models/arc-kinds/ownership/has-design.yaml
# HAS_DESIGN - Brand owns BrandDesign (ADR-028)

arc:
  name: HAS_DESIGN
  family: ownership
  scope: intra_realm
  source: Brand
  target: BrandDesign
  cardinality: one_to_one
  required: false
  inverse: DESIGN_OF
  llm_context: |
    USE: when loading visual design for image generation.
    TRIGGERS: brand design, colors, typography, visual style, UI patterns.
    NOT: brand voice (use Brand), brand rules (use HAS_PRINCIPLES).
    RELATES: Brand (source), BrandDesign (target), DESIGN_OF (inverse).
  cypher_pattern: "(Brand)-[:HAS_DESIGN]->(BrandDesign)"
