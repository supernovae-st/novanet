# packages/core/models/arc-kinds/ownership/has-subcluster.yaml
# ArcKind: HAS_SUBCLUSTER — PopulationCluster contains PopulationSubCluster (inverse of CLUSTER_OF)
#
# v0.12.5: ADR-026 Inverse Arc Policy

arc:
  name: HAS_SUBCLUSTER
  family: ownership
  scope: intra_realm

  source: PopulationCluster
  target: PopulationSubCluster
  cardinality: one_to_many

  inverse_of: CLUSTER_OF

  llm_context: |
    USE: when finding all sub-clusters of a population cluster.
    TRIGGERS: "population sub-clusters", "cluster members", "which sub-populations".
    NOT: for finding a sub-cluster's parent (use CLUSTER_OF).
    RELATES: PopulationCluster (source), PopulationSubCluster (target), CLUSTER_OF (inverse).
    Example: West Eurasian -[:HAS_SUBCLUSTER]-> Northern European, Mediterranean

  cypher_pattern: "(PopulationCluster)-[:HAS_SUBCLUSTER]->(PopulationSubCluster)"
