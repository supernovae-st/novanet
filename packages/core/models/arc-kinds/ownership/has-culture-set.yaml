# packages/core/models/arc-kinds/ownership/has-culture-set.yaml
# v10.7: Renamed from HAS_CULTURE to avoid collision with Culture config node
# Links Locale to CultureSet knowledge atom containers
arc:
  name: HAS_CULTURE_SET
  family: ownership
  scope: intra_realm
  source: Locale
  target: CultureSet
  cardinality: one_to_many
  llm_context: Locale has multiple culture sets, one per type (values, references, celebrities, calendar).
  cypher_pattern: "(Locale)-[:HAS_CULTURE_SET {type: $type}]->(CultureSet)"
  properties:
    type:
      type: string
      required: true
      description: "Culture type (values, references, celebrities, calendar)"
