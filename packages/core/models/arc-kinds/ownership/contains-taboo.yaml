# arc-kinds/ownership/contains-taboo.yaml
# CONTAINS_TABOO - TabooSet contains Taboo atoms (v10.9.0)
#
# v10.9.0: Split from generic CONTAINS for semantic correctness
#          Each container type can only contain its specific atom type

arc:
  name: CONTAINS_TABOO
  family: ownership
  scope: intra_realm
  source: TabooSet
  target: Taboo
  cardinality: one_to_many
  llm_context: |
    USE: when loading individual taboos from a taboo set.
    TRIGGERS: taboo atoms, forbidden content, cultural restrictions, avoid topics.
    NOT: taboo set container (use HAS_TABOOS), culture config.
    RELATES: TabooSet (source), Taboo (target).
  cypher_pattern: "(TabooSet)-[:CONTAINS_TABOO]->(Taboo)"
