# packages/core/models/arc-kinds/ownership/part-of-realm.yaml
# ArcKind: PART_OF_REALM - CulturalSubRealm belongs to CulturalRealm
# v10.8: Geographic Taxonomy

arc:
  name: PART_OF_REALM
  family: ownership
  scope: intra_realm

  source: CulturalSubRealm
  target: CulturalRealm
  cardinality: many_to_one

  inverse: HAS_SUBREALM

  llm_context: |
    CulturalSubRealm belongs to exactly one CulturalRealm (Broek & Webb).
    Use to find related cultures: MATCH (csr:CulturalSubRealm)-[:PART_OF_REALM]->(cr:CulturalRealm)
    Example: Mediterranean -[:PART_OF_REALM]-> Occidental

  cypher_pattern: "(CulturalSubRealm)-[:PART_OF_REALM]->(CulturalRealm)"
