# packages/core/models/arc-kinds/ownership/project-of.yaml
# ArcKind: PROJECT_OF — Inverse of HAS_PROJECT (Project belongs to OrgConfig)

arc:
  name: PROJECT_OF
  family: ownership
  scope: intra_realm
  source: Project
  target: OrgConfig
  cardinality: many_to_one
  inverse_of: HAS_PROJECT

  llm_context: |
    USE: when finding which OrgConfig owns a Project.
    TRIGGERS: project owner, project organization, which org.
    NOT: loading projects for an organization (use HAS_PROJECT).
    RELATES: Project (source), OrgConfig (target), HAS_PROJECT (inverse).

  cypher_pattern: (Project)-[:PROJECT_OF]->(OrgConfig)
