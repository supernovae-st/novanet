# packages/core/models/arc-kinds/ownership/in-continent.yaml
# ArcKind: IN_CONTINENT - GeoRegion belongs to Continent
# v10.8: Geographic Taxonomy

arc:
  name: IN_CONTINENT
  family: ownership
  scope: intra_realm

  source: GeoRegion
  target: Continent
  cardinality: many_to_one

  inverse: HAS_REGION

  llm_context: |
    GeoRegion belongs to exactly one Continent (UN M49 hierarchy).
    Use to traverse from region to continent: MATCH (r:GeoRegion)-[:IN_CONTINENT]->(c:Continent)

  cypher_pattern: "(GeoRegion)-[:IN_CONTINENT]->(Continent)"
