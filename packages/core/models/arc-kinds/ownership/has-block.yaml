# packages/core/models/arc-kinds/ownership/has-block.yaml
# ArcKind: HAS_BLOCK — Page contains Block
#
# v0.12.4: ADR-028 - Renamed position → order for semantic clarity

arc:
  name: HAS_BLOCK
  family: ownership
  scope: intra_realm

  source: Page
  target: Block
  cardinality: one_to_many

  properties:
    - name: order
      type: integer
      required: true
      description: "Block order within page (1-based, source of truth for block sequence)"

  inverse: BLOCK_OF

  llm_context: |
    USE: when loading blocks for a page in render order.
    TRIGGERS: page blocks, block sequence, content composition, page structure.
    NOT: block content (use HAS_INSTRUCTION), block schema (use OF_TYPE).
    RELATES: Page (source), Block (target), BLOCK_OF (inverse), order (property).

  cypher_pattern: "(Page)-[:HAS_BLOCK {order}]->(Block)"
