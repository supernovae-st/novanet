# packages/core/models/arc-kinds/ownership/has-keyword.yaml
# ArcKind: HAS_KEYWORD — Entity owns SEOKeywords
#
# v0.12.4: ADR-028 Page-Entity Architecture
# Entity carries SEO keywords, Page inherits via [:REPRESENTS]

arc:
  name: HAS_KEYWORD
  family: ownership
  scope: cross_realm  # org/semantic → shared/knowledge

  source: Entity
  target: SEOKeyword
  cardinality: one_to_many

  properties:
    - name: rank
      type: string
      required: true
      enum: [primary, secondary]
      description: "primary = main keyword (1 per Entity), secondary = supporting keywords (N per Entity)"

    - name: relevance
      type: float
      required: false
      default: 1.0
      description: "Keyword relevance score (0.0-1.0)"

  llm_context: |
    USE: when loading SEO keywords for an entity.
    TRIGGERS: entity keywords, SEO targeting, primary keyword, secondary keywords.
    NOT: locale keyword sets (use HAS_SEO_KEYWORDS), keyword metrics (use HAS_METRICS).
    RELATES: Entity (source), SEOKeyword (target), rank (property: primary/secondary).

  cypher_pattern: "(Entity)-[:HAS_KEYWORD {rank, relevance}]->(SEOKeyword)"
