# models/arc-kinds/ownership/has-brand.yaml
# HAS_BRAND - Project owns Brand (ADR-028)
# Replaces HAS_BRAND_IDENTITY

arc:
  name: HAS_BRAND
  family: ownership
  scope: intra_realm
  source: Project
  target: Brand
  cardinality: one_to_one
  required: false
  inverse: BRAND_OF
  llm_context: |
    USE: when loading brand identity for content generation.
    TRIGGERS: project brand, brand voice, visual identity, content style.
    NOT: brand design details (use HAS_DESIGN), brand principles (use HAS_PRINCIPLES).
    RELATES: Project (source), Brand (target), BRAND_OF (inverse).
  cypher_pattern: "(Project)-[:HAS_BRAND]->(Brand)"
