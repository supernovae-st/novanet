# packages/core/models/arc-kinds/localization/has-internal-link.yaml
# ArcKind: HAS_INTERNAL_LINK — BlockGenerated contains link to PageGenerated (v10.3)

arc:
  name: HAS_INTERNAL_LINK
  family: localization
  scope: intra_realm

  source: BlockGenerated
  target: PageGenerated
  cardinality: many_to_many

  properties:
    - name: anchor_text
      type: string
      required: false
      description: "Visible anchor text of the link"
    - name: position
      type: integer
      required: false
      description: "Position of the link within the block content"
    - name: nofollow
      type: boolean
      required: false
      description: "Whether the link has rel=nofollow"

  llm_context: |
    BlockGenerated contains an actual HTML internal link to PageGenerated.
    Links are extracted from generated content for SEO analysis.
    Use: MATCH (bl:BlockGenerated)-[:HAS_INTERNAL_LINK]->(pl:PageGenerated)

  cypher_pattern: "(BlockGenerated)-[:HAS_INTERNAL_LINK {anchor_text, position, nofollow}]->(PageGenerated)"
