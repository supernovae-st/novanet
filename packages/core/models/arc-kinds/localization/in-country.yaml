# packages/core/models/arc-kinds/localization/in-country.yaml
# ArcKind: IN_COUNTRY - Locale belongs to Country
# v0.12.4: ADR-028 Geographic Hierarchy (Country level)

arc:
  name: IN_COUNTRY
  family: localization
  scope: intra_realm

  source: Locale
  target: Country
  cardinality: many_to_one

  inverse: HAS_LOCALE

  llm_context: |
    Locale belongs to exactly one Country (ISO 3166-1).
    A Country may have multiple Locales (e.g., CH has de-CH, fr-CH, it-CH, rm-CH).
    Use to traverse from locale to country: MATCH (l:Locale)-[:IN_COUNTRY]->(c:Country)
    Geographic hierarchy: Locale → Country → GeoRegion → Continent

  cypher_pattern: "(Locale)-[:IN_COUNTRY]->(Country)"
