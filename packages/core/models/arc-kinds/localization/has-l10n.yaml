# packages/core/models/arc-kinds/localization/has-l10n.yaml
# ArcKind: HAS_L10N — Invariant node has localized content

arc:
  name: HAS_L10N
  family: localization
  scope: intra_realm

  source:
    - Concept
    - Project
    - Thing
  target:
    - ConceptL10n
    - ProjectL10n
    - ThingL10n
  cardinality: one_to_many

  inverse: L10N_OF

  llm_context: |
    Links invariant node to its human-curated localized definitions (one per locale).
    NOT for LLM-generated content — use HAS_OUTPUT for that.
    Use: MATCH (c:Concept)-[:HAS_L10N]->(cl:ConceptL10n)-[:FOR_LOCALE]->(l:Locale)

  cypher_pattern: "(Concept)-[:HAS_L10N]->(ConceptL10n)"
