# packages/core/models/arc-kinds/localization/has-lending-type.yaml
# ArcKind: HAS_LENDING_TYPE - Locale's World Bank lending classification
# v10.8: Geographic Taxonomy

arc:
  name: HAS_LENDING_TYPE
  family: localization
  scope: intra_realm

  source: Locale
  target: LendingCategory
  cardinality: many_to_one

  inverse: CLASSIFIES

  llm_context: |
    Locale is classified in a World Bank lending category.
    Use to understand development context: MATCH (l:Locale)-[:HAS_LENDING_TYPE]->(lc:LendingCategory)
    Example: fr-FR -[:HAS_LENDING_TYPE]-> IBRD

  cypher_pattern: "(Locale)-[:HAS_LENDING_TYPE]->(LendingCategory)"
