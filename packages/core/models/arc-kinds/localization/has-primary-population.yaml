# packages/core/models/arc-kinds/localization/has-primary-population.yaml
# ArcKind: HAS_PRIMARY_POPULATION - Locale's majority population cluster
# v10.8: Geographic Taxonomy

arc:
  name: HAS_PRIMARY_POPULATION
  family: localization
  scope: intra_realm

  source: Locale
  target: PopulationCluster
  cardinality: many_to_one

  inverse: PRIMARY_FOR

  llm_context: |
    Locale's majority/primary population cluster for image generation.
    Use for quick population context: MATCH (l:Locale)-[:HAS_PRIMARY_POPULATION]->(pc:PopulationCluster)
    Example: fr-FR -[:HAS_PRIMARY_POPULATION]-> West Eurasian

  cypher_pattern: "(Locale)-[:HAS_PRIMARY_POPULATION]->(PopulationCluster)"
