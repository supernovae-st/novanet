# packages/core/models/arc-kinds/localization/in-subregion.yaml
# ArcKind: IN_SUBREGION - Locale belongs to GeoRegion/GeoSubRegion
# v10.8: Geographic Taxonomy

arc:
  name: IN_SUBREGION
  family: localization
  scope: intra_realm  # Both Locale and GeoRegion are in shared realm

  source: Locale
  target: GeoRegion  # Or GeoSubRegion if intermediate level exists
  cardinality: many_to_one

  inverse: HAS_LOCALE

  llm_context: |
    Locale belongs to a geographic region (or sub-region if available).
    Use to find similar locales: MATCH (l:Locale)-[:IN_SUBREGION]->(r)<-[:IN_SUBREGION]-(similar)
    Traversal to continent: (l)-[:IN_SUBREGION]->(r)-[:IN_CONTINENT]->(c)

  cypher_pattern: "(Locale)-[:IN_SUBREGION]->(GeoRegion|GeoSubRegion)"
