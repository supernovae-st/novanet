# packages/core/models/arc-kinds/localization/in-economic-region.yaml
# ArcKind: IN_ECONOMIC_REGION - Locale's World Bank economic region
# v10.8: Geographic Taxonomy

arc:
  name: IN_ECONOMIC_REGION
  family: localization
  scope: intra_realm

  source: Locale
  target: EconomicRegion
  cardinality: many_to_one

  inverse: HAS_LOCALE

  llm_context: |
    Locale belongs to a World Bank economic region.
    Use to find regional peers: MATCH (l:Locale)-[:IN_ECONOMIC_REGION]->(er)<-[:IN_ECONOMIC_REGION]-(similar)
    Example: fr-FR -[:IN_ECONOMIC_REGION]-> ECA

  cypher_pattern: "(Locale)-[:IN_ECONOMIC_REGION]->(EconomicRegion)"
