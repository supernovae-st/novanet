# packages/core/models/arc-kinds/localization/has-localized-content.yaml
# ArcKind: HAS_LOCALIZED_CONTENT — Inverse of FOR_LOCALE — locale knows all its content
# v10.2: SEOKeyword removed — now via HAS_SEO_KEYWORDS (ownership)

arc:
  name: HAS_LOCALIZED_CONTENT
  family: localization
  scope: intra_realm
  source: Locale
  target:
    - ProjectL10n
    - EntityContent
    - PageGenerated
    - BlockGenerated
  cardinality: one_to_many
  inverse_of: FOR_LOCALE
  llm_context: Inverse of FOR_LOCALE — locale knows all its content.
  cypher_pattern: (Locale)-[:HAS_LOCALIZED_CONTENT]->(ProjectL10n)
