# packages/core/models/arc-kinds/localization/has-localized-content.yaml
# ArcKind: HAS_LOCALIZED_CONTENT — Inverse of FOR_LOCALE — locale knows all its content
# v10.2: SEOKeyword removed — now via HAS_SEO_KEYWORDS (ownership)

arc:
  name: HAS_LOCALIZED_CONTENT
  family: localization
  scope: cross_realm  # Locale (shared) → org nodes
  source: Locale
  target:
    - ProjectContent
    - EntityContent
    - PageGenerated
    - BlockGenerated
  cardinality: one_to_many
  inverse_of: FOR_LOCALE
  llm_context: |
    USE: when loading all localized content for a specific locale.
    TRIGGERS: locale content, all content for locale, localized assets, locale lookup.
    NOT: forward locale lookup (use FOR_LOCALE), keyword ownership (use HAS_SEO_KEYWORDS).
    RELATES: Locale (source), ProjectContent/EntityContent/PageGenerated/BlockGenerated (target), FOR_LOCALE (inverse_of).
  cypher_pattern: (Locale)-[:HAS_LOCALIZED_CONTENT]->(ProjectContent)
