# packages/core/models/arc-kinds/localization/for-locale.yaml
# ArcKind: FOR_LOCALE — All localized content nodes point to their target Locale
# v10.2: SEOKeyword removed — now owned by Locale via HAS_SEO_KEYWORDS

arc:
  name: FOR_LOCALE
  family: localization
  scope: intra_realm
  source:
    - EntityContent
    - ProjectL10n
    - BlockGenerated
    - PageGenerated
    - GenerationJob
    - OutputArtifact
  target: Locale
  cardinality: many_to_one
  llm_context: All localized content nodes point to their target Locale.
  cypher_pattern: (EntityContent)-[:FOR_LOCALE]->(Locale)
