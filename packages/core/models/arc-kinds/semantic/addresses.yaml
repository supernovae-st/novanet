# arc-kinds/semantic/addresses.yaml
# ADDRESSES - PageL10n/BlockL10n addresses SEO comparison or preposition (v10.6)
#
# v10.6: SEO Schema v2
#        - Tracks which comparisons/prepositions are covered by content
#        - More specific than ANSWERS (for comparisons and use cases)

arc:
  type: ADDRESSES
  family: semantic
  scope: cross_realm
  temperature_threshold: 0.5

  source: PageL10n
  target: SEOComparison
  cardinality: many_to_many

  # Note: Also valid for BlockL10n → SEOComparison and both → SEOPreposition
  # Parser should allow multiple source/target combinations

  properties:
    - name: depth
      type: string
      required: false
      enum: [dedicated, section, mention]
      description: "How deeply the topic is addressed"

  llm_context: |
    Page or Block addresses a comparison or preposition topic.
    Use to find content coverage for competitive comparisons.
    Use to find coverage for use case/feature content.
    depth: dedicated = whole page, section = h2/block, mention = brief reference.
    Pattern: PageL10n(qr-vs-barcode-fr) → ADDRESSES → SEOComparison(qr code vs barcode)

  cypher_pattern: "(PageL10n|BlockL10n)-[:ADDRESSES {depth}]->(SEOComparison|SEOPreposition)"
