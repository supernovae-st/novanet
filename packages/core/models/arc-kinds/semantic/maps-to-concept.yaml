# packages/core/models/arc-kinds/semantic/maps-to-concept.yaml
# ArcKind: MAPS_TO_CONCEPT — Intent maps to concept

arc:
  name: MAPS_TO_CONCEPT
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.0  # v9.9: Intent→concept mapping (always follow)
  source: SearchIntent
  target: Concept
  cardinality: many_to_many
  properties:
    - name: relationship_type
      type: string
      required: false
  llm_context: "Intent maps to concept. relationship_type: directly_about/supports/related."
  cypher_pattern: (SearchIntent)-[:MAPS_TO_CONCEPT {relationship_type}]->(Concept)
