# arc-kinds/semantic/compares-a.yaml
# COMPARES_A - Comparison keyword references first entity (v11.4)

arc:
  name: COMPARES_A
  family: semantic
  scope: cross_realm
  temperature_threshold: 0.6
  source: SEOKeyword
  target: Entity
  cardinality: many_to_one

  llm_context: |
    Comparison keyword (X vs Y) references the first entity (X).
    Only valid when SEOKeyword has HAS_FORMAT → comparison.
    Pattern: (SEOKeyword)-[:COMPARES_A]->(Entity)
    v11.4: New arc for comparison keyword semantics.

  cypher_pattern: "(SEOKeyword)-[:COMPARES_A]->(Entity)"
