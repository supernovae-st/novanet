# packages/core/models/arc-kinds/semantic/enables.yaml
# ArcKind: ENABLES - Entity enables/unlocks another Entity
# v10.7: Typed semantic arcs (replaces generic SEMANTIC_LINK)

arc:
  name: ENABLES
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.2  # Enablement - important for capability mapping

  source: Entity
  target: Entity
  cardinality: many_to_many
  is_self_referential: true

  properties:
    - name: strength
      type: float
      required: false
      default: 0.75
      description: "Enablement strength (0.0-1.0)"

    - name: temperature
      type: float
      required: false
      default: 0.8
      description: "Spreading activation weight"

    - name: enablement_type
      type: string
      required: false
      enum: [unlocks, enhances, permits, facilitates]
      description: "Type of enablement relationship"

  inverse: ENABLED_BY

  llm_context: |
    Enablement relationship: Entity A enables/unlocks Entity B.
    Unlike REQUIRES (B needs A), ENABLES means A makes B possible/better.
    enablement_type: unlocks (gate), enhances (improves), permits (allows),
      facilitates (makes easier)
    Examples: API ENABLES Integration, Analytics ENABLES Optimization

  cypher_pattern: "(Entity)-[:ENABLES {strength, temperature, enablement_type}]->(Entity)"
