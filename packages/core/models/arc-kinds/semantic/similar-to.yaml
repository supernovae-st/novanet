# packages/core/models/arc-kinds/semantic/similar-to.yaml
# ArcKind: SIMILAR_TO - Entity is similar to another Entity (symmetric)
# v10.7: Typed semantic arcs (replaces generic SEMANTIC_LINK)

arc:
  name: SIMILAR_TO
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.35  # Similarity - moderate for exploration

  source: Entity
  target: Entity
  cardinality: many_to_many
  is_self_referential: true
  is_symmetric: true

  properties:
    - name: strength
      type: float
      required: false
      default: 0.65
      description: "Similarity score (0.0-1.0)"

    - name: temperature
      type: float
      required: false
      default: 0.7
      description: "Spreading activation weight"

    - name: similarity_type
      type: string
      required: false
      enum: [functional, structural, semantic, visual, behavioral]
      description: "Type of similarity"

    - name: similarity_dimensions
      type: json
      required: false
      description: "Dimensions contributing to similarity"

  # No inverse - symmetric relationship

  llm_context: |
    USE: when finding entities similar to another (symmetric relationship).
    TRIGGERS: similar to, like, resembles, related content, recommendations.
    NOT: interchangeable alternatives (use ALTERNATIVE_TO), competition (use COMPETES_WITH).
    RELATES: Entity (source), Entity (target), symmetric (A↔B), types: functional/structural/semantic/visual/behavioral.

  cypher_pattern: "(Entity)-[:SIMILAR_TO {strength, temperature, similarity_type, similarity_dimensions}]->(Entity)"
