# packages/core/models/arc-kinds/semantic/related-thing.yaml
# ArcKind: RELATED_THING — Semantic link between Things

arc:
  name: RELATED_THING
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.5  # v9.9: Thing relationships (optional context)
  source: Thing
  target: Thing
  cardinality: many_to_many
  is_self_referential: true
  properties:
    - name: relation_type
      type: string
      required: false
    - name: strength
      type: string
      required: false
  llm_context: "Semantic link between Things. relation_type:
    same_as/part_of/instance_of/related_to/opposite_of/derived_from. strength: 0.0-1.0."
  cypher_pattern: (Thing)-[:RELATED_THING {relation_type, strength}]->(Thing)
