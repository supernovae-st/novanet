# packages/core/models/arc-kinds/semantic/included-in.yaml
# ArcKind: INCLUDED_IN - Entity is included in another Entity (inverse of INCLUDES)
# v10.7: Typed semantic arcs (replaces generic SEMANTIC_LINK)

arc:
  name: INCLUDED_IN
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.1  # Containment - always follow for completeness

  source: Entity
  target: Entity
  cardinality: many_to_one
  is_self_referential: true

  properties:
    - name: strength
      type: float
      required: false
      default: 0.9
      description: "Containment strength (0.0-1.0)"

    - name: temperature
      type: float
      required: false
      default: 0.95
      description: "Spreading activation weight (high for parts)"

    - name: containment_type
      type: string
      required: false
      enum: [part, component, element, member, feature]
      description: "Type of containment relationship"

  inverse: INCLUDES

  llm_context: |
    Inverse of INCLUDES: Entity A is part of Entity B.
    Use for: finding the whole from a part, context retrieval.
    Examples: ErrorCorrection INCLUDED_IN QRCode, Amount INCLUDED_IN PaymentQR

  cypher_pattern: "(Entity)-[:INCLUDED_IN {strength, temperature, containment_type}]->(Entity)"
