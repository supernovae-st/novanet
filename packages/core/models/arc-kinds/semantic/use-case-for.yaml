# arc-kinds/semantic/use-case-for.yaml
# USE_CASE_FOR - Preposition keyword references target entity (v11.4)

arc:
  name: USE_CASE_FOR
  family: semantic
  scope: cross_realm
  temperature_threshold: 0.5
  source: SEOKeyword
  target: Entity
  cardinality: many_to_one

  llm_context: |
    Preposition keyword (X for Y) references the target entity.
    Only valid when SEOKeyword has HAS_FORMAT → preposition.
    Pattern: (SEOKeyword)-[:USE_CASE_FOR]->(Entity)
    v11.4: New arc for preposition keyword semantics.

  cypher_pattern: "(SEOKeyword)-[:USE_CASE_FOR]->(Entity)"
