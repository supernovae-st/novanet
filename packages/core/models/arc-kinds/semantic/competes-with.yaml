# packages/core/models/arc-kinds/semantic/competes-with.yaml
# ArcKind: COMPETES_WITH - Entity competes with another Entity (symmetric)
# v10.7: Typed semantic arcs (replaces generic SEMANTIC_LINK)

arc:
  name: COMPETES_WITH
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.3  # Competition - moderate importance

  source: Entity
  target: Entity
  cardinality: many_to_many
  is_self_referential: true
  is_symmetric: true

  properties:
    - name: strength
      type: float
      required: false
      default: 0.6
      description: "Competition intensity (0.0-1.0)"

    - name: temperature
      type: float
      required: false
      default: 0.7
      description: "Spreading activation weight"

    - name: competition_type
      type: string
      required: false
      enum: [direct, indirect, substitute, emerging]
      description: "Type of competitive relationship"

    - name: market_segment
      type: string
      required: false
      description: "Market segment where competition occurs"

  # No inverse - symmetric relationship

  llm_context: |
    Competition relationship: Entity A competes with Entity B (symmetric).
    Both entities serve similar purposes or target same audience.
    competition_type: direct (same solution), indirect (different approach),
      substitute (replacement), emerging (new competitor)
    Examples: StaticQR COMPETES_WITH DynamicQR, QRCode COMPETES_WITH NFC
    Symmetric: A COMPETES_WITH B implies B COMPETES_WITH A.

  cypher_pattern: "(Entity)-[:COMPETES_WITH {strength, temperature, competition_type, market_segment}]->(Entity)"
