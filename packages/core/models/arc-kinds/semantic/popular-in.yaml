# packages/core/models/arc-kinds/semantic/popular-in.yaml
# ArcKind: POPULAR_IN - Entity is popular/relevant in a geographic region
# v0.12.0: Geographic relevance linking for entity visibility by region

arc:
  name: POPULAR_IN
  family: semantic
  scope: cross_realm  # org (Entity) -> shared (geography nodes)
  temperature_threshold: 0.25  # Geographic relevance - lower for regional filtering

  source: Entity
  target:
    - GeoRegion
    - GeoSubRegion
    - Continent
  cardinality: many_to_many

  properties:
    - name: weight
      type: float
      required: false
      default: 0.8
      min: 0.0
      max: 1.0
      description: "Regional relevance (0.0 = weak presence, 1.0 = exclusive to region)"

    - name: confidence
      type: float
      required: false
      default: 0.9
      description: "Confidence in this regional association (0.0-1.0)"

    - name: source_type
      type: string
      required: false
      enum: [market_data, search_volume, manual, inference]
      default: manual
      description: "How this relationship was determined"

  llm_context: |
    Geographic relevance relationship: Entity is popular/relevant in a region.
    Links org-realm entities to shared-realm geographic nodes.
    Use for: regional content targeting, locale-specific feature promotion,
    market-specific entity selection in generation context.
    weight: 0.0 = entity exists but is niche in region
            0.5 = entity has moderate presence
            1.0 = entity is dominant/exclusive to region
    Examples:
      qr-code-pix POPULAR_IN brazil (weight: 0.95)
      qr-code-upi POPULAR_IN india (weight: 0.9)
      qr-code-twint POPULAR_IN switzerland (weight: 0.85)
    Cross-realm: Entity (org/semantic) -> GeoRegion/GeoSubRegion/Continent (shared/geography)

  cypher_pattern: "(Entity)-[:POPULAR_IN {weight, confidence, source_type}]->(GeoRegion|GeoSubRegion|Continent)"

  example:
    description: "PIX QR Code is popular in Brazil"
    cypher: |
      MATCH (e:Entity {key: 'qr-code-pix'})
      MATCH (r:GeoSubRegion {key: 'brazil'})
      MERGE (e)-[:POPULAR_IN {weight: 0.95, confidence: 0.9, source_type: 'market_data'}]->(r)

      // Query entities popular in a region
      MATCH (e:Entity)-[p:POPULAR_IN]->(r:GeoRegion {key: 'south-america'})
      WHERE p.weight > 0.7
      RETURN e.key, p.weight ORDER BY p.weight DESC
