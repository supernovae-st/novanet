# models/arc-kinds/semantic/for-market.yaml
# FOR_MARKET - Brand targets Market (ADR-028)

arc:
  name: FOR_MARKET
  family: semantic
  scope: cross_realm
  source: Brand
  target: Market
  cardinality: one_to_many
  required: false
  llm_context: |
    Brand is active in specific markets.
    Market defines geographic/demographic segment.
    Use to filter content generation by market.
  cypher_pattern: "(Brand)-[:FOR_MARKET]->(Market)"
