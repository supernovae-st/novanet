# packages/core/models/arc-kinds/semantic/clusters-topic.yaml
# ArcKind: CLUSTERS_TOPIC — TopicCluster groups related concepts

arc:
  name: CLUSTERS_TOPIC
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.3  # v9.9: Topic grouping (moderate context)
  source: TopicCluster
  target: Concept
  cardinality: one_to_many
  properties:
    - name: relevance_score
      type: string
      required: false
    - name: is_primary
      type: string
      required: false
  llm_context: "TopicCluster groups related concepts. relevance_score: 0.0-1.0 fit. is_primary: true
    if core topic."
  cypher_pattern: (TopicCluster)-[:CLUSTERS_TOPIC {relevance_score, is_primary}]->(Concept)
