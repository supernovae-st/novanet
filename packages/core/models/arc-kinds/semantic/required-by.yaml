# packages/core/models/arc-kinds/semantic/required-by.yaml
# ArcKind: REQUIRED_BY - Entity is required by another Entity (inverse of REQUIRES)
# v10.7: Typed semantic arcs (replaces generic SEMANTIC_LINK)

arc:
  name: REQUIRED_BY
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.1  # Strong dependency - always follow

  source: Entity
  target: Entity
  cardinality: many_to_many
  is_self_referential: true

  properties:
    - name: strength
      type: float
      required: false
      default: 0.9
      description: "Dependency strength (0.0-1.0)"

    - name: temperature
      type: float
      required: false
      default: 0.95
      description: "Spreading activation weight (high for dependencies)"

    - name: dependency_type
      type: string
      required: false
      enum: [hard, soft, optional, conditional]
      description: "Type of dependency"

    - name: condition
      type: string
      required: false
      description: "Condition for conditional dependencies"

  inverse: REQUIRES

  llm_context: |
    USE: when finding what depends on an entity.
    TRIGGERS: required by, dependents, what needs, impact analysis.
    NOT: enabling (use ENABLED_BY), enhancement (use ENHANCED_BY).
    RELATES: Entity (source), Entity (target/dependent), REQUIRES (inverse).

  cypher_pattern: "(Entity)-[:REQUIRED_BY {strength, temperature, dependency_type, condition}]->(Entity)"
