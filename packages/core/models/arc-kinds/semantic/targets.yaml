# arc-kinds/semantic/targets.yaml
# TARGETS - EntityContent targets SEO keywords (v10.6)
#
# v10.6: SEO Schema v2
#        - Localized content targets specific keywords for SEO
#        - Bidirectional with EXPRESSES (keyword → entity)
#        - Must respect locale alignment (EntityContent.locale == SEOKeyword.locale)

arc:
  name: TARGETS
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.6

  source: EntityContent
  target: SEOKeyword
  cardinality: many_to_many

  properties:
    - name: priority
      type: string
      required: false
      enum: [primary, secondary, tertiary]
      description: "Targeting priority for this keyword"
    - name: target_position
      type: int
      required: false
      description: "Target ranking position (1-10)"

  llm_context: |
    EntityContent targets SEO keywords for organic search optimization.
    Multiple EntityContent can target the same keyword.
    One EntityContent can target multiple keywords.
    CONSTRAINT: EntityContent locale must match SEOKeyword locale (via Locale ownership).
    Use: MATCH (el:EntityContent)-[:TARGETS]->(kw:SEOKeyword)

  cypher_pattern: "(EntityContent)-[:TARGETS {priority, target_position}]->(SEOKeyword)"
