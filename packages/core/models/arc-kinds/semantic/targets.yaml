# arc-kinds/semantic/targets.yaml
# TARGETS - EntityL10n targets SEO keywords (v10.6)
#
# v10.6: SEO Schema v2
#        - Localized content targets specific keywords for SEO
#        - Bidirectional with EXPRESSES (keyword → entity)
#        - Must respect locale alignment (EntityL10n.locale == SEOKeyword.locale)

arc:
  type: TARGETS
  family: semantic
  scope: cross_realm
  temperature_threshold: 0.6

  source: EntityL10n
  target: SEOKeyword
  cardinality: many_to_many

  properties:
    - name: priority
      type: string
      required: false
      enum: [primary, secondary, tertiary]
      description: "Targeting priority for this keyword"
    - name: target_position
      type: int
      required: false
      description: "Target ranking position (1-10)"

  llm_context: |
    EntityL10n targets SEO keywords for organic search optimization.
    Multiple EntityL10n can target the same keyword.
    One EntityL10n can target multiple keywords.
    CONSTRAINT: EntityL10n locale must match SEOKeyword locale (via Locale ownership).
    Use: MATCH (el:EntityL10n)-[:TARGETS]->(kw:SEOKeyword)

  cypher_pattern: "(EntityL10n)-[:TARGETS {priority, target_position}]->(SEOKeyword)"
