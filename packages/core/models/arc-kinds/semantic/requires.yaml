# packages/core/models/arc-kinds/semantic/requires.yaml
# ArcKind: REQUIRES - Entity requires another Entity (dependency)
# v10.7: Typed semantic arcs (replaces generic SEMANTIC_LINK)

arc:
  name: REQUIRES
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.1  # Strong dependency - always follow

  source: Entity
  target: Entity
  cardinality: many_to_many
  is_self_referential: true

  properties:
    - name: strength
      type: float
      required: false
      default: 0.9
      description: "Dependency strength (0.0-1.0)"

    - name: temperature
      type: float
      required: false
      default: 0.95
      description: "Spreading activation weight (high for dependencies)"

    - name: dependency_type
      type: string
      required: false
      enum: [hard, soft, optional, conditional]
      description: "Type of dependency"

    - name: condition
      type: string
      required: false
      description: "Condition for conditional dependencies"

  inverse: REQUIRED_BY

  llm_context: |
    USE: when finding dependencies of an entity.
    TRIGGERS: requires, depends on, needs, prerequisites, dependencies.
    NOT: enabling (use ENABLES), enhancement (use ENHANCES).
    RELATES: Entity (source), Entity (target/dependency), REQUIRED_BY (inverse).

  cypher_pattern: "(Entity)-[:REQUIRES {strength, temperature, dependency_type, condition}]->(Entity)"
