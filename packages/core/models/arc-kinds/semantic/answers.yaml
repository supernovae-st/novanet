# arc-kinds/semantic/answers.yaml
# ANSWERS - EntityL10n answers an SEO question (v10.6)
#
# v10.6: SEO Schema v2
#        - Tracks which questions are answered by which content
#        - Use for content gap analysis (find unanswered questions)

arc:
  type: ANSWERS
  family: semantic
  scope: cross_realm
  temperature_threshold: 0.6

  source: EntityL10n
  target: SEOQuestion
  cardinality: many_to_many

  properties:
    - name: coverage
      type: string
      required: false
      enum: [full, partial, brief]
      description: "How completely the question is answered"
    - name: section
      type: string
      required: false
      description: "Which section/block answers this question"

  llm_context: |
    EntityL10n answers SEO questions for content coverage tracking.
    Use to find unanswered questions (content gaps).
    coverage: full = dedicated answer, partial = mentioned, brief = touched on.
    Pattern: EntityL10n(qr-code-guide-fr) → ANSWERS → SEOQuestion(comment créer)

  cypher_pattern: "(EntityL10n)-[:ANSWERS {coverage, section}]->(SEOQuestion)"
