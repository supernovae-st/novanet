# models/arc-kinds/semantic/inspired-by-region.yaml
# INSPIRED_BY_REGION - PromptStyle inspired by GeoRegion (ADR-028)

arc:
  name: INSPIRED_BY_REGION
  family: semantic
  scope: cross_realm
  source: PromptStyle
  target: GeoRegion
  cardinality: many_to_one
  required: false
  llm_context: |
    PromptStyle is inspired by a geographic region.
    Region provides cultural context for visual style.
    E.g., "French elegance", "Japanese minimalism".
  cypher_pattern: "(PromptStyle)-[:INSPIRED_BY_REGION]->(GeoRegion)"
