# models/arc-kinds/semantic/inspired-by-region.yaml
# INSPIRED_BY_REGION - PromptStyle inspired by GeoRegion (ADR-028)

arc:
  name: INSPIRED_BY_REGION
  family: semantic
  scope: cross_realm
  source: PromptStyle
  target: GeoRegion
  cardinality: many_to_one
  required: false
  llm_context: |
    USE: when finding the cultural inspiration for a prompt style.
    TRIGGERS: style inspiration, regional style, cultural aesthetic, visual culture.
    NOT: locale targeting (use FOR_LOCALE), brand design (use HAS_DESIGN).
    RELATES: PromptStyle (source), GeoRegion (target), optional relationship.
  cypher_pattern: "(PromptStyle)-[:INSPIRED_BY_REGION]->(GeoRegion)"
