# packages/core/models/arc-kinds/semantic/semantic-link.yaml
# ArcKind: SEMANTIC_LINK — Spreading activation links between entities
# v10.3: Concept → Entity

arc:
  name: SEMANTIC_LINK
  family: semantic
  scope: intra_realm
  source: Entity
  target: Entity
  cardinality: many_to_many
  is_self_referential: true
  temperature_threshold: 0.3  # v9.9: Min temperature for traversal (high-confidence links)
  properties:
    - name: type
      type: string
      required: false
    - name: temperature
      type: string
      required: false
  llm_context: "Spreading activation links between entities. temperature: 0.0-1.0, cutoff 0.3, max 2 hops."
  cypher_pattern: (Entity)-[:SEMANTIC_LINK {type, temperature}]->(Entity)
