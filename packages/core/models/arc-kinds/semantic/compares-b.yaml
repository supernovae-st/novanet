# arc-kinds/semantic/compares-b.yaml
# COMPARES_B - Comparison keyword references second entity (v11.4)

arc:
  name: COMPARES_B
  family: semantic
  scope: cross_realm
  temperature_threshold: 0.6
  source: SEOKeyword
  target: Entity
  cardinality: many_to_one

  llm_context: |
    Comparison keyword (X vs Y) references the second entity (Y).
    Only valid when SEOKeyword has HAS_FORMAT → comparison.
    Pattern: (SEOKeyword)-[:COMPARES_B]->(Entity)
    v11.4: New arc for comparison keyword semantics.

  cypher_pattern: "(SEOKeyword)-[:COMPARES_B]->(Entity)"
