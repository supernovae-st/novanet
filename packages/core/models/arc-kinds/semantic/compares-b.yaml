# arc-kinds/semantic/compares-b.yaml
# COMPARES_B - SEOComparison references right-side Entity (v10.6)
#
# v10.6: SEO Schema v2
#        - Links comparison to second entity (Y in "X vs Y")
#        - Always used with COMPARES_A to complete the pair

arc:
  type: COMPARES_B
  family: semantic
  scope: cross_realm
  temperature_threshold: 0.5

  source: SEOComparison
  target: Entity
  cardinality: many_to_one

  llm_context: |
    SEOComparison references the right-side entity (B in "A vs B").
    Always paired with COMPARES_A for the left-side entity.
    Use to find all comparisons involving an entity.
    Pattern: "qr code vs barcode" → COMPARES_B → Entity(barcode)

  cypher_pattern: "(SEOComparison)-[:COMPARES_B]->(Entity)"
