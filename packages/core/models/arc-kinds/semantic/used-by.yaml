# packages/core/models/arc-kinds/semantic/used-by.yaml
# ArcKind: USED_BY — Inverse of USES_ENTITY — entity knows who uses it

arc:
  name: USED_BY
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.0  # v9.9: Inverse of USES_ENTITY (always follow)
  source: Entity
  target:
    - Page
    - Block
  cardinality: many_to_many
  inverse_of: USES_ENTITY
  llm_context: |
    USE: when finding which pages/blocks use an entity (reverse lookup).
    TRIGGERS: used by, who uses, entity usage, content referencing entity.
    NOT: forward lookup (use USES_ENTITY), keyword references (use EXPRESSES).
    RELATES: Entity (source), Page/Block (target), USES_ENTITY (inverse_of).
  cypher_pattern: (Entity)-[:USED_BY]->(Page)
