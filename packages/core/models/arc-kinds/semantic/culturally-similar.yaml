# packages/core/models/arc-kinds/semantic/culturally-similar.yaml
# ArcKind: CULTURALLY_SIMILAR - Pre-computed locale similarity
# v10.8: Geographic Taxonomy

arc:
  name: CULTURALLY_SIMILAR
  family: semantic
  scope: intra_realm

  source: Locale
  target: Locale
  cardinality: many_to_many

  properties:
    - name: similarity_score
      type: float
      required: true
      description: "Similarity score (0.0 to 1.0)"

    - name: factors
      type: json
      required: false
      description: "Contributing factors to similarity"

  llm_context: |
    Pre-computed cultural similarity between locales for fast LLM context retrieval.
    Factors: language branch, cultural sub-realm, geo region, income group, script.
    Use for fallback: MATCH (l:Locale)-[sim:CULTURALLY_SIMILAR]->(similar) ORDER BY sim.similarity_score DESC

  cypher_pattern: "(Locale)-[:CULTURALLY_SIMILAR {similarity_score, factors}]->(Locale)"
