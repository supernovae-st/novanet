# packages/core/models/arc-kinds/semantic/references-page.yaml
# ArcKind: REFERENCES_PAGE — BlockInstruction references Page (v10.3)

arc:
  name: REFERENCES_PAGE
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.6  # v10.3: Instruction→page reference (moderate-high priority)

  source: BlockInstruction
  target: Page
  cardinality: many_to_many

  properties:
    - name: syntax
      type: string
      required: false
      description: "Original syntax used (e.g., @link:key)"
    - name: context
      type: string
      required: false
      description: "Surrounding context in the instruction"

  llm_context: |
    BlockInstruction references a Page via @link:key syntax. Auto-parsed.
    Use: MATCH (bi:BlockInstruction)-[:REFERENCES_PAGE]->(p:Page)

  cypher_pattern: "(BlockInstruction)-[:REFERENCES_PAGE {syntax, context}]->(Page)"
