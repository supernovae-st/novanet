# packages/core/models/arc-kinds/generation/influenced-by.yaml
# ArcKind: INFLUENCED_BY — Provenance: which entities influenced this output

arc:
  name: INFLUENCED_BY
  family: generation
  scope: intra_realm
  source: BlockGenerated
  target: EntityContent
  cardinality: many_to_many
  properties:
    - name: weight
      type: string
      required: false
    - name: entity_version
      type: string
      required: false
  llm_context: |
    USE: when tracing provenance, understanding what entity content influenced output.
    TRIGGERS: provenance, entity influence, content source, attribution.
    NOT: for current entity (use EntityContent), for generation flow (use GENERATED).
    RELATES: BlockGenerated (source), EntityContent (target), weight property for influence strength.
  cypher_pattern: (BlockGenerated)-[:INFLUENCED_BY {weight, entity_version}]->(EntityContent)
