# packages/core/models/arc-kinds/generation/assembles.yaml
# ArcKind: ASSEMBLES — PageGenerated assembles BlockGenerateds with position for ordering

arc:
  name: ASSEMBLES
  family: generation
  scope: intra_realm
  source: PageGenerated
  target: BlockGenerated
  cardinality: one_to_many
  properties:
    - name: position
      type: string
      required: false
  llm_context: |
    USE: when rendering a complete page, loading blocks in order.
    TRIGGERS: page render, block assembly, content composition.
    NOT: for structure definition (use HAS_BLOCK), for single block (use BlockGenerated).
    RELATES: PageGenerated (source), BlockGenerated (target), position property for ordering.
  cypher_pattern: (PageGenerated)-[:ASSEMBLES {position}]->(BlockGenerated)
