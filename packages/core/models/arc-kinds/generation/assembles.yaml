# packages/core/models/arc-kinds/generation/assembles.yaml
# ArcKind: ASSEMBLES — PageL10n assembles BlockL10ns with position for ordering

arc:
  name: ASSEMBLES
  family: generation
  scope: intra_realm
  source: PageL10n
  target: BlockL10n
  cardinality: one_to_many
  properties:
    - name: position
      type: string
      required: false
  llm_context: PageL10n assembles BlockL10ns with position for ordering.
  cypher_pattern: (PageL10n)-[:ASSEMBLES {position}]->(BlockL10n)
