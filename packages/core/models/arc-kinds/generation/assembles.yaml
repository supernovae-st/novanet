# packages/core/models/arc-kinds/generation/assembles.yaml
# ArcKind: ASSEMBLES — PageGenerated assembles BlockGenerateds with order for sequencing
# v0.12.3: Changed position (string) to order (int) for consistency with HAS_BLOCK

arc:
  name: ASSEMBLES
  family: generation
  scope: intra_realm
  source: PageGenerated
  target: BlockGenerated
  cardinality: one_to_many
  properties:
    - name: order
      type: int
      required: true
      description: "Rendering sequence (1, 2, 3...). Matches HAS_BLOCK.order for consistency."
  llm_context: |
    USE: when rendering a complete page, loading blocks in order.
    TRIGGERS: page render, block assembly, content composition, final output.
    NOT: for structure definition (use HAS_BLOCK), for single block (use BlockGenerated).
    RELATES: PageGenerated (source), BlockGenerated (target), order property mirrors HAS_BLOCK.order.
  cypher_pattern: (PageGenerated)-[:ASSEMBLES {order}]->(BlockGenerated)
