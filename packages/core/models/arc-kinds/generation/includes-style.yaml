# packages/core/models/arc-kinds/generation/includes-style.yaml
# ArcKind: INCLUDES_STYLE - Prompt includes style directives
arc:
  name: INCLUDES_STYLE
  family: generation
  scope: cross_realm

  source:
    - PagePrompt
    - BlockPrompt
  target: Style
  cardinality: many_to_one

  llm_context: |
    Prompt template includes style configuration from locale.
    Style provides voice, tone, and formality settings.

  cypher_pattern: "(PagePrompt, BlockPrompt)-[:INCLUDES_STYLE]->(Style)"
