# packages/core/models/arc-kinds/generation/generated.yaml
# ArcKind: GENERATED â€” Instruction produced localized content
# v0.12.0 ADR-025: PagePromptâ†’PageInstruction, BlockPromptâ†’BlockInstruction

arc:
  name: GENERATED
  family: generation
  scope: intra_realm

  source:
    - PageInstruction
    - BlockInstruction
  target:
    - PageGenerated
    - BlockGenerated
  cardinality: one_to_many

  properties:
    - name: generated_at
      type: datetime
      required: true
      description: "Timestamp when content was generated"

  llm_context: |
    USE: when tracing which instruction produced which generated content.
    TRIGGERS: generation provenance, instruction audit, output source.
    NOT: for structure ownership (use HAS_GENERATED), for compiled prompts (use COMPILED_FROM).
    RELATES: PageInstruction/BlockInstruction (source), PageGenerated/BlockGenerated (target).

  cypher_pattern: "(BlockInstruction)-[:GENERATED {generated_at}]->(BlockGenerated)"
