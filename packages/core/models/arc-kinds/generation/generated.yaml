# packages/core/models/arc-kinds/generation/generated.yaml
# ArcKind: GENERATED â€” Instruction produced localized content
# v0.12.0 ADR-025: PagePromptâ†’PageInstruction, BlockPromptâ†’BlockInstruction

arc:
  name: GENERATED
  family: generation
  scope: intra_realm

  source:
    - PageInstruction
    - BlockInstruction
  target:
    - PageGenerated
    - BlockGenerated
  cardinality: one_to_many

  properties:
    - name: generated_at
      type: datetime
      required: true
      description: "Timestamp when content was generated"

  llm_context: |
    Provenance tracking: which instruction generated which output.
    Use for debugging and version history.
    Query: MATCH (instr:BlockInstruction)-[:GENERATED]->(content:BlockGenerated)

  cypher_pattern: "(BlockInstruction)-[:GENERATED {generated_at}]->(BlockGenerated)"
