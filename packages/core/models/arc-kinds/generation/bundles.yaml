# packages/core/models/arc-kinds/generation/bundles.yaml
# ArcKind: BUNDLES — Output artifact bundles specific generated nodes for deployment
# v10.9.2: Renamed from INCLUDES to BUNDLES to avoid collision with semantic/INCLUDES

arc:
  name: BUNDLES
  family: generation
  scope: intra_realm
  source: OutputArtifact
  target:
    - PageGenerated
    - BlockGenerated
  cardinality: one_to_many
  properties:
    - name: position
      type: string
      required: false
    - name: checksum
      type: string
      required: false
  llm_context: Output artifact bundles specific generated nodes for deployment. Use to load all content included in an artifact.
  cypher_pattern: (OutputArtifact)-[:BUNDLES {position, checksum}]->(PageGenerated)
