# packages/core/models/arc-kinds/generation/previous-version.yaml
# ArcKind: PREVIOUS_VERSION — Links to previous version in history chain

arc:
  name: PREVIOUS_VERSION
  family: generation
  scope: intra_realm
  source:
    - BlockGenerated
    - PageGenerated
    - OutputArtifact
  target:
    - BlockGenerated
    - PageGenerated
    - OutputArtifact
  cardinality: one_to_one
  is_self_referential: true
  llm_context: |
    USE: when traversing version history, finding previous iterations.
    TRIGGERS: version history, rollback, previous version, diff comparison.
    NOT: for current content (use direct node), for deployment (use BUNDLES).
    RELATES: Same type (source/target), self-referential chain for history.
  cypher_pattern: (BlockGenerated)-[:PREVIOUS_VERSION]->(BlockGenerated)
