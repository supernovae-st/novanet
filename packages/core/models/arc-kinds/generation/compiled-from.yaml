# packages/core/models/arc-kinds/generation/compiled-from.yaml
# ArcKind: COMPILED_FROM â€” Prompt artifact was compiled from source instruction template
# v0.12.0 ADR-025: PagePromptâ†’PageInstruction, BlockPromptâ†’BlockInstruction

arc:
  name: COMPILED_FROM
  family: generation
  scope: intra_realm
  source: PromptArtifact
  target:
    - PageInstruction
    - BlockInstruction
  cardinality: many_to_one
  llm_context: |
    USE: when tracing prompt artifact to source instruction for auditing.
    TRIGGERS: prompt source, instruction audit, template origin.
    NOT: for generated content (use HAS_GENERATED), for instruction editing (use PageInstruction).
    RELATES: PromptArtifact (source), PageInstruction/BlockInstruction (target).
  cypher_pattern: (PromptArtifact)-[:COMPILED_FROM]->(PageInstruction)
