# packages/core/models/arc-kinds/generation/compiled-from.yaml
# ArcKind: COMPILED_FROM — Prompt artifact was compiled from source prompt template

arc:
  name: COMPILED_FROM
  family: generation
  scope: intra_realm
  source: PromptArtifact
  target:
    - PagePrompt
    - BlockPrompt
  cardinality: many_to_one
  llm_context: Prompt artifact was compiled from source prompt template.
  cypher_pattern: (PromptArtifact)-[:COMPILED_FROM]->(PagePrompt)
