# packages/core/models/arc-kinds/generation/has-generated.yaml
# ArcKind: HAS_GENERATED — Structure node links to its LLM-generated output (v10.9.0)
#
# v10.9.0: Renamed from HAS_OUTPUT → HAS_GENERATED
#          Moved from localization family → generation family
#          Target: PageGenerated → PageGenerated, BlockGenerated → BlockGenerated

arc:
  name: HAS_GENERATED
  family: generation
  scope: intra_realm

  source:
    - Page
    - Block
  target:
    - PageGenerated   # v10.9.0: renamed from PageGenerated
    - BlockGenerated  # v10.9.0: renamed from BlockGenerated

  cardinality: one_to_many

  inverse: GENERATED_FOR

  llm_context: |
    USE: when loading LLM-generated output for a Page or Block.
    TRIGGERS: generated content, page output, block output, locale content.
    NOT: for source structure (use Page/Block directly), for prompts (use HAS_INSTRUCTION).
    RELATES: Page/Block (source), PageGenerated/BlockGenerated (target), GENERATED_FOR (inverse).

  cypher_pattern: "(Page)-[:HAS_GENERATED]->(PageGenerated)"
