# packages/core/models/taxonomy/arc-families/generation.yaml
# Generation family - LLM pipeline flow

arc_family:
  key: generation
  display_name: Generation
  color: "#8b5cf6"
  stroke_style: solid
  stroke_width: 3
  arrow_style: "==>"
  default_traversal: lazy

  llm_context: |
    USE: when tracking LLM generation pipeline and provenance.
    TRIGGERS: "generation", "generated", "compiled", "influenced", "provenance".
    NOT: for structural ownership (use ownership), for meaning links (use semantic).
    RELATES: GENERATED, COMPILED_FROM, INFLUENCED_BY, ASSEMBLES, BUNDLES.

  examples:
    - GENERATED
    - COMPILED_FROM
    - INFLUENCED_BY
    - GENERATED_FROM
    - INCLUDES_ENTITY
    - INCLUDES_STYLE
    - ASSEMBLES
    - BUNDLES
    - PREVIOUS_VERSION
