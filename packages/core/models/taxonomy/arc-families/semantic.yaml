# packages/core/models/taxonomy/arc-families/semantic.yaml
# Semantic family - meaning and entity connections

arc_family:
  key: semantic
  display_name: Semantic
  color: "#f97316"
  stroke_style: dotted
  stroke_width: 2
  arrow_style: ".->"
  default_traversal: lazy

  llm_context: |
    USE: when traversing meaning relationships between entities.
    TRIGGERS: "semantic", "uses", "references", "links to", "spreading activation".
    NOT: for structural ownership (use ownership), for generation provenance (use generation).
    RELATES: USES_ENTITY, SEMANTIC_LINK, REPRESENTS, REFERENCES, MENTIONS.

  examples:
    - USES_ENTITY
    - SEMANTIC_LINK
    - REPRESENTS
    - REPRESENTED_BY
    - REFERENCES
    - MENTIONS
    - LINKS_TO
    - BELONGS_TO
    - TARGETS_PERSONA
    - FOR_MARKET
    - INSPIRED_BY_REGION
