# packages/core/models/taxonomy/arc-families/localization.yaml
# Localization family - locale content relationships

arc_family:
  key: localization
  display_name: Localization
  color: "#22c55e"
  stroke_style: dashed
  stroke_width: 2
  arrow_style: ".->"
  default_traversal: eager

  llm_context: |
    USE: when linking invariant nodes to their locale-specific content.
    TRIGGERS: "localization", "locale", "for locale", "language", "translation".
    NOT: for structural ownership (use ownership), for meaning links (use semantic).
    RELATES: FOR_LOCALE, HAS_CULTURE, HAS_TERMS, HAS_EXPRESSIONS, HAS_VOICE.

  examples:
    - FOR_LOCALE
    - HAS_CULTURE
    - HAS_TERMS
    - HAS_EXPRESSIONS
    - HAS_PATTERNS
    - HAS_VOICE
    - HAS_FORMATTING
    - HAS_STYLE
    - SUPPORTS_LOCALE
    - DEFAULT_LOCALE
    - FALLBACK_TO
