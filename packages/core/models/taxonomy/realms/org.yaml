# packages/core/models/taxonomy/realms/org.yaml
# Organization realm - org-specific content (multi-tenant)

realm:
  key: org
  display_name: Organization
  icon:
    web: building-2
    terminal: "◎"
  color: "#6c71c4"

  llm_context: |
    USE: when accessing organization-specific content (projects, entities, pages).
    TRIGGERS: "org", "organization", "project", "entity", "page", "multi-tenant".
    NOT: for universal knowledge (use shared realm).
    RELATES: shared (can read from), Project (foundation), Page/Block (structure).

  layers:
    - config
    - foundation
    - structure
    - semantic
    - instruction
    - output
