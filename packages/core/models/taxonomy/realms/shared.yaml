# packages/core/models/taxonomy/realms/shared.yaml
# Shared realm - universal knowledge (READ-ONLY)

realm:
  key: shared
  display_name: Shared
  icon:
    web: globe
    terminal: "◉"
  color: "#2aa198"

  llm_context: |
    USE: when accessing universal locale knowledge applicable across ALL organizations.
    TRIGGERS: "shared", "universal", "locale knowledge", "read-only", "cultural norms".
    NOT: for organization-specific content (use org realm).
    RELATES: org (can read from), Locale (config), Term/Expression (knowledge).

  layers:
    - config
    - locale
    - geography
    - knowledge
