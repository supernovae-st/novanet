# packages/core/models/taxonomy/traits/authored.yaml
# Authored trait - human-written per locale (Data Origin)

trait:
  key: authored
  display_name: Authored
  color: "#22c55e"
  border_style: dashed
  border_width: 2
  unicode_border: "┄"

  llm_context: |
    USE: when the node contains human-written content specific to a locale.
    TRIGGERS: "authored", "editorial", "per locale", "native content", "human written".
    NOT: for structure (use defined), for LLM output (use generated).
    RELATES: EntityContent, ProjectContent.

  retrieval_defaults:
    traversal_depth: 2
    context_budget: 800
    token_estimate: 150

  examples:
    - EntityContent
    - ProjectContent
