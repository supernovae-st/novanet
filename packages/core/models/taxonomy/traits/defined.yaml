# packages/core/models/taxonomy/traits/defined.yaml
# Defined trait - human-created once (Data Origin)

trait:
  key: defined
  display_name: Defined
  color: "#3b82f6"
  border_style: solid
  border_width: 2
  unicode_border: "─"

  llm_context: |
    USE: when the node is human-created ONCE and doesn't change between locales.
    TRIGGERS: "defined", "invariant", "structure", "template", "configuration".
    NOT: for locale-specific content (use authored), for LLM output (use generated).
    RELATES: Page, Block, Entity, Locale, OrgConfig, BlockType.

  retrieval_defaults:
    traversal_depth: 2
    context_budget: 500
    token_estimate: 100

  examples:
    - Page
    - Block
    - Entity
    - Locale
    - OrgConfig
    - BlockType
    - PageInstruction
    - BlockInstruction
