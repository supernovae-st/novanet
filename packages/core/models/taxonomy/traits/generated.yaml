# packages/core/models/taxonomy/traits/generated.yaml
# Generated trait - our LLM produces (Data Origin)

trait:
  key: generated
  display_name: Generated
  color: "#b58900"
  border_style: double
  border_width: 2
  unicode_border: "═"

  llm_context: |
    USE: when the node is produced by the NovaNet LLM generation pipeline.
    TRIGGERS: "generated", "LLM output", "AI produced", "NovaNet created".
    NOT: for human content (use authored), for external API data (use retrieved).
    RELATES: PageGenerated, BlockGenerated, OutputArtifact, PromptArtifact.

  retrieval_defaults:
    traversal_depth: 1
    context_budget: 150
    token_estimate: 50

  examples:
    - PageGenerated
    - BlockGenerated
    - OutputArtifact
    - PromptArtifact
