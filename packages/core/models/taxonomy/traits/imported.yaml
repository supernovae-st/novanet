# packages/core/models/taxonomy/traits/imported.yaml
# Imported trait - external data brought in (Data Origin)

trait:
  key: imported
  display_name: Imported
  color: "#8b5cf6"
  border_style: dotted
  border_width: 2
  unicode_border: "┈"

  llm_context: |
    USE: when the node contains data imported from external sources.
    TRIGGERS: "imported", "external", "corpus", "discovered", "curated".
    NOT: for human-written content (use authored), for API fetches (use retrieved).
    RELATES: Term, Expression, Pattern, SEOKeyword, GEOQuery, Culture.

  retrieval_defaults:
    traversal_depth: 1
    context_budget: 200
    token_estimate: 50

  examples:
    - Term
    - Expression
    - Pattern
    - CultureRef
    - Taboo
    - SEOKeyword
    - GEOQuery
    - Culture
    - Style
    - Formatting
