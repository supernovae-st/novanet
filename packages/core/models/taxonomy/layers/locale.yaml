# packages/core/models/taxonomy/layers/locale.yaml
# Locale layer - locale-specific settings (shared realm only)

layer:
  key: locale
  display_name: Locale
  icon:
    web: globe
    terminal: "⊕"
  color: "#64748b"
  realms: [shared]

  llm_context: |
    USE: when loading locale-specific settings (1:1 with Locale definition).
    TRIGGERS: "locale settings", "culture", "formatting", "market", "style".
    NOT: for BCP-47 codes (use config/Locale), for knowledge atoms (use knowledge).
    RELATES: Locale (config, via HAS_CULTURE etc.), Culture, Style, Formatting.

  nodes:
    shared:
      - Culture
      - Style
      - Formatting
      - Adaptation
      - Market
      - Slugification
