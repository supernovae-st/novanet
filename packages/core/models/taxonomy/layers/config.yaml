# packages/core/models/taxonomy/layers/config.yaml
# Config layer - definitions (both shared and org realms)

layer:
  key: config
  display_name: Config
  icon:
    web: settings
    terminal: "⚙"
  color: "#64748b"
  realms: [shared, org]

  llm_context: |
    USE: when loading configuration definitions or organization roots.
    TRIGGERS: "config", "settings", "definitions", "locale codes", "categories".
    NOT: for locale-specific parameters (use locale layer).
    RELATES: Locale (shared/config), EntityCategory (shared/config), OrgConfig (org/config).

  nodes:
    shared:
      - Locale
      - EntityCategory
      - SEOKeywordFormat
    org:
      - OrgConfig
