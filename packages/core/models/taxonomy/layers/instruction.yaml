# packages/core/models/taxonomy/layers/instruction.yaml
# Instruction layer - generation directives (org realm only)

layer:
  key: instruction
  display_name: Instructions
  icon:
    web: file-text
    terminal: "▧"
  color: "#eab308"
  realms: [org]

  llm_context: |
    USE: when loading LLM generation directives and block schemas.
    TRIGGERS: "instruction", "prompt", "directive", "rules", "block type".
    NOT: for page/block structure (use structure), for output (use output).
    RELATES: PageInstruction, BlockInstruction, BlockType, BlockRules.

  nodes:
    org:
      - PageInstruction
      - BlockInstruction
      - BlockType
      - BlockRules
      - PromptArtifact
