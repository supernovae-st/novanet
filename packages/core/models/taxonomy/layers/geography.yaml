# packages/core/models/taxonomy/layers/geography.yaml
# Geography layer - geographic classifications (shared realm only)

layer:
  key: geography
  display_name: Geography
  icon:
    web: map
    terminal: "⊙"
  color: "#10b981"
  realms: [shared]

  llm_context: |
    USE: when loading geographic context for content localization.
    TRIGGERS: "geography", "continent", "region", "country", "economic zone".
    NOT: for cultural knowledge (use knowledge layer), for locale settings (use locale).
    RELATES: Continent, GeoRegion, GeoSubRegion, Country, IncomeLevel.

  nodes:
    shared:
      - Continent
      - GeoRegion
      - GeoSubRegion
      - Country
      - IncomeLevel
      - LendingCategory
