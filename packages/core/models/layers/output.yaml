# packages/core/models/layers/output.yaml
# Output layer definition (org realm only)
# v0.12.5

layer:
  key: output
  display_name: Generated Output
  description: |
    LLM-generated content. The final localized pages and blocks ready for
    rendering. These are the RESULTS of the generation pipeline - created by
    combining foundation, structure, semantic, and instruction nodes with
    locale knowledge. All nodes have "generated" trait.
  color: "#22c55e"
  icon:
    web: "sparkles"
    terminal: "✦"

  realms:
    - org

  classes:
    - PageGenerated
    - BlockGenerated
    - OutputArtifact

  class_count: 3  # Computed by generator

  llm_context: |
    USE: when accessing generated content.
    TRIGGERS: "generated", "output", "final content", "rendered".
    NOT: for generation instructions (use instruction layer).
    RELATES: PageGenerated (generated), BlockGenerated (generated), OutputArtifact (generated).
