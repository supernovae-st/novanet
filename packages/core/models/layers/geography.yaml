# packages/core/models/layers/geography.yaml
# Geography layer definition (shared realm only)
# v0.12.5

layer:
  key: geography
  display_name: Geography
  description: |
    Geographic and economic classifications. Continents, regions, sub-regions,
    economic zones, income groups, lending categories. World Bank data structure
    for geographic context. All nodes have "imported" trait.
  color: "#10b981"
  icon:
    web: "map"
    terminal: "◆"

  realms:
    - shared

  classes:
    - Continent
    - GeoRegion
    - GeoSubRegion
    - Country
    - IncomeGroup
    - LendingCategory

  class_count: 6  # Computed by generator

  llm_context: |
    USE: when accessing geographic classifications.
    TRIGGERS: "continent", "region", "country", "income group", "geography".
    NOT: for locale-specific settings (use locale layer).
    RELATES: Continent (top), GeoRegion (hierarchy), Country (leaf).
