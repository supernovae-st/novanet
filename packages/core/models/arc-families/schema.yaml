# packages/core/models/arc-families/schema.yaml
# Schema arc family definition
# v0.13.1

arc_family:
  key: schema
  display_name: Schema
  description: |
    Meta-schema relationships connecting the schema graph itself. These arcs
    define the structure of the schema: how Classes, ArcClasses, and instances
    relate in the meta-graph. Auto-generated by schema generators.
  color: "#6366f1"  # indigo - distinct from other families
  stroke_style: dotted
  stroke_width: 1
  arrow_style: "..>"
  default_traversal: lazy
  icon:
    web: "database"
    terminal: "⊚"

  arc_count: 3  # OF_CLASS, FROM_CLASS, TO_CLASS

  inverse_convention: null  # Schema arcs are unidirectional
  tier_1_inverses: []  # No inverses - structural only

  key_arcs:
    - OF_CLASS     # Instance → Class
    - FROM_CLASS   # ArcClass → Class (source type)
    - TO_CLASS     # ArcClass → Class (target type)

  llm_context: |
    USE: when querying the schema graph structure or meta-schema.
    TRIGGERS: "schema graph", "class membership", "arc definition", "meta-schema".
    NOT: for instance relationships (use the actual arc), for data queries (use semantic arcs).
    RELATES: OF_CLASS (instance-class bridge), FROM_CLASS/TO_CLASS (arc type definitions).
