# packages/core/models/arc-families/ownership.yaml
# Ownership arc family definition
# v0.12.5

arc_family:
  key: ownership
  display_name: Ownership
  description: |
    Parent→Child hierarchy relationships. The primary structural backbone of
    the knowledge graph. A node "owns" or "contains" another.
  color: "#3b82f6"
  stroke_style: solid
  stroke_width: 2
  arrow_style: "-->"
  default_traversal: eager
  icon:
    web: "git-branch"
    terminal: "→"

  arc_count: 43  # Computed by generator

  inverse_convention: "*_OF"
  # v0.13.0 ADR-029: HAS_CONTENT + HAS_GENERATED merged → HAS_NATIVE
  tier_1_inverses:
    - HAS_ENTITY / ENTITY_OF
    - HAS_PAGE / PAGE_OF
    - HAS_PROJECT / PROJECT_OF
    - HAS_BLOCK / BLOCK_OF
    - HAS_NATIVE / NATIVE_OF  # v0.13.0: merged HAS_CONTENT + HAS_GENERATED
    - HAS_CHILD / CHILD_OF
    - HAS_INSTRUCTION / INSTRUCTION_OF

  key_arcs:
    - HAS_PROJECT
    - HAS_PAGE
    - HAS_ENTITY
    - HAS_BLOCK
    - HAS_NATIVE  # v0.13.0: merged HAS_CONTENT + HAS_GENERATED
    - HAS_CHILD

  llm_context: |
    USE: when traversing ownership hierarchies.
    TRIGGERS: "parent", "child", "contains", "belongs to", "owns".
    NOT: for semantic relationships (use semantic family).
    RELATES: HAS_PAGE, HAS_ENTITY, HAS_BLOCK (key arcs).
