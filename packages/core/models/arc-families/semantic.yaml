# packages/core/models/arc-families/semantic.yaml
# Semantic arc family definition
# v0.12.5

arc_family:
  key: semantic
  display_name: Semantic
  description: |
    Meaning and entity connections. Spreading activation traversal with
    temperature-based filtering. Links entities to each other and to the
    pages/blocks that use them.
  color: "#f97316"
  stroke_style: dotted
  stroke_width: 2
  arrow_style: ".->"
  default_traversal: lazy
  icon:
    web: "brain"
    terminal: "⇠"

  arc_count: 24  # Computed by generator

  key_arcs:
    - USES_ENTITY
    - SEMANTIC_LINK
    - REFERENCES
    - MENTIONS
    - BELONGS_TO
    - TARGETS_KEYWORD
    - REPRESENTS

  llm_context: |
    USE: when traversing semantic relationships.
    TRIGGERS: "uses", "references", "mentions", "semantic link", "meaning".
    NOT: for ownership hierarchy (use ownership family).
    RELATES: USES_ENTITY (page→entity), SEMANTIC_LINK (entity→entity).
