# models/node-classes/org/semantic/entity-native.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# EntityNative - Human-authored locale-native content for Entity nodes (v0.13.0 ADR-029)

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: EntityNative
  realm: org
  layer: semantic
  trait: authored  # Human writes natively per locale

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Human-authored locale-native content for an Entity"

  llm_context: |
    USE: when loading localized entity data for content generation.
    TRIGGERS: "entity content", "localized entity", "entity native", locale code.
    NOT: for invariant entity definition (use Entity), for generated page content (use PageNative).
    RELATES: Entity (parent via HAS_NATIVE), Locale (target via FOR_LOCALE), SEOKeyword (targets via TARGETS), Term (vocabulary via USES_TERM).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: circle-check
    terminal: "●"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      pattern: "^entity:[a-z][a-z0-9-]*@[a-z]{2}-[A-Z]{2}$"
      description: "Composite key: entity:{entity_key}@{locale_key}"
      examples:
        - "entity:create-qr-code@fr-FR"
        - "entity:qr-code-wifi@ja-JP"

    entity_key:
      type: string
      required: true
      pattern: "^[a-z][a-z0-9-]*$"
      indexed: true
      description: "Parent Entity key (denormalized for fast lookup)"
      examples:
        - "create-qr-code"
        - "qr-code-wifi"

    locale_key:
      type: string
      required: true
      pattern: "^[a-z]{2}-[A-Z]{2}$"
      indexed: true
      description: "Target Locale key (denormalized). BCP 47 format."
      examples:
        - "fr-FR"
        - "en-US"
        - "ja-JP"

    display_name:
      type: string
      required: true
      description: "Localized display name"

    description:
      type: string
      required: true
      description: "Localized short description"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ─────────────────────────────────────────────────────────────────────────────
  # VECTOR EMBEDDING
  # ─────────────────────────────────────────────────────────────────────────────
  embedding_properties:
    embedding:
      type: vector
      dimensions: 1536
      required: false

    embedding_source:
      type: string
      required: false

    embedding_updated_at:
      type: datetime
      required: false

  # ─────────────────────────────────────────────────────────────────────────────
  # ENTITYNATIVE-SPECIFIC PROPERTIES
  # ─────────────────────────────────────────────────────────────────────────────
  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    curation_status:
      type: string
      required: true
      enum:
        - "human_authored"
        - "machine_translated"
        - "ai_generated"
        - "ai_generated_reviewed"
      description: "Content origin and quality tier"

    status:
      type: string
      required: false
      default: "draft"
      enum: ["draft", "reviewed", "published"]
      description: "Publication workflow status"

    definition:
      type: string
      required: false
      description: "What it is - localized definition"

    purpose:
      type: string
      required: false
      description: "Why it exists - localized purpose"

    benefits:
      type: string[]
      required: false
      description: "Value propositions in target locale"

    usage_examples:
      type: string[]
      required: false
      description: "Locale-native usage examples"

    audience_segment:
      type: string
      required: false
      enum:
        - professional
        - consumer
        - developer
        - enterprise

    cultural_notes:
      type: string
      required: false
      description: "Locale-specific cultural considerations"

    version:
      type: int
      required: true
      description: "Content version for staleness detection"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: FOR_LOCALE
        to: Locale
        cardinality: "N:1"
        description: "Links to the locale this content is for"

      - type: TARGETS
        to: SEOKeyword
        cardinality: "N:N"
        description: "SEO keywords this localized entity targets"

      - type: USES_TERM
        to: Term
        cardinality: "N:N"
        description: "Direct link to locale-specific terms for vocabulary loading"

      - type: USES_EXPRESSION
        to: Expression
        cardinality: "N:N"
        description: "Direct link to locale-specific expressions for tone/voice"

      - type: USES_PATTERN
        to: Pattern
        cardinality: "N:N"
        description: "Direct link to locale-specific patterns"

      - type: USES_CULTURE_REF
        to: CultureRef
        cardinality: "N:N"
        description: "Direct link to locale-specific cultural references"

    incoming:
      - type: HAS_NATIVE
        from: Entity
        cardinality: "1:N"
        description: "Parent entity that owns this native content"

      - type: INFLUENCED_BY
        from: BlockNative
        cardinality: "N:N"
        description: "BlockNative nodes influenced by this content"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    constraints:
      - "CREATE CONSTRAINT entity_native_key IF NOT EXISTS FOR (en:EntityNative) REQUIRE en.key IS UNIQUE"

    indexes:
      - "CREATE INDEX entity_native_entity_key IF NOT EXISTS FOR (en:EntityNative) ON (en.entity_key)"
      - "CREATE INDEX entity_native_locale_key IF NOT EXISTS FOR (en:EntityNative) ON (en.locale_key)"
      - "CREATE INDEX entity_native_status IF NOT EXISTS FOR (en:EntityNative) ON (en.status)"

  example:
    data:
      key: "entity:create-qr-code@fr-FR"
      entity_key: "create-qr-code"
      locale_key: "fr-FR"
      display_name: "Créer un QR Code"
      description: "Générez un QR Code gratuitement en quelques secondes"
      curation_status: "human_authored"
      status: "published"
      definition: "Processus de génération d'un QR Code à partir de données."
      purpose: "Permettre aux utilisateurs de créer rapidement des QR Codes."
      benefits:
        - "Création en quelques secondes"
        - "Personnalisation complète"
        - "Téléchargement gratuit"
      version: 1
    cypher: |
      MATCH (e:Entity {key: "create-qr-code"})-[:HAS_NATIVE]->(en:EntityNative {locale_key: "fr-FR"})
      RETURN en
