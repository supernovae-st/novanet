# models/node-classes/org/semantic/entity-native.yaml
# EntityNative - Human-authored native content for Entity nodes (v0.13.0 ADR-029)
#
# ═══════════════════════════════════════════════════════════════════════════════
# v0.13.0 CHANGES (ADR-029 *Native Pattern)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   RENAMED: EntityNative → EntityNative
#   - All locale-specific nodes now use *Native suffix
#   - Trait (authored vs generated) distinguishes who creates content
#   - Unified arc: HAS_NATIVE replaces HAS_NATIVE
#
# ═══════════════════════════════════════════════════════════════════════════════
# PURPOSE
# ═══════════════════════════════════════════════════════════════════════════════
#
# EntityNative provides locale-native content for a parent Entity. This is the
# LOCALIZED half of the Entity/EntityNative pair.
#
# ═══════════════════════════════════════════════════════════════════════════════
# ARCHITECTURE (Full Hierarchy)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   Project ──[:HAS_ENTITY]──> Entity (defined)
#                                  │
#                                  └──[:HAS_NATIVE {locale}]──> EntityNative
#                                                                   │
#                                                                   ├──[:FOR_LOCALE]──> Locale
#                                                                   │
#                                                                   └──[:TARGETS]──> SEOKeyword (N:N)
#
# Entity: Invariant definition (EN key, universal properties)
# EntityNative: Human-authored locale-native content for THAT locale
#
# ═══════════════════════════════════════════════════════════════════════════════
# KEY PRINCIPLE: Generation, NOT Translation
# ═══════════════════════════════════════════════════════════════════════════════
#
#   WRONG:  Entity(EN) → Translate → EntityNative(FR)
#   RIGHT:  Entity(defined) → Author natively → EntityNative(FR)
#
# EntityNative is AUTHORED natively for each locale, not translated.
# This preserves cultural nuance and locale-specific expressions.
#
# ═══════════════════════════════════════════════════════════════════════════════

node:
  name: EntityNative
  realm: org
  layer: semantic
  trait: authored
  icon:
    web: "circle-check"
    terminal: "●"
  description: "Human-authored locale-native content for an Entity"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    # ─────────────────────────────────────────────────────────────────────────────
    # COMPOSITE KEY (v10.9.0)
    # ─────────────────────────────────────────────────────────────────────────────
    key:
      type: string
      required: true
      pattern: "^entity:[a-z][a-z0-9-]*@[a-z]{2}-[A-Z]{2}$"
      description: "Composite key: entity:{base_key}@{locale_key}"
      examples:
        - "entity:create-qr-code@fr-FR"
        - "entity:qr-code-wifi@ja-JP"
        - "entity:dynamic-qr-code@de-DE"

    # ─────────────────────────────────────────────────────────────────────────────
    # IDENTITY PROPERTIES (denormalized for fast lookup)
    # ─────────────────────────────────────────────────────────────────────────────
    entity_key:
      type: string
      required: true
      pattern: "^[a-z][a-z0-9-]*$"
      indexed: true
      description: "Parent Entity key (denormalized)"
      examples:
        - "create-qr-code"
        - "qr-code-wifi"
        - "dynamic-qr-code"

    locale_key:
      type: string
      required: true
      pattern: "^[a-z]{2}-[A-Z]{2}$"
      indexed: true
      description: "Target Locale key (denormalized). BCP 47 format."
      examples:
        - "fr-FR"
        - "en-US"
        - "ja-JP"

    # ─────────────────────────────────────────────────────────────────────────────
    # v0.13.0 ADR-030: Slug properties moved to PageNative
    # ─────────────────────────────────────────────────────────────────────────────
    # URL/routing properties (slug, full_path, parent_slug, depth, slug_history)
    # are now on PageNative, not EntityNative.
    # EntityNative focuses on semantic content; PageNative handles URL routing.
    # ─────────────────────────────────────────────────────────────────────────────

    # ─────────────────────────────────────────────────────────────────────────────
    # CONTENT PROPERTIES
    # ─────────────────────────────────────────────────────────────────────────────
    display_name:
      type: string
      required: true
      description: "Localized display name"

    description:
      type: string
      required: true
      description: "Localized short description"

    llm_context:
      type: string
      required: true
      description: |
        Format: USE: [when]. TRIGGERS: [locale keywords]. NOT: [disambiguation]. RELATES: [connections].
        Example: USE: when loading localized entity data for content generation. TRIGGERS: "entity content", "localized entity", locale code. NOT: for invariant entity definition (use Entity). RELATES: Entity (parent via HAS_NATIVE), Locale (target via FOR_LOCALE), SEOKeyword (targets via TARGETS).

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # VECTOR EMBEDDING
  # ═══════════════════════════════════════════════════════════════════════════════

  embedding_properties:
    embedding:
      type: vector
      dimensions: 1536
      required: false

    embedding_source:
      type: string
      required: false

    embedding_updated_at:
      type: datetime
      required: false

  # ═══════════════════════════════════════════════════════════════════════════════
  # ENTITYCONTENT-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    # ─────────────────────────────────────────────────────────────────────────────
    # CURATION STATUS (v10.9.0)
    # ─────────────────────────────────────────────────────────────────────────────
    curation_status:
      type: string
      required: true
      enum:
        - "human_authored"        # Tier 1: Native expert wrote it
        - "machine_translated"    # Tier 2: DeepL/Google Translate
        - "ai_generated"          # Tier 3: LLM generated
        - "ai_generated_reviewed" # Tier 3+: LLM + human review
      description: "Content origin and quality tier"

    # ─────────────────────────────────────────────────────────────────────────────
    # PUBLICATION STATUS (v11.2)
    # ─────────────────────────────────────────────────────────────────────────────
    status:
      type: string
      required: false
      default: "draft"
      enum: ["draft", "reviewed", "published"]
      description: "Publication workflow status"
      llm_context: "Content lifecycle stage - draft (not reviewed), reviewed (human validated), published (live)"

    # ─────────────────────────────────────────────────────────────────────────────
    # CONTENT PROPERTIES
    # ─────────────────────────────────────────────────────────────────────────────
    definition:
      type: string
      required: false
      description: "What it is - localized definition"

    purpose:
      type: string
      required: false
      description: "Why it exists - localized purpose"

    benefits:
      type: string[]
      required: false
      description: "Value propositions in target locale"

    usage_examples:
      type: string[]
      required: false
      description: "Locale-native usage examples"

    audience_segment:
      type: string
      required: false
      description: "Target audience for this locale variant"
      enum:
        - professional
        - consumer
        - developer
        - enterprise

    cultural_notes:
      type: string
      required: false
      description: "Locale-specific cultural considerations"

    # ─────────────────────────────────────────────────────────────────────────────
    # VERSIONING
    # ─────────────────────────────────────────────────────────────────────────────
    version:
      type: int
      required: true
      description: "Content version for staleness detection"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    FOR_LOCALE:
      to: Locale
      cardinality: "N:1"
      description: "Links to the locale this content is for"

    TARGETS:
      to: SEOKeyword
      cardinality: "N:N"
      description: "SEO keywords this localized entity is targeting for ranking"

  incoming_relations:
    HAS_NATIVE:
      from: Entity
      cardinality: "1:N"
      description: "Parent entity that owns this native content"

  # ═══════════════════════════════════════════════════════════════════════════════
  # NEO4J CONFIGURATION (v0.13.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  neo4j:
    constraints:
      - "CREATE CONSTRAINT entity_native_key IF NOT EXISTS FOR (en:EntityNative) REQUIRE en.key IS UNIQUE"

    indexes:
      - "CREATE INDEX entity_native_entity_key IF NOT EXISTS FOR (en:EntityNative) ON (en.entity_key)"
      - "CREATE INDEX entity_native_locale_key IF NOT EXISTS FOR (en:EntityNative) ON (en.locale_key)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLES
  # ═══════════════════════════════════════════════════════════════════════════════

  examples:
    # NOTE: slug/full_path/parent_slug/depth are on PageNative per ADR-030
    fr_fr_create_qr:
      data:
        key: "entity:create-qr-code@fr-FR"
        entity_key: "create-qr-code"
        locale_key: "fr-FR"
        display_name: "Créer un QR Code"
        description: "Générez un QR Code gratuitement en quelques secondes"
        llm_context: "USE: Contenu français pour création QR. TRIGGERS: fr-FR, création. NOT: Québec (utiliser fr-CA)."
        curation_status: "human_authored"
        definition: "Processus de génération d'un QR Code à partir de données."
        purpose: "Permettre aux utilisateurs de créer rapidement des QR Codes."
        benefits:
          - "Création en quelques secondes"
          - "Personnalisation complète"
          - "Téléchargement gratuit"
        version: 1

    ja_jp_qr_code:
      data:
        key: "entity:qr-code@ja-JP"
        entity_key: "qr-code"
        locale_key: "ja-JP"
        display_name: "QRコード"
        description: "スマートフォンでスキャンできる2次元マトリックスバーコード"
        llm_context: "USE: 日本語コンテンツ。TRIGGERS: ja-JP、スキャン。NOT: 中国語（zh-CN使用）。"
        curation_status: "human_authored"
        cultural_notes: "Use formal keigo for business contexts. QR Code invented by Denso Wave."
        version: 1
