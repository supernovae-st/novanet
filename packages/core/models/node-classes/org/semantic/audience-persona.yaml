# models/node-classes/org/semantic/audience-persona.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# AudiencePersona - Target audience archetype for content personalization

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: AudiencePersona
  realm: org
  layer: semantic
  trait: defined

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Target audience archetype for content personalization. Represents a specific user segment with defined characteristics, goals, and pain points."

  llm_context: |
    USE: when defining who the content is for, enabling persona-based generation.
    TRIGGERS: "persona", "audience", "user segment", "target user", "buyer persona".
    NOT: for actual users (use analytics), for demographics only (include psychographics).
    RELATES: Page (targeted via TARGETS_PERSONA), Brand (targets via TARGETS_PERSONA).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: user
    terminal: "◇"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      pattern: "^persona-[a-z0-9-]+$"
      description: "Unique identifier"
      example: "persona-startup-founder"

    display_name:
      type: string
      required: true
      description: "Human-readable persona name"
      example: "Startup Founder"

    description:
      type: string
      required: true
      description: "Detailed persona description"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    persona_type:
      type: string
      required: true
      enum:
        - decision_maker
        - influencer
        - end_user
        - technical_evaluator
        - budget_holder
      description: "Category of persona"
      example: "decision_maker"

    industry_focus:
      type: "string[]"
      required: false
      description: "Industries this persona typically belongs to"
      example: ["technology", "saas", "ecommerce"]

    company_size:
      type: string
      required: false
      enum:
        - solo
        - startup
        - smb
        - mid_market
        - enterprise
      example: "startup"

    pain_points:
      type: "string[]"
      required: true
      description: "Key challenges this persona faces"
      example: ["time constraints", "limited budget", "scaling challenges"]

    goals:
      type: "string[]"
      required: true
      description: "Primary objectives this persona wants to achieve"
      example: ["increase efficiency", "reduce costs", "automate workflows"]

    preferred_tone:
      type: string
      required: true
      enum:
        - professional
        - casual
        - technical
        - inspirational
        - direct
      description: "Communication style that resonates"
      example: "direct"

    content_preferences:
      type: "string[]"
      required: false
      description: "Types of content this persona engages with"
      example: ["case studies", "ROI calculators", "quick tutorials"]

    decision_factors:
      type: "string[]"
      required: false
      description: "Key factors influencing purchase/adoption decisions"
      example: ["price", "time to value", "integration ease"]

    objections:
      type: "string[]"
      required: false
      description: "Common objections or concerns"
      example: ["too expensive", "learning curve", "security concerns"]

    priority:
      type: int
      required: true
      description: "Priority for content creation (1=highest)"
      example: 1

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    incoming:
      - type: TARGETS_PERSONA
        from: Page
        description: "Pages targeted at this persona"

      - type: TARGETS_PERSONA
        from: Brand
        description: "Brand targeting this persona"

    outgoing: []

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX audiencepersona_type IF NOT EXISTS FOR (ap:AudiencePersona) ON (ap.persona_type)"
      - "CREATE INDEX audiencepersona_size IF NOT EXISTS FOR (ap:AudiencePersona) ON (ap.company_size)"
      - "CREATE INDEX audiencepersona_priority IF NOT EXISTS FOR (ap:AudiencePersona) ON (ap.priority)"

  example:
    data:
      key: "persona-startup-founder"
      display_name: "Startup Founder"
      description: "Early-stage startup founder building an MVP. Time-constrained, wears multiple hats, needs quick wins."
      persona_type: "decision_maker"
      industry_focus: ["technology", "saas"]
      company_size: "startup"
      pain_points: ["time constraints", "limited budget", "need to ship fast"]
      goals: ["launch MVP quickly", "automate repetitive tasks", "look professional"]
      preferred_tone: "direct"
      content_preferences: ["quick tutorials", "templates", "ROI examples"]
      decision_factors: ["price", "time to value", "ease of use"]
      objections: ["too complex", "overkill for our size"]
      priority: 1
    cypher: |
      CREATE (p:AudiencePersona {
        key: 'persona-startup-founder',
        display_name: 'Startup Founder',
        persona_type: 'decision_maker',
        preferred_tone: 'direct',
        priority: 1,
        created_at: datetime(),
        updated_at: datetime()
      })
