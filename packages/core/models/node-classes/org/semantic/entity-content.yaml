# models/node-classes/org/semantic/entity-content.yaml
# EntityContent - Localized content for Entity nodes (v10.9.0)
#
# ═══════════════════════════════════════════════════════════════════════════════
# v10.9.0 CHANGES (Naming Convention Refactor)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   RENAMED: EntityL10n → EntityContent
#   - Clearer semantics: this is CONTENT, not just "localization"
#   - Composite key pattern: entity:base-key@locale
#   - New properties: curation_status, slug_history, parent_slug, full_path, depth
#   - UTF-8 slug pattern (accented characters allowed)
#
# ═══════════════════════════════════════════════════════════════════════════════
# PURPOSE
# ═══════════════════════════════════════════════════════════════════════════════
#
# EntityContent provides locale-native content for a parent Entity. This is the
# LOCALIZED half of the Entity/EntityContent pair.
#
# ═══════════════════════════════════════════════════════════════════════════════
# ARCHITECTURE (Full Hierarchy)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   Tenant ──[:HAS_ENTITY]──> Entity (invariant)
#                                  │
#                                  └──[:HAS_CONTENT]──> EntityContent
#                                                            │
#                                                            ├──[:FOR_LOCALE]──> Locale
#                                                            │
#                                                            ├──[:TARGETS]──> SEOKeyword (N:N)
#                                                            │
#                                                            └──[:ANSWERS]──> SEOQuestion
#
# Entity: Invariant definition (EN key, universal properties)
# EntityContent: Locale-native content + SEO keywords for THAT locale
#
# ═══════════════════════════════════════════════════════════════════════════════
# KEY PRINCIPLE: Generation, NOT Translation
# ═══════════════════════════════════════════════════════════════════════════════
#
#   WRONG:  Entity(EN) → Translate → EntityContent(FR)
#   RIGHT:  Entity(invariant) → Generate natively → EntityContent(FR)
#
# EntityContent is GENERATED natively for each locale, not translated.
# This preserves cultural nuance and locale-specific expressions.
#
# ═══════════════════════════════════════════════════════════════════════════════

node:
  name: EntityContent
  realm: org
  layer: semantic
  trait: authored
  icon:
    web: "circle-check"
    terminal: "●"
  description: "Locale-native content for an Entity"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    # ─────────────────────────────────────────────────────────────────────────────
    # COMPOSITE KEY (v10.9.0)
    # ─────────────────────────────────────────────────────────────────────────────
    key:
      type: string
      required: true
      pattern: "^entity:[a-z][a-z0-9-]*@[a-z]{2}-[A-Z]{2}$"
      description: "Composite key: entity:{base_key}@{locale_key}"
      examples:
        - "entity:create-qr-code@fr-FR"
        - "entity:qr-code-wifi@ja-JP"
        - "entity:dynamic-qr-code@de-DE"

    # ─────────────────────────────────────────────────────────────────────────────
    # IDENTITY PROPERTIES (denormalized for fast lookup)
    # ─────────────────────────────────────────────────────────────────────────────
    entity_key:
      type: string
      required: true
      pattern: "^[a-z][a-z0-9-]*$"
      indexed: true
      description: "Parent Entity key (denormalized)"
      examples:
        - "create-qr-code"
        - "qr-code-wifi"
        - "dynamic-qr-code"

    locale_key:
      type: string
      required: true
      pattern: "^[a-z]{2}-[A-Z]{2}$"
      indexed: true
      description: "Target Locale key (denormalized). BCP 47 format."
      examples:
        - "fr-FR"
        - "en-US"
        - "ja-JP"

    # ─────────────────────────────────────────────────────────────────────────────
    # URL/ROUTING (v10.9.0)
    # ─────────────────────────────────────────────────────────────────────────────
    slug:
      type: string
      required: true
      pattern: "^[\\p{Ll}\\p{N}\\-]+$"  # UTF-8: Unicode lowercase + numbers + hyphens
      indexed: true
      unique_with: locale_key  # UNIQUE(locale_key, slug)
      description: "URL-safe localized identifier (UTF-8 allowed)"
      examples:
        - "créer-qr-code"        # fr-FR (with accent)
        - "qr-code-wifi"         # same in many locales
        - "qr-code-dynamique"    # fr-FR

    full_path:
      type: string
      required: true
      indexed: true
      description: "Denormalized full URL path from root (O(1) lookup)"
      examples:
        - "/fr/créer-qr-code"
        - "/fr/blog/qr-code-restaurant"
        - "/ja/qrコード"

    parent_slug:
      type: string
      required: false
      description: "Parent EntityContent slug (null if root)"
      examples:
        - "blog"
        - "features"

    depth:
      type: int
      required: true
      description: "Hierarchy depth (0 = root, max 3)"
      examples:
        - 0  # /fr/créer-qr-code
        - 1  # /fr/blog/article
        - 2  # /fr/blog/category/article

    slug_history:
      type: "string[]"
      required: false
      description: "Previous slugs for redirect support"
      examples:
        - '["creer-qr-code", "creer-code-qr"]'

    # ─────────────────────────────────────────────────────────────────────────────
    # CONTENT PROPERTIES
    # ─────────────────────────────────────────────────────────────────────────────
    display_name:
      type: string
      required: true
      description: "Localized display name"

    description:
      type: string
      required: true
      description: "Localized short description"

    llm_context:
      type: string
      required: true
      description: |
        Format: USE: [when]. TRIGGERS: [locale keywords]. NOT: [disambiguation]. RELATES: [connections].
        Example: USE: when loading localized entity data for content generation. TRIGGERS: "entity content", "localized entity", locale code. NOT: for invariant entity definition (use Entity). RELATES: Entity (parent via HAS_CONTENT), Locale (target via FOR_LOCALE), SEOKeyword (targets via TARGETS).

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # VECTOR EMBEDDING
  # ═══════════════════════════════════════════════════════════════════════════════

  embedding_properties:
    embedding:
      type: vector
      dimensions: 1536
      required: false

    embedding_source:
      type: string
      required: false

    embedding_updated_at:
      type: datetime
      required: false

  # ═══════════════════════════════════════════════════════════════════════════════
  # ENTITYCONTENT-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    # ─────────────────────────────────────────────────────────────────────────────
    # CURATION STATUS (v10.9.0)
    # ─────────────────────────────────────────────────────────────────────────────
    curation_status:
      type: string
      required: true
      enum:
        - "human_authored"        # Tier 1: Native expert wrote it
        - "machine_translated"    # Tier 2: DeepL/Google Translate
        - "ai_generated"          # Tier 3: LLM generated
        - "ai_generated_reviewed" # Tier 3+: LLM + human review
      description: "Content origin and quality tier"

    # ─────────────────────────────────────────────────────────────────────────────
    # PUBLICATION STATUS (v11.2)
    # ─────────────────────────────────────────────────────────────────────────────
    status:
      type: string
      required: false
      default: "draft"
      enum: ["draft", "reviewed", "published"]
      description: "Publication workflow status"
      llm_context: "Content lifecycle stage - draft (not reviewed), reviewed (human validated), published (live)"

    # ─────────────────────────────────────────────────────────────────────────────
    # CONTENT PROPERTIES
    # ─────────────────────────────────────────────────────────────────────────────
    definition:
      type: string
      required: false
      description: "What it is - localized definition"

    purpose:
      type: string
      required: false
      description: "Why it exists - localized purpose"

    benefits:
      type: string[]
      required: false
      description: "Value propositions in target locale"

    usage_examples:
      type: string[]
      required: false
      description: "Locale-native usage examples"

    audience_segment:
      type: string
      required: false
      description: "Target audience for this locale variant"
      enum:
        - professional
        - consumer
        - developer
        - enterprise

    cultural_notes:
      type: string
      required: false
      description: "Locale-specific cultural considerations"

    # ─────────────────────────────────────────────────────────────────────────────
    # VERSIONING
    # ─────────────────────────────────────────────────────────────────────────────
    version:
      type: int
      required: true
      description: "Content version for staleness detection"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    FOR_LOCALE:
      to: Locale
      cardinality: "N:1"
      description: "Links to the locale this content is for"

    TARGETS:
      to: SEOKeyword
      cardinality: "N:N"
      description: "SEO keywords this localized entity is targeting for ranking"

  incoming_relations:
    HAS_CONTENT:
      from: Entity
      cardinality: "1:N"
      description: "Parent entity that owns this content"

  # ═══════════════════════════════════════════════════════════════════════════════
  # NEO4J CONFIGURATION (v10.9.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  neo4j:
    constraints:
      - "CREATE CONSTRAINT entity_content_key IF NOT EXISTS FOR (ec:EntityContent) REQUIRE ec.key IS UNIQUE"
      - "CREATE CONSTRAINT entity_content_slug_unique IF NOT EXISTS FOR (ec:EntityContent) REQUIRE (ec.locale_key, ec.slug) IS UNIQUE"

    indexes:
      - "CREATE INDEX entity_content_entity_key IF NOT EXISTS FOR (ec:EntityContent) ON (ec.entity_key)"
      - "CREATE INDEX entity_content_locale_key IF NOT EXISTS FOR (ec:EntityContent) ON (ec.locale_key)"
      - "CREATE INDEX entity_content_full_path IF NOT EXISTS FOR (ec:EntityContent) ON (ec.full_path)"
      - "CREATE INDEX entity_content_slug IF NOT EXISTS FOR (ec:EntityContent) ON (ec.slug)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLES
  # ═══════════════════════════════════════════════════════════════════════════════

  examples:
    fr_fr_create_qr:
      data:
        key: "entity:create-qr-code@fr-FR"
        entity_key: "create-qr-code"
        locale_key: "fr-FR"
        slug: "créer-qr-code"  # UTF-8 with accent
        full_path: "/fr/créer-qr-code"
        parent_slug: null
        depth: 0
        display_name: "Créer un QR Code"
        description: "Générez un QR Code gratuitement en quelques secondes"
        llm_context: "USE: Contenu français pour création QR. TRIGGERS: fr-FR, création. NOT: Québec (utiliser fr-CA)."
        curation_status: "human_authored"
        definition: "Processus de génération d'un QR Code à partir de données."
        purpose: "Permettre aux utilisateurs de créer rapidement des QR Codes."
        benefits:
          - "Création en quelques secondes"
          - "Personnalisation complète"
          - "Téléchargement gratuit"
        version: 1

    ja_jp_qr_code:
      data:
        key: "entity:qr-code@ja-JP"
        entity_key: "qr-code"
        locale_key: "ja-JP"
        slug: "qr-code"
        full_path: "/ja/qr-code"
        parent_slug: null
        depth: 0
        display_name: "QRコード"
        description: "スマートフォンでスキャンできる2次元マトリックスバーコード"
        llm_context: "USE: 日本語コンテンツ。TRIGGERS: ja-JP、スキャン。NOT: 中国語（zh-CN使用）。"
        curation_status: "human_authored"
        cultural_notes: "Use formal keigo for business contexts. QR Code invented by Denso Wave."
        version: 1
