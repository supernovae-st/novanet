# models/node-classes/org/semantic/channel-surface.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# ChannelSurface - Distribution channel or surface where content is published

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: ChannelSurface
  realm: org
  layer: semantic
  trait: defined

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Distribution channel or surface where content is published. Represents a specific platform, medium, or touchpoint with its own constraints and best practices."

  llm_context: |
    USE: when defining where content will be distributed, enabling channel-optimized generation.
    TRIGGERS: "channel", "platform", "distribution", "surface", "touchpoint".
    NOT: for content itself (use Page/Block), for analytics (use external tools).
    RELATES: Page (optimized for via FOR_CHANNEL).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: radio
    terminal: "◎"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      pattern: "^channel-[a-z0-9-]+$"
      description: "Unique identifier"
      example: "channel-website-landing"

    display_name:
      type: string
      required: true
      description: "Human-readable channel name"
      example: "Website Landing Page"

    description:
      type: string
      required: true
      description: "Channel description and purpose"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    channel_type:
      type: string
      required: true
      enum:
        - website
        - email
        - social
        - search
        - app
        - print
        - video
        - podcast
        - chat
      description: "Category of channel"
      example: "website"

    platform:
      type: string
      required: false
      description: "Specific platform if applicable"
      example: "google_ads"

    content_format:
      type: string
      required: true
      enum:
        - long_form
        - short_form
        - visual
        - audio
        - interactive
        - structured
      description: "Primary content format"
      example: "long_form"

    max_length:
      type: int
      required: false
      description: "Maximum content length (characters or words)"
      example: 5000

    tone_requirements:
      type: "string[]"
      required: false
      description: "Tone characteristics required for this channel"
      example: ["professional", "persuasive", "scannable"]

    seo_relevant:
      type: boolean
      required: true
      description: "Whether SEO optimization applies"
      example: true

    supports_rich_media:
      type: boolean
      required: true
      description: "Whether channel supports images, videos, etc."
      example: true

    conversion_focused:
      type: boolean
      required: true
      description: "Whether primary goal is conversion vs awareness"
      example: true

    mobile_primary:
      type: boolean
      required: false
      description: "Whether mobile is the primary consumption device"
      example: false

    update_frequency:
      type: string
      required: false
      enum:
        - realtime
        - daily
        - weekly
        - monthly
        - quarterly
        - static
      description: "How often content is typically updated"
      example: "monthly"

    priority:
      type: int
      required: true
      description: "Priority for content creation (1=highest)"
      example: 1

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    incoming:
      - type: FOR_CHANNEL
        from: Page
        description: "Pages optimized for this channel"

    outgoing: []

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX channelsurface_type IF NOT EXISTS FOR (cs:ChannelSurface) ON (cs.channel_type)"
      - "CREATE INDEX channelsurface_format IF NOT EXISTS FOR (cs:ChannelSurface) ON (cs.content_format)"
      - "CREATE INDEX channelsurface_priority IF NOT EXISTS FOR (cs:ChannelSurface) ON (cs.priority)"

  example:
    data:
      key: "channel-website-landing"
      display_name: "Website Landing Page"
      description: "Primary conversion-focused landing pages on the main website"
      channel_type: "website"
      content_format: "long_form"
      max_length: 5000
      tone_requirements: ["professional", "persuasive", "benefit-focused"]
      seo_relevant: true
      supports_rich_media: true
      conversion_focused: true
      mobile_primary: false
      update_frequency: "monthly"
      priority: 1
    cypher: |
      CREATE (c:ChannelSurface {
        key: 'channel-website-landing',
        display_name: 'Website Landing Page',
        channel_type: 'website',
        content_format: 'long_form',
        seo_relevant: true,
        priority: 1,
        created_at: datetime(),
        updated_at: datetime()
      })
