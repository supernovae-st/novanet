# models/node-classes/org/semantic/entity.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# Entity - Semantic unit representing products, features, concepts, and actions

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: Entity
  realm: org
  layer: semantic
  trait: defined

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Semantic unit representing products, features, concepts, actions, and tools. Core building block for knowledge graphs."

  llm_context: |
    USE: when loading semantic context for content generation or understanding relationships.
    TRIGGERS: "entity", "semantic", "concept", "product", "feature", "action".
    NOT: for localized content (use EntityNative), for page structure (use Page).
    RELATES: Project (owner via HAS_ENTITY), EntityNative (localized via HAS_NATIVE), EntityCategory (type via BELONGS_TO), Page (canonical via REPRESENTED_BY).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: diamond
    terminal: "◆"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      pattern: "^[a-z][a-z0-9-]*$"
      description: "Unique identifier (kebab-case)"
      examples:
        - "qr-code"
        - "smart-link"
        - "create-qr-code"

    display_name:
      type: string
      required: true
      description: "Human-readable label (English, Title Case)"
      examples:
        - "QR Code"
        - "Smart Link"
        - "Create QR Code"

    description:
      type: string
      required: true
      description: "What this entity IS (1-3 sentences, technical accuracy)"
      examples:
        - "Two-dimensional barcode that encodes data in a scannable visual pattern."
        - "AI-generated artistic QR code where pattern is fused into artwork."

    entity_summary:
      type: string
      required: false
      description: "2-3 sentence prose summary for LLM reasoning context (GraphRAG)"
      example: "A QR Code is a two-dimensional barcode that encodes data in a scannable visual pattern. It is the core product of QR Code AI."

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ─────────────────────────────────────────────────────────────────────────────
  # VECTOR EMBEDDING (Hybrid OntologyRAG)
  # ─────────────────────────────────────────────────────────────────────────────
  embedding_properties:
    embedding:
      type: vector
      dimensions: 1536
      required: false
      description: "OpenAI text-embedding-3-small vector for semantic search"

    embedding_source:
      type: string
      required: false

    embedding_updated_at:
      type: datetime
      required: false

  # ─────────────────────────────────────────────────────────────────────────────
  # ENTITY-SPECIFIC PROPERTIES
  # ─────────────────────────────────────────────────────────────────────────────
  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    is_pillar:
      type: boolean
      required: false
      default: false
      description: "Top-level entity that anchors content clusters (2-5 per project)"

    schema_org_type:
      type: string
      required: false
      description: "Schema.org type for SEO JSON-LD"
      examples:
        - "SoftwareApplication"
        - "Product"
        - "HowTo"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: HAS_NATIVE
        to: EntityNative
        cardinality: "1:N"
        description: "Native content for this entity (one per locale)"

      - type: BELONGS_TO
        to: EntityCategory
        cardinality: "N:1"
        scope: cross_realm
        description: "Semantic category this entity belongs to"

      - type: HAS_CHILD
        to: Entity
        cardinality: "N:N"
        description: "Child entities forming URL hierarchy (max depth 3)"
        props:
          position:
            type: int
            description: "Sort order among siblings"
          visibility:
            type: string
            enum: [public, draft, internal]
          featured:
            type: boolean

      - type: SUBTOPIC_OF
        to: Entity
        cardinality: "N:1"
        description: "Parent entity in pillar/cluster hierarchy"
        props:
          depth:
            type: int
            description: "Hierarchy depth from pillar"

      - type: SEMANTIC_LINK
        to: Entity
        cardinality: "N:N"
        description: "Spreading activation links to related entities"
        props:
          temperature:
            type: float
            min: 0.0
            max: 1.0
            description: "Activation strength"
          link_type:
            type: string
            enum:
              - type_of
              - variant_of
              - includes
              - requires
              - enables
              - exhibits
              - contrasts
              - is_action_on
              - used_for
              - part_of
              - related_to
              - same_as

      - type: POPULAR_IN
        to: [GeoRegion, GeoSubRegion, Continent]
        cardinality: "N:N"
        scope: cross_realm
        description: "Geographic regions where this entity is popular"
        props:
          weight:
            type: float
            min: 0.0
            max: 1.0
            default: 0.8

      - type: HAS_KEYWORD
        to: SEOKeyword
        cardinality: "1:N"
        scope: cross_realm
        description: "SEO keywords for this entity"

      - type: REPRESENTED_BY
        to: Page
        cardinality: "1:1"
        description: "Canonical Page representing this entity (inverse of REPRESENTS)"

    incoming:
      - type: HAS_ENTITY
        from: Project
        cardinality: "1:N"
        description: "Project that owns this entity"

      - type: REPRESENTS
        from: Page
        cardinality: "1:1"
        description: "Page that represents this entity (mandatory 1:1)"

      - type: REFERENCES
        from: Block
        cardinality: "N:N"
        description: "Blocks that reference this entity"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX entity_key IF NOT EXISTS FOR (e:Entity) ON (e.key)"
      - "CREATE INDEX entity_pillar IF NOT EXISTS FOR (e:Entity) ON (e.is_pillar)"

  example:
    data:
      key: "qr-code"
      display_name: "QR Code"
      description: "Two-dimensional barcode that encodes data in a scannable visual pattern."
      entity_summary: "A QR Code is a two-dimensional barcode. It is the core product of QR Code AI."
      is_pillar: true
    cypher: |
      MATCH (p:Project)-[:HAS_ENTITY]->(e:Entity {key: $key})
      OPTIONAL MATCH (e)-[:HAS_NATIVE]->(ec:EntityNative)-[:FOR_LOCALE]->(l:Locale)
      RETURN e, collect({locale: l.key, title: ec.display_name}) AS content
