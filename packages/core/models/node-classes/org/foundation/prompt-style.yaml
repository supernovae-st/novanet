# models/node-classes/org/foundation/prompt-style.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# PromptStyle - LLM generation style hints (ADR-028)
# Can be locale or region specific for cultural adaptation

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: PromptStyle
  realm: org
  layer: foundation
  trait: defined

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "LLM prompt style hints - can be locale or region specific"

  llm_context: |
    USE: when generating locale-specific or culturally-adapted content.
    TRIGGERS: "prompt style", "locale style", "cultural adaptation", "regional variation", "@prompt:".
    NOT: for brand identity (use Brand), for design system (use BrandDesign), for voice guidelines (use BrandPrinciples).
    RELATES: Brand (owner via HAS_PROMPT_STYLE), GeoRegion (inspiration via INSPIRED_BY_REGION), Locale (target via FOR_LOCALE).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: sparkles
    terminal: "✦"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      description: "Style identifier. Format: style-{brand}-{locale|region}"
      pattern: "^style-[a-z0-9-]+$"
      example: "style-qrcodeai-fr-fr"

    display_name:
      type: string
      required: true
      description: "Style name"
      example: "QR Code AI French Style"

    description:
      type: string
      required: true
      description: "Style description"

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    # ─────────────────────────────────────────────────────────────────────────────
    # Visual Style (for image generation)
    # ─────────────────────────────────────────────────────────────────────────────
    style_keywords:
      type: string[]
      required: true
      description: "Keywords describing the visual style"
      example: ["modern", "minimal", "tech-forward", "friendly"]

    style_mood:
      type: string
      required: false
      description: "Overall mood description"
      example: "Professional yet approachable"

    style_influences:
      type: string[]
      required: false
      description: "Visual influences"
      example: ["Apple", "Stripe", "Linear"]

    # ─────────────────────────────────────────────────────────────────────────────
    # Image Generation
    # ─────────────────────────────────────────────────────────────────────────────
    image_style:
      type: string
      required: false
      description: "Style description for image generation prompts"
      example: "flat illustration, soft gradients, geometric shapes"

    image_do:
      type: string[]
      required: false
      description: "What TO do in images"
      example: ["Use brand colors", "Include tech elements"]

    image_dont:
      type: string[]
      required: false
      description: "What NOT to do in images"
      example: ["No stock photos", "No cluttered compositions"]

    photo_style:
      type: string
      required: false
      description: "Photography style guidelines"
      example: "Bright, natural lighting, diverse people"

    # ─────────────────────────────────────────────────────────────────────────────
    # Cultural Adaptation
    # ─────────────────────────────────────────────────────────────────────────────
    cultural_style:
      type: string
      required: false
      description: "Cultural style hints for this locale/region"
      example: "Sophisticated, formal, literary references welcome"

    visual_prompt:
      type: string
      required: false
      description: "Visual prompt prefix for image generation"
      example: "French elegance, Haussmannian architecture, cafe culture"

    formality_level:
      type: string
      required: false
      enum: [formal, neutral, casual]
      description: "Formality level for this market"

    humor_style:
      type: string
      required: false
      description: "Type of humor appropriate for this market"
      example: "Witty wordplay, subtle irony"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    INSPIRED_BY_REGION:
      target: GeoRegion
      cardinality: many_to_one
      description: "Geographic region inspiring this style"

    FOR_LOCALE:
      target: Locale
      cardinality: many_to_one
      description: "Specific locale this style applies to"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example)
  # ═══════════════════════════════════════════════════════════════════════════════
  example:
    data:
      key: "style-qrcodeai-fr-fr"
      display_name: "QR Code AI French Style"
      description: "LLM style hints for French market"
      style_keywords: ["elegant", "refined", "sophisticated"]
      style_mood: "Elegant and professional"
      cultural_style: "Sophisticated, formal, literary references welcome"
      visual_prompt: "French elegance, Haussmannian architecture"
      formality_level: "formal"
      humor_style: "Witty wordplay, subtle irony"

    cypher: |
      // Get prompt style for a locale
      MATCH (b:Brand {key: $brand})-[:HAS_PROMPT_STYLE]->(s:PromptStyle)
      WHERE (s)-[:FOR_LOCALE]->(:Locale {key: $locale})
      RETURN s

      // Get style inspired by region
      MATCH (s:PromptStyle)-[:INSPIRED_BY_REGION]->(r:GeoRegion {key: $region})
      RETURN s
