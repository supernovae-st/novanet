# models/node-classes/org/foundation/brand-design.yaml
# BrandDesign - Visual design system (ADR-028)
# Colors, typography, UI patterns - universal across locales

node:
  name: BrandDesign
  realm: org
  layer: foundation
  trait: defined
  description: "Visual design system - colors, typography, and UI patterns"

  # =============================================================================
  # STANDARD PROPERTIES
  # =============================================================================

  standard_properties:
    key:
      type: string
      required: true
      description: "Design system identifier. Format: design-{brand}"
      pattern: "^design-[a-z0-9-]+$"
      example: "design-qrcodeai"

    display_name:
      type: string
      required: true
      description: "Design system name"
      example: "QR Code AI Design System"

    description:
      type: string
      required: true
      description: "Design system overview"

    llm_context:
      type: string
      required: true
      description: "LLM context for visual consistency. Format: 'USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]. RELATES: [connections].'"
      example: |
        USE: when generating images, selecting colors, or applying visual styling.
        TRIGGERS: "design system", "colors", "typography", "visual style", "UI patterns", "@brand.design".
        NOT: for brand voice/messaging (use BrandPrinciples), for brand identity (use Brand), for locale-specific visuals (use PromptStyle).
        RELATES: Brand (owner via HAS_DESIGN).

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # =============================================================================
  # DESIGN-SPECIFIC PROPERTIES
  # =============================================================================

  properties:
    # ─────────────────────────────────────────────────────────────────────────────
    # Color Palette
    # ─────────────────────────────────────────────────────────────────────────────
    color_primary:
      type: string
      required: true
      description: "Main brand color (hex)"
      example: "#6366F1"

    color_secondary:
      type: string
      required: false
      description: "Secondary brand color (hex)"
      example: "#EC4899"

    color_accent:
      type: string
      required: false
      description: "Accent color (hex)"
      example: "#10B981"

    color_background:
      type: string
      required: false
      description: "Background color (hex)"
      example: "#FFFFFF"

    color_text:
      type: string
      required: false
      description: "Primary text color (hex)"
      example: "#1F2937"

    color_palette:
      type: json
      required: false
      description: "Full color palette with usage guidelines"
      example:
        - { name: "Indigo 500", hex: "#6366F1", usage: "Primary buttons, links" }
        - { name: "Pink 500", hex: "#EC4899", usage: "Accents, highlights" }

    # ─────────────────────────────────────────────────────────────────────────────
    # Typography
    # ─────────────────────────────────────────────────────────────────────────────
    font_primary:
      type: string
      required: true
      description: "Primary font family"
      example: "Inter"

    font_secondary:
      type: string
      required: false
      description: "Secondary font family"
      example: "Space Grotesk"

    font_mono:
      type: string
      required: false
      description: "Monospace font for code"
      example: "JetBrains Mono"

    typography_scale:
      type: json
      required: false
      description: "Font size scale"

    # ─────────────────────────────────────────────────────────────────────────────
    # UI Patterns
    # ─────────────────────────────────────────────────────────────────────────────
    border_radius:
      type: string
      required: false
      description: "Default border radius"
      example: "12px"

    shadow_style:
      type: string
      required: false
      enum: [subtle, pronounced, none]
      description: "Shadow style preference"

    animation_style:
      type: string
      required: false
      enum: [smooth, snappy, playful]
      description: "Animation style preference"

    spacing_scale:
      type: json
      required: false
      description: "Spacing scale (4px grid)"

  # =============================================================================
  # RELATIONS
  # =============================================================================

  relations: {}
    # BrandDesign is owned by Brand via HAS_DESIGN (incoming)

  # =============================================================================
  # EXAMPLE
  # =============================================================================

  example:
    data:
      key: "design-qrcodeai"
      display_name: "QR Code AI Design System"
      description: "Visual design system for QR Code AI"
      llm_context: "USE: for image generation. TRIGGERS: colors, visuals. NOT: copywriting."
      color_primary: "#6366F1"
      color_secondary: "#EC4899"
      color_accent: "#10B981"
      font_primary: "Inter"
      font_secondary: "Space Grotesk"
      border_radius: "12px"
      shadow_style: "subtle"
      animation_style: "smooth"

    cypher: |
      // Get design system for a brand
      MATCH (b:Brand {key: $brand})-[:HAS_DESIGN]->(d:BrandDesign)
      RETURN d
