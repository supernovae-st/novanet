# models/node-classes/org/foundation/brand.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# Brand - Central brand identity node (ADR-028)
# v0.12.4: Replaces BrandIdentity, delegates to BrandDesign, BrandPrinciples, PromptStyle

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: Brand
  realm: org
  layer: foundation
  trait: defined

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Central brand identity - owns design, principles, and prompt style"

  llm_context: |
    USE: when loading brand context for content generation or enforcing brand consistency.
    TRIGGERS: "brand", "brand voice", "brand identity", "brand context", "@brand".
    NOT: for visual design specifics (use BrandDesign), for voice guidelines (use BrandPrinciples), for locale-specific prompts (use PromptStyle).
    RELATES: Project (owner via HAS_BRAND), BrandDesign (visuals via HAS_DESIGN), BrandPrinciples (voice via HAS_PRINCIPLES), PromptStyle (AI styles via HAS_PROMPT_STYLE), AudiencePersona (targets via TARGETS_PERSONA).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: badge
    terminal: "◆"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      description: "Brand identifier. Format: brand-{identifier}"
      pattern: "^brand-[a-z0-9-]+$"
      example: "brand-qrcodeai"

    display_name:
      type: string
      required: true
      description: "Brand name"
      example: "QR Code AI"

    description:
      type: string
      required: true
      description: "Brand positioning statement"
      example: "AI-powered QR code generation platform"

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    # Core Identity
    brand_name:
      type: string
      required: true
      description: "Official brand name"
      example: "QR Code AI"

    tagline:
      type: string
      required: false
      description: "Brand tagline/slogan"
      example: "Create beautiful QR codes in seconds"

    brand_story:
      type: string
      required: false
      description: "Brand origin story or narrative"

    # Logo & Assets
    logo_primary_url:
      type: string
      required: false
      description: "URL to primary logo"

    logo_icon_url:
      type: string
      required: false
      description: "URL to icon/favicon"

    logo_usage_rules:
      type: string[]
      required: false
      description: "Logo usage guidelines"
      example: ["Minimum size 32px", "Clear space = logo height"]

    # Market Position
    target_market:
      type: string
      required: false
      description: "Primary target market segment"
      example: "Small businesses and marketers"

    value_proposition:
      type: string
      required: false
      description: "Core value proposition"
      example: "Fastest way to create professional QR codes"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations, incoming_relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    HAS_DESIGN:
      target: BrandDesign
      cardinality: one_to_one
      description: "Visual design system (colors, typography, UI)"

    HAS_PRINCIPLES:
      target: BrandPrinciples
      cardinality: one_to_one
      description: "Brand guidelines and voice principles"

    HAS_PROMPT_STYLE:
      target: PromptStyle
      cardinality: one_to_many
      description: "LLM prompt styles (locale/region specific)"

    TARGETS_PERSONA:
      target: AudiencePersona
      cardinality: one_to_many
      description: "Target audience personas"

    FOR_MARKET:
      target: Market
      cardinality: one_to_many
      description: "Target markets"

  incoming_relations:
    HAS_BRAND:
      from: Project
      cardinality: "1:1"
      description: "Project that owns this brand"

    BRAND_OF:
      from: Project
      cardinality: "1:1"
      description: "Inverse of HAS_BRAND (query helper)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example)
  # ═══════════════════════════════════════════════════════════════════════════════
  example:
    data:
      key: "brand-qrcodeai"
      display_name: "QR Code AI"
      description: "AI-powered QR code generation platform"
      brand_name: "QR Code AI"
      tagline: "Create beautiful QR codes in seconds"
      target_market: "Small businesses and marketers"
      value_proposition: "Fastest way to create professional QR codes"

    cypher: |
      // Get complete brand context
      MATCH (b:Brand {key: $brand})
      OPTIONAL MATCH (b)-[:HAS_DESIGN]->(d:BrandDesign)
      OPTIONAL MATCH (b)-[:HAS_PRINCIPLES]->(p:BrandPrinciples)
      OPTIONAL MATCH (b)-[:HAS_PROMPT_STYLE]->(s:PromptStyle)
      RETURN b, d, p, collect(s) AS styles
