# models/node-classes/org/instruction/block-type.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# BlockType - Template rules and structure for block generation

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: BlockType
  realm: org
  layer: instruction
  trait: defined

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "A reusable template or 'mold' that defines the expected JSON structure and validation rules for a category of blocks (e.g., 'hero', 'faq'). This is the central schema for a given type of block."

  llm_context: |
    USE: when validating block structure or selecting a template for new blocks.
    TRIGGERS: "block type", "block template", "block schema", "hero", "faq", "pricing-table".
    NOT: for block instances (use Block), for generation instructions (use BlockInstruction), for generated content (use BlockNative).
    RELATES: Block (instances via OF_TYPE), BlockRules (validation via HAS_RULES), BlockInstruction (instructions via OF_TYPE).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: component
    terminal: "▦"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier for the block template."
      pattern: "^[a-z0-9-]+$"
      examples:
        - "hero-v1"
        - "faq-accordion"
        - "pricing-table"
        - "testimonials-slider"

    display_name:
      type: string
      required: true
      description: "Human-readable UI name for the block type."
      example: "Hero Section v1"

    description:
      type: string
      required: true
      description: "One-line description of the block type's purpose and structure."
      example: "A full-width hero with a title, subtitle, and a primary CTA button."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    category:
      type: string
      required: true
      enum: [header, body, footer, sidebar]
      description: "General layout category where this block type is typically used."
      example: "header"

    structure:
      type: string
      required: true
      description: "Defines the expected JSON shape of the `generated` property on the `BlockNative` node. This ensures all generated content for this block type is consistent. Can be a reference to a JSON schema file."
      example: "schemas/hero-v1.json"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: HAS_RULES
        to: BlockRules
        cardinality: "1:N"
        description: "Links to a reusable and versionable set of validation rules (BlockRules)."

    incoming:
      - type: OF_TYPE
        from: Block
        cardinality: "N:1"
        description: "Block instances of this type."

      - type: OF_TYPE
        from: BlockInstruction
        cardinality: "N:1"
        description: "Instructions for this block type."

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX blocktype_key IF NOT EXISTS FOR (bt:BlockType) ON (bt.key)"
      - "CREATE INDEX blocktype_category IF NOT EXISTS FOR (bt:BlockType) ON (bt.category)"

  example:
    data:
      key: "blocktype-hero"
      display_name: "Hero Section"
      description: "Full-width hero with title, subtitle, and CTA"
      category: "header"
      structure: "schemas/hero.json"

    cypher: |
      // Get block type with active rules
      MATCH (bt:BlockType {key: $key})
      OPTIONAL MATCH (bt)-[:HAS_RULES]->(br:BlockRules {active: true})
      RETURN bt, br.rules AS active_rules, br.version AS rules_version

      // Get all blocks of this type
      MATCH (bt:BlockType {key: $key})<-[:OF_TYPE]-(b:Block)
      RETURN bt, collect(b.key) AS blocks
