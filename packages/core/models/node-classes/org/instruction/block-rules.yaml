# models/node-classes/org/instruction/block-rules.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# BlockRules - Template generation rules for BlockType (keyless satellite)

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: BlockRules
  realm: org
  layer: instruction
  trait: defined

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Defines a reusable and versionable set of generation constraints. Separating rules from BlockType allows them to be shared across multiple block types and enables powerful patterns like versioning (v1.0, v1.1) and A/B testing of different rule sets."

  llm_context: |
    USE: when validating or applying generation constraints to a block.
    TRIGGERS: "block rules", "generation constraints", "validation rules", "A/B testing rules".
    NOT: for block structure (use BlockType), for block instances (use Block), for generated content (use BlockNative).
    RELATES: BlockType (owner via HAS_RULES).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: "circle"
    terminal: "●"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  # NOTE: BlockRules is a KEYLESS satellite node - identified by HAS_RULES relation
  standard_properties:
    display_name:
      type: string
      required: true
      description: "Versioned display name for this rule set."
      example: "Standard Text Rules v1.1"

    description:
      type: string
      required: true
      description: "Short description of what these rules validate."
      example: "Validates title (max 80 chars) and subtitle (max 150 chars)."

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    rules:
      type: string
      required: true
      description: "The set of business logic constraints for an LLM, often expressed in a structured format like Gherkin or plain text."
      example: "Title: action-oriented, max 8 words. Subtitle: explains value proposition, max 15 words. CTA: single, clear action."

    version:
      type: string
      required: true
      description: "Semver format for versioning"
      example: "1.0"

    active:
      type: boolean
      required: true
      default: false
      description: "Indicates if this is the current active version of the rules for a given BlockType. Enables safe rollouts and A/B testing."

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    incoming:
      - type: HAS_RULES
        from: BlockType
        description: "BlockType that uses this set of rules."

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX blockrules_active IF NOT EXISTS FOR (br:BlockRules) ON (br.active)"
      - "CREATE INDEX blockrules_version IF NOT EXISTS FOR (br:BlockRules) ON (br.version)"

  example:
    data:
      display_name: "Hero Rules v1.0"
      description: "Generation rules for hero block type"
      rules: "Title: action verb, max 8 words. Subtitle: value prop, max 15 words. CTA: urgency, single action."
      version: "1.0"
      active: true

    cypher: |
      // Get active rules for a block type
      MATCH (bt:BlockType {key: $key})-[:HAS_RULES]->(br:BlockRules {active: true})
      RETURN br
