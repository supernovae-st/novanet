# models/node-classes/org/instruction/prompt-artifact.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# PromptArtifact - Compiled prompt with all context resolved

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: PromptArtifact
  realm: org
  layer: instruction
  trait: generated  # v11.2: Split derived → generated (LLM output)

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Compiled prompt artifact with all context resolved. Immutable snapshot of prompt state. Contains the full prompt text with all entity, voice, and culture injections."

  llm_context: |
    USE: when tracking prompt versions, auditing what was sent to LLM.
    TRIGGERS: "compiled prompt", "prompt artifact", "prompt snapshot", "prompt audit".
    NOT: for raw templates (use PageInstruction/BlockInstruction), for generated content (use PageNative).
    RELATES: PageInstruction/BlockInstruction (COMPILED_FROM), Entity (INCLUDES_ENTITY), Style (INCLUDES_STYLE).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: "clipboard"
    terminal: "▤"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      description: "Artifact identifier"
      pattern: "^promptartifact-[a-z0-9-]+-v[0-9]+$"
      example: "promptartifact-page-pricing-v1"

    display_name:
      type: string
      required: true
      description: "Semantic prompt name"
      example: "Page Pricing Prompt v1"

    description:
      type: string
      required: false

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    compiled_prompt:
      type: string
      required: true
      description: "Full compiled prompt text with all inclusions resolved"

    base_prompt_key:
      type: string
      required: true
      description: "Key of the base prompt this was compiled from"

    base_prompt_version:
      type: string
      required: true
      description: "Version of base prompt used"
      example: "1.0"

    includes_concepts:
      type: boolean
      required: true
      description: "Whether prompt includes concept injections"

    includes_voice:
      type: boolean
      required: true
      description: "Whether prompt includes locale voice parameters"

    includes_culture:
      type: boolean
      required: true
      description: "Whether prompt includes cultural context"

    token_count:
      type: int
      required: false
      description: "Estimated token count of compiled prompt"

    compiled_at:
      type: datetime
      required: true

    compiler_version:
      type: string
      required: true
      description: "Version of the prompt compiler"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: COMPILED_FROM
        to:  # v11.8 ADR-025: *Prompt → *Instruction
          - PageInstruction
          - BlockInstruction
        description: "Source instruction this was compiled from"

      - type: INCLUDES_ENTITY
        to: Entity
        description: "Entities whose context was included"

      - type: INCLUDES_STYLE
        to: Style
        description: "Locale style (voice, tone, formality) parameters included"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX promptartifact_key IF NOT EXISTS FOR (pa:PromptArtifact) ON (pa.key)"
      - "CREATE INDEX promptartifact_base IF NOT EXISTS FOR (pa:PromptArtifact) ON (pa.base_prompt_key)"

  example:
    data:
      key: "promptartifact-page-pricing-v1"
      display_name: "Page Pricing Prompt v1"
      description: "Compiled prompt for pricing page generation"
      compiled_prompt: "Generate a pricing page for QR Code AI..."
      base_prompt_key: "page-instruction-pricing"
      base_prompt_version: "1.0"
      includes_concepts: true
      includes_voice: true
      includes_culture: true
      token_count: 2500
      compiled_at: "2024-01-15T10:00:00Z"
      compiler_version: "1.0.0"

    cypher: |
      // Get prompt artifact with source instruction
      MATCH (pa:PromptArtifact {key: $key})
      OPTIONAL MATCH (pa)-[:COMPILED_FROM]->(instr)
      RETURN pa, instr
