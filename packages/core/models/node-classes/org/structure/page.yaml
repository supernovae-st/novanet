# Page - Invariant page structure with orchestrator instructions
#
# v0.13: ADR-031 SEO Pillar/Cluster Architecture
#   - Added is_pillar, pillar_strategy properties
#   - Added SEO_CLUSTER_OF relation (Page → Page where is_pillar=true)
#   - Added pr_weight to LINKS_TO for PageRank flow
# v0.12.4: ADR-028 - Page-Entity Architecture
#   - Added REPRESENTS (1:1 to Entity) - every page has one main Entity
#   - Removed HAS_STRUCTURE (PageStructure is calculated, not stored)
#   - Renamed HAS_BLOCK.position → order for semantic clarity
# v0.12.0: Initial clean schema (ADR-025 naming conventions)

node:
  name: Page
  realm: org
  layer: structure
  trait: defined
  icon:
    web: file-text
    terminal: "◇"
  description: "Invariant page structure containing blocks and orchestrator instructions"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Page identifier. Format: page-{identifier}"
      pattern: "^page-[a-z0-9-]+$"
      examples:
        - "page-pricing"
        - "page-homepage"
        - "page-features"

    slug:
      type: string
      required: true
      description: "URL-friendly path segment for this page"
      pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
      examples:
        - "pricing"
        - "features"
        - "qr-code-generator"

    display_name:
      type: string
      required: true
      description: "Human-readable UI name"
      example: "Pricing Page"

    description:
      type: string
      required: true
      description: "One-line description of the page"
      example: "Main pricing page with tier comparison and CTAs"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: 'USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]. RELATES: [connections].'"
      example: |
        USE: when orchestrating page-level generation, assembling blocks, or querying page structure.
        TRIGGERS: "page", "content structure", "block composition", "page generation".
        NOT: for individual block content (use Block), for visual design (use BrandDesign).
        RELATES: Project (owner via HAS_PAGE), Block (contains via HAS_BLOCK), Entity (represents via REPRESENTS), PageNative (output).

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # VECTOR EMBEDDING (v7.8.0 - Hybrid OntologyRAG)
  # ═══════════════════════════════════════════════════════════════════════════════

  embedding_properties:
    embedding:
      type: vector
      dimensions: 1536
      required: false
      description: "OpenAI text-embedding-3-small vector for semantic search"

    embedding_source:
      type: string
      required: false
      description: "Text used to generate embedding (for debugging)"

    embedding_updated_at:
      type: datetime
      required: false
      description: "Timestamp of last embedding update"

  # ═══════════════════════════════════════════════════════════════════════════════
  # PAGE-SPECIFIC PROPERTIES (v0.13: ADR-031)
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    # ─────────────────────────────────────────────────────────────────────────────
    # is_pillar: SEO pillar page flag
    # ─────────────────────────────────────────────────────────────────────────────
    # PURPOSE:
    #   Marks this page as a pillar page for SEO topical authority.
    #   Pillar pages are the main landing pages for topic clusters.
    #
    # RULES:
    #   • Pillars are anchor pages (e.g., /qr-code-generator)
    #   • Cluster pages link to pillars via SEO_CLUSTER_OF
    #   • MUST sync with Entity.is_pillar (via REPRESENTS)
    #
    # ADR-031: Three hierarchies:
    #   1. Entity.SUBTOPIC_OF → Semantic hierarchy (topic clusters)
    #   2. Page.SUBTOPIC_OF → URL hierarchy (path structure)
    #   3. Page.SEO_CLUSTER_OF → SEO pillar/cluster (internal linking)
    # ─────────────────────────────────────────────────────────────────────────────
    is_pillar:
      type: boolean
      required: false
      default: false
      description: "Marks page as pillar page for SEO topical authority"

    # ─────────────────────────────────────────────────────────────────────────────
    # pillar_strategy: Pillar type for SEO
    # ─────────────────────────────────────────────────────────────────────────────
    # PURPOSE:
    #   Defines the SEO strategy type for this pillar page.
    #
    # VALUES:
    #   • topic_authority: Broad topic coverage (e.g., "QR Code Generator")
    #   • product_line: Product family pages (e.g., "Pricing", "Features")
    #   • funnel_stage: Conversion funnel (e.g., "Compare", "Buy", "Support")
    #
    # ONLY VALID when is_pillar=true
    # ─────────────────────────────────────────────────────────────────────────────
    pillar_strategy:
      type: string
      required: false
      enum: [topic_authority, product_line, funnel_stage]
      description: "SEO pillar strategy type (only valid when is_pillar=true)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS (FROM this node)
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    # v0.12.4 ADR-028: 1:1 mandatory relationship to main Entity
    REPRESENTS:
      to: Entity
      cardinality: "1:1"
      required: true
      description: "Main Entity this page represents. Page.key = Entity.key (source of truth)"

    HAS_BLOCK:
      to: Block
      cardinality: "1:N"
      props:
        order:  # v0.12.4: renamed from position for semantic clarity
          type: int
          description: "Block order within the page (1-based, source of truth)"
      description: "Content blocks within this page"

    HAS_NATIVE:  # v0.13.0 ADR-029: unified HAS_NATIVE + HAS_NATIVE
      to: PageNative  # v0.13.0: renamed from PageNative
      cardinality: "1:N"
      description: "Native content for this page (one per locale)"

    HAS_INSTRUCTION:  # v0.12.0 ADR-025: Renamed from HAS_PROMPT/PagePrompt
      to: BlockInstruction
      cardinality: "1:N"
      description: "Block instructions composing PageInstruction at runtime (v0.12.0)"

    USES_ENTITY:
      to: Entity
      cardinality: "N:N"
      description: "Entities referenced by this page"

    # v7.12.0: Page-to-Page relationships (v7.12.1: anchor_type + nofollow)
    # v0.12.4: ADR-028 - Added via_blocks + strength (calculated from @ refs)
    LINKS_TO:
      to: Page
      cardinality: "N:N"
      props:
        via_blocks:
          type: array
          description: "Block keys where link originates (e.g., ['hero', 'pricing'])"
        strength:
          type: int
          default: 1
          description: "Link strength = count of [@page:X] refs across blocks"
        entity_key:
          type: string
          description: "Entity key - anchor text derived from EntityNative.display_name at generation time"
        context:
          type: string
          enum: [cta, body, related, nav]
          description: "Where the link appears in content"
        seo_weight:
          type: float
          description: "Link importance for SEO (0.0-1.0)"
        anchor_type:
          type: string
          enum: [exact_match, partial_match, branded, generic]
          default: partial_match
          description: "Anchor text strategy (v7.12.1). exact_match = 5× traffic but use sparingly (max 10%)"
        nofollow:
          type: boolean
          default: false
          description: "Set true for login/legal pages to prevent link equity flow (v7.12.1)"
      description: "Explicit internal link for SEO. Calculated from [@page:X] refs in BlockInstructions"

    SUBTOPIC_OF:
      to: Page
      cardinality: "N:1"
      description: "URL hierarchy for path structure (parent/child pages)"

    # v0.13: ADR-031 SEO Pillar/Cluster Architecture
    # IMPORTANT: DISTINCT from SUBTOPIC_OF and CLUSTER_OF (population)
    # - SUBTOPIC_OF: URL hierarchy (builds full_path)
    # - CLUSTER_OF: Population taxonomy (PopulationSubCluster → PopulationCluster)
    # - SEO_CLUSTER_OF: SEO pillar/cluster (internal linking, NOT URL)
    SEO_CLUSTER_OF:
      to: Page
      cardinality: "N:1"
      constraint: "target.is_pillar == true"
      props:
        cluster_role:
          type: string
          enum: [supporting, comparison, tutorial, case_study, faq]
          description: "Role of the cluster page in relation to pillar"
        link_priority:
          type: int
          min: 1
          max: 10
          default: 1
          description: "Priority for internal linking (1=highest)"
      description: "SEO pillar/cluster relationship (target MUST be is_pillar=true)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # INCOMING RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  incoming_relations:
    HAS_PAGE:
      from: Project
      cardinality: "1:N"
      description: "Project that owns this page"

    # v0.12.5: ADR-026 TIER 1 inverse arc
    REPRESENTED_BY:
      from: Entity
      cardinality: "1:1"
      description: "Entity that this page represents (inverse of REPRESENTS)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    data:
      key: "page-pricing"
      display_name: "Pricing Page"
      description: "Main pricing page with tier comparison and CTAs"
      llm_context: "USE: orchestrate pricing page generation. TRIGGERS: pricing, tarifs, plans, abonnement. NOT: individual block generation."

    cypher: |
      // v0.12.4: Get page with main Entity and all blocks in order
      MATCH (p:Page {key: $key})-[:REPRESENTS]->(e:Entity)
      MATCH (p)-[r:HAS_BLOCK]->(b:Block)-[:OF_TYPE]->(bt:BlockType)
      RETURN p, e, collect(DISTINCT {block: b, type: bt, order: r.order}) AS blocks
      ORDER BY r.order

      // v0.12.4: Get page with all referenced entities (main + block refs)
      MATCH (p:Page {key: $key})-[:REPRESENTS]->(main:Entity)
      OPTIONAL MATCH (p)-[:USES_ENTITY]->(ref:Entity)
      RETURN p, main.key AS main_entity, collect(DISTINCT ref.key) AS referenced_entities

      // Get page with latest generated output for locale (v10.9.0)
      MATCH (p:Page {key: $key})-[:HAS_NATIVE]->(pg:PageNative)-[:FOR_LOCALE]->(l:Locale {key: $locale})
      RETURN p, pg
      ORDER BY pg.assembled_at DESC
      LIMIT 1

      // v7.12.0: Get internal links with localized anchors (v10.9.0: EntityNative)
      MATCH (p:Page {key: $key})-[link:LINKS_TO]->(target:Page)
      MATCH (e:Entity {key: link.entity_key})-[:HAS_NATIVE]->(ec:EntityNative)-[:FOR_LOCALE]->(l:Locale {key: $locale})
      RETURN target.key AS target_page, ec.display_name AS anchor_text, link.context, link.seo_weight
      ORDER BY link.seo_weight DESC

      // v7.12.0: Get pillar page with its cluster pages
      MATCH (pillar:Page {key: $key})<-[:SUBTOPIC_OF]-(cluster:Page)
      RETURN pillar.key AS pillar, collect(cluster.key) AS clusters
