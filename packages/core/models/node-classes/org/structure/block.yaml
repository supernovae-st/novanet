# Block - Page section instance with sub-agent instructions
#
# v0.12.0: Initial clean schema (ADR-025 naming conventions)

# ------------------------------------------------------------------------------
# SCHEMA: Block
# ------------------------------------------------------------------------------
#
# ROLE:
#   A Block is an INVARIANT instance of a BlockType on a specific Page. It
#   represents a structural 'slot' that will be filled with generated content
#   for each locale. It holds the canonical, non-translated anchor_id.
#
# KEY RELATIONSHIPS:
#   - <-[:HAS_BLOCK]-(Page): The parent Page that contains this block instance.
#   - [:OF_TYPE]->(BlockType): The reusable template this block is based on.
#   - [:HAS_GENERATED]->(BlockGenerated): The localized content generated for this block.
#
# ------------------------------------------------------------------------------
node:
  name: Block
  realm: org
  layer: structure
  trait: defined
  icon:
    web: square
    terminal: "□"
  description: "An instance of a BlockType on a specific Page. Represents an invariant structural 'slot' that will be filled with generated content for each locale."

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Composite key: {page_key}:{block_type}:{index}. Globally unique, parseable components. Index enables multiple blocks of same type per page. (ADR-028)"
      pattern: "^[a-z0-9-]+:[a-z0-9-]+:[1-9][0-9]*$"
      examples:
        - "homepage:hero:1"
        - "pricing:testimonials:1"
        - "homepage:testimonials:2"
        - "qr-generator:feature-grid:1"

    display_name:
      type: string
      required: true
      description: "Human-readable UI name, in English. Must be unique within the parent Page."
      example: "Pricing Hero"

    description:
      type: string
      required: true
      description: "One-line description of the block's purpose on the page."
      example: "Hero section for the main pricing page."

    llm_context:
      type: string
      required: true
      description: "LLM generation hints for this specific block instance. Format: 'USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]. RELATES: [connections].'"
      example: |
        USE: when generating content for a specific page section or loading block context.
        TRIGGERS: "block", "section", "component", "content slot", "hero", "faq".
        NOT: for page-level orchestration (use Page), for block templates (use BlockType).
        RELATES: Page (parent via HAS_BLOCK), BlockType (template via OF_TYPE), BlockGenerated (output), BlockInstruction (recipe).

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOCK-SPECIFIC PROPERTIES (v0.12.6+)
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    anchor_id:
      type: string
      required: true
      pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
      description: "Canonical, non-translated identifier for the block anchor. Serves as a stable bridge to the localized `anchor_slug` on the BlockGenerated node. Must be unique within the parent page."
      example: "feature-comparison"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS (FROM this node)
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    OF_TYPE:
      to: BlockType
      cardinality: "N:1"
      description: "Links this Block instance to its reusable template (BlockType), from which it inherits its structure and validation rules."

    HAS_NATIVE:  # v0.13.0 ADR-029: unified HAS_CONTENT + HAS_GENERATED
      to: BlockNative  # v0.13.0: renamed from BlockGenerated
      cardinality: "1:N"
      description: "Native content for this block. Each BlockNative node contains the final content and localized `anchor_slug` for a specific locale."

    HAS_INSTRUCTION:  # v0.12.0 ADR-025: Renamed from HAS_PROMPT/BlockPrompt
      to: BlockInstruction
      cardinality: "1:N"
      description: "Connects the block to its specific generation recipe (the 'prompt')."

    USES_ENTITY:
      to: Entity
      cardinality: "N:N"
      description: "Entities referenced in this block's instructions"

    # v0.12.4: ADR-028 Page-Entity Architecture - Aggregated from MENTIONS
    REFERENCES:
      to: Entity
      cardinality: "N:N"
      props:
        purpose:
          type: string
          enum: [inject, link]
          description: "inject = embed EntityContent, link = hyperlink to Entity's Page"
        count:
          type: integer
          description: "Number of times entity is referenced in block"
      description: "Aggregated entity references from BlockInstruction @ refs"

  # ═══════════════════════════════════════════════════════════════════════════════
  # INCOMING RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  incoming_relations:
    HAS_BLOCK:
      from: Page
      cardinality: "1:N"
      description: "Page that contains this block"

    REFERENCED_BY:
      from: Entity
      cardinality: "N:N"
      description: "Entities that reference this block (inverse of REFERENCES, ADR-026)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    data:
      key: "pricing:hero:1"
      display_name: "Pricing Hero"
      description: "Hero section for pricing page"
      llm_context: |
        USE: when generating content for the pricing page hero section.
        TRIGGERS: "pricing hero", "tier comparison", "above-fold pricing".
        NOT: for FAQ blocks (use pricing:faq:1), for footer blocks (use shared footer).
        RELATES: Page (pricing), BlockType (hero-v1), BlockInstruction (pricing_hero).

    cypher: |
      // Load full context for block generation (v10.9.0: EntityContent)
      MATCH (b:Block {key: $key})-[:OF_TYPE]->(bt:BlockType)
      MATCH (b)-[:USES_ENTITY]->(e:Entity)-[:HAS_CONTENT]->(ec:EntityContent)-[:FOR_LOCALE]->(l:Locale {key: $locale})
      OPTIONAL MATCH (l)-[:HAS_VOICE]->(v:LocaleVoice)
      OPTIONAL MATCH (l)-[:HAS_CULTURE]->(cult:LocaleCulture)
      OPTIONAL MATCH (b)-[:HAS_INSTRUCTION]->(bi:BlockInstruction {active: true})
      RETURN bi.prompt AS instructions, bt.llm_context,
             collect(DISTINCT {key: e.key, title: ec.display_name, definition: ec.definition}) AS entities,
             v AS voice, cult AS culture

      // Get block with latest generated output for locale (v10.9.0)
      MATCH (b:Block {key: $key})-[:HAS_GENERATED]->(bg:BlockGenerated)-[:FOR_LOCALE]->(l:Locale {key: $locale})
      RETURN b, bg
      ORDER BY bg.generated_at DESC
      LIMIT 1
