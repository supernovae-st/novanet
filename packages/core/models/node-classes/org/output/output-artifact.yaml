# models/node-classes/org/output/output-artifact.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# OutputArtifact - Generated content bundle for deployment

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: OutputArtifact
  realm: org
  layer: output
  trait: generated  # v11.2: Split derived → generated (LLM output)

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Generated content bundle aggregating PageNative and BlockNative for a specific locale version."

  llm_context: |
    USE: when bundling generated content for deployment or versioning releases.
    TRIGGERS: "bundle", "artifact", "deployment", "release", "output bundle".
    NOT: for individual page content (use PageNative), for block content (use BlockNative), for draft content.
    RELATES: PageNative (BUNDLES), BlockNative (BUNDLES), Locale (FOR_LOCALE).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: "package"
    terminal: "■"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      description: "Artifact bundle identifier"
      pattern: "^outputartifact-[a-z0-9-]+-[a-z]{2}-[A-Z]{2}-v[0-9]+$"
      example: "outputartifact-project-qrcode-fr-FR-v1"

    display_name:
      type: string
      required: true
      description: "Bundle name with locale"
      example: "QRCode AI - French (v1)"

    description:
      type: string
      required: false

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    locale_code:
      type: string
      required: true
      description: "Target locale code"
      example: "fr-FR"

    version:
      type: int
      required: true
      description: "Bundle version number"

    status:
      type: string
      required: true
      enum: ["draft", "validated", "published", "archived"]
      description: "Bundle lifecycle status"

    pages_included:
      type: int
      required: true
      description: "Count of pages in bundle"

    blocks_included:
      type: int
      required: true
      description: "Count of blocks in bundle"

    bundled_at:
      type: datetime
      required: true

    bundler_version:
      type: string
      required: true
      description: "Version of the bundler"

    total_size_bytes:
      type: int
      required: false
      description: "Total size of bundled content"

    checksum:
      type: string
      required: false
      description: "Content integrity checksum"

    published_at:
      type: datetime
      required: false

    published_by:
      type: string
      required: false

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: BUNDLES
        to:
          - PageNative
          - BlockNative
        description: "Content nodes bundled in this artifact"

      - type: FOR_LOCALE
        to: Locale
        description: "Target locale for this bundle"

      - type: PREVIOUS_VERSION
        to: OutputArtifact
        cardinality: "1:1"
        description: "Previous version of this artifact"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX outputartifact_key IF NOT EXISTS FOR (oa:OutputArtifact) ON (oa.key)"
      - "CREATE INDEX outputartifact_locale IF NOT EXISTS FOR (oa:OutputArtifact) ON (oa.locale_code)"
      - "CREATE INDEX outputartifact_status IF NOT EXISTS FOR (oa:OutputArtifact) ON (oa.status)"

  example:
    data:
      key: "outputartifact-project-qrcode-fr-FR-v1"
      display_name: "QRCode AI - French (v1)"
      description: "Production release bundle for French market"
      locale_code: "fr-FR"
      version: 1
      status: "published"
      pages_included: 15
      blocks_included: 45
      bundled_at: "2024-01-15T12:00:00Z"
      bundler_version: "1.0.0"
      total_size_bytes: 256000
      checksum: "sha256:abc123..."
      published_at: "2024-01-15T14:00:00Z"

    cypher: |
      // Get artifact with all bundled content
      MATCH (oa:OutputArtifact {key: $key})
      OPTIONAL MATCH (oa)-[:BUNDLES]->(pg:PageNative)
      OPTIONAL MATCH (oa)-[:BUNDLES]->(bg:BlockNative)
      RETURN oa, collect(DISTINCT pg.key) AS pages, collect(DISTINCT bg.key) AS blocks
