# models/node-classes/org/output/block-native.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# BlockNative - LLM-generated native block content (v0.13.0 ADR-029)

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: BlockNative
  realm: org
  layer: output
  trait: generated  # v11.2: Split derived → generated (LLM output)

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "LLM-generated native content for a block"

  llm_context: |
    USE: when displaying generated native block content or checking block output status.
    TRIGGERS: "block native", "generated block", "block content", locale code.
    NOT: for block structure (use Block), for block templates (use BlockType), for generation instructions (use BlockInstruction).
    RELATES: Block (source via HAS_NATIVE), Locale (target via FOR_LOCALE), EntityNative (influenced by via INFLUENCED_BY), PageNative (assembled into via ASSEMBLES).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: check-square
    terminal: "★"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      pattern: "^block:[a-z][a-z0-9-]*@[a-z]{2}-[A-Z]{2}$"
      description: "Composite key: block:{block_key}@{locale_key}"
      examples:
        - "block:pricing-hero@fr-FR"
        - "block:feature-list@ja-JP"

    block_key:
      type: string
      required: true
      pattern: "^[a-z][a-z0-9-]*$"
      indexed: true
      description: "Parent Block key (denormalized for fast lookup)"
      examples:
        - "pricing-hero"
        - "feature-list"

    locale_key:
      type: string
      required: true
      pattern: "^[a-z]{2}-[A-Z]{2}$"
      indexed: true
      description: "Target Locale key (denormalized). BCP 47 format."
      examples:
        - "fr-FR"
        - "en-US"
        - "ja-JP"

    display_name:
      type: string
      required: true
      description: "Auto-generated name"
      example: "Pricing Hero (fr-FR)"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Generated hero section for French market"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOCKNATIVE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    generated:
      type: json
      required: true
      description: "LLM output matching BlockType.structure"

    generated_at:
      type: datetime
      required: true
      description: "Generation timestamp"

    generator_version:
      type: string
      required: true
      description: "Version tracking"
      example: "1.2.0"

    status:
      type: string
      required: true
      enum: ["draft", "approved", "published"]
      description: "Review and publication status"

    anchor_slug:
      type: string
      required: true
      pattern: "^[\\p{Ll}\\p{N}\\-]+$"  # UTF-8: Unicode lowercase + numbers + hyphens
      description: "Localized, URL-friendly identifier for the block anchor. Used as the HTML 'id' attribute."
      example: "comparaison-des-fonctionnalites"

    # ─────────────────────────────────────────────────────────────────────────────
    # VERSIONING
    # ─────────────────────────────────────────────────────────────────────────────
    version:
      type: int
      required: true
      description: "Version number (1, 2, 3...)"
      example: 1

    published_at:
      type: datetime
      required: false
      description: "When this version was put live"

    replaced_at:
      type: datetime
      required: false
      description: "When this version was replaced (null = current)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    incoming:
      - type: HAS_NATIVE  # v0.13.0 ADR-029: Unified arc
        from: Block
        description: "Block that owns this LLM-generated native content"

      - type: GENERATED
        from: BlockInstruction  # v11.8 ADR-025: BlockPrompt → BlockInstruction
        description: "Instruction that generated this output (provenance via <-[:GENERATED]-)"

      - type: ASSEMBLES
        from: PageNative
        description: "PageNative that assembles this block"

    outgoing:
      - type: FOR_LOCALE
        to: Locale
        description: "Target locale for this output"

      - type: INFLUENCED_BY
        to: EntityNative
        description: "EntityNative used in generation (provenance)"

      - type: PREVIOUS_VERSION
        to: BlockNative
        cardinality: "1:1"
        description: "Link to previous version in history chain"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════

  neo4j:
    indexes:
      - "CREATE INDEX blocknative_status IF NOT EXISTS FOR (bn:BlockNative) ON (bn.status)"
      - "CREATE INDEX blocknative_date IF NOT EXISTS FOR (bn:BlockNative) ON (bn.generated_at)"
      - "CREATE INDEX blocknative_block_key IF NOT EXISTS FOR (bn:BlockNative) ON (bn.block_key)"
      - "CREATE INDEX blocknative_locale_key IF NOT EXISTS FOR (bn:BlockNative) ON (bn.locale_key)"

  example:
    key: "block:pricing-hero@fr-FR"
    block_key: "pricing-hero"
    locale_key: "fr-FR"
    display_name: "Pricing Hero (fr-FR)"
    description: "Hero tarifs généré pour le marché français"
    llm_context: "USE: display generated hero content. TRIGGERS: pricing hero, fr-FR output."
    generated:
      title: "Des QR Codes Pro pour votre Business"
      subtitle: "Créez, personnalisez et suivez vos QR codes en illimité"
      cta:
        label: "Commencer Gratuitement"
        url: "/signup"
    generated_at: "2024-01-15T10:25:00Z"
    generator_version: "1.2.0"
    status: "published"
    version: 2
    published_at: "2024-01-15T10:30:00Z"
    replaced_at: null
