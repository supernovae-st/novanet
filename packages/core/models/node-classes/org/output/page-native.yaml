# models/node-classes/org/output/page-native.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# PageNative - LLM-generated native page content (v0.13.0 ADR-029)
# =============================================================================
# NOTE: URL routing (slug, full_path) is owned by BlockNative:head-seo-meta.
# PageNative only contains assembled block content, not routing metadata.
# See ADR-030 (Slug Ownership) for details.
# =============================================================================

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: PageNative
  realm: org
  layer: output
  trait: generated  # v11.2: Split derived → generated (LLM output)

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "LLM-generated native page content assembled from BlockNative nodes"

  llm_context: |
    USE: when displaying assembled native page content or checking generation status.
    TRIGGERS: "page native", "generated page", "assembled content", locale code.
    NOT: for page structure (use Page), for block content (use BlockNative), for URL/slug (use BlockNative:head-seo-meta).
    RELATES: Page (source via HAS_NATIVE), Locale (target via FOR_LOCALE), BlockNative (assembles via ASSEMBLES), BlockNative:head-seo-meta (slug/URL via ASSEMBLES), ProjectNative (context via BELONGS_TO_PROJECT_NATIVE).
    NOTE: URL routing (slug, full_path) is owned by the head-seo-meta BlockNative, not PageNative.

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: file-check
    terminal: "★"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      pattern: "^page:[a-z][a-z0-9-]*@[a-z]{2}-[A-Z]{2}$"
      description: "Composite key: page:{page_key}@{locale_key}"
      examples:
        - "page:pricing@fr-FR"
        - "page:features@ja-JP"

    page_key:
      type: string
      required: true
      pattern: "^[a-z][a-z0-9-]*$"
      indexed: true
      description: "Parent Page key (denormalized for fast lookup)"
      examples:
        - "pricing"
        - "features"

    locale_key:
      type: string
      required: true
      pattern: "^[a-z]{2}-[A-Z]{2}$"
      indexed: true
      description: "Target Locale key (denormalized). BCP 47 format."
      examples:
        - "fr-FR"
        - "en-US"
        - "ja-JP"

    display_name:
      type: string
      required: true
      description: "Auto-generated name"
      example: "Pricing Page (fr-FR)"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Assembled pricing page for French market"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # NOTE: routing_properties (slug, full_path, etc.) moved to BlockNative:head-seo-meta
  # See ADR-030 (Slug Ownership) - slug is now owned by the first block of each page.

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    assembled:
      type: json
      required: true
      description: "Compiled blocks as JSON"

    assembled_at:
      type: datetime
      required: true
      description: "Assembly timestamp"

    assembler_version:
      type: string
      required: true
      description: "Version tracking"
      example: "1.2.0"

    status:
      type: string
      required: true
      enum: ["draft", "published", "archived"]
      description: "Publication status"

    # ─────────────────────────────────────────────────────────────────────────────
    # VERSIONING
    # ─────────────────────────────────────────────────────────────────────────────
    version:
      type: int
      required: true
      description: "Version number (1, 2, 3...)"
      example: 1

    published_at:
      type: datetime
      required: false
      description: "When this version was put live"

    replaced_at:
      type: datetime
      required: false
      description: "When this version was replaced (null = current)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    incoming:
      - type: HAS_NATIVE  # v0.13.0 ADR-029: Unified arc
        from: Page
        description: "Page that owns this LLM-generated native content"

      - type: GENERATED
        from: PageInstruction  # v11.8 ADR-025: PagePrompt → PageInstruction
        description: "Instruction that generated this output (provenance via <-[:GENERATED]-)"

    outgoing:
      - type: FOR_LOCALE
        to: Locale
        description: "Target locale for this output"

      - type: ASSEMBLES
        to: BlockNative
        description: "BlockNative nodes assembled into this page"

      - type: BELONGS_TO_PROJECT_NATIVE
        to: ProjectNative
        description: "Locale-aligned project context (voice, tagline, CTAs)"

      - type: PREVIOUS_VERSION
        to: PageNative
        cardinality: "1:1"
        description: "Link to previous version in history chain"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX pagenative_key IF NOT EXISTS FOR (pn:PageNative) ON (pn.key)"
      - "CREATE INDEX pagenative_status IF NOT EXISTS FOR (pn:PageNative) ON (pn.status)"
      - "CREATE INDEX pagenative_date IF NOT EXISTS FOR (pn:PageNative) ON (pn.assembled_at)"
      - "CREATE INDEX pagenative_page_key IF NOT EXISTS FOR (pn:PageNative) ON (pn.page_key)"
      - "CREATE INDEX pagenative_locale_key IF NOT EXISTS FOR (pn:PageNative) ON (pn.locale_key)"

  example:
    key: "page:pricing@fr-FR"
    page_key: "pricing"
    locale_key: "fr-FR"
    display_name: "Page Tarifs (fr-FR)"
    description: "Page tarifs assemblée pour le marché français"
    llm_context: "USE: display assembled page content. TRIGGERS: pricing page, fr-FR output."
    assembled:
      headers:
        title: "Tarifs QR Code AI"
        meta_description: "Découvrez nos formules de création de QR codes..."
      sections:
        - type: "hero"
          content: "..."
        - type: "pricing-table"
          content: "..."
    assembled_at: "2024-01-15T10:30:00Z"
    assembler_version: "1.2.0"
    status: "published"
    version: 3
    published_at: "2024-01-15T10:35:00Z"
    replaced_at: null
