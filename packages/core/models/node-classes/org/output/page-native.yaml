# models/node-classes/org/output/page-native.yaml
# PageNative - LLM-generated native page content (v0.13.0 ADR-029)
#
# ═══════════════════════════════════════════════════════════════════════════════
# v0.13.0 CHANGES (ADR-029 *Native Pattern)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   RENAMED: PageNative → PageNative
#   - All locale-specific nodes now use *Native suffix
#   - Trait (authored vs generated) distinguishes who creates content
#   - Unified arc: HAS_NATIVE replaces HAS_NATIVE
#
# TRAIT SEMANTICS:
#   - authored = human-authored native content (EntityNative, ProjectNative)
#   - generated = LLM-generated native content (PageNative, BlockNative)
#
# ═══════════════════════════════════════════════════════════════════════════════

node:
  name: PageNative
  realm: org
  layer: output
  trait: generated  # v11.2: Split derived → generated (LLM output)
  icon:
    web: file-check
    terminal: "★"
  description: "LLM-generated native page content assembled from BlockNative nodes"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      pattern: "^page:[a-z][a-z0-9-]*@[a-z]{2}-[A-Z]{2}$"
      description: "Composite key: page:{page_key}@{locale_key}"
      examples:
        - "page:pricing@fr-FR"
        - "page:features@ja-JP"

    display_name:
      type: string
      required: true
      description: "Auto-generated name"
      example: "Pricing Page (fr-FR)"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Assembled pricing page for French market"

    llm_context:
      type: string
      required: false
      description: |
        Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]. RELATES: [connections].
        Example: USE: when displaying assembled native page content or checking generation status. TRIGGERS: "page native", "generated page", "assembled content", locale code. NOT: for page structure (use Page), for block content (use BlockNative). RELATES: Page (source via HAS_NATIVE), Locale (target via FOR_LOCALE), BlockNative (assembles via ASSEMBLES), ProjectNative (context via BELONGS_TO_PROJECT_NATIVE).

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ═══════════════════════════════════════════════════════════════════════════════
  # URL/ROUTING PROPERTIES (v0.13.0 ADR-030: moved from EntityNative)
  # ═══════════════════════════════════════════════════════════════════════════════
  #
  # ADR-030 Slug Ownership: PageNative owns URL routing, not EntityNative.
  # EntityNative focuses on semantic content; PageNative handles URL structure.
  #
  # ═══════════════════════════════════════════════════════════════════════════════

  routing_properties:
    slug:
      type: string
      required: true
      pattern: "^[\\p{Ll}\\p{N}\\-]+$"  # UTF-8: Unicode lowercase + numbers + hyphens
      indexed: true
      unique_with: locale_key  # UNIQUE(locale_key, slug)
      description: "URL-safe localized page identifier (UTF-8 allowed)"
      examples:
        - "tarifs"                # fr-FR
        - "pricing"               # en-US
        - "料金"                   # ja-JP

    full_path:
      type: string
      required: true
      indexed: true
      description: "Denormalized full URL path from root (O(1) lookup)"
      examples:
        - "/fr/tarifs"
        - "/fr/blog/qr-code-restaurant"
        - "/ja/料金"

    parent_slug:
      type: string
      required: false
      description: "Parent PageNative slug (null if root page)"
      examples:
        - "blog"
        - "features"

    depth:
      type: int
      required: true
      default: 0
      description: "URL hierarchy depth (0 = root, max 3)"
      examples:
        - 0  # /fr/tarifs
        - 1  # /fr/blog/article
        - 2  # /fr/blog/category/article

    slug_history:
      type: "string[]"
      required: false
      description: "Previous slugs for redirect support (301 redirects)"
      examples:
        - '["prix", "tarification"]'

  # ═══════════════════════════════════════════════════════════════════════════════
  # PAGENATIVE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    assembled:
      type: json
      required: true
      description: "Compiled blocks as JSON"

    assembled_at:
      type: datetime
      required: true
      description: "Assembly timestamp"

    assembler_version:
      type: string
      required: true
      description: "Version tracking"
      example: "1.2.0"

    status:
      type: string
      required: true
      enum: ["draft", "published", "archived"]
      description: "Publication status"

    # ─────────────────────────────────────────────────────────────────────────────
    # VERSIONING
    # ─────────────────────────────────────────────────────────────────────────────
    version:
      type: int
      required: true
      description: "Version number (1, 2, 3...)"
      example: 1

    published_at:
      type: datetime
      required: false
      description: "When this version was put live"

    replaced_at:
      type: datetime
      required: false
      description: "When this version was replaced (null = current)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    incoming:
      - type: HAS_NATIVE  # v0.13.0 ADR-029: Unified arc
        from: Page
        description: "Page that owns this LLM-generated native content"

      - type: GENERATED
        from: PageInstruction  # v11.8 ADR-025: PagePrompt → PageInstruction
        description: "Instruction that generated this output (provenance via <-[:GENERATED]-)"

    outgoing:
      - type: FOR_LOCALE
        to: Locale
        description: "Target locale for this output"

      - type: ASSEMBLES
        to: BlockNative
        description: "BlockNative nodes assembled into this page"

      - type: BELONGS_TO_PROJECT_NATIVE
        to: ProjectNative
        description: "Locale-aligned project context (voice, tagline, CTAs)"

      - type: PREVIOUS_VERSION
        to: PageNative
        cardinality: "1:1"
        description: "Link to previous version in history chain"

  # ═══════════════════════════════════════════════════════════════════════════════
  # NEO4J CONFIGURATION
  # ═══════════════════════════════════════════════════════════════════════════════

  neo4j:
    indexes:
      - "CREATE INDEX pagenative_status IF NOT EXISTS FOR (pn:PageNative) ON (pn.status)"
      - "CREATE INDEX pagenative_date IF NOT EXISTS FOR (pn:PageNative) ON (pn.assembled_at)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    key: "page:pricing@fr-FR"
    display_name: "Page Tarifs (fr-FR)"
    description: "Page tarifs assemblée pour le marché français"
    llm_context: "USE: display assembled page content. TRIGGERS: pricing page, fr-FR output."
    assembled:
      headers:
        title: "Tarifs QR Code AI"
        meta_description: "Découvrez nos formules de création de QR codes..."
      sections:
        - type: "hero"
          content: "..."
        - type: "pricing-table"
          content: "..."
    assembled_at: "2024-01-15T10:30:00Z"
    assembler_version: "1.2.0"
    status: "published"
    version: 3
    published_at: "2024-01-15T10:35:00Z"
    replaced_at: null
