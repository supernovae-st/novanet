# models/node-classes/org/config/org-config.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# v11.3: Merged from Organization + Tenant (simpler, unified model)

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: OrgConfig
  realm: org
  layer: config
  trait: defined

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Organization configuration root. Parent of all projects."

  llm_context: |
    USE: when loading org-level context, configuration, or project hierarchy.
    TRIGGERS: "organization", "org config", "company settings", "project parent".
    NOT: for project-specific settings (use Project), for brand identity (use Brand).
    RELATES: Project (children via HAS_PROJECT).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: building-2
    terminal: "◎"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      description: "Unique organization identifier (kebab-case)"
      example: "supernovae"

    display_name:
      type: string
      required: true
      description: "Human-readable organization name"
      example: "SuperNovae"

    description:
      type: string
      required: true
      description: "Brief description of the organization"
      example: "AI-powered content localization"

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    domain:
      type: string
      required: false
      description: "Primary domain for the organization"
      example: "supernovae.studio"

    website_url:
      type: string
      required: false
      description: "Organization website URL"
      example: "https://supernovae.studio"

    industry:
      type: string
      required: false
      description: "Industry or sector"
      example: "Software / AI / Localization"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    HAS_PROJECT:
      to: Project
      cardinality: "1:N"
      description: "Projects owned by this organization"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example)
  # ═══════════════════════════════════════════════════════════════════════════════
  example:
    data:
      key: "supernovae"
      display_name: "SuperNovae"
      description: "AI-powered content localization"
      domain: "supernovae.studio"
      website_url: "https://supernovae.studio"
      industry: "Software / AI / Localization"

    cypher: |
      MATCH (org:OrgConfig {key: $key})
      OPTIONAL MATCH (org)-[:HAS_PROJECT]->(p:Project)
      RETURN org, collect(DISTINCT p) AS projects
