# models/node-classes/shared/geography/continent.yaml
# Continent - UN M49 continental region for geographic hierarchy
#
# v0.13.1: LLM-First field ordering (llm_context promoted to BLOC 2)
# v0.12.4: Added cultural_style and visual_prompt for AI generation
# v10.8: Geographic Taxonomy - Phase 1
# Data: 6 continents (AF, AM, AN, AS, EU, OC)
# Source: UN M49 Standard (unstats.un.org)

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY
  # ═══════════════════════════════════════════════════════════════════════════════
  name: Continent
  realm: shared
  layer: geography
  trait: defined

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (LLM-First)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "UN M49 continental region for geographic clustering and LLM retrieval"

  llm_context: |
    USE: when generating content for a geographic continent.
    TRIGGERS: "continent", "continental", "region", "geographic area".
    NOT: for country-specific content (use Country), for locale-specific (use Locale).
    RELATES: GeoRegion (child via IN_CONTINENT), Country (grandchild).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: "globe"
    terminal: "◉"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      description: "Two-letter continent code (UN M49)"
      pattern: "^[A-Z]{2}$"
      examples:
        - "AF"
        - "AM"
        - "AS"
        - "EU"
        - "OC"
        - "AN"

    display_name:
      type: string
      required: true
      description: "Human-readable continent name"
      example: "Europe"

    description:
      type: string
      required: true
      description: "Short description"
      example: "European continent covering 44 countries"

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    m49_code:
      type: int
      required: true
      description: "UN M49 numeric code"
      examples:
        - 2    # Africa
        - 19   # Americas
        - 142  # Asia
        - 150  # Europe
        - 9    # Oceania
        - 10   # Antarctica

    region_count:
      type: int
      required: false
      description: "Number of GeoRegion children"
      example: 4

    # v0.12.4: AI generation properties
    cultural_style:
      type: json
      required: false
      description: "Cultural visual preferences for AI content generation"
      properties:
        color_preferences:
          primary_colors: array    # Culturally significant colors
          avoid_colors: array      # Colors with negative connotations
          color_meanings: object   # Semantic meaning per color
        visual_style:
          aesthetic: string        # Overall aesthetic (e.g., "balanced", "bold")
          motifs: array           # Cultural motifs and patterns
        typography:
          preferred_styles: array  # Preferred font styles
          script_direction: string # ltr, rtl, vertical
        cultural_codes:
          symbols: array          # Positive symbols
          avoid_symbols: array    # Symbols to avoid

    visual_prompt:
      type: json
      required: false
      description: "AI visual generation presets for image, video, illustration, product_3d"
      properties:
        image:
          subject: object         # Subject description and elements
          style: object           # Style modifiers and weighted_modifiers
          color_palette: object   # Primary, secondary, avoid colors
          composition: object     # Balance, focal point, framing
          negative_prompts: object # Content, technical, style exclusions
        video:
          inherit_from: string    # Usually "image"
          cinematography: object  # Camera movements, shot types, transitions
          pacing: string          # fast, moderate, slow
        illustration:
          inherit_from: string    # Usually "image"
          technique: string       # vector, watercolor, ink, digital
        product_3d:
          inherit_from: string    # Usually "image"
          rendering: object       # Lighting, materials, environment

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    incoming:
      - type: IN_CONTINENT
        from: GeoRegion
        cardinality: "N:1"
        description: "Geographic regions within this continent"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE
  # ═══════════════════════════════════════════════════════════════════════════════
  example:
    data:
      key: "EU"
      display_name: "Europe"
      description: "European continent covering 44 countries"
      m49_code: 150
      region_count: 4
      llm_context: "USE: for European countries and markets. TRIGGERS: europe, european, eu, western, eastern, northern, southern europe. NOT: Eurasia (use AS for Asian part)."

    cypher: |
      // Get all regions in a continent
      MATCH (c:Continent {key: $key})<-[:IN_CONTINENT]-(r:GeoRegion)
      RETURN r.key, r.name
      ORDER BY r.name

      // Get all locales in a continent
      MATCH (c:Continent {key: $key})<-[:IN_CONTINENT]-(r:GeoRegion)<-[:IN_SUBREGION]-(l:Locale)
      RETURN l.key, r.name AS region
      ORDER BY r.name, l.key
