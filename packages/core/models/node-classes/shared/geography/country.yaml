# models/node-classes/shared/geography/country.yaml
# Country - ISO 3166-1 country/territory for geographic mapping
#
# v0.12.3: Page-Entity Architecture - Complete geographic hierarchy
# Data: 249 countries/territories (ISO 3166-1)
# Sources: ISO 3166-1 (alpha-2/alpha-3), UN M49 (numeric codes)
#
# Hierarchy: Continent → GeoRegion → GeoSubRegion (optional) → Country → Locale

node:
  name: Country
  realm: shared
  layer: geography
  trait: defined
  icon:
    web: "flag"
    terminal: "⚑"
  description: "ISO 3166-1 country/territory with UN M49 geographic classification"

  standard_properties:
    key:
      type: string
      required: true
      description: "ISO 3166-1 alpha-2 code (uppercase, 2 letters)"
      pattern: "^[A-Z]{2}$"
      examples:
        - "FR"
        - "US"
        - "JP"
        - "BR"

    display_name:
      type: string
      required: true
      description: "English country/territory name"
      examples:
        - "France"
        - "United States of America"
        - "Japan"
        - "Brazil"

    description:
      type: string
      required: true
      description: "Short geographic context"
      example: "France, Western European country, EU member state"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints for cultural context"
      example: "USE: for French market content. TRIGGERS: france, français, french. NOT: Quebec (use CA with fr-CA locale)."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # COUNTRY-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    alpha3:
      type: string
      required: true
      description: "ISO 3166-1 alpha-3 code (3 letters)"
      pattern: "^[A-Z]{3}$"
      examples:
        - "FRA"
        - "USA"
        - "JPN"

    m49_code:
      type: int
      required: true
      description: "UN M49 numeric country code"
      examples:
        - 250  # France
        - 840  # United States
        - 392  # Japan

    region:
      type: string
      required: true
      description: "UN M49 region name"
      examples:
        - "Europe"
        - "Americas"
        - "Asia"

    sub_region:
      type: string
      required: false
      description: "UN M49 sub-region name"
      examples:
        - "Western Europe"
        - "Northern America"
        - "Eastern Asia"

    intermediate_region:
      type: string
      required: false
      description: "UN M49 intermediate region (for complex hierarchies like Caribbean)"
      examples:
        - "Caribbean"
        - "South America"
        - "Middle Africa"

    locale_count:
      type: int
      required: false
      description: "Number of Locale nodes for this country"
      example: 1

    # v0.12.4: AI generation properties
    cultural_style:
      type: json
      required: false
      description: "Country-specific cultural visual preferences for AI content generation"
      properties:
        color_preferences:
          primary_colors: array    # Culturally significant colors
          avoid_colors: array      # Colors with negative connotations
          color_meanings: object   # Semantic meaning per color
        visual_style:
          aesthetic: string        # Overall aesthetic
          motifs: array           # Cultural motifs and patterns
        typography:
          preferred_styles: array  # Preferred font styles
          script_direction: string # ltr, rtl, vertical
        cultural_codes:
          symbols: array          # Positive symbols
          avoid_symbols: array    # Symbols to avoid

    visual_prompt:
      type: json
      required: false
      description: "AI visual generation presets for image, video, illustration, product_3d"
      properties:
        image:
          subject: object         # Subject description and elements
          style: object           # Style modifiers and weighted_modifiers
          color_palette: object   # Primary, secondary, avoid colors
          composition: object     # Balance, focal point, framing
          negative_prompts: object # Content, technical, style exclusions
        video:
          inherit_from: string    # Usually "image"
          cinematography: object  # Camera movements, shot types, transitions
          pacing: string          # fast, moderate, slow
        illustration:
          inherit_from: string    # Usually "image"
          technique: string       # vector, watercolor, ink, digital
        product_3d:
          inherit_from: string    # Usually "image"
          rendering: object       # Lighting, materials, environment

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    outgoing:
      - type: IN_REGION
        to: GeoRegion
        cardinality: "N:1"
        description: "Country belongs to UN M49 geographic region"

      - type: IN_SUBREGION
        to: GeoSubRegion
        cardinality: "N:1"
        required: false
        description: "Country belongs to UN M49 sub-region (if applicable)"

      - type: IN_CONTINENT
        to: Continent
        cardinality: "N:1"
        description: "Country belongs to continent (derived from region)"

    incoming:
      - type: IN_COUNTRY
        from: Locale
        cardinality: "N:1"
        description: "Locales within this country"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    data:
      key: "FR"
      display_name: "France"
      description: "France, Western European country, EU member state"
      alpha3: "FRA"
      m49_code: 250
      region: "Europe"
      sub_region: "Western Europe"
      intermediate_region: ""
      locale_count: 1
      llm_context: "USE: for French market content (fr-FR). TRIGGERS: france, français, french, paris. NOT: Quebec (use CA), Switzerland (use CH), Belgium (use BE)."

    cypher: |
      // Get all locales in a country
      MATCH (c:Country {key: $key})<-[:IN_COUNTRY]-(l:Locale)
      RETURN l.key, l.display_name
      ORDER BY l.key

      // Get country with full geographic hierarchy
      MATCH (c:Country {key: $key})-[:IN_REGION]->(r:GeoRegion)-[:IN_CONTINENT]->(cont:Continent)
      OPTIONAL MATCH (c)-[:IN_SUBREGION]->(sr:GeoSubRegion)
      RETURN c.key, c.display_name, r.key AS region, sr.key AS sub_region, cont.key AS continent

      // Find countries in same sub-region (similar markets)
      MATCH (c:Country {key: $key})-[:IN_REGION]->(r:GeoRegion)<-[:IN_REGION]-(similar:Country)
      WHERE similar.key <> $key
      RETURN similar.key, similar.display_name
      ORDER BY similar.display_name

      // Get country with locale count
      MATCH (c:Country {key: $key})
      OPTIONAL MATCH (c)<-[:IN_COUNTRY]-(l:Locale)
      RETURN c.key, c.display_name, count(l) AS locale_count
