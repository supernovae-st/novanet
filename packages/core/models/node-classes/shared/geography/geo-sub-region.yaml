# models/node-classes/shared/geography/geo-sub-region.yaml
# GeoSubRegion - UN M49 intermediate/sub-region (optional level)
#
# v0.13.1: LLM-First field ordering (llm_context promoted to BLOC 2)
# v0.12.4: Added cultural_style and visual_prompt for AI generation
# v10.8: Geographic Taxonomy - Phase 1
# Data: ~15 sub-regions (Channel Islands, Caribbean sub-areas, etc.)
# Source: UN M49 Standard (unstats.un.org)
# Note: Optional intermediate level - most locales link directly to GeoRegion

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY
  # ═══════════════════════════════════════════════════════════════════════════════
  name: GeoSubRegion
  realm: shared
  layer: geography
  trait: defined

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (LLM-First)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "UN M49 intermediate region for fine-grained geographic clustering"

  llm_context: |
    USE: when generating content for a sub-region (e.g., Channel Islands, Caribbean).
    TRIGGERS: "sub-region", "intermediate region", "sub-area", "channel islands", "caribbean".
    NOT: for main regions (use GeoRegion), for continents (use Continent).
    RELATES: GeoRegion (parent via IN_REGION), Locale (child via IN_SUBREGION).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: "map-pin"
    terminal: "◎"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      description: "Kebab-case sub-region key"
      pattern: "^[a-z-]+$"
      examples:
        - "channel-islands"
        - "caribbean"
        - "micronesia"

    display_name:
      type: string
      required: true
      description: "Human-readable sub-region name"
      example: "Channel Islands"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Channel Islands between England and France"

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    m49_code:
      type: int
      required: true
      description: "UN M49 numeric code (if available)"
      example: 830

    parent_region:
      type: string
      required: true
      description: "Parent GeoRegion key"
      example: "northern-europe"

    # v0.12.4: AI generation properties
    cultural_style:
      type: json
      required: false
      description: "Sub-regional cultural visual preferences for AI content generation"
      properties:
        color_preferences:
          primary_colors: array    # Culturally significant colors
          avoid_colors: array      # Colors with negative connotations
          color_meanings: object   # Semantic meaning per color
        visual_style:
          aesthetic: string        # Overall aesthetic
          motifs: array           # Cultural motifs and patterns
        typography:
          preferred_styles: array  # Preferred font styles
          script_direction: string # ltr, rtl, vertical
        cultural_codes:
          symbols: array          # Positive symbols
          avoid_symbols: array    # Symbols to avoid

    visual_prompt:
      type: json
      required: false
      description: "AI visual generation presets for image, video, illustration, product_3d"
      properties:
        image:
          subject: object         # Subject description and elements
          style: object           # Style modifiers and weighted_modifiers
          color_palette: object   # Primary, secondary, avoid colors
          composition: object     # Balance, focal point, framing
          negative_prompts: object # Content, technical, style exclusions
        video:
          inherit_from: string    # Usually "image"
          cinematography: object  # Camera movements, shot types, transitions
          pacing: string          # fast, moderate, slow
        illustration:
          inherit_from: string    # Usually "image"
          technique: string       # vector, watercolor, ink, digital
        product_3d:
          inherit_from: string    # Usually "image"
          rendering: object       # Lighting, materials, environment

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: IN_REGION
        to: GeoRegion
        cardinality: "N:1"
        description: "Sub-region belongs to region"

    incoming:
      - type: IN_SUBREGION
        from: Locale
        cardinality: "N:1"
        description: "Locales within this sub-region"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE
  # ═══════════════════════════════════════════════════════════════════════════════
  example:
    data:
      key: "channel-islands"
      display_name: "Channel Islands"
      description: "Channel Islands between England and France"
      m49_code: 830
      parent_region: "northern-europe"
      llm_context: "USE: for Channel Islands markets (Jersey, Guernsey). TRIGGERS: channel islands, jersey, guernsey. NOT: UK mainland or France."

    cypher: |
      // Get all locales in a sub-region
      MATCH (sr:GeoSubRegion {key: $key})<-[:IN_SUBREGION]-(l:Locale)
      RETURN l.key, l.display_name
      ORDER BY l.key

      // Get full geographic hierarchy
      MATCH (sr:GeoSubRegion {key: $key})-[:IN_REGION]->(r:GeoRegion)-[:IN_CONTINENT]->(c:Continent)
      RETURN sr.key, r.key AS region, c.key AS continent
