# models/node-classes/shared/geography/lending-category.yaml
# LendingCategory - World Bank lending classification
#
# v0.13.1: LLM-First field ordering (llm_context promoted to BLOC 2)
# v10.8: Geographic Taxonomy - Phase 4
# Data: 3 categories (IDA, Blend, IBRD)
# Source: World Bank (data.worldbank.org)

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY
  # ═══════════════════════════════════════════════════════════════════════════════
  name: LendingCategory
  realm: shared
  layer: geography
  trait: defined

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (LLM-First)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "World Bank lending classification for development context"

  llm_context: |
    USE: when generating content considering development/lending context.
    TRIGGERS: "lending category", "IDA", "IBRD", "Blend", "World Bank lending", "development financing".
    NOT: for income classification (use IncomeGroup), for economic regions (use EconomicRegion).
    RELATES: Locale (child via HAS_LENDING_TYPE).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: "bank"
    terminal: "▣"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      description: "Lending category code"
      enum:
        - "ida"    # International Development Association (poorest)
        - "blend"  # Blend (eligible for both IDA and IBRD)
        - "ibrd"   # International Bank for Reconstruction and Development

    display_name:
      type: string
      required: true
      description: "Human-readable category name"
      example: "IBRD"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Middle-income and creditworthy low-income countries"

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    full_name:
      type: string
      required: true
      description: "Full organization name"
      example: "International Bank for Reconstruction and Development"

    target_countries:
      type: string
      required: false
      description: "Description of target countries"
      example: "Middle-income and creditworthy low-income countries"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    incoming:
      - type: HAS_LENDING_TYPE
        from: Locale
        cardinality: "N:1"
        description: "Locales classified in this lending category"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE
  # ═══════════════════════════════════════════════════════════════════════════════
  example:
    data:
      key: "ibrd"
      display_name: "IBRD"
      description: "Middle-income and creditworthy low-income countries"
      full_name: "International Bank for Reconstruction and Development"
      target_countries: "Middle-income and creditworthy low-income countries"
      llm_context: "USE: for established emerging markets. TRIGGERS: ibrd, middle income, developing, emerging. CONTEXT: growing economies, aspirational messaging, value-conscious."

    cypher: |
      // Get all locales in a lending category
      MATCH (lc:LendingCategory {key: $key})<-[:HAS_LENDING_TYPE]-(l:Locale)
      RETURN l.key, l.display_name
      ORDER BY l.key
