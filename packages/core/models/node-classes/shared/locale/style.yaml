# models/node-classes/shared/locale/style.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# Style - Communication style for a locale (tone, formality, directness, warmth, humor, identity)

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: Style
  realm: shared
  layer: locale
  trait: imported

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Communication style: tone, formality, directness, warmth, humor, identity traits"

  llm_context: |
    USE: when generating content with appropriate tone, formality, and style.
    TRIGGERS: "formality", "tone", "vous/tu", "register", "punctuation", "humor", "directness".
    NOT: for formatting (use Formatting), for content adaptation (use Adaptation).
    RELATES: Locale (via HAS_STYLE), context_matrix, pronoun_rules, register_transitions.

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: "drama"
    terminal: "◎"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      description: "Unique key (locale code)"
      example: "fr-FR"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) Style"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Tone, formality, and communication identity for fr-FR"

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    # ═══════════════════════════════════════════════════════════════════════════
    # FORMALITY SYSTEM
    # ═══════════════════════════════════════════════════════════════════════════
    formality_score:
      type: int
      required: true
      description: "Formality level 0-100 (0=very casual, 100=very formal)"
      example: 72

    formality_scale:
      type: json
      required: false
      description: "Formality score ranges with use cases"
      example:
        very_formal: "90-100: Legal, government, luxury"
        high: "70-89: Corporate B2B, banking, first contact"
        moderate: "50-69: Standard e-commerce, B2C"
        casual: "30-49: Tech startups, youth brands"
        very_casual: "0-29: Gaming, peer-to-peer"

    default_formality:
      type: string
      required: true
      enum: ["formal", "casual", "mixed"]
      description: "Default formality level"
      example: "formal"

    default_pronoun:
      type: string
      required: false
      description: "Default pronoun (vous, tu, Sie, du, usted, tú)"
      example: "vous"

    pronoun_rules:
      type: json
      required: false
      description: "Pronoun usage rules by context"
      example:
        formal: "vous"
        casual: "tu"
        never_switch_mid_conversation: true
        escalation_increases_formality: true

    formality_default:
      type: string
      required: true
      enum: ["formal", "informal", "neutral"]
      description: "Default formality level for this locale"
      example: "formal"
      llm_context: "Base formality unless context specifies otherwise"

    pronoun_preference:
      type: string
      required: false
      enum: ["tu", "vous", "usted", "du", "sie", "mixed", "n_a"]
      description: "Preferred pronoun form for direct address"
      example: "vous"
      llm_context: "Use this pronoun form when addressing the reader"

    directness_level:
      type: string
      required: true
      enum: ["direct", "indirect", "balanced"]
      description: "Communication directness preference"
      example: "indirect"
      llm_context: "Direct = explicit CTAs; Indirect = softer suggestions; Balanced = context-dependent"

    warmth_level:
      type: string
      required: true
      enum: ["warm", "neutral", "reserved"]
      description: "Emotional warmth in communication"
      example: "neutral"
      llm_context: "Warm = expressive; Neutral = professional; Reserved = restrained"

    formality_rules:
      type: json
      required: false
      description: "Context-specific formality overrides"
      example:
        b2b: "formal"
        b2c_youth: "informal"
        legal: "formal"
        support_escalation: "formal"
        marketing_promo: "casual"

    length_preferences:
      type: json
      required: false
      description: "Preferred content lengths by type (in characters)"
      example:
        headline: 60
        subhead: 120
        body_paragraph: 150
        cta: 25
        meta_description: 155

    seo_preferences:
      type: json
      required: false
      description: "SEO-related style preferences"
      example:
        keywords_per_100_words: 2
        heading_style: "question"
        meta_length: 155
        title_format: "primary | brand"

    tone_modifiers:
      type: json
      required: false
      description: "Tone adjustments by context"
      example:
        urgency: "soft"
        celebration: "expressive"
        error: "apologetic"
        success: "warm"
        warning: "direct"

    # ═══════════════════════════════════════════════════════════════════════════
    # CONTEXT MATRIX
    # ═══════════════════════════════════════════════════════════════════════════
    context_matrix:
      type: json
      required: true
      description: "Decision matrix for formality by context, industry, and audience"
      example:
        b2b_corporate:
          industry: "Finance, Legal, Insurance"
          audience: "Decision makers"
          formality: "very_formal"
          notes: "Use titles (Madame, Monsieur)"
        b2b_tech:
          industry: "SaaS, Enterprise"
          audience: "IT directors, CTOs"
          formality: "high"
          notes: "Technical precision, warmth appreciated"
        b2c_premium:
          industry: "Luxury, Fashion"
          audience: "35+, affluent"
          formality: "very_formal"
          notes: "Sophistication expected"

    # ═══════════════════════════════════════════════════════════════════════════
    # DIRECTNESS
    # ═══════════════════════════════════════════════════════════════════════════
    directness_score:
      type: int
      required: true
      description: "Directness level 0-100 (0=very indirect, 100=very direct)"
      example: 45

    directness_style:
      type: string
      required: true
      enum: ["direct", "indirect", "balanced"]
      description: "Overall directness style"
      example: "indirect"

    softening_patterns:
      type: json
      required: false
      description: "Patterns for softening direct statements"
      example:
        requests: "Pourriez-vous..., Il serait préférable de..."
        negatives: "Difficile rather than Impossible"
        directives: "Nous vous proposons... rather than Vous devez..."

    # ═══════════════════════════════════════════════════════════════════════════
    # WARMTH
    # ═══════════════════════════════════════════════════════════════════════════
    warmth_score:
      type: int
      required: false
      description: "Overall warmth level 0-100"
      example: 55

    warmth_by_stage:
      type: json
      required: false
      description: "Warmth levels by relationship stage"
      example:
        initial: 45
        established: 60
        longterm: 70

    warmth_expression:
      type: json
      required: false
      description: "How warmth is expressed in this culture"
      example:
        - "Intellectual engagement over emotional display"
        - "Recognition of loyalty"
        - "Attention to detail shows respect"

    # ═══════════════════════════════════════════════════════════════════════════
    # HUMOR
    # ═══════════════════════════════════════════════════════════════════════════
    humor_score:
      type: int
      required: false
      description: "Humor acceptance level 0-100"
      example: 40

    humor_types:
      type: json
      required: false
      description: "Acceptability of humor types"
      example:
        wordplay: "acceptable"
        self_deprecating: "encouraged"
        irony: "subtle only"
        slapstick: "avoid"

    # ═══════════════════════════════════════════════════════════════════════════
    # SENTENCE STYLE
    # ═══════════════════════════════════════════════════════════════════════════
    avg_sentence_length:
      type: int
      required: false
      description: "Average sentence length in words"
      example: 18

    sentence_length_ranges:
      type: json
      required: false
      description: "Sentence length ranges by context"
      example:
        short: "8-15 words (CTAs, headlines)"
        medium: "16-25 words (standard content)"
        long: "26-40 words (complex explanations)"

    preferred_voice:
      type: string
      required: false
      enum: ["active", "passive", "mixed"]
      description: "Preferred grammatical voice"
      example: "mixed"

    rhythm_style:
      type: string
      required: false
      description: "Writing rhythm"
      example: "sophisticated"

    # ═══════════════════════════════════════════════════════════════════════════
    # PUNCTUATION
    # ═══════════════════════════════════════════════════════════════════════════
    punctuation_rules:
      type: json
      required: false
      description: "Punctuation conventions"
      example:
        period: "no space before, one after"
        comma: "no space before, one after"
        colon: "non-breaking space before, one after"
        semicolon: "non-breaking space before, one after"
        question: "non-breaking space before, one after"
        exclamation: "non-breaking space before, one after"
        quotes: "guillemets with spaces: « text »"

    exclamation_usage:
      type: string
      required: false
      enum: ["frequent", "moderate", "rare", "avoid"]
      description: "How often exclamation marks are appropriate"
      example: "rare"

    # ═══════════════════════════════════════════════════════════════════════════
    # HONORIFICS
    # ═══════════════════════════════════════════════════════════════════════════
    honorific_system:
      type: json
      required: false
      description: "Honorific system (titles, levels, usage)"
      example:
        monsieur: "Standard formal for men"
        madame: "Standard formal for women (mademoiselle deprecated since 2012)"
        maitre: "Professional title for lawyers"
        docteur: "Professional title for doctors"

    # ═══════════════════════════════════════════════════════════════════════════
    # REGISTER TRANSITIONS
    # ═══════════════════════════════════════════════════════════════════════════
    register_transitions:
      type: json
      required: false
      description: "When and how to shift formality register"
      example:
        increase_formality:
          - "Escalation or complaint"
          - "Legal, financial, compliance matters"
          - "Error or apology"
        decrease_formality:
          - "Customer explicitly uses tu first AND brand allows"
          - "Established relationship (6+ months)"
        critical_rule: "Never decrease formality without explicit customer signal"

    # ═══════════════════════════════════════════════════════════════════════════
    # IDENTITY
    # ═══════════════════════════════════════════════════════════════════════════
    self_references:
      type: json
      required: false
      description: "How to refer to brand"
      example:
        company: "nous"
        product: "notre solution"

    reader_references:
      type: json
      required: false
      description: "How to refer to reader"
      example:
        formal: "vous"
        familiar: "tu"

    authority_style:
      type: string
      required: false
      enum: ["expert", "peer", "guide", "helper"]
      description: "Brand authority positioning"
      example: "expert"

    personality_traits:
      type: json
      required: false
      description: "Brand personality traits"
      example: ["professional", "trustworthy", "innovative"]

    # ═══════════════════════════════════════════════════════════════════════════
    # RAW MARKDOWN
    # ═══════════════════════════════════════════════════════════════════════════
    raw_markdown:
      type: string
      required: false
      description: "Full source markdown for LLM context (includes examples, edge cases)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    incoming:
      - type: HAS_STYLE
        from: Locale
        cardinality: "1:1"
        description: "Locale has exactly one style config"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX style_key IF NOT EXISTS FOR (s:Style) ON (s.key)"
      - "CREATE INDEX style_formality IF NOT EXISTS FOR (s:Style) ON (s.formality_score)"

  example:
    data:
      key: "fr-FR"
      display_name: "French (France) Style"
      formality_score: 72
      default_formality: "formal"
      directness_score: 45
      directness_style: "indirect"
    cypher: |
      MATCH (l:Locale {key: $locale})-[:HAS_STYLE]->(s:Style)
      RETURN s.key, s.formality_score, s.context_matrix, s.pronoun_rules
