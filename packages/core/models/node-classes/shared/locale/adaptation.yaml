# ═══════════════════════════════════════════════════════════════════════════════
# NodeClass: Adaptation — Content adaptation rules for FACTS vs ILLUSTRATIONS
# v0.13.1: LLM-First property ordering
# ═══════════════════════════════════════════════════════════════════════════════

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY
  # ═══════════════════════════════════════════════════════════════════════════════

  name: Adaptation
  realm: shared
  layer: locale
  trait: imported

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC
  # ═══════════════════════════════════════════════════════════════════════════════

  display_name: "Adaptation"
  description: "Content adaptation rules for FACTS vs ILLUSTRATIONS classification and technical term handling. Core decision engine for what to translate literally vs generate natively."
  llm_context: |
    USE: when deciding content adaptation strategy (FACT vs ILLUSTRATION).
    TRIGGERS: "localization", "adaptation", "idioms", "metaphors", "technical terms", "translate vs generate".
    NOT: for formatting (use Formatting), for style (use Style), for culture (use Culture).
    RELATES: Locale (via HAS_ADAPTATION), FACTS=translate literally, ILLUSTRATIONS=generate native.

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL
  # ═══════════════════════════════════════════════════════════════════════════════

  icon:
    web: "droplet"
    terminal: "◇"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA — Standard Properties
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique key (locale code)"
      example: "fr-FR"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) Adaptation"

    description:
      type: string
      required: true
      description: "Short description"
      example: "FACTS/ILLUSTRATIONS content adaptation rules for fr-FR"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints"
      example: "USE: content adaptation decisions. TRIGGERS: localization, examples, idioms, metaphors. KEY: FACTS=translate literally, ILLUSTRATIONS=generate native. NOT: formatting (use Formatting), style (use Style), culture (use Culture)."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA — Adaptation-Specific Properties
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    # =========================================================================
    # TIER 1: INDEXED SCALARS (Cypher-queryable)
    # =========================================================================
    technical_terms_approach:
      type: string
      required: true
      enum: ["local_only", "english_accepted", "mixed"]
      description: "How to handle technical/borrowed terms"
      llm_context: "local_only = always use local equivalent; english_accepted = English terms OK; mixed = depends on context"
      example: "mixed"

    illustration_density:
      type: string
      required: true
      enum: ["high", "medium", "low"]
      description: "Preference for culturally-specific illustrations"
      llm_context: "high = maximize local references; low = prefer universal examples"
      example: "medium"

    # =========================================================================
    # TIER 2: STRUCTURED JSON (programmatic lookup)
    # =========================================================================
    technical_terms_preferred:
      type: json
      required: false
      description: "Mapping of English terms to preferred local equivalents"
      example:
        computer: "ordinateur"
        software: "logiciel"
        download: "telecharger"
        password: "mot de passe"
        email: "courriel"
        cloud: "nuage informatique"

    technical_terms_accepted:
      type: json
      required: false
      description: "English terms acceptable without translation"
      example: ["smartphone", "email", "Wi-Fi", "QR code", "URL", "hashtag", "start-up"]

    common_errors:
      type: json
      required: false
      description: "Common adaptation errors to avoid"
      example:
        - error: "using English word 'email' when 'courriel' is preferred"
          correct: "use 'courriel' in formal contexts"
          why: "perceived as lazy in formal communication"
        - error: "literal translation of idioms"
          correct: "generate native equivalent"
          why: "sounds unnatural and confusing"

    false_friends:
      type: json
      required: false
      description: "False cognates to watch for"
      example:
        - word: "actually"
          trap: "actuellement"
          correct: "en fait"
        - word: "eventually"
          trap: "eventuellement"
          correct: "finalement"
        - word: "location"
          trap: "location"
          correct: "emplacement"

    facts_classification:
      type: json
      required: true
      description: "Classification rules for FACT vs ILLUSTRATION"
      example:
        # FACTS: Translate literally, format appropriately
        proper_names: "FACT"
        brand_names: "FACT"
        statistics: "FACT"
        legal_terms: "FACT"
        technical_specs: "FACT"
        dates_times: "FACT"
        prices_currencies: "FACT"
        contact_info: "FACT"
        # ILLUSTRATIONS: Generate native equivalents
        idioms: "ILLUSTRATION"
        metaphors: "ILLUSTRATION"
        cultural_references: "ILLUSTRATION"
        sports_analogies: "ILLUSTRATION"
        food_examples: "ILLUSTRATION"
        humor: "ILLUSTRATION"
        seasonal_references: "ILLUSTRATION"
        geographic_references: "ILLUSTRATION"

    # =========================================================================
    # TIER 3: LLM CONTEXT (narrative text)
    # =========================================================================
    adaptation_summary:
      type: text
      required: true
      description: "200-word distilled summary always loaded in LLM context"
      example: "French adaptation prioritizes formality and precision. Technical terms use mixed approach..."

    decision_algorithm:
      type: text
      required: true
      description: "Step-by-step flowchart for FACT/ILLUSTRATION classification"
      example: |
        1. Is it a proper noun? -> FACT (keep original)
        2. Is it a number/date? -> FACT (format locally)
        3. Is it an idiom/metaphor? -> ILLUSTRATION (generate native)
        4. Is it a cultural reference? -> ILLUSTRATION (generate native)
        5. Default: Evaluate context and decide

    validation_checklist:
      type: text
      required: false
      description: "QA checklist for adaptation review"
      example: |
        [ ] All proper nouns preserved
        [ ] Numbers formatted for locale
        [ ] No literal idiom translations
        [ ] Cultural references localized
        [ ] Technical terms follow approach

    raw_markdown:
      type: text
      required: false
      description: "Full source markdown for edge cases"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH — Relations
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    incoming:
      - type: HAS_ADAPTATION
        from: Locale
        cardinality: "1:1"
        description: "Locale has exactly one adaptation config"
