# ═══════════════════════════════════════════════════════════════════════════════
# NodeClass: Slugification — URL slug generation rules for a locale
# v0.13.1: LLM-First property ordering
# ═══════════════════════════════════════════════════════════════════════════════

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════

  name: Slugification
  realm: shared
  layer: locale
  trait: imported

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════

  description: "URL slug rules: transliteration, stop words, URL conventions"
  llm_context: |
    USE: when generating URL slugs from titles or content.
    TRIGGERS: "slug", "URL", "permalink", "SEO URL", "transliteration".
    NOT: for content text (use Style), for translation decisions (use Adaptation).
    RELATES: Locale (via HAS_SLUGIFICATION), slug_rule (latin_preserve/native_script), stopwords, transliteration_map.

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════

  icon:
    web: "link"
    terminal: "⌘"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique key (locale code)"
      example: "fr-FR"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) Slugification"

    description:
      type: string
      required: true
      description: "Short description"
      example: "URL slug generation rules for fr-FR"

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  
  properties:
    # ═══════════════════════════════════════════════════════════════════════════
    # CORE SLUG RULE
    # ═══════════════════════════════════════════════════════════════════════════
    slug_rule:
      type: string
      required: true
      enum: ["latin_preserve", "latin_strip", "native_script", "transliterate"]
      description: |
        Base slug generation strategy:
        - latin_preserve: Keep diacritics (e, c, u) in UTF-8 (French, German, Spanish)
        - latin_strip: Remove diacritics (e->e, c->c) to ASCII (US English, SEO-focused)
        - native_script: Preserve non-Latin scripts in UTF-8 (Arabic, Chinese, Japanese, Korean, Thai, Hebrew)
        - transliterate: Convert all to ASCII via transliteration map (legacy systems)
      example: "latin_preserve"

    preserve_diacritics:
      type: bool
      required: true
      description: "Keep accented characters (true for latin_preserve/native_script, false for latin_strip/transliterate)"
      example: true

    unicode_normalization:
      type: string
      required: true
      enum: ["NFC", "NFD", "NFKC", "NFKD"]
      description: "Unicode normalization form (NFC = composed, NFD = decomposed)"
      example: "NFC"

    # ═══════════════════════════════════════════════════════════════════════════
    # LENGTH CONSTRAINTS
    # ═══════════════════════════════════════════════════════════════════════════
    min_length:
      type: int
      required: true
      description: "Minimum slug length (typically 3)"
      example: 3

    max_length:
      type: int
      required: true
      description: "Maximum slug length (typically 80)"
      example: 80

    # ═══════════════════════════════════════════════════════════════════════════
    # CHARACTER HANDLING
    # ═══════════════════════════════════════════════════════════════════════════
    separator:
      type: string
      required: true
      description: "Word separator in slugs"
      example: "-"

    lowercase:
      type: bool
      required: true
      description: "Force lowercase (true for most, false for scripts without case like Arabic)"
      example: true

    preserve_numbers:
      type: bool
      required: true
      description: "Keep numbers in slugs"
      example: true

    character_filter_regex:
      type: string
      required: false
      description: "Regex for allowed characters (Unicode-aware)"
      example: "[^\\p{L}\\p{N}\\s-]"

    word_boundaries:
      type: json
      required: false
      description: "Characters that create word boundaries"
      example: ["'", "'", "-", " "]

    # ═══════════════════════════════════════════════════════════════════════════
    # TRANSLITERATION (for latin_strip/transliterate rules)
    # ═══════════════════════════════════════════════════════════════════════════
    transliteration_map:
      type: json
      required: false
      description: "Character replacement map (only for latin_strip/transliterate)"
      example:
        é: "e"
        è: "e"
        ê: "e"
        ë: "e"
        à: "a"
        â: "a"
        ç: "c"
        ù: "u"
        û: "u"
        ü: "u"
        î: "i"
        ï: "i"
        ô: "o"
        œ: "oe"
        æ: "ae"

    abbreviation_expansions:
      type: json
      required: false
      description: "Abbreviations to expand in slugs"
      example:
        "n°": "numero"
        "&": "et"

    # ═══════════════════════════════════════════════════════════════════════════
    # STOPWORDS
    # ═══════════════════════════════════════════════════════════════════════════
    stop_words:
      type: json
      required: true
      description: "Words to remove from slugs"
      example: ["le", "la", "les", "un", "une", "des", "du", "de", "et", "ou", "a", "en", "pour", "par", "sur", "avec"]

    locale_specific_stopwords:
      type: json
      required: false
      description: "Additional stopwords specific to this locale variant"
      example: []

    stopwords_by_category:
      type: json
      required: false
      description: "Stopwords organized by grammatical category (for analysis, optional)"
      example:
        articles: ["le", "la", "les", "un", "une"]
        prepositions: ["de", "du", "des", "a", "au", "aux", "en", "dans", "pour", "par", "sur", "avec"]
        conjunctions: ["et", "ou", "mais", "car"]
        pronouns: ["que", "qui", "ce", "se", "il", "elle", "on"]
        verbs: ["est", "sont", "etre", "avoir"]

    # ═══════════════════════════════════════════════════════════════════════════
    # SCRIPT-SPECIFIC (for native_script rule)
    # ═══════════════════════════════════════════════════════════════════════════
    script_range:
      type: string
      required: false
      description: "Unicode range for native script (e.g., U+0600-U+06FF for Arabic)"
      example: "U+0600-U+06FF"

    remove_diacritical_marks:
      type: json
      required: false
      description: "Diacritical marks to remove (e.g., Arabic tashkeel)"
      example: ["\\u064B-\\u065F", "\\u0670"]

    # ═══════════════════════════════════════════════════════════════════════════
    # RAW MARKDOWN (Hybrid approach)
    # ═══════════════════════════════════════════════════════════════════════════
    raw_markdown:
      type: string
      required: false
      description: "Full source markdown for LLM context (includes examples, edge cases, implementation)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    incoming:
      - type: HAS_SLUGIFICATION
        from: Locale
        cardinality: "1:1"
        description: "Locale has exactly one slugification config"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX slugification_key IF NOT EXISTS FOR (s:Slugification) ON (s.key)"

  example:
    data:
      key: "fr-FR"
      display_name: "French (France) Slugification"
      slug_rule: "latin_preserve"
      preserve_diacritics: true
      separator: "-"
    cypher: |
      MATCH (l:Locale {key: $locale})-[:HAS_SLUGIFICATION]->(s:Slugification)
      RETURN s.key, s.slug_rule, s.stop_words, s.transliteration_map
