# models/node-classes/shared/knowledge/taboo-set.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# TabooSet - Container grouping Taboo atoms by severity

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: TabooSet
  realm: shared
  layer: knowledge
  trait: defined  # Containers are universal categories (defined), atoms are locale-native (imported)

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Container grouping Taboo atoms by severity. Pure container (data lives in Taboo atoms)."

  llm_context: |
    USE: when finding taboos by severity level for content validation.
    TRIGGERS: "taboos", "forbidden", "avoid", "safety", "taboo container".
    NOT: for individual taboo items (use Taboo via CONTAINS_TABOO).
    RELATES: Taboo (contains via CONTAINS_TABOO), Locale (owner via HAS_TABOOS).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: ban
    terminal: "⊘"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) Avoid Topics"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Topics to never mention for fr-FR"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    severity:
      type: string
      required: true
      enum: [avoid, careful, legal]
      description: "Taboo severity level this set groups"
      example: "avoid"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: CONTAINS_TABOO
        to: Taboo
        cardinality: "1:N"
        description: "TabooSet contains multiple Taboo atoms"

    incoming:
      - type: HAS_TABOOS
        from: Locale
        cardinality: "1:N"
        description: "Locale has taboo sets (one per severity)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX tabooset_severity IF NOT EXISTS FOR (ts:TabooSet) ON (ts.severity)"

  example:
    data:
      display_name: "French (France) Avoid Topics"
      description: "Topics to never mention for fr-FR"
      severity: "avoid"
    cypher: |
      MATCH (l:Locale {key: "fr-FR"})
      CREATE (ts:TabooSet {
        display_name: 'French (France) Avoid Topics',
        description: 'Topics to never mention for fr-FR',
        severity: 'avoid',
        created_at: datetime(),
        updated_at: datetime()
      })
      CREATE (l)-[:HAS_TABOOS]->(ts)
      RETURN ts
