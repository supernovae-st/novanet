# models/node-classes/shared/knowledge/atoms/pattern.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# Pattern - Content structure template within a PatternSet

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: Pattern
  realm: shared
  layer: knowledge
  trait: imported

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Content structure pattern or template belonging to a locale's PatternSet."

  llm_context: |
    USE: when generating structured content with locale-specific templates.
    TRIGGERS: "pattern", "template", "structure", "cta", "headline".
    NOT: for vocabulary (use Term), for idioms (use Expression).
    RELATES: PatternSet (parent via CONTAINS), Locale (owner via HAS_PATTERNS).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: clipboard
    terminal: "▤"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      pattern: "^[a-z][a-z0-9_]*$"
      description: "Unique identifier within the PatternSet"
      example: "cta_primary"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "Primary CTA Pattern"

    description:
      type: string
      required: false
      description: "When to use this pattern"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    template:
      type: string
      required: true
      description: "The pattern template with {variables}"
      examples:
        - "Découvrez {product} dès maintenant"
        - "Unlock {benefit} with {product}"
        - "{benefit} — {product} macht's möglich"

    context:
      type: string
      required: true
      enum: [landing, product, checkout, email, social, blog, support, legal]
      description: "Content context where this pattern applies"
      example: "landing"

    element:
      type: string
      required: true
      enum: [headline, subheadline, cta, intro, body, bullet, caption, meta_title, meta_desc]
      description: "Content element type"
      example: "cta"

    variables:
      type: json
      required: true
      description: "Variables used in the template"
      example:
        product: "Product or service name"
        benefit: "Key benefit or value prop"

    constraints:
      type: json
      required: false
      description: "Length and format constraints"
      example:
        max_chars: 50
        max_words: 8

    tone:
      type: string
      required: false
      enum: [urgent, confident, friendly, professional, playful]
      description: "Tone this pattern conveys"

    examples:
      type: "string[]"
      required: false
      description: "Rendered examples of this pattern"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    incoming:
      - type: CONTAINS_PATTERN
        from: PatternSet
        cardinality: "1:N"
        description: "PatternSet contains multiple Patterns"

    outgoing: []

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX pattern_context IF NOT EXISTS FOR (p:Pattern) ON (p.context)"
      - "CREATE INDEX pattern_element IF NOT EXISTS FOR (p:Pattern) ON (p.element)"

  example:
    data:
      key: "cta_discover"
      display_name: "Discover CTA"
      template: "Découvrez {product} dès maintenant"
      context: "landing"
      element: "cta"
      variables:
        product: "Product name"
      constraints:
        max_chars: 40
      tone: "confident"
    cypher: |
      MATCH (ps:PatternSet {context: "marketing"})<-[:HAS_PATTERNS]-(l:Locale {key: "fr-FR"})
      CREATE (p:Pattern {
        key: 'cta_discover',
        display_name: 'Discover CTA',
        template: 'Découvrez {product} dès maintenant',
        context: 'landing',
        element: 'cta',
        tone: 'confident',
        created_at: datetime(),
        updated_at: datetime()
      })
      CREATE (ps)-[:CONTAINS_PATTERN]->(p)
      RETURN p
