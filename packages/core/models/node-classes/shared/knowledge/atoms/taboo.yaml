# models/node-classes/shared/knowledge/atoms/taboo.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# Taboo - Forbidden term or concept within a TabooSet

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: Taboo
  realm: shared
  layer: knowledge
  trait: imported

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Forbidden term, phrase, or concept that should be avoided in a locale."

  llm_context: |
    USE: when validating content for cultural appropriateness, filtering forbidden terms.
    TRIGGERS: "taboo", "forbidden", "avoid", "cultural restriction", "inappropriate".
    NOT: for expressions to use (use Expression), for cultural context (use CultureRef).
    RELATES: TabooSet (parent via CONTAINS), Locale (owner via HAS_TABOOS).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: ban
    terminal: "⊘"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      pattern: "^[a-z][a-z0-9_]*$"
      description: "Unique identifier within the TabooSet"
      example: "death_direct"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "Direct Death Reference"

    description:
      type: string
      required: false
      description: "Why this is taboo and when to avoid"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    term:
      type: string
      required: true
      description: "The term or phrase to avoid"
      examples:
        - "mort"
        - "死"
        - "death"

    type:
      type: string
      required: true
      enum: [word, phrase, concept, imagery, topic, gesture]
      description: "Type of taboo"
      example: "word"

    severity:
      type: string
      required: true
      enum: [critical, high, medium, low]
      description: "How strictly to avoid"
      example: "high"

    category:
      type: string
      required: true
      enum: [death, religion, politics, sexuality, violence, discrimination, profanity, health, legal]
      description: "Taboo category"
      example: "death"

    context_scope:
      type: "string[]"
      required: false
      description: "Contexts where this taboo applies"
      example: ["marketing", "social_media", "advertising"]

    exceptions:
      type: "string[]"
      required: false
      description: "Contexts where taboo doesn't apply"
      example: ["healthcare", "legal", "insurance"]

    alternatives:
      type: "string[]"
      required: true
      description: "Safe alternative terms to use instead"
      example: ["décédé", "disparu", "qui nous a quittés"]

    reason:
      type: string
      required: false
      description: "Cultural or business reason for the taboo"

    legal_requirement:
      type: boolean
      required: false
      default: false
      description: "Is this a legal/compliance requirement?"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    incoming:
      - type: CONTAINS_TABOO
        from: TabooSet
        cardinality: "1:N"
        description: "TabooSet contains multiple Taboos"

    outgoing: []

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX taboo_severity IF NOT EXISTS FOR (t:Taboo) ON (t.severity)"
      - "CREATE INDEX taboo_category IF NOT EXISTS FOR (t:Taboo) ON (t.category)"

  example:
    data:
      key: "death_direct_fr"
      display_name: "Direct Death Reference"
      term: "mort"
      type: "word"
      severity: "high"
      category: "death"
      context_scope: ["marketing", "advertising"]
      exceptions: ["healthcare", "insurance"]
      alternatives: ["décédé", "disparu"]
      reason: "Direct mention considered insensitive in French marketing"
    cypher: |
      MATCH (ts:TabooSet)<-[:HAS_TABOOS]-(l:Locale {key: "fr-FR"})
      CREATE (t:Taboo {
        key: 'death_direct',
        display_name: 'Direct Death Reference',
        term: 'mort',
        type: 'word',
        severity: 'high',
        category: 'death',
        created_at: datetime(),
        updated_at: datetime()
      })
      CREATE (ts)-[:CONTAINS_TABOO]->(t)
      RETURN t
