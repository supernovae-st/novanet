# models/node-classes/shared/knowledge/atoms/culture-ref.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# CultureRef - Cultural reference within a CultureSet

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: CultureRef
  realm: shared
  layer: knowledge
  trait: imported

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Cultural reference, holiday, custom, or shared knowledge within a locale."

  llm_context: |
    USE: when incorporating cultural context into content generation.
    TRIGGERS: "culture", "holiday", "tradition", "cultural reference", "event".
    NOT: for terms (use Term), for taboos (use Taboo).
    RELATES: CultureSet (parent via CONTAINS), Locale (owner via HAS_CULTURE).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: drama
    terminal: "◎"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      pattern: "^[a-z][a-z0-9_]*$"
      description: "Unique identifier within the CultureSet"
      example: "bastille_day"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "Bastille Day"

    description:
      type: string
      required: false
      description: "What this reference means culturally"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    reference:
      type: string
      required: true
      description: "The cultural reference name in the locale"
      examples:
        - "14 juillet"
        - "Super Bowl"
        - "ゴールデンウィーク"

    type:
      type: string
      required: true
      enum: [holiday, event, tradition, food, sport, entertainment, history, saying, symbol]
      description: "Type of cultural reference"
      example: "holiday"

    recognition_level:
      type: string
      required: true
      enum: [universal, widespread, regional, niche]
      description: "How widely recognized in the locale"
      example: "universal"

    sentiment:
      type: string
      required: false
      enum: [positive, neutral, mixed, solemn, celebratory]
      description: "Cultural sentiment associated"

    timing:
      type: json
      required: false
      description: "When this reference is most relevant"
      example:
        month: 7
        day: 14

    safe_for:
      type: "string[]"
      required: true
      description: "Content contexts where safe to reference"
      example: ["marketing", "social_media", "advertising"]

    caution_for:
      type: "string[]"
      required: false
      description: "Contexts requiring careful use"

    associated_imagery:
      type: "string[]"
      required: false
      description: "Visual elements associated with this reference"

    related_terms:
      type: "string[]"
      required: false
      description: "Related vocabulary and expressions"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    incoming:
      - type: CONTAINS_CULTURE_REF
        from: CultureSet
        cardinality: "1:N"
        description: "CultureSet contains multiple CultureRefs"

    outgoing: []

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX cultureref_type IF NOT EXISTS FOR (cr:CultureRef) ON (cr.type)"
      - "CREATE INDEX cultureref_recognition IF NOT EXISTS FOR (cr:CultureRef) ON (cr.recognition_level)"

  example:
    data:
      key: "bastille_day"
      display_name: "Bastille Day"
      reference: "14 juillet"
      type: "holiday"
      recognition_level: "universal"
      sentiment: "celebratory"
      timing:
        month: 7
        day: 14
      safe_for: ["marketing", "social_media"]
      associated_imagery: ["fireworks", "tricolor"]
    cypher: |
      MATCH (cs:CultureSet)<-[:HAS_CULTURE]-(l:Locale {key: "fr-FR"})
      CREATE (cr:CultureRef {
        key: 'bastille_day',
        display_name: 'Bastille Day',
        reference: '14 juillet',
        type: 'holiday',
        recognition_level: 'universal',
        sentiment: 'celebratory',
        created_at: datetime(),
        updated_at: datetime()
      })
      CREATE (cs)-[:CONTAINS_CULTURE_REF]->(cr)
      RETURN cr
