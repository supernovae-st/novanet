# models/node-classes/shared/knowledge/atoms/term.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# Term - Individual vocabulary item within a TermSet

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: Term
  realm: shared
  layer: knowledge
  trait: imported

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Individual vocabulary term belonging to a locale's TermSet. Locale-native: each locale has its own unique terms."

  llm_context: |
    USE: when loading locale-specific vocabulary for content generation.
    TRIGGERS: "term", "vocabulary", "word", "phrase", "terminology".
    NOT: for idioms/expressions (use Expression), for patterns (use Pattern).
    RELATES: TermSet (parent via CONTAINS), Locale (owner via HAS_TERMS).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: edit
    terminal: "✎"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      pattern: "^[a-z][a-z0-9_]*$"
      description: "Unique identifier within the TermSet"
      example: "subscription_monthly"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "Monthly Subscription"

    description:
      type: string
      required: false
      description: "Usage notes for this term"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    value:
      type: string
      required: true
      description: "The actual term/phrase in the target locale"
      examples:
        - "abonnement mensuel"
        - "subscription plan"
        - "monatliches Abo"

    domain:
      type: string
      required: true
      enum: [pricing, features, technical, marketing, support, legal, general]
      description: "Vocabulary domain this term belongs to"
      example: "pricing"

    register:
      type: string
      required: false
      enum: [formal, neutral, casual, technical]
      default: "neutral"
      description: "Language register/formality level"

    part_of_speech:
      type: string
      required: false
      enum: [noun, verb, adjective, adverb, phrase]
      description: "Grammatical category"

    synonyms:
      type: "string[]"
      required: false
      description: "Alternative terms with same meaning"

    avoid_in_context:
      type: "string[]"
      required: false
      description: "Contexts where this term should NOT be used"

    prefer_over:
      type: "string[]"
      required: false
      description: "Terms this should replace (avoid list)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    incoming:
      - type: CONTAINS_TERM
        from: TermSet
        cardinality: "1:N"
        description: "TermSet contains multiple Terms"

    outgoing: []

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX term_domain IF NOT EXISTS FOR (t:Term) ON (t.domain)"
      - "CREATE INDEX term_register IF NOT EXISTS FOR (t:Term) ON (t.register)"

  example:
    data:
      key: "subscription_monthly"
      display_name: "Monthly Subscription"
      value: "abonnement mensuel"
      domain: "pricing"
      register: "formal"
      part_of_speech: "noun"
      synonyms: ["formule mensuelle"]
    cypher: |
      MATCH (ts:TermSet {domain: "pricing"})<-[:HAS_TERMS]-(l:Locale {key: "fr-FR"})
      CREATE (t:Term {
        key: 'subscription_monthly',
        display_name: 'Monthly Subscription',
        value: 'abonnement mensuel',
        domain: 'pricing',
        register: 'formal',
        created_at: datetime(),
        updated_at: datetime()
      })
      CREATE (ts)-[:CONTAINS_TERM]->(t)
      RETURN t
