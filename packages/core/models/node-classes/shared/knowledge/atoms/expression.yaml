# models/node-classes/shared/knowledge/atoms/expression.yaml
# Expression — Individual idiom, phrase, or template within an ExpressionSet
#
# Locale-native: each locale has its own unique expressions (no invariant parent)
# Parent: ExpressionSet (via CONTAINS arc)

node:
  name: Expression
  realm: shared
  layer: knowledge
  trait: imported
  icon:
    web: "message-square"
    terminal: "◇"
  description: |
    Individual expression, idiom, or phrase template belonging to a locale's ExpressionSet.
    USE: When generating locale-native phrases, greetings, or closings.
    TRIGGERS: expression, idiom, phrase, greeting, closing, native wording.
    NOT: For terms (use Term), for patterns (use Pattern).

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier within the ExpressionSet"
      pattern: "^[a-z][a-z0-9_]*$"
      examples:
        - "greeting_formal"
        - "closing_email_warm"
        - "apology_sincere"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "Formal Greeting"

    description:
      type: string
      required: false
      description: "When and how to use this expression"
      example: "Opening for formal business correspondence"

    llm_context:
      type: string
      required: false
      description: "Generation context hints"
      example: "USE: email openings, formal letters. NOT: chat, social media."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    text:
      type: string
      required: true
      description: "The actual expression/phrase in the target locale"
      examples:
        - "Veuillez agréer l'expression de mes sentiments distingués"
        - "Best regards"
        - "Mit freundlichen Grüßen"

    tone:
      type: string
      required: true
      enum: [formal, warm, casual, energetic, empathetic, authoritative, friendly]
      description: "Emotional tone of the expression"
      example: "formal"

    formality:
      type: string
      required: true
      enum: [very_formal, formal, neutral, casual, very_casual]
      description: "Formality level"
      example: "very_formal"

    use_case:
      type: string
      required: true
      enum: [greeting, closing, apology, thanks, request, confirmation, warning, celebration]
      description: "Primary use case category"
      example: "closing"

    channel:
      type: json
      required: false
      description: "Appropriate channels for this expression"
      example:
        - "email"
        - "letter"
        - "formal_document"

    audience:
      type: json
      required: false
      description: "Target audience segments"
      example:
        - "b2b"
        - "enterprise"
        - "government"

    variables:
      type: json
      required: false
      description: "Placeholder variables in the phrase"
      example:
        name: "Recipient name"
        title: "Professional title"

    alternatives:
      type: json
      required: false
      description: "Alternative expressions for same use case"
      example:
        - "Cordialement"
        - "Bien à vous"

  relations:
    incoming:
      - type: CONTAINS
        from: ExpressionSet
        cardinality: "1:N"
        description: "ExpressionSet contains multiple Expressions"

  example:
    data:
      key: "closing_formal_fr"
      display_name: "Formal Letter Closing"
      text: "Veuillez agréer l'expression de mes sentiments distingués"
      tone: "formal"
      formality: "very_formal"
      use_case: "closing"
      channel:
        - "email"
        - "letter"
      audience:
        - "b2b"
        - "government"

    cypher: |
      // Create an expression
      MATCH (es:ExpressionSet)<-[:HAS_EXPRESSIONS]-(l:Locale {key: "fr-FR"})
      CREATE (e:Expression {
        key: "closing_formal",
        display_name: "Formal Letter Closing",
        text: "Veuillez agréer l'expression de mes sentiments distingués",
        tone: "formal",
        formality: "very_formal",
        use_case: "closing",
        created_at: datetime(),
        updated_at: datetime()
      })
      CREATE (es)-[:CONTAINS]->(e)
      RETURN e

      // Find all formal closings across locales
      MATCH (e:Expression {use_case: "closing", formality: "very_formal"})
      MATCH (e)<-[:CONTAINS]-(es:ExpressionSet)<-[:HAS_EXPRESSIONS]-(l:Locale)
      RETURN l.key AS locale, e.text AS closing
