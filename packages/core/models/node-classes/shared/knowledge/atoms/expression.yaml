# models/node-classes/shared/knowledge/atoms/expression.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# Expression - Individual idiom, phrase, or template within an ExpressionSet

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: Expression
  realm: shared
  layer: knowledge
  trait: imported

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Individual expression, idiom, or phrase template belonging to a locale's ExpressionSet."

  llm_context: |
    USE: when generating locale-native phrases, greetings, or closings.
    TRIGGERS: "expression", "idiom", "phrase", "greeting", "closing", "native wording".
    NOT: for vocabulary terms (use Term), for content patterns (use Pattern).
    RELATES: ExpressionSet (parent via CONTAINS), Locale (owner via HAS_EXPRESSIONS).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: message-square
    terminal: "◇"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      pattern: "^[a-z][a-z0-9_]*$"
      description: "Unique identifier within the ExpressionSet"
      example: "greeting_formal"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "Formal Greeting"

    description:
      type: string
      required: false
      description: "When and how to use this expression"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    text:
      type: string
      required: true
      description: "The actual expression/phrase in the target locale"
      examples:
        - "Veuillez agréer l'expression de mes sentiments distingués"
        - "Best regards"
        - "Mit freundlichen Grüßen"

    tone:
      type: string
      required: true
      enum: [formal, warm, casual, energetic, empathetic, authoritative, friendly]
      description: "Emotional tone of the expression"
      example: "formal"

    formality:
      type: string
      required: true
      enum: [very_formal, formal, neutral, casual, very_casual]
      description: "Formality level"
      example: "very_formal"

    use_case:
      type: string
      required: true
      enum: [greeting, closing, apology, thanks, request, confirmation, warning, celebration]
      description: "Primary use case category"
      example: "closing"

    channel:
      type: "string[]"
      required: false
      description: "Appropriate channels for this expression"
      example: ["email", "letter", "formal_document"]

    audience:
      type: "string[]"
      required: false
      description: "Target audience segments"
      example: ["b2b", "enterprise", "government"]

    variables:
      type: json
      required: false
      description: "Placeholder variables in the phrase"

    alternatives:
      type: "string[]"
      required: false
      description: "Alternative expressions for same use case"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    incoming:
      - type: CONTAINS_EXPRESSION
        from: ExpressionSet
        cardinality: "1:N"
        description: "ExpressionSet contains multiple Expressions"

    outgoing: []

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX expression_tone IF NOT EXISTS FOR (e:Expression) ON (e.tone)"
      - "CREATE INDEX expression_formality IF NOT EXISTS FOR (e:Expression) ON (e.formality)"
      - "CREATE INDEX expression_use_case IF NOT EXISTS FOR (e:Expression) ON (e.use_case)"

  example:
    data:
      key: "closing_formal_fr"
      display_name: "Formal Letter Closing"
      text: "Veuillez agréer l'expression de mes sentiments distingués"
      tone: "formal"
      formality: "very_formal"
      use_case: "closing"
      channel: ["email", "letter"]
      audience: ["b2b", "government"]
    cypher: |
      MATCH (es:ExpressionSet)<-[:HAS_EXPRESSIONS]-(l:Locale {key: "fr-FR"})
      CREATE (e:Expression {
        key: 'closing_formal',
        display_name: 'Formal Letter Closing',
        text: 'Veuillez agréer l expression de mes sentiments distingués',
        tone: 'formal',
        formality: 'very_formal',
        use_case: 'closing',
        created_at: datetime(),
        updated_at: datetime()
      })
      CREATE (es)-[:CONTAINS_EXPRESSION]->(e)
      RETURN e
