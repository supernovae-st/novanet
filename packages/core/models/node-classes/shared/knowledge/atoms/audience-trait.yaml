# models/node-classes/shared/knowledge/atoms/audience-trait.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# AudienceTrait - Audience segment behavior within an AudienceSet

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: AudienceTrait
  realm: shared
  layer: knowledge
  trait: imported

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Audience segment behavior, preference, or characteristic within a locale."

  llm_context: |
    USE: when loading audience-specific content adaptation hints.
    TRIGGERS: "audience trait", "segment behavior", "user preferences", "persona characteristics".
    NOT: for personas (use AudiencePersona), for demographics (use population nodes).
    RELATES: AudienceSet (parent via CONTAINS), Locale (owner via HAS_AUDIENCE).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: users
    terminal: "◎"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      pattern: "^[a-z][a-z0-9_]*$"
      description: "Unique identifier within the AudienceSet"
      example: "b2b_enterprise"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "B2B Enterprise Buyer"

    description:
      type: string
      required: false
      description: "Who this audience segment is"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    segment:
      type: string
      required: true
      enum: [b2b_enterprise, b2b_smb, b2c_premium, b2c_mass, developer, creator, student]
      description: "Audience segment category"
      example: "b2b_enterprise"

    behavior:
      type: json
      required: true
      description: "Key behavioral characteristics"
      example:
        decision_speed: "slow"
        research_depth: "extensive"
        stakeholders: "multiple"

    preferences:
      type: json
      required: true
      description: "Content and communication preferences"
      example:
        tone: "professional"
        detail_level: "comprehensive"
        proof_types: ["case_studies", "ROI_calculators"]

    pain_points:
      type: "string[]"
      required: false
      description: "Key challenges and concerns"

    motivators:
      type: "string[]"
      required: false
      description: "What drives purchasing decisions"

    channels:
      type: "string[]"
      required: false
      description: "Preferred communication channels"
      example: ["email", "linkedin", "webinars"]

    content_length:
      type: string
      required: false
      enum: [brief, moderate, detailed, comprehensive]
      description: "Preferred content depth"

    trust_signals:
      type: "string[]"
      required: false
      description: "What builds trust with this audience"
      example: ["certifications", "customer_logos", "security_badges"]

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    incoming:
      - type: CONTAINS_AUDIENCE_TRAIT
        from: AudienceSet
        cardinality: "1:N"
        description: "AudienceSet contains multiple AudienceTraits"

    outgoing: []

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX audiencetrait_segment IF NOT EXISTS FOR (at:AudienceTrait) ON (at.segment)"
      - "CREATE INDEX audiencetrait_length IF NOT EXISTS FOR (at:AudienceTrait) ON (at.content_length)"

  example:
    data:
      key: "b2b_enterprise_fr"
      display_name: "French Enterprise Buyer"
      segment: "b2b_enterprise"
      behavior:
        decision_speed: "slow"
        research_depth: "extensive"
        formality_expectation: "high"
      preferences:
        tone: "professional"
        detail_level: "comprehensive"
        proof_types: ["case_studies", "references"]
      pain_points: ["GDPR_compliance", "data_sovereignty"]
    cypher: |
      MATCH (as:AudienceSet)<-[:HAS_AUDIENCE]-(l:Locale {key: "fr-FR"})
      CREATE (at:AudienceTrait {
        key: 'b2b_enterprise',
        display_name: 'French Enterprise Buyer',
        segment: 'b2b_enterprise',
        content_length: 'comprehensive',
        created_at: datetime(),
        updated_at: datetime()
      })
      CREATE (as)-[:CONTAINS_AUDIENCE_TRAIT]->(at)
      RETURN at
