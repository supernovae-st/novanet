# ─────────────────────────────────────────────────────────────────────────────
# ExpressionSet — Container for all Expression atoms of a locale
# ─────────────────────────────────────────────────────────────────────────────
# v0.13.1: LLM-First field ordering (ADR-031)
# v10.7: Simplified model - one ExpressionSet per locale
# Register is a property on Expression atoms, not on the container
# Stability: High - structure rarely changes
# ─────────────────────────────────────────────────────────────────────────────

node:
  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY
  # ═══════════════════════════════════════════════════════════════════════════
  name: ExpressionSet
  realm: shared
  layer: knowledge
  trait: defined  # v11.2: Containers are universal categories (invariant), atoms are locale-native (knowledge)

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC
  # ═══════════════════════════════════════════════════════════════════════════
  description: "Container for all Expression atoms of a locale"

  llm_context: |
    USE: when accessing locale's expression library for content generation.
    TRIGGERS: expressions, idioms, phrases, locale expressions, expression container.
    NOT: for individual expressions (use Expression atom via CONTAINS).
    RELATES: Expression (CONTAINS), Locale (HAS_EXPRESSIONS).

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL
  # ═══════════════════════════════════════════════════════════════════════════
  icon:
    web: "message-square"
    terminal: "◇"

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA
  # ═══════════════════════════════════════════════════════════════════════════
  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) Expressions"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Native expressions for fr-FR across all registers"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Semantic fields summary (metadata about contained atoms)
    semantic_fields_count:
      type: integer
      required: true
      description: "Number of semantic fields represented"
      example: 10

    total_expressions:
      type: integer
      required: true
      description: "Total number of Expression atoms"
      example: 80

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH
  # ═══════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: CONTAINS
        to: Expression
        cardinality: "1:N"
        description: "ExpressionSet contains multiple Expression atoms"

    incoming:
      - type: HAS_EXPRESSIONS
        from: Locale
        cardinality: "1:1"
        description: "Locale has exactly one expression set"
