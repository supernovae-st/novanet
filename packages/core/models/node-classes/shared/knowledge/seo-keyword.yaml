# models/node-classes/shared/knowledge/seo-keyword.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# SEOKeyword - Target keyword with metrics for SEO optimization

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: SEOKeyword
  realm: shared
  layer: knowledge
  trait: imported

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Target keyword with metrics for SEO optimization (locale-specific knowledge)"

  llm_context: |
    USE: when loading SEO keyword data for content optimization.
    TRIGGERS: "SEO", "keyword", "search volume", "traffic potential", "SERP".
    NOT: for keyword history (use SEOKeywordMetrics via HAS_METRICS).
    RELATES: SEOKeywordSet (parent via CONTAINS_SEO_KEYWORD), EntityNative (TARGETS), SEOKeywordFormat (HAS_FORMAT).
    NOTE: Discovered data from DataForSEO, not generated content.

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: search
    terminal: "⌕"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      pattern: "^seo:[a-z0-9-]+@[a-z]{2}-[A-Z]{2}$"
      description: "Composite key: seo:{slug}@{locale_key} (ADR-029)"
      examples:
        - "seo:qr-code-generator@en-US"
        - "seo:creer-un-qr-code@fr-FR"
        - "seo:qr-code-erstellen@de-DE"

    locale_key:
      type: string
      required: true
      pattern: "^[a-z]{2}-[A-Z]{2}$"
      indexed: true
      description: "Locale key (denormalized for fast lookup). BCP 47 format."
      examples:
        - "fr-FR"
        - "en-US"
        - "ja-JP"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "créer qr code gratuit"

    description:
      type: string
      required: false
      description: "Short description"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    # --- Core keyword data ---
    value:
      type: string
      required: true
      description: "The keyword string (original form with diacritics)"
      example: "créer qr code gratuit"

    slug_form:
      type: string
      required: true
      description: "URL-safe slug form of the keyword. Used as INPUT for slug derivation (ADR-032). Contains diacritics per locale rules (latin_preserve, latin_strip, etc.)"
      examples:
        - "créer-un-qr-code"
        - "qr-code-generator"
        - "qrコード作成"

    source_date:
      type: date
      required: false
      description: "Date when keyword data was fetched from source (Ahrefs/Semrush). Used for data freshness tracking."
      example: "2026-02-17"

    volume:
      type: int
      required: false
      description: "Monthly search volume (12-month average)"
      example: 12100

    difficulty:
      type: int
      required: false
      description: "SEO difficulty score (0-100)"
      example: 35

    cpc:
      type: float
      required: false
      description: "Cost per click (USD)"
      example: 0.85

    intent:
      type: string
      required: false
      description: "Search intent: transactional | informational | navigational | commercial"
      example: "transactional"

    platform:
      type: string
      required: false
      description: "Search platform: google | bing | youtube"
      example: "google"

    source:
      type: string
      required: false
      description: "Data source: ahrefs | semrush"
      example: "ahrefs"

    # --- v10.6: Ahrefs/Semrush enrichment ---
    traffic_potential:
      type: int
      required: false
      description: "Estimated monthly traffic if ranking #1 (Ahrefs)"
      example: 8500

    clicks:
      type: int
      required: false
      description: "Estimated monthly clicks (actual clicks, not impressions)"
      example: 9800

    clicks_per_search:
      type: float
      required: false
      description: "Clicks/volume ratio (indicates SERP satisfaction)"
      example: 0.81

    serp_features:
      type: "string[]"
      required: false
      description: "SERP features present: featured_snippet | ai_overview | people_also_ask | images | videos | knowledge_panel | local_pack | shopping"
      example: '["featured_snippet", "people_also_ask", "images"]'

    competition:
      type: float
      required: false
      description: "Organic competition level (0-1, Semrush)"
      example: 0.65

    trend:
      type: string
      required: false
      description: "Search trend direction: rising | stable | declining"
      example: "rising"

    seasonality:
      type: "int[]"
      required: false
      description: "12-month volume index (Jan-Dec, 100 = average)"
      example: "[80, 85, 90, 100, 95, 88, 82, 78, 85, 92, 98, 105]"

    # --- v11.4: Format-specific properties ---
    question_word:
      type: string
      required: false
      enum: [what, how, why, when, where, who, which, can, is, does]
      description: "Question word for question-format keywords"

    entity_a_key:
      type: string
      required: false
      description: "Key of first entity being compared (for comparison keywords)"

    entity_b_key:
      type: string
      required: false
      description: "Key of second entity being compared (for comparison keywords)"

    comparison_type:
      type: string
      required: false
      enum: [versus, alternative, difference, better, best]
      description: "Type of comparison"

    preposition:
      type: string
      required: false
      description: "Preposition word (for, with, without, etc.)"

    use_case:
      type: string
      required: false
      description: "Use case description"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: HAS_METRICS
        to: SEOKeywordMetrics
        cardinality: "1:N"
        description: "Historical metrics snapshots (time-series)"

      - type: HAS_FORMAT
        to: SEOKeywordFormat
        cardinality: "N:1"
        description: "Keyword format (stem, question, comparison, preposition)"

      - type: COMPARES_A
        to: Entity
        cardinality: "N:1"
        description: "First entity being compared (conditional: comparison format only)"

      - type: COMPARES_B
        to: Entity
        cardinality: "N:1"
        description: "Second entity being compared (conditional: comparison format only)"

    incoming:
      - type: TARGETS
        from: EntityNative
        cardinality: "N:M"
        description: "EntityNative targets this keyword for SEO"

      - type: CONTAINS_SEO_KEYWORD
        from: SEOKeywordSet
        cardinality: "N:1"
        description: "Belongs to a keyword set"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX seokeyword_value IF NOT EXISTS FOR (kw:SEOKeyword) ON (kw.value)"
      - "CREATE INDEX seokeyword_volume IF NOT EXISTS FOR (kw:SEOKeyword) ON (kw.volume)"

  example:
    data:
      key: "seo:creer-un-qr-code@fr-FR"
      locale_key: "fr-FR"
      display_name: "créer un qr code (fr-FR)"
      value: "créer un qr code"
      slug_form: "créer-un-qr-code"
      volume: 14000
      difficulty: 31
      traffic_potential: 8500
      intent: "transactional"
      source: "ahrefs"
      source_date: "2026-02-17"
      serp_features: ["featured_snippet", "people_also_ask"]
    cypher: |
      // Get all keywords targeted by an EntityNative with slug source info
      MATCH (en:EntityNative {locale_key: $locale})-[t:TARGETS]->(kw:SEOKeyword)
      OPTIONAL MATCH (kw)-[:HAS_FORMAT]->(fmt:SEOKeywordFormat)
      RETURN kw.value AS keyword,
             kw.slug_form,
             kw.volume,
             kw.traffic_potential,
             t.rank,
             t.is_slug_source,
             fmt.format_key AS format
      ORDER BY kw.traffic_potential DESC
      LIMIT 20
