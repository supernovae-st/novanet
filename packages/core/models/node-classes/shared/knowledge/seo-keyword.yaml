# models/node-classes/shared/knowledge/seo-keyword.yaml
# SEOKeyword - Target keyword with metrics (v10.6: enriched with Ahrefs/Semrush data)
#
# v11.4: SEO Knowledge Atoms refactor
#        - realm: shared (was org)
#        - layer: knowledge (was seo)
#        - Universal market data available to all orgs
#        - Format now via HAS_FORMAT arc to SEOKeywordFormat
#        - Removed: HAS_QUESTIONS, HAS_COMPARISONS, HAS_PREPOSITIONS (nodes deleted)
#        - Added: format-specific properties (question_word, entity_a_key, etc.)
#        - Added: COMPARES_A/COMPARES_B arcs for comparison keywords
#
# v10.6: SEO Schema v2
#        - Added: traffic_potential, clicks, clicks_per_search, serp_features
#        - Added: competition, trend, seasonality

node:
  name: SEOKeyword
  realm: shared
  layer: knowledge
  trait: imported
  icon:
    web: "search"
    terminal: "⌕"
  description: "Target keyword with metrics for SEO optimization (locale-specific knowledge)"
  llm_context: |
    SEOKeyword represents market search behavior for a locale.
    It is DISCOVERED data from DataForSEO, not generated content.
    Use to understand what users search for, then TARGET from EntityContent.
    Format determined by HAS_FORMAT arc to SEOKeywordFormat.
    Time-series metrics: follow HAS_METRICS arc to SEOKeywordMetrics.
    v11.4: Now in shared/knowledge (Knowledge Atoms pattern).

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier"
      example: "seo-creer-qr-code-gratuit-fr"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "créer qr code gratuit"

    description:
      type: string
      required: false
      description: "Short description"

    llm_context:
      type: string
      required: false
      description: "Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."

    created_at:
      type: datetime
      required: false

    updated_at:
      type: datetime
      required: false

  # ═══════════════════════════════════════════════════════════════════════════════
  # NODE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    # --- Core keyword data ---
    value:
      type: string
      required: true
      description: "The keyword string"
      example: "créer qr code gratuit"

    volume:
      type: int
      required: false
      description: "Monthly search volume (12-month average)"
      example: 12100

    difficulty:
      type: int
      required: false
      description: "SEO difficulty score (0-100)"
      example: 35

    cpc:
      type: float
      required: false
      description: "Cost per click (USD)"
      example: 0.85

    intent:
      type: string
      required: false
      description: "Search intent: transactional | informational | navigational | commercial"
      example: "transactional"

    platform:
      type: string
      required: false
      description: "Search platform: google | bing | youtube"
      example: "google"

    source:
      type: string
      required: false
      description: "Data source: ahrefs | semrush"
      example: "ahrefs"

    # --- v10.6: Ahrefs/Semrush enrichment ---
    traffic_potential:
      type: int
      required: false
      description: "Estimated monthly traffic if ranking #1 (Ahrefs)"
      example: 8500

    clicks:
      type: int
      required: false
      description: "Estimated monthly clicks (actual clicks, not impressions)"
      example: 9800

    clicks_per_search:
      type: float
      required: false
      description: "Clicks/volume ratio (indicates SERP satisfaction)"
      example: 0.81

    serp_features:
      type: "string[]"
      required: false
      description: "SERP features present: featured_snippet | ai_overview | people_also_ask | images | videos | knowledge_panel | local_pack | shopping"
      example: '["featured_snippet", "people_also_ask", "images"]'

    competition:
      type: float
      required: false
      description: "Organic competition level (0-1, Semrush)"
      example: 0.65

    trend:
      type: string
      required: false
      description: "Search trend direction: rising | stable | declining"
      example: "rising"

    seasonality:
      type: "int[]"
      required: false
      description: "12-month volume index (Jan-Dec, 100 = average)"
      example: "[80, 85, 90, 100, 95, 88, 82, 78, 85, 92, 98, 105]"

    # --- v11.4: Format-specific properties ---

    # For question format
    question_word:
      type: string
      required: false
      enum: [what, how, why, when, where, who, which, can, is, does]
      description: "Question word for question-format keywords"

    # For comparison format
    entity_a_key:
      type: string
      required: false
      description: "Key of first entity being compared (for comparison keywords)"

    entity_b_key:
      type: string
      required: false
      description: "Key of second entity being compared (for comparison keywords)"

    comparison_type:
      type: string
      required: false
      enum: [versus, alternative, difference, better, best]
      description: "Type of comparison"

    # For preposition format
    preposition:
      type: string
      required: false
      description: "Preposition word (for, with, without, etc.)"

    use_case:
      type: string
      required: false
      description: "Use case description"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    # Incoming: EntityContent --[:TARGETS]--> SEOKeyword (targeting)
    # NOTE: Locale is inferred via EntityContent --[:FOR_LOCALE]--> Locale

    - relation: HAS_METRICS
      to: SEOKeywordMetrics
      direction: outgoing
      description: "Historical metrics snapshots (time-series)"

    # v11.4: Format classification via SEOKeywordFormat
    - relation: HAS_FORMAT
      to: SEOKeywordFormat
      direction: outgoing
      cardinality: "N:1"
      description: "Keyword format (stem, question, comparison, preposition)"

    # v11.4: Entity references for comparison keywords
    - relation: COMPARES_A
      to: Entity
      direction: outgoing
      cardinality: "N:1"
      description: "First entity being compared (conditional: comparison format only)"

    - relation: COMPARES_B
      to: Entity
      direction: outgoing
      cardinality: "N:1"
      description: "Second entity being compared (conditional: comparison format only)"

    # v10.8: Removed EXPRESSES (redundant - use TARGETS inverse from EntityContent)
    # Query: MATCH (kw:SEOKeyword)<-[:TARGETS]-(ec:EntityContent) RETURN ec.entity_key
    #
    # v11.4: Removed HAS_QUESTIONS, HAS_COMPARISONS, HAS_PREPOSITIONS
    # These node types (SEOQuestion, SEOComparison, SEOPreposition) are deleted.
    # Format is now indicated by HAS_FORMAT arc to SEOKeywordFormat.
    # Format-specific data stored in properties (question_word, entity_a_key, etc.)

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    description: "Get top keywords by traffic potential with format classification"
    cypher: |
      // v11.4: SEOKeyword with format classification
      MATCH (ec:EntityContent {locale_key: $locale})-[:TARGETS]->(kw:SEOKeyword)
      OPTIONAL MATCH (kw)-[:HAS_FORMAT]->(fmt:SEOKeywordFormat)
      OPTIONAL MATCH (kw)-[:COMPARES_A]->(entityA:Entity)
      OPTIONAL MATCH (kw)-[:COMPARES_B]->(entityB:Entity)
      RETURN kw.value AS keyword,
             kw.volume,
             kw.traffic_potential,
             kw.serp_features,
             fmt.format_key AS format,
             kw.question_word,
             entityA.key AS compared_entity_a,
             entityB.key AS compared_entity_b,
             ec.entity_key AS entity
      ORDER BY kw.traffic_potential DESC
      LIMIT 20
