# ─────────────────────────────────────────────────────────────────────────────
# AudienceSet — Container grouping AudienceTrait atoms by segment
# ─────────────────────────────────────────────────────────────────────────────
# v0.13.1: LLM-First field ordering (ADR-031)
# v10.1: Pure container (no JSON blobs - data lives in AudienceTrait atoms)
# Segments: b2b, b2c, general
# Stability: High - structure rarely changes
# ─────────────────────────────────────────────────────────────────────────────

node:
  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY
  # ═══════════════════════════════════════════════════════════════════════════
  name: AudienceSet
  realm: shared
  layer: knowledge
  trait: defined  # v11.2: Containers are universal categories (invariant), atoms are locale-native (knowledge)

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC
  # ═══════════════════════════════════════════════════════════════════════════
  description: "Container grouping AudienceTrait atoms by segment"

  llm_context: |
    USE: to find traits by segment.
    TRIGGERS: B2B, B2C, audience segment, audience container.
    NOT: individual behaviors (use AudienceTrait via CONTAINS).
    RELATES: AudienceTrait (CONTAINS), Locale (HAS_AUDIENCE).

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL
  # ═══════════════════════════════════════════════════════════════════════════
  icon:
    web: "users"
    terminal: "◎"

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA
  # ═══════════════════════════════════════════════════════════════════════════
  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) B2B Audience"

    description:
      type: string
      required: true
      description: "Short description"
      example: "B2B audience behavior for fr-FR"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Segment identification (only property - data is in atoms)
    segment:
      type: string
      required: true
      enum: [b2b, b2c, general]
      description: "Audience segment this set groups"
      example: "b2b"

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH
  # ═══════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: CONTAINS
        to: AudienceTrait
        cardinality: "1:N"
        description: "AudienceSet contains multiple AudienceTrait atoms"

    incoming:
      - type: HAS_AUDIENCE
        from: Locale
        cardinality: "1:N"
        description: "Locale has audience sets"
        properties:
          segment: string
