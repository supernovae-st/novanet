# models/node-classes/shared/knowledge/audience-set.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# AudienceSet - Container grouping AudienceTrait atoms by segment

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: AudienceSet
  realm: shared
  layer: knowledge
  trait: defined  # Containers are universal categories (defined), atoms are locale-native (imported)

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Container grouping AudienceTrait atoms by segment. Pure container (data lives in AudienceTrait atoms)."

  llm_context: |
    USE: when finding audience traits by segment (B2B, B2C, general).
    TRIGGERS: "B2B", "B2C", "audience segment", "audience container".
    NOT: for individual behaviors (use AudienceTrait via CONTAINS_AUDIENCE_TRAIT).
    RELATES: AudienceTrait (contains via CONTAINS_AUDIENCE_TRAIT), Locale (owner via HAS_AUDIENCE).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: users
    terminal: "◎"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) B2B Audience"

    description:
      type: string
      required: true
      description: "Short description"
      example: "B2B audience behavior for fr-FR"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    segment:
      type: string
      required: true
      enum: [b2b, b2c, general]
      description: "Audience segment this set groups"
      example: "b2b"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: CONTAINS_AUDIENCE_TRAIT
        to: AudienceTrait
        cardinality: "1:N"
        description: "AudienceSet contains multiple AudienceTrait atoms"

    incoming:
      - type: HAS_AUDIENCE
        from: Locale
        cardinality: "1:N"
        description: "Locale has audience sets (one per segment)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX audienceset_segment IF NOT EXISTS FOR (as:AudienceSet) ON (as.segment)"

  example:
    data:
      display_name: "French (France) B2B Audience"
      description: "B2B audience behavior for fr-FR"
      segment: "b2b"
    cypher: |
      MATCH (l:Locale {key: "fr-FR"})
      CREATE (as:AudienceSet {
        display_name: 'French (France) B2B Audience',
        description: 'B2B audience behavior for fr-FR',
        segment: 'b2b',
        created_at: datetime(),
        updated_at: datetime()
      })
      CREATE (l)-[:HAS_AUDIENCE]->(as)
      RETURN as
