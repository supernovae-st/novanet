# ─────────────────────────────────────────────────────────────────────────────
# LanguageFamily — ISO 639-5 top-level language family
# ─────────────────────────────────────────────────────────────────────────────
# v0.13.1: LLM-First field ordering (ADR-031)
# v10.8: Geographic Taxonomy - Phase 2
# Data: ~15 families (Indo-European, Sino-Tibetan, Afro-Asiatic, etc.)
# Source: ISO 639-5 (loc.gov)
# ─────────────────────────────────────────────────────────────────────────────

node:
  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY
  # ═══════════════════════════════════════════════════════════════════════════
  name: LanguageFamily
  realm: shared
  layer: knowledge
  trait: imported

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC
  # ═══════════════════════════════════════════════════════════════════════════
  description: "ISO 639-5 language family for clustering linguistically related locales"

  llm_context: |
    USE: for clustering linguistically related locales at top level.
    TRIGGERS: indo-european, sino-tibetan, afro-asiatic, language family.
    NOT: fine-grained linguistic clustering (use LanguageBranch).
    RELATES: LanguageBranch (BRANCH_OF).

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL
  # ═══════════════════════════════════════════════════════════════════════════
  icon:
    web: "message-circle"
    terminal: "◇"

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA
  # ═══════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      description: "ISO 639-5 three-letter code"
      pattern: "^[a-z]{3}$"
      examples:
        - "ine"  # Indo-European
        - "sit"  # Sino-Tibetan
        - "afa"  # Afro-Asiatic
        - "map"  # Austronesian
        - "jpx"  # Japonic

    display_name:
      type: string
      required: true
      description: "English name of the language family"
      example: "Indo-European"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Largest language family, includes Romance, Germanic, Slavic, Indo-Iranian"

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    name_french:
      type: string
      required: false
      description: "French name of the language family"
      example: "Indo-europeenne"

    branch_count:
      type: int
      required: false
      description: "Number of LanguageBranch children"
      example: 9

    speaker_estimate:
      type: string
      required: false
      description: "Estimated number of speakers"
      example: "3.2 billion"

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH
  # ═══════════════════════════════════════════════════════════════════════════
  relations:
    incoming:
      - type: BRANCH_OF
        from: LanguageBranch
        cardinality: "N:1"
        description: "Language branches within this family"

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE
  # ═══════════════════════════════════════════════════════════════════════════
  example:
    data:
      key: "ine"
      display_name: "Indo-European"
      description: "Largest language family, includes Romance, Germanic, Slavic, Indo-Iranian"
      name_french: "Indo-europeenne"
      branch_count: 9
      speaker_estimate: "3.2 billion"
      llm_context: "USE: for European, Iranian, Indian languages. TRIGGERS: indo-european, romance, germanic, slavic. SHARE: cognates, similar grammar. Branches can share vocabulary."

    cypher: |
      // Get all branches in a family
      MATCH (f:LanguageFamily {key: $key})<-[:BRANCH_OF]-(b:LanguageBranch)
      RETURN b.key, b.name
      ORDER BY b.name

      // Get all locales speaking languages from this family
      MATCH (f:LanguageFamily {key: $key})<-[:BRANCH_OF]-(b:LanguageBranch)<-[:SPEAKS_BRANCH]-(l:Locale)
      RETURN l.key, b.name AS branch
      ORDER BY b.name, l.key
