# models/node-classes/shared/knowledge/geo-query.yaml
# GEOQuery - Generative Engine Optimization query tracked across AI engines
#
# v11.4: Moved to shared/knowledge (Knowledge Atoms pattern)
#        - REMOVED time-series properties (now in GEOAnswer)
#        - Static query definition only - metrics tracked in GEOAnswer nodes
#
# v10.7: GEO Schema v1
#        - New node type for AI visibility tracking (Gemini, GPT, Perplexity, Claude)
#        - Different from SEO: tracks LLM citations, not search rankings
#        - Owned by Locale via HAS_GEO_QUERIES
#        - Links to GEOAnswer (snapshots) and GEOMetrics (time-series)

node:
  name: GEOQuery
  realm: shared
  layer: knowledge
  trait: imported
  icon:
    web: "bot"
    terminal: "⚙"
  description: |
    Query tracked across AI engines for generative engine optimization (GEO).
    Static query definition - time-series metrics live in GEOAnswer nodes.

    USE: when defining AI search queries to monitor for brand visibility.
    TRIGGERS: "GEO query", "AI search", "LLM visibility", "generative search".
    NOT: for search rankings (use SEOKeyword), for LLM responses (use GEOAnswer).
    RELATES: GEOAnswer (HAS_GEO_ANSWERS), EntityContent (MONITORS_GEO).

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier"
      example: "geo-how-to-create-qr-code-en"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "how to create a QR code"

    description:
      type: string
      required: false
      description: "Short description"

    llm_context:
      type: string
      required: false
      description: "GEOQuery represents an AI search query to monitor for visibility. It is DISCOVERED/CONFIGURED data, not generated content. Static query definition - time-series metrics live in GEOAnswer nodes. v11.4: Now in shared/knowledge (Knowledge Atoms pattern). Access: EntityContent --[:MONITORS_GEO]--> GEOQuery --[:HAS_GEO_ANSWERS]--> GEOAnswer"

    created_at:
      type: datetime
      required: false

    updated_at:
      type: datetime
      required: false

  # ═══════════════════════════════════════════════════════════════════════════════
  # NODE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    # --- Core query data (static definition) ---
    value:
      type: string
      required: true
      description: "The query string as submitted to AI engines"
      example: "how to create a QR code for my restaurant menu"

    query_type:
      type: string
      required: true
      description: "Query classification: informational | transactional | navigational | how_to | comparison | recommendation | factual"
      example: "how_to"

    language_hint:
      type: string
      required: false
      description: "Optional language hint for query interpretation (BCP-47 code)"
      example: "en-US"

    platforms:
      type: string[]
      required: false
      description: "AI platforms to check: gemini | gpt | perplexity | claude"
      example: ["gemini", "gpt", "perplexity", "claude"]

    # NOTE: Time-series metrics (visibility scores, share_of_voice, citation_frequency)
    # are tracked in GEOAnswer nodes, not here. This node is static query definition only.

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    # Incoming: EntityContent --[:MONITORS_GEO]--> GEOQuery (targeting, v11.4)

    - relation: HAS_GEO_ANSWERS
      to: GEOAnswer
      direction: outgoing
      cardinality: "1:N"
      description: "Time-series LLM response samples with visibility metrics (v11.4)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    description: "Get GEO queries monitored by an entity with latest visibility metrics"
    cypher: |
      // v11.4: GEOQuery with time-series answers (metrics in GEOAnswer)
      MATCH (e:Entity {key: $entity_key})-[:HAS_CONTENT]->(ec:EntityContent)
      MATCH (ec)-[:MONITORS_GEO]->(q:GEOQuery)
      OPTIONAL MATCH (q)-[:HAS_GEO_ANSWERS]->(a:GEOAnswer)
      WITH q, a ORDER BY a.captured_at DESC
      WITH q, collect(a)[0] AS latest_answer
      RETURN q.value AS query,
             q.query_type,
             q.platforms,
             latest_answer.ai_visibility_score AS visibility,
             latest_answer.share_of_voice AS sov,
             latest_answer.captured_at AS last_check
      ORDER BY latest_answer.ai_visibility_score DESC
      LIMIT 20
