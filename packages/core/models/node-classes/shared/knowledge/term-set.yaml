# models/node-classes/shared/knowledge/term-set.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# TermSet - Container grouping Term atoms by domain

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: TermSet
  realm: shared
  layer: knowledge
  trait: defined  # Containers are universal categories (defined), atoms are locale-native (imported)

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Container grouping Term atoms by domain. Pure container (data lives in Term atoms)."

  llm_context: |
    USE: when finding terms by domain for vocabulary loading.
    TRIGGERS: "terms", "vocabulary", "domain vocabulary", "term container".
    NOT: for individual terms (use Term via CONTAINS_TERM).
    RELATES: Term (contains via CONTAINS_TERM), Locale (owner via HAS_TERMS).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: book-open
    terminal: "◈"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) Pricing Terms"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Pricing-specific vocabulary for fr-FR"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    domain:
      type: string
      required: true
      enum: [pricing, features, technical, marketing, support, legal, general]
      description: "Vocabulary domain this set groups"
      example: "pricing"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: CONTAINS_TERM
        to: Term
        cardinality: "1:N"
        description: "TermSet contains multiple Term atoms"

    incoming:
      - type: HAS_TERMS
        from: Locale
        cardinality: "1:N"
        description: "Locale has multiple term sets (one per domain)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX termset_domain IF NOT EXISTS FOR (ts:TermSet) ON (ts.domain)"

  example:
    data:
      display_name: "French (France) Pricing Terms"
      description: "Pricing-specific vocabulary for fr-FR"
      domain: "pricing"
    cypher: |
      MATCH (l:Locale {key: "fr-FR"})
      CREATE (ts:TermSet {
        display_name: 'French (France) Pricing Terms',
        description: 'Pricing-specific vocabulary for fr-FR',
        domain: 'pricing',
        created_at: datetime(),
        updated_at: datetime()
      })
      CREATE (l)-[:HAS_TERMS]->(ts)
      RETURN ts
