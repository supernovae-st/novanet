# ─────────────────────────────────────────────────────────────────────────────
# GEOQuerySet — Container for GEO queries belonging to a locale (1:1 with Locale)
# ─────────────────────────────────────────────────────────────────────────────
# v0.13.1: LLM-First field ordering (ADR-031)
# v11.4: Knowledge Atoms pattern - container for GEOQuery atoms
#        - realm: shared (universal GEO tracking)
#        - layer: knowledge (locale knowledge infrastructure)
#        - trait: defined (container is universal category)
#        - 1:1 with Locale (one container per locale)
#        - Access: Locale -[:HAS_GEO_QUERIES]-> GEOQuerySet -[:CONTAINS_GEO_QUERY]-> GEOQuery
# Stability: High - structure rarely changes
# ─────────────────────────────────────────────────────────────────────────────

node:
  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY
  # ═══════════════════════════════════════════════════════════════════════════
  name: GEOQuerySet
  realm: shared
  layer: knowledge
  trait: defined  # Containers are universal categories (invariant), atoms are locale-native (knowledge)

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC
  # ═══════════════════════════════════════════════════════════════════════════
  description: "Container for GEO queries belonging to a locale (1:1 with Locale)"

  llm_context: |
    GEOQuerySet groups all GEO queries for a locale.
    One GEOQuerySet per Locale (1:1 cardinality).
    USE: when accessing locale's AI visibility queries for monitoring.
    TRIGGERS: GEO queries, AI visibility, query set, locale queries.
    NOT: for individual queries (use GEOQuery via CONTAINS_GEO_QUERY).
    RELATES: GEOQuery (CONTAINS_GEO_QUERY), Locale (HAS_GEO_QUERIES).

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL
  # ═══════════════════════════════════════════════════════════════════════════
  icon:
    web: "package"
    terminal: "■"

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA
  # ═══════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      description: "Set key (format: geo-queries@{locale_key})"
      pattern: "^geo-queries@[a-z]{2}-[A-Z]{2}$"
      examples:
        - "geo-queries@fr-FR"
        - "geo-queries@en-US"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "GEO Queries (French - France)"

    description:
      type: string
      required: false
      description: "Short description of the query set"
      example: "AI visibility queries for the French market"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    # Sync metadata
    last_sync:
      type: datetime
      required: false
      description: "Last AI visibility check timestamp"
      example: "2026-02-10T14:00:00Z"

    # Aggregate counts
    total_queries:
      type: integer
      required: false
      description: "Count of GEOQuery atoms in this set"
      example: 342

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH
  # ═══════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: CONTAINS_GEO_QUERY
        to: GEOQuery
        cardinality: "1:N"
        description: "GEOQuerySet contains multiple GEOQuery atoms"

    incoming:
      - type: HAS_GEO_QUERIES
        from: Locale
        cardinality: "1:1"
        description: "Locale has exactly one GEO query set"

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE
  # ═══════════════════════════════════════════════════════════════════════════
  example:
    description: "Get query set with count of GEO queries for a locale"
    data:
      key: "geo-queries@fr-FR"
      display_name: "GEO Queries (French - France)"
      description: "French market AI visibility queries"
      last_sync: "2026-02-10T14:00:00Z"
      total_queries: 342
    cypher: |
      // Get query set with count
      MATCH (l:Locale {key: 'fr-FR'})-[:HAS_GEO_QUERIES]->(qs:GEOQuerySet)
      OPTIONAL MATCH (qs)-[:CONTAINS_GEO_QUERY]->(q:GEOQuery)
      RETURN qs.key, qs.last_sync, count(q) AS query_count
