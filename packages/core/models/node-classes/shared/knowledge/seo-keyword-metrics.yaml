# models/node-classes/shared/knowledge/seo-keyword-metrics.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# SEOKeywordMetrics - Historical metrics snapshot for an SEO keyword

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: SEOKeywordMetrics
  realm: shared
  layer: knowledge
  trait: retrieved  # External API snapshots (not generated by our LLM)

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Historical metrics snapshot for an SEO keyword (time-series data)"

  llm_context: |
    USE: when tracking keyword performance over time, analyzing trends.
    TRIGGERS: "keyword metrics", "SEO history", "position tracking", "GSC data".
    NOT: for keyword definition (use SEOKeyword), for GEO visibility (use GEOAnswer).
    RELATES: SEOKeyword (parent via HAS_METRICS).
    NOTE: HAS_METRICS is auxiliary - excluded from spreading activation.

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: camera
    terminal: "◇"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier"
      example: "metrics-creer-qr-code-fr-2024-01-15"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "créer qr code - 2024-01-15"

    description:
      type: string
      required: false
      description: "Short description"

    created_at:
      type: datetime
      required: false
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: false
      description: "Last update timestamp"

  properties:
    # --- Observation metadata ---
    observed_at:
      type: datetime
      required: true
      description: "When these metrics were observed/scraped"
      example: "2024-01-15T10:30:00Z"

    source:
      type: string
      required: true
      description: "Data source: semrush | ahrefs | google_search_console"
      example: "semrush"

    # --- Keyword metrics snapshot ---
    volume:
      type: int
      required: false
      description: "Monthly search volume at time of observation"
      example: 12000

    difficulty:
      type: float
      required: false
      description: "Keyword difficulty (0-100)"
      example: 45.5

    cpc:
      type: float
      required: false
      description: "Cost per click at time of observation"
      example: 0.85

    clicks:
      type: int
      required: false
      description: "Estimated monthly clicks at observation (Ahrefs)"
      example: 9500

    traffic_potential:
      type: int
      required: false
      description: "Traffic potential at observation (Ahrefs)"
      example: 8200

    # --- Position tracking (our performance) ---
    position:
      type: float
      required: false
      description: "Our average ranking position for this keyword"
      example: 8.5

    best_position:
      type: int
      required: false
      description: "Best position achieved that day"
      example: 6

    url:
      type: string
      required: false
      description: "URL path that ranks for this keyword"
      example: "/fr/creer-qr-code"

    # --- Google Search Console data ---
    impressions:
      type: int
      required: false
      description: "GSC impressions (how many times we appeared)"
      example: 15000

    clicks_gsc:
      type: int
      required: false
      description: "GSC clicks (actual clicks we received)"
      example: 1200

    ctr:
      type: float
      required: false
      description: "Click-through rate (clicks_gsc / impressions)"
      example: 0.08

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    incoming:
      - type: HAS_METRICS
        from: SEOKeyword
        cardinality: "1:N"
        description: "Belongs to a keyword as time-series snapshot"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX seokeywordmetrics_observed IF NOT EXISTS FOR (m:SEOKeywordMetrics) ON (m.observed_at)"

  example:
    data:
      key: "metrics-creer-qr-code-fr-2024-01-15"
      display_name: "créer qr code - 2024-01-15"
      observed_at: "2024-01-15T10:30:00Z"
      source: "semrush"
      volume: 12000
      difficulty: 45.5
      position: 8.5
      impressions: 15000
      clicks_gsc: 1200
      ctr: 0.08
    cypher: |
      MATCH (kw:SEOKeyword {key: $keyword_key})-[:HAS_METRICS]->(m:SEOKeywordMetrics)
      RETURN m.observed_at,
             m.volume,
             m.difficulty,
             m.position,
             m.impressions,
             m.clicks_gsc,
             m.ctr
      ORDER BY m.observed_at DESC
      LIMIT 30
