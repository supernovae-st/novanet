# models/node-classes/shared/knowledge/seo-keyword-set.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# SEOKeywordSet - Container for SEO keywords belonging to a locale

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: SEOKeywordSet
  realm: shared
  layer: knowledge
  trait: defined  # Containers are universal categories (defined), atoms are locale-native (imported)

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Container for SEO keywords belonging to a locale (1:1 with Locale)"

  llm_context: |
    USE: when accessing locale's SEO keywords for content optimization.
    TRIGGERS: "SEO keywords", "keyword set", "locale keywords", "keyword container".
    NOT: for individual keywords (use SEOKeyword via CONTAINS_SEO_KEYWORD).
    RELATES: SEOKeyword (contains via CONTAINS_SEO_KEYWORD), Locale (owner via HAS_SEO_KEYWORDS).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: package
    terminal: "■"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      description: "Set key (format: seo-keywords@{locale_key})"
      pattern: "^seo-keywords@[a-z]{2}-[A-Z]{2}$"
      examples:
        - "seo-keywords@fr-FR"
        - "seo-keywords@en-US"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "SEO Keywords (French - France)"

    description:
      type: string
      required: false
      description: "Short description"
      example: "French market SEO keywords from DataForSEO"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    last_sync:
      type: datetime
      required: false
      description: "Last DataForSEO sync timestamp"
      example: "2026-02-10T14:00:00Z"

    data_source:
      type: string
      required: false
      default: "dataforseo"
      description: "Source of keyword data"
      example: "dataforseo"

    total_keywords:
      type: int
      required: false
      description: "Count of keywords in this set"
      example: 15420

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: CONTAINS_SEO_KEYWORD
        to: SEOKeyword
        cardinality: "1:N"
        description: "SEOKeywordSet contains multiple SEOKeyword atoms"

    incoming:
      - type: HAS_SEO_KEYWORDS
        from: Locale
        cardinality: "1:1"
        description: "Locale has exactly one SEO keyword set"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX seokeywordset_key IF NOT EXISTS FOR (ks:SEOKeywordSet) ON (ks.key)"

  example:
    data:
      key: "seo-keywords@fr-FR"
      display_name: "SEO Keywords (French - France)"
      description: "French market SEO keywords from DataForSEO"
      last_sync: "2026-02-10T14:00:00Z"
      data_source: "dataforseo"
      total_keywords: 15420
    cypher: |
      MATCH (l:Locale {key: 'fr-FR'})-[:HAS_SEO_KEYWORDS]->(ks:SEOKeywordSet)
      OPTIONAL MATCH (ks)-[:CONTAINS_SEO_KEYWORD]->(kw:SEOKeyword)
      RETURN ks.key, ks.last_sync, count(kw) AS keyword_count
