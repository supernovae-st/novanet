# ─────────────────────────────────────────────────────────────────────────────
# PatternSet — Container grouping Pattern atoms by usage
# ─────────────────────────────────────────────────────────────────────────────
# v0.13.1: LLM-First field ordering (ADR-031)
# v10.1: Pure container (no JSON blobs - data lives in Pattern atoms)
# Usages: cta, headlines, body, social
# Stability: High - structure rarely changes
# ─────────────────────────────────────────────────────────────────────────────

node:
  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY
  # ═══════════════════════════════════════════════════════════════════════════
  name: PatternSet
  realm: shared
  layer: knowledge
  trait: defined  # v11.2: Containers are universal categories (invariant), atoms are locale-native (knowledge)

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC
  # ═══════════════════════════════════════════════════════════════════════════
  description: "Container grouping Pattern atoms by usage"

  llm_context: |
    USE: to find patterns by usage category.
    TRIGGERS: CTA, headline, body, social, pattern container.
    NOT: individual templates (use Pattern via CONTAINS).
    RELATES: Pattern (CONTAINS), Locale (HAS_PATTERNS).

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL
  # ═══════════════════════════════════════════════════════════════════════════
  icon:
    web: "clipboard"
    terminal: "▤"

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA
  # ═══════════════════════════════════════════════════════════════════════════
  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) CTA Patterns"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Call-to-action patterns for fr-FR"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Usage identification (only property - data is in atoms)
    usage:
      type: string
      required: true
      enum: [cta, headlines, body, social]
      description: "Pattern usage category this set groups"
      example: "cta"

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH
  # ═══════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: CONTAINS
        to: Pattern
        cardinality: "1:N"
        description: "PatternSet contains multiple Pattern atoms"

    incoming:
      - type: HAS_PATTERNS
        from: Locale
        cardinality: "1:N"
        description: "Locale has multiple pattern sets (one per usage)"
        properties:
          usage: string
