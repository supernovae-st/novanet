# models/node-classes/shared/knowledge/pattern-set.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# PatternSet - Container grouping Pattern atoms by usage

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: PatternSet
  realm: shared
  layer: knowledge
  trait: defined  # Containers are universal categories (defined), atoms are locale-native (imported)

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Container grouping Pattern atoms by usage. Pure container (data lives in Pattern atoms)."

  llm_context: |
    USE: when finding patterns by usage category (CTA, headlines, body, social).
    TRIGGERS: "CTA", "headline", "body", "social", "pattern container".
    NOT: for individual templates (use Pattern via CONTAINS_PATTERN).
    RELATES: Pattern (contains via CONTAINS_PATTERN), Locale (owner via HAS_PATTERNS).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: clipboard
    terminal: "▤"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) CTA Patterns"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Call-to-action patterns for fr-FR"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    usage:
      type: string
      required: true
      enum: [cta, headlines, body, social]
      description: "Pattern usage category this set groups"
      example: "cta"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: CONTAINS_PATTERN
        to: Pattern
        cardinality: "1:N"
        description: "PatternSet contains multiple Pattern atoms"

    incoming:
      - type: HAS_PATTERNS
        from: Locale
        cardinality: "1:N"
        description: "Locale has multiple pattern sets (one per usage)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX patternset_usage IF NOT EXISTS FOR (ps:PatternSet) ON (ps.usage)"

  example:
    data:
      display_name: "French (France) CTA Patterns"
      description: "Call-to-action patterns for fr-FR"
      usage: "cta"
    cypher: |
      MATCH (l:Locale {key: "fr-FR"})
      CREATE (ps:PatternSet {
        display_name: 'French (France) CTA Patterns',
        description: 'Call-to-action patterns for fr-FR',
        usage: 'cta',
        created_at: datetime(),
        updated_at: datetime()
      })
      CREATE (l)-[:HAS_PATTERNS]->(ps)
      RETURN ps
