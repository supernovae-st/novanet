# models/node-classes/shared/knowledge/culture-set.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# CultureSet - Container grouping CultureRef atoms by type

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: CultureSet
  realm: shared
  layer: knowledge
  trait: defined  # Containers are universal categories (defined), atoms are locale-native (imported)

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Container grouping CultureRef atoms by type. Pure container (data lives in CultureRef atoms)."

  llm_context: |
    USE: when finding cultural references by type (values, holidays, celebrities).
    TRIGGERS: "values", "holidays", "cultural references", "culture container".
    NOT: for individual refs (use CultureRef via CONTAINS_CULTURE_REF).
    RELATES: CultureRef (contains via CONTAINS_CULTURE_REF), Locale (owner via HAS_CULTURE).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: drama
    terminal: "◎"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) Cultural Values"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Core cultural values for fr-FR"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    culture_type:
      type: string
      required: true
      enum: [values, references, celebrities, calendar]
      description: "Cultural knowledge type this set groups"
      example: "values"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: CONTAINS_CULTURE_REF
        to: CultureRef
        cardinality: "1:N"
        description: "CultureSet contains multiple CultureRef atoms"

    incoming:
      - type: HAS_CULTURE
        from: Locale
        cardinality: "1:N"
        description: "Locale has culture sets (one per type)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX cultureset_type IF NOT EXISTS FOR (cs:CultureSet) ON (cs.culture_type)"

  example:
    data:
      display_name: "French (France) Cultural Values"
      description: "Core cultural values for fr-FR"
      culture_type: "values"
    cypher: |
      MATCH (l:Locale {key: "fr-FR"})
      CREATE (cs:CultureSet {
        display_name: 'French (France) Cultural Values',
        description: 'Core cultural values for fr-FR',
        culture_type: 'values',
        created_at: datetime(),
        updated_at: datetime()
      })
      CREATE (l)-[:HAS_CULTURE]->(cs)
      RETURN cs
