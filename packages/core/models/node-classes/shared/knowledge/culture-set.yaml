# ─────────────────────────────────────────────────────────────────────────────
# CultureSet — Container grouping CultureRef atoms by type
# ─────────────────────────────────────────────────────────────────────────────
# v0.13.1: LLM-First field ordering (ADR-031)
# v10.1: Pure container (no JSON blobs - data lives in CultureRef atoms)
# Types: values, references, celebrities, calendar
# Stability: High - structure rarely changes
# ─────────────────────────────────────────────────────────────────────────────

node:
  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY
  # ═══════════════════════════════════════════════════════════════════════════
  name: CultureSet
  realm: shared
  layer: knowledge
  trait: defined  # v11.2: Containers are universal categories (invariant), atoms are locale-native (knowledge)

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC
  # ═══════════════════════════════════════════════════════════════════════════
  description: "Container grouping CultureRef atoms by type"

  llm_context: |
    USE: to find culture refs by type.
    TRIGGERS: values, holidays, cultural references, culture container.
    NOT: individual refs (use CultureRef via CONTAINS).
    RELATES: CultureRef (CONTAINS), Locale (HAS_CULTURE_SET).

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL
  # ═══════════════════════════════════════════════════════════════════════════
  icon:
    web: "drama"
    terminal: "◎"

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA
  # ═══════════════════════════════════════════════════════════════════════════
  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) Cultural Values"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Core cultural values for fr-FR"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Type identification (only property - data is in atoms)
    culture_type:
      type: string
      required: true
      enum: [values, references, celebrities, calendar]
      description: "Cultural knowledge type this set groups"
      example: "values"

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH
  # ═══════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: CONTAINS
        to: CultureRef
        cardinality: "1:N"
        description: "CultureSet contains multiple CultureRef atoms"

    incoming:
      - type: HAS_CULTURE_SET
        from: Locale
        cardinality: "1:N"
        description: "Locale has culture sets (one per type)"
        properties:
          type: string
