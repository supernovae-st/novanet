# models/node-classes/shared/knowledge/population-sub-cluster.yaml
# v0.13.1 LLM-First Schema - Canonical field ordering for optimal AI comprehension
# PopulationSubCluster - Sub-cluster for fine-grained image generation diversity

node:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 1: IDENTITY (name, realm, layer, trait)
  # ═══════════════════════════════════════════════════════════════════════════════
  name: PopulationSubCluster
  realm: shared
  layer: knowledge
  trait: imported

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 2: SEMANTIC (description, llm_context)
  # ═══════════════════════════════════════════════════════════════════════════════
  description: "Population sub-cluster with specific visual traits for image generation"

  llm_context: |
    USE: for fine-grained image generation diversity within a macro population cluster.
    TRIGGERS: "northern european", "mediterranean", "han chinese", "population diversity", "image generation".
    NOT: for macro population patterns (use PopulationCluster).
    RELATES: PopulationCluster (CLUSTER_OF), Locale (HAS_POPULATION).

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 3: VISUAL (icon)
  # ═══════════════════════════════════════════════════════════════════════════════
  icon:
    web: user
    terminal: "◇"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 4: DATA (standard_properties, properties)
  # ═══════════════════════════════════════════════════════════════════════════════
  standard_properties:
    key:
      type: string
      required: true
      description: "Kebab-case sub-cluster key"
      pattern: "^[a-z-]+$"
      examples:
        - "northern-european"
        - "mediterranean"
        - "middle-eastern"
        - "han-chinese"
        - "japanese"
        - "west-african"

    display_name:
      type: string
      required: true
      description: "Human-readable sub-cluster name"
      example: "Northern European"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Nordic and Germanic populations (Scandinavia, Germany, Netherlands, UK)"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Instance-level LLM context (BLOC 4 - optional, distinct from BLOC 2 llm_context above)
    llm_context:
      type: string
      required: false
      description: "Instance-specific context for LLM generation. Focused characteristics for this particular node instance."

    parent_cluster:
      type: string
      required: true
      description: "Parent PopulationCluster key"
      example: "west-eurasian"

    visual_traits:
      type: json
      required: true
      description: "Specific visual traits for image prompts"
      example:
        - "light to very light skin tone"
        - "blonde to light brown hair"
        - "blue, green, or grey eyes"
        - "tall stature"

    skin_tone_range:
      type: string
      required: true
      description: "Skin tone range description for image generation"
      example: "very light to light"

    hair_colors:
      type: json
      required: true
      description: "Common hair colors"
      example:
        - "blonde"
        - "light brown"
        - "red"

    eye_colors:
      type: json
      required: true
      description: "Common eye colors"
      example:
        - "blue"
        - "green"
        - "grey"
        - "light brown"

    image_prompt_template:
      type: string
      required: false
      description: "Template for image generation prompts"
      example: "professional person with {skin_tone_range} skin, {hair_colors} hair"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 5: GRAPH (relations)
  # ═══════════════════════════════════════════════════════════════════════════════
  relations:
    outgoing:
      - type: CLUSTER_OF
        to: PopulationCluster
        cardinality: "N:1"
        description: "Sub-cluster belongs to macro population cluster"

    incoming:
      - type: HAS_POPULATION
        from: Locale
        cardinality: "N:M"
        properties:
          percentage:
            type: float
            description: "Population percentage (0.0 to 1.0)"
          is_majority:
            type: bool
            description: "True if >50%"
        description: "Locales with this population sub-cluster"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOC 6: REFERENCE (example, neo4j)
  # ═══════════════════════════════════════════════════════════════════════════════
  neo4j:
    indexes:
      - "CREATE INDEX populationsubcluster_key IF NOT EXISTS FOR (ps:PopulationSubCluster) ON (ps.key)"

  example:
    data:
      key: "northern-european"
      display_name: "Northern European"
      description: "Nordic and Germanic populations (Scandinavia, Germany, Netherlands, UK)"
      parent_cluster: "west-eurasian"
      visual_traits:
        - "light to very light skin tone"
        - "blonde to light brown hair"
        - "blue, green, or grey eyes"
        - "tall stature"
      skin_tone_range: "very light to light"
      hair_colors:
        - "blonde"
        - "light brown"
        - "red"
      eye_colors:
        - "blue"
        - "green"
        - "grey"
        - "light brown"
    cypher: |
      MATCH (ps:PopulationSubCluster {key: $key})
      RETURN ps.visual_traits, ps.skin_tone_range, ps.hair_colors, ps.eye_colors

      // Get all locales with this population
      MATCH (ps:PopulationSubCluster {key: $key})<-[hp:HAS_POPULATION]-(l:Locale)
      RETURN l.key, l.display_name, hp.percentage, hp.is_majority
      ORDER BY hp.percentage DESC
