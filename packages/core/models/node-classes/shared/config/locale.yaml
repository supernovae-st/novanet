# models/node-classes/shared/config/locale.yaml
# Locale - Graph-native locale node with fallback chains and knowledge links
#
# v11.5: Moved from shared/locale to shared/config
#        - Locale is a DEFINITION (invariant), not a parameter
#        - shared/locale now contains only locale SETTINGS (Culture, Style, etc.)
#        - Follows EntityCategory pattern: definitions in config layer

node:
  name: Locale
  realm: shared
  layer: config
  trait: defined
  icon:
    web: "diamond"
    terminal: "◆"
  description: "First-class locale node (BCP 47) with fallback chains and knowledge graph connections"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "BCP 47 locale code"
      pattern: "^[a-z]{2}-[A-Z]{2}$"
      examples:
        - "fr-FR"
        - "en-US"
        - "ja-JP"
        - "es-MX"

    display_name:
      type: string
      required: true
      description: "Human-readable name in English"
      example: "French (France)"

    description:
      type: string
      required: true
      description: "One-line description of the locale"
      example: "French locale for France market"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: 'USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]. RELATES: [connections].'"
      example: |
        USE: when generating content for a specific locale or loading locale-specific knowledge.
        TRIGGERS: "locale", "language", "market", locale code (e.g., "fr-FR"), native name (e.g., "français").
        NOT: for other regional variants (use appropriate locale, e.g., fr-CA for Quebec French).
        RELATES: EntityNative (targets via FOR_LOCALE), Style (communication via HAS_STYLE), TermSet (vocabulary via HAS_TERMS), Culture (cultural context via HAS_CULTURE), Project (supported by via SUPPORTS_LOCALE).

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # LOCALE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    language_code:
      type: string
      required: true
      description: "ISO 639-1 language code"
      pattern: "^[a-z]{2}$"
      example: "fr"

    country_code:
      type: string
      required: true
      description: "ISO 3166-1 alpha-2 country code"
      pattern: "^[A-Z]{2}$"
      example: "FR"

    name_native:
      type: string
      required: true
      description: "Locale name in the native language"
      example: "Français (France)"

    is_primary:
      type: boolean
      required: false
      description: "True if this is the primary locale for the language"
      example: true

    # v10.7: Geographic properties for LLM retrieval optimization
    region:
      type: string
      required: true
      enum: [europe, asia, americas, africa, oceania, middle_east]
      description: "Geographic region for clustering similar markets and cultural patterns"
      example: "europe"

    language_family:
      type: string
      required: true
      enum: [romance, germanic, slavic, sino_tibetan, semitic, japonic, koreanic, austronesian, indo_aryan, dravidian, turkic, uralic, other]
      description: "Linguistic family for sharing expressions and grammatical patterns"
      example: "romance"

    script:
      type: string
      required: true
      enum: [latin, cyrillic, arabic, hebrew, cjk, devanagari, thai, korean, greek, other]
      description: "Writing system for text handling, transliteration, and slug generation"
      example: "latin"

    text_direction:
      type: string
      required: true
      enum: [ltr, rtl]
      description: "Text direction for layout and UI considerations"
      example: "ltr"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS (FROM this node)
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    # --- Locale chain ---
    FALLBACK_TO:
      to: Locale
      cardinality: "N:1"
      description: "Fallback chain for content resolution (e.g., fr-CA → fr-FR → en-US)"

    # --- v10.1 Tiered Knowledge (1:1) ---
    HAS_STYLE:
      to: Style
      cardinality: "1:1"
      description: "Communication style: tone, formality, directness, warmth, humor"

    HAS_FORMATTING:
      to: Formatting
      cardinality: "1:1"
      description: "Formatting rules: date, number, currency, units"

    HAS_SLUGIFICATION:
      to: Slugification
      cardinality: "1:1"
      description: "URL slug rules: transliteration, separators, stopwords"

    HAS_ADAPTATION:
      to: Adaptation
      cardinality: "1:1"
      description: "Cultural adaptation: idioms, metaphors, humor, examples"

    # --- v10.1 Knowledge Containers (1:N by domain/register) ---
    HAS_TERMS:
      to: TermSet
      cardinality: "1:N"
      description: "Term sets by domain (pricing, features, technical, etc.)"

    HAS_EXPRESSIONS:
      to: ExpressionSet
      cardinality: "1:N"
      description: "Expression sets by register (formal, casual, technical)"

    HAS_PATTERNS:
      to: PatternSet
      cardinality: "1:N"
      description: "Pattern sets by usage (titles, cta, meta_desc, etc.)"

    HAS_CULTURE:
      to: Culture
      cardinality: "1:1"
      description: "Culture configuration node with values, taboos, sensitivities"

    HAS_MARKET:
      to: Market
      cardinality: "1:1"
      description: "Market intelligence node with competitors, pricing, trends"

    HAS_CULTURE_SET:
      to: CultureSet
      cardinality: "1:N"
      description: "Culture reference sets by type (holidays, events, symbols)"

    HAS_TABOOS:
      to: TabooSet
      cardinality: "1:N"
      description: "Taboo sets by severity (hard_block, soft_avoid, context_dep)"

    HAS_AUDIENCE:
      to: AudienceSet
      cardinality: "1:N"
      description: "Audience trait sets by segment (b2b, b2c, enterprise)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # INCOMING RELATIONS (TO this node)
  # ═══════════════════════════════════════════════════════════════════════════════

  incoming_relations:
    FOR_LOCALE:
      from: "[EntityNative, BlockNative, PageNative, OutputArtifact, ProjectNative]"
      description: "Content nodes targeting this locale"

    SUPPORTS_LOCALE:
      from: Project
      description: "Projects that support this locale"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    data:
      key: "fr-FR"
      display_name: "French (France)"
      description: "French locale for France market"
      llm_context: "USE: for French content targeting France. TRIGGERS: fr-FR, français, france. NOT: Quebec French (use fr-CA)."
      language_code: "fr"
      country_code: "FR"
      name_native: "Français (France)"
      is_primary: true
      region: "europe"
      language_family: "romance"
      script: "latin"
      text_direction: "ltr"

    cypher: |
      // Get locale with tiered knowledge (v10.1)
      MATCH (l:Locale {key: $key})
      OPTIONAL MATCH (l)-[:HAS_STYLE]->(style:Style)
      OPTIONAL MATCH (l)-[:HAS_FORMATTING]->(fmt:Formatting)
      OPTIONAL MATCH (l)-[:HAS_SLUGIFICATION]->(slug:Slugification)
      OPTIONAL MATCH (l)-[:HAS_ADAPTATION]->(adapt:Adaptation)
      RETURN l, style, fmt, slug, adapt

      // Get locale with term sets and atoms
      MATCH (l:Locale {key: $key})-[:HAS_TERMS]->(ts:TermSet)-[:CONTAINS]->(t:Term)
      RETURN ts.domain AS domain, collect(t.value) AS terms

      // Get fallback chain for a locale
      MATCH (l:Locale {key: $key})-[:FALLBACK_TO*0..3]->(fallback)
      RETURN fallback.key AS locale
      ORDER BY length((l)-[:FALLBACK_TO*]->(fallback))

      // Get all content for a locale
      MATCH (l:Locale {key: $key})<-[:FOR_LOCALE]-(content)
      RETURN labels(content)[0] AS type, count(*) AS count
      ORDER BY count DESC
