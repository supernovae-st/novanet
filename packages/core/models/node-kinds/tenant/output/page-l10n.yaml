# models/nodes/project/output/page-l10n.yaml
# PageL10n - Assembled LLM-generated page content (v7.11.0)
#
# v7.11.0 CHANGES:
#   - ADDED: version, published_at, replaced_at (versioning support)
#   - ADDED: PREVIOUS_VERSION relation (history chain)
#   - REMOVED: HAS_METRICS to PageMetrics (query GA/PostHog with date ranges instead)
#
# NAMING PHILOSOPHY (v7.6.0):
#   - *L10n suffix for ALL localized content (human OR LLM generated)
#   - :HAS_L10N relationship → human-curated content
#   - :HAS_OUTPUT relationship → LLM-generated content

node:
  name: PageL10n
  realm: tenant
  layer: output
  trait: localized
  icon: "🟠"
  description: "Assembled BlockL10n content for a page in a specific locale"

  # ═══════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (L10n nodes - no key, identified by relation)
  # ═══════════════════════════════════════════════════════════════════════════

  standard_properties:
    display_name:
      type: string
      required: true
      description: "Auto-generated name"
      example: "Pricing Page (fr-FR)"


    description:
      type: string
      required: true
      description: "Short description"
      example: "Assembled pricing page for French market"

    llm_context:
      type: string
      required: false
      description: "Generation context used"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ═══════════════════════════════════════════════════════════════════════════
  # PAGEL10N-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════

  properties:
    assembled:
      type: json
      required: true
      description: "Compiled blocks as JSON"

    assembled_at:
      type: datetime
      required: true
      description: "Assembly timestamp"

    assembler_version:
      type: string
      required: true
      description: "Version tracking"
      example: "1.2.0"

    status:
      type: string
      required: true
      enum: ["draft", "published", "archived"]
      description: "Publication status"

    # ─────────────────────────────────────────────────────────────────────────
    # VERSIONING (v7.11.0)
    # ─────────────────────────────────────────────────────────────────────────

    version:
      type: int
      required: true
      description: "Version number (1, 2, 3...)"
      example: 1

    published_at:
      type: datetime
      required: false
      description: "When this version was put live"

    replaced_at:
      type: datetime
      required: false
      description: "When this version was replaced (null = current)"

  # ═══════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════

  relations:
    incoming:
      - type: HAS_OUTPUT
        from: Page
        description: "Page that owns this LLM-generated content"

      - type: GENERATED
        from: PagePrompt
        description: "Prompt that generated this output (provenance)"

    outgoing:
      - type: FOR_LOCALE
        to: Locale
        description: "Target locale for this output"

      # REMOVED v7.11.0: HAS_METRICS to PageMetrics (query GA/PostHog with date ranges)

      - type: ASSEMBLES
        to: BlockL10n
        description: "BlockL10n nodes assembled into this page"

      - type: BELONGS_TO_PROJECT_L10N
        to: ProjectL10n
        description: "Locale-aligned project context (voice, tagline, CTAs)"

      - type: PREVIOUS_VERSION
        to: PageL10n
        cardinality: "1:1"
        description: "Link to previous version in history chain (v7.11.0)"

  # ═══════════════════════════════════════════════════════════════════════════
  # NEO4J CONFIGURATION
  # ═══════════════════════════════════════════════════════════════════════════

  neo4j:
    indexes:
      - "CREATE INDEX pagel10n_status IF NOT EXISTS FOR (pl:PageL10n) ON (pl.status)"
      - "CREATE INDEX pagel10n_date IF NOT EXISTS FOR (pl:PageL10n) ON (pl.assembled_at)"

  # ═══════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════

  example:
    display_name: "Page Tarifs (fr-FR)"
    description: "Page tarifs assemblée pour le marché français"
    llm_context: "USE: display assembled page content. TRIGGERS: pricing page, fr-FR output. NOT: regeneration trigger."
    assembled:
      headers:
        title: "Tarifs QR Code AI"
        meta_description: "Découvrez nos formules de création de QR codes..."
      sections:
        - type: "hero"
          content: "..."
        - type: "pricing-table"
          content: "..."
    assembled_at: "2024-01-15T10:30:00Z"
    assembler_version: "1.2.0"
    status: "published"
    # Versioning (v7.11.0)
    version: 3
    published_at: "2024-01-15T10:35:00Z"
    replaced_at: null  # Current version
