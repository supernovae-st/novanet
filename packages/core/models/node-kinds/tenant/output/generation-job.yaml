node:
  name: GenerationJob
  realm: tenant
  layer: output
  trait: job
  icon: "🚀"
  description: "Background job orchestrating content generation pipeline. Tracks lifecycle of generation runs."
  llm_context: "USE: when generating content for locales. TRIGGERS: generate, run, job, pipeline. NOT: prompts, templates."

  standard_properties:
    key:
      type: string
      required: false
      description: "Optional UUID identifier for the job"
    display_name:
      type: string
      required: true
      description: "Human-readable job name"
      example: "Generate Project XYZ - fr-FR (2024-01-15)"
    description:
      type: string
      required: false
    llm_context:
      type: string
      required: false
      description: "Job metadata for auditing"
    created_at:
      type: datetime
      required: true
    updated_at:
      type: datetime
      required: true

  properties:
    status:
      type: string
      required: true
      enum: ["queued", "running", "completed", "failed", "cancelled"]
      description: "Job lifecycle state"

    trigger_type:
      type: string
      required: true
      enum: ["manual", "schedule", "webhook", "api"]
      description: "What triggered this job"

    started_at:
      type: datetime
      required: false
    completed_at:
      type: datetime
      required: false
    error_message:
      type: string
      required: false

    pages_generated:
      type: int
      required: false
      description: "Count of pages generated"
    blocks_generated:
      type: int
      required: false
      description: "Count of blocks generated"
    locales_targeted:
      type: "string[]"
      required: false
      description: "List of locale codes targeted"

    generator_version:
      type: string
      required: true
      description: "Version of the generator used"
      example: "1.2.0"

  neo4j:
    indexes:
      - "CREATE INDEX generationjob_status IF NOT EXISTS FOR (gj:GenerationJob) ON (gj.status)"
      - "CREATE INDEX generationjob_trigger IF NOT EXISTS FOR (gj:GenerationJob) ON (gj.trigger_type)"

  relations:
    incoming:
      - type: TRIGGERED_BY
        from: Project
        description: "Project that triggered this generation job"

    outgoing:
      - type: USES_PROMPT
        to: PromptArtifact
        description: "Prompt artifacts used for generation"

      - type: PRODUCES
        to: OutputArtifact
        description: "Output artifacts produced by this job"

      - type: CREATES_CONTENT
        to:
          - PageL10n
          - BlockL10n
        description: "L10n content created by this job"

      - type: FOR_LOCALE
        to: Locale
        description: "Target locale(s) for this generation job"
