# models/nodes/project/instruction/block-prompt.yaml
# BlockPrompt - Sub-agent instructions for block generation (v7.2.0)

node:
  name: BlockPrompt
  realm: tenant
  layer: instruction
  trait: invariant
  icon: "🔵"
  description: "AI instructions for generating a specific block with versioning"

  # ═══════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (Prompt nodes - no key, v7.2.0)
  # ═══════════════════════════════════════════════════════════════════════════

  standard_properties:
    display_name:
      type: string
      required: true
      description: "Versioned display name"
      example: "Pricing Hero Prompt v1.2"


    description:
      type: string
      required: true
      description: "Short description"
      example: "Instructions for pricing hero generation"

    llm_context:
      type: string
      required: false
      description: "Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."
      example: "USE: generate pricing hero block. TRIGGERS: block-pricing-hero. NOT: other blocks."



    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOCKPROMPT-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════

  properties:
    prompt:
      type: string
      required: true
      description: "Sub-agent directive with @concept-key references"
      example: "[GENERATE] Hero highlighting @tier-pro benefits"

    version:
      type: string
      required: true
      description: "Semver format for versioning"
      example: "1.0"

    active:
      type: boolean
      required: true
      default: false
      description: "true = current active version"

  # ═══════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════

  relations:
    incoming:
      - type: HAS_PROMPT
        from: Block
        description: "Block that owns this prompt"

    outgoing:
      - type: GENERATED
        to: BlockGenerated
        description: "Outputs generated by this prompt (provenance)"
        properties:
          generated_at: datetime

  # ═══════════════════════════════════════════════════════════════════════════
  # NEO4J CONFIGURATION
  # ═══════════════════════════════════════════════════════════════════════════

  neo4j:
    indexes:
      - "CREATE INDEX blockprompt_active IF NOT EXISTS FOR (bp:BlockPrompt) ON (bp.active)"
      - "CREATE INDEX blockprompt_version IF NOT EXISTS FOR (bp:BlockPrompt) ON (bp.version)"

  # ═══════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════

  example:
    display_name: "Pricing Hero Prompt v1.0"
    description: "Sub-agent instructions for pricing hero generation"
    llm_context: "USE: generate pricing hero block. TRIGGERS: block-pricing-hero. NOT: other blocks."
    prompt: "[GENERATE] Hero for pricing page, highlight @tier-pro benefits with urgency CTA"
    version: "1.0"
    active: true
