# models/node-kinds/global/seo/geo-metrics.yaml
# GEOMetrics - Time-series visibility metrics (immutable snapshot)
#
# v10.7: GEO Schema v1
#        - Historical visibility data for trend analysis
#        - Immutable snapshot: once created, never updated
#        - Tracks visibility changes and citation trends
#        - Owned by GEOQuery via HAS_GEO_METRICS (mining arc)

node:
  name: GEOMetrics
  realm: tenant
  layer: seo
  trait: derived
  icon: "📊"
  description: "Time-series visibility metrics for GEO trend analysis (immutable snapshot)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier"
      example: "geo-metrics-20260208-abc123"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "GEO Metrics 2026-02-08"

    description:
      type: string
      required: false
      description: "Short description"

    llm_context:
      type: string
      required: false
      description: "Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."

    created_at:
      type: datetime
      required: false

    updated_at:
      type: datetime
      required: false

  # ═══════════════════════════════════════════════════════════════════════════════
  # NODE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    # --- Timestamp ---
    observed_at:
      type: datetime
      required: true
      description: "Timestamp when these metrics were captured"
      example: "2026-02-08T00:00:00Z"

    # --- Visibility score ---
    ai_visibility_score:
      type: float
      required: true
      description: "Weighted average visibility across all AI engines (0-100)"
      example: 72.5

    # --- Change metrics ---
    visibility_change_7d:
      type: float
      required: false
      description: "Visibility change over last 7 days (percentage points)"
      example: 5.2

    visibility_change_30d:
      type: float
      required: false
      description: "Visibility change over last 30 days (percentage points)"
      example: 12.8

    # --- Trend analysis ---
    citation_trend:
      type: string
      required: false
      description: "Citation trend direction: rising | stable | declining"
      example: "rising"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    # Incoming: GEOQuery --[:HAS_GEO_METRICS]--> GEOMetrics (mining)
    # This is a leaf node - no outgoing relations

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    description: "Get visibility trend for a query over 30 days"
    cypher: |
      // v10.7: GEOMetrics time-series for trend analysis
      MATCH (q:GEOQuery {key: $query_key})-[:HAS_GEO_METRICS]->(m:GEOMetrics)
      WHERE m.observed_at >= datetime() - duration('P30D')
      RETURN m.observed_at,
             m.ai_visibility_score,
             m.visibility_change_7d,
             m.citation_trend
      ORDER BY m.observed_at ASC
