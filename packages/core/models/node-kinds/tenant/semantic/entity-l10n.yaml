# models/node-kinds/tenant/semantic/entity-l10n.yaml
# EntityL10n - Localized content for Tenant Entity nodes (v11)
#
# ═══════════════════════════════════════════════════════════════════════════════
# PURPOSE
# ═══════════════════════════════════════════════════════════════════════════════
#
# EntityL10n provides locale-native content for a parent Entity. This is the
# LOCALIZED half of the Entity/EntityL10n pair.
#
# ═══════════════════════════════════════════════════════════════════════════════
# ARCHITECTURE (Full Hierarchy)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   Organization ──[:HAS_PROJECT]──> Project ──[:HAS_ENTITY]──> Entity (invariant)
#                                                                     │
#                                                                     └──[:HAS_L10N]──> EntityL10n
#                                                                                            │
#                                                                                            ├──[:FOR_LOCALE]──> Locale
#                                                                                            │
#                                                                                            ├──[:TARGETS]──> SEOKeyword (N:N)
#                                                                                            │                     │
#                                                                                            │                     ├──[:HAS_METRICS]──> SEOKeywordMetrics
#                                                                                            │                     ├──[:HAS_QUESTIONS]──> SEOQuestion
#                                                                                            │                     ├──[:HAS_COMPARISONS]──> SEOComparison
#                                                                                            │                     └──[:HAS_PREPOSITIONS]──> SEOPreposition
#                                                                                            │
#                                                                                            └──[:ANSWERS]──> SEOQuestion (coverage tracking)
#
# Organization: Lists all projects (e.g., SuperNovae Studio)
# Project: Contains entities for one product (e.g., QR Code AI)
# Entity: Invariant definition (EN key, universal properties)
# EntityL10n: Locale-native content + SEO keywords for THAT locale
#
# SEO ARCHITECTURE:
#   • SEOKeyword: Root keyword with metrics (owned by Locale via HAS_SEO_KEYWORDS)
#   • SEOKeywordMetrics: Time-series snapshots (volume, position, impressions, ctr)
#   • SEOQuestion: Question-form keywords from ATP ("comment créer...")
#   • SEOComparison: Comparison keywords ("X vs Y")
#   • SEOPreposition: Preposition keywords ("X for Y")
#
# ═══════════════════════════════════════════════════════════════════════════════
# KEY PRINCIPLE: Generation, NOT Translation
# ═══════════════════════════════════════════════════════════════════════════════
#
#   WRONG:  Entity(EN) → Translate → EntityL10n(FR)
#   RIGHT:  Entity(invariant) → Generate natively → EntityL10n(FR)
#
# EntityL10n content is GENERATED natively for each locale, not translated.
# This preserves cultural nuance and locale-specific expressions.
#
# ═══════════════════════════════════════════════════════════════════════════════
# PROPERTY PHILOSOPHY
# ═══════════════════════════════════════════════════════════════════════════════
#
#   • display_name  = Locale-native name (how users see it)
#   • description   = WHAT it IS in this locale (comprehension)
#   • llm_context   = HOW to USE it for this locale (generation rules)
#   • definition    = Formal definition (locale-native)
#   • purpose       = WHY it exists (locale-native value proposition)
#
# ═══════════════════════════════════════════════════════════════════════════════

node:
  name: EntityL10n
  realm: tenant
  layer: semantic
  trait: localized
  icon: "🟢"
  description: "Locale-native content for a Tenant Entity"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    # ─────────────────────────────────────────────────────────────────────────────
    # IDENTITY PROPERTIES (denormalized for fast lookup)
    # ─────────────────────────────────────────────────────────────────────────────
    entity_key:
      type: string
      required: true
      pattern: "^[a-z][a-z0-9-]*$"
      description: "Parent Entity key (denormalized). Combined with locale_key forms unique identity."
      examples:
        - "create-qr-code"
        - "qr-code-wifi"
        - "dynamic-qr-code"

    locale_key:
      type: string
      required: true
      pattern: "^[a-z]{2}-[A-Z]{2}$"
      description: "Target Locale key (denormalized). BCP 47 format."
      examples:
        - "fr-FR"
        - "en-US"
        - "ja-JP"

    slug:
      type: string
      required: true
      pattern: "^[a-z0-9-]+$"
      description: "URL-safe localized identifier for routing"
      examples:
        - "creer-qr-code"        # fr-FR for "create-qr-code"
        - "qr-code-wifi"         # same in many locales
        - "qr-code-dynamique"    # fr-FR for "dynamic-qr-code"

    # ─────────────────────────────────────────────────────────────────────────────
    # CONTENT PROPERTIES
    # ─────────────────────────────────────────────────────────────────────────────
    display_name:
      type: string
      required: true
      description: "Localized display name"

    description:
      type: string
      required: true
      description: "Localized short description"

    llm_context:
      type: string
      required: true
      description: "Format: USE: [when]. TRIGGERS: [locale keywords]. NOT: [disambiguation]."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # VECTOR EMBEDDING
  # ═══════════════════════════════════════════════════════════════════════════════

  embedding_properties:
    embedding:
      type: vector
      dimensions: 1536
      required: false

    embedding_source:
      type: string
      required: false

    embedding_updated_at:
      type: datetime
      required: false

  # ═══════════════════════════════════════════════════════════════════════════════
  # ENTITYL10N-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    # ─────────────────────────────────────────────────────────────────────────────
    # CONTENT PROPERTIES
    # ─────────────────────────────────────────────────────────────────────────────

    definition:
      type: string
      required: false
      description: "What it is - localized definition"
      # PURPOSE: Formal, locale-native definition for comprehension
      # EXAMPLE (fr-FR): "Un QR code dynamique permet de modifier la destination après impression."

    purpose:
      type: string
      required: false
      description: "Why it exists - localized purpose"
      # PURPOSE: Value proposition in locale-native terms
      # EXAMPLE (fr-FR): "Permet de corriger les erreurs et mettre à jour le contenu sans réimprimer."

    benefits:
      type: string[]
      required: false
      description: "Value propositions in target locale"
      # PURPOSE: Bullet-point benefits for this locale
      # EXAMPLE: ["Modifiable après impression", "Statistiques de scan", "Pas de coût d'impression"]

    # ─────────────────────────────────────────────────────────────────────────────
    # LOCALE-SPECIFIC PROPERTIES (v11 - from research)
    # ─────────────────────────────────────────────────────────────────────────────

    # ─────────────────────────────────────────────────────────────────────────────
    # NOTE: SEO keywords are NODES, not a property array!
    # ─────────────────────────────────────────────────────────────────────────────
    #
    # EntityL10n ──[:HAS_SEO_KEYWORD]──> SEOKeyword (separate node)
    #
    # SEOKeyword nodes allow:
    #   • Reuse across multiple EntityL10n
    #   • Track keyword performance (volume, difficulty, ranking)
    #   • Query "which entities target this keyword"
    #   • Add properties (search_volume, difficulty, intent, etc.)
    #
    # See: packages/core/models/node-kinds/global/seo/seo-keyword.yaml
    # ─────────────────────────────────────────────────────────────────────────────

    usage_examples:
      type: string[]
      required: false
      description: "Locale-native usage examples"
      # PURPOSE: Real-world examples that resonate with this locale's culture
      # EXAMPLE (fr-FR): ["Menu de restaurant", "Carte de visite", "Affiche événement"]

    audience_segment:
      type: string
      required: false
      description: "Target audience for this locale variant"
      enum:
        - professional
        - consumer
        - developer
        - enterprise
      # PURPOSE: Tune tone/complexity for audience
      # EXAMPLE: "professional" for B2B, "consumer" for retail

    cultural_notes:
      type: string
      required: false
      description: "Locale-specific cultural considerations"
      # PURPOSE: Generation guidance for cultural sensitivity
      # EXAMPLE (ja-JP): "Use formal keigo for business contexts"

    # ─────────────────────────────────────────────────────────────────────────────
    # VERSIONING
    # ─────────────────────────────────────────────────────────────────────────────

    version:
      type: int
      required: true
      description: "Content version for staleness detection"
      # PURPOSE: Track content freshness, trigger re-generation when Entity updates

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    FOR_LOCALE:
      to: Locale
      cardinality: "N:1"
      description: "Links to the locale this content is for"

    # ─────────────────────────────────────────────────────────────────────────────
    # TARGETS: Links to SEO keyword nodes this entity is targeting
    # ─────────────────────────────────────────────────────────────────────────────
    # SEO keywords are separate nodes in global/seo layer:
    #   • Owned by Locale: Locale --[:HAS_SEO_KEYWORDS]--> SEOKeyword
    #   • Targeted by EntityL10n: EntityL10n --[:TARGETS]--> SEOKeyword
    #
    # This allows:
    #   • Reuse keywords across multiple EntityL10n
    #   • Track performance (volume, difficulty, traffic_potential)
    #   • Query "which entities target this keyword"
    #   • Rich metrics: CPC, clicks, SERP features, seasonality
    #
    # CRITICAL: Keywords are locale-specific real search terms!
    #   FR: "Code QR dynamique" (NOT "qr code dynamique")
    #   JA: "QRコード 作成" (with space before action)
    #
    # See: packages/core/models/node-kinds/global/seo/seo-keyword.yaml
    # ─────────────────────────────────────────────────────────────────────────────
    TARGETS:
      to: SEOKeyword
      cardinality: "N:N"
      description: "SEO keywords this localized entity is targeting for ranking"

    # ─────────────────────────────────────────────────────────────────────────────
    # ANSWERS: Links to SEO question keywords this entity answers
    # ─────────────────────────────────────────────────────────────────────────────
    # SEOQuestion nodes are question-form keywords from Answer The Public:
    #   • Owned by SEOKeyword: SEOKeyword --[:HAS_QUESTIONS]--> SEOQuestion
    #   • Answered by EntityL10n: EntityL10n --[:ANSWERS]--> SEOQuestion
    #
    # This allows content gap analysis:
    #   • "Which questions have no EntityL10n answering them?"
    #   • "Which EntityL10n answers the most high-volume questions?"
    #
    # See: packages/core/models/node-kinds/global/seo/seo-question.yaml
    # ─────────────────────────────────────────────────────────────────────────────
    ANSWERS:
      to: SEOQuestion
      cardinality: "N:N"
      description: "SEO question keywords this localized entity answers"

  incoming_relations:
    HAS_L10N:
      from: Entity
      cardinality: "1:N"
      description: "Parent entity that owns this localization"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLES
  # ═══════════════════════════════════════════════════════════════════════════════

  examples:
    # ─────────────────────────────────────────────────────────────────────────────
    # IMPORTANT: SEO keywords are NODES, not properties!
    # EntityL10n --[:TARGETS]--> SEOKeyword (separate nodes in global/seo layer)
    #
    # Use REAL search terms that people actually use.
    # Research Google Trends, Ahrefs, SEMrush for each locale.
    # Example: French users search "Code QR" NOT "qr code" or "code qr"
    # ─────────────────────────────────────────────────────────────────────────────

    # Example 1: French localization for Dynamic QR Code (CONCEPT)
    fr_fr_dynamic_qr:
      data:
        # Identity (denormalized)
        entity_key: "dynamic-qr-code"
        locale_key: "fr-FR"
        slug: "qr-code-dynamique"
        # Content
        display_name: "QR Code Dynamique"
        description: "QR Code modifiable après création, avec suivi des scans en temps réel"
        llm_context: "USE: Contenu français pour QR Code dynamique. TRIGGERS: fr-FR, modification, suivi. NOT: Québec (utiliser fr-CA)."
        definition: "Un QR Code dynamique permet de modifier la destination après impression, avec statistiques de scan."
        purpose: "Permet de corriger les erreurs et mettre à jour le contenu sans réimprimer."
        benefits:
          - "Modifiable après impression"
          - "Statistiques de scan en temps réel"
          - "Pas de coût de réimpression"
        usage_examples:
          - "Menu de restaurant (mise à jour des prix)"
          - "Carte de visite (changement de coordonnées)"
          - "Affiche événement (mise à jour des horaires)"
        audience_segment: "professional"
        version: 1
      # SEO keywords are linked via TARGETS relation to SEOKeyword nodes:
      # EntityL10n --[:TARGETS]--> SEOKeyword {value: "qr code dynamique", volume: 8100}
      # EntityL10n --[:TARGETS]--> SEOKeyword {value: "créer qr code", volume: 12000}
      # EntityL10n --[:TARGETS]--> SEOKeyword {value: "générateur qr code gratuit", volume: 5400}

    # Example 2: Japanese localization for QR Code (THING pillar)
    ja_jp_qr_code:
      data:
        # Identity (denormalized)
        entity_key: "qr-code"
        locale_key: "ja-JP"
        slug: "qr-code"  # romanized for URL compatibility
        # Content
        display_name: "QRコード"
        description: "スマートフォンでスキャンできる2次元マトリックスバーコード"
        llm_context: "USE: 日本語コンテンツ。TRIGGERS: ja-JP、スキャン、バーコード。NOT: 中国語（zh-CN使用）。"
        definition: "QRコードは、データをエンコードする2次元バーコードで、スマートフォンで瞬時に読み取れます。"
        purpose: "ウェブサイト、連絡先、WiFi設定などへの即時アクセスを提供。"
        benefits:
          - "スマートフォンで簡単スキャン"
          - "大容量データ保存"
          - "カスタマイズ可能なデザイン"
        usage_examples:
          - "レストランメニュー"
          - "名刺"
          - "イベントチケット"
        audience_segment: "consumer"
        cultural_notes: "Use formal keigo for business contexts. QR Code invented by Denso Wave (Japanese company) - national pride aspect."
        version: 1
      # SEO keywords are linked via TARGETS relation to SEOKeyword nodes:
      # EntityL10n --[:TARGETS]--> SEOKeyword {value: "QRコード 作成", volume: 40500}
      # EntityL10n --[:TARGETS]--> SEOKeyword {value: "QRコード 読み取り", volume: 33100}
      # EntityL10n --[:TARGETS]--> SEOKeyword {value: "QRコード作成 無料", volume: 18100}
