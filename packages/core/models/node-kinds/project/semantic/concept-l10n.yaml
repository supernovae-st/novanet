# models/nodes/project/semantic/concept-l10n.yaml
# ConceptL10n - Localized content for Concept nodes
#
# GRAPH POSITION:
#   Concept ──[:HAS_L10N]──> ConceptL10n ──[:FOR_LOCALE]──> Locale
#
# PURPOSE:
#   Native definition per locale (NOT translation).
#   The LLM never sees English when generating French content.
#
# IDENTIFICATION:
#   No key property - identified by relation chain:
#   (Concept)--[:HAS_L10N]-->(ConceptL10n)--[:FOR_LOCALE]-->(Locale)

node:
  name: ConceptL10n
  realm: project
  layer: semantic
  trait: localized
  icon: "🟢"
  description: "Localized definition for a Concept in a specific locale"

  # ===========================================================================
  # STANDARD PROPERTIES (L10n nodes - no key, relation-identified)
  # ===========================================================================

  standard_properties:
    display_name:
      type: string
      required: true
      description: "Localized display name"
      example: "Creer un QR Code"

    description:
      type: string
      required: true
      description: "Localized short description"
      example: "Action de creer un QR code a partir d'une URL, texte ou contact"

    llm_context:
      type: string
      required: true
      description: "Format: USE: [when]. TRIGGERS: [locale keywords]. NOT: [disambiguation]."
      example: "USE: native French title/definition for generation. TRIGGERS: fr-FR content needed. NOT: Quebec French."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ===========================================================================
  # VECTOR EMBEDDING (v7.8.0 - Hybrid OntologyRAG)
  # ===========================================================================

  embedding_properties:
    embedding:
      type: vector
      dimensions: 1536
      required: false
      description: "OpenAI text-embedding-3-small vector for semantic search"

    embedding_source:
      type: string
      required: false
      description: "Text used to generate embedding (for debugging)"

    embedding_updated_at:
      type: datetime
      required: false
      description: "Timestamp of last embedding update"

  # ===========================================================================
  # CONCEPTL10N-SPECIFIC PROPERTIES
  # ===========================================================================

  properties:
    title:
      type: string
      required: true
      description: "Localized title for the concept"
      example: "Creer un QR Code"

    definition:
      type: string
      required: true
      description: "What it is - localized definition"
      example: "Generer un QR code a partir d'une URL, texte ou contact."

    purpose:
      type: string
      required: false
      description: "Why it exists - localized purpose"
      example: "Convertir une information en format scannable par smartphone."

    benefits:
      type: string[]
      required: false
      description: "Value props in target locale"
      example: ["Acces rapide a l'information", "Sans contact, hygienique", "Tracable avec analytics"]

    use_cases:
      type: string[]
      required: false
      description: "When to use - localized examples"
      example: ["Marketing et publicite", "Paiement sans contact", "Identification produit"]

    cultural_notes:
      type: string
      required: false
      description: "Locale-specific cultural considerations"
      example: "En France, preferer 'QR Code' a 'code QR'. Le terme anglais est standard."

    version:
      type: int
      required: true
      description: "Content version for staleness detection"
      example: 1

    influence_count:
      type: int
      required: true
      description: "Denormalized: how many BlockL10n influenced"
      example: 0

  # ===========================================================================
  # RELATIONS
  # ===========================================================================

  relations:
    - relation: FOR_LOCALE
      to: Locale
      direction: outgoing
      cardinality: "N:1"
      description: "Links to the locale this content is for"

    # v10.1: Locale-aligned SEO targeting (ConceptL10n fr → SEOKeyword fr)
    - relation: HAS_SEO_TARGET
      to: SEOKeyword
      direction: outgoing
      cardinality: "1:N"
      props: [role, priority]
      description: "SEO keywords targeting this localized concept (same locale)"

  # ===========================================================================
  # INCOMING RELATIONS
  # ===========================================================================

  incoming_relations:
    - relation: HAS_L10N
      from: Concept
      cardinality: "1:N"
      description: "Parent concept that owns this localization"

  # ===========================================================================
  # NEO4J CONFIGURATION
  # ===========================================================================

  neo4j:
    indexes:
      - "CREATE INDEX conceptl10n_version IF NOT EXISTS FOR (cl:ConceptL10n) ON (cl.version)"

  # ===========================================================================
  # EXAMPLE
  # ===========================================================================

  example:
    display_name: "Creer un QR Code"
    description: "Action de creer un QR code a partir d'une URL, texte ou contact"
    llm_context: "USE: native French title/definition for generation. TRIGGERS: fr-FR content needed. NOT: Quebec French."
    title: "Creer un QR Code"
    definition: "Generer un QR code a partir d'une URL, texte ou contact."
    purpose: "Convertir une information en format scannable par smartphone."
    benefits:
      - "Acces rapide a l'information"
      - "Sans contact, hygienique"
      - "Tracable avec analytics"
    use_cases:
      - "Marketing et publicite"
      - "Paiement sans contact"
      - "Identification produit"
    cultural_notes: "En France, preferer 'QR Code' a 'code QR'. Le terme anglais est standard."
    version: 1
    influence_count: 0
