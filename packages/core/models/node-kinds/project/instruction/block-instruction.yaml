# models/node-kinds/project/instruction/block-instruction.yaml
# BlockInstruction - Per-block generation instructions with entity/page references (v10.3)
#
# v10.3.0: NEW NODE
#   - Instructions for generating a specific block within a page
#   - Contains markdown with @entity:key, @link:key, and generation tags
#   - Multiple BlockInstructions concatenated at runtime to form PageInstruction

node:
  name: BlockInstruction
  realm: project
  layer: instruction
  trait: invariant
  icon: "📝"
  description: "Instructions for generating a specific block within a page. Contains markdown with @entity: and @link: references. Multiple BlockInstructions are concatenated at runtime to form PageInstruction."

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier. Format: {page-key}_{block-type}"
      pattern: "^[a-z0-9-]+_[a-z0-9-]+$"
      examples:
        - "qr-generator_hero"
        - "pricing_faq"
        - "homepage_testimonials"

    display_name:
      type: string
      required: true
      description: "Human-readable UI name"
      example: "QR Generator Hero Instructions"

    description:
      type: string
      required: true
      description: "One-line description of this instruction"
      example: "Hero section instructions for the QR generator page"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: 'USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation].'"
      example: "USE: generate hero block for QR generator page. TRIGGERS: qr-generator, hero, above-fold. NOT: other pages or block types."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOCKINSTRUCTION-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    content:
      type: string
      required: true
      description: |
        Markdown content with special syntax:
        - @entity:key - References an Entity (auto-parsed to REFERENCES_ENTITY relation)
        - @link:key - References a Page (auto-parsed to REFERENCES_PAGE relation)
        - [FIXED] - Content that must remain unchanged across locales
        - [GENERATE] - Content to be generated by LLM
        - [TRANSLATE] - Content to be translated (not natively generated)
      example: |
        ## Hero Section

        [GENERATE] Create an attention-grabbing headline featuring @entity:action-create-qr.

        **Key messaging:**
        - Highlight @entity:feature-instant-generation benefits
        - Link to @link:page-pricing for conversion
        - Use @entity:brand-qrcode-ai voice and tone

        [FIXED] Include "Free forever" badge.

    order:
      type: int
      required: true
      description: "Position in page compilation (1, 2, 3...). Instructions are concatenated in order."
      example: 1

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS (FROM this node)
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    OF_TYPE:
      to: BlockType
      cardinality: "N:1"
      description: "The block type this instruction is for"

    REFERENCES_ENTITY:
      to: Entity
      cardinality: "N:N"
      props:
        reference_type:
          type: string
          enum: [explicit, contextual]
          description: "explicit = @entity:key syntax, contextual = inferred from content"
        count:
          type: int
          description: "Number of times this entity is referenced in content"
      description: "Entities referenced via @entity:key syntax (auto-parsed from content)"

    REFERENCES_PAGE:
      to: Page
      cardinality: "N:N"
      props:
        reference_type:
          type: string
          enum: [explicit, contextual]
          description: "explicit = @link:key syntax, contextual = inferred from content"
        link_purpose:
          type: string
          enum: [cta, related, internal, reference]
          description: "Why this page is referenced"
      description: "Pages referenced via @link:key syntax (auto-parsed from content)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # INCOMING RELATIONS (documented for reference)
  # ═══════════════════════════════════════════════════════════════════════════════

  incoming_relations:
    HAS_INSTRUCTION:
      from: Page
      cardinality: "1:N"
      description: "Page that owns this instruction"

  # ═══════════════════════════════════════════════════════════════════════════════
  # NEO4J CONFIGURATION
  # ═══════════════════════════════════════════════════════════════════════════════

  neo4j:
    indexes:
      - "CREATE INDEX blockinstruction_key IF NOT EXISTS FOR (bi:BlockInstruction) ON (bi.key)"
      - "CREATE INDEX blockinstruction_order IF NOT EXISTS FOR (bi:BlockInstruction) ON (bi.order)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    data:
      key: "qr-generator_hero"
      display_name: "QR Generator Hero Instructions"
      description: "Hero section instructions for the QR generator page"
      llm_context: "USE: generate hero block for QR generator page. TRIGGERS: qr-generator, hero, above-fold. NOT: other pages or block types."
      order: 1
      content: |
        ## Hero Section

        [GENERATE] Create an attention-grabbing headline that emphasizes @entity:action-create-qr
        in seconds, without signup.

        **Messaging priorities:**
        1. Speed and simplicity of @entity:feature-instant-generation
        2. No account required - instant gratification
        3. Professional quality with @entity:feature-custom-design options

        **CTA requirements:**
        - Primary: "Create QR Code Free" → links to generator
        - Secondary: @link:page-pricing "See Plans" for power users

        [FIXED] Display trust badges: "10M+ QR codes created"

        **Visual guidance:**
        - Show live QR code preview
        - Animate the generation process
        - Use @entity:brand-qrcode-ai color palette

    cypher: |
      // Get page instructions in order
      MATCH (p:Page {key: $page_key})-[:HAS_INSTRUCTION]->(bi:BlockInstruction)
      MATCH (bi)-[:OF_TYPE]->(bt:BlockType)
      RETURN bi.key, bi.content, bi.order, bt.key AS block_type
      ORDER BY bi.order

      // Get instruction with all entity references
      MATCH (bi:BlockInstruction {key: $key})
      OPTIONAL MATCH (bi)-[ref:REFERENCES_ENTITY]->(e:Entity)
      RETURN bi, collect({entity: e.key, type: ref.reference_type, count: ref.count}) AS entities

      // Get instruction with all page references
      MATCH (bi:BlockInstruction {key: $key})
      OPTIONAL MATCH (bi)-[ref:REFERENCES_PAGE]->(p:Page)
      RETURN bi, collect({page: p.key, purpose: ref.link_purpose}) AS pages

      // Compile full page instruction from blocks
      MATCH (p:Page {key: $page_key})-[:HAS_INSTRUCTION]->(bi:BlockInstruction)
      WITH bi ORDER BY bi.order
      WITH collect(bi.content) AS contents
      RETURN reduce(acc = '', c IN contents | acc + '\n\n---\n\n' + c) AS compiled_instruction
