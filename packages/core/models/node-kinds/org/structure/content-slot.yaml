# models/node-kinds/org/structure/content-slot.yaml
# v0.12.0: ContentSlot for A/B testing and dynamic content injection

node:
  name: ContentSlot
  realm: org
  layer: structure
  trait: defined
  icon:
    web: inbox
    terminal: "▢"
  description: |
    Named slot within a page structure for content injection. Enables A/B testing,
    dynamic content, and component-level modularity. Slots are locale-invariant
    definitions filled by locale-specific blocks.

    USE: When defining reusable page structure positions for content variants.
    TRIGGERS: "content slot", "A/B testing", "component slot", "dynamic block".
    NOT: For actual content (use Block), for page structure (use Page).

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier"
      pattern: "^slot-[a-z0-9-]+$"
      example: "slot-hero-cta"

    display_name:
      type: string
      required: true
      description: "Human-readable slot name"
      example: "Hero CTA Button"

    description:
      type: string
      required: true
      description: "Purpose and usage of this slot"

    llm_context:
      type: string
      required: true
      description: "LLM prompt context for content in this slot"
      example: "Primary call-to-action in hero section. Should be compelling and action-oriented."

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    slot_type:
      type: string
      required: true
      description: "Type of content this slot accepts"
      enum:
        - text
        - cta
        - image
        - video
        - testimonial
        - feature_list
        - pricing
        - faq
        - custom
      example: "cta"

    position:
      type: string
      required: true
      description: "Position identifier within page layout"
      example: "hero-bottom"

    is_required:
      type: boolean
      required: true
      description: "Whether this slot must be filled for page to render"
      example: true

    allows_variants:
      type: boolean
      required: true
      description: "Whether A/B testing variants are allowed"
      example: true

    max_variants:
      type: int
      required: false
      description: "Maximum number of concurrent variants (if allows_variants)"
      example: 3

    default_block_key:
      type: string
      required: false
      description: "Key of default block to use if no variant selected"
      example: "block-hero-cta-default"

    fallback_behavior:
      type: string
      required: true
      description: "What happens if slot is empty"
      enum:
        - hide
        - show_placeholder
        - use_default
        - error
      example: "use_default"

    render_priority:
      type: int
      required: true
      description: "Order in which slots are rendered (lower = first)"
      example: 10

  neo4j:
    indexes:
      - name: contentslot_type
        property: slot_type
      - name: contentslot_position
        property: position
      - name: contentslot_required
        property: is_required

  relations:
    incoming:
      - type: HAS_SLOT
        from: Page
        description: "Pages that define this slot"

      - type: FILLS_SLOT
        from: Block
        description: "Blocks that can fill this slot"

    outgoing:
      - type: ACCEPTS_BLOCK_TYPE
        to: BlockType
        description: "Block types allowed in this slot"

  example:
    data: |
      {
        "key": "slot-hero-cta",
        "display_name": "Hero CTA Button",
        "description": "Primary call-to-action button in the hero section",
        "llm_context": "Primary call-to-action in hero section. Should be compelling, action-oriented, and create urgency.",
        "slot_type": "cta",
        "position": "hero-bottom",
        "is_required": true,
        "allows_variants": true,
        "max_variants": 3,
        "default_block_key": "block-hero-cta-default",
        "fallback_behavior": "use_default",
        "render_priority": 10
      }
    cypher: |
      CREATE (s:ContentSlot {
        key: 'slot-hero-cta',
        display_name: 'Hero CTA Button',
        description: 'Primary call-to-action button in the hero section',
        llm_context: 'Primary call-to-action in hero section. Should be compelling, action-oriented, and create urgency.',
        slot_type: 'cta',
        position: 'hero-bottom',
        is_required: true,
        allows_variants: true,
        max_variants: 3,
        default_block_key: 'block-hero-cta-default',
        fallback_behavior: 'use_default',
        render_priority: 10,
        created_at: datetime(),
        updated_at: datetime()
      })
