# Page - Invariant page structure with orchestrator instructions
#
# v0.12.4: ADR-028 - Page-Entity Architecture
#   - Added REPRESENTS (1:1 to Entity) - every page has one main Entity
#   - Removed HAS_STRUCTURE (PageStructure is calculated, not stored)
#   - Renamed HAS_BLOCK.position → order for semantic clarity
# v0.12.0: Initial clean schema (ADR-025 naming conventions)

node:
  name: Page
  realm: org
  layer: structure
  trait: defined
  icon: "🔷"
  description: "Invariant page structure containing blocks and orchestrator instructions"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Page identifier. Format: page-{identifier}"
      pattern: "^page-[a-z0-9-]+$"
      examples:
        - "page-pricing"
        - "page-homepage"
        - "page-features"

    slug:
      type: string
      required: true
      description: "URL-friendly path segment for this page"
      pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
      examples:
        - "pricing"
        - "features"
        - "qr-code-generator"

    display_name:
      type: string
      required: true
      description: "Human-readable UI name"
      example: "Pricing Page"

    description:
      type: string
      required: true
      description: "One-line description of the page"
      example: "Main pricing page with tier comparison and CTAs"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: 'USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation].'"
      example: "USE: orchestrate pricing page generation. TRIGGERS: pricing, tarifs, plans, abonnement. NOT: individual block generation."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # VECTOR EMBEDDING (v7.8.0 - Hybrid OntologyRAG)
  # ═══════════════════════════════════════════════════════════════════════════════

  embedding_properties:
    embedding:
      type: vector
      dimensions: 1536
      required: false
      description: "OpenAI text-embedding-3-small vector for semantic search"

    embedding_source:
      type: string
      required: false
      description: "Text used to generate embedding (for debugging)"

    embedding_updated_at:
      type: datetime
      required: false
      description: "Timestamp of last embedding update"

  # ═══════════════════════════════════════════════════════════════════════════════
  # PAGE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  # No page-specific properties - instructions moved to HAS_INSTRUCTION → BlockInstruction

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS (FROM this node)
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    # v0.12.4 ADR-028: 1:1 mandatory relationship to main Entity
    REPRESENTS:
      to: Entity
      cardinality: "1:1"
      required: true
      description: "Main Entity this page represents. Page.key = Entity.key (source of truth)"

    HAS_BLOCK:
      to: Block
      cardinality: "1:N"
      props:
        order:  # v0.12.4: renamed from position for semantic clarity
          type: int
          description: "Block order within the page (1-based, source of truth)"
      description: "Content blocks within this page"

    HAS_GENERATED:  # v10.9.0: renamed from HAS_OUTPUT
      to: PageGenerated  # v10.9.0: renamed from PageL10n
      cardinality: "1:N"
      description: "Generated outputs for this page (one per locale)"

    HAS_INSTRUCTION:  # v0.12.0 ADR-025: Renamed from HAS_PROMPT/PagePrompt
      to: BlockInstruction
      cardinality: "1:N"
      description: "Block instructions composing PageInstruction at runtime (v0.12.0)"

    USES_ENTITY:
      to: Entity
      cardinality: "N:N"
      description: "Entities referenced by this page"

    # v7.12.0: Page-to-Page relationships (v7.12.1: anchor_type + nofollow)
    LINKS_TO:
      to: Page
      cardinality: "N:N"
      props:
        entity_key:
          type: string
          description: "Entity key - anchor text derived from EntityContent.display_name at generation time"
        context:
          type: string
          enum: [cta, body, related, nav]
          description: "Where the link appears in content"
        seo_weight:
          type: float
          description: "Link importance for SEO (0.0-1.0)"
        anchor_type:
          type: string
          enum: [exact_match, partial_match, branded, generic]
          default: partial_match
          description: "Anchor text strategy (v7.12.1). exact_match = 5× traffic but use sparingly (max 10%)"
        nofollow:
          type: boolean
          default: false
          description: "Set true for login/legal pages to prevent link equity flow (v7.12.1)"
      description: "Explicit internal link for SEO. Anchor text is localized via Entity → EntityContent"

    SUBTOPIC_OF:
      to: Page
      cardinality: "N:1"
      description: "Cluster page is subtopic of pillar page (pillar-cluster SEO hierarchy)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    data:
      key: "page-pricing"
      display_name: "Pricing Page"
      description: "Main pricing page with tier comparison and CTAs"
      llm_context: "USE: orchestrate pricing page generation. TRIGGERS: pricing, tarifs, plans, abonnement. NOT: individual block generation."

    cypher: |
      // v0.12.4: Get page with main Entity and all blocks in order
      MATCH (p:Page {key: $key})-[:REPRESENTS]->(e:Entity)
      MATCH (p)-[r:HAS_BLOCK]->(b:Block)-[:OF_TYPE]->(bt:BlockType)
      RETURN p, e, collect(DISTINCT {block: b, type: bt, order: r.order}) AS blocks
      ORDER BY r.order

      // v0.12.4: Get page with all referenced entities (main + block refs)
      MATCH (p:Page {key: $key})-[:REPRESENTS]->(main:Entity)
      OPTIONAL MATCH (p)-[:USES_ENTITY]->(ref:Entity)
      RETURN p, main.key AS main_entity, collect(DISTINCT ref.key) AS referenced_entities

      // Get page with latest generated output for locale (v10.9.0)
      MATCH (p:Page {key: $key})-[:HAS_GENERATED]->(pg:PageGenerated)-[:FOR_LOCALE]->(l:Locale {key: $locale})
      RETURN p, pg
      ORDER BY pg.assembled_at DESC
      LIMIT 1

      // v7.12.0: Get internal links with localized anchors (v10.9.0: EntityContent)
      MATCH (p:Page {key: $key})-[link:LINKS_TO]->(target:Page)
      MATCH (e:Entity {key: link.entity_key})-[:HAS_CONTENT]->(ec:EntityContent)-[:FOR_LOCALE]->(l:Locale {key: $locale})
      RETURN target.key AS target_page, ec.display_name AS anchor_text, link.context, link.seo_weight
      ORDER BY link.seo_weight DESC

      // v7.12.0: Get pillar page with its cluster pages
      MATCH (pillar:Page {key: $key})<-[:SUBTOPIC_OF]-(cluster:Page)
      RETURN pillar.key AS pillar, collect(cluster.key) AS clusters
