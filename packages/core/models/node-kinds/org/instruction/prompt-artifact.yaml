# models/node-kinds/org/instruction/prompt-artifact.yaml
node:
  name: PromptArtifact
  realm: org
  layer: instruction
  trait: generated  # v11.2: Split derived → generated (LLM output)
  icon: "📋"
  description: "Compiled prompt artifact with all context resolved. Immutable snapshot of prompt state."
  llm_context: "USE: when tracking prompt versions. TRIGGERS: compiled prompt, artifact, snapshot. NOT: raw prompts, templates."

  standard_properties:
    key:
      type: string
      required: true
      description: "Artifact identifier"
      pattern: "^promptartifact-[a-z0-9-]+-v[0-9]+$"
      example: "promptartifact-page-pricing-v1"
    display_name:
      type: string
      required: true
      description: "Semantic prompt name"
      example: "Page Pricing Prompt v1"
    description:
      type: string
      required: false
    llm_context:
      type: string
      required: false
      description: "Generation context embedded in artifact"
    created_at:
      type: datetime
      required: true
    updated_at:
      type: datetime
      required: true

  properties:
    compiled_prompt:
      type: string
      required: true
      description: "Full compiled prompt text with all inclusions resolved"

    base_prompt_key:
      type: string
      required: true
      description: "Key of the base prompt this was compiled from"

    base_prompt_version:
      type: string
      required: true
      description: "Version of base prompt used"
      example: "1.0"

    includes_concepts:
      type: boolean
      required: true
      description: "Whether prompt includes concept injections"

    includes_voice:
      type: boolean
      required: true
      description: "Whether prompt includes locale voice parameters"

    includes_culture:
      type: boolean
      required: true
      description: "Whether prompt includes cultural context"

    token_count:
      type: int
      required: false
      description: "Estimated token count of compiled prompt"

    compiled_at:
      type: datetime
      required: true
    compiler_version:
      type: string
      required: true
      description: "Version of the prompt compiler"

  neo4j:
    indexes:
      - "CREATE INDEX promptartifact_base IF NOT EXISTS FOR (pa:PromptArtifact) ON (pa.base_prompt_key)"

  relations:
    outgoing:
      - type: COMPILED_FROM
        to:  # v11.8 ADR-025: *Prompt → *Instruction
          - PageInstruction
          - BlockInstruction
        description: "Source instruction this was compiled from"

      - type: INCLUDES_ENTITY
        to: Entity
        description: "Entities whose context was included"

      - type: INCLUDES_VOICE
        to: LocaleVoice
        description: "Locale voice parameters included"
