# models/node-kinds/org/instruction/page-structure.yaml
# PageStructure - Template rules and structure for page generation (v11.8)
#
# v11.8 CHANGES (ADR-025):
#   - RENAMED: PageType → PageStructure
#   - Semantic clarity: "Structure" describes JSON defining block order/composition
#
# DESIGN RATIONALE:
#   - Defines meta/SEO requirements, layout rules, required blocks
#   - JSON structure specifying which BlockTypes in what order
#   - pillar/cluster categories enable topical authority structure

node:
  name: PageStructure
  realm: org
  layer: instruction
  trait: defined
  icon: "📐"
  description: "Template defining meta requirements, layout rules, and block composition for a type of page"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "PageStructure identifier. Format: structure-{identifier}"
      pattern: "^structure-[a-z0-9-]+$"
      examples:
        - "structure-landing"
        - "structure-product"
        - "structure-blog-post"
        - "structure-legal"
        - "structure-support"

    display_name:
      type: string
      required: true
      description: "Human-readable UI name"
      example: "Landing Page Structure"

    description:
      type: string
      required: true
      description: "One-line description of the page structure"
      example: "High-conversion landing page with hero, features, and CTAs"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: 'USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation].'"
      example: "USE: orchestrate landing page generation. TRIGGERS: landing, conversion, homepage. NOT: blog posts or legal pages."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # PAGESTRUCTURE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    category:
      type: string
      required: true
      enum: [marketing, product, content, legal, support, pillar, cluster]
      description: "Page category for organization and SEO hierarchy"
      example: "marketing"
      # pillar: comprehensive guide page that links to cluster pages
      # cluster: focused subtopic page that links to its pillar page via :SUBTOPIC_OF

    meta_schema:
      type: json
      required: true
      description: "JSON schema defining required meta/SEO fields"
      example:
        title_template: "{product} - {action} | {brand}"
        description_max_length: 160
        required_og_tags: ["og:title", "og:description", "og:image"]

    layout_rules:
      type: json
      required: false
      description: "Constraints on block organization and positioning"
      example:
        max_blocks: 10
        required_sections: ["header", "body", "footer"]
        block_order_constraints: ["hero first", "cta last"]

    required_block_types:
      type: string[]
      required: false
      description: "BlockType keys that MUST appear on pages of this structure"
      example: ["blocktype-hero", "blocktype-cta"]

    optional_block_types:
      type: string[]
      required: false
      description: "BlockType keys recommended but not required"
      example: ["blocktype-faq", "blocktype-testimonials"]

    validation_rules:
      type: json
      required: false
      description: "Custom validation rules for page generation"
      example:
        min_word_count: 500
        max_cta_count: 3
        require_social_proof: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    incoming:
      - type: HAS_STRUCTURE
        from: Page
        description: "Pages that use this structure template"

  # ═══════════════════════════════════════════════════════════════════════════════
  # NEO4J CONFIGURATION
  # ═══════════════════════════════════════════════════════════════════════════════

  neo4j:
    constraints:
      - "CREATE CONSTRAINT pagestructure_key IF NOT EXISTS FOR (ps:PageStructure) REQUIRE ps.key IS UNIQUE"
    indexes:
      - "CREATE INDEX pagestructure_category IF NOT EXISTS FOR (ps:PageStructure) ON (ps.category)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    data:
      key: "structure-landing"
      display_name: "Landing Page Structure"
      description: "High-conversion landing page with hero, features, and CTAs"
      llm_context: "USE: orchestrate landing page generation. TRIGGERS: landing, conversion, homepage. NOT: blog posts or legal pages."
      category: "marketing"
      meta_schema:
        title_template: "{product} - {action} | {brand}"
        description_max_length: 160
        required_og_tags: ["og:title", "og:description", "og:image"]
      layout_rules:
        max_blocks: 10
        required_sections: ["header", "body", "footer"]
      required_block_types: ["blocktype-hero", "blocktype-cta"]
      optional_block_types: ["blocktype-faq", "blocktype-testimonials", "blocktype-pricing-table"]
      validation_rules:
        min_word_count: 500
        require_social_proof: true

    cypher: |
      // Get page structure with its requirements
      MATCH (ps:PageStructure {key: $key})
      RETURN ps, ps.required_block_types AS required_blocks, ps.meta_schema AS meta

      // Get all pages with this structure
      MATCH (ps:PageStructure {key: $key})<-[:HAS_STRUCTURE]-(p:Page)
      RETURN ps, collect(p.key) AS pages

      // Validate page has required blocks
      MATCH (ps:PageStructure {key: $structureKey})<-[:HAS_STRUCTURE]-(p:Page {key: $pageKey})
      MATCH (p)-[:HAS_BLOCK]->(b:Block)-[:OF_TYPE]->(bt:BlockType)
      WITH ps, p, collect(bt.key) AS page_block_types
      RETURN ps.required_block_types, page_block_types,
             [rbt IN ps.required_block_types WHERE NOT rbt IN page_block_types] AS missing_blocks

      // Get pillar page with its cluster pages
      MATCH (ps:PageStructure {category: 'pillar'})<-[:HAS_STRUCTURE]-(pillar:Page)
      OPTIONAL MATCH (pillar)<-[:SUBTOPIC_OF]-(cluster:Page)
      RETURN pillar.key AS pillar, collect(cluster.key) AS clusters

      // Get cluster page with its pillar
      MATCH (p:Page)-[:HAS_STRUCTURE]->(ps:PageStructure {category: 'cluster'})
      MATCH (p)-[:SUBTOPIC_OF]->(pillar:Page)
      RETURN p.key AS cluster, pillar.key AS pillar
