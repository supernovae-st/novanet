# models/node-kinds/org/instruction/page-instruction.yaml
# PageInstruction - Compiled markdown instructions for LLM page generation (v11.8)
#
# v11.8 CHANGES (ADR-025):
#   - NEW NODE: PageInstruction replaces PagePrompt
#   - Compiled from multiple BlockInstructions in block order
#   - Contains @ references that resolve at generation time
#
# DESIGN RATIONALE:
#   - PageInstruction is the COMPILED output of all BlockInstructions
#   - Block order (from HAS_BLOCK arc) determines compilation sequence
#   - Used as primary input to LLM for generating PageGenerated content

node:
  name: PageInstruction
  realm: org
  layer: instruction
  trait: defined
  icon: "📄"
  description: "Compiled markdown instructions for LLM page generation. Contains concatenated BlockInstructions with @entity: and @link: references."

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Composite key format: page-{page-key}_instruction"
      pattern: "^page-[a-z0-9-]+_instruction$"
      examples:
        - "page-homepage_instruction"
        - "page-pricing_instruction"
        - "page-qr-generator_instruction"

    display_name:
      type: string
      required: true
      description: "Human-readable UI name"
      example: "Homepage Instruction"

    description:
      type: string
      required: true
      description: "One-line description of this compiled instruction"
      example: "Compiled instructions for homepage generation"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: 'USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation].'"
      example: "USE: generate complete page from compiled instructions. TRIGGERS: page-generation, full-page, compile. NOT: individual block generation."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # PAGEINSTRUCTION-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    compiled_content:
      type: string
      required: true
      description: |
        Concatenated markdown from all BlockInstructions in block order.
        Contains special syntax:
        - @entity:key - References an Entity (resolved at generation time)
        - @link:key - References a Page (resolved at generation time)
        - [FIXED] - Content that must remain unchanged across locales
        - [GENERATE] - Content to be generated by LLM
        - [TRANSLATE] - Content to be translated (not natively generated)
      example: |
        ## Hero Section
        [GENERATE] Create headline featuring @entity:action-create-qr.

        ---

        ## Features Section
        [GENERATE] Highlight @entity:feature-instant-generation benefits.
        Link to @link:page-pricing for conversion.

        ---

        ## CTA Section
        [FIXED] "Free forever" badge.

    source_blocks:
      type: string[]
      required: false
      description: "List of BlockInstruction keys that were compiled, in order"
      example: ["qr-generator_hero", "qr-generator_features", "qr-generator_cta"]

    block_count:
      type: int
      required: false
      description: "Number of BlockInstructions compiled into this instruction"
      example: 3

    compilation_timestamp:
      type: datetime
      required: false
      description: "When the instruction was last compiled from BlockInstructions"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS (FROM this node)
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    REFERENCES_ENTITY:
      to: Entity
      cardinality: "N:N"
      props:
        reference_type:
          type: string
          enum: [explicit, contextual]
          description: "explicit = @entity:key syntax, contextual = inferred from content"
        count:
          type: int
          description: "Number of times this entity is referenced in compiled_content"
      description: "Entities referenced via @entity:key syntax (aggregated from BlockInstructions)"

    REFERENCES_PAGE:
      to: Page
      cardinality: "N:N"
      props:
        reference_type:
          type: string
          enum: [explicit, contextual]
          description: "explicit = @link:key syntax, contextual = inferred from content"
        link_purpose:
          type: string
          enum: [cta, related, internal, reference]
          description: "Why this page is referenced"
      description: "Pages referenced via @link:key syntax (aggregated from BlockInstructions)"

    COMPILED_FROM:
      to: BlockInstruction
      cardinality: "1:N"
      props:
        order:
          type: int
          description: "Position of this BlockInstruction in the compilation"
      description: "BlockInstructions that were compiled to create this PageInstruction"

  # ═══════════════════════════════════════════════════════════════════════════════
  # INCOMING RELATIONS (documented for reference)
  # ═══════════════════════════════════════════════════════════════════════════════

  incoming_relations:
    HAS_INSTRUCTION:
      from: Page
      cardinality: "1:1"
      description: "Page that owns this compiled instruction set"

  # ═══════════════════════════════════════════════════════════════════════════════
  # NEO4J CONFIGURATION
  # ═══════════════════════════════════════════════════════════════════════════════

  neo4j:
    constraints:
      - "CREATE CONSTRAINT pageinstruction_key IF NOT EXISTS FOR (pi:PageInstruction) REQUIRE pi.key IS UNIQUE"
    indexes:
      - "CREATE INDEX pageinstruction_compilation IF NOT EXISTS FOR (pi:PageInstruction) ON (pi.compilation_timestamp)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    data:
      key: "page-qr-generator_instruction"
      display_name: "QR Generator Page Instruction"
      description: "Compiled instructions for the QR generator landing page"
      llm_context: "USE: generate complete page from compiled instructions. TRIGGERS: page-generation, qr-generator, full-page. NOT: individual block generation."
      source_blocks: ["qr-generator_hero", "qr-generator_features", "qr-generator_cta"]
      block_count: 3
      compiled_content: |
        ## Hero Section

        [GENERATE] Create an attention-grabbing headline that emphasizes @entity:action-create-qr
        in seconds, without signup.

        **Messaging priorities:**
        1. Speed and simplicity of @entity:feature-instant-generation
        2. No account required - instant gratification

        [FIXED] Display trust badges: "10M+ QR codes created"

        ---

        ## Features Section

        [GENERATE] Highlight the key features:
        - @entity:feature-instant-generation - Create QR codes in under 3 seconds
        - @entity:feature-custom-design - Full design customization options
        - @entity:feature-analytics - Track scans and engagement

        Link to @link:page-pricing for power user features.

        ---

        ## CTA Section

        [GENERATE] Create compelling call-to-action.

        **CTA requirements:**
        - Primary: "Create QR Code Free" -> generator
        - Secondary: @link:page-pricing "See Plans"

        [FIXED] "Free forever" badge.

    cypher: |
      // Get page instruction with all entity references
      MATCH (p:Page {key: $page_key})-[:HAS_INSTRUCTION]->(pi:PageInstruction)
      OPTIONAL MATCH (pi)-[ref:REFERENCES_ENTITY]->(e:Entity)
      RETURN pi, collect({entity: e.key, type: ref.reference_type, count: ref.count}) AS entities

      // Get page instruction with source blocks
      MATCH (pi:PageInstruction {key: $key})
      OPTIONAL MATCH (pi)-[cf:COMPILED_FROM]->(bi:BlockInstruction)
      RETURN pi, collect({block: bi.key, order: cf.order}) AS source_blocks
      ORDER BY cf.order

      // Get page instruction with all page references
      MATCH (pi:PageInstruction {key: $key})
      OPTIONAL MATCH (pi)-[ref:REFERENCES_PAGE]->(p:Page)
      RETURN pi, collect({page: p.key, purpose: ref.link_purpose}) AS pages

      // Compile PageInstruction from BlockInstructions
      MATCH (p:Page {key: $page_key})-[:HAS_BLOCK]->(b:Block)
      MATCH (b)-[:HAS_INSTRUCTION]->(bi:BlockInstruction)
      WITH p, bi ORDER BY b.order
      WITH p, collect(bi.content) AS contents, collect(bi.key) AS source_blocks
      MERGE (p)-[:HAS_INSTRUCTION]->(pi:PageInstruction {key: 'page-' + p.key + '_instruction'})
      SET pi.compiled_content = reduce(acc = '', c IN contents | acc + '\n\n---\n\n' + c),
          pi.source_blocks = source_blocks,
          pi.block_count = size(source_blocks),
          pi.compilation_timestamp = datetime()
      RETURN pi
