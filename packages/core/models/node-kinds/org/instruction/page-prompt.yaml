# models/nodes/project/instruction/page-prompt.yaml
# PagePrompt - Orchestrator instructions for page generation (v7.2.0)

node:
  name: PagePrompt
  realm: org
  layer: instruction
  trait: invariant
  icon: "🔵"
  description: "AI instructions for orchestrating page generation with versioning"

  # ═══════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (Prompt nodes - no key, v7.2.0)
  # ═══════════════════════════════════════════════════════════════════════════

  standard_properties:
    display_name:
      type: string
      required: true
      description: "Versioned display name"
      example: "Pricing Page Prompt v1.0"


    description:
      type: string
      required: true
      description: "Short description"
      example: "Orchestration instructions for pricing page"

    llm_context:
      type: string
      required: false
      description: "Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."
      example: "USE: orchestrate pricing page. TRIGGERS: page-pricing. NOT: individual blocks."



    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ═══════════════════════════════════════════════════════════════════════════
  # PAGEPROMPT-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════

  properties:
    prompt:
      type: string
      required: true
      description: "Orchestrator directive for page generation"
      example: "[GENERATE] Create conversion-focused pricing page comparing tiers"

    version:
      type: string
      required: true
      description: "Semver format for versioning"
      example: "1.0"

    active:
      type: boolean
      required: true
      default: false
      description: "true = current active version"

  # ═══════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════

  relations:
    incoming:
      - type: HAS_PROMPT
        from: Page
        description: "Page that owns this prompt"

    outgoing:
      - type: GENERATED
        to: PageGenerated
        description: "Outputs generated by this prompt (provenance)"
        properties:
          generated_at: datetime

  # ═══════════════════════════════════════════════════════════════════════════
  # NEO4J CONFIGURATION
  # ═══════════════════════════════════════════════════════════════════════════

  neo4j:
    indexes:
      - "CREATE INDEX pageprompt_active IF NOT EXISTS FOR (pp:PagePrompt) ON (pp.active)"
      - "CREATE INDEX pageprompt_version IF NOT EXISTS FOR (pp:PagePrompt) ON (pp.version)"

  # ═══════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════

  example:
    display_name: "Pricing Page Prompt v1.0"
    description: "Orchestration instructions for pricing page generation"
    llm_context: "USE: orchestrate pricing page. TRIGGERS: page-pricing. NOT: individual blocks."
    prompt: "[GENERATE] Create conversion-focused pricing page comparing tiers with urgency CTAs"
    version: "1.0"
    active: true
