# models/node-kinds/org/output/block-generated.yaml
# BlockGenerated - LLM-generated content for a block (v10.9.0)
#
# ═══════════════════════════════════════════════════════════════════════════════
# v10.9.0 CHANGES (Naming Convention Refactor)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   RENAMED: BlockL10n → BlockGenerated
#   - Clearer semantics: this is GENERATED output, not source content
#   - Trait changed: localized → derived (computed from source content)
#   - Arc changed: HAS_OUTPUT → HAS_GENERATED (generation family)
#
# TRAIT SEMANTICS:
#   - localized = source content (human-curated, e.g., EntityContent)
#   - derived = computed output (LLM-generated, e.g., BlockGenerated)
#
# ═══════════════════════════════════════════════════════════════════════════════

node:
  name: BlockGenerated
  realm: org
  layer: output
  trait: generated  # v11.2: Split derived → generated (LLM output)
  icon: "🟠"
  description: "LLM-generated content for a block (derived from source content)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      pattern: "^block:[a-z][a-z0-9-]*@[a-z]{2}-[A-Z]{2}$"
      description: "Composite key: block:{block_key}@{locale_key}"
      examples:
        - "block:pricing-hero@fr-FR"
        - "block:feature-list@ja-JP"

    display_name:
      type: string
      required: true
      description: "Auto-generated name"
      example: "Pricing Hero (fr-FR)"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Generated hero section for French market"

    llm_context:
      type: string
      required: false
      description: "Generation context used"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOCKGENERATED-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    generated:
      type: json
      required: true
      description: "LLM output matching BlockType.structure"

    generated_at:
      type: datetime
      required: true
      description: "Generation timestamp"

    generator_version:
      type: string
      required: true
      description: "Version tracking"
      example: "1.2.0"

    status:
      type: string
      required: true
      enum: ["draft", "approved", "published"]
      description: "Review and publication status"

    # ─────────────────────────────────────────────────────────────────────────────
    # VERSIONING
    # ─────────────────────────────────────────────────────────────────────────────
    version:
      type: int
      required: true
      description: "Version number (1, 2, 3...)"
      example: 1

    published_at:
      type: datetime
      required: false
      description: "When this version was put live"

    replaced_at:
      type: datetime
      required: false
      description: "When this version was replaced (null = current)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    incoming:
      - type: HAS_GENERATED  # v10.9.0: Changed from HAS_OUTPUT
        from: Block
        description: "Block that owns this LLM-generated content"

      - type: GENERATED_BY
        from: BlockInstruction  # v11.8 ADR-025: BlockPrompt → BlockInstruction
        description: "Instruction that generated this output (provenance)"

      - type: ASSEMBLES
        from: PageGenerated
        description: "PageGenerated that assembles this block"

    outgoing:
      - type: FOR_LOCALE
        to: Locale
        description: "Target locale for this output"

      - type: INFLUENCED_BY
        to: EntityContent
        description: "EntityContent used in generation (provenance)"

      - type: PREVIOUS_VERSION
        to: BlockGenerated
        cardinality: "1:1"
        description: "Link to previous version in history chain"

  # ═══════════════════════════════════════════════════════════════════════════════
  # NEO4J CONFIGURATION
  # ═══════════════════════════════════════════════════════════════════════════════

  neo4j:
    indexes:
      - "CREATE INDEX blockgenerated_status IF NOT EXISTS FOR (bg:BlockGenerated) ON (bg.status)"
      - "CREATE INDEX blockgenerated_date IF NOT EXISTS FOR (bg:BlockGenerated) ON (bg.generated_at)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    key: "block:pricing-hero@fr-FR"
    display_name: "Pricing Hero (fr-FR)"
    description: "Hero tarifs généré pour le marché français"
    llm_context: "USE: display generated hero content. TRIGGERS: pricing hero, fr-FR output."
    generated:
      title: "Des QR Codes Pro pour votre Business"
      subtitle: "Créez, personnalisez et suivez vos QR codes en illimité"
      cta:
        label: "Commencer Gratuitement"
        url: "/signup"
    generated_at: "2024-01-15T10:25:00Z"
    generator_version: "1.2.0"
    status: "published"
    version: 2
    published_at: "2024-01-15T10:30:00Z"
    replaced_at: null
