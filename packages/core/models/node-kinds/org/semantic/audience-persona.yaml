# models/node-kinds/org/semantic/audience-persona.yaml
# Path: packages/core/models/nodes/project/semantic/audience-persona.yaml

node:
  name: AudiencePersona
  realm: org
  layer: semantic
  trait: invariant
  icon: "👤"
  description: |
    Target audience archetype for content personalization. Represents a specific
    user segment with defined characteristics, goals, and pain points. Used to
    tailor content tone, examples, and messaging to resonate with specific audiences.

    USE: When defining who the content is for, enabling persona-based generation.
    TRIGGERS: "persona", "audience", "user segment", "target user", "buyer persona".
    NOT: For actual users (use analytics), for demographics only (include psychographics).

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier"
      pattern: "^persona-[a-z0-9-]+$"
      example: "persona-startup-founder"

    display_name:
      type: string
      required: true
      description: "Human-readable persona name"
      example: "Startup Founder"

    description:
      type: string
      required: true
      description: "Detailed persona description"

    llm_context:
      type: string
      required: true
      description: "LLM prompt context for this persona"
      example: "Target: early-stage startup founder. Time-poor, ROI-focused, values efficiency."

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    persona_type:
      type: string
      required: true
      description: "Category of persona"
      enum:
        - decision_maker
        - influencer
        - end_user
        - technical_evaluator
        - budget_holder
      example: "decision_maker"

    industry_focus:
      type: "string[]"
      required: false
      description: "Industries this persona typically belongs to"
      example: ["technology", "saas", "ecommerce"]

    company_size:
      type: string
      required: false
      description: "Typical company size"
      enum:
        - solo
        - startup
        - smb
        - mid_market
        - enterprise
      example: "startup"

    pain_points:
      type: "string[]"
      required: true
      description: "Key challenges this persona faces"
      example: ["time constraints", "limited budget", "scaling challenges"]

    goals:
      type: "string[]"
      required: true
      description: "Primary objectives this persona wants to achieve"
      example: ["increase efficiency", "reduce costs", "automate workflows"]

    preferred_tone:
      type: string
      required: true
      description: "Communication style that resonates"
      enum:
        - professional
        - casual
        - technical
        - inspirational
        - direct
      example: "direct"

    content_preferences:
      type: "string[]"
      required: false
      description: "Types of content this persona engages with"
      example: ["case studies", "ROI calculators", "quick tutorials"]

    decision_factors:
      type: "string[]"
      required: false
      description: "Key factors influencing purchase/adoption decisions"
      example: ["price", "time to value", "integration ease"]

    objections:
      type: "string[]"
      required: false
      description: "Common objections or concerns"
      example: ["too expensive", "learning curve", "security concerns"]

    priority:
      type: int
      required: true
      description: "Priority for content creation (1=highest)"
      example: 1

  neo4j:
    indexes:
      - name: audiencepersona_type
        property: persona_type
      - name: audiencepersona_size
        property: company_size
      - name: audiencepersona_priority
        property: priority

  relations:
    incoming:
      - type: TARGETS_PERSONA
        from: Page
        description: "Pages targeted at this persona"

    outgoing: []

  example:
    data: |
      {
        "key": "persona-startup-founder",
        "display_name": "Startup Founder",
        "description": "Early-stage startup founder building an MVP. Time-constrained, wears multiple hats, needs quick wins.",
        "llm_context": "Target: early-stage startup founder. Time-poor, ROI-focused, values efficiency and speed. Skeptical of enterprise solutions.",
        "persona_type": "decision_maker",
        "industry_focus": ["technology", "saas"],
        "company_size": "startup",
        "pain_points": ["time constraints", "limited budget", "need to ship fast"],
        "goals": ["launch MVP quickly", "automate repetitive tasks", "look professional"],
        "preferred_tone": "direct",
        "content_preferences": ["quick tutorials", "templates", "ROI examples"],
        "decision_factors": ["price", "time to value", "ease of use"],
        "objections": ["too complex", "overkill for our size"],
        "priority": 1
      }
    cypher: |
      CREATE (p:AudiencePersona {
        key: 'persona-startup-founder',
        display_name: 'Startup Founder',
        description: 'Early-stage startup founder building an MVP. Time-constrained, wears multiple hats, needs quick wins.',
        llm_context: 'Target: early-stage startup founder. Time-poor, ROI-focused, values efficiency and speed.',
        persona_type: 'decision_maker',
        industry_focus: ['technology', 'saas'],
        company_size: 'startup',
        pain_points: ['time constraints', 'limited budget', 'need to ship fast'],
        goals: ['launch MVP quickly', 'automate repetitive tasks', 'look professional'],
        preferred_tone: 'direct',
        content_preferences: ['quick tutorials', 'templates', 'ROI examples'],
        decision_factors: ['price', 'time to value', 'ease of use'],
        objections: ['too complex', 'overkill for our size'],
        priority: 1,
        created_at: datetime(),
        updated_at: datetime()
      })
