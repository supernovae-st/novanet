# models/node-kinds/org/foundation/brand-principles.yaml
# BrandPrinciples - Brand guidelines and voice (ADR-028)
# Tone, voice, and editorial guidelines

node:
  name: BrandPrinciples
  realm: org
  layer: foundation
  trait: defined
  description: "Brand voice, tone, and editorial guidelines"

  # =============================================================================
  # STANDARD PROPERTIES
  # =============================================================================

  standard_properties:
    key:
      type: string
      required: true
      description: "Principles identifier. Format: principles-{brand}"
      pattern: "^principles-[a-z0-9-]+$"
      example: "principles-qrcodeai"

    display_name:
      type: string
      required: true
      description: "Principles name"
      example: "QR Code AI Brand Guidelines"

    description:
      type: string
      required: true
      description: "Guidelines overview"

    llm_context:
      type: string
      required: true
      description: "LLM context for consistent voice. Format: 'USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]. RELATES: [connections].'"
      example: |
        USE: when writing copy, selecting tone, or enforcing editorial guidelines.
        TRIGGERS: "brand voice", "tone", "writing guidelines", "messaging", "editorial", "@brand.principles".
        NOT: for visual design (use BrandDesign), for brand identity (use Brand), for locale-specific styles (use PromptStyle).
        RELATES: Brand (owner via HAS_PRINCIPLES).

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # =============================================================================
  # PRINCIPLES-SPECIFIC PROPERTIES
  # =============================================================================

  properties:
    # ─────────────────────────────────────────────────────────────────────────────
    # Voice & Tone
    # ─────────────────────────────────────────────────────────────────────────────
    voice_attributes:
      type: string[]
      required: true
      description: "Core voice attributes"
      example: ["Friendly", "Expert", "Clear", "Encouraging"]

    tone_default:
      type: string
      required: true
      description: "Default tone for general content"
      example: "Professional yet approachable"

    tone_variations:
      type: json
      required: false
      description: "Tone variations by context"
      example:
        marketing: "Enthusiastic and benefit-focused"
        support: "Patient and helpful"
        documentation: "Clear and concise"

    # ─────────────────────────────────────────────────────────────────────────────
    # Writing Guidelines
    # ─────────────────────────────────────────────────────────────────────────────
    writing_do:
      type: string[]
      required: false
      description: "What TO do in writing"
      example: ["Use active voice", "Be specific", "Address the reader directly"]

    writing_dont:
      type: string[]
      required: false
      description: "What NOT to do in writing"
      example: ["No jargon without explanation", "No fear-based messaging"]

    # ─────────────────────────────────────────────────────────────────────────────
    # Messaging
    # ─────────────────────────────────────────────────────────────────────────────
    key_messages:
      type: string[]
      required: false
      description: "Core brand messages"
      example: ["Fast and easy", "Professional results", "No design skills needed"]

    differentiators:
      type: string[]
      required: false
      description: "What makes us different"
      example: ["AI-powered", "Instant generation", "Beautiful by default"]

    # ─────────────────────────────────────────────────────────────────────────────
    # Terminology
    # ─────────────────────────────────────────────────────────────────────────────
    preferred_terms:
      type: json
      required: false
      description: "Preferred terminology"
      example:
        use: "create"
        instead_of: "generate"

    forbidden_terms:
      type: string[]
      required: false
      description: "Terms to avoid"
      example: ["cheap", "basic", "simple"]

  # =============================================================================
  # RELATIONS
  # =============================================================================

  relations: {}
    # BrandPrinciples is owned by Brand via HAS_PRINCIPLES (incoming)

  # =============================================================================
  # EXAMPLE
  # =============================================================================

  example:
    data:
      key: "principles-qrcodeai"
      display_name: "QR Code AI Brand Guidelines"
      description: "Voice and tone guidelines for QR Code AI"
      llm_context: "USE: for copywriting. TRIGGERS: tone, voice. NOT: visual design."
      voice_attributes: ["Friendly", "Expert", "Clear", "Encouraging"]
      tone_default: "Professional yet approachable"
      writing_do: ["Use active voice", "Be specific"]
      writing_dont: ["No jargon", "No fear-based messaging"]
      key_messages: ["Fast and easy", "Professional results"]

    cypher: |
      // Get principles for a brand
      MATCH (b:Brand {key: $brand})-[:HAS_PRINCIPLES]->(p:BrandPrinciples)
      RETURN p
