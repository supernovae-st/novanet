# Tenant - Multi-tenant boundary node
# v10.6: Root of tenant realm, owns all tenant-specific content

node:
  name: Tenant
  realm: org
  layer: config
  trait: invariant
  icon: "🏢"
  description: "Multi-tenant isolation boundary that owns Projects and tenant-wide configuration"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique tenant identifier (kebab-case)"
      example: "supernovae-studio"

    display_name:
      type: string
      required: true
      description: "Human-readable tenant name"
      example: "SuperNovae Studio"

    description:
      type: string
      required: true
      description: "Brief description of the tenant/organization"
      example: "AI-powered tools for the creative economy"

    llm_context:
      type: string
      required: true
      description: "LLM routing context (USE/TRIGGERS/NOT format)"
      example: "USE: when needing tenant-level context. TRIGGERS: supernovae, studio. NOT: project-specific."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # TENANT-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    domain:
      type: string
      required: false
      description: "Primary domain for the tenant"
      example: "supernovae.studio"

    billing_email:
      type: string
      required: false
      description: "Billing contact email"

    plan:
      type: string
      required: false
      description: "Subscription plan tier"
      example: "enterprise"

    max_projects:
      type: integer
      required: false
      description: "Maximum number of projects allowed"
      example: 10

    settings:
      type: json
      required: false
      description: "Tenant-wide settings as JSON object"
