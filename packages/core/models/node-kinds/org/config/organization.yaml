# models/node-kinds/organization/config/organization.yaml
# Organization - Multi-tenant root node for company/organization level

node:
  name: Organization
  realm: org
  layer: config
  trait: invariant
  icon: "🏢"
  description: "Multi-tenant organization root. Parent of all projects within one company."

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v10.5)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique slug: 'org-supernovae-studio'"
      example: "org-supernovae-studio"

    display_name:
      type: string
      required: true
      description: "Human-readable organization name"
      example: "SuperNovae Studio"

    description:
      type: string
      required: true
      description: "Short description of the organization"
      example: "AI-powered content localization company"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints for organization-level context"
      example: "USE: organization-wide context. TRIGGERS: company, org, supernovae. NOT: project-specific."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # ORGANIZATION-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    legal_name:
      type: string
      required: false
      description: "Legal entity name"
      example: "SuperNovae Studio SAS"

    founding_year:
      type: int
      required: false
      description: "Year the organization was founded"
      example: 2024

    website_url:
      type: string
      required: false
      description: "Primary organization website URL"
      example: "https://supernovae.studio"

    industry:
      type: string
      required: false
      description: "Industry or sector"
      example: "Software / AI / Localization"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS (FROM this node)
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    HAS_COMPANY_PROJECT:
      to: Project
      cardinality: "1:1"
      description: "The organization's own project (defines org branding/config)"

    HAS_PROJECT:
      to: Project
      cardinality: "1:N"
      description: "Product projects owned by this organization"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    data:
      key: "org-supernovae-studio"
      display_name: "SuperNovae Studio"
      description: "AI-powered content localization company"
      llm_context: "USE: organization-wide context. TRIGGERS: company, org, supernovae. NOT: project-specific."
      legal_name: "SuperNovae Studio SAS"
      founding_year: 2024
      website_url: "https://supernovae.studio"
      industry: "Software / AI / Localization"

    cypher: |
      // Get organization with all projects
      MATCH (org:Organization {key: $key})
      OPTIONAL MATCH (org)-[:HAS_COMPANY_PROJECT]->(cp:Project)
      OPTIONAL MATCH (org)-[:HAS_PROJECT]->(p:Project)
      RETURN org, cp AS companyProject, collect(DISTINCT p) AS projects
