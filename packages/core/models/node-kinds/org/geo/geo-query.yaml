# models/node-kinds/global/seo/geo-query.yaml
# GEOQuery - Generative Engine Optimization query tracked across AI engines
#
# v10.7: GEO Schema v1
#        - New node type for AI visibility tracking (Gemini, GPT, Perplexity, Claude)
#        - Different from SEO: tracks LLM citations, not search rankings
#        - Owned by Locale via HAS_GEO_QUERIES
#        - Links to GEOAnswer (snapshots) and GEOMetrics (time-series)

node:
  name: GEOQuery
  realm: org
  layer: geo
  trait: knowledge
  icon: "🤖"
  description: "Query tracked across AI engines for generative engine optimization (GEO)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier"
      example: "geo-how-to-create-qr-code-en"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "how to create a QR code"

    description:
      type: string
      required: false
      description: "Short description"

    llm_context:
      type: string
      required: false
      description: "Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."

    created_at:
      type: datetime
      required: false

    updated_at:
      type: datetime
      required: false

  # ═══════════════════════════════════════════════════════════════════════════════
  # NODE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    # --- Core query data ---
    value:
      type: string
      required: true
      description: "The query string as submitted to AI engines"
      example: "how to create a QR code for my restaurant menu"

    query_type:
      type: string
      required: false
      description: "Query classification: informational | how_to | comparison | recommendation | factual"
      example: "how_to"

    # --- Per-engine visibility scores (0-100) ---
    gemini_visibility:
      type: int
      required: false
      description: "Visibility score in Google Gemini responses (0-100)"
      example: 75

    gpt_visibility:
      type: int
      required: false
      description: "Visibility score in OpenAI GPT responses (0-100)"
      example: 60

    perplexity_visibility:
      type: int
      required: false
      description: "Visibility score in Perplexity AI responses (0-100)"
      example: 85

    claude_visibility:
      type: int
      required: false
      description: "Visibility score in Anthropic Claude responses (0-100)"
      example: 70

    # --- Aggregate metrics ---
    ai_visibility_score:
      type: float
      required: false
      description: "Weighted average visibility across all AI engines (0-100)"
      example: 72.5

    share_of_voice:
      type: float
      required: false
      description: "Percentage of AI responses mentioning brand vs competitors (0-100)"
      example: 35.2

    citation_frequency:
      type: float
      required: false
      description: "Average number of citations per AI response"
      example: 2.3

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    # Incoming: Locale --[:HAS_GEO_QUERIES]--> GEOQuery (ownership)
    # Incoming: EntityContent --[:MONITORS_GEO]--> GEOQuery (targeting)

    - relation: HAS_GEO_ANSWERS
      to: GEOAnswer
      direction: outgoing
      description: "LLM response samples for this query"

    - relation: HAS_GEO_METRICS
      to: GEOMetrics
      direction: outgoing
      description: "Historical visibility metrics snapshots (time-series)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    description: "Get GEO queries with highest AI visibility for a locale"
    cypher: |
      // v10.7: GEOQuery with visibility scores and answers
      MATCH (l:Locale {key: $locale})-[:HAS_GEO_QUERIES]->(q:GEOQuery)
      OPTIONAL MATCH (q)-[:HAS_GEO_ANSWERS]->(a:GEOAnswer)
      RETURN q.value AS query,
             q.ai_visibility_score,
             q.share_of_voice,
             q.gemini_visibility,
             q.gpt_visibility,
             q.perplexity_visibility,
             q.claude_visibility,
             count(a) AS answer_count
      ORDER BY q.ai_visibility_score DESC
      LIMIT 20
