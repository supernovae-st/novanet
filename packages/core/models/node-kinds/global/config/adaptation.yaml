# packages/core/models/node-kinds/global/config/adaptation.yaml
# Adaptation — Content adaptation rules for a locale (FACTS vs ILLUSTRATIONS framework)
#
# v10.6: Added FACTS/ILLUSTRATIONS framework, priority_hierarchy, formality, measurements, raw_markdown
# v10.6.1: Added punctuation_spacing, typography_conventions, technical_terms_preferred/accepted, legal_compliance
# Stability: Medium - update quarterly

node:
  name: Adaptation
  realm: global
  layer: config
  trait: knowledge
  icon: "📐"
  description: "Content adaptation rules: FACTS (never adapt) vs ILLUSTRATIONS (always generate native)"

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique key (locale code)"
      example: "fr-FR"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) Adaptation"

    description:
      type: string
      required: true
      description: "Short description"
      example: "FACTS/ILLUSTRATIONS content adaptation rules for fr-FR"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints"
      example: "USE: content adaptation decisions. TRIGGERS: localization, examples, idioms, metaphors. KEY: FACTS=translate literally, ILLUSTRATIONS=generate native. NOT: formatting (use Formatting) or style (use Style)."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    # ═══════════════════════════════════════════════════════════════════════════
    # CORE FRAMEWORK: FACTS vs ILLUSTRATIONS
    # ═══════════════════════════════════════════════════════════════════════════
    facts_categories:
      type: json
      required: true
      description: |
        Categories that MUST remain accurate (NEVER adapt, only format).
        Each category has: examples, treatment rules.
      example:
        financial: "Prices, fees, taxes - translate literally, format numbers"
        temporal: "Dates, times, deadlines - translate literally, format dates"
        legal: "CGV, RGPD, mentions légales - NEVER adapt, ensure compliance"
        technical: "Specifications, dimensions - convert units if needed"
        brand: "Brand names, trademarks - do NOT translate"
        contact: "Phone, addresses, emails - translate literally, format locally"
        numerical: "Statistics, percentages, codes - translate literally, format numbers"
        scientific: "Formulas, dosages, norms - NEVER adapt"

    illustrations_categories:
      type: json
      required: true
      description: |
        Categories that SHOULD be generated natively (ALWAYS adapt).
        Each category has: examples, treatment rules.
      example:
        metaphors: "Idiomatic expressions - generate native equivalents"
        idioms: "Sayings, proverbs - NEVER translate literally"
        examples: "Scenarios, use cases - replace with local scenarios"
        cultural_refs: "Holidays, events - replace with local culture"
        sports_refs: "Sports analogies - replace with local sports"
        food_examples: "Culinary references - replace with local cuisine"
        geographic: "Landmarks, distances - replace with local geography"
        seasonal: "Seasons, events - replace with local calendar"

    # ═══════════════════════════════════════════════════════════════════════════
    # PRIORITY HIERARCHY
    # ═══════════════════════════════════════════════════════════════════════════
    priority_hierarchy:
      type: json
      required: true
      description: |
        When conflicts arise, follow this order (1=highest).
        Level 1: Legal/Safety → Never adapt
        Level 2: Brand/Product → Keep consistent
        Level 3: Cultural Relevance → Generate native
        Level 4: Style/Tone → Apply local style
      example:
        level_1: "Legal, safety, compliance - translate literally only"
        level_2: "Brand names, product names, taglines - keep original"
        level_3: "Examples, metaphors, cultural refs - generate native"
        level_4: "Sentence structure, formality, punctuation - adapt for naturalness"

    # ═══════════════════════════════════════════════════════════════════════════
    # FORMALITY & STYLE
    # ═══════════════════════════════════════════════════════════════════════════
    formality_default:
      type: string
      required: true
      enum: ["formal", "informal", "neutral"]
      description: "Default formality level (French: vous=formal, tu=informal)"
      example: "formal"

    formality_rules:
      type: json
      required: false
      description: "Context-specific formality rules"
      example:
        b2b: "formal"
        first_contact: "formal"
        ecommerce: "formal"
        youth_brand: "informal"
        escalation: "formal"

    # ═══════════════════════════════════════════════════════════════════════════
    # TYPOGRAPHY & PUNCTUATION
    # ═══════════════════════════════════════════════════════════════════════════
    punctuation_spacing:
      type: json
      required: false
      description: "Space rules before/after punctuation marks"
      example:
        colon: "space_before"
        semicolon: "space_before"
        exclamation: "space_before"
        question: "space_before"
        comma: "no_space"
        period: "no_space"

    typography_conventions:
      type: json
      required: false
      description: "Locale-specific typography (quotes, dashes, ellipsis)"
      example:
        opening_quote: "«"
        closing_quote: "»"
        quote_spacing: true
        ellipsis: "…"
        em_dash: "—"
        en_dash: "–"

    # ═══════════════════════════════════════════════════════════════════════════
    # MEASUREMENT & TECHNICAL
    # ═══════════════════════════════════════════════════════════════════════════
    measurement_system:
      type: string
      required: true
      enum: ["metric", "imperial", "mixed"]
      description: "Default measurement system"
      example: "metric"

    measurement_exceptions:
      type: json
      required: false
      description: "Industry exceptions to default measurement system"
      example:
        screens: "inches"
        aviation: "feet"
        maritime: "nautical_miles"

    technical_terms_approach:
      type: string
      required: true
      enum: ["local_only", "english_accepted", "mixed"]
      description: "Approach to technical/tech terms"
      example: "mixed"

    technical_terms_preferred:
      type: json
      required: false
      description: "Preferred local terms over English equivalents"
      example:
        computer: "ordinateur"
        software: "logiciel"
        download: "télécharger"
        password: "mot de passe"
        email: "courriel"
        cloud: "nuage informatique"

    technical_terms_accepted:
      type: json
      required: false
      description: "English terms accepted in this locale (no translation needed)"
      example: ["smartphone", "email", "Wi-Fi", "cloud", "hashtag", "start-up"]

    # ═══════════════════════════════════════════════════════════════════════════
    # CALENDAR & SEASONS
    # ═══════════════════════════════════════════════════════════════════════════
    hemisphere:
      type: string
      required: true
      enum: ["northern", "southern"]
      description: "Geographic hemisphere (affects seasons)"
      example: "northern"

    work_week:
      type: string
      required: true
      description: "Standard work week (e.g., MON-FRI, SUN-THU)"
      example: "MON-FRI"

    major_shopping_events:
      type: json
      required: false
      description: "Key retail/shopping events for this locale"
      example:
        - "soldes_hiver (Jan)"
        - "soldes_ete (Jun)"
        - "black_friday (Nov)"
        - "rentree (Sep)"

    cultural_calendar:
      type: json
      required: false
      description: "Major cultural events and holidays"
      example:
        - "14_juillet (Bastille Day)"
        - "reveillon (New Year's Eve)"
        - "toussaint (All Saints)"
        - "noel (Christmas)"

    # ═══════════════════════════════════════════════════════════════════════════
    # LENGTH PREFERENCES
    # ═══════════════════════════════════════════════════════════════════════════
    length_multiplier:
      type: float
      required: true
      description: "Text expansion/contraction factor vs English (>1 = longer)"
      example: 1.15

    headline_max_chars:
      type: int
      required: false
      description: "Preferred max headline length"
      example: 70

    cta_max_chars:
      type: int
      required: false
      description: "Preferred max CTA length"
      example: 35

    # ═══════════════════════════════════════════════════════════════════════════
    # STRUCTURE PREFERENCES
    # ═══════════════════════════════════════════════════════════════════════════
    paragraph_style:
      type: string
      required: false
      enum: ["short", "medium", "long"]
      description: "Preferred paragraph length"
      example: "medium"

    list_preference:
      type: string
      required: false
      enum: ["bullets", "numbers", "prose"]
      description: "Preferred list format"
      example: "bullets"

    heading_capitalization:
      type: string
      required: true
      enum: ["sentence", "title", "uppercase"]
      description: "Heading capitalization style"
      example: "sentence"

    # ═══════════════════════════════════════════════════════════════════════════
    # SEO PATTERNS
    # ═══════════════════════════════════════════════════════════════════════════
    title_structure:
      type: json
      required: false
      description: "SEO title patterns by page type"
      example:
        home: "{brand} - {tagline}"
        product: "{product} | {brand}"
        article: "{title} - {brand}"

    meta_description_length:
      type: json
      required: false
      description: "Meta description length ranges"
      example:
        min: 120
        max: 160
        optimal: 145

    # ═══════════════════════════════════════════════════════════════════════════
    # CONTENT PATTERNS
    # ═══════════════════════════════════════════════════════════════════════════
    intro_style:
      type: string
      required: false
      description: "Preferred introduction style"
      example: "context-first"

    conclusion_style:
      type: string
      required: false
      description: "Preferred conclusion style"
      example: "action-oriented"

    # ═══════════════════════════════════════════════════════════════════════════
    # COMMON ERRORS TO AVOID
    # ═══════════════════════════════════════════════════════════════════════════
    common_errors:
      type: json
      required: false
      description: "Common localization errors specific to this locale"
      example:
        - "Using tu with unknown customer"
        - "Literal translation of idioms"
        - "Missing space before punctuation"
        - "Using period as decimal separator"

    # ═══════════════════════════════════════════════════════════════════════════
    # LEGAL COMPLIANCE
    # ═══════════════════════════════════════════════════════════════════════════
    legal_compliance:
      type: json
      required: false
      description: "Key legal frameworks and regulations for this locale"
      example:
        consumer_protection: "Code de la consommation"
        data_privacy: "RGPD / CNIL"
        language_law: "Loi Toubon"
        advertising: "Code de la publicité"

    # ═══════════════════════════════════════════════════════════════════════════
    # RAW MARKDOWN (Hybrid approach)
    # ═══════════════════════════════════════════════════════════════════════════
    raw_markdown:
      type: string
      required: false
      description: "Full source markdown for LLM context (includes decision algorithm, validation checklist)"

  relations:
    incoming:
      - type: HAS_ADAPTATION
        from: Locale
        cardinality: "1:1"
        description: "Locale has exactly one adaptation config"
