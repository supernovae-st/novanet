# models/nodes/global/knowledge/locale-culture.yaml
# LocaleCulture - VALUES, TABOOS for a locale
#
# Stability: High - core values stable, update annually

node:
  name: LocaleCulture
  realm: global
  layer: knowledge
  trait: knowledge
  icon: "🏛️"
  description: "Values, taboos, sensitivities for a locale"

  # ===========================================================================
  # STANDARD PROPERTIES (no key - relation-identified) v7.1.0
  # ===========================================================================

  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) Culture"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Values, taboos, sensitivities for France"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."
      example: "USE: for culturally appropriate content. TRIGGERS: values, taboos. NOT: tone aspects."



    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ===========================================================================
  # LOCALECULTURE-SPECIFIC PROPERTIES
  # ===========================================================================

  properties:
    # Core values
    dominant_values:
      type: json
      required: false
      description: "Core cultural values with marketing angles"
      example:
        - value: "Liberte"
          importance: "high"
          marketing_angle: "Emphasize choice, autonomy"

    positive_triggers:
      type: json
      required: false
      description: "Themes that resonate positively"
      example:
        - theme: "Qualite francaise"
          why: "National pride in craftsmanship"
          example: "Savoir-faire artisanal"

    national_pride:
      type: json
      required: false
      description: "Topics of national pride"
      example:
        - topic: "Gastronomie"
          sensitivity: "low"
          notes: "Safe to reference positively"

    # Communication style
    context_level:
      type: string
      required: true
      enum: [high, medium, low]
      description: "High-context vs low-context culture"
      example: "high"

    hierarchy_sensitivity:
      type: string
      required: true
      enum: [high, medium, low]
      description: "Sensitivity to social/professional hierarchy"
      example: "medium"

    # Taboos & sensitivities
    taboo_topics:
      type: json
      required: false
      description: "Topics to avoid"
      example:
        - topic: "Personal income"
          severity: "critical"
          notes: "Never ask or reference directly"

    historical_sensitivities:
      type: json
      required: false
      description: "Historical events requiring careful handling"
      example:
        - event: "WWII Occupation"
          sensitivity: "high"
          handling: "Avoid unless directly relevant"

    political_sensitivities:
      type: json
      required: false
      description: "Political topics requiring care"
      example:
        - topic: "Left/Right"
          sensitivity: "high"
          safe_approach: "Stay neutral, avoid political messaging"

    # Legal restrictions
    content_prohibitions:
      type: json
      required: false
      description: "Legally prohibited content categories"
      example:
        - category: "Tobacco"
          restriction: "Complete ban"
          legal_basis: "Loi Evin"

    restricted_imagery:
      type: json
      required: false
      description: "Restricted visual content"
      example:
        - type: "Children in alcohol ads"
          restriction: "prohibited"

    # Social norms
    gender_considerations:
      type: json
      required: false
      description: "Gender-related content guidelines"
      example:
        imagery: "Balanced representation expected"
        language: "Inclusive language growing"
        products: "Avoid gendered marketing unless relevant"

    age_norms:
      type: json
      required: false
      description: "Age-related content guidelines"
      example:
        addressing_elders: "Formal vous always"
        youth_marketing: "Casual acceptable but respectful"

    time_norms:
      type: json
      required: false
      description: "Time-related cultural norms"
      example:
        work_week: "Mon-Fri"
        business_hours: "9h-18h"
        punctuality: "Expected but flexible"

    # Religious/cultural phrases
    cultural_phrases:
      type: json
      required: false
      description: "Cultural/religious phrases appropriate to use"
      example:
        - phrase: "Bonnes fetes"
          meaning: "Happy holidays"
          when_to_use: "December, works for all"

    phrases_to_avoid:
      type: json
      required: false
      description: "Phrases to avoid by context"
      example:
        - context: "B2B"
          avoid: "Religious references"
          reason: "Laicite - secularism expected"

  # ===========================================================================
  # RELATIONS
  # ===========================================================================

  relations:
    incoming:
      - type: HAS_CULTURE
        from: Locale
        cardinality: "1:1"
        description: "Locale has exactly one culture"
