# models/node-kinds/global/knowledge/entity.yaml
# Entity - Universal semantic unit (replaces Concept in v10.2)

node:
  name: Entity
  realm: global
  layer: knowledge
  trait: invariant
  icon: "🔷"
  description: "Universal semantic unit representing actions, things, features, brands, places, audiences, guides, or comparisons"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Kebab-case identifier. Format: {type}-{identifier}"
      pattern: "^[a-z][a-z0-9-]*$"
      examples:
        - "action-create-qr"
        - "thing-qr-code"
        - "feature-analytics"
        - "brand-qrcode-ai"
        - "place-france"
        - "audience-small-business"
        - "guide-how-to-create-qr"
        - "comparison-static-vs-dynamic"

    display_name:
      type: string
      required: true
      description: "Human-readable UI name"
      example: "Create QR Code"

    description:
      type: string
      required: true
      description: "One-line description of the entity"
      example: "Action of creating a QR code from URL, text, or contact"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: 'USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation].'"
      example: "USE: when user wants to create/generate a new QR code. TRIGGERS: create, generate, make. NOT: viewing or editing existing codes."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # VECTOR EMBEDDING (Hybrid OntologyRAG)
  # ═══════════════════════════════════════════════════════════════════════════════

  embedding_properties:
    embedding:
      type: vector
      dimensions: 1536
      required: false
      description: "OpenAI text-embedding-3-small vector for semantic search"

    embedding_source:
      type: string
      required: false
      description: "Text used to generate embedding (for debugging)"

    embedding_updated_at:
      type: datetime
      required: false
      description: "Timestamp of last embedding update"

  # ═══════════════════════════════════════════════════════════════════════════════
  # ENTITY-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    type:
      type: string
      required: true
      enum: [ACTION, THING, FEATURE, BRAND, PLACE, AUDIENCE, GUIDE, COMPARISON]
      description: "Entity type classification"
      examples:
        - ACTION: "User actions (create, scan, download)"
        - THING: "Objects and concepts (QR code, URL, contact)"
        - FEATURE: "Product capabilities (analytics, tracking, design)"
        - BRAND: "Brand elements (product names, tiers)"
        - PLACE: "Geographic entities (countries, regions)"
        - AUDIENCE: "Target user segments (small business, enterprise)"
        - GUIDE: "How-to and tutorial topics"
        - COMPARISON: "Versus comparisons (static vs dynamic)"

    is_pillar:
      type: boolean
      required: false
      default: false
      description: "True if this entity is a pillar in the content cluster hierarchy"
      example: true

    schema_org_type:
      type: string
      required: false
      description: "Schema.org type for structured data (e.g., Product, HowTo, FAQPage)"
      examples:
        - "Product"
        - "HowTo"
        - "FAQPage"
        - "WebApplication"
        - "SoftwareApplication"

    wikidata_id:
      type: string
      required: false
      pattern: "^Q[0-9]+$"
      description: "Wikidata entity ID for external knowledge linking"
      examples:
        - "Q12345"
        - "Q185149"  # QR code

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS (FROM this node)
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    HAS_L10N:
      to: EntityL10n
      cardinality: "1:N"
      description: "Localized content for this entity (one per locale)"

    SUBTOPIC_OF:
      to: Entity
      cardinality: "N:1"
      props:
        depth:
          type: int
          description: "Hierarchy depth from pillar (1 = direct child)"
      description: "Parent entity in pillar/cluster hierarchy"

    SEMANTIC_LINK:
      to: Entity
      cardinality: "N:N"
      props:
        temperature:
          type: float
          description: "Activation strength 0.0-1.0"
        temperature_threshold:
          type: float
          description: "Minimum activation for traversal (default 0.3)"
        link_type:
          type: string
          enum: [is_action_on, includes, type_of, used_for, contrasts_with, related_to]
          description: "Type of semantic relationship"
      description: "Spreading activation links to related entities"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    data:
      key: "action-create-qr"
      display_name: "Create QR Code"
      description: "Action of creating a QR code from URL, text, or contact"
      llm_context: "USE: when user wants to create/generate a new QR code. TRIGGERS: create, generate, make. NOT: viewing or editing existing codes."
      type: "ACTION"
      is_pillar: false
      schema_org_type: "HowTo"
      wikidata_id: null

    cypher: |
      // Get entity with localized content
      MATCH (e:Entity {key: $key})
      OPTIONAL MATCH (e)-[:HAS_L10N]->(el:EntityL10n)-[:FOR_LOCALE]->(l:Locale)
      RETURN e, collect({locale: l.key, title: el.title, definition: el.definition}) AS localizations

      // Get pillar with all subtopics (cluster)
      MATCH (pillar:Entity {key: $key, is_pillar: true})
      OPTIONAL MATCH (pillar)<-[:SUBTOPIC_OF*1..3]-(subtopic:Entity)
      RETURN pillar, collect(subtopic) AS cluster

      // Spreading activation from entity (2 hops, threshold 0.3)
      MATCH (e:Entity {key: $key})-[r:SEMANTIC_LINK*1..2]->(related:Entity)
      WHERE ALL(rel IN r WHERE rel.temperature >= coalesce(rel.temperature_threshold, 0.3))
      WITH related, reduce(activation = 1.0, rel IN r | activation * rel.temperature) AS score
      WHERE score >= 0.3
      RETURN related.key, related.display_name, related.type, score
      ORDER BY score DESC
