# models/node-kinds/global/knowledge/entity-l10n.yaml
# EntityL10n - Localized content for Entity nodes (v10.2)
#
# GRAPH POSITION:
#   Entity --[:HAS_L10N]--> EntityL10n --[:FOR_LOCALE]--> Locale
#
# PURPOSE:
#   Native definition per locale (NOT translation).
#   The LLM never sees English when generating French content.
#
# IDENTIFICATION:
#   No key property - identified by relation chain:
#   (Entity)--[:HAS_L10N]-->(EntityL10n)--[:FOR_LOCALE]-->(Locale)
#
# REPLACES:
#   ConceptL10n (project/semantic) - EntityL10n is the global knowledge equivalent

node:
  name: EntityL10n
  realm: global
  layer: knowledge
  trait: localized
  icon: "🟢"
  description: "Localized content for an Entity in a specific locale"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (L10n nodes - no key, relation-identified)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    display_name:
      type: string
      required: true
      description: "Localized display name that changes per locale"
      examples:
        - en: "QR Code Generator"
        - fr: "Generateur de QR Code"
        - de: "QR-Code-Generator"
        - ja: "QRコードジェネレーター"

    description:
      type: string
      required: true
      description: "Localized short description"
      examples:
        - en: "Create custom QR codes from URLs, text, or contacts"
        - fr: "Creez des QR codes personnalises a partir d'URLs, de texte ou de contacts"

    llm_context:
      type: string
      required: true
      description: "Format: USE: [when]. TRIGGERS: [locale keywords]. NOT: [disambiguation]."
      example: "USE: native French content for generation. TRIGGERS: fr-FR content needed. NOT: Quebec French or Belgian French."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # VECTOR EMBEDDING (Hybrid OntologyRAG)
  # ═══════════════════════════════════════════════════════════════════════════════

  embedding_properties:
    embedding:
      type: vector
      dimensions: 1536
      required: false
      description: "OpenAI text-embedding-3-small vector for semantic search"

    embedding_source:
      type: string
      required: false
      description: "Text used to generate embedding (for debugging)"

    embedding_updated_at:
      type: datetime
      required: false
      description: "Timestamp of last embedding update"

  # ═══════════════════════════════════════════════════════════════════════════════
  # ENTITYL10N-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    definition:
      type: string
      required: false
      description: "What it is - localized definition"
      examples:
        - en: "A QR code generator is a tool that converts information into scannable 2D barcodes."
        - fr: "Un generateur de QR code est un outil qui convertit des informations en codes-barres 2D scannables."

    purpose:
      type: string
      required: false
      description: "Why it exists - localized purpose"
      examples:
        - en: "Convert any information into a smartphone-scannable format."
        - fr: "Convertir toute information en un format scannable par smartphone."

    benefits:
      type: string[]
      required: false
      description: "Value propositions in target locale"
      examples:
        - en: ["Quick information access", "Contactless and hygienic", "Trackable with analytics"]
        - fr: ["Acces rapide a l'information", "Sans contact, hygienique", "Tracable avec analytics"]

    cultural_notes:
      type: string
      required: false
      description: "Locale-specific cultural considerations"
      examples:
        - fr: "En France, preferer 'QR Code' a 'code QR'. Le terme anglais est standard."
        - de: "In Deutschland wird 'QR-Code' mit Bindestrich geschrieben."
        - ja: "日本ではQRコードはデンソーウェーブの登録商標です。"

    version:
      type: int
      required: true
      description: "Content version for staleness detection"
      example: 1

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS (FROM this node)
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    FOR_LOCALE:
      to: Locale
      cardinality: "N:1"
      description: "Links to the locale this content is for"

  # ═══════════════════════════════════════════════════════════════════════════════
  # INCOMING RELATIONS (TO this node)
  # ═══════════════════════════════════════════════════════════════════════════════

  incoming_relations:
    HAS_L10N:
      from: Entity
      cardinality: "1:N"
      description: "Parent entity that owns this localization"

  # ═══════════════════════════════════════════════════════════════════════════════
  # NEO4J CONFIGURATION
  # ═══════════════════════════════════════════════════════════════════════════════

  neo4j:
    indexes:
      - "CREATE INDEX entityl10n_version IF NOT EXISTS FOR (el:EntityL10n) ON (el.version)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    data:
      display_name: "Generateur de QR Code"
      description: "Creez des QR codes personnalises a partir d'URLs, de texte ou de contacts"
      llm_context: "USE: native French content for generation. TRIGGERS: fr-FR content needed. NOT: Quebec French or Belgian French."
      definition: "Un generateur de QR code est un outil qui convertit des informations en codes-barres 2D scannables."
      purpose: "Convertir toute information en un format scannable par smartphone."
      benefits:
        - "Acces rapide a l'information"
        - "Sans contact, hygienique"
        - "Tracable avec analytics"
      cultural_notes: "En France, preferer 'QR Code' a 'code QR'. Le terme anglais est standard."
      version: 1

    cypher: |
      // Get all localizations for an entity
      MATCH (e:Entity {key: $key})-[:HAS_L10N]->(el:EntityL10n)-[:FOR_LOCALE]->(l:Locale)
      RETURN e.key AS entity,
             l.key AS locale,
             el.display_name AS name,
             el.definition AS definition,
             el.version AS version
      ORDER BY l.key

      // Get entity with specific locale
      MATCH (e:Entity {key: $key})-[:HAS_L10N]->(el:EntityL10n)-[:FOR_LOCALE]->(l:Locale {key: $locale})
      RETURN e, el, l

      // Find stale localizations (version < parent entity's expected version)
      MATCH (e:Entity)-[:HAS_L10N]->(el:EntityL10n)-[:FOR_LOCALE]->(l:Locale)
      WHERE el.version < e.current_version
      RETURN e.key AS entity, l.key AS locale, el.version AS current, e.current_version AS expected
