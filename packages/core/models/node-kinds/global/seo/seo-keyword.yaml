# models/node-kinds/global/seo/seo-keyword.yaml
# SEOKeyword - Target keyword with metrics (v10.6: enriched with Ahrefs/Semrush data)
#
# v10.6: SEO Schema v2
#        - Added: traffic_potential, clicks, clicks_per_search, serp_features
#        - Added: competition, trend, seasonality
#        - Added: relations to SEOQuestion, SEOComparison, SEOPreposition
#        - Added: EXPRESSES relation to Entity
#
# v10.2: Merged SHARED → GLOBAL realm
#        - realm: global (was shared)
#        - trait: knowledge (was localized)
#        - Owned by Locale via HAS_SEO_KEYWORDS

node:
  name: SEOKeyword
  realm: global
  layer: seo
  trait: knowledge
  icon: "🔍"
  description: "Target keyword with metrics for SEO optimization (locale-specific knowledge)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier"
      example: "seo-creer-qr-code-gratuit-fr"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "créer qr code gratuit"

    description:
      type: string
      required: false
      description: "Short description"

    llm_context:
      type: string
      required: false
      description: "Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."

    created_at:
      type: datetime
      required: false

    updated_at:
      type: datetime
      required: false

  # ═══════════════════════════════════════════════════════════════════════════════
  # NODE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    # --- Core keyword data ---
    value:
      type: string
      required: true
      description: "The keyword string"
      example: "créer qr code gratuit"

    volume:
      type: int
      required: false
      description: "Monthly search volume (12-month average)"
      example: 12100

    difficulty:
      type: int
      required: false
      description: "SEO difficulty score (0-100)"
      example: 35

    cpc:
      type: float
      required: false
      description: "Cost per click (USD)"
      example: 0.85

    intent:
      type: string
      required: false
      description: "Search intent: transactional | informational | navigational | commercial"
      example: "transactional"

    platform:
      type: string
      required: false
      description: "Search platform: google | bing | youtube"
      example: "google"

    source:
      type: string
      required: false
      description: "Data source: ahrefs | semrush"
      example: "ahrefs"

    # --- v10.6: Ahrefs/Semrush enrichment ---
    traffic_potential:
      type: int
      required: false
      description: "Estimated monthly traffic if ranking #1 (Ahrefs)"
      example: 8500

    clicks:
      type: int
      required: false
      description: "Estimated monthly clicks (actual clicks, not impressions)"
      example: 9800

    clicks_per_search:
      type: float
      required: false
      description: "Clicks/volume ratio (indicates SERP satisfaction)"
      example: 0.81

    serp_features:
      type: "string[]"
      required: false
      description: "SERP features present: featured_snippet | ai_overview | people_also_ask | images | videos | knowledge_panel | local_pack | shopping"
      example: '["featured_snippet", "people_also_ask", "images"]'

    competition:
      type: float
      required: false
      description: "Organic competition level (0-1, Semrush)"
      example: 0.65

    trend:
      type: string
      required: false
      description: "Search trend direction: rising | stable | declining"
      example: "rising"

    seasonality:
      type: "int[]"
      required: false
      description: "12-month volume index (Jan-Dec, 100 = average)"
      example: "[80, 85, 90, 100, 95, 88, 82, 78, 85, 92, 98, 105]"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    # Incoming: EntityL10n --[:TARGETS]--> SEOKeyword (targeting)
    # NOTE: Locale is inferred via EntityL10n --[:FOR_LOCALE]--> Locale

    - relation: HAS_METRICS
      to: SEOKeywordMetrics
      direction: outgoing
      description: "Historical metrics snapshots (time-series)"

    # v10.6: ATP-derived keyword variations
    - relation: HAS_QUESTIONS
      to: SEOQuestion
      direction: outgoing
      description: "Question-form keywords from Answer The Public"

    - relation: HAS_COMPARISONS
      to: SEOComparison
      direction: outgoing
      description: "Comparison keywords (X vs Y) from Answer The Public"

    - relation: HAS_PREPOSITIONS
      to: SEOPreposition
      direction: outgoing
      description: "Preposition keywords (X for Y) from Answer The Public"

    # v10.8: Removed EXPRESSES (redundant - use TARGETS inverse from EntityL10n)
    # Query: MATCH (kw:SEOKeyword)<-[:TARGETS]-(el:EntityL10n) RETURN el.entity_key

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    description: "Get top keywords by traffic potential for a locale"
    cypher: |
      // v10.8: SEOKeyword via EntityL10n (locale inferred)
      MATCH (el:EntityL10n {locale_key: $locale})-[:TARGETS]->(kw:SEOKeyword)
      OPTIONAL MATCH (kw)-[:HAS_QUESTIONS]->(q:SEOQuestion)
      RETURN kw.value AS keyword,
             kw.volume,
             kw.traffic_potential,
             kw.serp_features,
             el.entity_key AS entity,
             el.display_name AS entity_name,
             count(q) AS question_count
      ORDER BY kw.traffic_potential DESC
      LIMIT 20
