# models/node-kinds/global/seo/seo-keyword.yaml
# SEOKeyword - Target keyword with metrics (v10.2: moved to GLOBAL, trait=knowledge)
#
# v10.2: Merged SHARED → GLOBAL realm
#        - realm: global (was shared)
#        - trait: knowledge (was localized)
#        - Owned by Locale via HAS_SEO_KEYWORDS (was FOR_LOCALE outgoing)
#        - Follows same pattern as Term, Pattern, Expression

node:
  name: SEOKeyword
  realm: global
  layer: seo
  trait: knowledge
  icon: "🔍"
  description: "Target keyword with metrics for SEO optimization (locale-specific knowledge)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier"
      example: "seo-creer-qr-code-gratuit-fr"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "créer qr code gratuit"


    description:
      type: string
      required: false
      description: "Short description"

    llm_context:
      type: string
      required: false
      description: "Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."



    created_at:
      type: datetime
      required: false

    updated_at:
      type: datetime
      required: false

  # ═══════════════════════════════════════════════════════════════════════════════
  # NODE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    value:
      type: string
      required: true
      description: "The keyword"
      example: "créer qr code gratuit"

    volume:
      type: int
      required: false
      description: "Monthly searches"
      example: 12100

    difficulty:
      type: int
      required: false
      description: "SEO difficulty (0-100)"
      example: 35

    cpc:
      type: float
      required: false
      description: "Cost per click"
      example: 0.85

    intent:
      type: string
      required: false
      description: "transactional | informational | navigational"
      example: "transactional"

    platform:
      type: string
      required: false
      description: "google | bing | youtube"
      example: "google"

    source:
      type: string
      required: false
      description: "Data source: ahrefs | semrush"
      example: "ahrefs"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS (v10.2: ownership by Locale)
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    # v10.2: Incoming ownership from Locale (like Term, Pattern)
    # Locale --HAS_SEO_KEYWORDS--> SEOKeyword

    - relation: HAS_METRICS
      to: SEOKeywordMetrics
      direction: outgoing
      description: "Historical metrics snapshots"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    description: "Get top keywords by volume for a locale"
    cypher: |
      // v10.2: SEOKeyword owned by Locale, targeted by ConceptL10n
      MATCH (l:Locale {key: $locale})-[:HAS_SEO_KEYWORDS]->(kw:SEOKeyword)
      OPTIONAL MATCH (cl:ConceptL10n)-[:HAS_SEO_TARGET]->(kw)
      RETURN kw.value AS keyword, kw.volume, kw.difficulty, collect(cl.key) AS targeting_concepts
      ORDER BY kw.volume DESC
      LIMIT 20
