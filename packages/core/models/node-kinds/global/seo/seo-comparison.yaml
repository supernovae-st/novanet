# models/node-kinds/global/seo/seo-comparison.yaml
# SEOComparison - Comparison keyword linking two entities
#
# v10.6: SEO Schema v2 - New NodeKind
#        - Captures comparison keywords (X vs Y) with their own volume/difficulty
#        - Derived from Answer The Public "comparisons" category
#        - Links to parent SEOKeyword via HAS_COMPARISONS
#        - Links to TWO Entities via COMPARES_A and COMPARES_B arcs
#        - Can be addressed by PageL10n/BlockL10n via ADDRESSES arc

node:
  name: SEOComparison
  realm: global
  layer: seo
  trait: knowledge
  icon: "⚖️"
  description: "Comparison keyword linking two entities (X vs Y)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier"
      example: "seoc-qr-code-vs-barcode-fr"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "qr code vs barcode"

    description:
      type: string
      required: false
      description: "Short description"

    llm_context:
      type: string
      required: false
      description: "Context for LLM: key differentiators, winner criteria"

    created_at:
      type: datetime
      required: false

    updated_at:
      type: datetime
      required: false

  # ═══════════════════════════════════════════════════════════════════════════════
  # NODE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    # --- Core keyword data ---
    value:
      type: string
      required: true
      description: "The comparison keyword string"
      example: "qr code vs barcode"

    volume:
      type: int
      required: false
      description: "Monthly search volume"
      example: 2000

    difficulty:
      type: int
      required: false
      description: "SEO difficulty score (0-100)"
      example: 22

    cpc:
      type: float
      required: false
      description: "Cost per click (USD)"
      example: 0.30

    # --- Comparison-specific properties ---
    comparison_type:
      type: string
      required: true
      description: "Comparison type: vs | or | versus | compared_to | better_than | like | similar_to"
      example: "vs"

    entity_a_key:
      type: string
      required: true
      description: "Key of left-side Entity in comparison"
      example: "qr-code"

    entity_b_key:
      type: string
      required: true
      description: "Key of right-side Entity in comparison"
      example: "barcode"

    winner:
      type: string
      required: false
      description: "If known, which side wins: a | b | tie | depends | null"
      example: "a"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    # Incoming: SEOKeyword --[:HAS_COMPARISONS]--> SEOComparison (ownership)
    # Incoming: PageL10n/BlockL10n --[:ADDRESSES]--> SEOComparison (coverage)

    - relation: COMPARES_A
      to: Entity
      direction: outgoing
      description: "Left side of comparison (entity_a_key)"

    - relation: COMPARES_B
      to: Entity
      direction: outgoing
      description: "Right side of comparison (entity_b_key)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    description: "Find all comparisons involving an Entity"
    cypher: |
      // Get all comparisons where Entity is on either side
      MATCH (e:Entity {key: $entity_key})
      OPTIONAL MATCH (c:SEOComparison)-[:COMPARES_A]->(e)
      OPTIONAL MATCH (c2:SEOComparison)-[:COMPARES_B]->(e)
      WITH coalesce(c, c2) AS comparison
      WHERE comparison IS NOT NULL
      MATCH (comparison)-[:COMPARES_A]->(ea:Entity)
      MATCH (comparison)-[:COMPARES_B]->(eb:Entity)
      RETURN comparison.value AS comparison,
             comparison.volume,
             ea.key AS entity_a,
             eb.key AS entity_b,
             comparison.winner
      ORDER BY comparison.volume DESC
