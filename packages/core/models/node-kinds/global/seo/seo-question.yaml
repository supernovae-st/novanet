# models/node-kinds/global/seo/seo-question.yaml
# SEOQuestion - Question-form keyword from Answer The Public
#
# v10.6: SEO Schema v2 - New NodeKind
#        - Captures question keywords with their own volume/difficulty
#        - Derived from Answer The Public "questions" category
#        - Links to parent SEOKeyword via HAS_QUESTIONS
#        - Can be answered by EntityContent via ANSWERS arc

node:
  name: SEOQuestion
  realm: global
  layer: seo
  trait: knowledge
  icon: "❓"
  description: "Question-form keyword derived from Answer The Public"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier"
      example: "seoq-comment-creer-qr-code-fr"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "comment créer un qr code"

    description:
      type: string
      required: false
      description: "Short description"

    llm_context:
      type: string
      required: false
      description: "Context for LLM generation: what answer format is expected"

    created_at:
      type: datetime
      required: false

    updated_at:
      type: datetime
      required: false

  # ═══════════════════════════════════════════════════════════════════════════════
  # NODE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    # --- Core keyword data ---
    value:
      type: string
      required: true
      description: "The question keyword string"
      example: "comment créer un qr code"

    volume:
      type: int
      required: false
      description: "Monthly search volume"
      example: 8000

    difficulty:
      type: int
      required: false
      description: "SEO difficulty score (0-100)"
      example: 28

    cpc:
      type: float
      required: false
      description: "Cost per click (USD)"
      example: 0.45

    # --- Question-specific properties ---
    question_word:
      type: string
      required: true
      description: "Question word: what | how | why | when | where | who | can | is | does | are | will | should"
      example: "how"

    answer_type:
      type: string
      required: false
      description: "Expected answer format: explanation | list | yes_no | steps | comparison | definition"
      example: "steps"

    featured_snippet:
      type: bool
      required: false
      description: "Has Featured Snippet opportunity in SERP"
      example: true

    paa_position:
      type: int
      required: false
      description: "Position in People Also Ask box (1-indexed, null if not present)"
      example: 2

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    # Incoming: SEOKeyword --[:HAS_QUESTIONS]--> SEOQuestion (ownership)
    # Incoming: EntityContent --[:ANSWERS]--> SEOQuestion (coverage tracking)
    []

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    description: "Get unanswered questions for a keyword (content gap analysis)"
    cypher: |
      // Find questions that no EntityContent has answered yet
      MATCH (kw:SEOKeyword {key: $keyword_key})-[:HAS_QUESTIONS]->(q:SEOQuestion)
      WHERE NOT EXISTS { MATCH (ec:EntityContent)-[:ANSWERS]->(q) }
      RETURN q.value AS question,
             q.volume,
             q.question_word,
             q.featured_snippet
      ORDER BY q.volume DESC
      LIMIT 10
