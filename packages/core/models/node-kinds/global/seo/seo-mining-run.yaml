# models/node-kinds/global/seo/seo-mining-run.yaml
# SEOMiningRun - SEO mining job orchestration
#
# v10.2: Merged SHARED → GLOBAL realm
#        - realm: global (was shared)
#        - trait: job (unchanged)

node:
  name: SEOMiningRun
  realm: global
  layer: seo
  trait: job
  icon: "⚙️"
  description: "Mining job for SEO keyword discovery"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0 - UUID-identified, no key)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: false
      description: "Optional - UUID-identified"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "SEO Mining 2024-01-15 10:00"


    description:
      type: string
      required: false
      description: "Short description"

    llm_context:
      type: string
      required: false
      description: "Job metadata for debugging/auditing"



    created_at:
      type: datetime
      required: false

    updated_at:
      type: datetime
      required: false

  # ═══════════════════════════════════════════════════════════════════════════════
  # NODE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    status:
      type: string
      required: true
      description: "pending | running | completed | failed"
      example: "completed"

    sources:
      type: "string[]"
      required: false
      description: "Data sources used"
      example: '["ahrefs", "semrush"]'

    seed_terms:
      type: "string[]"
      required: false
      description: "Initial seed terms for mining"
      example: '["qr code", "qr generator"]'

    locale:
      type: string
      required: true
      description: "Target locale for this mining run"
      example: "en-US"

    started_at:
      type: datetime
      required: false
      description: "Job start time"

    completed_at:
      type: datetime
      required: false
      description: "Job completion time"

    keywords_found:
      type: int
      required: false
      description: "Total keywords discovered"

    error:
      type: string
      required: false
      description: "Error message if failed"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    - relation: SEO_MINES
      to: SEOKeyword
      direction: outgoing
      description: "Keywords discovered by this mining run"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    description: "Get recent SEO mining runs"
    cypher: |
      MATCH (smr:SEOMiningRun)
      RETURN smr.display_name, smr.status, smr.keywords_found, smr.locale
      ORDER BY smr.started_at DESC
      LIMIT 10
