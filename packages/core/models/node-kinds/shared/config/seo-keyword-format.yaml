# models/node-kinds/shared/config/seo-keyword-format.yaml
# SEOKeywordFormat - Keyword format classification for SEOKeyword nodes
#
# v11.4: Classification node following EntityCategory pattern (ADR-017)
#        - realm: shared (universal taxonomy, applies to all orgs)
#        - layer: config (classification nodes layer)
#        - trait: defined (7 static format definitions)

node:
  name: SEOKeywordFormat
  realm: shared
  layer: config
  trait: defined
  icon:
    web: label
    terminal: "⊞"
  description: "Keyword format classification (EntityCategory pattern, ADR-017)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Format key identifier"
      pattern: "^[a-z_]+$"
      examples:
        - "standard"
        - "question"
        - "comparison"
        - "preposition"
        - "long_tail"
        - "brand"
        - "local"

    display_name:
      type: string
      required: true
      description: "Human-readable format name"
      example: "Comparison"

    description:
      type: string
      required: true
      description: "Detailed explanation of what this format represents"
      example: "Keywords comparing two entities (X vs Y)"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: 'USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation].'"
      example: "USE: for X vs Y keywords. TRIGGERS: versus, vs, compare. NOT: simple feature mentions."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # FORMAT-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    has_entity_links:
      type: boolean
      required: false
      default: false
      description: "Whether keywords of this format have entity relationships (COMPARES_A/B, USE_CASE_FOR)"
      example: true

    sort_order:
      type: int
      required: false
      description: "Display order for UI lists (lower = first)"
      default: 0
      example: 1

  # ═══════════════════════════════════════════════════════════════════════════════
  # INCOMING RELATIONS (TO this node)
  # ═══════════════════════════════════════════════════════════════════════════════

  incoming_relations:
    HAS_FORMAT:
      from: SEOKeyword
      cardinality: "N:1"
      scope: intra_realm
      description: "Keywords classified under this format (shared SEOKeyword -> shared SEOKeywordFormat)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # LLM CONTEXT
  # ═══════════════════════════════════════════════════════════════════════════════

  llm_context: |
    SEOKeywordFormat classifies keywords by structural format.
    7 invariant instances: standard, question, comparison, preposition,
    long_tail, brand, local. Use HAS_FORMAT arc from SEOKeyword.
    Formats with has_entity_links=true have COMPARES_A/B or USE_CASE_FOR arcs.

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLES
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    data:
      - key: "standard"
        display_name: "Standard"
        description: "Basic keywords without special structure (single topic focus)"
        has_entity_links: false
        sort_order: 1
        llm_context: "USE: for simple topic keywords. TRIGGERS: single word or phrase. NOT: questions, comparisons, locations."

      - key: "question"
        display_name: "Question"
        description: "Keywords framed as questions (how to, what is, why does)"
        has_entity_links: false
        sort_order: 2
        llm_context: "USE: for interrogative keywords. TRIGGERS: how, what, why, when, where, which, who, can, does, is. NOT: comparisons, simple nouns."

      - key: "comparison"
        display_name: "Comparison"
        description: "Keywords comparing two entities (X vs Y)"
        has_entity_links: true
        sort_order: 3
        llm_context: "USE: for X vs Y keywords. TRIGGERS: versus, vs, compare, comparison, difference, better. NOT: simple feature mentions."

      - key: "preposition"
        display_name: "Preposition"
        description: "Keywords with preposition structure (X for Y, X with Z)"
        has_entity_links: true
        sort_order: 4
        llm_context: "USE: for use-case keywords. TRIGGERS: for, with, without, using, to. NOT: simple descriptions."

      - key: "long_tail"
        display_name: "Long Tail"
        description: "Highly specific multi-word phrases (low volume, high intent)"
        has_entity_links: false
        sort_order: 5
        llm_context: "USE: for specific intent phrases. TRIGGERS: 4+ words, specific modifiers. NOT: broad terms."

      - key: "brand"
        display_name: "Brand"
        description: "Keywords containing brand names (competitor or own)"
        has_entity_links: true
        sort_order: 6
        llm_context: "USE: for branded keywords. TRIGGERS: company names, product names. NOT: generic terms."

      - key: "local"
        display_name: "Local"
        description: "Keywords with geographic modifiers (city, region, country)"
        has_entity_links: false
        sort_order: 7
        llm_context: "USE: for geo-targeted keywords. TRIGGERS: city names, near me, in [location]. NOT: non-geographic terms."

    cypher: |
      // Get all formats with their keyword counts
      MATCH (f:SEOKeywordFormat)
      OPTIONAL MATCH (kw:SEOKeyword)-[:HAS_FORMAT]->(f)
      RETURN f.key AS format, f.display_name AS name, f.has_entity_links AS entity_links, count(kw) AS keyword_count
      ORDER BY f.sort_order, f.key

      // Get keywords in a specific format
      MATCH (kw:SEOKeyword)-[:HAS_FORMAT]->(f:SEOKeywordFormat {key: $key})
      RETURN kw.value, kw.search_volume, kw.difficulty
      ORDER BY kw.search_volume DESC

      // Get comparison keywords with entity links
      MATCH (kw:SEOKeyword)-[:HAS_FORMAT]->(f:SEOKeywordFormat {key: 'comparison'})
      OPTIONAL MATCH (kw)-[:COMPARES_A]->(a:Entity)
      OPTIONAL MATCH (kw)-[:COMPARES_B]->(b:Entity)
      RETURN kw.value, a.key AS entity_a, b.key AS entity_b

      // Group keywords by format for analysis
      MATCH (kw:SEOKeyword)-[:HAS_FORMAT]->(f:SEOKeywordFormat)
      RETURN f.key AS format, count(kw) AS count, avg(kw.search_volume) AS avg_volume
      ORDER BY count DESC
