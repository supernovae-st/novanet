# packages/core/models/node-kinds/global/config/geo-sub-region.yaml
# GeoSubRegion - UN M49 intermediate/sub-region (optional level)
#
# v10.8: Geographic Taxonomy - Phase 1
# Data: ~15 sub-regions (Channel Islands, Caribbean sub-areas, etc.)
# Source: UN M49 Standard (unstats.un.org)
# Note: Optional intermediate level - most locales link directly to GeoRegion

node:
  name: GeoSubRegion
  realm: shared
  layer: config
  trait: invariant
  icon: "📍"
  description: "UN M49 intermediate region for fine-grained geographic clustering"

  standard_properties:
    key:
      type: string
      required: true
      description: "Kebab-case sub-region key"
      pattern: "^[a-z-]+$"
      examples:
        - "channel-islands"
        - "caribbean"
        - "micronesia"

    display_name:
      type: string
      required: true
      description: "Human-readable sub-region name"
      example: "Channel Islands"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Channel Islands between England and France"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints"
      example: "USE: for Channel Islands markets (Jersey, Guernsey). TRIGGERS: channel islands, jersey, guernsey. NOT: UK mainland."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    m49_code:
      type: int
      required: true
      description: "UN M49 numeric code (if available)"
      example: 830

    parent_region:
      type: string
      required: true
      description: "Parent GeoRegion key"
      example: "northern-europe"

  relations:
    outgoing:
      - type: IN_REGION
        to: GeoRegion
        cardinality: "N:1"
        description: "Sub-region belongs to region"

    incoming:
      - type: IN_SUBREGION
        from: Locale
        cardinality: "N:1"
        description: "Locales within this sub-region"

  example:
    data:
      key: "channel-islands"
      display_name: "Channel Islands"
      description: "Channel Islands between England and France"
      m49_code: 830
      parent_region: "northern-europe"
      llm_context: "USE: for Channel Islands markets (Jersey, Guernsey). TRIGGERS: channel islands, jersey, guernsey. NOT: UK mainland or France."

    cypher: |
      // Get all locales in a sub-region
      MATCH (sr:GeoSubRegion {key: $key})<-[:IN_SUBREGION]-(l:Locale)
      RETURN l.key, l.display_name
      ORDER BY l.key

      // Get full geographic hierarchy
      MATCH (sr:GeoSubRegion {key: $key})-[:IN_REGION]->(r:GeoRegion)-[:IN_CONTINENT]->(c:Continent)
      RETURN sr.key, r.key AS region, c.key AS continent
