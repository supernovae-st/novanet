# packages/core/models/node-kinds/global/config/economic-region.yaml
# EconomicRegion - World Bank economic region
#
# v10.8: Geographic Taxonomy - Phase 4
# Data: 7 regions (EAP, ECA, LAC, MENA, NA, SA, SSA)
# Source: World Bank (data.worldbank.org)

node:
  name: EconomicRegion
  realm: shared
  layer: config
  trait: invariant
  icon: "📊"
  description: "World Bank economic region for market analysis"

  standard_properties:
    key:
      type: string
      required: true
      description: "Economic region code"
      enum:
        - "eap"   # East Asia & Pacific
        - "eca"   # Europe & Central Asia
        - "lac"   # Latin America & Caribbean
        - "mena"  # Middle East & North Africa
        - "na"    # North America
        - "sa"    # South Asia
        - "ssa"   # Sub-Saharan Africa

    display_name:
      type: string
      required: true
      description: "Human-readable region name"
      example: "Europe & Central Asia"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Europe and Central Asia region including EU, Russia, Turkey"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints for regional context"
      example: "USE: for European and Central Asian markets. TRIGGERS: eca, europe, central asia. CONTEXT: diverse economies, mix of developed and emerging."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    country_examples:
      type: json
      required: false
      description: "Example countries in this region"
      example:
        - "France"
        - "Germany"
        - "Russia"
        - "Turkey"

    economic_characteristics:
      type: json
      required: false
      description: "Key economic characteristics"
      example:
        - "diverse income levels"
        - "EU integration"
        - "post-Soviet transition"

  relations:
    incoming:
      - type: IN_ECONOMIC_REGION
        from: Locale
        cardinality: "N:1"
        description: "Locales in this economic region"

  example:
    data:
      key: "eca"
      display_name: "Europe & Central Asia"
      description: "Europe and Central Asia region including EU, Russia, Turkey"
      country_examples:
        - "France"
        - "Germany"
        - "Russia"
        - "Turkey"
        - "Poland"
      economic_characteristics:
        - "diverse income levels (HIC to LMIC)"
        - "EU integration in west"
        - "post-Soviet transition in east"
        - "strong manufacturing base"
      llm_context: "USE: for European and Central Asian markets. TRIGGERS: eca, europe, central asia. CONTEXT: diverse economies, mix of developed (EU) and emerging (CIS), strong digital adoption."

    cypher: |
      // Get all locales in an economic region
      MATCH (er:EconomicRegion {key: $key})<-[:IN_ECONOMIC_REGION]-(l:Locale)
      RETURN l.key, l.display_name
      ORDER BY l.key

      // Get economic context for a locale
      MATCH (l:Locale {key: $key})-[:IN_ECONOMIC_REGION]->(er:EconomicRegion)
      MATCH (l)-[:HAS_INCOME_LEVEL]->(ig:IncomeGroup)
      RETURN er.key AS economic_region, ig.key AS income_group, ig.pricing_tier
