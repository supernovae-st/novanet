# models/node-kinds/shared/knowledge/seo-keyword-metrics.yaml
# SEOKeywordMetrics - Historical metrics snapshot for a keyword
#
# v11.4: Moved to shared/knowledge (Knowledge Atoms pattern)
#        - realm: shared (was org)
#        - layer: knowledge (was seo)
#
# v10.6: SEO Schema v2
#        - Added: clicks, traffic_potential (snapshot data)
#        - Added: best_position, impressions, clicks_gsc, ctr (GSC tracking)

node:
  name: SEOKeywordMetrics
  realm: shared
  layer: knowledge
  trait: retrieved  # v11.2: Split derived → aggregated (computed metrics)
  icon:
    web: "camera"
    terminal: "◇"
  description: |
    Historical metrics snapshot for an SEO keyword (time-series data).
    Stores volume, difficulty, position, impressions at a point in time.

    USE: when tracking keyword performance over time, analyzing trends.
    TRIGGERS: "keyword metrics", "SEO history", "position tracking", "GSC data".
    NOT: for keyword definition (use SEOKeyword), for GEO visibility (use GEOMetrics).
    RELATES: SEOKeyword (HAS_METRICS).

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier"
      example: "metrics-creer-qr-code-fr-2024-01-15"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "créer qr code - 2024-01-15"

    description:
      type: string
      required: false
      description: "Short description"

    llm_context:
      type: string
      required: false
      description: "LLM generation hints (not used in spreading activation)"

    created_at:
      type: datetime
      required: false

    updated_at:
      type: datetime
      required: false

  # ═══════════════════════════════════════════════════════════════════════════════
  # NODE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    # --- Observation metadata ---
    observed_at:
      type: datetime
      required: true
      description: "When these metrics were observed/scraped"
      example: "2024-01-15T10:30:00Z"

    source:
      type: string
      required: true
      description: "Data source: semrush | ahrefs | google_search_console"
      example: "semrush"

    # --- Keyword metrics snapshot ---
    volume:
      type: int
      required: false
      description: "Monthly search volume at time of observation"
      example: 12000

    difficulty:
      type: float
      required: false
      description: "Keyword difficulty (0-100)"
      example: 45.5

    cpc:
      type: float
      required: false
      description: "Cost per click at time of observation"
      example: 0.85

    # v10.6: Additional snapshot data
    clicks:
      type: int
      required: false
      description: "Estimated monthly clicks at observation (Ahrefs)"
      example: 9500

    traffic_potential:
      type: int
      required: false
      description: "Traffic potential at observation (Ahrefs)"
      example: 8200

    # --- Position tracking (our performance) ---
    position:
      type: float
      required: false
      description: "Our average ranking position for this keyword"
      example: 8.5

    best_position:
      type: int
      required: false
      description: "Best position achieved that day"
      example: 6

    url:
      type: string
      required: false
      description: "URL path that ranks for this keyword"
      example: "/fr/creer-qr-code"

    # v10.6: Google Search Console data
    impressions:
      type: int
      required: false
      description: "GSC impressions (how many times we appeared)"
      example: 15000

    clicks_gsc:
      type: int
      required: false
      description: "GSC clicks (actual clicks we received)"
      example: 1200

    ctr:
      type: float
      required: false
      description: "Click-through rate (clicks_gsc / impressions)"
      example: 0.08

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations: []
  # Incoming: SEOKeyword -[:HAS_METRICS]-> SEOKeywordMetrics

  # ═══════════════════════════════════════════════════════════════════════════════
  # SPREADING ACTIVATION NOTE
  # ═══════════════════════════════════════════════════════════════════════════════
  #
  # HAS_METRICS is an AUXILIARY relation (not semantic).
  # It is EXCLUDED from spreading activation and LLM context retrieval.
  # Metrics are queried directly for analytics, not discovered via traversal.

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    description: "Get metrics history with position tracking for a keyword"
    cypher: |
      // v10.6: Full metrics history including GSC data
      MATCH (kw:SEOKeyword {key: $keyword_key})-[:HAS_METRICS]->(m:SEOKeywordMetrics)
      RETURN m.observed_at,
             m.volume,
             m.difficulty,
             m.position,
             m.best_position,
             m.impressions,
             m.clicks_gsc,
             m.ctr
      ORDER BY m.observed_at DESC
      LIMIT 30
