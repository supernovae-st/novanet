# models/node-kinds/shared/knowledge/atoms/culture-ref.yaml
# CultureRef — Cultural reference within a CultureSet
#
# Locale-native: each locale has unique cultural references (no invariant parent)
# Parent: CultureSet (via CONTAINS arc)

node:
  name: CultureRef
  realm: shared
  layer: knowledge
  trait: imported
  icon:
    web: "drama"
    terminal: "◎"
  description: "Cultural reference, holiday, custom, or shared knowledge within a locale"

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier within the CultureSet"
      pattern: "^[a-z][a-z0-9_]*$"
      examples:
        - "bastille_day"
        - "super_bowl"
        - "golden_week"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "Bastille Day"

    description:
      type: string
      required: false
      description: "What this reference means culturally"
      example: "French national holiday celebrating the French Revolution"

    llm_context:
      type: string
      required: false
      description: "How to use in content generation"
      example: "USE: patriotic content, summer campaigns. TRIGGERS: July, national, France."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    reference:
      type: string
      required: true
      description: "The cultural reference name in the locale"
      examples:
        - "14 juillet"
        - "Super Bowl"
        - "ゴールデンウィーク"

    type:
      type: string
      required: true
      enum: [holiday, event, tradition, food, sport, entertainment, history, saying, symbol]
      description: "Type of cultural reference"
      example: "holiday"

    recognition_level:
      type: string
      required: true
      enum: [universal, widespread, regional, niche]
      description: "How widely recognized in the locale"
      example: "universal"

    sentiment:
      type: string
      required: false
      enum: [positive, neutral, mixed, solemn, celebratory]
      description: "Cultural sentiment associated"
      example: "celebratory"

    timing:
      type: json
      required: false
      description: "When this reference is most relevant"
      example:
        month: 7
        day: 14
        duration_days: 1

    safe_for:
      type: json
      required: true
      description: "Content contexts where safe to reference"
      example:
        - "marketing"
        - "social_media"
        - "advertising"

    caution_for:
      type: json
      required: false
      description: "Contexts requiring careful use"
      example:
        - "international_audience"
        - "formal_business"

    associated_imagery:
      type: json
      required: false
      description: "Visual elements associated with this reference"
      example:
        - "fireworks"
        - "tricolor flag"
        - "Eiffel Tower"

    related_terms:
      type: json
      required: false
      description: "Related vocabulary and expressions"
      example:
        - "fête nationale"
        - "défilé militaire"
        - "feu d'artifice"

  relations:
    incoming:
      - type: CONTAINS
        from: CultureSet
        cardinality: "1:N"
        description: "CultureSet contains multiple CultureRefs"

  example:
    data:
      key: "bastille_day"
      display_name: "Bastille Day"
      reference: "14 juillet"
      type: "holiday"
      recognition_level: "universal"
      sentiment: "celebratory"
      timing:
        month: 7
        day: 14
      safe_for:
        - "marketing"
        - "social_media"
      associated_imagery:
        - "fireworks"
        - "tricolor"

    cypher: |
      // Create a culture reference
      MATCH (cs:CultureSet)<-[:HAS_CULTURE]-(l:Locale {key: "fr-FR"})
      CREATE (cr:CultureRef {
        key: "bastille_day",
        display_name: "Bastille Day",
        reference: "14 juillet",
        type: "holiday",
        recognition_level: "universal",
        sentiment: "celebratory",
        created_at: datetime(),
        updated_at: datetime()
      })
      CREATE (cs)-[:CONTAINS]->(cr)
      RETURN cr

      // Find all holidays for seasonal campaigns
      MATCH (cr:CultureRef {type: "holiday"})
      MATCH (cr)<-[:CONTAINS]-(cs:CultureSet)<-[:HAS_CULTURE]-(l:Locale)
      RETURN l.key AS locale, cr.reference AS holiday, cr.timing AS when
