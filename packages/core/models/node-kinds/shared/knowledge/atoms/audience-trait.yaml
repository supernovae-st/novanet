# models/node-kinds/shared/knowledge/atoms/audience-trait.yaml
# AudienceTrait — Audience segment behavior within an AudienceSet
#
# Locale-native: each locale has unique audience insights (no invariant parent)
# Parent: AudienceSet (via CONTAINS arc)

node:
  name: AudienceTrait
  realm: shared
  layer: knowledge
  trait: imported
  icon: "👥"
  description: "Audience segment behavior, preference, or characteristic within a locale"

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier within the AudienceSet"
      pattern: "^[a-z][a-z0-9_]*$"
      examples:
        - "b2b_enterprise"
        - "gen_z_consumer"
        - "smb_owner"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "B2B Enterprise Buyer"

    description:
      type: string
      required: false
      description: "Who this audience segment is"
      example: "Decision makers at large enterprises (500+ employees)"

    llm_context:
      type: string
      required: false
      description: "How to adapt content for this audience"
      example: "USE: formal tone, ROI focus, compliance mentions. NOT: casual language, consumer pricing."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    segment:
      type: string
      required: true
      enum: [b2b_enterprise, b2b_smb, b2c_premium, b2c_mass, developer, creator, student]
      description: "Audience segment category"
      example: "b2b_enterprise"

    behavior:
      type: json
      required: true
      description: "Key behavioral characteristics"
      example:
        decision_speed: "slow"
        research_depth: "extensive"
        stakeholders: "multiple"
        price_sensitivity: "low"

    preferences:
      type: json
      required: true
      description: "Content and communication preferences"
      example:
        tone: "professional"
        detail_level: "comprehensive"
        proof_types:
          - "case_studies"
          - "ROI_calculators"
          - "analyst_reports"

    pain_points:
      type: json
      required: false
      description: "Key challenges and concerns"
      example:
        - "security_compliance"
        - "integration_complexity"
        - "vendor_lock_in"

    motivators:
      type: json
      required: false
      description: "What drives purchasing decisions"
      example:
        - "risk_reduction"
        - "efficiency_gains"
        - "competitive_advantage"

    channels:
      type: json
      required: false
      description: "Preferred communication channels"
      example:
        - "email"
        - "linkedin"
        - "webinars"
        - "whitepapers"

    content_length:
      type: string
      required: false
      enum: [brief, moderate, detailed, comprehensive]
      description: "Preferred content depth"
      example: "comprehensive"

    trust_signals:
      type: json
      required: false
      description: "What builds trust with this audience"
      example:
        - "certifications"
        - "customer_logos"
        - "security_badges"

  relations:
    incoming:
      - type: CONTAINS
        from: AudienceSet
        cardinality: "1:N"
        description: "AudienceSet contains multiple AudienceTraits"

  example:
    data:
      key: "b2b_enterprise_fr"
      display_name: "French Enterprise Buyer"
      segment: "b2b_enterprise"
      behavior:
        decision_speed: "slow"
        research_depth: "extensive"
        formality_expectation: "high"
      preferences:
        tone: "professional"
        detail_level: "comprehensive"
        proof_types:
          - "case_studies"
          - "references"
      pain_points:
        - "GDPR_compliance"
        - "data_sovereignty"

    cypher: |
      // Create an audience trait
      MATCH (as:AudienceSet)<-[:HAS_AUDIENCE]-(l:Locale {key: "fr-FR"})
      CREATE (at:AudienceTrait {
        key: "b2b_enterprise",
        display_name: "French Enterprise Buyer",
        segment: "b2b_enterprise",
        content_length: "comprehensive",
        created_at: datetime(),
        updated_at: datetime()
      })
      CREATE (as)-[:CONTAINS]->(at)
      RETURN at

      // Find audience preferences for content adaptation
      MATCH (at:AudienceTrait {segment: $segment})
      MATCH (at)<-[:CONTAINS]-(as:AudienceSet)<-[:HAS_AUDIENCE]-(l:Locale {key: $locale})
      RETURN at.preferences AS prefs, at.pain_points AS concerns
