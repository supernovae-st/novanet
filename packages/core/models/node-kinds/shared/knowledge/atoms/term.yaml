# models/node-kinds/shared/knowledge/atoms/term.yaml
# Term — Individual vocabulary item within a TermSet
#
# Locale-native: each locale has its own unique terms (no invariant parent)
# Parent: TermSet (via CONTAINS arc)

node:
  name: Term
  realm: shared
  layer: knowledge
  trait: knowledge
  icon: "📝"
  description: "Individual vocabulary term belonging to a locale's TermSet"

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier within the TermSet (e.g., 'subscription_monthly')"
      pattern: "^[a-z][a-z0-9_]*$"
      examples:
        - "subscription_monthly"
        - "free_trial"
        - "pricing_tier"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "Monthly Subscription"

    description:
      type: string
      required: false
      description: "Usage notes for this term"
      example: "Use for recurring monthly billing context"

    llm_context:
      type: string
      required: false
      description: "When to use this term in generation"
      example: "USE: for subscription pricing. NOT: one-time purchases."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  properties:
    value:
      type: string
      required: true
      description: "The actual term/phrase in the target locale"
      examples:
        - "abonnement mensuel"
        - "subscription plan"
        - "monatliches Abo"

    domain:
      type: string
      required: true
      enum: [pricing, features, technical, marketing, support, legal, general]
      description: "Vocabulary domain this term belongs to"
      example: "pricing"

    register:
      type: string
      required: false
      enum: [formal, neutral, casual, technical]
      description: "Language register/formality level"
      default: "neutral"
      example: "formal"

    part_of_speech:
      type: string
      required: false
      enum: [noun, verb, adjective, adverb, phrase]
      description: "Grammatical category"
      example: "noun"

    synonyms:
      type: json
      required: false
      description: "Alternative terms with same meaning"
      example:
        - "formule mensuelle"
        - "forfait mensuel"

    avoid_in_context:
      type: json
      required: false
      description: "Contexts where this term should NOT be used"
      example:
        - "legal documents"
        - "formal contracts"

    prefer_over:
      type: json
      required: false
      description: "Terms this should replace (avoid list)"
      example:
        - "cheap plan"
        - "basic tier"

  relations:
    incoming:
      - type: CONTAINS
        from: TermSet
        cardinality: "1:N"
        description: "TermSet contains multiple Terms"

  example:
    data:
      key: "subscription_monthly"
      display_name: "Monthly Subscription"
      value: "abonnement mensuel"
      domain: "pricing"
      register: "formal"
      part_of_speech: "noun"
      synonyms:
        - "formule mensuelle"
      llm_context: "USE: for recurring billing. TRIGGERS: monthly, subscription. NOT: annual plans."

    cypher: |
      // Create a term
      MATCH (ts:TermSet {domain: "pricing"})<-[:HAS_TERMS]-(l:Locale {key: "fr-FR"})
      CREATE (t:Term {
        key: "subscription_monthly",
        display_name: "Monthly Subscription",
        value: "abonnement mensuel",
        domain: "pricing",
        register: "formal",
        created_at: datetime(),
        updated_at: datetime()
      })
      CREATE (ts)-[:CONTAINS]->(t)
      RETURN t

      // Find term across locales
      MATCH (t:Term {key: "subscription_monthly"})<-[:CONTAINS]-(ts:TermSet)<-[:HAS_TERMS]-(l:Locale)
      RETURN l.key AS locale, t.value AS term
