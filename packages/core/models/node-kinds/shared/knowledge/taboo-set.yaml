# models/node-kinds/shared/knowledge/taboo-set.yaml
# TabooSet — Container grouping Taboo atoms by severity
#
# v10.1: Pure container (no JSON blobs - data lives in Taboo atoms)
# Severities: avoid, careful, legal
# Stability: High - structure rarely changes

node:
  name: TabooSet
  realm: shared
  layer: knowledge
  trait: defined  # v11.2: Containers are universal categories (invariant), atoms are locale-native (knowledge)
  icon: "🚫"
  description: "Container grouping Taboo atoms by severity"

  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) Avoid Topics"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Topics to never mention for fr-FR"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints"
      example: "USE: to find taboos by severity. TRIGGERS: safety, avoid. NOT: individual items."

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    # Severity identification (only property - data is in atoms)
    severity:
      type: string
      required: true
      enum: [avoid, careful, legal]
      description: "Taboo severity level this set groups"
      example: "avoid"

  relations:
    outgoing:
      - type: CONTAINS
        to: Taboo
        cardinality: "1:N"
        description: "TabooSet contains multiple Taboo atoms"

    incoming:
      - type: HAS_TABOOS
        from: Locale
        cardinality: "1:N"
        description: "Locale has taboo sets"
        properties:
          severity: string
