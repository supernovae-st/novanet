# models/nodes/shared/geo/thing-l10n.yaml
# ThingL10n - Localized content for Thing (v9.9)

node:
  name: ThingL10n
  realm: shared
  layer: geo
  trait: localized
  icon: "🌐"
  description: |
    Localized name, description, and aliases for a Thing entity.
    Each ThingL10n represents the native content for one locale.
    Supports multiple aliases per locale for SEO anchor text variation.

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Format: {thing_key}-{locale_code}"
      pattern: "^[a-z-]+-[a-z0-9-]+-[a-z]{2}(-[A-Z]{2})?$"
      examples:
        - "person-alan-turing-fr"
        - "organization-anthropic-ja"
        - "product-qr-code-de-DE"

    display_name:
      type: string
      required: true
      description: "Localized display name"
      example: "Alan Turing"

    description:
      type: string
      required: false
      description: "Localized description"

    llm_context:
      type: string
      required: false
      description: "Locale-specific generation hints"

    created_at:
      type: datetime
      required: false

    updated_at:
      type: datetime
      required: false

  # ═══════════════════════════════════════════════════════════════════════════════
  # LOCALIZED PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    name:
      type: string
      required: true
      description: "Native name in this locale"
      example: "Alan Turing"

    native_description:
      type: string
      required: false
      description: "Native description (longer form)"
      example: "Mathématicien et informaticien britannique, père de l'informatique théorique"

    aliases:
      type: array
      items: string
      required: false
      description: "Alternative names/spellings for anchor text variation"
      examples:
        - ["Alan Mathison Turing", "A. Turing", "Turing"]
        - ["アラン・チューリング", "チューリング"]

    pronunciation:
      type: string
      required: false
      description: "IPA or locale-specific pronunciation guide"
      example: "/ˈælən ˈtjʊərɪŋ/"

    formal_name:
      type: string
      required: false
      description: "Formal/official name variant"
      example: "Alan Mathison Turing, OBE, FRS"

    short_name:
      type: string
      required: false
      description: "Short/abbreviated name"
      example: "Turing"

  # ═══════════════════════════════════════════════════════════════════════════════
  # SEO/ANCHOR TEXT PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  seo_properties:
    preferred_anchor:
      type: string
      required: false
      description: "Preferred anchor text for internal links"
      example: "Alan Turing"

    anchor_variations:
      type: array
      items: string
      required: false
      description: "Acceptable anchor text variations for natural linking"
      example: ["Turing", "le mathématicien", "l'inventeur de la machine de Turing"]

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS (FROM this node)
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    FOR_LOCALE:
      to: Locale
      cardinality: "N:1"
      description: "The locale this content is for"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    data:
      key: "person-alan-turing-fr"
      display_name: "Alan Turing"
      name: "Alan Turing"
      native_description: "Mathématicien et informaticien britannique, considéré comme le père de l'informatique théorique et de l'intelligence artificielle"
      aliases: ["Alan Mathison Turing", "Turing"]
      formal_name: "Alan Mathison Turing, OBE, FRS"
      short_name: "Turing"
      preferred_anchor: "Alan Turing"
      anchor_variations: ["Turing", "le mathématicien britannique", "le père de l'IA"]

    cypher: |
      // Get ThingL10n with parent Thing
      MATCH (tl:ThingL10n {key: $key})-[:FOR_LOCALE]->(l:Locale)
      MATCH (t:Thing)-[:HAS_L10N]->(tl)
      RETURN t.key AS thing_key, t.schema_type, tl.name, tl.native_description, l.key AS locale

      // Get all localizations for a Thing
      MATCH (t:Thing {key: $thing_key})-[:HAS_L10N]->(tl:ThingL10n)-[:FOR_LOCALE]->(l:Locale)
      RETURN l.key AS locale, tl.name, tl.aliases
      ORDER BY l.key
