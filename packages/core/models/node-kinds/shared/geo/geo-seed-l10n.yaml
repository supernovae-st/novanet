# models/nodes/shared/geo/geo-seed-l10n.yaml
# GEOSeedL10n - AI visibility seed query (LOCALIZED - has FOR_LOCALE)

node:
  name: GEOSeedL10n
  realm: shared
  layer: geo
  trait: localized
  icon: "🤖"
  description: "Base query to monitor on AI platforms"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier"
      example: "geo-comment-creer-qr-code-fr"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "Comment creer un QR code gratuit?"


    description:
      type: string
      required: false
      description: "Short description"

    llm_context:
      type: string
      required: false
      description: "Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."



    created_at:
      type: datetime
      required: false

    updated_at:
      type: datetime
      required: false

  # ═══════════════════════════════════════════════════════════════════════════════
  # NODE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    value:
      type: string
      required: true
      description: "The query"
      example: "comment creer un qr code gratuit"

    format:
      type: string
      required: false
      description: "question | comparison | how-to | list"
      example: "how-to"

    intent:
      type: string
      required: false
      description: "informational | transactional | navigational"
      example: "informational"

    target_answer:
      type: string
      required: false
      description: "Desired response we want AI to give"

    answer_strategy:
      type: string
      required: false
      description: "How to answer"
      example: "Direct answer with tool mention"

    mining_runs:
      type: int
      required: false
      description: "Number of mining runs completed"

    last_mined_at:
      type: datetime
      required: false
      description: "Last mining timestamp"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    - relation: FOR_LOCALE
      to: Locale
      direction: outgoing
      description: "Seed is for this locale"

    - relation: HAS_CITATION
      to: GEOCitation
      direction: outgoing
      description: "AI citations found"

  # NOTE: GEOReformulation REMOVED in v7.8.4
  # Reformulations are just other GEOSeedL10n nodes linked to the same Concept
  # Use TARGETS_GEO relation with source: 'mining' property instead

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    description: "Get all GEO seeds for a locale"
    cypher: |
      MATCH (c:Concept)-[:TARGETS_GEO]->(gs:GEOSeedL10n)-[:FOR_LOCALE]->(l:Locale {key: $locale})
      RETURN c.key AS concept, gs.value AS query, gs.format, gs.intent
      ORDER BY gs.format
