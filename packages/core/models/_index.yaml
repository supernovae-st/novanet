# ═══════════════════════════════════════════════════════════════════════════════
# NOVANET DATA MODELS INDEX v0.12.0
# ═══════════════════════════════════════════════════════════════════════════════
#
# WHAT: Native content generation system using Neo4j graph database
# WHY:  Generate culturally-authentic content per locale (NOT translation)
# HOW:  Orchestrator dispatches to sub-agents, each generates a Block natively
#
# ═══════════════════════════════════════════════════════════════════════════════
# TWO-REALM ARCHITECTURE (v0.12.0 ADR-025)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   ┌─────────────────────────────────────────────────────────────────────────────┐
#   │                              REALM HIERARCHY                                 │
#   ├─────────────────────────────────────────────────────────────────────────────┤
#   │                                                                             │
#   │  ┌───────────────────────────────────────────────────────────────────────┐  │
#   │  │  🌍 SHARED (40 nodes) - Universal knowledge, shared by ALL orgs      │  │
#   │  │  └─ config/     3 nodes: Locale, EntityCategory, SEOKeywordFormat    │  │
#   │  │  └─ geography/  7 nodes: Continent, GeoRegion, GeoSubRegion, Country,│  │
#   │  │                          EconomicRegion, IncomeGroup, LendingCategory│  │
#   │  │  └─ knowledge/ 24 nodes:                                             │  │
#   │  │      Containers: TermSet, ExpressionSet, PatternSet, CultureSet,     │  │
#   │  │                  TabooSet, AudienceSet, SEOKeywordSet, GEOQuerySet   │  │
#   │  │      Atoms:      Term, Expression, Pattern, Taboo, CultureRef,       │  │
#   │  │                  AudienceTrait, SEOKeyword, GEOQuery, GEOAnswer      │  │
#   │  │      Metrics:    SEOKeywordMetrics                                   │  │
#   │  │      Cultural:   CulturalRealm, CulturalSubRealm                     │  │
#   │  │      Linguistic: LanguageFamily, LanguageBranch                      │  │
#   │  │      Population: PopulationCluster, PopulationSubCluster             │  │
#   │  │  └─ locale/     6 nodes: Culture, Style, Formatting, Slugification,  │  │
#   │  │                          Adaptation, Market                          │  │
#   │  └───────────────────────────────────────────────────────────────────────┘  │
#   │                                                                             │
#   │  ┌───────────────────────────────────────────────────────────────────────┐  │
#   │  │  📦 ORG (21 nodes) - Organization-specific content                   │  │
#   │  │  └─ config/      1 node:  OrgConfig                                  │  │
#   │  │  └─ foundation/  6 nodes: Project, Brand, BrandDesign, BrandPrinciples,│ │
#   │  │                           PromptStyle, ProjectContent                │  │
#   │  │  └─ structure/   3 nodes: Page, Block, ContentSlot                   │  │
#   │  │  └─ semantic/    4 nodes: Entity, EntityContent, AudiencePersona,    │  │
#   │  │                           ChannelSurface                             │  │
#   │  │  └─ instruction/ 4 nodes: BlockType, BlockRules, BlockInstruction,   │  │
#   │  │                           PromptArtifact                             │  │
#   │  │  └─ output/      3 nodes: PageGenerated, BlockGenerated,             │  │
#   │  │                           OutputArtifact                             │  │
#   │  └───────────────────────────────────────────────────────────────────────┘  │
#   │                                                                             │
#   └─────────────────────────────────────────────────────────────────────────────┘
#
# ═══════════════════════════════════════════════════════════════════════════════
# PAGE COMPOSITION ARCHITECTURE
# ═══════════════════════════════════════════════════════════════════════════════
#
#   Project ──┬─[:SUPPORTS_LOCALE]───────> Locale ─[:HAS_*]──> LocaleKnowledge*
#             │
#             ├─[:HAS_BRAND]─> Brand ──[:HAS_DESIGN]─> BrandDesign
#             │                    └──[:HAS_PRINCIPLES]─> BrandPrinciples
#             │                    └──[:HAS_PROMPT_STYLE]─> PromptStyle
#             │
#             ├─[:HAS_CONTENT]─> ProjectContent ──:FOR_LOCALE──> Locale
#             │
#             └─[:HAS_PAGE]─> Page ──┬─[:HAS_BLOCK {position}]─> Block ──:OF_TYPE──> BlockType
#                               │    │                            │
#                               │    │                     :HAS_INSTRUCTION──> BlockInstruction
#                               │    │                            │
#                               │    │                     :USES_ENTITY
#                               │    │                            v
#                               │    │                         Entity ──[:HAS_CONTENT]──> EntityContent
#                               │    │                            │           ──:FOR_LOCALE──> Locale
#                               │    │                            │
#                               │    │                     :SEMANTIC_LINK (spreading activation)
#                               │    │                            v
#                               │    │                         Entity
#                               │    │
#                               │    └──:HAS_GENERATED──> BlockGenerated ──:FOR_LOCALE──> Locale
#                               │
#                               │  (v0.12.4: PageStructure/PageInstruction deleted - ADR-028)
#                               │  (Block order determines structure; BlockInstructions assembled at runtime)
#                               │
#                               ├──:USES_ENTITY──> Entity (invariant)
#                               │
#                               ├──:LINKS_TO {entity_key, context, anchor_type, nofollow}──> Page
#                               │
#                               ├──:SUBTOPIC_OF──> Page (pillar-cluster SEO hierarchy)
#                               │
#                               └──:HAS_GENERATED──> PageGenerated ──:FOR_LOCALE──> Locale
#
# ═══════════════════════════════════════════════════════════════════════════════
# INSTRUCTION LAYER (v0.12.4 ADR-028)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   v0.12.4: PageStructure and PageInstruction DELETED
#   Block order (HAS_BLOCK {position}) determines page structure
#   BlockInstructions are assembled at runtime by position order
#
#   Page ──[:HAS_BLOCK {position}]──> Block ──[:HAS_INSTRUCTION]──> BlockInstruction
#                                       │                              │
#                                       │                       markdown content with
#                                       │                       @entity:key, @link:key syntax
#                                       │                              │
#                              [:OF_TYPE]                     [:REFERENCES_ENTITY]
#                                   │                         [:REFERENCES_PAGE]
#                                   v                              │
#                              BlockType                           v
#                              (rules, schema)               Entity / Page
#
#   At runtime: BlockInstructions assembled by position → sent to LLM
#                                           PageGenerated output
#
# ═══════════════════════════════════════════════════════════════════════════════
# ARC FAMILIES (v0.12.0)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   ownership     (54) - Structural containment (HAS_PAGE, HAS_BLOCK, HAS_BRAND, CONTAINS_*, etc.)
#   localization  (16) - Locale linking (HAS_CONTENT, FOR_LOCALE, FALLBACK_TO, etc.)
#   semantic      (44) - Meaning connections (SEMANTIC_LINK, USES_ENTITY, FOR_MARKET, etc.)
#   generation    (11) - AI output (HAS_GENERATED, GENERATED, ASSEMBLES, etc.)
#   mining         (1) - Analytics (HAS_METRICS)
#
#   See taxonomy.yaml for full ArcFamily definitions.
#   See arc-classes/ directory for all arc types with family assignment.
#
# ═══════════════════════════════════════════════════════════════════════════════
# STANDARD NODE PROPERTIES v0.12.0
# ═══════════════════════════════════════════════════════════════════════════════
#
#   key: string              # Semantic prefix + identifier (unique per label)
#   display_name: string     # Human-readable name
#   description: string      # One-line purpose description
#   llm_context: string      # "USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."
#   created_at: datetime
#   updated_at: datetime
#
# ═══════════════════════════════════════════════════════════════════════════════
# NAMING CONVENTIONS (Neo4j official)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   NODE LABELS:      CamelCase, uppercase first (EntityContent, PageGenerated)
#   RELATIONSHIPS:    UPPER_SNAKE_CASE (HAS_CONTENT, FOR_LOCALE)
#   PROPERTIES:       snake_case (display_name, llm_context)
#
# ═══════════════════════════════════════════════════════════════════════════════
# NODE NAMING PATTERNS (v0.12.0)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   FooContent   → localized semantic content for invariant Foo (authored trait)
#   FooGenerated → LLM-generated output from Foo (generated trait)
#   FooSet       → container grouping Foo atoms (defined trait)
#   FooMetrics   → computed/retrieved metrics (retrieved trait)
#
#   Examples:
#     Entity → EntityContent (semantic layer, authored)
#     Page → PageGenerated (output layer, generated)
#     Term → TermSet (knowledge container, defined)
#     SEOKeyword → SEOKeywordMetrics (retrieved)
#
# ═══════════════════════════════════════════════════════════════════════════════
# CHANGES v0.12.0 (SemVer transition from v11.x milestone versions)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Statistics: 61 nodes (40 shared + 21 org), 128 arcs (5 arc families)
# v0.12.4: Added REFERENCES (Block→Entity), HAS_KEYWORD (Entity→SEOKeyword)
#
# ═══════════════════════════════════════════════════════════════════════════════

files:
  # ═══════════════════════════════════════════════════════════════════════════
  # 🌍 SHARED REALM (40 nodes) - Universal knowledge, READ-ONLY
  # ═══════════════════════════════════════════════════════════════════════════

  shared:
    # Configuration (3 nodes)
    config:
      - node-classes/shared/config/locale.yaml           # BCP-47 locale definition
      - node-classes/shared/config/entity-category.yaml  # Entity classification (13 types)
      - node-classes/shared/config/seo-keyword-format.yaml # SEO keyword format

    # Geography (7 nodes) - World Bank / UN classification
    geography:
      - node-classes/shared/geography/continent.yaml
      - node-classes/shared/geography/geo-region.yaml
      - node-classes/shared/geography/geo-sub-region.yaml
      - node-classes/shared/geography/economic-region.yaml
      - node-classes/shared/geography/income-group.yaml
      - node-classes/shared/geography/lending-category.yaml

    # Knowledge (24 nodes) - Locale knowledge atoms + SEO/GEO
    knowledge:
      # Containers (8) - aggregate knowledge by category
      - node-classes/shared/knowledge/term-set.yaml
      - node-classes/shared/knowledge/expression-set.yaml
      - node-classes/shared/knowledge/pattern-set.yaml
      - node-classes/shared/knowledge/culture-set.yaml
      - node-classes/shared/knowledge/taboo-set.yaml
      - node-classes/shared/knowledge/audience-set.yaml
      - node-classes/shared/knowledge/seo-keyword-set.yaml
      - node-classes/shared/knowledge/geo-query-set.yaml
      # Atoms (6) - granular knowledge items for selective LLM loading
      - node-classes/shared/knowledge/atoms/term.yaml
      - node-classes/shared/knowledge/atoms/expression.yaml
      - node-classes/shared/knowledge/atoms/pattern.yaml
      - node-classes/shared/knowledge/atoms/culture-ref.yaml
      - node-classes/shared/knowledge/atoms/taboo.yaml
      - node-classes/shared/knowledge/atoms/audience-trait.yaml
      # SEO/GEO (4)
      - node-classes/shared/knowledge/seo-keyword.yaml
      - node-classes/shared/knowledge/seo-keyword-metrics.yaml
      - node-classes/shared/knowledge/geo-query.yaml
      - node-classes/shared/knowledge/geo-answer.yaml
      # Cultural classification (2)
      - node-classes/shared/knowledge/cultural-realm.yaml
      - node-classes/shared/knowledge/cultural-sub-realm.yaml
      # Linguistic classification (2)
      - node-classes/shared/knowledge/language-family.yaml
      - node-classes/shared/knowledge/language-branch.yaml
      # Population classification (2)
      - node-classes/shared/knowledge/population-cluster.yaml
      - node-classes/shared/knowledge/population-sub-cluster.yaml

    # Locale settings (6 nodes) - per-locale configuration
    locale:
      - node-classes/shared/locale/culture.yaml
      - node-classes/shared/locale/style.yaml
      - node-classes/shared/locale/formatting.yaml
      - node-classes/shared/locale/slugification.yaml
      - node-classes/shared/locale/adaptation.yaml
      - node-classes/shared/locale/market.yaml

  # ═══════════════════════════════════════════════════════════════════════════
  # 📦 ORG REALM (21 nodes) - Organization-specific content
  # ═══════════════════════════════════════════════════════════════════════════

  org:
    # Organization config (1 node)
    config:
      - node-classes/org/config/org-config.yaml

    # Foundation (6 nodes) - Project root & brand architecture
    foundation:
      - node-classes/org/foundation/project.yaml
      - node-classes/org/foundation/brand.yaml             # Central brand identity
      - node-classes/org/foundation/brand-design.yaml      # Visual design system
      - node-classes/org/foundation/brand-principles.yaml  # Voice, tone, guidelines
      - node-classes/org/foundation/prompt-style.yaml      # LLM prompt style hints
      - node-classes/org/foundation/project-content.yaml

    # Structure (3 nodes) - Content scaffolding
    structure:
      - node-classes/org/structure/page.yaml
      - node-classes/org/structure/block.yaml
      - node-classes/org/structure/content-slot.yaml

    # Semantic (4 nodes) - Entity & audience targeting
    semantic:
      - node-classes/org/semantic/entity.yaml          # Invariant semantic entity
      - node-classes/org/semantic/entity-content.yaml  # Localized entity content
      - node-classes/org/semantic/audience-persona.yaml
      - node-classes/org/semantic/channel-surface.yaml

    # Instruction (4 nodes) - AI generation directives
    instruction:
      - node-classes/org/instruction/block-type.yaml
      - node-classes/org/instruction/block-rules.yaml
      - node-classes/org/instruction/block-instruction.yaml # Markdown with @entity/@link
      - node-classes/org/instruction/prompt-artifact.yaml

    # Output (3 nodes) - LLM-generated content
    output:
      - node-classes/org/output/page-generated.yaml
      - node-classes/org/output/block-generated.yaml
      - node-classes/org/output/output-artifact.yaml

  # ═══════════════════════════════════════════════════════════════════════════
  # REFERENCE FILES
  # ═══════════════════════════════════════════════════════════════════════════

  arc_kinds: arc-classes/               # Arc definitions by family
  views: views/                       # YAML view definitions
  schema: schema/nodes.schema.json    # JSON Schema for validation

# ═══════════════════════════════════════════════════════════════════════════════
# NODES BY TRAIT (v0.12.0 ADR-024 Data Origin renames)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   🔵 defined:    Language-independent, defined once (33 nodes)
#   🟢 authored:   Per-locale content, human-curated (2 nodes)
#   🟣 imported:   Knowledge ABOUT a locale, from external sources (20 nodes)
#   🌟 generated:  LLM-generated output (4 nodes)
#   ⚪ retrieved:  External API snapshots (2 nodes)
#
# ═══════════════════════════════════════════════════════════════════════════════

nodes_by_trait:
  defined:
    # Org/config
    - OrgConfig
    # Org/foundation (Brand Architecture)
    - Project
    - Brand
    - BrandDesign
    - BrandPrinciples
    - PromptStyle
    # Org/structure
    - Page
    - Block
    - ContentSlot
    # Org/semantic
    - Entity
    - AudiencePersona
    - ChannelSurface
    # Org/instruction (3 nodes - PromptArtifact is generated)
    - BlockType
    - BlockRules
    - BlockInstruction
    # Shared/config
    - Locale
    - EntityCategory
    - SEOKeywordFormat
    # Shared/knowledge containers
    - TermSet
    - ExpressionSet
    - PatternSet
    - CultureSet
    - TabooSet
    - AudienceSet
    - SEOKeywordSet
    - GEOQuerySet
    # Shared/geography
    - Continent
    - GeoRegion
    - GeoSubRegion
    - EconomicRegion
    - IncomeGroup
    - LendingCategory
    - Country

  authored:
    - ProjectContent        # Org/foundation
    - EntityContent         # Org/semantic

  imported:
    # Shared/knowledge atoms
    - Term
    - Expression
    - Pattern
    - CultureRef
    - Taboo
    - AudienceTrait
    # Shared/knowledge SEO/GEO
    - SEOKeyword
    - GEOQuery
    # Shared/knowledge classification taxonomies
    - CulturalRealm
    - CulturalSubRealm
    - LanguageFamily
    - LanguageBranch
    - PopulationCluster
    - PopulationSubCluster
    # Shared/locale settings
    - Culture
    - Formatting
    - Slugification
    - Adaptation
    - Style
    - Market

  generated:
    - PageGenerated         # Org/output
    - BlockGenerated        # Org/output
    - OutputArtifact        # Org/output
    - PromptArtifact        # Org/instruction (LLM-generated prompt)

  retrieved:
    - SEOKeywordMetrics     # Shared/knowledge (Ahrefs/Semrush API)
    - GEOAnswer             # Shared/knowledge (AI search API snapshots)

# ═══════════════════════════════════════════════════════════════════════════════
# STATISTICS v0.12.0
# ═══════════════════════════════════════════════════════════════════════════════
#
# By Realm (v0.12.4):
#   🌍 SHARED:  40 nodes (config 3 + geography 7 + knowledge 24 + locale 6)
#   📦 ORG:     21 nodes (config 1 + foundation 6 + structure 3 + semantic 4 + instruction 4 + output 3)
#   TOTAL:      61 nodes, 128 arcs (5 arc families)
#
# By Trait (v0.12.0 ADR-024):
#   🔵 DEFINED:   31 nodes (language-independent definitions)
#   🟢 AUTHORED:   2 nodes (per-locale human-curated content)
#   🟣 IMPORTED:  20 nodes (external knowledge about locales)
#   🌟 GENERATED:  4 nodes (LLM-generated output)
#   ⚪ RETRIEVED:  2 nodes (API snapshots: SEOKeywordMetrics, GEOAnswer)
#
