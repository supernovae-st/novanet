files:
  # ═══════════════════════════════════════════════════════════════════════════
  # 🌍 GLOBAL REALM (17 nodes) - Shared by ALL projects
  # ═══════════════════════════════════════════════════════════════════════════

  global:
    # Locale configuration (1 node)
    config:
      - node-kinds/global/config/locale.yaml

    # Locale knowledge (16 nodes) - v10.1 Knowledge Atoms model
    knowledge:
      # Container nodes (10) - aggregate knowledge by category
      - node-kinds/global/knowledge/formatting.yaml       # Technical
      - node-kinds/global/knowledge/slugification.yaml    # Technical
      - node-kinds/global/knowledge/adaptation.yaml       # Technical
      - node-kinds/global/knowledge/style.yaml            # Style
      - node-kinds/global/knowledge/term-set.yaml         # Semantic container
      - node-kinds/global/knowledge/expression-set.yaml   # Semantic container
      - node-kinds/global/knowledge/pattern-set.yaml      # Semantic container
      - node-kinds/global/knowledge/culture-set.yaml      # Semantic container
      - node-kinds/global/knowledge/taboo-set.yaml        # Semantic container
      - node-kinds/global/knowledge/audience-set.yaml     # Semantic container
      # Atom nodes (6) - granular knowledge items for selective LLM loading
      - node-kinds/global/knowledge/atoms/term.yaml
      - node-kinds/global/knowledge/atoms/expression.yaml
      - node-kinds/global/knowledge/atoms/pattern.yaml
      - node-kinds/global/knowledge/atoms/culture-ref.yaml
      - node-kinds/global/knowledge/atoms/taboo.yaml
      - node-kinds/global/knowledge/atoms/audience-trait.yaml

  # ═══════════════════════════════════════════════════════════════════════════
  # 🎯 SHARED REALM (3 nodes) - Independent of projects, reusable
  # ═══════════════════════════════════════════════════════════════════════════

  shared:
    # SEO targeting + metrics + jobs (3 nodes)
    seo:
      - node-kinds/shared/seo/seo-keyword.yaml
      - node-kinds/shared/seo/seo-keyword-metrics.yaml
      - node-kinds/shared/seo/seo-mining-run.yaml

  # ═══════════════════════════════════════════════════════════════════════════
  # 📦 PROJECT REALM (23 nodes) - Per-project instances
  # ═══════════════════════════════════════════════════════════════════════════

  project:
    # 🏢 FOUNDATION (3 nodes) - Project root & identity
    foundation:
      - node-kinds/project/foundation/project.yaml
      - node-kinds/project/foundation/brand-identity.yaml
      - node-kinds/project/foundation/project-l10n.yaml

    # 🔧 STRUCTURE (3 nodes) - Content scaffolding
    structure:
      - node-kinds/project/structure/page.yaml
      - node-kinds/project/structure/block.yaml
      - node-kinds/project/structure/content-slot.yaml

    # 💡 SEMANTIC (6 nodes) - Meaning & concepts
    semantic:
      - node-kinds/project/semantic/concept.yaml
      - node-kinds/project/semantic/concept-l10n.yaml
      - node-kinds/project/semantic/search-intent.yaml
      - node-kinds/project/semantic/topic-cluster.yaml
      - node-kinds/project/semantic/audience-persona.yaml
      - node-kinds/project/semantic/channel-surface.yaml

    # 📝 INSTRUCTION (6 nodes) - AI generation directives
    instruction:
      - node-kinds/project/instruction/page-type.yaml
      - node-kinds/project/instruction/page-prompt.yaml
      - node-kinds/project/instruction/block-prompt.yaml
      - node-kinds/project/instruction/block-type.yaml
      - node-kinds/project/instruction/block-rules.yaml
      - node-kinds/project/instruction/prompt-artifact.yaml

    # 📤 OUTPUT (5 nodes) - LLM-generated content
    output:
      - node-kinds/project/output/page-l10n.yaml
      - node-kinds/project/output/block-l10n.yaml
      - node-kinds/project/output/generation-job.yaml
      - node-kinds/project/output/output-artifact.yaml
      - node-kinds/project/output/evaluation-signal.yaml

  # ═══════════════════════════════════════════════════════════════════════════
  # REFERENCE FILES
  # ═══════════════════════════════════════════════════════════════════════════

  relations: relations.yaml           # All 73 Neo4j arcs
  arc_kinds: arc-kinds/               # Arc definitions by family
  views: views/                       # YAML view definitions
  schema: schema/nodes.schema.json    # JSON Schema for validation

# ═══════════════════════════════════════════════════════════════════════════════
# NODES BY TRAIT (v9.0.0 - locale_behavior field in each YAML)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   🔵 invariant:  Language-independent, defined once
#   🟢 localized:  Per-locale content, has :FOR_LOCALE
#   🟣 knowledge:  Knowledge ABOUT a locale (v9: renamed from localeKnowledge)
#   ⚪ derived:    Inherits locale from parent
#   ⚙️ job:        Background jobs, no locale
#
# ═══════════════════════════════════════════════════════════════════════════════

nodes_by_trait:
  invariant:
    - Project
    - BrandIdentity
    - Concept
    - Page
    - Block
    - PageType
    - BlockType
    - PagePrompt
    - BlockPrompt
    - BlockRules
    - Locale
    - ContentSlot
    - SearchIntent
    - TopicCluster
    - AudiencePersona
    - ChannelSurface
  localized:
    - ProjectL10n
    - ConceptL10n
    - PageL10n
    - BlockL10n
    - SEOKeyword
  knowledge:
    # Containers (10)
    - Formatting
    - Slugification
    - Adaptation
    - Style
    - TermSet
    - ExpressionSet
    - PatternSet
    - CultureSet
    - TabooSet
    - AudienceSet
    # Atoms (6) - v10.1
    - Term
    - Expression
    - Pattern
    - CultureRef
    - Taboo
    - AudienceTrait
  derived:
    - SEOKeywordMetrics
    - PromptArtifact
    - OutputArtifact
    - EvaluationSignal
  job:
    - SEOMiningRun
    - GenerationJob

