# Metadata
metadata:
  locale: pl-PL
  total_expressions: 150
  fields: 10
  expressions_per_field: 15
  registers:
    casual: "Conversational, familiar tone (per Ty)"
    neutral: "Standard professional tone"
    formal: "Corporate, official tone (per Pan/Pani)"
  sources:
    - "Polish e-commerce sites (Allegro, Empik, x-kom, Morele.net)"
    - "Polish retail advertising (Biedronka, Lidl Polska, Żabka)"
    - "Polish D2C brands (CCC, Reserved, 4F, Answear)"
    - "Polish tech marketing (CD Projekt, Comarch, Asseco)"
    - "Polish advertising agencies corpus (2024)"
  year: "2024-2025"
  cultural_notes:
    - "Polish marketing often uses the familiar 'Ty' form in casual contexts"
    - "Formal contexts use 'Pan/Pani' (you formal masculine/feminine)"
    - "Polish consumers trust 'Made in Poland' claims highly"
    - "References to Polish platforms (Allegro, Ceneo, InPost) resonate well"
    - "Diminutives can add friendliness but should be used carefully"
    - "Polish uses many English loanwords in tech/marketing (AI, smart, premium)"
  notes:
    - "All expressions verified for proper Polish accents (ą, ć, ę, ł, ń, ó, ś, ź, ż)"
    - "Expressions are native Polish, not translated from English"
    - "Register classification: casual/neutral/formal"
    - "Context provides usage guidance for LLM generation"
    - "EU Omnibus Directive compliance noted where relevant (price history requirements)"
