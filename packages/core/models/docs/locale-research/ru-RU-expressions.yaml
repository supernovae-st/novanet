# Metadata
metadata:
  locale: ru-RU
  total_expressions: 150
  fields: 10
  expressions_per_field: 15
  registers:
    casual: "Conversational, familiar tone (ты-form implications)"
    neutral: "Standard professional tone (вы-form)"
    formal: "Corporate, official tone (вы-form, elevated)"
  sources:
    - "Russian e-commerce platforms (Wildberries, OZON, Яндекс.Маркет)"
    - "Russian retail advertising (Магнит, Пятёрочка, Лента)"
    - "Russian tech marketing (Яндекс, VK, Сбер)"
    - "Russian D2C brands (Lamoda, М.Видео, DNS)"
    - "Traditional Russian advertising corpus"
  year: "2024-2025"
  cultural_notes:
    - "Russian marketing emphasizes 'надёжность' (reliability) and 'качество' (quality)"
    - "Import substitution (импортозамещение) is a significant 2024 theme"
    - "References to Russian standards (ГОСТ) build trust"
    - "Domestic production ('Сделано в России') is increasingly valued"
    - "Marketplace culture dominates (Wildberries, OZON phrasing)"
    - "Neural networks/AI terminology trending in 2024"
    - "First Channel (Первый канал) reference carries cultural weight"
    - "Formal 'вы' form is default in B2C, casual 'ты' rare except youth brands"
  notes:
    - "All expressions are native Russian, not translated from English"
    - "Cyrillic characters preserved with proper encoding"
    - "Register classification: casual/neutral/formal"
    - "Context provides usage guidance for LLM generation"
    - "Some English loanwords (кэшбэк, VIP) are naturalized in Russian marketing"
