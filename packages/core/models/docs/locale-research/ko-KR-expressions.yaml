metadata:
  total_expressions: 150
  expressions_per_field: 15
  semantic_fields_count: 10
  cultural_notes:
    - "Korean e-commerce (Coupang, 11st, Gmarket) heavily emphasizes delivery speed"
    - "Rocket delivery (로켓 배송) is Coupang's branded term, now generic for fast shipping"
    - "Dawn delivery (새벽 배송) is uniquely Korean - order by midnight, arrive before breakfast"
    - "KC certification is the Korean safety mark equivalent to CE or UL"
    - "Group buying (공동 구매) is deeply embedded in Korean culture from traditional markets"
    - "AI and GenAI terminology rapidly adopted in 2024 Korean marketing"
    - "VIP tiers are highly developed in Korean membership programs"
    - "Price anchoring with exact won amounts (9,900원, 29,900원) is standard practice"
  marketing_trends_2024:
    - Generative AI (생성형 AI) integration in product recommendations
    - Multimodal AI (멀티모달 AI) for visual search and chat commerce
    - C-commerce (community commerce) growth via social platforms
    - Ultra-fast delivery wars between Coupang, SSG, and Kurly
    - Short-form video ads on KakaoTalk, Naver, and YouTube Shorts
