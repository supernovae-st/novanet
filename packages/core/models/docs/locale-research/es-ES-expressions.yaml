# Spanish (Spain) Marketing Expressions 2024-2025
# Native expressions for es-ES locale
# 200 expressions across 10 semantic fields (20 per field)
#
# Research methodology:
# - Analysis of major Spanish ecommerce platforms (El Corte Inglés, Zara, Mango, MediaMarkt)
# - Spanish digital marketing best practices 2024
# - Native copywriting patterns (not translations)
# - Register variations: formal (B2B, luxury), casual (B2C, youth), neutral (general commerce)
#
# Generated: 2026-02-06

