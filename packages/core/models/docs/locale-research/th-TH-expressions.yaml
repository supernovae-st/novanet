# Cultural Notes for th-TH:
# 1. PARTICLES: Thai uses ending particles for politeness
#    - ครับ (krap) = male polite
#    - ค่ะ/คะ (ka) = female polite
#    Marketing typically omits these for brevity
#
# 2. CELEBRITY CULTURE: Strong influence of celebrities/influencers
#    - K-Pop idols, Thai actors drive purchasing
#    - "ดาราใช้จริง" (celebrities actually use it) is powerful
#
