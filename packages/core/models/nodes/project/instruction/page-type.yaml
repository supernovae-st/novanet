# models/nodes/project/instruction/page-type.yaml
# PageType - Template rules and structure for page generation (v7.12.0)
#
# v7.12.0 CHANGES:
#   - ADDED: "pillar" | "cluster" to category enum for SEO hierarchy
#
# DESIGN RATIONALE:
#   - Mirrors BlockType pattern for consistency
#   - Block has BlockType, Page has PageType
#   - Defines meta/SEO requirements, layout rules, required blocks
#   - pillar/cluster categories enable topical authority structure

node:
  name: PageType
  category: instruction
  scope: project
  locale_behavior: invariant
  functional_role: instruction
  icon: "📐"
  description: "Template defining meta requirements, layout rules, and block composition for a type of page"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "PageType identifier. Format: pagetype-{identifier}"
      pattern: "^pagetype-[a-z0-9-]+$"
      examples:
        - "pagetype-landing"
        - "pagetype-product"
        - "pagetype-blog-post"
        - "pagetype-legal"
        - "pagetype-support"

    display_name:
      type: string
      required: true
      description: "Human-readable UI name"
      example: "Landing Page"

    description:
      type: string
      required: true
      description: "One-line description of the page type"
      example: "High-conversion landing page with hero, features, and CTAs"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: 'USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation].'"
      example: "USE: orchestrate landing page generation. TRIGGERS: landing, conversion, homepage. NOT: blog posts or legal pages."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # PAGETYPE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    category:
      type: string
      required: true
      enum: [marketing, product, content, legal, support, pillar, cluster]
      description: "Page category for organization and SEO hierarchy (v7.12.0: added pillar/cluster)"
      example: "marketing"
      # pillar: comprehensive guide page that links to cluster pages
      # cluster: focused subtopic page that links to its pillar page via :SUBTOPIC_OF

    meta_schema:
      type: json
      required: true
      description: "JSON schema defining required meta/SEO fields"
      example:
        title_template: "{product} - {action} | {brand}"
        description_max_length: 160
        required_og_tags: ["og:title", "og:description", "og:image"]

    layout_rules:
      type: json
      required: false
      description: "Constraints on block organization and positioning"
      example:
        max_blocks: 10
        required_sections: ["header", "body", "footer"]
        block_order_constraints: ["hero first", "cta last"]

    required_block_types:
      type: string[]
      required: false
      description: "BlockType keys that MUST appear on pages of this type"
      example: ["blocktype-hero", "blocktype-cta"]

    optional_block_types:
      type: string[]
      required: false
      description: "BlockType keys recommended but not required"
      example: ["blocktype-faq", "blocktype-testimonials"]

    validation_rules:
      type: json
      required: false
      description: "Custom validation rules for page generation"
      example:
        min_word_count: 500
        max_cta_count: 3
        require_social_proof: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    incoming:
      - type: OF_TYPE
        from: Page
        description: "Pages that use this template"

  # ═══════════════════════════════════════════════════════════════════════════════
  # NEO4J CONFIGURATION
  # ═══════════════════════════════════════════════════════════════════════════════

  neo4j:
    constraints:
      - "CREATE CONSTRAINT pagetype_key IF NOT EXISTS FOR (pt:PageType) REQUIRE pt.key IS UNIQUE"
    indexes:
      - "CREATE INDEX pagetype_category IF NOT EXISTS FOR (pt:PageType) ON (pt.category)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    data:
      key: "pagetype-landing"
      display_name: "Landing Page"
      icon: "🚀"
      description: "High-conversion landing page with hero, features, and CTAs"
      llm_context: "USE: orchestrate landing page generation. TRIGGERS: landing, conversion, homepage. NOT: blog posts or legal pages."
      priority: "critical"
      freshness: "static"
      category: "marketing"
      meta_schema:
        title_template: "{product} - {action} | {brand}"
        description_max_length: 160
        required_og_tags: ["og:title", "og:description", "og:image"]
      layout_rules:
        max_blocks: 10
        required_sections: ["header", "body", "footer"]
      required_block_types: ["blocktype-hero", "blocktype-cta"]
      optional_block_types: ["blocktype-faq", "blocktype-testimonials", "blocktype-pricing-table"]
      validation_rules:
        min_word_count: 500
        require_social_proof: true

    cypher: |
      // Get page type with its requirements
      MATCH (pt:PageType {key: $key})
      RETURN pt, pt.required_block_types AS required_blocks, pt.meta_schema AS meta

      // Get all pages of this type
      MATCH (pt:PageType {key: $key})<-[:OF_TYPE]-(p:Page)
      RETURN pt, collect(p.key) AS pages

      // Validate page has required blocks
      MATCH (pt:PageType {key: $pageTypeKey})<-[:OF_TYPE]-(p:Page {key: $pageKey})
      MATCH (p)-[:HAS_BLOCK]->(b:Block)-[:OF_TYPE]->(bt:BlockType)
      WITH pt, p, collect(bt.key) AS page_block_types
      RETURN pt.required_block_types, page_block_types,
             [rbt IN pt.required_block_types WHERE NOT rbt IN page_block_types] AS missing_blocks

      // v7.12.0: Get pillar page with its cluster pages
      MATCH (pt:PageType {category: 'pillar'})<-[:OF_TYPE]-(pillar:Page)
      OPTIONAL MATCH (pillar)<-[:SUBTOPIC_OF]-(cluster:Page)
      RETURN pillar.key AS pillar, collect(cluster.key) AS clusters

      // v7.12.0: Get cluster page with its pillar
      MATCH (p:Page)-[:OF_TYPE]->(pt:PageType {category: 'cluster'})
      MATCH (p)-[:SUBTOPIC_OF]->(pillar:Page)
      RETURN p.key AS cluster, pillar.key AS pillar
