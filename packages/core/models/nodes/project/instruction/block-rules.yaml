# models/nodes/project/instruction/block-rules.yaml
# BlockRules - Template generation rules for BlockType (v7.2.0)

node:
  name: BlockRules
  realm: project
  layer: instruction
  locale_behavior: invariant
  icon: "🔵"
  description: "Generation rules extracted from BlockType for versioning and A/B testing"

  # ═══════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (Prompt nodes - no key, v7.2.0)
  # ═══════════════════════════════════════════════════════════════════════════

  standard_properties:
    display_name:
      type: string
      required: true
      description: "Versioned display name"
      example: "Hero Rules v1.0"


    description:
      type: string
      required: true
      description: "Short description"
      example: "Generation rules for hero block type"

    llm_context:
      type: string
      required: false
      description: "Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."
      example: "USE: validate hero generation. TRIGGERS: blocktype-hero rules. NOT: other block types."



    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOCKRULES-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════

  properties:
    rules:
      type: string
      required: true
      description: "Generation rules for LLM"
      example: "Title: action verb, max 8 words. Subtitle: value prop, max 15 words. CTA: urgency, single action."

    version:
      type: string
      required: true
      description: "Semver format for versioning"
      example: "1.0"

    active:
      type: boolean
      required: true
      default: false
      description: "true = current active version"

  # ═══════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════

  relations:
    incoming:
      - type: HAS_RULES
        from: BlockType
        description: "BlockType that owns these rules"

  # ═══════════════════════════════════════════════════════════════════════════
  # NEO4J CONFIGURATION
  # ═══════════════════════════════════════════════════════════════════════════

  neo4j:
    indexes:
      - "CREATE INDEX blockrules_active IF NOT EXISTS FOR (br:BlockRules) ON (br.active)"
      - "CREATE INDEX blockrules_version IF NOT EXISTS FOR (br:BlockRules) ON (br.version)"

  # ═══════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════

  example:
    display_name: "Hero Rules v1.0"
    description: "Generation rules for hero block type"
    llm_context: "USE: validate hero generation. TRIGGERS: blocktype-hero rules. NOT: other block types."
    rules: "Title: action verb, max 8 words. Subtitle: value prop, max 15 words. CTA: urgency, single action."
    version: "1.0"
    active: true
