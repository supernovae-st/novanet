# models/nodes/project/output/block-l10n.yaml
# BlockL10n - LLM-generated localized content for a block (v7.11.0)
#
# v7.11.0 CHANGES:
#   - ADDED: version, published_at, replaced_at (versioning support)
#   - ADDED: PREVIOUS_VERSION relation (history chain)
#
# NAMING PHILOSOPHY (v7.6.0):
#   - *L10n suffix for ALL localized content (human OR LLM generated)
#   - :HAS_L10N relationship → human-curated content
#   - :HAS_OUTPUT relationship → LLM-generated content

node:
  name: BlockL10n
  realm: project
  layer: output
  locale_behavior: localized
  icon: "🟠"
  description: "LLM-generated localized content for a block"

  # ═══════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (L10n nodes - no key, identified by relation)
  # ═══════════════════════════════════════════════════════════════════════════

  standard_properties:
    display_name:
      type: string
      required: true
      description: "Auto-generated name"
      example: "Pricing Hero (fr-FR)"


    description:
      type: string
      required: true
      description: "Short description"
      example: "Generated hero section for French market"

    llm_context:
      type: string
      required: false
      description: "Generation context used"

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOCKL10N-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════

  properties:
    generated:
      type: json
      required: true
      description: "LLM output matching BlockType.structure"

    generated_at:
      type: datetime
      required: true
      description: "Generation timestamp"

    generator_version:
      type: string
      required: true
      description: "Version tracking"
      example: "1.2.0"

    status:
      type: string
      required: true
      enum: ["draft", "approved", "published"]
      description: "Review and publication status"

    # ─────────────────────────────────────────────────────────────────────────
    # VERSIONING (v7.11.0)
    # ─────────────────────────────────────────────────────────────────────────

    version:
      type: int
      required: true
      description: "Version number (1, 2, 3...)"
      example: 1

    published_at:
      type: datetime
      required: false
      description: "When this version was put live"

    replaced_at:
      type: datetime
      required: false
      description: "When this version was replaced (null = current)"

  # ═══════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════

  relations:
    incoming:
      - type: HAS_OUTPUT
        from: Block
        description: "Block that owns this LLM-generated content"

      - type: GENERATED
        from: BlockPrompt
        description: "Prompt that generated this output (provenance)"

      - type: ASSEMBLES
        from: PageL10n
        description: "PageL10n that assembles this block"

    outgoing:
      - type: FOR_LOCALE
        to: Locale
        description: "Target locale for this output"

      - type: INFLUENCED_BY
        to: ConceptL10n
        description: "Concepts used in generation (provenance)"
        # NOTE v7.9.0: SEO/GEO provenance is implicit via ConceptL10n → HAS_*_TARGET
        # REMOVED: USED_SEO_KEYWORD, USED_GEO_SEED (SEO/GEO is at ConceptL10n level)

      - type: PREVIOUS_VERSION
        to: BlockL10n
        cardinality: "1:1"
        description: "Link to previous version in history chain (v7.11.0)"

  # ═══════════════════════════════════════════════════════════════════════════
  # NEO4J CONFIGURATION
  # ═══════════════════════════════════════════════════════════════════════════

  neo4j:
    indexes:
      - "CREATE INDEX blockl10n_status IF NOT EXISTS FOR (bl:BlockL10n) ON (bl.status)"
      - "CREATE INDEX blockl10n_date IF NOT EXISTS FOR (bl:BlockL10n) ON (bl.generated_at)"

  # ═══════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════

  example:
    display_name: "Pricing Hero (fr-FR)"
    description: "Hero tarifs généré pour le marché français"
    llm_context: "USE: display generated hero content. TRIGGERS: pricing hero, fr-FR output. NOT: regeneration trigger."
    generated:
      title: "Des QR Codes Pro pour votre Business"
      subtitle: "Créez, personnalisez et suivez vos QR codes en illimité"
      cta:
        label: "Commencer Gratuitement"
        url: "/signup"
    generated_at: "2024-01-15T10:25:00Z"
    generator_version: "1.2.0"
    status: "published"
    # Versioning (v7.11.0)
    version: 2
    published_at: "2024-01-15T10:30:00Z"
    replaced_at: null  # Current version
