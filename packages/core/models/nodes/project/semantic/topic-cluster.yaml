# TopicCluster — Pillar-cluster SEO content strategy (v9.8)
# Path: packages/core/models/nodes/project/semantic/topic-cluster.yaml

node:
  name: TopicCluster
  realm: project
  layer: semantic
  trait: invariant
  icon: "🎪"
  description: |
    Represents a pillar-cluster content strategy grouping. A TopicCluster
    organizes related concepts around a central pillar topic, with supporting
    cluster content that links back to the pillar for SEO authority building.

    USE: When modeling pillar-cluster SEO architecture for topical authority.
    TRIGGERS: "topic cluster", "pillar content", "content hub", "topical authority".
    NOT: For single pages (use Page), for concepts (use Concept).

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier"
      pattern: "^cluster-[a-z0-9-]+$"
      example: "cluster-qr-code-guide"

    display_name:
      type: string
      required: true
      description: "Human-readable cluster name"
      example: "QR Code Ultimate Guide"

    description:
      type: string
      required: true
      description: "Description of the topic cluster scope and purpose"

    llm_context:
      type: string
      required: true
      description: "LLM prompt context for content in this cluster"
      example: "Comprehensive QR code cluster covering creation, customization, use cases, and best practices."

    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  properties:
    cluster_type:
      type: string
      required: true
      description: "Type of content cluster"
      enum:
        - how_to_guide
        - comparison
        - ultimate_guide
        - glossary
        - case_study_collection
        - feature_deep_dive
        - industry_report
        - tutorial_series
      example: "ultimate_guide"

    primary_intent:
      type: string
      required: true
      description: "Primary search intent this cluster targets"
      enum:
        - informational
        - navigational
        - transactional
        - commercial
      example: "informational"

    funnel_focus:
      type: string
      required: true
      description: "Customer journey stage this cluster focuses on"
      enum:
        - awareness
        - consideration
        - decision
        - retention
      example: "awareness"

    authority_score:
      type: float
      required: false
      description: "Topical authority score (0.0-1.0) based on cluster completeness and performance"
      example: 0.85

    cluster_size:
      type: int
      required: false
      description: "Number of cluster pages (excluding pillar)"
      example: 12

    internal_link_density:
      type: float
      required: false
      description: "Average internal links per cluster page"
      example: 4.5

    completion_percentage:
      type: float
      required: false
      description: "Percentage of planned cluster content that is published (0.0-1.0)"
      example: 0.75

    target_keyword_count:
      type: int
      required: false
      description: "Total unique keywords targeted by this cluster"
      example: 45

  neo4j:
    indexes:
      - name: topiccluster_type
        property: cluster_type
      - name: topiccluster_intent
        property: primary_intent
      - name: topiccluster_funnel
        property: funnel_focus

  relations:
    outgoing:
      - type: CLUSTERS_TOPIC
        to: Concept
        description: "Concepts covered by this cluster"

      - type: PILLAR_PAGE
        to: Page
        description: "The main pillar page for this cluster"

      - type: CLUSTER_PAGE
        to: Page
        description: "Supporting cluster pages"

  example:
    data: |
      {
        "key": "cluster-qr-code-guide",
        "display_name": "QR Code Ultimate Guide",
        "description": "Comprehensive content cluster covering all aspects of QR code creation, customization, use cases, and best practices",
        "llm_context": "This cluster establishes topical authority for QR codes. Pillar covers overview, clusters dive deep into specific use cases and techniques.",
        "cluster_type": "ultimate_guide",
        "primary_intent": "informational",
        "funnel_focus": "awareness",
        "authority_score": 0.85,
        "cluster_size": 12,
        "internal_link_density": 4.5,
        "completion_percentage": 0.75,
        "target_keyword_count": 45
      }
    cypher: |
      CREATE (tc:TopicCluster {
        key: 'cluster-qr-code-guide',
        display_name: 'QR Code Ultimate Guide',
        description: 'Comprehensive content cluster covering all aspects of QR code creation, customization, use cases, and best practices',
        llm_context: 'This cluster establishes topical authority for QR codes. Pillar covers overview, clusters dive deep into specific use cases and techniques.',
        cluster_type: 'ultimate_guide',
        primary_intent: 'informational',
        funnel_focus: 'awareness',
        authority_score: 0.85,
        cluster_size: 12,
        internal_link_density: 4.5,
        completion_percentage: 0.75,
        target_keyword_count: 45,
        created_at: datetime(),
        updated_at: datetime()
      })
