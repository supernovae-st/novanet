# models/nodes/project/structure/block.yaml
# Block - Page section instance with sub-agent instructions

node:
  name: Block
  locale_behavior: invariant
  icon: "🔷"
  description: "Page section instance containing sub-agent instructions and concept references"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Block identifier. Format: block-{page}-{type}"
      pattern: "^block-[a-z0-9-]+-[a-z0-9-]+$"
      examples:
        - "block-pricing-hero"
        - "block-homepage-faq"
        - "block-features-cta"

    display_name:
      type: string
      required: true
      description: "Human-readable UI name"
      example: "Pricing Hero"

    description:
      type: string
      required: true
      description: "One-line description of the block"
      example: "Hero section for pricing page"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: 'USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation].'"
      example: "USE: generate pricing page hero content. TRIGGERS: pricing, hero, tier comparison. NOT: FAQ or footer blocks."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # BLOCK-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    instructions:
      type: string
      required: false
      deprecated: "v7.2.0 - Use :HAS_PROMPT → BlockPrompt.prompt"
      description: "Sub-agent directive with @concept-key references"
      example: "[GENERATE] Hero for pricing page, highlight @tier-pro benefits"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS (FROM this node)
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    OF_TYPE:
      to: BlockType
      cardinality: "N:1"
      description: "Template type for this block"

    HAS_OUTPUT:
      to: BlockL10n
      cardinality: "1:N"
      description: "Generated outputs for this block (one per locale)"

    HAS_PROMPT:
      to: BlockPrompt
      cardinality: "1:N"
      description: "Sub-agent instructions with versioning (v7.2.0)"

    USES_CONCEPT:
      to: Concept
      cardinality: "N:N"
      description: "Concepts referenced in this block's instructions"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    data:
      key: "block-pricing-hero"
      display_name: "Pricing Hero"
      description: "Hero section for pricing page"
      llm_context: "USE: generate pricing page hero content. TRIGGERS: pricing, hero, tier comparison. NOT: FAQ or footer blocks."
      instructions: "[GENERATE] Hero for pricing page, highlight @tier-pro benefits"

    cypher: |
      // Load full context for block generation
      MATCH (b:Block {key: $key})-[:OF_TYPE]->(bt:BlockType)
      MATCH (b)-[:USES_CONCEPT]->(c:Concept)-[:HAS_L10N]->(cl:ConceptL10n)-[:FOR_LOCALE]->(l:Locale {key: $locale})
      OPTIONAL MATCH (l)-[:HAS_VOICE]->(v:LocaleVoice)
      OPTIONAL MATCH (l)-[:HAS_CULTURE]->(cult:LocaleCulture)
      RETURN b.instructions, bt.rules, bt.llm_context,
             collect(DISTINCT {key: c.key, title: cl.title, definition: cl.definition}) AS concepts,
             v AS voice, cult AS culture

      // Get block with latest output for locale
      MATCH (b:Block {key: $key})-[:HAS_OUTPUT]->(bl:BlockL10n)-[:FOR_LOCALE]->(l:Locale {key: $locale})
      RETURN b, bl
      ORDER BY bl.generated_at DESC
      LIMIT 1
