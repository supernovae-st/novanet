# models/nodes/shared/geo/thing.yaml
# Thing - Schema.org aligned universal entity (v9.9)

node:
  name: Thing
  realm: shared
  layer: geo
  trait: invariant
  icon: "🔮"
  description: |
    Universal entity aligned with Schema.org Thing type. Represents Wikidata-linked
    concepts, people, places, organizations, products, and other entities that exist
    independently of any specific project. Project-specific Things can SPECIALIZE
    shared Things to provide brand-specific definitions.

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: true
      description: "Unique identifier. Format: {schema_type}-{identifier}"
      pattern: "^[a-z-]+-[a-z0-9-]+$"
      examples:
        - "person-alan-turing"
        - "organization-anthropic"
        - "place-paris"
        - "product-qr-code"

    display_name:
      type: string
      required: true
      description: "Human-readable name (invariant, English default)"
      example: "Alan Turing"

    description:
      type: string
      required: true
      description: "Brief description of the entity"
      example: "British mathematician and computer scientist, father of theoretical computer science"

    llm_context:
      type: string
      required: true
      description: "LLM hints. Format: 'WHAT: [definition]. CONTEXT: [usage]. LINKS: [related entities].'"
      example: "WHAT: Mathematician who created the Turing machine. CONTEXT: Reference when discussing AI history, computability theory. LINKS: Ada Lovelace, Church-Turing thesis."

    created_at:
      type: datetime
      required: true

    updated_at:
      type: datetime
      required: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # SCHEMA.ORG ALIGNMENT (v9.9)
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    schema_type:
      type: string
      required: true
      description: "Primary Schema.org type (e.g., Person, Organization, Product, Place)"
      enum: [Thing, Person, Organization, Place, Product, CreativeWork, Event, Action, Intangible]
      example: "Person"

    additional_types:
      type: array
      items: string
      required: false
      description: "Additional Schema.org types (multi-typing)"
      example: ["Scientist", "Mathematician"]

    same_as:
      type: array
      items: string
      required: false
      description: "URIs of same entity (Wikidata, Wikipedia, official site)"
      examples:
        - ["https://www.wikidata.org/wiki/Q7251"]
        - ["https://en.wikipedia.org/wiki/Alan_Turing"]

    wikidata_id:
      type: string
      required: false
      description: "Wikidata Q-identifier (e.g., Q7251 for Alan Turing)"
      pattern: "^Q[0-9]+$"
      example: "Q7251"

    url:
      type: string
      required: false
      description: "Official/canonical URL for this entity"
      example: "https://www.anthropic.com"

    image:
      type: string
      required: false
      description: "URL to representative image"
      example: "https://upload.wikimedia.org/wikipedia/commons/a/a1/Alan_Turing_Aged_16.jpg"

    identifier:
      type: string
      required: false
      description: "External identifier (ISBN, ORCID, DUNS, etc.)"
      example: "0000-0002-1825-0097"

    # GEO/AI Discovery
    ai_relevance_score:
      type: float
      required: false
      description: "How often AI systems reference this entity (0.0-1.0)"
      example: 0.85

    citation_count:
      type: int
      required: false
      description: "Number of AI citation references tracked"
      example: 1250

    authority_domains:
      type: array
      items: string
      required: false
      description: "Domains where this entity has expertise/authority"
      example: ["artificial-intelligence", "computer-science", "cryptography"]

    # Vector Embedding (v7.8.0 - Hybrid OntologyRAG)
    embedding:
      type: vector
      dimensions: 1536
      required: false
      description: "OpenAI text-embedding-3-small vector for semantic search"

    embedding_source:
      type: string
      required: false
      description: "Text used to generate embedding"

    embedding_updated_at:
      type: datetime
      required: false
      description: "Timestamp of last embedding update"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS (FROM this node)
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    HAS_L10N:
      to: ThingL10n
      cardinality: "1:N"
      description: "Localized names/descriptions for this Thing (one per locale)"

    RELATED_THING:
      to: Thing
      cardinality: "N:N"
      props:
        relation_type:
          type: string
          enum: [same_as, part_of, instance_of, related_to, opposite_of, derived_from]
          description: "Type of semantic relationship"
        strength:
          type: float
          description: "Relationship strength 0.0-1.0"
      description: "Semantic links between Things (spreading activation)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # NEO4J INDEXES
  # ═══════════════════════════════════════════════════════════════════════════════

  neo4j:
    indexes:
      - name: thing_schema_type
        property: schema_type
      - name: thing_wikidata
        property: wikidata_id
      - name: thing_relevance
        property: ai_relevance_score

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    data:
      key: "person-alan-turing"
      display_name: "Alan Turing"
      description: "British mathematician, computer scientist, and cryptanalyst"
      llm_context: "WHAT: Father of theoretical computer science and AI. CONTEXT: Reference when discussing computation theory, AI history, Enigma code-breaking. LINKS: Church-Turing thesis, Turing test, Bletchley Park."
      schema_type: "Person"
      additional_types: ["Scientist", "Mathematician"]
      same_as:
        - "https://www.wikidata.org/wiki/Q7251"
        - "https://en.wikipedia.org/wiki/Alan_Turing"
      wikidata_id: "Q7251"
      ai_relevance_score: 0.95
      authority_domains: ["artificial-intelligence", "computer-science", "cryptography"]

    cypher: |
      // Get Thing with localized content
      MATCH (t:Thing {key: $key})
      OPTIONAL MATCH (t)-[:HAS_L10N]->(tl:ThingL10n)-[:FOR_LOCALE]->(l:Locale)
      RETURN t, collect({locale: l.key, name: tl.name, description: tl.description}) AS localizations

      // Find related Things (2 hops)
      MATCH (t:Thing {key: $key})-[r:RELATED_THING*1..2]->(related:Thing)
      WHERE ALL(rel IN r WHERE rel.strength >= 0.3)
      WITH related, reduce(score = 1.0, rel IN r | score * rel.strength) AS activation
      WHERE activation >= 0.3
      RETURN related.key, related.display_name, related.schema_type, activation
      ORDER BY activation DESC

      // Find pages that COVER this Thing
      MATCH (t:Thing {key: $key})<-[c:COVERS]-(p:Page)
      WHERE c.is_primary = true
      RETURN p.key, p.display_name
