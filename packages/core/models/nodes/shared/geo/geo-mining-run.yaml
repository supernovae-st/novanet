# models/nodes/shared/geo/geo-mining-run.yaml
# GEOMiningRun - GEO mining job orchestration

node:
  name: GEOMiningRun
  realm: shared
  layer: geo
  trait: job
  icon: "⚙️"
  description: "Mining job for GEO reformulations"

  # ═══════════════════════════════════════════════════════════════════════════════
  # STANDARD PROPERTIES (v7.1.0 - UUID-identified, no key)
  # ═══════════════════════════════════════════════════════════════════════════════

  standard_properties:
    key:
      type: string
      required: false
      description: "Optional - UUID-identified"

    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "GEO Mining 2024-01-15 10:00"


    description:
      type: string
      required: false
      description: "Short description"

    llm_context:
      type: string
      required: false
      description: "Job metadata for debugging/auditing"



    created_at:
      type: datetime
      required: false

    updated_at:
      type: datetime
      required: false

  # ═══════════════════════════════════════════════════════════════════════════════
  # NODE-SPECIFIC PROPERTIES
  # ═══════════════════════════════════════════════════════════════════════════════

  properties:
    status:
      type: string
      required: true
      description: "running | completed | failed"
      example: "completed"

    platforms:
      type: "string[]"
      required: false
      description: "AI platforms monitored"
      example: '["chatgpt", "perplexity", "gemini"]'

    started_at:
      type: datetime
      required: false
      description: "Job start time"

    completed_at:
      type: datetime
      required: false
      description: "Job completion time"

    total_reformulations:
      type: int
      required: false
      description: "Total reformulations found"

    unique_reformulations:
      type: int
      required: false
      description: "New unique (non-duplicate) reformulations"

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  relations:
    - relation: MINES
      to: GEOSeedL10n
      direction: outgoing
      description: "Seeds mined by this run"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLE
  # ═══════════════════════════════════════════════════════════════════════════════

  example:
    description: "Get recent GEO mining runs"
    cypher: |
      MATCH (gmr:GEOMiningRun)
      RETURN gmr.display_name, gmr.status, gmr.total_reformulations, gmr.unique_reformulations
      ORDER BY gmr.started_at DESC
      LIMIT 10
