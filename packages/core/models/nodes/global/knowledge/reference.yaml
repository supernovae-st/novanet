# models/nodes/global/knowledge/reference.yaml
# Reference - Cultural references for a locale (celebrities, brands, landmarks, events)
#
# Graph-native node consolidating all named entities from LocaleCultureReferences
# Enables: safe celebrity filtering, brand comparisons, cultural landmarks
#
# Stability: Low-Medium - Update biannually for pop culture, annually for brands.

node:
  name: Reference
  realm: global
  layer: knowledge
  locale_behavior: knowledge
  icon: "🎯"
  description: "Cultural reference entity for locale-specific content"

  # ===========================================================================
  # STANDARD PROPERTIES (no key - relation-identified) v7.1.0
  # ===========================================================================

  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name of the reference"
      example: "Tour Eiffel"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Iconic landmark in Paris, universal French symbol"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."
      example: "USE: for universal French symbolism. TRIGGERS: Paris, France, tourism. NOT: modern architecture."



    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ===========================================================================
  # REFERENCE-SPECIFIC PROPERTIES
  # ===========================================================================

  properties:
    # Core classification
    reference_type:
      type: string
      required: true
      enum: [celebrity, brand, landmark, event, dish, sport, entertainment]
      description: "Type of cultural reference"
      example: "landmark"

    name:
      type: string
      required: true
      description: "The reference name in local language"
      example: "Tour Eiffel"

    name_english:
      type: string
      required: false
      description: "English name for cross-locale matching"
      example: "Eiffel Tower"

    # Recognition and safety
    recognition_score:
      type: float
      required: true
      description: "Recognition level in target population (0.0-1.0)"
      example: 0.99

    safety_level:
      type: string
      required: true
      enum: [safe_all, safe_most, neutral, avoid, never]
      description: "Safety level for content usage"
      example: "safe_all"

    avoid_reason:
      type: string
      required: false
      description: "Reason to avoid if safety_level is avoid/never"
      example: "Political figure, stay neutral"

    # Categorization
    category:
      type: string
      required: false
      description: "Specific category within type"
      example: "architecture"

    subcategory:
      type: string
      required: false
      description: "More specific classification"
      example: "19th century"

    # Associations and usage
    associations:
      type: json
      required: false
      description: "Associated concepts/themes"
      example: ["elegance", "romance", "tourism", "France"]

    usage_contexts:
      type: json
      required: false
      description: "Contexts where this reference works"
      example: ["travel", "luxury", "culture", "international"]

    # Comparison data (for brands)
    global_equivalent:
      type: string
      required: false
      description: "Global brand this compares to"
      example: "Amazon"

    local_positioning:
      type: string
      required: false
      description: "How this reference is positioned locally"
      example: "French e-commerce leader"

    # Temporal relevance (for events, entertainment)
    timing:
      type: string
      required: false
      description: "When this reference is most relevant"
      example: "July 14"

    sentiment:
      type: string
      required: false
      enum: [celebratory, solemn, neutral, commercial]
      description: "Emotional tone associated with reference"
      example: "celebratory"

    # Provenance (v7.2.0)
    source_metadata:
      type: json
      required: false
      description: "Source and version information"
      example:
        source: "ath-know-l10n"
        version: "2024-01"
        category: "4-culture-references"

  # ===========================================================================
  # RELATIONS
  # ===========================================================================

  relations:
    incoming:
      - type: HAS_REFERENCE
        from: LocaleCultureReferences
        cardinality: "N:1"
        description: "Reference belongs to exactly one culture references node"

  # ===========================================================================
  # NEO4J INDEXES
  # ===========================================================================

  neo4j:
    indexes:
      - "CREATE INDEX reference_type IF NOT EXISTS FOR (r:Reference) ON (r.reference_type)"
      - "CREATE INDEX reference_safety IF NOT EXISTS FOR (r:Reference) ON (r.safety_level)"
      - "CREATE INDEX reference_recognition IF NOT EXISTS FOR (r:Reference) ON (r.recognition_score)"
      - "CREATE INDEX reference_name_en IF NOT EXISTS FOR (r:Reference) ON (r.name_english)"
