# models/nodes/global/knowledge/pattern.yaml
# Pattern - Formatting patterns with examples for a locale
#
# Graph-native extraction of formatting rules from LocaleRulesFormatting
# Enables: LLM few-shot learning, validation, format detection
#
# Stability: High - Changes only on standard updates (CLDR).

node:
  name: Pattern
  locale_behavior: knowledge
  icon: "📐"
  description: "Formatting pattern with correct/incorrect examples"

  # ===========================================================================
  # STANDARD PROPERTIES (no key - relation-identified) v7.1.0
  # ===========================================================================

  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name of the pattern"
      example: "French Currency Format"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Euro currency formatting for France"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."
      example: "USE: when formatting prices. TRIGGERS: price, cost, euro, €. NOT: US dollar amounts."



    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ===========================================================================
  # PATTERN-SPECIFIC PROPERTIES
  # ===========================================================================

  properties:
    # Core classification
    pattern_type:
      type: string
      required: true
      enum: [date, time, number, currency, percentage, phone, address, postal_code]
      description: "Type of formatting pattern"
      example: "currency"

    # Format specification
    format_string:
      type: string
      required: true
      description: "Format pattern string"
      example: "#,##0.00 €"

    format_regex:
      type: string
      required: false
      description: "Regex for validation"
      example: "^[0-9]{1,3}(\\s[0-9]{3})*,[0-9]{2}\\s€$"

    # Examples (critical for LLM few-shot learning)
    correct_examples:
      type: json
      required: true
      description: "List of correctly formatted examples"
      example:
        - "99,90 €"
        - "1 234,56 €"
        - "10 000,00 €"

    incorrect_examples:
      type: json
      required: true
      description: "List of incorrectly formatted examples (common mistakes)"
      example:
        - value: "€99.90"
          issue: "Wrong position and decimal separator"
        - value: "99.90€"
          issue: "No space, wrong decimal"
        - value: "1,234.56€"
          issue: "American format"

    # Specific format rules
    separator_decimal:
      type: string
      required: false
      description: "Decimal separator character"
      example: ","

    separator_thousands:
      type: string
      required: false
      description: "Thousands separator character"
      example: " "

    symbol_position:
      type: string
      required: false
      enum: [before, after]
      description: "Position of symbol (currency, percentage)"
      example: "after"

    symbol_spacing:
      type: boolean
      required: false
      description: "Space between number and symbol"
      example: true

    # Provenance (v7.2.0)
    source_metadata:
      type: json
      required: false
      description: "Source and version information"
      example:
        source: "ath-know-l10n"
        version: "2024-01"
        category: "2-rules-formatting"
        cldr_version: "44"

  # ===========================================================================
  # RELATIONS
  # ===========================================================================

  relations:
    incoming:
      - type: HAS_PATTERN
        from: LocaleRulesFormatting
        cardinality: "N:1"
        description: "Pattern belongs to exactly one formatting rules node"

  # ===========================================================================
  # NEO4J INDEXES
  # ===========================================================================

  neo4j:
    indexes:
      - "CREATE INDEX pattern_type IF NOT EXISTS FOR (p:Pattern) ON (p.pattern_type)"
