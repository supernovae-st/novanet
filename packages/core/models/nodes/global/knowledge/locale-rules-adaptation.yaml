# models/nodes/global/knowledge/locale-rules-adaptation.yaml
# LocaleRulesAdaptation - HOW to adapt content (FACTS vs ILLUSTRATIONS)
#
# Stability: Medium - Update when adaptation strategies evolve.

node:
  name: LocaleRulesAdaptation
  locale_behavior: knowledge
  icon: "🔄"
  description: "Meta-instructions for content adaptation decisions"

  # ===========================================================================
  # STANDARD PROPERTIES (no key - relation-identified) v7.1.0
  # ===========================================================================

  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) Adaptation Rules"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Content adaptation rules for fr-FR"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."
      example: "USE: when deciding WHAT to adapt. TRIGGERS: adapt, localize, FACTS, ILLUSTRATIONS. NOT: formatting rules."



    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ===========================================================================
  # LOCALERULESADAPTATION-SPECIFIC PROPERTIES
  # ===========================================================================

  properties:
    # Core framework
    key_directive:
      type: string
      required: true
      description: "The key directive for this locale"
      example: "GENERATE native content, don't translate"

    # FACTS (Never Adapt)
    facts_categories:
      type: json
      required: true
      description: "Categories of FACTS that should never be adapted"
      example:
        - category: "Financial"
          examples: ["Prices", "fees", "taxes"]
          treatment: "Translate literally, apply local number format"
        - category: "Legal"
          examples: ["CGV", "RGPD"]
          treatment: "Translate literally, NEVER adapt"
        - category: "Brand"
          examples: ["Apple", "Renault"]
          treatment: "Do NOT translate, preserve brand identity"

    # ILLUSTRATIONS (Always Generate Native)
    illustrations_treatment:
      type: json
      required: true
      description: "How to handle ILLUSTRATIONS"
      example:
        definition: "Examples, metaphors, comparisons, or references used to explain or engage"
        treatment: "Generate culturally native, use local references"

    # Tone calibration
    tone_calibration:
      type: json
      required: false
      description: "Tone adjustment rules"
      example:
        general_tone: "Match enthusiasm but reduce hyperbole by 30%"
        emotional_intensity: "Tone down from 10 to 7-8"
        superlatives: "Avoid 'meilleur du monde', use 'parmi les meilleurs'"

    # Structural adaptation
    structural_rules:
      type: json
      required: false
      description: "Rules for structural elements"
      example:
        cta_placement: "End of section (not interrupting)"
        bullet_points: "Complete sentences, start with verbs"
        headlines: "Informative over clever"

    # Decision trees
    adaptation_decision_tree:
      type: json
      required: false
      description: "Decision tree for adaptation choices"
      example:
        start: "Is it a FACT?"
        fact_path: "Translate literally, format locally"
        illustration_path: "Generate native equivalent"

  # ===========================================================================
  # RELATIONS
  # ===========================================================================

  relations:
    incoming:
      - type: HAS_RULES_ADAPTATION
        from: Locale
        cardinality: "1:1"
        description: "Locale has exactly one set of adaptation rules"
