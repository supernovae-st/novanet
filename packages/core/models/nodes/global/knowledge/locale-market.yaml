# models/nodes/global/knowledge/locale-market.yaml
# LocaleMarket - BUSINESS data for a locale
#
# Stability: Medium - update quarterly to annually

node:
  name: LocaleMarket
  realm: global
  layer: knowledge
  trait: knowledge
  icon: "📈"
  description: "Business and market data for a locale"

  # ===========================================================================
  # STANDARD PROPERTIES (no key - relation-identified) v7.1.0
  # ===========================================================================

  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) Market"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Business and market data for France"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."
      example: "USE: for market-specific content. TRIGGERS: demographics, payment. NOT: voice/culture."



    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ===========================================================================
  # LOCALEMARKET-SPECIFIC PROPERTIES
  # ===========================================================================

  properties:
    # Demographics
    population:
      type: long
      required: false
      description: "Total population"
      example: 68200000

    growth_rate:
      type: float
      required: false
      description: "Population growth rate percentage"
      example: 0.28

    median_age:
      type: float
      required: false
      description: "Median age"
      example: 42.3

    age_distribution:
      type: json
      required: false
      description: "Population by age group"
      example:
        - group: "18-24"
          percentage: 8.1
          notes: "Digital native generation"

    income_levels:
      type: json
      required: false
      description: "Income distribution"
      example:
        - level: "high"
          percentage: 12
          threshold: ">5000 EUR"

    urban_rural_split:
      type: json
      required: false
      description: "Urban vs rural population"
      example:
        urban: 81
        suburban: 12
        rural: 7

    # Digital maturity
    internet_penetration:
      type: int
      required: false
      description: "Internet penetration percentage"
      example: 93

    mobile_penetration:
      type: int
      required: false
      description: "Mobile penetration percentage"
      example: 92

    mobile_first_users:
      type: int
      required: false
      description: "Mobile-first users percentage"
      example: 65

    dominant_os:
      type: json
      required: false
      description: "Mobile OS market share"
      example:
        android: 72
        ios: 28

    ecommerce_adoption:
      type: int
      required: false
      description: "E-commerce adoption percentage"
      example: 85

    ecommerce_revenue:
      type: long
      required: false
      description: "E-commerce revenue in EUR"
      example: 159900000000

    # Payment
    payment_methods:
      type: json
      required: false
      description: "Payment method usage"
      example:
        - method: "Credit cards"
          usage: 62
          trend: "stable"

    # ROI scoring
    roi_score:
      type: float
      required: false
      description: "ROI score 0-100"
      example: 78.6

    roi_factors:
      type: json
      required: false
      description: "ROI factor breakdown"
      example:
        market_size: 92
        growth: 78
        competition: 55
        cost: 85

    # Channels
    social_platforms:
      type: json
      required: false
      description: "Social media platform usage"
      example:
        - platform: "Facebook"
          penetration: 73
          audience: "25-54"

    messaging_apps:
      type: json
      required: false
      description: "Messaging app usage"
      example:
        - app: "WhatsApp"
          penetration: 68
          use_case: "Personal and increasingly business"

    search_engines:
      type: json
      required: false
      description: "Search engine market share"
      example:
        - engine: "Google"
          share: 91.5

    # Consumer behavior
    avg_order_value:
      type: json
      required: false
      description: "Average order value by category"
      example:
        overall: 68
        fashion: 82
        electronics: 195

    conversion_rate:
      type: float
      required: false
      description: "Average e-commerce conversion rate percentage"
      example: 2.8

    cart_abandonment:
      type: float
      required: false
      description: "Cart abandonment rate percentage"
      example: 70.5

    # Seasonality
    peak_periods:
      type: json
      required: false
      description: "Peak sales periods"
      example:
        - name: "Soldes d'hiver"
          months: "January"
          impact: "+40%"

    low_periods:
      type: json
      required: false
      description: "Low activity periods"
      example:
        - name: "August"
          strategy: "Reduce ad spend, prepare rentrée"

    shopping_events:
      type: json
      required: false
      description: "Key shopping events"
      example:
        - event: "Black Friday"
          date: "4th Friday November"
          impact: "+80%"

    # Competition
    major_players:
      type: json
      required: false
      description: "Major market players"
      example:
        - company: "Amazon.fr"
          share: 22
          strength: "Logistics, Prime"

    market_concentration:
      type: string
      required: false
      enum: [fragmented, moderate, consolidated]
      description: "Market concentration level"
      example: "moderate"

  # ===========================================================================
  # RELATIONS
  # ===========================================================================

  relations:
    incoming:
      - type: HAS_MARKET
        from: Locale
        cardinality: "1:1"
        description: "Locale has exactly one market"
