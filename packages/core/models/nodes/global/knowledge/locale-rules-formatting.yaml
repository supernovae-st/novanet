# models/nodes/global/knowledge/locale-rules-formatting.yaml
# LocaleRulesFormatting - HOW to format factual data (dates, numbers, currency)
#
# Stability: High - Changes only on standard updates (CLDR).

node:
  name: LocaleRulesFormatting
  realm: global
  layer: knowledge
  locale_behavior: knowledge
  icon: "📐"
  description: "Formatting rules for dates, numbers, currency, addresses"

  # ===========================================================================
  # STANDARD PROPERTIES (no key - relation-identified) v7.1.0
  # ===========================================================================

  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) Formatting Rules"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Number, date, currency formatting for fr-FR"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."
      example: "USE: when formatting FACTS. TRIGGERS: date, number, price, address. NOT: content adaptation."



    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ===========================================================================
  # LOCALERULESFORMATTING-SPECIFIC PROPERTIES
  # ===========================================================================

  properties:
    # Number formatting
    decimal_separator:
      type: string
      required: true
      description: "Decimal separator character"
      example: ","

    thousands_separator:
      type: string
      required: true
      description: "Thousands separator character"
      example: " "

    grouping_pattern:
      type: int
      required: false
      description: "Digit grouping pattern"
      example: 3

    negative_sign:
      type: string
      required: false
      description: "Negative number sign"
      example: "-"

    number_examples:
      type: json
      required: false
      description: "Number formatting examples"
      example:
        correct: ["1 234,56", "10 000", "-1 234,56"]
        incorrect: ["1,234.56", "10.000"]

    # Date formatting
    date_pattern:
      type: string
      required: true
      description: "Standard date pattern"
      example: "DD/MM/YYYY"

    date_pattern_short:
      type: string
      required: false
      description: "Short date pattern"
      example: "DD/MM/YY"

    date_pattern_long:
      type: string
      required: false
      description: "Long date pattern"
      example: "D MMMM YYYY"

    date_separator:
      type: string
      required: false
      description: "Date separator character"
      example: "/"

    month_names:
      type: json
      required: false
      description: "Month names (full and abbreviated)"
      example:
        full: ["janvier", "fevrier", "mars"]
        abbreviated: ["janv.", "fevr.", "mars"]

    day_names:
      type: json
      required: false
      description: "Day names (full and abbreviated)"
      example:
        full: ["lundi", "mardi", "mercredi"]
        abbreviated: ["lun.", "mar.", "mer."]

    first_day_of_week:
      type: string
      required: false
      description: "First day of the week"
      example: "monday"

    # Time formatting
    time_format:
      type: string
      required: false
      description: "Time format (12h or 24h)"
      example: "24h"

    time_separator:
      type: string
      required: false
      description: "Time separator character"
      example: "h"

    time_examples:
      type: json
      required: false
      description: "Time formatting examples"
      example:
        correct: ["14h30", "9h00"]
        incorrect: ["2:30 PM", "9:00 AM"]

    # Currency formatting
    currency_code:
      type: string
      required: true
      description: "ISO 4217 currency code"
      example: "EUR"

    currency_symbol:
      type: string
      required: true
      description: "Currency symbol"
      example: "€"

    currency_position:
      type: string
      required: true
      enum: [before, after]
      description: "Currency symbol position"
      example: "after"

    currency_spacing:
      type: boolean
      required: false
      description: "Space between amount and symbol"
      example: true

    currency_examples:
      type: json
      required: false
      description: "Currency formatting examples"
      example:
        correct: ["99,90 €", "1 234,56 €"]
        incorrect: ["€99.90", "99.90€"]

    # Percentage formatting
    percentage_spacing:
      type: boolean
      required: false
      description: "Space before percentage sign"
      example: true

    percentage_examples:
      type: json
      required: false
      description: "Percentage formatting examples"
      example:
        correct: ["67 %", "3,5 %"]
        incorrect: ["67%", "3.5%"]

    # Address formatting
    address_format:
      type: json
      required: false
      description: "Address format pattern"
      example:
        pattern: "{street}\n{postal_code} {city}"
        postal_before_city: true

    phone_format:
      type: json
      required: false
      description: "Phone number formatting"
      example:
        pattern: "XX XX XX XX XX"
        country_code: "+33"

  # ===========================================================================
  # RELATIONS
  # ===========================================================================

  relations:
    incoming:
      - type: HAS_RULES_FORMATTING
        from: Locale
        cardinality: "1:1"
        description: "Locale has exactly one set of formatting rules"
