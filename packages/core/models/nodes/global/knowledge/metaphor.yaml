# models/nodes/locale/metaphor.yaml
# Metaphor - Concept-to-local expression mappings with cross-locale search
#
# Maps universal concepts ("easy as pie") to locale-native equivalents
# Vector embeddings enable finding equivalents across all 200 locales
#
# Stability: Medium - Update when new expressions emerge.

node:
  name: Metaphor
  category: locale
  icon: "🎭"
  description: "Locale-native metaphor mapping universal concepts to local expressions"

  # ===========================================================================
  # STANDARD PROPERTIES (no key - relation-identified) v7.1.0
  # ===========================================================================

  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "Simple comme bonjour"

    description:
      type: string
      required: true
      description: "Short description of the metaphor"
      example: "French equivalent of 'easy as pie'"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."
      example: "USE: for simplicity emphasis. TRIGGERS: easy, simple, straightforward. NOT: formal technical docs."



    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ===========================================================================
  # METAPHOR-SPECIFIC PROPERTIES
  # ===========================================================================

  properties:
    # Core mapping
    concept_key:
      type: string
      required: true
      description: "Universal concept key (English canonical)"
      example: "easy_as"

    local_text:
      type: string
      required: true
      description: "The locale-native metaphor/expression"
      example: "Simple comme bonjour"

    literal_translation:
      type: string
      required: false
      description: "Literal English translation for understanding"
      example: "Simple as hello"

    # Usage guidance
    domain:
      type: string
      required: true
      enum: [general, food, sports, nature, animals, work, family, body, weather]
      description: "Domain the metaphor comes from"
      example: "general"

    register:
      type: string
      required: true
      enum: [formal, semi-formal, casual, colloquial]
      description: "Formality register"
      example: "casual"

    example_usage:
      type: string
      required: true
      description: "Example of the metaphor in context"
      example: "C'est simple comme bonjour à configurer"

    # Alternative expressions
    alternatives:
      type: json
      required: false
      description: "Alternative expressions for same concept"
      example:
        - text: "Facile comme tout"
          register: "casual"
        - text: "Un jeu d'enfant"
          register: "casual"

    # Vector RAG support (v7.2.0)
    embedding:
      type: vector
      required: false
      dimensions: 768
      description: "LaBSE embedding of concept_key for cross-locale semantic search"
      example: "[0.023, -0.156, ...]"

    # Provenance (v7.2.0)
    source_metadata:
      type: json
      required: false
      description: "Source and version information"
      example:
        source: "ath-know-l10n"
        version: "2024-01"
        category: "4-culture-references"

  # ===========================================================================
  # RELATIONS
  # ===========================================================================

  relations:
    incoming:
      - type: HAS_METAPHOR
        from: LocaleCultureReferences
        cardinality: "N:1"
        description: "Metaphor belongs to exactly one culture references node"

  # ===========================================================================
  # NEO4J INDEXES
  # ===========================================================================

  neo4j:
    indexes:
      - "CREATE INDEX metaphor_concept IF NOT EXISTS FOR (m:Metaphor) ON (m.concept_key)"
      - "CREATE INDEX metaphor_domain IF NOT EXISTS FOR (m:Metaphor) ON (m.domain)"
      - "CREATE INDEX metaphor_register IF NOT EXISTS FOR (m:Metaphor) ON (m.register)"
    vector_indexes:
      - name: metaphor_embedding
        property: embedding
        dimensions: 768
        similarity: cosine
        comment: "HNSW index for cross-locale metaphor equivalents via LaBSE embeddings"
