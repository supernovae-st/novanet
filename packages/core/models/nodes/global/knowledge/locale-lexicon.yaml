# models/nodes/global/knowledge/locale-lexicon.yaml
# LocaleLexicon - Expression container for a locale
#
# Stability: Medium-High - update every 6-12 months

node:
  name: LocaleLexicon
  locale_behavior: knowledge
  icon: "📚"
  description: "Expression library and vocabulary rules for a locale"

  # ===========================================================================
  # STANDARD PROPERTIES (no key - relation-identified) v7.1.0
  # ===========================================================================

  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name"
      example: "French (France) Lexicon"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Expression library and vocabulary rules"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."
      example: "USE: for vocabulary/word choice. TRIGGERS: wording, terms. NOT: tone or grammar."



    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ===========================================================================
  # LOCALELEXICON-SPECIFIC PROPERTIES
  # ===========================================================================

  properties:
    # Meta rules
    expression_density:
      type: string
      required: false
      description: "How often to use expressions (percentage range)"
      example: "10-15%"

    rotation_rule:
      type: string
      required: false
      description: "Rule for expression rotation"
      example: "never repeat in same content piece"

    register_matching:
      type: boolean
      required: false
      description: "Whether expressions must match context register"
      default: true

    # Loanwords policy
    loanwords_policy:
      type: string
      required: true
      enum: [native_only, mixed, english_ok]
      description: "Policy for using loanwords"
      example: "mixed"

    accepted_loanwords:
      type: json
      required: false
      description: "Accepted loanwords with context"
      example:
        - word: "e-commerce"
          context: "Digital commerce"

    prefer_native:
      type: json
      required: false
      description: "Preference for native words over loanwords"
      example:
        - loanword: "feedback"
          native: "retour"
          when: "formal"

    # Connectors
    connectors:
      type: json
      required: false
      description: "Connector words by register"
      example:
        addition:
          formal: "de plus"
          casual: "et puis"
        contrast:
          formal: "neanmoins"
          casual: "mais bon"

    # Untranslatable concepts
    unique_concepts:
      type: json
      required: false
      description: "Culturally unique expressions"
      example:
        - expression: "savoir-faire"
          meaning: "Know-how with elegance"
          when: "Premium, craft, expertise"

    common_idioms:
      type: json
      required: false
      description: "Common idiomatic expressions"
      example:
        - idiom: "C'est du sur mesure"
          meaning: "It's tailor-made"
          context: "Customization, personalization"

  # ===========================================================================
  # RELATIONS
  # ===========================================================================

  relations:
    incoming:
      - type: HAS_LEXICON
        from: Locale
        cardinality: "1:1"
        description: "Locale has exactly one lexicon"

    outgoing:
      - type: HAS_EXPRESSION
        to: Expression
        cardinality: "1:N"
        description: "Lexicon contains many expressions"
