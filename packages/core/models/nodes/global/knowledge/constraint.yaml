# models/nodes/global/knowledge/constraint.yaml
# Constraint - Cultural constraints, taboos, and restrictions for a locale
#
# Graph-native extraction from LocaleCulture for queryable restrictions
# Enables: Content safety checks, alternative suggestions, LLM guardrails
#
# Stability: Medium - Update when cultural sensitivities evolve.

node:
  name: Constraint
  realm: global
  layer: knowledge
  locale_behavior: knowledge
  icon: "⚠️"
  description: "Cultural constraint or restriction for content generation"

  # ===========================================================================
  # STANDARD PROPERTIES (no key - relation-identified) v7.1.0
  # ===========================================================================

  standard_properties:
    display_name:
      type: string
      required: true
      description: "Human-readable name of the constraint"
      example: "Political Neutrality"

    description:
      type: string
      required: true
      description: "Short description"
      example: "Avoid political references in commercial content"

    llm_context:
      type: string
      required: true
      description: "LLM generation hints. Format: USE: [when]. TRIGGERS: [keywords]. NOT: [disambiguation]."
      example: "USE: always check before political content. TRIGGERS: government, election, policy. NOT: tech regulations."



    created_at:
      type: datetime
      required: true
      description: "Creation timestamp"

    updated_at:
      type: datetime
      required: true
      description: "Last update timestamp"

  # ===========================================================================
  # CONSTRAINT-SPECIFIC PROPERTIES
  # ===========================================================================

  properties:
    # Core classification
    constraint_type:
      type: string
      required: true
      enum: [taboo_topic, sensitivity, legal_requirement, cultural_norm, religious, age_restriction]
      description: "Type of constraint"
      example: "taboo_topic"

    # Severity and enforcement
    severity:
      type: string
      required: true
      enum: [critical, high, medium, low]
      description: "How strictly this must be enforced"
      example: "high"

    enforcement:
      type: string
      required: true
      enum: [block, warn, suggest_alternative, inform]
      description: "What action to take when constraint is triggered"
      example: "suggest_alternative"

    # The constraint details
    topic:
      type: string
      required: true
      description: "The topic or subject being constrained"
      example: "political_figures"

    trigger_keywords:
      type: json
      required: false
      description: "Keywords that trigger this constraint"
      example: ["president", "minister", "election", "party", "vote"]

    # Reason and context
    reason:
      type: string
      required: true
      description: "Why this constraint exists"
      example: "Political references can polarize audience and damage brand neutrality"

    cultural_context:
      type: string
      required: false
      description: "Additional cultural context"
      example: "France has strong opinions across the political spectrum"

    # Alternatives and guidance
    alternatives:
      type: json
      required: false
      description: "Alternative approaches when this constraint is triggered"
      example:
        - "Use neutral civic terms instead"
        - "Focus on technology/product benefits"
        - "Reference institutions not individuals"

    safe_exceptions:
      type: json
      required: false
      description: "Contexts where this constraint doesn't apply"
      example:
        - "Educational content about history"
        - "Legal compliance documentation"

    # Legal/regulatory details
    regulation_reference:
      type: string
      required: false
      description: "Reference to relevant regulation if applicable"
      example: "RGPD Article 9 - Special category data"

    # Provenance (v7.2.0)
    source_metadata:
      type: json
      required: false
      description: "Source and version information"
      example:
        source: "ath-know-l10n"
        version: "2024-01"
        category: "4-culture-norms"

  # ===========================================================================
  # RELATIONS
  # ===========================================================================

  relations:
    incoming:
      - type: HAS_CONSTRAINT
        from: LocaleCulture
        cardinality: "N:1"
        description: "Constraint belongs to exactly one culture node"

  # ===========================================================================
  # NEO4J INDEXES
  # ===========================================================================

  neo4j:
    indexes:
      - "CREATE INDEX constraint_type IF NOT EXISTS FOR (c:Constraint) ON (c.constraint_type)"
      - "CREATE INDEX constraint_severity IF NOT EXISTS FOR (c:Constraint) ON (c.severity)"
      - "CREATE INDEX constraint_topic IF NOT EXISTS FOR (c:Constraint) ON (c.topic)"
    fulltext_indexes:
      - name: constraint_keywords
        properties: [topic, trigger_keywords]
        comment: "Fulltext search for constraint topic matching"
