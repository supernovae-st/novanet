# packages/core/models/traits/generated.yaml
# Generated trait definition (Data Origin: our LLM produces)
# v0.12.5

trait:
  key: generated
  display_name: Generated
  description: |
    OUR LLM produces this output. Pages, blocks, and artifacts produced by
    the NovaNet generation pipeline. "NovaNet generated this."
  color: "#b58900"
  border_style: double
  border_width: 2
  unicode_border: "═"
  icon:
    web: "sparkles"
    terminal: "✦"

  node_count: 4  # Computed by generator

  context_budget:
    min: 100
    max: 500
    default: 200

  retrieval_defaults:
    traversal_depth: 1
    context_budget: 150
    token_estimate: 50

  examples:
    - PageGenerated
    - BlockGenerated
    - OutputArtifact
    - PromptArtifact

  llm_context: |
    USE: when accessing LLM-generated content.
    TRIGGERS: "generated", "output", "LLM", "NovaNet", "pipeline result".
    NOT: for retrieved external data (use retrieved trait).
    RELATES: PageGenerated (output), BlockGenerated (output), OutputArtifact (output).
