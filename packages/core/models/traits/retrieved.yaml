# packages/core/models/traits/retrieved.yaml
# Retrieved trait definition (Data Origin: fetched from external APIs)
# v0.12.5

trait:
  key: retrieved
  display_name: Retrieved
  description: |
    Fetched from EXTERNAL APIs. Snapshots from third-party services.
    We don't create it, we capture it. "We fetched this from [API]."
  color: "#6c71c4"
  border_style: dotted
  border_width: 3
  unicode_border: "┅"
  icon:
    web: "cloud-download"
    terminal: "⋆"

  node_count: 2  # Computed by generator

  context_budget:
    min: 50
    max: 200
    default: 100

  retrieval_defaults:
    traversal_depth: 1
    context_budget: 80
    token_estimate: 20

  examples:
    - GEOAnswer
    - SEOKeywordMetrics

  llm_context: |
    USE: when accessing data retrieved from external APIs.
    TRIGGERS: "retrieved", "API response", "snapshot", "external service".
    NOT: for our LLM output (use generated trait).
    RELATES: GEOAnswer (Claude/GPT response), SEOKeywordMetrics (Ahrefs data).
