# packages/core/models/traits/defined.yaml
# Defined trait definition (Data Origin: human-created once)
# v0.12.5

trait:
  key: defined
  display_name: Defined
  description: |
    Human-created ONCE. Structural definitions, configuration, templates.
    Does not change between locales. The skeleton on which localized content
    is hung. "This is how things are set up."
  color: "#3b82f6"
  border_style: solid
  border_width: 2
  unicode_border: "─"
  icon:
    web: "square"
    terminal: "■"

  node_count: 31  # Computed by generator

  context_budget:
    min: 500
    max: 2000
    default: 1000

  retrieval_defaults:
    traversal_depth: 2
    context_budget: 500
    token_estimate: 100

  examples:
    - Page
    - Block
    - Entity
    - PageStructure
    - BlockType
    - Locale
    - OrgConfig

  llm_context: |
    USE: when working with structural definitions.
    TRIGGERS: "template", "structure", "schema", "config", "definition".
    NOT: for locale-specific content (use authored trait).
    RELATES: Page (structure), Block (structure), Locale (config).
