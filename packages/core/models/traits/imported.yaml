# packages/core/models/traits/imported.yaml
# Imported trait definition (Data Origin: external data brought in)
# v0.12.5

trait:
  key: imported
  display_name: Imported
  description: |
    External data brought in from external sources. Linguistic corpora, market
    data, discovered keywords. "We imported this from [source]."
  color: "#8b5cf6"
  border_style: dotted
  border_width: 2
  unicode_border: "┈"
  icon:
    web: "download"
    terminal: "◇"

  node_count: 20  # Computed by generator

  context_budget:
    min: 200
    max: 800
    default: 400

  retrieval_defaults:
    traversal_depth: 1
    context_budget: 200
    token_estimate: 50

  examples:
    - Term
    - Expression
    - Pattern
    - CultureRef
    - SEOKeyword
    - GEOQuery
    - Culture
    - Style

  llm_context: |
    USE: when accessing imported knowledge data.
    TRIGGERS: "imported", "external", "corpus", "discovered", "market data".
    NOT: for generated content (use generated trait).
    RELATES: Term (knowledge), SEOKeyword (knowledge), Culture (locale).
