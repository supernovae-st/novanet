    locale: 244             # gray
    geography: 43           # emerald (#10b981)
    knowledge: 141          # purple (includes SEO/GEO nodes)
    # ORG (6 layers - seo/geo removed in v11.4)
    semantic: 208           # orange
    foundation: 33          # blue
    structure: 45           # cyan
    instruction: 178        # yellow
    output: 41              # green
    # Traits (v0.12.0: Data Origin naming)
    defined: 33     # blue
    authored: 41    # green
    imported: 141   # purple
