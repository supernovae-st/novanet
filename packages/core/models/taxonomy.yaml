    global: 37      # cyan
    project: 141    # purple
    # Layers (matching 256-color approximations)
    config: 244     # gray
    knowledge: 141  # purple
    foundation: 33  # blue
    structure: 45   # cyan
    semantic: 208   # orange
    instruction: 178 # yellow
    output: 41      # green
    seo: 205        # pink
    # Traits
    invariant: 33   # blue
    localized: 41   # green
    knowledge_trait: 141  # purple (avoid collision with layer)
    derived: 245    # gray
    job: 240        # dark gray
    # Arc families
    ownership_arc: 33   # blue
    localization_arc: 41  # green
    semantic_arc: 208   # orange
    generation_arc: 141 # purple
    mining_arc: 205     # pink

  palette_16:
