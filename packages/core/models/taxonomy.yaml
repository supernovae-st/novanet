# packages/core/models/taxonomy.yaml
# Source of truth for NovaNet taxonomy structure
# v11.5.0 — Layer Clarification (Locale → config)
#
# This file defines:
# - 2 NodeRealms (SHARED, ORG) with nested NodeLayers
# - 5 NodeTraits (locale behavior) with visual encoding
# - 5 ArcFamilies (arc classification) with visual encoding
# - 2 ArcScopes (intra_realm / cross_realm)
# - 5 ArcCardinalities (zero_to_one / one_to_one / one_to_many / many_to_one / many_to_many)
# - Terminal palette for TUI graceful degradation
#
# v11.5 Changes:
# - MOVE: Locale from shared/locale to shared/config (invariant definition, not parameter)
# - CLARIFY: shared/config = all invariant definitions (Locale, EntityCategory, SEOKeywordFormat)
# - CLARIFY: shared/locale = locale-specific settings only (Culture, Style, Formatting, etc.)
# - RULE: config layer = invariant trait, locale layer = knowledge trait
#
# v11.4 Changes:
# - SEO/GEO moved from org to shared/knowledge (Knowledge Atoms pattern)
# - REMOVE: org/seo layer (SEOKeyword now in shared/knowledge)
# - REMOVE: org/geo layer (GEOQuery now in shared/knowledge)
# - ADD: shared/config layer for SEOKeywordFormat (EntityCategory pattern)
# - CONSOLIDATE: SEOQuestion, SEOComparison, SEOPreposition → SEOKeyword + format
# - SIMPLIFY: GEOMetrics removed (GEOAnswer IS the time-series)
# - SHARED: 4 layers (config, locale, geography, knowledge)
# - ORG: 6 layers (config, semantic, foundation, structure, instruction, output)
#
# v11.3 Changes:
# - SHARED: 3 layers (locale, geography, knowledge)
# - OrgConfig: merged Organization + Tenant into single node
# (Note: v11.4 adds config layer back to shared for classifications)
#
# v11.2 Changes:
# - Realm renames: global→shared, tenant→org (clearer semantics)
# - Trait split: derived→generated+aggregated (LLM output vs computed metrics)
#
# Generated artifacts:
# - packages/db/seed/00.5-taxonomy.cypher (Realm, Layer, Trait, ArcFamily + hierarchy)
# - packages/core/src/graph/hierarchy.ts (realm→layer tree, auto-generated)
#
# All meta-nodes receive double-label :Meta (e.g., :Meta:Realm)
# Query all meta-nodes: MATCH (n:Meta) RETURN n

version: "11.5.0"

# =============================================================================
# NODE REALMS (2) — WHERE does the node live?
# =============================================================================
# Each realm contains layers (functional classification)
# Traversal: TENANT can read GLOBAL (one-way)
# Isolation: Tenant A cannot see Tenant B (multi-tenant boundary)

node_realms:
  - key: shared
    display_name: Shared
    emoji: "🌍"
    color: "#2aa198"
    llm_context: |
      Shared across ALL organizations. Universal locale knowledge that applies
      everywhere: cultural norms, linguistic patterns, formatting conventions.
      These nodes are READ-ONLY. No Entity here - Entity lives in ORG realm.
      v11.5: Locale moved to config layer (invariant definition).
      v11.4: SEO/GEO nodes now live in shared/knowledge. SEOKeywordFormat and
      EntityCategory classifications live in shared/config.
    layers:
      - key: config
        display_name: Config
        emoji: "⚙️"
        color: "#64748b"
        llm_context: |
          Invariant definitions for shared realm. All nodes have invariant trait.
          v11.5: Locale (BCP-47 codes), EntityCategory (v11.1, ADR-017),
          SEOKeywordFormat (v11.4). These are universal DEFINITIONS, not
          locale-specific parameters.

      - key: locale
        display_name: Locale
        emoji: "🌐"
        color: "#64748b"
        llm_context: |
          Locale-specific SETTINGS (1:1 with Locale). All nodes have knowledge trait.
          v11.5: Culture, Style, Formatting, Adaptation, Market, Slugification.
          These contain discovered/curated data specific to each locale.
          Pattern: Locale (config) --[:HAS_X]--> Setting (locale).

      - key: geography
        display_name: Geography
        emoji: "🗺️"
        color: "#10b981"
        llm_context: |
          Geographic and economic classifications. Continents, regions, sub-regions,
          economic zones, income groups, lending categories. World Bank data
          structure for geographic context.

      - key: knowledge
        display_name: Knowledge
        emoji: "📚"
        color: "#8b5cf6"
        llm_context: |
          Deep locale-specific knowledge for native content generation.
          Knowledge containers (TermSet, ExpressionSet, etc.) and atoms
          (Term, Expression, Pattern, etc.). Language families, cultural realms,
          population clusters. Expertise that makes content feel NATIVE.
          v11.4: SEO/GEO nodes now here (SEOKeyword, GEOQuery) — universal
          market data following Knowledge Atoms pattern.

  - key: org
    display_name: Organization
    emoji: "🏢"
    color: "#6c71c4"
    llm_context: |
      Organization-specific realm. Contains Projects, Entities, Pages, Blocks,
      and all generated outputs. Org A cannot see Org B (multi-tenant isolation).
      Project owns Entity (HAS_ENTITY). Page/Block reference Entity via
      USES_ENTITY (N:M). AI context assembly follows arcs via spreading activation.
    layers:
      - key: config
        display_name: Config
        emoji: "⚙️"
        color: "#64748b"
        llm_context: |
          Organization configuration root. OrgConfig node is the entry point
          for org-level traversal. Links to Projects (HAS_PROJECT).

      - key: semantic
        display_name: Semantic Layer
        emoji: "💡"
        color: "#f97316"
        llm_context: |
          Invariant entities (Entity) and their localizations (EntityContent).
          Entity belongs to Project (HAS_ENTITY) and can be referenced by
          Pages/Blocks via USES_ENTITY. Entities link via SEMANTIC_LINK for
          spreading activation during generation. SEO/GEO targeting via
          cross-realm arcs (TARGETS, MONITORS_GEO) to shared/knowledge.

      - key: foundation
        display_name: Foundation
        emoji: "🏛️"
        color: "#3b82f6"
        llm_context: |
          Project identity. Project, Brand, ProjectContent. Each Organization
          has 1 company project (branding) + N product projects. Core
          identity that anchors ALL content generation for each project.

      - key: structure
        display_name: Structure
        emoji: "🏗️"
        color: "#06b6d4"
        llm_context: |
          Information architecture. Pages, blocks, and their types. Defines
          the SKELETON of the website - what pages exist, what blocks compose
          each page, and the rules for each block type.

      - key: instruction
        display_name: Instructions
        emoji: "📝"
        color: "#eab308"
        llm_context: |
          Generation directives. Prompts and rules that guide the LLM during
          content generation. PagePrompt for page-level guidance, BlockPrompt
          for block-specific instructions, BlockRules for constraints.

      - key: output
        display_name: Generated Output
        emoji: "✨"
        color: "#22c55e"
        llm_context: |
          LLM-generated content. The final localized pages and blocks ready
          for rendering. These are the RESULTS of the generation pipeline -
          created by combining foundation, structure, semantic, and
          instruction nodes with locale knowledge.

# =============================================================================
# NODE TRAITS (5) — HOW does the node behave across locales?
# =============================================================================
# Visual encoding: border_style maps to CSS border-style / ratatui border
# v11.2: Split derived → generated + aggregated (still 5 total: invariant, localized, knowledge, generated, aggregated)

node_traits:
  - key: invariant
    display_name: Invariant
    color: "#3b82f6"
    border_style: solid
    border_width: 2
    unicode_border: "─"
    llm_context: |
      Nodes that do not change between locales. Structural definitions,
      configuration, and invariant business logic. Always the same
      regardless of target locale.

  - key: localized
    display_name: Localized
    color: "#22c55e"
    border_style: dashed
    border_width: 2
    unicode_border: "┄"
    llm_context: |
      Content generated natively per locale. NOT translated — each locale
      version is generated independently from the invariant Entity using
      locale-specific knowledge.

  - key: knowledge
    display_name: Knowledge
    color: "#8b5cf6"
    border_style: dotted
    border_width: 2
    unicode_border: "┈"
    llm_context: |
      Cultural and linguistic expertise per locale. Deep knowledge about
      how a locale communicates: voice, culture, formatting rules, lexicon,
      expressions. The foundation for native content generation.

  - key: generated
    display_name: Generated
    color: "#b58900"
    border_style: double
    border_width: 2
    unicode_border: "═"
    llm_context: |
      LLM-generated content output. Pages, blocks, and artifacts produced
      by the generation pipeline. These are the final outputs ready for
      rendering or export.

  - key: aggregated
    display_name: Aggregated
    color: "#6c71c4"
    border_style: dotted
    border_width: 3
    unicode_border: "┅"
    llm_context: |
      Computed metrics and analytics. Time-series data, performance snapshots,
      and other values aggregated from external sources or calculations.

# =============================================================================
# KIND RETRIEVAL DEFAULTS (v9.9) — Context Assembly Properties
# =============================================================================
# Default values per trait type for the v10 Context Assembly Engine.
# These properties are used by the engine to make autonomous traversal decisions.

kind_retrieval_defaults:
  invariant:
    traversal_depth: 2      # Max hops for structural traversal
    context_budget: 500     # Default token allocation
    token_estimate: 100     # Estimated tokens per instance
  localized:
    traversal_depth: 2
    context_budget: 800
    token_estimate: 150
  knowledge:
    traversal_depth: 1      # Shallow traversal for knowledge nodes
    context_budget: 200
    token_estimate: 50
  generated:
    traversal_depth: 1      # v11.2: Split from derived
    context_budget: 150
    token_estimate: 50
  aggregated:
    traversal_depth: 1      # v11.2: Split from derived
    context_budget: 80
    token_estimate: 20

# =============================================================================
# ARC FAMILIES (5) — WHAT kind of relationship is this?
# =============================================================================
# Visual encoding: stroke_style for CSS, arrow_style for Mermaid

arc_families:
  - key: ownership
    display_name: Ownership
    color: "#3b82f6"
    stroke_style: solid
    stroke_width: 2
    arrow_style: "-->"
    default_traversal: eager  # v9.9: Always follow in context assembly
    llm_context: |
      Parent-child structural relationships. A node "owns" or "contains"
      another. Always follow in traversal (structural backbone).

  - key: localization
    display_name: Localization
    color: "#22c55e"
    stroke_style: dashed
    stroke_width: 2
    arrow_style: ".->"
    default_traversal: eager  # v9.9: Always follow for content localization
    llm_context: |
      Links between invariant nodes and their locale-specific content.
      Includes locale knowledge edges (Locale → LocaleVoice, etc.) and
      content localization edges (Entity → EntityContent, etc.).

  - key: semantic
    display_name: Semantic
    color: "#f97316"
    stroke_style: dotted
    stroke_width: 2
    arrow_style: ".->"
    default_traversal: lazy   # v9.9: Follow if budget allows, temperature-gated
    llm_context: |
      Meaning and entity connections. Spreading activation traversal with
      temperature-based filtering. Links entities to each other and to
      the pages/blocks that use them.

  - key: generation
    display_name: Generation
    color: "#8b5cf6"
    stroke_style: solid
    stroke_width: 3
    arrow_style: "==>"
    default_traversal: lazy   # v9.9: Follow for provenance if budget allows
    llm_context: |
      LLM generation pipeline flow. Provenance tracking from prompts to
      outputs, version history, and assembly relationships.

  - key: mining
    display_name: Mining
    color: "#ec4899"
    stroke_style: dashed
    stroke_width: 1
    arrow_style: "--o"
    default_traversal: skip   # v9.9: Skip unless explicitly requested
    llm_context: |
      SEO data extraction and targeting. Links mining runs to their
      targets and concepts to their SEO keyword targets.

# =============================================================================
# ARC SCOPES (2) — WHERE does the arc connect?
# =============================================================================
# Used for visual differentiation of cross-realm arcs

arc_scopes:
  - key: intra_realm
    display_name: Intra-Realm
    description: Arc connects nodes within the same realm
    stroke_modifier: none

  - key: cross_realm
    display_name: Cross-Realm
    description: Arc connects nodes across different realms
    stroke_modifier: opacity-60

# =============================================================================
# ARC CARDINALITIES (5) — HOW MANY connections?
# =============================================================================
# Used for arrow head styling

arc_cardinalities:
  - key: zero_to_one
    display_name: "0..1"
    description: Optional single target (nullable reference)

  - key: one_to_one
    display_name: "1:1"
    description: Single source to single target

  - key: one_to_many
    display_name: "1:N"
    description: Single source to multiple targets

  - key: many_to_one
    display_name: "N:1"
    description: Multiple sources to single target (inverse of one_to_many)

  - key: many_to_many
    display_name: "N:M"
    description: Multiple sources to multiple targets

# =============================================================================
# TERMINAL PALETTE — TUI graceful degradation
# =============================================================================
# Maps semantic color names to xterm-256 and 16-color palette indices

terminal:
  palette_256:
    # Realms (v11.2: shared + org)
    shared: 37       # cyan
    org: 141         # purple
    # Layers (v11.4: config, locale, geography, knowledge in shared; 6 in org)
    # SHARED (4 layers)
    config: 244             # gray (shared/config for classifications)
    locale: 244             # gray
    geography: 43           # emerald (#10b981)
    knowledge: 141          # purple (includes SEO/GEO nodes)
    # ORG (6 layers - seo/geo removed in v11.4)
    semantic: 208           # orange
    foundation: 33          # blue
    structure: 45           # cyan
    instruction: 178        # yellow
    output: 41              # green
    # Traits (v11.2: derived → generated + aggregated)
    invariant: 33   # blue
    localized: 41   # green
    knowledge_trait: 141  # purple (avoid collision with layer)
    generated: 136  # yellow-orange (b58900)
    aggregated: 141 # violet (6c71c4)
    # Arc families
    ownership_arc: 33   # blue
    localization_arc: 41  # green
    semantic_arc: 208   # orange
    generation_arc: 141 # purple
    mining_arc: 205     # pink

  palette_16:
    # Realms (v11.2: shared + org)
    shared: 6        # cyan
    org: 5           # magenta
    # Layers (v11.4: config, locale, geography, knowledge in shared; 6 in org)
    # SHARED (4 layers)
    config: 8              # bright black (shared/config for classifications)
    locale: 8              # bright black
    geography: 2           # green
    knowledge: 5           # magenta (includes SEO/GEO nodes)
    # ORG (6 layers - seo/geo removed in v11.4)
    semantic: 3            # yellow
    foundation: 4          # blue
    structure: 6           # cyan
    instruction: 11        # bright yellow
    output: 2              # green
    # Traits (v11.2: derived → generated + aggregated)
    invariant: 4    # blue
    localized: 2    # green
    knowledge_trait: 5  # magenta
    generated: 3    # yellow
    aggregated: 5   # magenta
    # Arc families
    ownership_arc: 4    # blue
    localization_arc: 2 # green
    semantic_arc: 3     # yellow
    generation_arc: 5   # magenta
    mining_arc: 13      # bright magenta
