# packages/core/models/taxonomy.yaml
# MINIMAL VERSION - Most taxonomy data now in individual YAML files
# v0.13.0
#
# This file now contains ONLY centralized config that isn't per-item:
# - arc_scopes (2 values, not worth individual files)
# - arc_cardinalities (5 values, not worth individual files)
# - class_retrieval_defaults (context assembly engine config)
# - terminal palette (TUI graceful degradation)
#
# MIGRATED TO INDIVIDUAL FILES (v0.12.5):
# - node_realms → realms/*.yaml (with nested layers → layers/*.yaml)
# - node_traits → traits/*.yaml
# - arc_families → arc-families/*.yaml
#
# Load pattern:
# - load_taxonomy_from_files() reads individual files + this file
# - load_taxonomy() (legacy) reads only this file

version: "0.13.0"

# =============================================================================
# ARC SCOPES (2) — WHERE does the arc connect?
# =============================================================================
# Used for visual differentiation of cross-realm arcs

arc_scopes:
  - key: intra_realm
    display_name: Intra-Realm
    description: Arc connects nodes within the same realm
    stroke_modifier: none

  - key: cross_realm
    display_name: Cross-Realm
    description: Arc connects nodes across different realms
    stroke_modifier: opacity-60

# =============================================================================
# ARC CARDINALITIES (5) — HOW MANY connections?
# =============================================================================
# Used for arrow head styling

arc_cardinalities:
  - key: zero_to_one
    display_name: "0..1"
    description: Optional single target (nullable reference)

  - key: one_to_one
    display_name: "1:1"
    description: Single source to single target

  - key: one_to_many
    display_name: "1:N"
    description: Single source to multiple targets

  - key: many_to_one
    display_name: "N:1"
    description: Multiple sources to single target (inverse of one_to_many)

  - key: many_to_many
    display_name: "N:M"
    description: Multiple sources to multiple targets

# =============================================================================
# CLASS RETRIEVAL DEFAULTS (v0.12.0) — Context Assembly Properties
# =============================================================================
# Default values per trait type for the v10 Context Assembly Engine.
# These properties are used by the engine to make autonomous traversal decisions.
# v0.12.0: Renamed from kind_retrieval_defaults, updated trait names.

class_retrieval_defaults:
  defined:
    traversal_depth: 2      # Max hops for structural traversal
    context_budget: 500     # Default token allocation
    token_estimate: 100     # Estimated tokens per instance
  authored:
    traversal_depth: 2
    context_budget: 800
    token_estimate: 150
  imported:
    traversal_depth: 1      # Shallow traversal for imported nodes
    context_budget: 200
    token_estimate: 50
  generated:
    traversal_depth: 1      # v11.2: Split from derived
    context_budget: 150
    token_estimate: 50
  retrieved:
    traversal_depth: 1      # v11.2: Split from derived
    context_budget: 80
    token_estimate: 20

# =============================================================================
