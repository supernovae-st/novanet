# packages/core/models/visual-encoding.yaml
# Visual presentation rules for NovaNet graph elements
# v11.7.0 — Unified Tree Architecture (everything is a node)
#
# IMPORTANT: Colors are NOT defined here.
# Colors come from taxonomy.yaml (node_realms, node_layers, node_traits, arc_families)
# This file defines HOW to USE those colors, not WHAT they are.
#
# Generated artifacts:
# - packages/core/src/graph/visual-encoding.ts (TypeScript types + helpers)
# - apps/studio/src/design/visual-encoding.json (runtime config)
# - tools/novanet/src/generated/visual_encoding.rs (TUI compile-time)

version: "11.7.0"

# =============================================================================
# CHANNEL MAPPING — Which visual channel encodes which facet
# =============================================================================
# References taxonomy.yaml color definitions (no hex values here)

channel_mapping:
  node:
    fill_color: layer        # Uses taxonomy.node_layers[].color
    border_style: trait      # Uses trait_borders below
    border_color: realm      # Uses taxonomy.node_realms[].color at 60% opacity
    icon: kind               # Uses kind_icons below
    spatial_grouping: realm  # Layout clustering by realm

  arc:
    stroke_color: family     # Uses taxonomy.arc_families[].color
    stroke_style: scope      # solid (intra_realm) vs dashed (cross_realm)
    arrow_head: cardinality  # single (1:1), double (1:N), crow's foot (N:M)
    label_position: auto     # center for short labels, offset for long

# =============================================================================
# NODE VISUAL STATES (Studio: CSS, TUI: ratatui::Style)
# =============================================================================

node_states:
  default:
    opacity: 1.0
    scale: 1.0
    shadow: none

  filtered:
    opacity: 0.3
    scale: 1.0
    shadow: none

  focused:
    opacity: 1.0
    scale: 1.05
    shadow: "0 0 12px {color}40"  # {color} = resolved facet color
    ring: "2px solid {color}"

  hover:
    opacity: 1.0
    scale: 1.02
    shadow: "0 2px 8px rgba(0,0,0,0.2)"

  selected:
    opacity: 1.0
    scale: 1.0
    ring: "2px solid white"

# =============================================================================
# ARC VISUAL STATES
# =============================================================================

arc_states:
  default:
    opacity: 0.6
    stroke_width: 1.5

  highlighted:
    opacity: 1.0
    stroke_width: 2.5
    animated: true  # marching ants effect

  filtered:
    opacity: 0.15
    stroke_width: 1

  hover:
    opacity: 1.0
    stroke_width: 2
    label_visible: true

# =============================================================================
# TRAIT BORDER STYLES — Studio (CSS) + TUI (Unicode)
# =============================================================================

trait_borders:
  invariant:
    css_style: solid
    css_width: 2px
    unicode_char: "─"
    unicode_style: light
    description: "Stable, doesn't change between locales"

  localized:
    css_style: dashed
    css_width: 2px
    css_dash_array: "6 3"
    unicode_char: "┄"
    unicode_style: dashed
    description: "Generated natively per locale"

  knowledge:
    css_style: dotted
    css_width: 2px
    css_dash_array: "2 2"
    unicode_char: "┈"
    unicode_style: dotted
    description: "Locale knowledge reference data"

  # v11.2: Split derived → generated + aggregated
  generated:
    css_style: double
    css_width: 3px
    unicode_char: "═"
    unicode_style: double
    description: "LLM-generated content output"

  aggregated:
    css_style: dotted
    css_width: 3px
    css_dash_array: "3 2"
    unicode_char: "┅"
    unicode_style: heavy_dotted
    description: "Computed metrics and analytics"

# =============================================================================
# SCOPE STROKE STYLES — Intra vs Cross realm arcs
# =============================================================================

scope_strokes:
  intra_realm:
    stroke_style: solid
    opacity: 1.0
    description: "Arc within same realm"

  cross_realm:
    stroke_style: dashed
    opacity: 0.7
    description: "Arc crossing realm boundaries"

# =============================================================================
# CARDINALITY ARROW HEADS
# =============================================================================

cardinality_arrows:
  zero_to_one:
    arrow_head: "circle"
    arrow_end: "arrow"
    description: "Optional single target"

  one_to_one:
    arrow_head: "none"
    arrow_end: "arrow"
    description: "Required single target"

  one_to_many:
    arrow_head: "none"
    arrow_end: "arrow-double"
    description: "Single source to multiple targets"

  many_to_many:
    arrow_head: "diamond"
    arrow_end: "arrow-double"
    description: "Multiple sources to multiple targets"

# =============================================================================
# ICON MAPPING — Lucide icons per Kind
# =============================================================================

kind_icons:
  # Global / Config (14 nodes — v11.1: +EntityCategory)
  Locale: globe
  EntityCategory: tag

  # Global / Knowledge — v10 Tiered Model
  # Technical tier
  Formatting: type
  Slugification: link
  Adaptation: sliders
  # Style tier
  Style: palette
  # Semantic tier
  TermSet: book-open
  ExpressionSet: message-circle
  PatternSet: puzzle
  CultureSet: heart
  TabooSet: alert-triangle
  AudienceSet: users

  # Global / Semantic — v10.3 Entity-Centric Architecture
  Entity: lightbulb
  EntityContent: globe

  # Project / Foundation
  Project: folder
  BrandIdentity: palette
  ProjectContent: languages

  # Project / Structure
  Page: file-text
  Block: square
  ContentSlot: inbox
  PageType: layout
  BlockType: component

  # Project / Semantic
  # v10.3: Concept, ConceptL10n, SearchIntent, TopicCluster removed — see Global / Semantic
  AudiencePersona: user
  ChannelSurface: monitor

  # Project / Instruction
  PagePrompt: message-square
  BlockPrompt: terminal
  BlockRules: shield-check
  BlockInstruction: clipboard-list
  PromptArtifact: file-code

  # Project / Output (v11.2: GenerationJob, EvaluationSignal removed)
  PageGenerated: file-check
  BlockGenerated: check-square
  OutputArtifact: package

  # Shared / SEO (v11.5: consolidated to shared/knowledge)
  SEOKeyword: search
  SEOKeywordMetrics: bar-chart-2

# =============================================================================
# ANIMATION PRESETS (Studio only)
# =============================================================================

animations:
  expand_node:
    duration_ms: 200
    easing: ease-out

  filter_change:
    duration_ms: 150
    easing: ease-in-out
    stagger_ms: 20  # per node

  focus_transition:
    duration_ms: 300
    easing: ease-out

  layout_change:
    duration_ms: 500
    easing: ease-in-out

  arc_highlight:
    duration_ms: 200
    easing: ease-out

# =============================================================================
# ARC ANIMATION EFFECTS (Studio only) — v11.6.2 FULL REDESIGN
# =============================================================================
# Each arc family has a UNIQUE SIGNATURE EFFECT that conveys semantic meaning.
# Colors come from taxonomy.yaml arc_families[].color
# Implementation: apps/studio/src/components/graph/edges/effects/*.tsx
#
# Design document: docs/plans/2026-02-11-arc-effects-redesign.md
#
# These effects make relationships visually distinct at a glance:
# - Pattern recognition: users learn to identify relationship types by animation
# - Semantic meaning: animations reflect the conceptual nature of each family
# - Accessibility: supplements color with motion for colorblind users
# - Tier scaling: effects adapt to graph density (ULTRA → MINIMAL)

arc_animation_effects:
  ownership:
    effect_name: power_conduit
    effect_file: PowerConduit.tsx
    description: "High-voltage cable with 3 large orbs traveling in convoy"
    visual_metaphor: "Power line delivering authority from parent to children"
    color: "#3b82f6"  # Blue (from taxonomy.yaml)
    layers:
      - cable_glow: "3-layer pulsing glow (blur 8px, 4s cycle)"
      - core_cable: "4px stroke, bright blue"
      - hot_wire: "1.5px white-blue center line"
      - orb_convoy: "3 large orbs (20px) with smooth spline motion"
      - orb_trails: "2-3 trailing segments per orb"
    timing:
      base_duration_s: 8  # Slow, authoritative
      cable_pulse_s: 4
      orb_spacing: "evenly distributed"
    tier_scaling:
      ultra: "3 orbs + 3 trails + full cable glow"
      high: "3 orbs + 2 trails"
      medium: "2 orbs + 1 trail"
    use_cases:
      - "HAS_PAGE, HAS_BLOCK, HAS_LAYER"
      - "Meta-graph structure (IN_REALM, IN_LAYER)"
      - "Containment relationships"

  localization:
    effect_name: dna_helix
    effect_file: DNAHelix.tsx
    description: "True double helix with strand crossing and base pair connectors"
    visual_metaphor: "Content DNA unwinding and adapting to locale"
    color: "#22c55e"  # Green (from taxonomy.yaml)
    layers:
      - strand_1: "Primary wave (±25px amplitude, phase 0°)"
      - strand_2: "Secondary wave (±25px amplitude, phase 180°)"
      - base_pairs: "White connectors appearing at strand crossings"
      - gene_markers: "Bright dots pulsing at intersections"
    timing:
      base_duration_s: 10  # Slow, methodical adaptation
      oscillation_period_s: 2.5
      connector_fade_s: 0.3
    tier_scaling:
      ultra: "4 atoms/strand + 4 connectors + 3 gene markers"
      high: "3 atoms/strand + 3 connectors + 2 gene markers"
      medium: "2 atoms/strand + 2 connectors + 1 gene marker"
    use_cases:
      - "HAS_CONTENT, FOR_LOCALE, PRIMARY_LOCALE"
      - "Invariant ↔ EntityContent bridges"
      - "Locale-specific content relationships"

  semantic:
    effect_name: synaptic_firing
    effect_file: SynapticFiring.tsx
    description: "Neural firing with bright pulses, spark showers, and residual glow"
    visual_metaphor: "Neurons firing and propagating meaning signals"
    color: "#f97316"  # Orange (from taxonomy.yaml)
    layers:
      - dormant_arc: "30% opacity baseline (resting state)"
      - firing_pulse: "White-hot leading edge, 0.4s travel time"
      - signal_decay: "Trailing decay segments behind pulse"
      - spark_shower: "3-5 particles ejected at target"
      - residual_glow: "Arc brightens for 1s after firing"
    timing:
      firing_interval_s: "2.7-4.1 (organic, varied)"
      pulse_travel_s: 0.4  # Fast signal
      spark_lifetime_s: 0.5
      residual_fade_s: 1.0
    tier_scaling:
      ultra: "3 pulses + 5 sparks + residual glow"
      high: "2 pulses + 4 sparks + residual glow"
      medium: "1 pulse + 2 sparks"
    use_cases:
      - "USES_ENTITY, SEMANTIC_LINK, RELATED_TO"
      - "Entity references from content"
      - "Concept connections"

  generation:
    effect_name: matrix_code_rain
    effect_file: MatrixCodeRain.tsx
    description: "Falling characters with parallax depth, processing bursts, and scanline"
    visual_metaphor: "Data being processed through AI neural network"
    color: "#8b5cf6"  # Purple (from taxonomy.yaml)
    layers:
      - data_stream: "Characters (0, 1, ▓, ▒) falling at varied speeds"
      - character_glow: "Blur 4px, parallax brightness variation"
      - processing_burst: "Bright flash at path midpoint"
      - scanline: "Horizontal line sweeping across arc"
      - output_pulse: "Target glows when data 'arrives'"
    timing:
      character_fall_s: "1.2-2.8 (varied for parallax)"
      processing_burst_s: 0.3  # Every ~2s
      scanline_sweep_s: 4
    tier_scaling:
      ultra: "10 chars + 3 bursts + scanline + output pulse"
      high: "8 chars + 2 bursts + output pulse"
      medium: "5 chars + 1 burst"
    use_cases:
      - "HAS_GENERATED, GENERATED_BY, USES_MODEL"
      - "Prompt → Output relationships"
      - "LLM pipeline flow"

  mining:
    effect_name: sonar_pulse
    effect_file: SonarPulse.tsx
    description: "Sonar ping with expanding rings, echo return, and data blips"
    visual_metaphor: "Sonar pinging and discovering data in the depths"
    color: "#ec4899"  # Pink (from taxonomy.yaml)
    layers:
      - ambient_scan: "Slow sweeping highlight (10s cycle)"
      - ping_source: "Bright pulse emitted from source node"
      - wave_rings: "4 concentric rings expanding along arc"
      - echo_return: "Faint reflection traveling back to source"
      - data_blips: "Bright dots at target when waves arrive"
    timing:
      ping_interval_s: 3  # Methodical scanning
      ring_expansion_s: 1.5
      echo_return_s: 2  # Slower return
      blip_flash_s: 0.5
    tier_scaling:
      ultra: "4 rings + echo return + ambient scan + 3 blips"
      high: "3 rings + echo return + 2 blips"
      medium: "2 rings + 1 blip"
    use_cases:
      - "HAS_SEO_TARGET, HAS_GEO_TARGET, HAS_METRICS"
      - "SEO/GEO mining relationships"
      - "Analytics and measurement links"

# Where to use arc animation effects:
# 1. Studio 2D Graph (FloatingEdge.tsx) — IMPLEMENTED v11.6.2
# 2. Studio 3D Graph (arcEffects/*.ts) — IMPLEMENTED v11.7.0
# 3. TUI (future) — ASCII animation patterns
# 4. Documentation diagrams — static representations

# =============================================================================
# 3D ARC ANIMATION EFFECTS (Studio 3D Graph) — v11.7.0
# =============================================================================
# 3D implementation extends 2D signature effects with:
# - Increased tube opacity (+35% from base)
# - Dust particles that TRAVEL along the arc with perpendicular drift
# - Helix motion overlay for zig-zag path effect
#
# Implementation: apps/studio/src/lib/graph3d/arcEffects/
# - dustParticles.ts: DustParticleSystem class (InstancedMesh)
# - shaderUtils.ts: calculateHelixOffset() for helix motion
# - PowerConduit3D.ts, DNAHelix3D.ts, SynapticFiring3D.ts, MatrixRain3D.ts, SonarPulse3D.ts

arc_animation_effects_3d:
  # Global 3D parameters
  global:
    tube_opacity_increase: 0.35  # +35% visibility vs 2D
    helix:
      amplitude: 2.0             # Distance from center line (visible at graph scale)
      frequency: 2.5             # Oscillations along arc length
    dust_particles:
      use_instanced_mesh: true   # Single draw call per arc
      billboarding: true         # Particles face camera
      perp_dist_base: 3.0        # Base perpendicular distance from tube
      perp_dist_variance: 1.5    # Variance in perpendicular distance

  # Per-family dust particle configuration (sizes scaled for graph visibility)
  ownership:
    effect_3d: PowerConduit3D
    tube_opacity: 0.20           # (0.15 × 1.35)
    dust:
      shape: diamond             # Energy crystal metaphor
      count: 8
      size: 1.5                  # Visible at graph scale
      drift: gravitational       # Slow sway while traveling
      opacity: 0.8
      travel_speed: 0.12         # Complete arc in ~8s
    description: "Glowing tube with diamond dust drifting toward children"

  localization:
    effect_3d: DNAHelix3D
    tube_opacity: 0.20
    dust:
      shape: circle              # Base pair metaphor
      count: 10
      size: 1.2
      drift: orbital             # Spiral around tube
      opacity: 0.7
      travel_speed: 0.12
    description: "Double helix particles with orbital drift"

  semantic:
    effect_3d: SynapticFiring3D
    tube_opacity: 0.20
    dust:
      shape: star                # Spark metaphor
      count: 12
      size: 1.0
      drift: sparkling           # Erratic movement
      opacity: 0.9
      travel_speed: 0.15
    description: "Fast firing pulses with sparkling star dust"

  generation:
    effect_3d: MatrixRain3D
    tube_opacity: 0.27           # (0.20 × 1.35) - brighter for emphasis
    dust:
      shape: triangle            # Data fragment metaphor
      count: 15
      size: 0.8
      drift: cascade             # Zigzag descent
      opacity: 0.8
      travel_speed: 0.25         # Fast cascade
    description: "Digital rain with cascading triangle fragments"

  mining:
    effect_3d: SonarPulse3D
    tube_opacity: 0.20
    dust:
      shape: hexagon             # Data crystal metaphor
      count: 6
      size: 1.8
      drift: pulsing             # Expand/contract rhythm
      opacity: 0.7
      travel_speed: 0.1          # Slow, methodical
    description: "Sonar rings with pulsing hexagon crystals"

# =============================================================================
# ACCESSIBILITY
# =============================================================================

accessibility:
  # Minimum contrast ratio for text on colored backgrounds
  min_contrast_ratio: 4.5

  # Alternative visual cues beyond color
  use_patterns: true
  use_icons: true
  use_borders: true

  # Focus indicators
  focus_ring_width: 2px
  focus_ring_color: white
  focus_ring_offset: 2px

# =============================================================================
# ICON SYSTEM — Single source of truth for ALL icons (v10.6)
# =============================================================================
# Pattern: Each category has `web:` (Lucide icon name) + `terminal:` (Unicode)
# Terminal icons are single-width Unicode symbols for monospace alignment
# This section supersedes inline emoji in taxonomy.yaml
#
# Generated artifacts:
# - packages/core/src/config/icons.generated.ts (TypeScript constants)
# - tools/novanet/src/tui/icons.rs (Rust constants for TUI)

