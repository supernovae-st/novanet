# packages/core/models/visual-encoding.yaml
# Visual presentation rules for NovaNet graph elements
# v11.6.0 — Navigation redesign (4 independent modes)
#
# IMPORTANT: Colors are NOT defined here.
# Colors come from taxonomy.yaml (node_realms, node_layers, node_traits, arc_families)
# This file defines HOW to USE those colors, not WHAT they are.
#
# Generated artifacts:
# - packages/core/src/graph/visual-encoding.ts (TypeScript types + helpers)
# - apps/studio/src/design/visual-encoding.json (runtime config)
# - tools/novanet/src/generated/visual_encoding.rs (TUI compile-time)

version: "11.6.0"

# =============================================================================
# CHANNEL MAPPING — Which visual channel encodes which facet
# =============================================================================
# References taxonomy.yaml color definitions (no hex values here)

channel_mapping:
  node:
    fill_color: layer        # Uses taxonomy.node_layers[].color
    border_style: trait      # Uses trait_borders below
    border_color: realm      # Uses taxonomy.node_realms[].color at 60% opacity
    icon: kind               # Uses kind_icons below
    spatial_grouping: realm  # Layout clustering by realm

  arc:
    stroke_color: family     # Uses taxonomy.arc_families[].color
    stroke_style: scope      # solid (intra_realm) vs dashed (cross_realm)
    arrow_head: cardinality  # single (1:1), double (1:N), crow's foot (N:M)
    label_position: auto     # center for short labels, offset for long

# =============================================================================
# NODE VISUAL STATES (Studio: CSS, TUI: ratatui::Style)
# =============================================================================

node_states:
  default:
    opacity: 1.0
    scale: 1.0
    shadow: none

  filtered:
    opacity: 0.3
    scale: 1.0
    shadow: none

  focused:
    opacity: 1.0
    scale: 1.05
    shadow: "0 0 12px {color}40"  # {color} = resolved facet color
    ring: "2px solid {color}"

  hover:
    opacity: 1.0
    scale: 1.02
    shadow: "0 2px 8px rgba(0,0,0,0.2)"

  selected:
    opacity: 1.0
    scale: 1.0
    ring: "2px solid white"

# =============================================================================
# ARC VISUAL STATES
# =============================================================================

arc_states:
  default:
    opacity: 0.6
    stroke_width: 1.5

  highlighted:
    opacity: 1.0
    stroke_width: 2.5
    animated: true  # marching ants effect

  filtered:
    opacity: 0.15
    stroke_width: 1

  hover:
    opacity: 1.0
    stroke_width: 2
    label_visible: true

# =============================================================================
# TRAIT BORDER STYLES — Studio (CSS) + TUI (Unicode)
# =============================================================================

trait_borders:
  invariant:
    css_style: solid
    css_width: 2px
    unicode_char: "─"
    unicode_style: light
    description: "Stable, doesn't change between locales"

  localized:
    css_style: dashed
    css_width: 2px
    css_dash_array: "6 3"
    unicode_char: "┄"
    unicode_style: dashed
    description: "Generated natively per locale"

  knowledge:
    css_style: dotted
    css_width: 2px
    css_dash_array: "2 2"
    unicode_char: "┈"
    unicode_style: dotted
    description: "Locale knowledge reference data"

  # v11.2: Split derived → generated + aggregated
  generated:
    css_style: double
    css_width: 3px
    unicode_char: "═"
    unicode_style: double
    description: "LLM-generated content output"

  aggregated:
    css_style: dotted
    css_width: 3px
    css_dash_array: "3 2"
    unicode_char: "┅"
    unicode_style: heavy_dotted
    description: "Computed metrics and analytics"

# =============================================================================
# SCOPE STROKE STYLES — Intra vs Cross realm arcs
# =============================================================================

scope_strokes:
  intra_realm:
    stroke_style: solid
    opacity: 1.0
    description: "Arc within same realm"

  cross_realm:
    stroke_style: dashed
    opacity: 0.7
    description: "Arc crossing realm boundaries"

# =============================================================================
# CARDINALITY ARROW HEADS
# =============================================================================

cardinality_arrows:
  zero_to_one:
    arrow_head: "circle"
    arrow_end: "arrow"
    description: "Optional single target"

  one_to_one:
    arrow_head: "none"
    arrow_end: "arrow"
    description: "Required single target"

  one_to_many:
    arrow_head: "none"
    arrow_end: "arrow-double"
    description: "Single source to multiple targets"

  many_to_many:
    arrow_head: "diamond"
    arrow_end: "arrow-double"
    description: "Multiple sources to multiple targets"

# =============================================================================
# ICON MAPPING — Lucide icons per Kind
# =============================================================================

kind_icons:
  # Global / Config (14 nodes — v11.1: +EntityCategory)
  Locale: globe
  EntityCategory: tag

  # Global / Knowledge — v10 Tiered Model
  # Technical tier
  Formatting: type
  Slugification: link
  Adaptation: sliders
  # Style tier
  Style: palette
  # Semantic tier
  TermSet: book-open
  ExpressionSet: message-circle
  PatternSet: puzzle
  CultureSet: heart
  TabooSet: alert-triangle
  AudienceSet: users

  # Global / Semantic — v10.3 Entity-Centric Architecture
  Entity: lightbulb
  EntityContent: globe

  # Project / Foundation
  Project: folder
  BrandIdentity: palette
  ProjectContent: languages

  # Project / Structure
  Page: file-text
  Block: square
  ContentSlot: inbox
  PageType: layout
  BlockType: component

  # Project / Semantic
  # v10.3: Concept, ConceptL10n, SearchIntent, TopicCluster removed — see Global / Semantic
  AudiencePersona: user
  ChannelSurface: monitor

  # Project / Instruction
  PagePrompt: message-square
  BlockPrompt: terminal
  BlockRules: shield-check
  BlockInstruction: clipboard-list
  PromptArtifact: file-code

  # Project / Output (v11.2: GenerationJob, EvaluationSignal removed)
  PageGenerated: file-check
  BlockGenerated: check-square
  OutputArtifact: package

  # Shared / SEO (v11.5: consolidated to shared/knowledge)
  SEOKeyword: search
  SEOKeywordMetrics: bar-chart-2

# =============================================================================
# ANIMATION PRESETS (Studio only)
# =============================================================================

animations:
  expand_node:
    duration_ms: 200
    easing: ease-out

  filter_change:
    duration_ms: 150
    easing: ease-in-out
    stagger_ms: 20  # per node

  focus_transition:
    duration_ms: 300
    easing: ease-out

  layout_change:
    duration_ms: 500
    easing: ease-in-out

  arc_highlight:
    duration_ms: 200
    easing: ease-out

# =============================================================================
# ARC ANIMATION EFFECTS (Studio only) — v11.6.1
# =============================================================================
# Each arc family has a unique animated visual effect.
# Colors come from taxonomy.yaml arc_families[].color
# Implementation: apps/studio/src/components/graph/edges/FloatingEdge.tsx
#
# These effects make relationships visually distinct at a glance:
# - Pattern recognition: users learn to identify relationship types by animation
# - Semantic meaning: animations reflect the conceptual nature of each family
# - Accessibility: supplements color with motion for colorblind users

arc_animation_effects:
  ownership:
    effect_name: energy_pulse
    description: "Multi-layer glowing pulses with trailing segments"
    visual_metaphor: "Power/authority flowing from parent to children"
    color: "#3b82f6"  # Blue (from taxonomy.yaml)
    layers:
      - outer_glow: "blur 8px, opacity 0.4"
      - middle_glow: "blur 4px, opacity 0.6"
      - core_pulse: "solid, opacity 0.95, drop-shadow"
      - hot_center: "white, opacity 1.0"
      - trail_segments: "5 particles, decreasing size/opacity"
    timing:
      base_duration_s: 1.6
      highlighted_duration_s: 1.0
    use_cases:
      - "HAS_PAGE, HAS_BLOCK, HAS_LAYER"
      - "Meta-graph structure (IN_REALM, IN_LAYER)"
      - "Containment relationships"

  localization:
    effect_name: dna_helix
    description: "Double strand oscillating perpendicular to path"
    visual_metaphor: "Content DNA adapting to locale context"
    color: "#22c55e"  # Green (from taxonomy.yaml)
    layers:
      - strand_1: "8 particles, primary color, oscillating +/-12px"
      - strand_2: "8 particles, secondary color, opposite phase"
      - connecting_rungs: "4 white dots between strands"
    timing:
      base_duration_s: 2.4
      oscillation_period_s: 0.6
    use_cases:
      - "HAS_CONTENT, FOR_LOCALE, PRIMARY_LOCALE"
      - "Invariant ↔ EntityContent bridges"
      - "Locale-specific content relationships"

  semantic:
    effect_name: neural_sparks
    description: "Fast zigzag particles with random oscillation"
    visual_metaphor: "Synapses firing, meaning connections activating"
    color: "#f97316"  # Orange (from taxonomy.yaml)
    layers:
      - spark_cores: "8 fast particles with trails"
      - zigzag_glow: "4 particles with random X/Y oscillation"
    timing:
      base_duration_s: 0.96  # Very fast (0.6x normal)
      oscillation_period_s: 0.15
    use_cases:
      - "USES_ENTITY, SEMANTIC_LINK, RELATED_TO"
      - "Entity references from content"
      - "Concept connections"

  generation:
    effect_name: matrix_code
    description: "Rectangular character blocks with flickering effect"
    visual_metaphor: "AI/LLM processing data, digital information flow"
    color: "#8b5cf6"  # Purple (from taxonomy.yaml)
    layers:
      - character_glow: "blur 2px background"
      - character_block: "rounded rectangles, auto-rotate along path"
      - bright_center: "flickering white line simulating characters"
      - scanline: "horizontal sweep effect"
    timing:
      base_duration_s: 1.44
      flicker_period_s: 0.3
    use_cases:
      - "HAS_GENERATED, GENERATED_BY, USES_MODEL"
      - "Prompt → Output relationships"
      - "LLM pipeline flow"

  mining:
    effect_name: radar_sweep
    description: "Scanning pulse with expanding detection rings"
    visual_metaphor: "Radar/sonar discovering and tracking data"
    color: "#ec4899"  # Pink (from taxonomy.yaml)
    layers:
      - wide_sweep_glow: "blur 6px, opacity 0.3"
      - core_scanner: "main pulse with intense drop-shadow"
      - expanding_rings: "3 rings that expand and fade"
      - secondary_ping: "offset trailing pulse"
    timing:
      base_duration_s: 2.88  # Slower, methodical
      ring_expansion_s: 1.2
    use_cases:
      - "HAS_SEO_TARGET, HAS_GEO_TARGET, HAS_METRICS"
      - "SEO/GEO mining relationships"
      - "Analytics and measurement links"

# Where to use arc animation effects:
# 1. Studio 2D Graph (FloatingEdge.tsx) — IMPLEMENTED
# 2. Studio 3D Graph (future) — edge glow effects
# 3. TUI (future) — ASCII animation patterns
# 4. Documentation diagrams — static representations

# =============================================================================
# ACCESSIBILITY
# =============================================================================

accessibility:
  # Minimum contrast ratio for text on colored backgrounds
  min_contrast_ratio: 4.5

  # Alternative visual cues beyond color
  use_patterns: true
  use_icons: true
  use_borders: true

  # Focus indicators
  focus_ring_width: 2px
  focus_ring_color: white
  focus_ring_offset: 2px

# =============================================================================
# ICON SYSTEM — Single source of truth for ALL icons (v10.6)
# =============================================================================
# Pattern: Each category has `web:` (Lucide icon name) + `terminal:` (Unicode)
# Terminal icons are single-width Unicode symbols for monospace alignment
# This section supersedes inline emoji in taxonomy.yaml
#
# Generated artifacts:
# - packages/core/src/config/icons.generated.ts (TypeScript constants)
# - tools/novanet/src/tui/icons.rs (Rust constants for TUI)

icons:
  # ---------------------------------------------------------------------------
  # REALM ICONS — Where does the node live?
  # ---------------------------------------------------------------------------
  realms:
    shared:
      web: globe
      terminal: "◉"
      description: "Universal shared data (read-only)"
    org:
      web: building-2
      terminal: "◎"
      description: "Organization-specific data"

  # ---------------------------------------------------------------------------
  # LAYER ICONS — What functional category?
  # v11.5: 10 layers (4 shared + 6 org)
  # All terminal icons use single-width Unicode for monospace alignment
  # ---------------------------------------------------------------------------
  layers:
    # SHARED realm layers (4)
    config:
      web: settings
      terminal: "⚙"
      description: "Configuration and definitions"
    locale:
      web: globe
      terminal: "⊕"
      description: "Locale settings and formatting"
    geography:
      web: map
      terminal: "⊙"
      description: "Geographic classifications"
    knowledge:
      web: book-open
      terminal: "◈"
      description: "Locale expertise and knowledge atoms"
    # ORG realm layers (6)
    foundation:
      web: landmark
      terminal: "▣"
      description: "Project identity and branding"
    structure:
      web: layout
      terminal: "▤"
      description: "Information architecture"
    semantic:
      web: lightbulb
      terminal: "◆"
      description: "Entities and meaning"
    instruction:
      web: file-text
      terminal: "▧"
      description: "Generation directives"
    output:
      web: check-circle
      terminal: "●"
      description: "Generated content"

  # ---------------------------------------------------------------------------
  # TRAIT ICONS — How does the node behave across locales?
  # ---------------------------------------------------------------------------
  # v11.2: Removed job trait, split derived → generated + aggregated
  traits:
    invariant:
      web: lock
      terminal: "■"
      description: "Stable across all locales"
    localized:
      web: globe
      terminal: "□"
      description: "Generated natively per locale"
    knowledge:
      web: brain
      terminal: "◊"
      description: "Locale expertise data"
    generated:
      web: sparkles
      terminal: "★"
      description: "LLM-generated content output"
    aggregated:
      web: calculator
      terminal: "▪"
      description: "Computed metrics and analytics"

  # ---------------------------------------------------------------------------
  # ARC FAMILY ICONS — What kind of relationship?
  # ---------------------------------------------------------------------------
  arc_families:
    ownership:
      web: arrow-right
      terminal: "→"
      description: "Parent-child structural"
    localization:
      web: languages
      terminal: "⇢"
      description: "Locale content links"
    semantic:
      web: link
      terminal: "~"
      description: "Meaning connections"
    generation:
      web: sparkles
      terminal: "⇒"
      description: "LLM pipeline flow"
    mining:
      web: pickaxe
      terminal: "⇝"
      description: "SEO data extraction"

  # ---------------------------------------------------------------------------
  # UI STATE ICONS — Empty states, loading, status indicators
  # ---------------------------------------------------------------------------
  states:
    no_connection:
      web: wifi-off
      terminal: "⚠"
      description: "Database not connected"
    no_kinds:
      web: inbox
      terminal: "∅"
      description: "No node kinds found"
    no_results:
      web: search-x
      terminal: "◌"
      description: "Query returned nothing"
    no_instances:
      web: file-x
      terminal: "□"
      description: "Kind has no instances"
    loading:
      web: loader
      terminal: "◐"
      description: "Data loading in progress"
    success:
      web: check
      terminal: "✓"
      description: "Operation succeeded"
    error:
      web: x
      terminal: "✗"
      description: "Operation failed"
    warning:
      web: alert-triangle
      terminal: "⚠"
      description: "Warning condition"

  # ---------------------------------------------------------------------------
  # NAVIGATION ICONS — Tree controls, overlays
  # ---------------------------------------------------------------------------
  navigation:
    expanded:
      web: chevron-down
      terminal: "▼"
      description: "Node expanded"
    collapsed:
      web: chevron-right
      terminal: "▶"
      description: "Node collapsed"
    leaf:
      web: dot
      terminal: "·"
      description: "Leaf node (no children)"
    search:
      web: search
      terminal: "/"
      description: "Search mode"
    help:
      web: help-circle
      terminal: "?"
      description: "Help overlay"
    back:
      web: arrow-left
      terminal: "←"
      description: "Navigate back"
    copy:
      web: clipboard
      terminal: "□"
      description: "Copy to clipboard"

  # ---------------------------------------------------------------------------
  # DATA QUALITY ICONS — Audit mode, coverage indicators
  # ---------------------------------------------------------------------------
  quality:
    complete:
      web: check-circle
      terminal: "●"
      description: "All required fields present"
    partial:
      web: circle-dot
      terminal: "◐"
      description: "Some fields missing"
    empty:
      web: circle
      terminal: "○"
      description: "No data"
    required:
      web: asterisk
      terminal: "*"
      description: "Required field marker"
    optional:
      web: minus
      terminal: " "
      description: "Optional field marker"
    chart:
      web: bar-chart-2
      terminal: "≡"
      description: "Statistics/chart header"

  # ---------------------------------------------------------------------------
  # MODE ICONS — Navigation modes (1-6 keys)
  # ---------------------------------------------------------------------------
  modes:
    meta:
      web: database
      terminal: "M"
      description: "Meta-graph view"
    data:
      web: table
      terminal: "D"
      description: "Data instances view"
    overlay:
      web: layers
      terminal: "O"
      description: "Combined meta+data"
    query:
      web: filter
      terminal: "Q"
      description: "Faceted query"
    atlas:
      web: map
      terminal: "A"
      description: "Architecture atlas"
    audit:
      web: clipboard-check
      terminal: "U"
      description: "Data quality audit"

  # ---------------------------------------------------------------------------
  # COUNT ICONS — Statistics indicators for tree view (v11.6.1)
  # ---------------------------------------------------------------------------
  counts:
    layers_count:
      web: layers
      terminal: "▦"
      description: "Number of layers in realm"
    kinds_count:
      web: file-type
      terminal: "◇"
      description: "Number of node kinds"
    arcs_out:
      web: arrow-right
      terminal: "→"
      description: "Outgoing arc types"
    arcs_in:
      web: arrow-left
      terminal: "←"
      description: "Incoming arc types"
    props:
      web: list
      terminal: "⊞"
      description: "Properties (required/total)"
