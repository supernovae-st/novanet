# packages/core/models/organizing-principles.yaml
# Source of truth for NovaNet taxonomy structure
# v9.0.0 — Self-Describing Context Graph (faceted classification)
#
# This file defines:
# - 3 Realms (visibility boundaries)
# - 9 Layers (functional classification)
# - 5 Traits (locale behavior)
# - 5 ArcFamilies (arc classification)
#
# Generated artifacts:
# - packages/db/seed/00.5-organizing-principles.cypher (Realm, Layer, Trait, ArcFamily + hierarchy)
# - packages/core/src/graph/hierarchy.ts (realm→layer tree, auto-generated)
#
# All meta-nodes receive double-label :Meta (e.g., :Meta:Realm)
# Query all meta-nodes: MATCH (n:Meta) RETURN n

version: "9.0.0"

realms:
  - key: global
    display_name: Global
    emoji: "🌍"
    color: "#2aa198"
    llm_context: |
      Shared across ALL projects. Locale-specific knowledge that applies
      universally: cultural norms, linguistic patterns, voice guidelines,
      idiomatic expressions. These nodes are READ-ONLY at project level.
      Changes here affect all projects using that locale.
    layers:
      - key: config
        display_name: Configuration
        emoji: "⚙️"
        color: "#64748b"
        llm_context: |
          Core configuration nodes. Locale definitions with their properties
          (language code, region, writing direction). Entry point for all
          locale-specific knowledge traversal.

      - key: knowledge
        display_name: Locale Knowledge
        emoji: "📚"
        color: "#8b5cf6"
        llm_context: |
          Deep locale-specific knowledge for native content generation.
          Cultural norms, linguistic patterns, voice guidelines, idiomatic
          expressions, formatting conventions. This is what makes generated
          content feel NATIVE rather than translated.

  - key: project
    display_name: Project
    emoji: "📦"
    color: "#6c71c4"
    llm_context: |
      Business-specific nodes for a single project. Contains brand identity,
      page structure, semantic concepts, generation prompts, and localized
      outputs. These nodes define WHAT content to generate and HOW to
      structure it for this specific product/service.
    layers:
      - key: foundation
        display_name: Foundation
        emoji: "🏛️"
        color: "#3b82f6"
        llm_context: |
          Core project identity. Brand voice, visual identity, value
          proposition. These nodes anchor ALL content generation for the
          project - every generated block must align with foundation.

      - key: structure
        display_name: Structure
        emoji: "🏗️"
        color: "#06b6d4"
        llm_context: |
          Information architecture. Pages, blocks, and their types. Defines
          the SKELETON of the website - what pages exist, what blocks compose
          each page, and the rules for each block type.

      - key: semantic
        display_name: Semantic Layer
        emoji: "💡"
        color: "#f97316"
        llm_context: |
          Meaning and concepts. Invariant ideas (Concept) that get localized
          per locale (ConceptL10n). The WHAT of content - pricing tiers,
          features, benefits, use cases. Concepts link via SEMANTIC_LINK
          for spreading activation during generation.

      - key: instruction
        display_name: Instructions
        emoji: "📝"
        color: "#eab308"
        llm_context: |
          Generation directives. Prompts and rules that guide the LLM during
          content generation. PagePrompt for page-level guidance, BlockPrompt
          for block-specific instructions, BlockRules for constraints.

      - key: output
        display_name: Generated Output
        emoji: "✨"
        color: "#22c55e"
        llm_context: |
          LLM-generated content. The final localized pages and blocks ready
          for rendering. These are the RESULTS of the generation pipeline -
          created by combining foundation, structure, semantic, and
          instruction nodes with locale knowledge.

  - key: shared
    display_name: Shared
    emoji: "🎯"
    color: "#cb4b16"
    llm_context: |
      Cross-project resources that can be linked to multiple projects.
      SEO keywords and GEO seeds with their metrics. These enable
      competitive intelligence sharing across the portfolio.
    layers:
      - key: seo
        display_name: SEO Intelligence
        emoji: "🔍"
        color: "#ec4899"
        llm_context: |
          Search engine optimization data. Keywords with their localized
          forms, search volume metrics, and mining run history. Used to
          inject relevant keywords into generated content for organic
          search visibility.

      - key: geo
        display_name: GEO Intelligence
        emoji: "📍"
        color: "#ef4444"
        llm_context: |
          Geographic/local SEO data. Location-based seeds with their
          localized forms, metrics, and mining history. Used for local
          business visibility and location-specific content generation.

traits:
  - key: invariant
    display_name: Invariant
    color: "#3b82f6"
    llm_context: |
      Nodes that do not change between locales. Structural definitions,
      configuration, and invariant business logic. Always the same
      regardless of target locale.

  - key: localized
    display_name: Localized
    color: "#22c55e"
    llm_context: |
      Content generated natively per locale. NOT translated — each locale
      version is generated independently from the invariant Concept using
      locale-specific knowledge.

  - key: knowledge
    display_name: Knowledge
    color: "#8b5cf6"
    llm_context: |
      Cultural and linguistic expertise per locale. Deep knowledge about
      how a locale communicates: voice, culture, formatting rules, lexicon,
      expressions. The foundation for native content generation.

  - key: derived
    display_name: Derived
    color: "#9ca3af"
    llm_context: |
      Computed or aggregated data. Time-series metrics, analytics snapshots,
      and other values derived from external sources or calculations.

  - key: job
    display_name: Job
    color: "#6b7280"
    llm_context: |
      Background processing tasks. Mining runs, batch operations, and other
      asynchronous jobs that produce or update data nodes.

arc_families:
  - key: ownership
    display_name: Ownership
    color: "#3b82f6"
    arrow_style: "-->"
    llm_context: |
      Parent-child structural relationships. A node "owns" or "contains"
      another. Always follow in traversal (structural backbone).

  - key: localization
    display_name: Localization
    color: "#22c55e"
    arrow_style: ".->"
    llm_context: |
      Links between invariant nodes and their locale-specific content.
      Includes locale knowledge edges (Locale → LocaleVoice, etc.) and
      content localization edges (Concept → ConceptL10n, etc.).

  - key: semantic
    display_name: Semantic
    color: "#f97316"
    arrow_style: ".->"
    llm_context: |
      Meaning and concept connections. Spreading activation traversal with
      temperature-based filtering. Links concepts to each other and to
      the pages/blocks that use them.

  - key: generation
    display_name: Generation
    color: "#8b5cf6"
    arrow_style: "==>"
    llm_context: |
      LLM generation pipeline flow. Provenance tracking from prompts to
      outputs, version history, and assembly relationships.

  - key: mining
    display_name: Mining
    color: "#ec4899"
    arrow_style: "--o"
    llm_context: |
      SEO/GEO data extraction and targeting. Links mining runs to their
      targets and concepts to their SEO/GEO keyword targets.
