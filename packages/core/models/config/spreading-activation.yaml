# ═══════════════════════════════════════════════════════════════════════════════
# SPREADING ACTIVATION CONFIGURATION v1.0.0
# ═══════════════════════════════════════════════════════════════════════════════
#
# Mathematical model (from cognitive science):
#   A_j(t) = δ × A_j(t-1) + Σᵢ [w_ij × A_i(t-1) × decay(t) × semantic_boost(type)]
#
# Where:
#   - δ = retention_factor (how much previous activation remains)
#   - w_ij = edge weight (SEMANTIC_LINK.temperature)
#   - decay(t) = e^(-ρ × t) = exponential decay over steps
#   - semantic_boost = task-specific multiplier for semantic_type
#
# ═══════════════════════════════════════════════════════════════════════════════

default:
  # ───────────────────────────────────────────────────────────────────────────
  # Core Parameters (ρ, δ, T from cognitive science)
  # ───────────────────────────────────────────────────────────────────────────
  decay_factor: 0.01           # ρ - exponential decay over steps
  retention_factor: 0.5        # δ - activation retained between steps
  propagation_steps: 2         # T - maximum hops (default 2, can increase to 3)
  initial_activation: 1.0      # A₀ - starting activation at seed node

  # ───────────────────────────────────────────────────────────────────────────
  # Thresholds
  # ───────────────────────────────────────────────────────────────────────────
  activation_threshold: 0.3    # Minimum to continue spreading (edge filter)
  output_threshold: 0.1        # Minimum to include in final results

  # ───────────────────────────────────────────────────────────────────────────
  # Fan Effect Control (prevents over-spreading in dense graphs)
  # ───────────────────────────────────────────────────────────────────────────
  max_fan_out: 10              # Limit outgoing edges per node
  fan_penalty: 0.1             # Reduce activation for high-degree nodes

# ═══════════════════════════════════════════════════════════════════════════════
# TASK-SPECIFIC MODIFIERS
# ═══════════════════════════════════════════════════════════════════════════════
#
# Each task type can override default parameters and boost specific semantic types.
# semantic_boosts: multipliers applied to SEMANTIC_LINK.temperature based on type
# priority_filter: only include concepts with these priority levels
#

task_modifiers:
  # ───────────────────────────────────────────────────────────────────────────
  # CTA (Call-to-Action blocks)
  # Focus: urgency, value, action words
  # ───────────────────────────────────────────────────────────────────────────
  CTA:
    activation_threshold: 0.25   # Lower threshold = more context
    propagation_steps: 2
    semantic_boosts:
      urgency: 1.3               # Boost urgency-related concepts
      value: 1.2                 # Boost value propositions
      action: 1.15               # Boost action verbs
      is_action_on: 1.1          # Boost action relationships
    priority_filter: [critical, high]

  # ───────────────────────────────────────────────────────────────────────────
  # FAQ (Frequently Asked Questions)
  # Focus: definitions, explanations, type hierarchies
  # ───────────────────────────────────────────────────────────────────────────
  FAQ:
    activation_threshold: 0.40   # Higher threshold = more focused
    propagation_steps: 2
    semantic_boosts:
      definition: 1.3            # Boost definitions
      type_of: 1.2               # Boost taxonomic relations
      example: 1.1               # Boost examples
    priority_filter: [critical, high, medium]

  # ───────────────────────────────────────────────────────────────────────────
  # HERO (Hero sections)
  # Focus: actions, features, benefits
  # ───────────────────────────────────────────────────────────────────────────
  HERO:
    activation_threshold: 0.30
    propagation_steps: 2
    semantic_boosts:
      is_action_on: 1.2          # What can the product do
      includes: 1.1              # What features are included
      benefit: 1.15              # What benefits does it provide
    priority_filter: [critical, high]

  # ───────────────────────────────────────────────────────────────────────────
  # PRICING (Pricing tables, tier comparisons)
  # Focus: tier relationships, feature inclusions, value
  # ───────────────────────────────────────────────────────────────────────────
  PRICING:
    activation_threshold: 0.20   # Very low threshold = comprehensive context
    propagation_steps: 2
    semantic_boosts:
      includes: 1.3              # What's included in each tier
      type_of: 1.2               # Tier hierarchy
      value: 1.1                 # Value propositions
      opposite: 0.8              # Slightly penalize contrasts (focus on positives)
    priority_filter: [critical, high]

  # ───────────────────────────────────────────────────────────────────────────
  # TESTIMONIAL (Social proof, reviews)
  # Focus: related concepts, loose associations
  # ───────────────────────────────────────────────────────────────────────────
  TESTIMONIAL:
    activation_threshold: 0.35
    propagation_steps: 1         # Only 1 hop - stay close to core
    semantic_boosts:
      related: 1.2               # Loose associations
      benefit: 1.1               # Benefits mentioned
    priority_filter: [critical, high, medium]

  # ───────────────────────────────────────────────────────────────────────────
  # DEFAULT (fallback for unknown task types)
  # ───────────────────────────────────────────────────────────────────────────
  DEFAULT:
    activation_threshold: 0.30
    propagation_steps: 2
    semantic_boosts: {}          # No boosts - neutral spreading
    priority_filter: [critical, high, medium]

# ═══════════════════════════════════════════════════════════════════════════════
# SEMANTIC LINK TYPE DEFAULTS
# ═══════════════════════════════════════════════════════════════════════════════
#
# Default temperature values for each semantic link type.
# These are used when creating new SEMANTIC_LINK relationships.
#

semantic_link_defaults:
  is_action_on: 0.95    # Strong: A is an action performed on B
  has_action: 0.90      # Strong: B has A as an available action
  includes: 0.85        # Medium-strong: A includes B as a feature
  included_in: 0.80     # Medium: B is included in A
  type_of: 0.90         # Strong: A is a type/variant of B
  has_type: 0.85        # Medium-strong: B has A as a variant
  requires: 0.80        # Medium: A requires B to function
  required_by: 0.75     # Medium: B is required by A
  related: 0.60         # Weak: A and B are loosely related
  opposite: 0.40        # Weak: A and B are contrasting alternatives
