# models/views/project-layer.yaml
# Project scope: All per-project nodes (17 nodes with Brand Architecture)
id: project-layer
name: Project Layer
description: Per-project nodes from foundation to generated output
version: "0.12.4"

root:
  type: Project

include:
  # Foundation
  - relation: HAS_BRAND
    direction: outgoing
  - relation: HAS_CONTENT
    direction: outgoing
  - relation: SUPPORTS_LOCALE
    direction: outgoing
  - relation: DEFAULT_LOCALE
    direction: outgoing

  # Structure (v0.12.4: HAS_STRUCTURE removed per ADR-028)
  - relation: HAS_PAGE
    direction: outgoing
    include:
      - relation: HAS_INSTRUCTION
        direction: outgoing
      - relation: HAS_GENERATED
        direction: outgoing
      - relation: HAS_BLOCK
        direction: outgoing
        include:
          - relation: OF_TYPE
            direction: outgoing
          - relation: HAS_INSTRUCTION
            direction: outgoing
          - relation: HAS_GENERATED
            direction: outgoing

  # Semantic - v11.6: Use HAS_ENTITY for direct project ownership
  - relation: HAS_ENTITY
    direction: outgoing
    include:
      - relation: HAS_CONTENT
        direction: outgoing
      - relation: SEMANTIC_LINK
        direction: outgoing
      - relation: BELONGS_TO
        direction: outgoing

docs:
  title: "Project Layer View"
  category: overview
  description: |
    The Project scope contains all nodes specific to a single project.
    This is where content generation happens.

    **17 nodes organized by category (v0.12.4 Brand Architecture):**
    - **Foundation (6)**: Project, Brand, BrandDesign, BrandPrinciples, PromptStyle, ProjectContent
    - **Structure (2)**: Page, Block
    - **Semantic (2)**: Entity, EntityContent
    - **Instruction (4)**: BlockType, BlockInstruction, BlockRules, PromptArtifact
    - **Output (3)**: PageGenerated, BlockGenerated, OutputArtifact

    **Key insight:**
    The Project layer is where invariant structure meets localized output.
    Pages and Blocks are invariant scaffolding; PageGenerated and BlockGenerated are generated.

  layers:
    - name: Foundation
      nodes: [Project, Brand, BrandDesign, BrandPrinciples, PromptStyle, ProjectContent]
      color: blue
      description: Project root, brand architecture, and localized metadata

    - name: Structure
      nodes: [Page, Block]
      color: cyan
      description: Content scaffolding (invariant)

    - name: Semantic
      nodes: [Entity, EntityContent]
      color: green
      description: Meaning and knowledge (invariant + localized)

    - name: Instruction
      nodes: [BlockType, BlockInstruction, BlockRules, PromptArtifact]
      color: orange
      description: AI generation directives (invariant)

    - name: Output
      nodes: [PageGenerated, BlockGenerated, OutputArtifact]
      color: purple
      description: LLM-generated content (localized)

  examples:
    - name: Project overview
      description: Get project with all pages and locale support
      query: |
        MATCH (p:Project {key: $projectKey})
        OPTIONAL MATCH (p)-[:HAS_BRAND]->(b:Brand)
        OPTIONAL MATCH (p)-[:SUPPORTS_LOCALE]->(l:Locale)
        OPTIONAL MATCH (p)-[:DEFAULT_LOCALE]->(dl:Locale)
        OPTIONAL MATCH (p)-[:HAS_PAGE]->(page:Page)
        RETURN p.key AS project,
               p.name AS name,
               b.name AS brandName,
               dl.key AS defaultLocale,
               collect(DISTINCT l.key) AS supportedLocales,
               collect(DISTINCT page.key) AS pages
      params:
        projectKey: "qrcode-ai"

    - name: Page with blocks
      description: Get page structure with all blocks
      query: |
        MATCH (p:Project {key: $projectKey})-[:HAS_PAGE]->(page:Page {key: $pageKey})
        OPTIONAL MATCH (page)-[:HAS_BLOCK]->(b:Block)
        OPTIONAL MATCH (b)-[:OF_TYPE]->(bt:BlockType)
        RETURN page.key AS page,
               collect({
                 key: b.key,
                 type: bt.name,
                 position: b.position
               }) AS blocks
        ORDER BY b.position
      params:
        projectKey: "qrcode-ai"
        pageKey: "page-pricing"

    - name: Generation context
      description: Load full context for generating a page
      query: |
        MATCH (p:Project {key: $projectKey})-[:HAS_PAGE]->(page:Page {key: $pageKey})
        MATCH (page)-[:HAS_INSTRUCTION]->(pi:PageInstruction)
        OPTIONAL MATCH (page)-[:HAS_BLOCK]->(b:Block)
        OPTIONAL MATCH (b)-[:USES_ENTITY]->(c:Entity)
        OPTIONAL MATCH (c)-[:HAS_CONTENT]->(cl:EntityContent)-[:FOR_LOCALE]->(l:Locale {key: $locale})
        RETURN page.key AS page,
               pi.content AS instructions,
               collect(DISTINCT b.key) AS blocks,
               collect(DISTINCT {concept: c.key, title: cl.title}) AS concepts
      params:
        projectKey: "qrcode-ai"
        pageKey: "page-pricing"
        locale: "fr-FR"

    - name: Entity network
      description: Get concepts with semantic links
      query: |
        MATCH (p:Project {key: $projectKey})-[:USES_ENTITY]->(c:Entity)
        OPTIONAL MATCH (c)-[sl:SEMANTIC_LINK]->(related:Entity)
        WHERE sl.temperature >= 0.3
        RETURN c.key AS concept,
               collect({
                 related: related.key,
                 type: sl.type,
                 temperature: sl.temperature
               }) AS links
      params:
        projectKey: "qrcode-ai"

  notes:
    - "Project nodes are per-project - each project has its own instances"
    - "Invariant nodes (Page, Block, Entity) are defined once per project"
    - "Localized nodes (*Content/*Generated) are generated for each supported locale"
    - "The orchestrator uses this view to coordinate generation"
    - "Output nodes (PageGenerated, BlockGenerated) are LLM-generated, not human-written"
