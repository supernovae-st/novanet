# models/views/complete-graph.yaml
# Complete graph view showing all 43 node types and 64 arc types
# v10.1.0 — GEO removed, SEO via ConceptL10n
id: complete-graph
name: Complete Graph
description: Full NovaNet graph with all nodes and relations
version: "10.1.0"

root:
  type: Project

include:
  # Project foundation
  - relation: HAS_BRAND_IDENTITY
    direction: outgoing
  - relation: HAS_L10N
    direction: outgoing
  - relation: SUPPORTS_LOCALE
    direction: outgoing
  - relation: DEFAULT_LOCALE
    direction: outgoing

  # Pages and blocks
  - relation: HAS_PAGE
    direction: outgoing
    include:
      - relation: HAS_BLOCK
        direction: outgoing
      - relation: HAS_PROMPT
        direction: outgoing
      - relation: HAS_OUTPUT
        direction: outgoing
      - relation: LINKS_TO
        direction: outgoing
      - relation: SUBTOPIC_OF
        direction: outgoing

  # Concepts
  - relation: HAS_CONCEPT
    direction: outgoing
    include:
      - relation: SEMANTIC_LINK
        direction: outgoing
      - relation: HAS_L10N
        direction: outgoing
        include:
          - relation: HAS_SEO_TARGET
            direction: outgoing

docs:
  title: "Complete Graph View"
  category: overview
  description: |
    The complete NovaNet graph showing all 43 node types organized into three realms:
    - **Global (17 nodes)**: Locale + 10 knowledge containers + 6 atoms
    - **Shared (3 nodes)**: SEO nodes (SEOKeyword, SEOKeywordMetrics, SEOMiningRun)
    - **Project (23 nodes)**: Per-project foundation, structure, semantic, instruction, and output nodes

  layers:
    # GLOBAL SCOPE (17 nodes)
    - name: Global - Config
      nodes: [Locale]
      color: purple
      description: Locale configuration (BCP-47)

    - name: Global - Knowledge Containers
      nodes: [Formatting, Slugification, Adaptation, Style, TermSet, ExpressionSet, PatternSet, CultureSet, TabooSet, AudienceSet]
      color: purple
      description: 10 tiered knowledge containers (Technical, Style, Semantic)

    - name: Global - Knowledge Atoms
      nodes: [Term, Expression, Pattern, CultureRef, Taboo, AudienceTrait]
      color: purple
      description: 6 atomic knowledge elements

    - name: Global - Semantic
      nodes: [Entity, EntityL10n]
      color: purple
      description: "v10.3 Entity-Centric Architecture (replaces Concept/ConceptL10n)"

    # PROJECT SCOPE (20 nodes)
    - name: Project - Foundation
      nodes: [Project, BrandIdentity, ProjectL10n]
      color: blue
      description: Project foundation and branding

    - name: Project - Structure
      nodes: [Page, Block, ContentSlot, BlockType, PageType]
      color: cyan
      description: Page and block structure

    - name: Project - Semantic
      nodes: [AudiencePersona, ChannelSurface]
      color: green
      description: "Audience and channel targeting (v10.3: Entity/EntityL10n moved to Global)"

    - name: Project - Instruction
      nodes: [PagePrompt, BlockPrompt, BlockRules, BlockInstruction, PromptArtifact]
      color: orange
      description: "Generation instructions (v10.3: added BlockInstruction)"

    - name: Project - Output
      nodes: [PageL10n, BlockL10n, GenerationJob, OutputArtifact, EvaluationSignal]
      color: orange
      description: Generated content outputs

    # SHARED SCOPE (3 nodes)
    - name: Shared - SEO
      nodes: [SEOKeyword, SEOKeywordMetrics, SEOMiningRun]
      color: gray
      description: SEO keyword mining

  examples:
    - name: Count all nodes by type
      description: Get node counts for each label in the graph
      query: |
        MATCH (n)
        RETURN labels(n)[0] AS label, count(*) AS count
        ORDER BY count DESC

    - name: Get project with all pages
      description: Load a project and its page structure
      query: |
        MATCH (p:Project {key: $projectKey})
        OPTIONAL MATCH (p)-[:HAS_PAGE]->(page:Page)
        RETURN p.key AS project,
               collect(page.key) AS pages
      params:
        projectKey: "qrcode-ai"

    - name: Full graph statistics
      description: Overview of all node and relationship counts
      query: |
        CALL {
          MATCH (n) RETURN count(n) AS nodeCount
        }
        CALL {
          MATCH ()-[r]->() RETURN count(r) AS relCount
        }
        RETURN nodeCount, relCount

  notes:
    - "This view is for documentation and understanding the full schema"
    - "For generation tasks, use more specific views like page-generation or block-generation"
    - "The graph follows a scope hierarchy: Global > Shared > Project"
    - "Mermaid diagram is auto-generated from arc-kinds/ via MermaidGenerator"
    - "v10.1: 43 nodes, 64 arcs (GEO removed)"
