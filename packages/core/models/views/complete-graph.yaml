# models/views/complete-graph.yaml
# Complete graph view showing all 60 node types and 114 arc types
# v11.3.0 — 2-Realm Architecture (SHARED + ORG)
id: complete-graph
name: Complete Graph
description: Full NovaNet graph with all nodes and relations
version: "11.3.0"

root:
  type: Project

include:
  # Project foundation
  - relation: HAS_BRAND_IDENTITY
    direction: outgoing
  - relation: HAS_CONTENT
    direction: outgoing
  - relation: SUPPORTS_LOCALE
    direction: outgoing
  - relation: DEFAULT_LOCALE
    direction: outgoing

  # Pages and blocks
  - relation: HAS_PAGE
    direction: outgoing
    include:
      - relation: HAS_BLOCK
        direction: outgoing
      - relation: HAS_PROMPT
        direction: outgoing
      - relation: HAS_GENERATED
        direction: outgoing
      - relation: LINKS_TO
        direction: outgoing
      - relation: SUBTOPIC_OF
        direction: outgoing

  # v11.6: Project owns entities directly via HAS_ENTITY
  - relation: HAS_ENTITY
    direction: outgoing
    include:
      - relation: HAS_CONTENT
        direction: outgoing
      - relation: BELONGS_TO
        direction: outgoing
      - relation: SEMANTIC_LINK
        direction: outgoing

docs:
  title: "Complete Graph View"
  category: overview
  description: |
    The complete NovaNet graph showing all 60 node types organized into two realms:
    - **SHARED (4 layers)**: config, locale, geography, knowledge — Universal, READ-ONLY (39 nodes)
    - **ORG (6 layers)**: config, foundation, structure, semantic, instruction, output — Organization-specific (21 nodes)

  layers:
    # SHARED REALM (3 layers)
    - name: Shared - Locale
      nodes: [Locale, Formatting, Slugification, Adaptation, Style, Market, Culture]
      color: purple
      description: Core locale definitions (BCP-47) and locale-level settings

    - name: Shared - Geography
      nodes: [Continent, EconomicRegion, GeoRegion, GeoSubRegion, IncomeGroup, LendingCategory]
      color: green
      description: Geographic classifications and economic data

    - name: Shared - Knowledge
      nodes: [TermSet, ExpressionSet, PatternSet, CultureSet, TabooSet, AudienceSet, CategorySet, Term, Expression, Pattern, CultureRef, Taboo, AudienceTrait, EntityCategory]
      color: violet
      description: Knowledge containers and atoms

    # ORG REALM (8 layers) — v11.3
    - name: Org - Config
      nodes: [OrgConfig]
      color: blue
      description: Organization configuration entry point

    - name: Org - Foundation
      nodes: [Project, ProjectContent, BrandIdentity]
      color: blue
      description: Project foundation and branding

    - name: Org - Structure
      nodes: [Page, Block, ContentSlot]
      color: cyan
      description: Page and block structure

    - name: Org - Semantic
      nodes: [Entity, EntityContent, AudiencePersona, ChannelSurface]
      color: green
      description: Entities and audience targeting

    - name: Org - Instruction
      nodes: [PagePrompt, BlockPrompt, BlockRules, BlockInstruction, PageType, BlockType, PromptArtifact]
      color: orange
      description: Generation instructions and types

    - name: Org - SEO
      nodes: [SEOKeyword, SEOQuestion, SEOComparison, SEOPreposition, SEOKeywordMetrics]
      color: pink
      description: SEO keyword and question optimization

    - name: Org - GEO
      nodes: [GEOQuery, GEOAnswer, GEOMetrics]
      color: amber
      description: GEO AI visibility metrics (v11.3 split from SEO)

    - name: Org - Output
      nodes: [PageGenerated, BlockGenerated, OutputArtifact]
      color: green
      description: Generated content outputs

  examples:
    - name: Count all nodes by type
      description: Get node counts for each label in the graph
      query: |
        MATCH (n)
        RETURN labels(n)[0] AS label, count(*) AS count
        ORDER BY count DESC

    - name: Get project with all pages
      description: Load a project and its page structure
      query: |
        MATCH (p:Project {key: $projectKey})
        OPTIONAL MATCH (p)-[:HAS_PAGE]->(page:Page)
        RETURN p.key AS project,
               collect(page.key) AS pages
      params:
        projectKey: "qrcode-ai"

    - name: Full graph statistics
      description: Overview of all node and relationship counts
      query: |
        CALL {
          MATCH (n) RETURN count(n) AS nodeCount
        }
        CALL {
          MATCH ()-[r]->() RETURN count(r) AS relCount
        }
        RETURN nodeCount, relCount

  notes:
    - "This view is for documentation and understanding the full schema"
    - "For generation tasks, use more specific views like page-generation or block-generation"
    - "The graph follows a 2-realm hierarchy: SHARED (read-only) > ORG (business)"
    - "Mermaid diagram is auto-generated from arc-kinds/ via MermaidGenerator"
    - "v11.6: 60 nodes, 114 arcs (2-realm architecture)"
