# models/views/complete-graph.yaml
# Complete graph view showing all 65 node types and 124 arc types
# v11.0.0 — 2-Realm Architecture (GLOBAL + TENANT)
id: complete-graph
name: Complete Graph
description: Full NovaNet graph with all nodes and relations
version: "11.0.0"

root:
  type: Project

include:
  # Project foundation
  - relation: HAS_BRAND_IDENTITY
    direction: outgoing
  - relation: HAS_CONTENT
    direction: outgoing
  - relation: SUPPORTS_LOCALE
    direction: outgoing
  - relation: DEFAULT_LOCALE
    direction: outgoing

  # Pages and blocks
  - relation: HAS_PAGE
    direction: outgoing
    include:
      - relation: HAS_BLOCK
        direction: outgoing
      - relation: HAS_PROMPT
        direction: outgoing
      - relation: HAS_GENERATED
        direction: outgoing
      - relation: LINKS_TO
        direction: outgoing
      - relation: SUBTOPIC_OF
        direction: outgoing

  # v11.0: Entity is in TENANT realm semantic layer, accessed via USES_ENTITY from Page/Block

docs:
  title: "Complete Graph View"
  category: overview
  description: |
    The complete NovaNet graph showing all 65 node types organized into two realms:
    - **GLOBAL (2 layers)**: config, locale-knowledge — Universal, READ-ONLY
    - **TENANT (7 layers)**: config, foundation, structure, semantic, instruction, seo, output — Business-specific

  layers:
    # GLOBAL REALM (2 layers)
    - name: Global - Config
      nodes: [Locale, Formatting, Slugification, Adaptation, Style, Market, Culture]
      color: purple
      description: Locale configuration (BCP-47) and locale-level settings

    - name: Global - Locale Knowledge
      nodes: [TermSet, ExpressionSet, PatternSet, CultureSet, TabooSet, AudienceSet, Term, Expression, Pattern, CultureRef, Taboo, AudienceTrait]
      color: purple
      description: Knowledge containers and atoms

    # TENANT REALM (7 layers)
    - name: Tenant - Config
      nodes: [Tenant, Organization]
      color: blue
      description: Organization configuration

    - name: Tenant - Foundation
      nodes: [Project, ProjectContent, BrandIdentity]
      color: blue
      description: Project foundation and branding

    - name: Tenant - Structure
      nodes: [Page, Block, ContentSlot, BlockType, PageType]
      color: cyan
      description: Page and block structure

    - name: Tenant - Semantic
      nodes: [Entity, EntityContent, AudiencePersona, ChannelSurface]
      color: green
      description: Entities and audience targeting

    - name: Tenant - Instruction
      nodes: [PagePrompt, BlockPrompt, BlockRules, BlockInstruction, PromptArtifact]
      color: orange
      description: Generation instructions

    - name: Tenant - SEO
      nodes: [SEOKeyword, SEOQuestion, SEOComparison, SEOPreposition, GEOQuery, GEOAnswer, GEOMetrics, SEOKeywordMetrics, SEOMiningRun]
      color: gray
      description: SEO and GEO optimization (v11.0 moved to tenant)

    - name: Tenant - Output
      nodes: [PageGenerated, BlockGenerated, GenerationJob, OutputArtifact, EvaluationSignal]
      color: orange
      description: Generated content outputs

  examples:
    - name: Count all nodes by type
      description: Get node counts for each label in the graph
      query: |
        MATCH (n)
        RETURN labels(n)[0] AS label, count(*) AS count
        ORDER BY count DESC

    - name: Get project with all pages
      description: Load a project and its page structure
      query: |
        MATCH (p:Project {key: $projectKey})
        OPTIONAL MATCH (p)-[:HAS_PAGE]->(page:Page)
        RETURN p.key AS project,
               collect(page.key) AS pages
      params:
        projectKey: "qrcode-ai"

    - name: Full graph statistics
      description: Overview of all node and relationship counts
      query: |
        CALL {
          MATCH (n) RETURN count(n) AS nodeCount
        }
        CALL {
          MATCH ()-[r]->() RETURN count(r) AS relCount
        }
        RETURN nodeCount, relCount

  notes:
    - "This view is for documentation and understanding the full schema"
    - "For generation tasks, use more specific views like page-generation or block-generation"
    - "The graph follows a 2-realm hierarchy: GLOBAL (read-only) > TENANT (business)"
    - "Mermaid diagram is auto-generated from arc-kinds/ via MermaidGenerator"
    - "v11.0: 65 nodes, 124 arcs (2-realm architecture)"
