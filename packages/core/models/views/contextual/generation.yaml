# Contextual View: Generation
# Generation pipeline and outputs
id: generation
description: Generation pipeline and outputs
category: contextual
contextual: true
applicable_types: [Page, Block, PageGenerated, BlockGenerated]
modes: [data, overlay, query]

cypher: |
  MATCH (n {key: $nodeKey})
  WHERE n:Page OR n:Block OR n:PageGenerated OR n:BlockGenerated
  OPTIONAL MATCH (n)-[r1:HAS_GENERATED]->(generated)
  OPTIONAL MATCH (n)<-[r2:GENERATED_FOR]-(generated2)
  OPTIONAL MATCH (generated)-[r3:FOR_LOCALE]->(locale:Locale)
  WITH n,
       collect(DISTINCT generated) AS gen1,
       collect(DISTINCT generated2) AS gen2,
       collect(DISTINCT locale) AS locales,
       collect(DISTINCT r1) + collect(DISTINCT r2) + collect(DISTINCT r3) AS rels
  RETURN [n] + gen1 + gen2 + locales AS nodes,
         rels AS relationships

params:
  - name: nodeKey
    type: string
    required: true
    description: Key of the Page, Block, or Generated node
