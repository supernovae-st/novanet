# Contextual View: Locales
# Locale coverage and content status
id: locales
description: Locale coverage and content status
category: contextual
contextual: true
applicable_types: [Page, Entity, Project, Block]
modes: [data, overlay, query]

cypher: |
  MATCH (n {key: $nodeKey})
  WHERE n:Page OR n:Entity OR n:Project OR n:Block
  OPTIONAL MATCH (n)-[r:HAS_CONTENT|HAS_GENERATED]->(content)
  OPTIONAL MATCH (content)-[r2:FOR_LOCALE]->(locale:Locale)
  WITH n,
       collect(DISTINCT content) AS contents,
       collect(DISTINCT locale) AS locales,
       collect(DISTINCT r) + collect(DISTINCT r2) AS rels
  RETURN [n] + contents + locales AS nodes,
         rels AS relationships

params:
  - name: nodeKey
    type: string
    required: true
    description: Key of the Page, Entity, Project, or Block
