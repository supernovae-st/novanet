# models/views/shared-layer.yaml
# Shared scope: SEO targeting (3 nodes)
# v10.1.0 — GEO removed, SEO via EntityL10n
id: shared-layer
name: Shared Layer
description: SEO keywords independent of projects
version: "10.1.0"

# Root is Locale since SEO nodes are per-locale
root:
  type: Locale

include:
  # SEO nodes
  - relation: FOR_LOCALE
    direction: incoming
    targetTypes: [SEOKeyword]
    include:
      - relation: HAS_METRICS
        direction: outgoing
        targetTypes: [SEOKeywordMetrics]
  - relation: FOR_LOCALE
    direction: incoming
    targetTypes: [SEOMiningRun]

docs:
  title: "Shared Layer View"
  category: mining
  description: |
    The Shared scope contains nodes that are independent of specific projects
    but still locale-specific. These are reusable across multiple projects.

    **3 nodes (v10.1):**
    - **SEO**: SEOKeyword, SEOKeywordMetrics, SEOMiningRun

    **Key insight:**
    Shared nodes bridge global locale knowledge and project content.
    A keyword like "QR code generator" can be targeted by multiple projects.

    **v10.1 Architecture:**
    - SEOKeyword is linked to EntityL10n (locale-aligned targeting)
    - Pattern: EntityL10n -[:EXPRESSES]-> SEOKeyword -[:FOR_LOCALE]-> Locale

  layers:
    - name: SEO Keywords
      nodes: [SEOKeyword]
      color: blue
      description: Localized SEO keywords with search intent

    - name: SEO Metrics
      nodes: [SEOKeywordMetrics]
      color: green
      description: Search volume, difficulty, trends

    - name: SEO Mining
      nodes: [SEOMiningRun]
      color: gray
      description: Keyword discovery job tracking

  examples:
    - name: Top keywords by volume
      description: Get highest-volume SEO keywords for a locale
      query: |
        MATCH (kw:SEOKeyword)-[:FOR_LOCALE]->(l:Locale {key: $locale})
        MATCH (kw)-[:HAS_METRICS]->(m:SEOKeywordMetrics)
        RETURN kw.keyword AS keyword,
               kw.intent AS intent,
               m.search_volume AS volume,
               m.difficulty AS difficulty
        ORDER BY m.search_volume DESC
        LIMIT 20
      params:
        locale: "fr-FR"

    - name: Keywords targeted by concept (v10.1)
      description: Find all keywords a concept targets via EntityL10n
      query: |
        MATCH (c:Entity {key: $conceptKey})-[:HAS_L10N]->(cl:EntityL10n)-[:EXPRESSES]->(kw:SEOKeyword)
        WHERE (cl)-[:FOR_LOCALE]->(:Locale {key: $locale})
        OPTIONAL MATCH (kw)-[:HAS_METRICS]->(m:SEOKeywordMetrics)
        RETURN kw.value AS keyword,
               m.search_volume AS volume
        ORDER BY m.search_volume DESC
      params:
        conceptKey: "qr-code-generator"
        locale: "en-US"

    - name: Mining job status
      description: Check recent mining runs
      query: |
        MATCH (run:SEOMiningRun)-[:FOR_LOCALE]->(l:Locale {key: $locale})
        RETURN run.id AS runId,
               run.status AS status,
               run.keywords_found AS found,
               run.started_at AS started
        ORDER BY run.started_at DESC
        LIMIT 5
      params:
        locale: "fr-FR"

  notes:
    - "Shared nodes are project-independent but locale-specific"
    - "SEO keywords can be targeted by multiple projects' concepts"
    - "v10.1: SEOKeyword linked to EntityL10n (same locale)"
    - "Metrics are time-series - always use latest for current state"
