# models/views/_registry.yaml
version: "0.12.3"
description: NovaNet Unified View System (27 views - 19 in registry + 8 standalone)

# Simplified view registry with WORKING queries
# All queries return n, r, m pattern for proper graph visualization
#
# View Categories:
# - meta: Schema exploration (3 views)
# - data: Instance exploration (7 views)
# - contextual: Node-centered subgraphs (5 views)

# =============================================================================
# META VIEWS (3) - Schema exploration
# =============================================================================
views:
  - id: meta-complete
    description: Complete meta-graph (Realm, Layer, Class, Trait, ArcClass)
    icon:
      web: diamond
      terminal: "M"
    color: "#8b5cf6"
    category: meta
    modes: [meta]
    cypher: |
      MATCH (n:Schema)
      OPTIONAL MATCH (n)-[r]->(m:Schema)
      RETURN n, r, m
      LIMIT 500

  - id: meta-classes
    description: All NodeClasses with their Realm and Layer (v11.8 ADR-023)
    icon:
      web: boxes
      terminal: "C"
    color: "#6366f1"
    category: meta
    modes: [meta]
    cypher: |
      MATCH (c:Schema:Class)
      OPTIONAL MATCH (realm:Realm {key: c.realm})
      OPTIONAL MATCH (layer:Layer {key: c.layer})
      RETURN c, realm, layer
      LIMIT 200

  - id: meta-arcs
    description: ArcClasses with their families (v11.8 ADR-023)
    icon:
      web: git-branch
      terminal: "A"
    color: "#f59e0b"
    category: meta
    modes: [meta]
    cypher: |
      MATCH (ac:Schema:ArcClass)-[r:BELONGS_TO_FAMILY]->(af:Schema:ArcFamily)
      RETURN ac, r, af
      LIMIT 200

# =============================================================================
# DATA VIEWS (7) - Instance exploration
# =============================================================================

  - id: data-complete
    description: All instance nodes with relationships
    icon:
      web: globe
      terminal: "D"
    color: "#6366f1"
    category: data
    modes: [data]
    cypher: |
      MATCH (n) WHERE NOT n:Schema
      WITH n LIMIT 100
      OPTIONAL MATCH (n)-[r]->(m) WHERE NOT m:Schema
      RETURN n, r, m

  - id: data-locales
    description: Locales with their knowledge containers
    icon:
      web: languages
      terminal: "L"
    color: "#22c55e"
    category: data
    modes: [data]
    cypher: |
      MATCH (l:Locale)
      OPTIONAL MATCH (l)-[r:HAS_EXPRESSIONS|HAS_CULTURE|HAS_FORMATTING|HAS_MARKET|HAS_SLUGIFICATION]->(container)
      RETURN l, r, container
      LIMIT 300

  - id: data-entities
    description: Entities with content and categories
    icon:
      web: link
      terminal: "E"
    color: "#06b6d4"
    category: data
    modes: [data]
    cypher: |
      MATCH (e:Entity)
      OPTIONAL MATCH (e)-[r1:HAS_CONTENT]->(ec:EntityContent)
      OPTIONAL MATCH (e)-[r2:BELONGS_TO]->(cat:EntityCategory)
      OPTIONAL MATCH (ec)-[r3:FOR_LOCALE]->(l:Locale)
      RETURN e, r1, ec, r2, cat, r3, l
      LIMIT 200

  - id: data-geography
    description: Geographic hierarchy (Continent <- Region <- SubRegion)
    icon:
      web: map
      terminal: "G"
    color: "#14b8a6"
    category: data
    modes: [data]
    cypher: |
      MATCH (c:Continent)
      OPTIONAL MATCH (r:GeoRegion)-[rel1:IN_CONTINENT]->(c)
      OPTIONAL MATCH (s:GeoSubRegion)-[rel2:IN_REGION]->(r)
      RETURN c, rel1, r, rel2, s
      LIMIT 100

  - id: data-expressions
    description: Expressions in their sets
    icon:
      web: message-square
      terminal: "X"
    color: "#f97316"
    category: data
    modes: [data]
    cypher: |
      MATCH (es:ExpressionSet)-[r:CONTAINS]->(e:Expression)
      WITH es, r, e LIMIT 200
      OPTIONAL MATCH (l:Locale)-[r2:HAS_EXPRESSIONS]->(es)
      RETURN l, r2, es, r, e

  - id: data-seo
    description: SEO keywords with metrics
    icon:
      web: target
      terminal: "S"
    color: "#8b5cf6"
    category: data
    modes: [data]
    cypher: |
      MATCH (kw:SEOKeyword)
      OPTIONAL MATCH (ec:EntityContent)-[r1:TARGETS]->(kw)
      OPTIONAL MATCH (ec)-[r2:FOR_LOCALE]->(l:Locale)
      RETURN kw, r1, ec, r2, l
      LIMIT 200

  - id: data-project
    description: Project with pages and entities
    icon:
      web: folder-kanban
      terminal: "P"
    color: "#0ea5e9"
    category: data
    modes: [data]
    cypher: |
      MATCH (p:Project)
      OPTIONAL MATCH (p)-[r1:HAS_ENTITY]->(e:Entity)
      OPTIONAL MATCH (p)-[r2:HAS_PAGE]->(pg:Page)
      OPTIONAL MATCH (p)-[r3:HAS_BRAND]->(b:Brand)
      RETURN p, r1, e, r2, pg, r3, b
      LIMIT 200

# =============================================================================
# CONTEXTUAL VIEWS (5) - Node-centered subgraphs
# =============================================================================

  - id: ctx-locale
    description: Locale with all its knowledge
    icon:
      web: globe-2
      terminal: "l"
    color: "#22c55e"
    category: contextual
    contextual: true
    applicable_types: [Locale]
    modes: [data, overlay]
    cypher: |
      MATCH (locale:Locale {key: $nodeKey})
      OPTIONAL MATCH (locale)-[r]->(target) WHERE NOT target:Schema
      RETURN locale, r, target
      LIMIT 100

  - id: ctx-entity
    description: Entity with content and relationships
    icon:
      web: link-2
      terminal: "e"
    color: "#06b6d4"
    category: contextual
    contextual: true
    applicable_types: [Entity, EntityContent]
    modes: [data, overlay]
    cypher: |
      MATCH (e:Entity {key: $nodeKey})
      OPTIONAL MATCH (e)-[r1]->(target) WHERE NOT target:Schema
      OPTIONAL MATCH (source)-[r2]->(e) WHERE NOT source:Schema
      RETURN e, r1, target, r2, source
      LIMIT 100

  - id: ctx-project
    description: Project with all dependencies
    icon:
      web: folder-open
      terminal: "p"
    color: "#0ea5e9"
    category: contextual
    contextual: true
    applicable_types: [Project]
    modes: [data, overlay]
    cypher: |
      MATCH (p:Project {key: $nodeKey})
      OPTIONAL MATCH (p)-[r]->(target) WHERE NOT target:Schema
      RETURN p, r, target
      LIMIT 100

  - id: ctx-neighbors
    description: All direct connections (1 hop)
    icon:
      web: scan
      terminal: "n"
    color: "#f59e0b"
    category: contextual
    contextual: true
    applicable_types: []
    modes: [data, overlay]
    cypher: |
      MATCH (root {key: $nodeKey})
      OPTIONAL MATCH (root)-[r1]->(out) WHERE NOT out:Schema
      OPTIONAL MATCH (in)-[r2]->(root) WHERE NOT in:Schema
      RETURN root, r1, out, r2, in
      LIMIT 100

  - id: ctx-2hop
    description: Extended neighborhood (2 hops)
    icon:
      web: maximize-2
      terminal: "2"
    color: "#ec4899"
    category: contextual
    contextual: true
    applicable_types: []
    modes: [data, overlay]
    cypher: |
      MATCH (root {key: $nodeKey})
      OPTIONAL MATCH path = (root)-[*1..2]-(neighbor) WHERE NOT neighbor:Schema
      WITH root, relationships(path) AS rels, neighbor
      UNWIND rels AS r
      WITH DISTINCT root, r, startNode(r) AS s, endNode(r) AS t
      RETURN root, r, s, t
      LIMIT 200

# =============================================================================
# GENERATION VIEWS (4) - AI agent context assembly
# =============================================================================

  - id: gen-block
    description: Block generation context (entities, knowledge, locale)
    icon:
      web: square
      terminal: "b"
    color: "#10b981"
    category: generation
    contextual: true
    applicable_types: [Block]
    modes: [data, overlay]
    cypher: |
      MATCH (b:Block {key: $nodeKey})
      OPTIONAL MATCH (b)-[:USES_ENTITY]->(e:Entity)
      OPTIONAL MATCH (e)-[:HAS_CONTENT]->(ec:EntityContent)
      OPTIONAL MATCH (ec)-[:FOR_LOCALE]->(l:Locale)
      OPTIONAL MATCH (b)-[:OF_TYPE]->(bt:BlockType)
      OPTIONAL MATCH (b)<-[:HAS_BLOCK]-(p:Page)
      RETURN b, e, ec, l, bt, p
      LIMIT 100

  - id: gen-page
    description: Full page generation context (blocks, entities, structure)
    icon:
      web: layout
      terminal: "g"
    color: "#06b6d4"
    category: generation
    contextual: true
    applicable_types: [Page]
    modes: [data, overlay]
    cypher: |
      MATCH (p:Page {key: $nodeKey})
      OPTIONAL MATCH (p)-[:HAS_BLOCK*1..3]->(b:Block)
      OPTIONAL MATCH (b)-[:USES_ENTITY]->(e:Entity)
      OPTIONAL MATCH (e)-[:HAS_CONTENT]->(ec:EntityContent)
      OPTIONAL MATCH (p)-[:REFERENCES_PAGE]->(ref:Page)
      WITH p, collect(DISTINCT b) AS blocks, collect(DISTINCT e) AS entities,
           collect(DISTINCT ec) AS contents, collect(DISTINCT ref) AS anchors
      UNWIND ([p] + blocks + entities + contents + anchors) AS n
      RETURN DISTINCT n
      LIMIT 200

  - id: gen-entity-deep
    description: Entity deep analysis with semantic neighborhood
    icon:
      web: atom
      terminal: "d"
    color: "#8b5cf6"
    category: generation
    contextual: true
    applicable_types: [Entity, EntityContent]
    modes: [data, overlay]
    cypher: |
      MATCH (e:Entity {key: $nodeKey})
      OPTIONAL MATCH (e)-[:HAS_CONTENT]->(ec:EntityContent)
      OPTIONAL MATCH (ec)-[:FOR_LOCALE]->(l:Locale)
      OPTIONAL MATCH (e)-[:BELONGS_TO]->(cat:EntityCategory)
      OPTIONAL MATCH (b:Block)-[:USES_ENTITY]->(e)
      OPTIONAL MATCH (e)-[:SIMILAR_TO|REFERENCES*1..2]-(related:Entity)
      RETURN e, ec, l, cat, b, related
      LIMIT 150

  - id: gen-locale-brief
    description: Locale briefing (knowledge atoms, voice, culture)
    icon:
      web: book-open
      terminal: "L"
    color: "#f59e0b"
    category: generation
    contextual: true
    applicable_types: [Locale]
    modes: [data, overlay]
    cypher: |
      MATCH (l:Locale {key: $nodeKey})
      OPTIONAL MATCH (l)-[:HAS_CULTURE]->(culture:Culture)
      OPTIONAL MATCH (l)-[:HAS_STYLE]->(style:Style)
      OPTIONAL MATCH (l)-[:HAS_FORMATTING]->(fmt:Formatting)
      OPTIONAL MATCH (l)-[:HAS_TERMS]->(ts:TermSet)
      OPTIONAL MATCH (l)-[:HAS_EXPRESSIONS]->(es:ExpressionSet)
      OPTIONAL MATCH (ts)-[:CONTAINS_TERM]->(t:Term)
      OPTIONAL MATCH (es)-[:CONTAINS_EXPRESSION]->(ex:Expression)
      WITH l, culture, style, fmt, ts, es,
           collect(DISTINCT t)[0..20] AS terms,
           collect(DISTINCT ex)[0..20] AS expressions
      RETURN l, culture, style, fmt, ts, es, terms, expressions

  - id: gen-pipeline
    description: Full page generation pipeline (structure → generation → output)
    icon:
      web: workflow
      terminal: "P"
    color: "#ec4899"
    category: generation
    contextual: true
    applicable_types: [Page, PageGenerated]
    modes: [data, overlay]
    cypher: |
      MATCH (p:Page {key: $nodeKey})
      MATCH (l:Locale {key: $locale})
      MATCH (p)-[has_block:HAS_BLOCK]->(b:Block)-[:OF_TYPE]->(bt:BlockType)
      OPTIONAL MATCH (bt)-[:HAS_RULES]->(br:BlockRules {active: true})
      OPTIONAL MATCH (b)-[:HAS_INSTRUCTION]->(bi:BlockInstruction)
      MATCH (p)-[:REPRESENTS]->(e:Entity)
      MATCH (e)-[:HAS_CONTENT]->(ec:EntityContent)-[:FOR_LOCALE]->(l)
      OPTIONAL MATCH (l)-[:HAS_CULTURE]->(culture:Culture)
      OPTIONAL MATCH (l)-[:HAS_MARKET]->(market:Market)
      OPTIONAL MATCH (ec)-[:TARGETS]->(kw:SEOKeyword)
      MATCH (p)-[:HAS_GENERATED]->(pg:PageGenerated)-[:FOR_LOCALE]->(l)
      MATCH (pg)-[assembles:ASSEMBLES]->(bg:BlockGenerated)
      MATCH (b)-[:HAS_GENERATED]->(bg)
      RETURN DISTINCT p, l, b, has_block.order AS block_order, bt, br, bi,
             e, ec, culture, market, kw, pg, bg, assembles.order AS assembly_order
      ORDER BY has_block.order
      LIMIT 200

# =============================================================================
