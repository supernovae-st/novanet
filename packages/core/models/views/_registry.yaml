# models/views/_registry.yaml
version: "11.6.0"
description: NovaNet Core View Definitions

# Categories for UI grouping:
# - overview: Layer views (complete, shared, project)
# - generation: Orchestrator and sub-agent context views
# - knowledge: Locale and entity views
# - project: Project structure views
# - mining: SEO pipeline views
# - contextual: Node-specific views (contextual: true)

# =============================================================================
# OVERVIEW LAYER VIEWS (extracted from complete-graph)
# =============================================================================
views:
  # Complete graph (all 60 nodes)
  - id: complete-graph
    file: complete-graph.yaml
    description: Full NovaNet graph with all nodes and relations
    category: overview
    modes: [data, meta, overlay, query]

  # Realm layers (derived from complete-graph)
  - id: shared-layer
    file: shared-layer.yaml
    description: Locale configuration and knowledge (39 nodes)
    category: overview
    modes: [data, meta, overlay, query]

  - id: seo-keywords
    file: seo-keywords.yaml
    description: SEO keywords and metrics (3 nodes, shared realm)
    category: overview
    modes: [data, meta, overlay, query]

  - id: project-layer
    file: project-layer.yaml
    description: Per-project nodes from foundation to output (14 nodes)
    category: overview
    modes: [data, meta, overlay, query]

# =============================================================================
# GENERATION VIEWS (for orchestrator and sub-agents)
# =============================================================================

  - id: page-generation-context
    file: page-generation-context.yaml
    description: Full context for orchestrator to generate a page
    category: generation
    modes: [data, overlay, query]

  - id: block-generation
    file: block-generation.yaml
    description: Full context for sub-agent to generate a block
    category: generation
    modes: [data, overlay, query]

  - id: block-semantic-network
    file: block-semantic-network.yaml
    description: Block with concepts and spreading activation
    category: generation
    modes: [data, overlay, query]

# =============================================================================
# KNOWLEDGE VIEWS (locale and concepts)
# =============================================================================

  - id: locale-full-knowledge
    file: locale-full-knowledge.yaml
    description: Complete locale knowledge (Identity, Voice, Culture, Market, Lexicon)
    category: knowledge
    modes: [data, overlay, query]

  - id: entity-ecosystem
    file: entity-ecosystem.yaml
    description: Entity with content, SEO keywords, semantic links (v10.3)
    category: knowledge
    modes: [data, overlay, query]

# =============================================================================
# PROJECT VIEWS (project structure)
# =============================================================================

  - id: project-context
    file: project-context.yaml
    description: Project with supported locales and page inventory
    category: project
    modes: [data, overlay, query]

  - id: project-overview
    file: project-overview.yaml
    description: Project dashboard with pages, brand identity, and concepts
    category: project
    modes: [data, overlay, query]

# =============================================================================
# MINING VIEWS (SEO pipeline)
# =============================================================================

  - id: seo-pipeline
    file: seo-pipeline.yaml
    description: SEO keyword mining and optimization workflow
    category: mining
    modes: [data, overlay, query]

# =============================================================================
# CONTEXTUAL VIEWS (node-specific, shown in sidebar)
# =============================================================================

  # Page/Block hierarchy
  - id: composition
    file: contextual/composition.yaml
    description: Page/Block composition hierarchy
    category: contextual
    contextual: true
    applicable_types: [Page, Block]
    modes: [data, overlay, query]

  # Locale knowledge
  - id: knowledge
    file: contextual/knowledge.yaml
    description: Locale knowledge atoms (Terms, Expressions, Patterns)
    category: contextual
    contextual: true
    applicable_types: [Locale]
    modes: [data, overlay, query]

  # Geographic hierarchy
  - id: geographic
    file: contextual/geographic.yaml
    description: Geographic hierarchy (Country → Region → Continent)
    category: contextual
    contextual: true
    applicable_types: [Locale]
    modes: [data, overlay, query]

  # Project structure
  - id: project-structure
    file: contextual/project.yaml
    description: Project structure (Pages, Entities, Brand)
    category: contextual
    contextual: true
    applicable_types: [Project]
    modes: [data, overlay, query]

  # Brand identity
  - id: brand
    file: contextual/brand.yaml
    description: Brand identity configuration
    category: contextual
    contextual: true
    applicable_types: [Project, BrandIdentity]
    modes: [data, overlay, query]

  # Entity connections
  - id: entities
    file: contextual/entities.yaml
    description: Connected entities and semantic links
    category: contextual
    contextual: true
    applicable_types: [Page, Block, Entity]
    modes: [data, overlay, query]

  # SEO intel
  - id: seo-intel
    file: contextual/seo-intel.yaml
    description: SEO keywords, clusters, and metrics
    category: contextual
    contextual: true
    applicable_types: [Entity, Page, SEOKeyword]
    modes: [data, overlay, query]

  # GEO intel
  - id: geo-intel
    file: contextual/geo-intel.yaml
    description: GEO queries and AI-generated answers
    category: contextual
    contextual: true
    applicable_types: [Entity, GEOQuery]
    modes: [data, overlay, query]

  # Generation pipeline
  - id: generation-pipeline
    file: contextual/generation.yaml
    description: Generation pipeline and outputs
    category: contextual
    contextual: true
    applicable_types: [Page, Block, PageGenerated, BlockGenerated]
    modes: [data, overlay, query]

  # Entity categories
  - id: categories
    file: contextual/categories.yaml
    description: Entity category classification
    category: contextual
    contextual: true
    applicable_types: [Entity, EntityCategory]
    modes: [data, overlay, query]

  # Cross-realm connections
  - id: cross-realm
    file: contextual/cross-realm.yaml
    description: Cross-realm connections (org ↔ shared)
    category: contextual
    contextual: true
    applicable_types: [Entity, Page, Block, Project]
    modes: [data, overlay, query]

  # Locale coverage
  - id: locales
    file: contextual/locales.yaml
    description: Locale coverage and content status
    category: contextual
    contextual: true
    applicable_types: [Page, Entity, Project, Block]
    modes: [data, overlay, query]

  # Content per locale
  - id: content
    file: contextual/content.yaml
    description: Content per locale
    category: contextual
    contextual: true
    applicable_types: [Entity, Project]
    modes: [data, overlay, query]

  # Performance metrics
  - id: metrics
    file: contextual/metrics.yaml
    description: Performance metrics and analytics
    category: contextual
    contextual: true
    applicable_types: [SEOKeyword, SEOKeywordMetrics, GEOQuery, GEOAnswer]
    modes: [data, overlay, query]
