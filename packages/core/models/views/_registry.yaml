# models/views/_registry.yaml
version: "0.12.5"
description: NovaNet Unified View System (30 views - 20 in registry + 10 standalone)

# Simplified view registry with WORKING queries
# All queries return n, r, m pattern for proper graph visualization
#
# View Categories (reordered v0.12.5):
# - generation: AI agent context assembly (5 views) - FIRST for testing
# - meta: Schema exploration (3 views)
# - data: Instance exploration (7 views)
# - contextual: Node-centered subgraphs (5 views)

# =============================================================================
# GENERATION VIEWS (5) - AI agent context assembly - FIRST FOR TESTING
# =============================================================================
views:
  - id: gen-block
    description: Block generation context (entities, knowledge, locale)
    icon:
      web: square
      terminal: "b"
    color: "#10b981"
    category: generation
    contextual: true
    applicable_types: [Block]
    modes: [data, overlay]
    cypher: |
      MATCH (b:Block {key: $nodeKey})
      OPTIONAL MATCH (b)-[r1:USES_ENTITY]->(e:Entity)
      OPTIONAL MATCH (e)-[r2:HAS_CONTENT]->(ec:EntityContent)
      OPTIONAL MATCH (ec)-[r3:FOR_LOCALE]->(l:Locale)
      OPTIONAL MATCH (b)-[r4:OF_TYPE]->(bt:BlockType)
      OPTIONAL MATCH (b)<-[r5:HAS_BLOCK]-(p:Page)
      RETURN b, r1, e, r2, ec, r3, l, r4, bt, r5, p
      LIMIT 100

  - id: gen-page
    description: Full page generation context (blocks, entities, structure)
    icon:
      web: layout
      terminal: "g"
    color: "#06b6d4"
    category: generation
    contextual: true
    applicable_types: [Page]
    modes: [data, overlay]
    cypher: |
      MATCH (p:Page {key: $nodeKey})
      OPTIONAL MATCH (p)-[r1:HAS_BLOCK]->(b:Block)
      OPTIONAL MATCH (b)-[r2:USES_ENTITY]->(e:Entity)
      OPTIONAL MATCH (e)-[r3:HAS_CONTENT]->(ec:EntityContent)
      OPTIONAL MATCH (p)-[r4:REFERENCES_PAGE]->(ref:Page)
      RETURN p, r1, b, r2, e, r3, ec, r4, ref
      LIMIT 200

  - id: gen-entity-deep
    description: Entity deep analysis with semantic neighborhood
    icon:
      web: atom
      terminal: "d"
    color: "#8b5cf6"
    category: generation
    contextual: true
    applicable_types: [Entity, EntityContent]
    modes: [data, overlay]
    cypher: |
      MATCH (e:Entity {key: $nodeKey})
      OPTIONAL MATCH (e)-[r1:HAS_CONTENT]->(ec:EntityContent)
      OPTIONAL MATCH (ec)-[r2:FOR_LOCALE]->(l:Locale)
      OPTIONAL MATCH (e)-[r3:BELONGS_TO]->(cat:EntityCategory)
      OPTIONAL MATCH (b:Block)-[r4:USES_ENTITY]->(e)
      OPTIONAL MATCH (e)-[r5:SIMILAR_TO|REFERENCES]-(related:Entity)
      RETURN e, r1, ec, r2, l, r3, cat, r4, b, r5, related
      LIMIT 150

  - id: gen-locale-brief
    description: Locale briefing (knowledge atoms, voice, culture)
    icon:
      web: book-open
      terminal: "L"
    color: "#f59e0b"
    category: generation
    contextual: true
    applicable_types: [Locale]
    modes: [data, overlay]
    cypher: |
      MATCH (l:Locale {key: $nodeKey})
      OPTIONAL MATCH (l)-[r1:HAS_CULTURE]->(culture:Culture)
      OPTIONAL MATCH (l)-[r2:HAS_STYLE]->(style:Style)
      OPTIONAL MATCH (l)-[r3:HAS_FORMATTING]->(fmt:Formatting)
      OPTIONAL MATCH (l)-[r4:HAS_TERMS]->(ts:TermSet)
      OPTIONAL MATCH (l)-[r5:HAS_EXPRESSIONS]->(es:ExpressionSet)
      OPTIONAL MATCH (ts)-[r6:CONTAINS_TERM]->(t:Term)
      OPTIONAL MATCH (es)-[r7:CONTAINS_EXPRESSION]->(ex:Expression)
      RETURN l, r1, culture, r2, style, r3, fmt, r4, ts, r5, es, r6, t, r7, ex
      LIMIT 200

  - id: gen-pipeline
    description: Full page generation pipeline (structure → generation → output)
    icon:
      web: workflow
      terminal: "P"
    color: "#ec4899"
    category: generation
    contextual: true
    applicable_types: [Page, PageGenerated]
    modes: [data, overlay]
    cypher: |
      MATCH (p:Page {key: $nodeKey})
      MATCH (l:Locale {key: $locale})
      MATCH (p)-[r1:HAS_BLOCK]->(b:Block)-[r2:OF_TYPE]->(bt:BlockType)
      OPTIONAL MATCH (bt)-[r3:HAS_RULES]->(br:BlockRules {active: true})
      OPTIONAL MATCH (b)-[r4:HAS_INSTRUCTION]->(bi:BlockInstruction)
      MATCH (p)-[r5:REPRESENTS]->(e:Entity)
      MATCH (e)-[r6:HAS_CONTENT]->(ec:EntityContent)-[r7:FOR_LOCALE]->(l)
      OPTIONAL MATCH (l)-[r8:HAS_CULTURE]->(culture:Culture)
      OPTIONAL MATCH (l)-[r9:HAS_MARKET]->(market:Market)
      OPTIONAL MATCH (ec)-[r10:TARGETS]->(kw:SEOKeyword)
      MATCH (p)-[r11:HAS_GENERATED]->(pg:PageGenerated)-[r12:FOR_LOCALE]->(l)
      MATCH (pg)-[r13:ASSEMBLES]->(bg:BlockGenerated)
      MATCH (b)-[r14:HAS_GENERATED]->(bg)
      RETURN DISTINCT p, l, r1, b, r2, bt, r3, br, r4, bi, r5, e, r6, ec, r7,
             r8, culture, r9, market, r10, kw, r11, pg, r12, r13, bg, r14
      ORDER BY r1.order
      LIMIT 200

# =============================================================================
# META VIEWS (3) - Schema exploration
# =============================================================================

  - id: meta-complete
    description: Complete meta-graph (Realm, Layer, Class, Trait, ArcClass)
    icon:
      web: diamond
      terminal: "M"
    color: "#8b5cf6"
    category: meta
    modes: [meta]
    cypher: |
      MATCH (n:Schema)
      OPTIONAL MATCH (n)-[r]->(m:Schema)
      RETURN n, r, m
      LIMIT 500

  - id: meta-classes
    description: All NodeClasses with their Realm and Layer (v11.8 ADR-023)
    icon:
      web: boxes
      terminal: "C"
    color: "#6366f1"
    category: meta
    modes: [meta]
    cypher: |
      MATCH (realm:Schema:Realm)-[r1:HAS_LAYER]->(layer:Schema:Layer)-[r2:HAS_CLASS]->(c:Schema:Class)
      RETURN realm, r1, layer, r2, c
      LIMIT 200

  - id: meta-arcs
    description: ArcClasses with their families (v11.8 ADR-023)
    icon:
      web: git-branch
      terminal: "A"
    color: "#f59e0b"
    category: meta
    modes: [meta]
    cypher: |
      MATCH (ac:Schema:ArcClass)-[r:BELONGS_TO_FAMILY]->(af:Schema:ArcFamily)
      RETURN ac, r, af
      LIMIT 200

# =============================================================================
# DATA VIEWS (7) - Instance exploration
# =============================================================================

  - id: data-complete
    description: All instance nodes with relationships
    icon:
      web: globe
      terminal: "D"
    color: "#6366f1"
    category: data
    modes: [data]
    cypher: |
      MATCH (n) WHERE NOT n:Schema
      WITH n LIMIT 100
      OPTIONAL MATCH (n)-[r]->(m) WHERE NOT m:Schema
      RETURN n, r, m

  - id: data-locales
    description: Locales with their knowledge containers
    icon:
      web: languages
      terminal: "L"
    color: "#22c55e"
    category: data
    modes: [data]
    cypher: |
      MATCH (l:Locale)
      OPTIONAL MATCH (l)-[r:HAS_EXPRESSIONS|HAS_CULTURE|HAS_FORMATTING|HAS_MARKET|HAS_SLUGIFICATION]->(container)
      RETURN l, r, container
      LIMIT 300

  - id: data-entities
    description: Entities with content and categories
    icon:
      web: link
      terminal: "E"
    color: "#06b6d4"
    category: data
    modes: [data]
    cypher: |
      MATCH (e:Entity)
      OPTIONAL MATCH (e)-[r1:HAS_CONTENT]->(ec:EntityContent)
      OPTIONAL MATCH (e)-[r2:BELONGS_TO]->(cat:EntityCategory)
      OPTIONAL MATCH (ec)-[r3:FOR_LOCALE]->(l:Locale)
      RETURN e, r1, ec, r2, cat, r3, l
      LIMIT 200

  - id: data-geography
    description: Geographic hierarchy (Continent <- Region <- SubRegion)
    icon:
      web: map
      terminal: "G"
    color: "#14b8a6"
    category: data
    modes: [data]
    cypher: |
      MATCH (c:Continent)
      OPTIONAL MATCH (r:GeoRegion)-[rel1:IN_CONTINENT]->(c)
      OPTIONAL MATCH (s:GeoSubRegion)-[rel2:IN_REGION]->(r)
      RETURN c, rel1, r, rel2, s
      LIMIT 100

  - id: data-expressions
    description: Expressions in their sets
    icon:
      web: message-square
      terminal: "X"
    color: "#f97316"
    category: data
    modes: [data]
    cypher: |
      MATCH (es:ExpressionSet)-[r:CONTAINS]->(e:Expression)
      WITH es, r, e LIMIT 200
      OPTIONAL MATCH (l:Locale)-[r2:HAS_EXPRESSIONS]->(es)
      RETURN l, r2, es, r, e

  - id: data-seo
    description: SEO keywords with metrics
    icon:
      web: target
      terminal: "S"
    color: "#8b5cf6"
    category: data
    modes: [data]
    cypher: |
      MATCH (kw:SEOKeyword)
      OPTIONAL MATCH (ec:EntityContent)-[r1:TARGETS]->(kw)
      OPTIONAL MATCH (ec)-[r2:FOR_LOCALE]->(l:Locale)
      RETURN kw, r1, ec, r2, l
      LIMIT 200

  - id: data-project
    description: Project with pages and entities
    icon:
      web: folder-kanban
      terminal: "P"
    color: "#0ea5e9"
    category: data
    modes: [data]
    cypher: |
      MATCH (p:Project)
      OPTIONAL MATCH (p)-[r1:HAS_ENTITY]->(e:Entity)
      OPTIONAL MATCH (p)-[r2:HAS_PAGE]->(pg:Page)
      OPTIONAL MATCH (p)-[r3:HAS_BRAND]->(b:Brand)
      RETURN p, r1, e, r2, pg, r3, b
      LIMIT 200

# =============================================================================
# CONTEXTUAL VIEWS (5) - Node-centered subgraphs
# =============================================================================

  - id: ctx-locale
    description: Locale with all its knowledge
    icon:
      web: globe-2
      terminal: "l"
    color: "#22c55e"
    category: contextual
    contextual: true
    applicable_types: [Locale]
    modes: [data, overlay]
    cypher: |
      MATCH (locale:Locale {key: $nodeKey})
      OPTIONAL MATCH (locale)-[r]->(target) WHERE NOT target:Schema
      RETURN locale, r, target
      LIMIT 100

  - id: ctx-entity
    description: Entity with content and relationships
    icon:
      web: link-2
      terminal: "e"
    color: "#06b6d4"
    category: contextual
    contextual: true
    applicable_types: [Entity, EntityContent]
    modes: [data, overlay]
    cypher: |
      MATCH (e:Entity {key: $nodeKey})
      OPTIONAL MATCH (e)-[r1]->(target) WHERE NOT target:Schema
      OPTIONAL MATCH (source)-[r2]->(e) WHERE NOT source:Schema
      RETURN e, r1, target, r2, source
      LIMIT 100

  - id: ctx-project
    description: Project with all dependencies
    icon:
      web: folder-open
      terminal: "p"
    color: "#0ea5e9"
    category: contextual
    contextual: true
    applicable_types: [Project]
    modes: [data, overlay]
    cypher: |
      MATCH (p:Project {key: $nodeKey})
      OPTIONAL MATCH (p)-[r]->(target) WHERE NOT target:Schema
      RETURN p, r, target
      LIMIT 100

  - id: ctx-neighbors
    description: All direct connections (1 hop)
    icon:
      web: scan
      terminal: "n"
    color: "#f59e0b"
    category: contextual
    contextual: true
    applicable_types: []
    modes: [data, overlay]
    cypher: |
      MATCH (root {key: $nodeKey})
      OPTIONAL MATCH (root)-[r1]->(out) WHERE NOT out:Schema
      OPTIONAL MATCH (in)-[r2]->(root) WHERE NOT in:Schema
      RETURN root, r1, out, r2, in
      LIMIT 100

  - id: ctx-2hop
    description: Extended neighborhood (2 hops)
    icon:
      web: maximize-2
      terminal: "2"
    color: "#ec4899"
    category: contextual
    contextual: true
    applicable_types: []
    modes: [data, overlay]
    cypher: |
      MATCH (root {key: $nodeKey})
      OPTIONAL MATCH path = (root)-[*1..2]-(neighbor) WHERE NOT neighbor:Schema
      WITH root, relationships(path) AS rels, neighbor
      UNWIND rels AS r
      WITH DISTINCT root, r, startNode(r) AS s, endNode(r) AS t
      RETURN root, r, s, t
      LIMIT 200

# =============================================================================
# VIEW SUMMARY (v0.12.5 - simplified)
# =============================================================================
# | Category    | Count | Description                                          |
# |-------------|-------|------------------------------------------------------|
# | GENERATION  | 5     | AI agent context assembly (FIRST)                    |
# | META        | 3     | Schema exploration (Realm, Layer, Class, ArcClass)   |
# | DATA        | 7     | Instance exploration (locales, entities, geography)  |
# | CONTEXTUAL  | 5     | Node-centered subgraphs (generic, flexible)          |
# | REGISTRY    | 20    | (subtotal in this file)                              |
# |-------------|-------|------------------------------------------------------|
# | STANDALONE  | 10    | Separate YAML files in views/ directory              |
# |-------------|-------|------------------------------------------------------|
# | TOTAL       | 30    |                                                      |
# =============================================================================
#
# Standalone views (v0.12.5 - essential only):
#   - block-generation.yaml         (generation)
#   - page-generation-context.yaml  (generation)
#   - complete-graph.yaml           (global)
#   - project-overview.yaml         (global)
#   - shared-layer.yaml             (global)
#   - contextual/brand.yaml         (contextual)
#   - contextual/composition.yaml   (contextual)
#   - contextual/entities.yaml      (contextual)
#   - contextual/generation.yaml    (contextual)
#   - contextual/locales.yaml       (contextual)
#
# =============================================================================
