# | GENERATION  | 4     | AI agent context assembly                            |
# | REGISTRY    | 19    | (subtotal in this file)                              |
# |-------------|-------|------------------------------------------------------|
# | STANDALONE  | 8     | Separate YAML files in views/ directory              |
