# models/views/_registry.yaml
version: "9.9.0"
description: NovaNet Core View Definitions

# Categories for UI grouping:
# - overview: Layer views (complete, global, shared, project)
# - generation: Orchestrator and sub-agent context views
# - knowledge: Locale and concept views
# - project: Project structure views
# - mining: SEO pipeline views

# =============================================================================
# OVERVIEW LAYER VIEWS (extracted from complete-graph)
# =============================================================================
views:
  # Complete graph (all 35 nodes)
  - id: complete-graph
    file: complete-graph.yaml
    description: Full NovaNet graph with all nodes and relations
    category: overview
    modes: [data, meta, overlay, query]

  # Realm layers (derived from complete-graph)
  - id: global-layer
    file: global-layer.yaml
    description: Locale configuration and knowledge (15 nodes)
    category: overview
    modes: [data, meta, overlay, query]

  - id: shared-layer
    file: shared-layer.yaml
    description: SEO keywords (3 nodes)
    category: overview
    modes: [data, meta, overlay, query]

  - id: project-layer
    file: project-layer.yaml
    description: Per-project nodes from foundation to output (14 nodes)
    category: overview
    modes: [data, meta, overlay, query]

# =============================================================================
# GENERATION VIEWS (for orchestrator and sub-agents)
# =============================================================================

  - id: page-generation-context
    file: page-generation-context.yaml
    description: Full context for orchestrator to generate a page
    category: generation
    modes: [data, overlay, query]

  - id: block-generation
    file: block-generation.yaml
    description: Full context for sub-agent to generate a block
    category: generation
    modes: [data, overlay, query]

  - id: block-semantic-network
    file: block-semantic-network.yaml
    description: Block with concepts and spreading activation
    category: generation
    modes: [data, overlay, query]

# =============================================================================
# KNOWLEDGE VIEWS (locale and concepts)
# =============================================================================

  - id: locale-full-knowledge
    file: locale-full-knowledge.yaml
    description: Complete locale knowledge (Identity, Voice, Culture, Market, Lexicon)
    category: knowledge
    modes: [data, overlay, query]

  - id: concept-ecosystem
    file: concept-ecosystem.yaml
    description: Concept with L10n, SEO keywords, semantic links
    category: knowledge
    modes: [data, overlay, query]

# =============================================================================
# PROJECT VIEWS (project structure)
# =============================================================================

  - id: project-context
    file: project-context.yaml
    description: Project with supported locales and page inventory
    category: project
    modes: [data, overlay, query]

  - id: project-overview
    file: project-overview.yaml
    description: Project dashboard with pages, brand identity, and concepts
    category: project
    modes: [data, overlay, query]

# =============================================================================
# MINING VIEWS (SEO pipeline)
# =============================================================================

  - id: seo-pipeline
    file: seo-pipeline.yaml
    description: SEO keyword mining and optimization workflow
    category: mining
    modes: [data, overlay, query]
