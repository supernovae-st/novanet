# models/views/project-context.yaml
# Project-level context for multi-project management
id: project-context
name: Project Context
description: Project boundaries, pages, and brand identity
version: "8.0.0"

root:
  type: Project

include:
  - relation: HAS_BRAND
    direction: outgoing

  - relation: HAS_CONTENT
    direction: outgoing
    include:
      - relation: FOR_LOCALE
        direction: outgoing

  - relation: SUPPORTS_LOCALE
    direction: outgoing

  - relation: DEFAULT_LOCALE
    direction: outgoing

  - relation: HAS_PAGE
    direction: outgoing
    filters:
      active: true

docs:
  title: "Project Context View"
  category: overview
  description: |
    Project-level view showing boundaries and configuration for multi-project management.
    Use this view to understand:
    - Which locales a project supports
    - The project's brand identity
    - All pages belonging to the project

  layers:
    - name: Project Core
      nodes: [Project, Brand]
      color: blue
      description: Project definition and brand

    - name: Localization Config
      nodes: [ProjectContent, Locale]
      color: purple
      description: Supported locales and project translations

    - name: Content Structure
      nodes: [Page]
      color: green
      description: Pages owned by the project

  examples:
    - name: Load project with supported locales
      description: Get project info with all supported locales
      query: |
        MATCH (p:Project {key: $projectKey})
        OPTIONAL MATCH (p)-[:HAS_BRAND]->(b:Brand)
        OPTIONAL MATCH (p)-[:SUPPORTS_LOCALE]->(l:Locale)
        OPTIONAL MATCH (p)-[:DEFAULT_LOCALE]->(dl:Locale)
        RETURN p.key AS project,
               p.name AS name,
               b.name AS brandName,
               dl.key AS defaultLocale,
               collect(DISTINCT l.key) AS supportedLocales
      params:
        projectKey: "qrcode-ai"

    - name: Project page inventory
      description: List all pages for a project with their status
      query: |
        MATCH (p:Project {key: $projectKey})-[:HAS_PAGE]->(page:Page)
        RETURN page.key AS pageKey,
               page.status AS status
        ORDER BY page.key
      params:
        projectKey: "qrcode-ai"

    - name: Multi-project overview
      description: Get all projects with their page counts
      query: |
        MATCH (p:Project)
        OPTIONAL MATCH (p)-[:HAS_PAGE]->(page:Page)
        RETURN p.key AS project,
               p.name AS name,
               count(page) AS pageCount
        ORDER BY pageCount DESC

  notes:
    - Each Project has a unique key used for routing and identification
    - Brand contains brand identity, linked to BrandDesign (visual) and BrandPrinciples (voice)
    - ProjectContent contains localized project metadata (tagline, description)
