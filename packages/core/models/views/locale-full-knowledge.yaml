# models/views/locale-full-knowledge.yaml
id: locale-full-knowledge
name: Complete locale knowledge
description: Complete locale knowledge (Identity, Voice, Culture, Market, Lexicon)
version: "11.5.0"

root:
  type: Locale

include:
  - relation: HAS_CULTURE
    direction: outgoing

  - relation: HAS_MARKET
    direction: outgoing

  - relation: HAS_FORMATTING
    direction: outgoing

  - relation: HAS_SLUGIFICATION
    direction: outgoing

  - relation: HAS_EXPRESSIONS
    direction: outgoing

docs:
  title: "Locale Knowledge View"
  category: localization
  description: |
    Complete locale knowledge system for native content generation.
    Provides cultural and linguistic context that enables LLMs to
    generate content natively in each locale.

    **5 knowledge domains:**
    - Culture: values, taboos, holidays, heroes
    - Market: currency, payment methods, competitors
    - Formatting: date/time/number formats
    - Slugification: URL-safe transformations
    - Expressions: domain-specific vocabulary

  layers:
    - name: Locale Config
      nodes: [Locale]
      color: blue
      description: Locale definition and configuration

    - name: Culture & Market
      nodes: [Culture, Market]
      color: orange
      description: Cultural values and market specifics

    - name: Formatting
      nodes: [Formatting, Slugification]
      color: green
      description: Locale-specific formatting rules

    - name: Expressions
      nodes: [ExpressionSet, Expression]
      color: purple
      description: Domain-specific vocabulary and expressions

  examples:
    - name: Load complete locale knowledge
      description: Get all locale knowledge for a specific locale
      query: |
        MATCH (l:Locale {key: $locale})
        OPTIONAL MATCH (l)-[:HAS_CULTURE]->(c:Culture)
        OPTIONAL MATCH (l)-[:HAS_MARKET]->(m:Market)
        OPTIONAL MATCH (l)-[:HAS_FORMATTING]->(f:Formatting)
        RETURN l.key AS locale,
               c.cultural_values AS values,
               m.currency_code AS currency,
               f.date AS date_format
      params:
        locale: "fr-FR"

  notes:
    - "Locale knowledge is in SHARED realm - read-only, shared across all projects"
    - "ExpressionSet contains locale-specific expressions"
