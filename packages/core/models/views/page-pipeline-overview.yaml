id: page-pipeline-overview
name: Page Generation Pipeline
description: Complete page pipeline - from Project to Generated output with SEO, entities, and locale context.
version: "2.0.0"
# v2.0.0: Added Project, Slugification, SEOKeywordMetrics, REFERENCES_ENTITY, REFERENCES, HAS_KEYWORD
# v1.1.0: Fixed order property capture on HAS_BLOCK and ASSEMBLES, explicit locale arcs

root:
  type: Page

include:
  # Project layer
  - relation: HAS_PAGE
    direction: incoming
    source: Project
  - relation: SUPPORTS_LOCALE
    direction: outgoing
    source: Project
  - relation: HAS_SLUGIFICATION
    direction: outgoing
    source: Locale
  # Structure layer
  - relation: HAS_BLOCK
    direction: outgoing
    properties: [position]
  - relation: OF_TYPE
    direction: outgoing
  - relation: HAS_INSTRUCTION
    direction: outgoing
  # Semantic layer
  - relation: REPRESENTS
    direction: outgoing
  - relation: USES_ENTITY
    direction: outgoing
    properties: [purpose]
  - relation: REFERENCES_ENTITY
    direction: outgoing
    source: BlockInstruction
  - relation: REFERENCES
    direction: outgoing
    source: Block
    properties: [purpose, count]
  - relation: HAS_CONTENT
    direction: outgoing
  # SEO layer
  - relation: HAS_KEYWORD
    direction: outgoing
    source: Entity
    properties: [rank]
  - relation: HAS_METRICS
    direction: outgoing
  # Output layer
  - relation: HAS_GENERATED
    direction: outgoing
  - relation: ASSEMBLES
    direction: outgoing
    properties: [order]

filters:
  locale: $locale

docs:
  title: "Page Generation Pipeline View"
  category: "generation"
  description: |
    Complete page generation pipeline from Project root to final output.
    Visualizes the full context needed for LLM generation including SEO data.

    Pipeline stages visualized:
    1. Project Layer: Project → Page, Project → Locale → Slugification
    2. Structure Layer: Page → Block (ordered) → BlockType → BlockInstruction
    3. Semantic Layer: Page/Block → Entity → EntityContent (with @ refs parsing)
    4. SEO Layer: Entity → SEOKeyword → SEOKeywordMetrics
    5. Locale Context: Locale → Culture, Market, Style, Slugification
    6. Output Layer: PageGenerated → BlockGenerated (ordered assembly)

    Key relationships:
    - USES_ENTITY: Page-level entity usage (purpose: primary/secondary/contextual)
    - REFERENCES_ENTITY: BlockInstruction → Entity (granular @entity:key parsing)
    - REFERENCES: Block → Entity (aggregated, purpose: inject/link)
    - HAS_KEYWORD: Entity → SEOKeyword (rank: primary/secondary)

  examples:
    - name: "Full Pipeline for a Page"
      description: "Complete pipeline visualization for a page in a specific locale."
      query: |
        // PAGE PIPELINE VIEW v2.0.0
        // Complete generation pipeline: Project → Page → Output
        // Parameters: $page_key, $locale_key

        // ═══════════════════════════════════════════════════════════════════
        // 1. PROJECT LAYER: Root owner and locale configuration
        // ═══════════════════════════════════════════════════════════════════
        MATCH (p:Page {key: $page_key})
        MATCH (l:Locale {key: $locale_key})
        OPTIONAL MATCH (proj:Project)-[:HAS_PAGE]->(p)
        OPTIONAL MATCH (proj)-[:SUPPORTS_LOCALE]->(l)
        OPTIONAL MATCH (l)-[:HAS_SLUGIFICATION]->(slugify:Slugification)
        OPTIONAL MATCH (l)-[:HAS_STYLE]->(style:Style)

        // ═══════════════════════════════════════════════════════════════════
        // 2. STRUCTURE LAYER: Blocks with types and instructions
        // ═══════════════════════════════════════════════════════════════════
        MATCH (p)-[hb:HAS_BLOCK]->(b:Block)-[:OF_TYPE]->(bt:BlockType)
        OPTIONAL MATCH (bt)-[:HAS_RULES]->(br:BlockRules {active: true})
        OPTIONAL MATCH (b)-[:HAS_INSTRUCTION]->(bi:BlockInstruction)

        // ═══════════════════════════════════════════════════════════════════
        // 3. SEMANTIC LAYER: Entity references at all levels
        // ═══════════════════════════════════════════════════════════════════
        // Page-level entity (via REPRESENTS - 1:1 mandatory ADR-028)
        MATCH (p)-[:REPRESENTS]->(mainEntity:Entity)

        // Page-level USES_ENTITY (spreading activation context)
        OPTIONAL MATCH (p)-[ue:USES_ENTITY]->(usedEntity:Entity)

        // Block-level REFERENCES (aggregated from @ refs)
        OPTIONAL MATCH (b)-[ref:REFERENCES]->(blockEntity:Entity)

        // Instruction-level REFERENCES_ENTITY (granular @ parsing)
        OPTIONAL MATCH (bi)-[:REFERENCES_ENTITY]->(instrEntity:Entity)

        // Collect all unique entities
        WITH proj, p, l, slugify, style, b, hb, bt, br, bi, mainEntity,
             COLLECT(DISTINCT usedEntity) + COLLECT(DISTINCT blockEntity) +
             COLLECT(DISTINCT instrEntity) AS refEntities

        // ═══════════════════════════════════════════════════════════════════
        // 4. ENTITY CONTENT + SEO LAYER
        // ═══════════════════════════════════════════════════════════════════
        // Main entity content for locale
        OPTIONAL MATCH (mainEntity)-[:HAS_CONTENT]->(mainEc:EntityContent)-[:FOR_LOCALE]->(l)

        // Main entity SEO keywords with metrics
        OPTIONAL MATCH (mainEntity)-[hk:HAS_KEYWORD]->(kw:SEOKeyword)
        OPTIONAL MATCH (kw)-[:HAS_METRICS]->(kwm:SEOKeywordMetrics)

        // ═══════════════════════════════════════════════════════════════════
        // 5. LOCALE CONTEXT
        // ═══════════════════════════════════════════════════════════════════
        OPTIONAL MATCH (l)-[:HAS_CULTURE]->(culture:Culture)
        OPTIONAL MATCH (l)-[:HAS_MARKET]->(market:Market)

        // ═══════════════════════════════════════════════════════════════════
        // 6. OUTPUT LAYER: Generated content
        // ═══════════════════════════════════════════════════════════════════
        OPTIONAL MATCH (p)-[:HAS_GENERATED]->(pg:PageGenerated)-[:FOR_LOCALE]->(l)
        OPTIONAL MATCH (pg)-[asm:ASSEMBLES]->(bg:BlockGenerated)
        OPTIONAL MATCH (b)-[:HAS_GENERATED]->(bg)-[:FOR_LOCALE]->(l)

        // ═══════════════════════════════════════════════════════════════════
        // RETURN: Full pipeline with ordering
        // ═══════════════════════════════════════════════════════════════════
        RETURN
          // Project layer
          proj AS project,
          l AS locale,
          slugify AS slugification,
          style,
          culture,
          market,

          // Structure layer
          p AS page,
          b AS block,
          hb.position AS block_position,
          bt AS block_type,
          br AS block_rules,
          bi AS block_instruction,

          // Semantic layer
          mainEntity AS entity,
          mainEc AS entity_content,
          refEntities AS referenced_entities,

          // SEO layer
          kw AS seo_keyword,
          hk.rank AS keyword_rank,
          kwm AS seo_metrics,

          // Output layer
          pg AS page_generated,
          bg AS block_generated,
          asm.order AS assembly_order

        ORDER BY hb.position, hk.rank
      params:
        page_key: "custom-qr-code"
        locale_key: "fr-FR"
