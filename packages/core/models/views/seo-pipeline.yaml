# models/views/seo-pipeline.yaml
# v10.1: SEO targeting via EntityL10n (locale-aligned)
id: seo-pipeline
name: SEO Pipeline
description: SEO keyword mining and internal linking workflow
version: "10.1.0"

# Root is Locale - SEO nodes are queried via incoming FOR_LOCALE
root:
  type: Locale

include:
  # SEO Keywords
  - relation: FOR_LOCALE
    direction: incoming
    targetTypes: [SEOKeyword]
    include:
      - relation: HAS_METRICS
        direction: outgoing
        targetTypes: [SEOKeywordMetrics]
      - relation: EXPRESSES
        direction: incoming
        targetTypes: [EntityL10n]

  # Mining Runs
  - relation: FOR_LOCALE
    direction: incoming
    targetTypes: [SEOMiningRun]

docs:
  title: "SEO Pipeline View"
  category: mining
  description: |
    SEO keyword mining and optimization workflow.

    **Pipeline stages:**
    1. **Mining**: SEOMiningRun discovers keywords per locale
    2. **Targeting**: EntityL10n targets SEOKeyword (locale-aligned)
    3. **Metrics**: SEOKeywordMetrics tracks performance
    4. **Linking**: Pages link via LINKS_TO with SEO weight

    **v10.1 Architecture:**
    - SEOKeyword is linked to EntityL10n (same locale), not Entity
    - This ensures locale-aligned targeting (fr-FR concept → fr-FR keywords)

  layers:
    - name: Keywords
      nodes: [SEOKeyword]
      color: blue
      description: Localized SEO keywords

    - name: Metrics
      nodes: [SEOKeywordMetrics]
      color: green
      description: Keyword performance data

    - name: Mining
      nodes: [SEOMiningRun]
      color: gray
      description: Mining job tracking

    - name: Targeting
      nodes: [EntityL10n]
      color: orange
      description: Localized concepts targeting keywords

  examples:
    - name: Keywords with metrics
      description: Get keywords with their performance metrics
      query: |
        MATCH (kw:SEOKeyword)-[:FOR_LOCALE]->(l:Locale {key: $locale})
        OPTIONAL MATCH (kw)-[:HAS_METRICS]->(m:SEOKeywordMetrics)
        RETURN kw.value AS keyword,
               kw.intent AS intent,
               m.search_volume AS volume,
               m.difficulty AS difficulty,
               m.updated_at AS lastUpdate
        ORDER BY m.search_volume DESC
        LIMIT 50
      params:
        locale: "fr-FR"

    - name: Entity keyword coverage (v10.1)
      description: Which concepts target which keywords (via EntityL10n)
      query: |
        MATCH (c:Entity)-[:HAS_L10N]->(cl:EntityL10n)-[:EXPRESSES]->(kw:SEOKeyword)
        WHERE (cl)-[:FOR_LOCALE]->(:Locale {key: $locale})
        RETURN c.key AS concept,
               cl.title AS localizedTitle,
               collect(kw.value) AS targetedKeywords
        ORDER BY size(collect(kw.value)) DESC
      params:
        locale: "fr-FR"

    - name: Internal linking opportunities
      description: Pages that could link based on shared SEO targets
      query: |
        MATCH (p1:Page)-[:USES_ENTITY]->(c1:Entity)-[:HAS_L10N]->(cl1:EntityL10n)-[:EXPRESSES]->(kw:SEOKeyword)
        MATCH (p2:Page)-[:USES_ENTITY]->(c2:Entity)-[:HAS_L10N]->(cl2:EntityL10n)-[:EXPRESSES]->(kw)
        WHERE p1 <> p2
        AND NOT EXISTS { (p1)-[:LINKS_TO]->(p2) }
        RETURN p1.key AS sourcePage,
               p2.key AS targetPage,
               kw.value AS sharedKeyword
        LIMIT 20

    - name: Recent mining runs
      description: Get recent SEO mining job results
      query: |
        MATCH (run:SEOMiningRun)-[:FOR_LOCALE]->(l:Locale {key: $locale})
        RETURN run.id AS runId,
               run.status AS status,
               run.keywords_found AS found,
               run.started_at AS started
        ORDER BY run.started_at DESC
        LIMIT 10
      params:
        locale: "fr-FR"

  notes:
    - "SEOKeyword is locale-specific (keyword varies by locale)"
    - "v10.1: SEOKeyword linked to EntityL10n (locale-aligned targeting)"
    - "Metrics are time-series - use latest for current state"
    - "LINKS_TO relation includes seo_weight for link juice optimization"
