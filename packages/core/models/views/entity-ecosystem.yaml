# models/views/entity-ecosystem.yaml
# v10.3: Renamed from concept-ecosystem.yaml - Entity replaces Concept
id: entity-ecosystem
name: Entity Network
description: Entity with all related data (L10n, SEO, semantic links)
version: "10.3.0"

root:
  type: Entity

include:
  - relation: HAS_L10N
    direction: outgoing

  - relation: EXPRESSES
    direction: outgoing
    from: EntityL10n

  - relation: SEMANTIC_LINK
    direction: both
    depth: 2

filters:
  locale: $locale

docs:
  title: "Entity Network View"
  category: localization
  description: |
    The entity network showing semantic relationships between entities.
    Entities are the core semantic building blocks of NovaNet:
    - Each Entity has localized versions (EntityL10n) per locale
    - Entities connect via SEMANTIC_LINK with temperature weights
    - EntityL10n expresses SEO keywords via EXPRESSES arc

  layers:
    - name: Entity Core
      nodes: [Entity]
      color: blue
      description: Invariant entity definitions

    - name: Localization
      nodes: [EntityL10n]
      color: green
      description: Localized entity content

    - name: SEO Targets
      nodes: [SEOKeyword]
      color: orange
      description: SEO keyword targeting via EXPRESSES

  examples:
    - name: Entity with all localizations
      description: Get an entity with all its localized versions
      query: |
        MATCH (e:Entity {key: $entityKey})
        OPTIONAL MATCH (e)-[:HAS_L10N]->(el:EntityL10n)-[:FOR_LOCALE]->(l:Locale)
        RETURN e.key AS entity,
               e.llm_context AS context,
               collect({locale: l.key, title: el.title, definition: el.definition}) AS localizations
      params:
        entityKey: "tier-pro"

    - name: Entity semantic network
      description: Get related entities via semantic links
      query: |
        MATCH (e:Entity {key: $entityKey})
        OPTIONAL MATCH (e)-[sl:SEMANTIC_LINK]-(related:Entity)
        RETURN e.key AS entity,
               collect({
                 related: related.key,
                 temperature: sl.temperature,
                 direction: CASE WHEN startNode(sl) = e THEN 'outgoing' ELSE 'incoming' END
               }) AS semanticLinks
      params:
        entityKey: "tier-pro"

    - name: Entity SEO targets (locale-aligned)
      description: Get SEO keywords via EntityL10n (v10.3 architecture)
      query: |
        MATCH (e:Entity {key: $entityKey})-[:HAS_L10N]->(el:EntityL10n)-[:FOR_LOCALE]->(l:Locale {key: $locale})
        OPTIONAL MATCH (el)-[:EXPRESSES]->(seo:SEOKeyword)
        RETURN e.key AS entity,
               el.title AS localizedTitle,
               collect(DISTINCT seo.value) AS seoKeywords
      params:
        entityKey: "tier-pro"
        locale: "fr-FR"

  notes:
    - "Entities are INVARIANT - they exist independently of locale"
    - "EntityL10n provides locale-specific title, definition, examples"
    - "SEO keywords linked to EntityL10n (same locale) via EXPRESSES"
    - "SEMANTIC_LINK temperature controls spreading activation strength"
