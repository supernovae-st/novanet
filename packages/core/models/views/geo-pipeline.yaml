# models/views/geo-pipeline.yaml
id: geo-pipeline
name: GEO Pipeline
description: GEO seed mining and answer engine optimization workflow
version: "8.0.0"

# Root is Locale - GEO nodes are queried via incoming FOR_LOCALE
root:
  type: Locale

include:
  # GEO Seeds
  - relation: FOR_LOCALE
    direction: incoming
    targetTypes: [GEOSeedL10n]
    include:
      - relation: HAS_METRICS
        direction: outgoing
        targetTypes: [GEOSeedMetrics]
      - relation: TARGETS_GEO
        direction: incoming
        targetTypes: [Concept]

  # Mining Runs
  - relation: FOR_LOCALE
    direction: incoming
    targetTypes: [GEOMiningRun]

docs:
  title: "GEO Pipeline View"
  category: mining
  description: |
    Generative Engine Optimization (GEO) for AI answer engines.

    **What is GEO:**
    Optimization for AI-powered search engines (Perplexity, ChatGPT, Claude)
    that generate answers rather than list links.

    **Pipeline stages:**
    1. **Mining**: GEOMiningRun discovers questions per locale
    2. **Targeting**: Concepts target GEOSeedL10n questions
    3. **Metrics**: GEOSeedMetrics tracks citation performance
    4. **Optimization**: Content optimized for AI citations

    **Node types:**
    - GEOSeedL10n: Localized question/query (locale-specific)
    - GEOSeedMetrics: Citation and visibility metrics
    - GEOMiningRun: Mining job metadata

  layers:
    - name: Seeds
      nodes: [GEOSeedL10n]
      color: blue
      description: Question seeds for GEO optimization

    - name: Metrics
      nodes: [GEOSeedMetrics]
      color: green
      description: Citation performance data

    - name: Mining
      nodes: [GEOMiningRun]
      color: gray
      description: Mining job tracking

    - name: Targeting
      nodes: [Concept]
      color: orange
      description: Concepts targeting questions

  examples:
    - name: GEO seeds with metrics
      description: Get question seeds with their citation metrics
      query: |
        MATCH (seed:GEOSeedL10n)-[:FOR_LOCALE]->(l:Locale {key: $locale})
        OPTIONAL MATCH (seed)-[:HAS_METRICS]->(m:GEOSeedMetrics)
        RETURN seed.question AS question,
               seed.intent AS intent,
               m.citation_count AS citations,
               m.visibility_score AS visibility,
               m.updated_at AS lastUpdate
        ORDER BY m.citation_count DESC
        LIMIT 50
      params:
        locale: "fr-FR"

    - name: Concept GEO coverage
      description: Which concepts target which questions
      query: |
        MATCH (c:Concept)-[:TARGETS_GEO]->(seed:GEOSeedL10n)-[:FOR_LOCALE]->(l:Locale {key: $locale})
        RETURN c.key AS concept,
               collect(seed.question) AS targetedQuestions
        ORDER BY size(collect(seed.question)) DESC
      params:
        locale: "fr-FR"

    - name: High-value GEO opportunities
      description: Questions with high search intent but low citation
      query: |
        MATCH (seed:GEOSeedL10n)-[:FOR_LOCALE]->(l:Locale {key: $locale})
        MATCH (seed)-[:HAS_METRICS]->(m:GEOSeedMetrics)
        WHERE m.search_volume > 1000 AND m.citation_count < 5
        RETURN seed.question AS question,
               m.search_volume AS volume,
               m.citation_count AS currentCitations
        ORDER BY m.search_volume DESC
        LIMIT 20
      params:
        locale: "fr-FR"

    - name: Recent GEO mining runs
      description: Get recent GEO mining job results
      query: |
        MATCH (run:GEOMiningRun)-[:FOR_LOCALE]->(l:Locale {key: $locale})
        RETURN run.id AS runId,
               run.status AS status,
               run.seeds_found AS found,
               run.started_at AS started
        ORDER BY run.started_at DESC
        LIMIT 10
      params:
        locale: "fr-FR"

  notes:
    - "GEO is for AI answer engines, not traditional search"
    - "GEOSeedL10n questions are locale-specific"
    - "Citation metrics track how often AI cites our content"
    - "Higher visibility_score = more prominent in AI answers"
