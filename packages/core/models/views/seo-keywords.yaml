# models/views/seo-keywords.yaml
# SEO keywords and metrics (3 nodes in global realm)
# v10.4.0 — renamed from shared-layer (shared realm removed)
id: seo-keywords
name: SEO Keywords
description: SEO keywords and metrics (global realm, per-locale)
version: "10.4.0"

# Root is Locale since SEO nodes are per-locale
root:
  type: Locale

include:
  # SEO nodes
  - relation: FOR_LOCALE
    direction: incoming
    targetTypes: [SEOKeyword]
    include:
      - relation: HAS_METRICS
        direction: outgoing
        targetTypes: [SEOKeywordMetrics]
  - relation: FOR_LOCALE
    direction: incoming
    targetTypes: [SEOMiningRun]

docs:
  title: "SEO Keywords View"
  category: mining
  description: |
    SEO nodes in the global realm, organized per-locale.
    These are reusable across multiple projects.

    **3 nodes (v10.4):**
    - SEOKeyword, SEOKeywordMetrics, SEOMiningRun

    **Key insight:**
    SEO keywords bridge Entity localization and search optimization.
    A keyword like "QR code generator" can be targeted by multiple projects.

    **v10.1 Architecture:**
    - SEOKeyword is linked to EntityContent (locale-aligned targeting)
    - Pattern: EntityContent -[:EXPRESSES]-> SEOKeyword -[:FOR_LOCALE]-> Locale

  layers:
    - name: SEO Keywords
      nodes: [SEOKeyword]
      color: blue
      description: Localized SEO keywords with search intent

    - name: SEO Metrics
      nodes: [SEOKeywordMetrics]
      color: green
      description: Search volume, difficulty, trends

    - name: SEO Mining
      nodes: [SEOMiningRun]
      color: gray
      description: Keyword discovery job tracking

  examples:
    - name: Top keywords by volume
      description: Get highest-volume SEO keywords for a locale
      query: |
        MATCH (kw:SEOKeyword)-[:FOR_LOCALE]->(l:Locale {key: $locale})
        MATCH (kw)-[:HAS_METRICS]->(m:SEOKeywordMetrics)
        RETURN kw.keyword AS keyword,
               kw.intent AS intent,
               m.search_volume AS volume,
               m.difficulty AS difficulty
        ORDER BY m.search_volume DESC
        LIMIT 20
      params:
        locale: "fr-FR"

    - name: Keywords targeted by concept (v10.1)
      description: Find all keywords a concept targets via EntityContent
      query: |
        MATCH (c:Entity {key: $conceptKey})-[:HAS_CONTENT]->(cl:EntityContent)-[:EXPRESSES]->(kw:SEOKeyword)
        WHERE (cl)-[:FOR_LOCALE]->(:Locale {key: $locale})
        OPTIONAL MATCH (kw)-[:HAS_METRICS]->(m:SEOKeywordMetrics)
        RETURN kw.value AS keyword,
               m.search_volume AS volume
        ORDER BY m.search_volume DESC
      params:
        conceptKey: "qr-code-generator"
        locale: "en-US"

    - name: Mining job status
      description: Check recent mining runs
      query: |
        MATCH (run:SEOMiningRun)-[:FOR_LOCALE]->(l:Locale {key: $locale})
        RETURN run.id AS runId,
               run.status AS status,
               run.keywords_found AS found,
               run.started_at AS started
        ORDER BY run.started_at DESC
        LIMIT 5
      params:
        locale: "fr-FR"

  notes:
    - "SEO nodes are project-independent but locale-specific"
    - "SEO keywords can be targeted by multiple projects via EntityContent"
    - "v10.4: SEOKeyword linked to EntityContent -[:EXPRESSES]-> SEOKeyword"
    - "Metrics are time-series - always use latest for current state"
