# models/views/block-generation.yaml
# v10.3: Updated Concept → Entity
id: block-generation
name: Block Generation Context
description: Full context for sub-agent to generate a single block
version: "10.3.0"

root:
  type: Block

include:
  - relation: HAS_PROMPT
    direction: outgoing

  - relation: OF_TYPE
    direction: outgoing
    include:
      - relation: HAS_RULES
        direction: outgoing

  - relation: HAS_INSTRUCTION
    direction: outgoing

  - relation: USES_ENTITY
    direction: outgoing
    depth: 2
    include:
      - relation: HAS_CONTENT
        direction: outgoing
      - relation: SEMANTIC_LINK
        direction: outgoing

  - relation: HAS_GENERATED
    direction: outgoing

filters:
  locale: $locale

docs:
  title: "Block Generation Context"
  category: generation
  description: |
    Context loading for sub-agent when generating a single block.
    This is the core view for native content generation, providing:
    - Block definition with type and rules
    - Block-specific prompt and instruction
    - Related entities with localized content
    - Spreading activation for semantic context

  layers:
    - name: Block Layer
      nodes: [Block, BlockPrompt, BlockType, BlockRules, BlockInstruction]
      color: blue
      description: Block definition and generation instructions

    - name: Entity Layer
      nodes: [Entity, EntityContent]
      color: green
      description: Semantic entities used by the block (v10.3)

    - name: Output Layer
      nodes: [BlockGenerated]
      color: purple
      description: Generated block output

  examples:
    - name: Load block context for generation
      description: Complete context for sub-agent to generate a block
      query: |
        MATCH (b:Block {key: $blockKey})
        MATCH (b)-[:HAS_PROMPT]->(bp:BlockPrompt)
        MATCH (b)-[:OF_TYPE]->(bt:BlockType)
        OPTIONAL MATCH (bt)-[:HAS_RULES]->(br:BlockRules)
        OPTIONAL MATCH (b)-[:HAS_INSTRUCTION]->(bi:BlockInstruction)
        OPTIONAL MATCH (b)-[:USES_ENTITY]->(e:Entity)
        OPTIONAL MATCH (e)-[:HAS_CONTENT]->(el:EntityContent)-[:FOR_LOCALE]->(l:Locale {key: $locale})
        RETURN b.key AS block,
               bp.instructions AS instructions,
               bi.content AS blockInstruction,
               bt.name AS blockType,
               br.rules AS rules,
               collect(DISTINCT {key: e.key, title: el.title, definition: el.definition}) AS entities
      params:
        blockKey: "hero-pricing"
        locale: "fr-FR"

    - name: Block with spreading activation
      description: Get related entities through semantic links
      query: |
        MATCH (b:Block {key: $blockKey})-[:USES_ENTITY]->(e:Entity)
        MATCH (e)-[sl:SEMANTIC_LINK*1..2]->(related:Entity)
        WHERE ALL(r IN sl WHERE r.temperature >= 0.3)
        WITH related, reduce(a = 1.0, r IN sl | a * r.temperature) AS activation
        WHERE activation >= 0.3
        MATCH (related)-[:HAS_CONTENT]->(rl:EntityContent)-[:FOR_LOCALE]->(l:Locale {key: $locale})
        RETURN related.key AS entity,
               rl.title AS title,
               activation
        ORDER BY activation DESC
        LIMIT 10
      params:
        blockKey: "hero-pricing"
        locale: "fr-FR"

  notes:
    - "Sub-agents receive this context to generate ONE block natively"
    - "The LLM context is entirely in the target locale"
    - "Spreading activation provides related entities for richer context"
