# packages/core/models/arc-classes/generation/generated-for.yaml
# ArcKind: GENERATED_FOR — Inverse of HAS_GENERATED (v10.9.0: renamed from OUTPUT_OF)

arc:
  name: GENERATED_FOR
  family: generation
  scope: intra_realm
  source:
    - PageGenerated   # v10.9.0: renamed from PageGenerated
    - BlockGenerated  # v10.9.0: renamed from BlockGenerated
  target:
    - Page
    - Block
  cardinality: many_to_one
  inverse_of: HAS_GENERATED
  llm_context: |
    USE: when finding which Page/Block a generated node belongs to.
    TRIGGERS: source structure, parent page, parent block.
    NOT: for loading generated output (use HAS_GENERATED).
    RELATES: PageGenerated/BlockGenerated (source), Page/Block (target), HAS_GENERATED (inverse).
  cypher_pattern: (PageGenerated)-[:GENERATED_FOR]->(Page)
