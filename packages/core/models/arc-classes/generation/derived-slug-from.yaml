# =============================================================================
# ArcClass: DERIVED_SLUG_FROM
# NovaNet v0.13.1 — LLM-First Ordering
# =============================================================================
# Audit trail for slug derivation (ADR-030, ADR-032)
#
# BlockNative:head-seo-meta -[:DERIVED_SLUG_FROM]-> EntityNative
# EntityNative already has all keyword knowledge via [:TARGETS {is_slug_source: true}]
#
# This arc says: "the slug of this block was derived from this entity's
# content strategy". The specific keyword used is marked on the TARGETS arc
# with is_slug_source: true — all keyword knowledge stays on EntityNative.
#
# Example:
#   BlockNative:qr-code:head-seo-meta:1@es-MX -> EntityNative:entity:qr-code@es-MX
#   EntityNative@es-MX -[:TARGETS {is_slug_source: true}]-> SEOKeyword:"crear-código-qr"
#   -> slug = "crear-código-qr" (COPIED from SEOKeyword.slug_form)
# =============================================================================

arc:
  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 2: IDENTITY
  # ─────────────────────────────────────────────────────────────────────────
  name: DERIVED_SLUG_FROM
  family: generation
  scope: intra_realm  # BlockNative (org/output) -> EntityNative (org/semantic)

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 3: SEMANTIC (LLM-Critical)
  # ─────────────────────────────────────────────────────────────────────────
  description: >-
    Links a head-seo-meta BlockNative to the EntityNative whose content strategy
    produced the localized slug. All keyword knowledge (which specific keyword
    sourced the slug) stays on EntityNative via [:TARGETS {is_slug_source: true}].
    This arc provides the derivation audit trail (score, rationale, special rules
    like no-repetition or brand invariance).

  llm_context: |
    USE: when auditing slug derivation decisions or tracing slug origin.
    TRIGGERS: slug audit, slug source, slug derivation, URL origin.
    NOT: keyword targeting (use TARGETS), slug validation (use SLUGIFIED_BY), page linking (use LINKS_TO).
    RELATES: BlockNative:head-seo-meta (source), EntityNative (target with TARGETS->SEOKeyword).
    CRITICAL: The slug keyword source is on EntityNative[:TARGETS {is_slug_source: true}], not on this arc.

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 4: GRAPH STRUCTURE
  # ─────────────────────────────────────────────────────────────────────────
  source: BlockNative
  target: EntityNative
  cardinality: many_to_one  # One block derived from one entity's strategy

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 6: DATA
  # ─────────────────────────────────────────────────────────────────────────
  properties:
    - name: derivation_score
      type: float
      required: true
      description: |
        Score = volume x sem_coef x convergence_boost
        - volume: SEO keyword search volume
        - sem_coef: SEMANTIC_LINK coefficient (0.3-1.0)
        - convergence_boost: 1 + (N x 0.2)

    - name: derivation_rationale
      type: string
      required: false
      description: "LLM explanation of why this keyword was chosen as slug source"

    - name: alternatives_considered
      type: array
      required: false
      description: "Other keywords considered with their scores"

    - name: no_repetition_applied
      type: boolean
      required: false
      default: false
      description: "Whether the no-repetition rule modified the slug"

    - name: brand_invariant
      type: boolean
      required: false
      default: false
      description: "Whether slug is brand name (no translation)"

    - name: derivation_timestamp
      type: datetime
      required: false
      description: "When the slug derivation was computed"

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 7: REFERENCE
  # ─────────────────────────────────────────────────────────────────────────
  cypher_pattern: "(BlockNative)-[:DERIVED_SLUG_FROM {derivation_score, derivation_rationale, no_repetition_applied}]->(EntityNative)-[:TARGETS {is_slug_source: true}]->(SEOKeyword)"
