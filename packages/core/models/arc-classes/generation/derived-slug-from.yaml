# =============================================================================
# ArcClass: DERIVED_SLUG_FROM
# NovaNet v0.13.1 — LLM-First Ordering
# =============================================================================
# Audit trail for slug derivation (ADR-032 URL Slugification Architecture)
#
# Tracks which SEO keyword was used to derive the head-seo-meta block's slug.
# The slug is COPIED from SEOKeyword.slug_form (source of truth with diacritics).
#
# Example:
#   BlockNative:homepage:head-seo-meta:1@es-MX DERIVED_SLUG_FROM SEOKeyword:"código qr"
#   -> slug = "código-qr" (COPIED from SEOKeyword.slug_form, NOT generated)
# =============================================================================

arc:
  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 2: IDENTITY
  # ─────────────────────────────────────────────────────────────────────────
  name: DERIVED_SLUG_FROM
  family: generation
  scope: cross_realm  # BlockNative (org) -> SEOKeyword (shared)

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 3: SEMANTIC (LLM-Critical)
  # ─────────────────────────────────────────────────────────────────────────
  description: >-
    Links a head-seo-meta block's localized slug back to the SEO keyword it was
    COPIED from. The slug value is taken directly from SEOKeyword.slug_form
    (which contains correct diacritics per locale rules). This arc provides
    complete audit trail for URL slugification decisions, including scoring
    formula (volume x sem_coef x convergence_boost) and whether special rules
    like no-repetition or brand invariance were applied.

  llm_context: |
    USE: when auditing slug derivation decisions for SEO.
    TRIGGERS: slug audit, keyword derivation, SEO slug, URL generation audit.
    NOT: page linking (use LINKS_TO), keyword targeting (use TARGETS), slug validation (use SLUGIFIED_BY).
    RELATES: BlockNative:head-seo-meta (source), SEOKeyword (target), slug_form (copied value), audit trail.
    CRITICAL: The slug is COPIED from SEOKeyword.slug_form, NOT generated by LLM.

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 4: GRAPH STRUCTURE
  # ─────────────────────────────────────────────────────────────────────────
  source: BlockNative
  target: SEOKeyword
  cardinality: many_to_one  # One slug derived from one keyword

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 6: DATA
  # ─────────────────────────────────────────────────────────────────────────
  properties:
    - name: derivation_score
      type: float
      required: true
      description: |
        Score = volume x sem_coef x convergence_boost
        - volume: SEO keyword search volume
        - sem_coef: SEMANTIC_LINK coefficient (0.3-1.0)
        - convergence_boost: 1 + (N x 0.2)

    - name: derivation_rationale
      type: string
      required: false
      description: "LLM explanation of why this keyword was chosen"

    - name: alternatives_considered
      type: array
      required: false
      description: "Other keywords considered with their scores"

    - name: no_repetition_applied
      type: boolean
      required: false
      default: false
      description: "Whether the no-repetition rule modified the slug"

    - name: brand_invariant
      type: boolean
      required: false
      default: false
      description: "Whether slug is brand name (no translation)"

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 7: REFERENCE
  # ─────────────────────────────────────────────────────────────────────────
  cypher_pattern: "(BlockNative)-[:DERIVED_SLUG_FROM {derivation_score, derivation_rationale, no_repetition_applied, brand_invariant}]->(SEOKeyword)"
