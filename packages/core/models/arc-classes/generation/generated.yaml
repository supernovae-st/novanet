# =============================================================================
# ArcClass: GENERATED
# NovaNet v0.13.1 — LLM-First Ordering
# =============================================================================
# Instruction produced localized content
# v0.12.4: ADR-028 - PageInstruction deleted (calculated at runtime)
#          Source simplified to BlockInstruction only
# =============================================================================

arc:
  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 2: IDENTITY
  # ─────────────────────────────────────────────────────────────────────────
  name: GENERATED
  family: generation
  scope: intra_realm

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 3: SEMANTIC (LLM-Critical)
  # ─────────────────────────────────────────────────────────────────────────
  description: >-
    Links a block instruction to the generated content it produced. This arc
    establishes the provenance relationship between LLM instructions and their
    resulting output, enabling audit trails and generation tracing. The
    generated_at timestamp records when the content was created.

  llm_context: |
    USE: when tracing which instruction produced which generated content.
    TRIGGERS: generation provenance, instruction audit, output source.
    NOT: for structure ownership (use HAS_NATIVE), for compiled prompts (use COMPILED_FROM).
    RELATES: BlockInstruction (source), PageNative/BlockNative (target).

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 4: GRAPH STRUCTURE
  # ─────────────────────────────────────────────────────────────────────────
  source: BlockInstruction
  target:
    - PageNative
    - BlockNative
  cardinality: one_to_many

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 6: DATA
  # ─────────────────────────────────────────────────────────────────────────
  properties:
    - name: generated_at
      type: datetime
      required: true
      description: "Timestamp when content was generated"

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 7: REFERENCE
  # ─────────────────────────────────────────────────────────────────────────
  cypher_pattern: "(BlockInstruction)-[:GENERATED {generated_at}]->(BlockNative)"
