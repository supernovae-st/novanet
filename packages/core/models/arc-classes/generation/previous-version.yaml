# =============================================================================
# ArcClass: PREVIOUS_VERSION
# NovaNet v0.13.1 — LLM-First Ordering
# =============================================================================
# Links to previous version in history chain
# =============================================================================

arc:
  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 2: IDENTITY
  # ─────────────────────────────────────────────────────────────────────────
  name: PREVIOUS_VERSION
  family: generation
  scope: intra_realm

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 3: SEMANTIC (LLM-Critical)
  # ─────────────────────────────────────────────────────────────────────────
  description: >-
    Links a generated node to its previous version, forming a version history
    chain. This self-referential arc enables rollback capabilities, diff
    comparison between versions, and complete audit trail of content evolution.
    Applies to BlockNative, PageNative, and OutputArtifact nodes.

  llm_context: |
    USE: when traversing version history, finding previous iterations.
    TRIGGERS: version history, rollback, previous version, diff comparison.
    NOT: for current content (use direct node), for deployment (use BUNDLES).
    RELATES: Same type (source/target), self-referential chain for history.

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 4: GRAPH STRUCTURE
  # ─────────────────────────────────────────────────────────────────────────
  source:
    - BlockNative
    - PageNative
    - OutputArtifact
  target:
    - BlockNative
    - PageNative
    - OutputArtifact
  cardinality: one_to_one

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 5: FLAGS
  # ─────────────────────────────────────────────────────────────────────────
  is_self_referential: true

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 7: REFERENCE
  # ─────────────────────────────────────────────────────────────────────────
  cypher_pattern: (BlockNative)-[:PREVIOUS_VERSION]->(BlockNative)
