# =============================================================================
# ArcClass: GENERATED_FROM
# NovaNet v0.13.1 — LLM-First Ordering
# =============================================================================
# Direct link for fast structure validation (optimization shortcut)
# =============================================================================

arc:
  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 2: IDENTITY
  # ─────────────────────────────────────────────────────────────────────────
  name: GENERATED_FROM
  family: generation
  scope: intra_realm

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 3: SEMANTIC (LLM-Critical)
  # ─────────────────────────────────────────────────────────────────────────
  description: >-
    Direct link from generated block content to its defining block type schema.
    This arc provides an optimization shortcut for fast schema validation,
    allowing quick verification that generated content conforms to its
    expected structure without traversing the full generation pipeline.

  llm_context: |
    USE: when validating generated content against schema, fast type lookup.
    TRIGGERS: block type validation, schema check, structure verification.
    NOT: for block ownership (use NATIVE_OF), for type definition (use BlockType).
    RELATES: BlockNative (source), BlockType (target).

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 4: GRAPH STRUCTURE
  # ─────────────────────────────────────────────────────────────────────────
  source: BlockNative
  target: BlockType
  cardinality: many_to_one

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 7: REFERENCE
  # ─────────────────────────────────────────────────────────────────────────
  cypher_pattern: (BlockNative)-[:GENERATED_FROM]->(BlockType)
