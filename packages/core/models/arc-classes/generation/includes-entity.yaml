# =============================================================================
# ArcClass: INCLUDES_ENTITY
# NovaNet v0.13.1 — LLM-First Ordering
# =============================================================================
# Prompt artifact includes entity context for generation
# =============================================================================

arc:
  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 2: IDENTITY
  # ─────────────────────────────────────────────────────────────────────────
  name: INCLUDES_ENTITY
  family: generation
  scope: intra_realm

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 3: SEMANTIC (LLM-Critical)
  # ─────────────────────────────────────────────────────────────────────────
  description: >-
    Links a compiled prompt artifact to the entities included in its context
    for LLM generation. This arc tracks which semantic entities were injected
    into the prompt via @ references, enabling audit of generation context.
    Optional weight property indicates the relative importance of each entity.

  llm_context: |
    USE: when auditing what entities were included in a compiled prompt.
    TRIGGERS: prompt context, included entities, generation audit.
    NOT: for influence tracking (use INFLUENCED_BY), for raw instruction (use BlockInstruction).
    RELATES: PromptArtifact (source), Entity (target), weight property for influence.

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 4: GRAPH STRUCTURE
  # ─────────────────────────────────────────────────────────────────────────
  source: PromptArtifact
  target: Entity
  cardinality: one_to_many

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 6: DATA
  # ─────────────────────────────────────────────────────────────────────────
  properties:
    - name: weight
      type: string
      required: false
      description: "Relative importance/influence weight of this entity in the prompt"

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 7: REFERENCE
  # ─────────────────────────────────────────────────────────────────────────
  cypher_pattern: (PromptArtifact)-[:INCLUDES_ENTITY {weight}]->(Entity)
