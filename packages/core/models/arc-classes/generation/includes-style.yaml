# packages/core/models/arc-classes/generation/includes-style.yaml
# ArcClass: INCLUDES_STYLE - Instruction includes style directives
#
# v0.12.4: ADR-028 - PageInstruction deleted (calculated at runtime from BlockInstructions)
#   Source simplified to BlockInstruction only

arc:
  name: INCLUDES_STYLE
  family: generation
  scope: cross_realm

  source: BlockInstruction
  target: Style
  cardinality: many_to_one

  llm_context: |
    USE: when loading style settings for instruction compilation.
    TRIGGERS: locale style, voice settings, tone configuration.
    NOT: for generated output (use HAS_NATIVE).
    RELATES: BlockInstruction (source), Style (target, cross_realm).

  cypher_pattern: "(BlockInstruction)-[:INCLUDES_STYLE]->(Style)"
