# =============================================================================
# ArcClass: INFLUENCED_BY
# NovaNet v0.13.1 — LLM-First Ordering
# =============================================================================
# Provenance: which entities influenced this output
# =============================================================================

arc:
  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 2: IDENTITY
  # ─────────────────────────────────────────────────────────────────────────
  name: INFLUENCED_BY
  family: generation
  scope: intra_realm

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 3: SEMANTIC (LLM-Critical)
  # ─────────────────────────────────────────────────────────────────────────
  description: >-
    Links generated block content to the entity content that influenced its
    creation. This provenance arc tracks which EntityNative nodes contributed
    to the generated output, with optional weight for influence strength and
    entity_version for reproducibility. Essential for content attribution and
    change impact analysis.

  llm_context: |
    USE: when tracing provenance, understanding what entity content influenced output.
    TRIGGERS: provenance, entity influence, content source, attribution.
    NOT: for current entity (use EntityNative), for generation flow (use GENERATED).
    RELATES: BlockNative (source), EntityNative (target), weight property for influence strength.

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 4: GRAPH STRUCTURE
  # ─────────────────────────────────────────────────────────────────────────
  source: BlockNative
  target: EntityNative
  cardinality: many_to_many

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 6: DATA
  # ─────────────────────────────────────────────────────────────────────────
  properties:
    - name: weight
      type: string
      required: false
      description: "Influence strength (e.g., primary, secondary, minor)"
    - name: entity_version
      type: string
      required: false
      description: "Version of the entity content at generation time"

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 7: REFERENCE
  # ─────────────────────────────────────────────────────────────────────────
  cypher_pattern: (BlockNative)-[:INFLUENCED_BY {weight, entity_version}]->(EntityNative)
