# packages/core/models/arc-classes/generation/influenced-by.yaml
# ArcClass: INFLUENCED_BY — Provenance: which entities influenced this output

arc:
  name: INFLUENCED_BY
  family: generation
  scope: intra_realm
  source: BlockNative
  target: EntityNative
  cardinality: many_to_many
  properties:
    - name: weight
      type: string
      required: false
    - name: entity_version
      type: string
      required: false
  llm_context: |
    USE: when tracing provenance, understanding what entity content influenced output.
    TRIGGERS: provenance, entity influence, content source, attribution.
    NOT: for current entity (use EntityNative), for generation flow (use GENERATED).
    RELATES: BlockNative (source), EntityNative (target), weight property for influence strength.
  cypher_pattern: (BlockNative)-[:INFLUENCED_BY {weight, entity_version}]->(EntityNative)
