# packages/core/models/arc-classes/generation/produced-by.yaml
# v0.13.0: Inverse of PRODUCED - for audit trail traversal
# Allows: "Which prompt produced this output?" queries
arc:
  name: PRODUCED_BY
  family: generation
  scope: intra_realm
  source:
    - BlockGenerated
    - PageGenerated
  target: PromptArtifact
  cardinality: many_to_many
  inverse_of: PRODUCED
  llm_context: |
    USE: when finding which compiled prompt produced a generated block or page.
    TRIGGERS: prompt origin, output source, generation source, which prompt, audit trail.
    NOT: for instruction origin (use GENERATED), for generation instructions (use COMPILED_FROM).
    RELATES: BlockGenerated/PageGenerated (source), PromptArtifact (target), PRODUCED (inverse).
  cypher_pattern: (BlockGenerated)-[:PRODUCED_BY]->(PromptArtifact)
  properties:
    generation_timestamp:
      type: datetime
      required: true
      description: "When the LLM generation occurred (mirrors PRODUCED.generation_timestamp)"
    model_version:
      type: string
      required: false
      description: "LLM model version used (mirrors PRODUCED.model_version)"
    token_usage:
      type: integer
      required: false
      description: "Total tokens consumed (mirrors PRODUCED.token_usage)"
