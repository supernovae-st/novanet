# =============================================================================
# ArcClass: COMPILED_FROM
# NovaNet v0.13.1 — LLM-First Ordering
# =============================================================================
# Prompt artifact was compiled from source instruction template
# v0.12.4: ADR-028 - PageInstruction deleted (calculated at runtime)
#          Target simplified to BlockInstruction only
# =============================================================================

arc:
  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 2: IDENTITY
  # ─────────────────────────────────────────────────────────────────────────
  name: COMPILED_FROM
  family: generation
  scope: intra_realm

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 3: SEMANTIC (LLM-Critical)
  # ─────────────────────────────────────────────────────────────────────────
  description: >-
    Links a compiled prompt artifact back to its source block instruction template.
    This arc provides audit capability to trace which instruction was used to
    create a specific prompt artifact. Essential for understanding generation
    provenance and debugging instruction-to-prompt compilation.

  llm_context: |
    USE: when tracing prompt artifact to source instruction for auditing.
    TRIGGERS: prompt source, instruction audit, template origin.
    NOT: for generated content (use HAS_NATIVE).
    RELATES: PromptArtifact (source), BlockInstruction (target).

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 4: GRAPH STRUCTURE
  # ─────────────────────────────────────────────────────────────────────────
  source: PromptArtifact
  target: BlockInstruction
  cardinality: many_to_one

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 7: REFERENCE
  # ─────────────────────────────────────────────────────────────────────────
  cypher_pattern: (PromptArtifact)-[:COMPILED_FROM]->(BlockInstruction)
