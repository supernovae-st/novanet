# packages/core/models/arc-classes/ownership/has-branch.yaml
# ArcClass: HAS_BRANCH — LanguageFamily contains LanguageBranch (inverse of BRANCH_OF)
#
# v0.12.5: ADR-026 Inverse Arc Policy

arc:
  name: HAS_BRANCH
  family: ownership
  scope: intra_realm

  source: LanguageFamily
  target: LanguageBranch
  cardinality: one_to_many

  inverse_of: BRANCH_OF

  llm_context: |
    USE: when finding all branches of a language family.
    TRIGGERS: "language family branches", "family members", "which branches".
    NOT: for finding a branch's family (use BRANCH_OF).
    RELATES: LanguageFamily (source), LanguageBranch (target), BRANCH_OF (inverse).
    Example: Indo-European -[:HAS_BRANCH]-> Romance, Germanic, Slavic

  cypher_pattern: "(LanguageFamily)-[:HAS_BRANCH]->(LanguageBranch)"
