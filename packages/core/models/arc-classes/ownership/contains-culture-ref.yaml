# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: CONTAINS_CULTURE_REF — CultureSet contains CultureRef atoms
# v0.13.1: LLM-First property ordering
# v10.9.0: Split from generic CONTAINS for semantic correctness
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: CONTAINS_CULTURE_REF
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "CultureSet contains CultureRef atoms (each container type contains its specific atom type)"
  llm_context: |
    USE: when loading individual culture references from a culture set.
    TRIGGERS: culture atoms, cultural references, locale culture, traditions.
    NOT: culture set container (use HAS_CULTURE_SET), culture config (use HAS_CULTURE).
    RELATES: CultureSet (source), CultureRef (target).

  # GRAPH STRUCTURE
  source: CultureSet
  target: CultureRef
  cardinality: one_to_many

  # REFERENCE
  cypher_pattern: "(CultureSet)-[:CONTAINS_CULTURE_REF]->(CultureRef)"
