# packages/core/models/arc-classes/ownership/has-rules.yaml
# ArcKind: HAS_RULES — BlockType defines generation rules templates

arc:
  name: HAS_RULES
  family: ownership
  scope: intra_realm
  source: BlockType
  target: BlockRules
  cardinality: one_to_many
  llm_context: |
    USE: when loading generation rules for a block type.
    TRIGGERS: block rules, generation rules, field constraints, validation.
    NOT: block schema (use BlockType), block content (use HAS_INSTRUCTION).
    RELATES: BlockType (source), BlockRules (target).
  cypher_pattern: (BlockType)-[:HAS_RULES]->(BlockRules)
