# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: HAS_CHILD — Entity hierarchy for URL structure
# v0.13.1: LLM-First property ordering
# v10.9.0: NEW arc for Entity hierarchies (replaces generic CONTAINS)
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: HAS_CHILD
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "Entity hierarchy for URL structure (enables paths like /blog/category/article)"
  llm_context: |
    USE: when building entity hierarchies for URL structure.
    TRIGGERS: entity hierarchy, parent child, URL path, nested entities.
    NOT: entity content (use HAS_NATIVE), entity category (use BELONGS_TO).
    RELATES: Entity (source), Entity (target), CHILD_OF (inverse), max_depth=3.

  # GRAPH STRUCTURE
  source: Entity
  target: Entity
  cardinality: many_to_many  # Entity can have multiple parents (symlinks)

  # FLAGS
  inverse: CHILD_OF
  cycle_protection: true  # Prevent A → B → A

  # DATA
  properties:
    position:
      type: int
      required: true
      description: "Sort order among siblings"

    visibility:
      type: string
      enum: ["public", "draft", "internal"]
      required: true
      description: "Content visibility status"

    featured:
      type: boolean
      required: false
      description: "Highlight in parent's featured section"

  # REFERENCE
  cypher_pattern: "(Entity)-[:HAS_CHILD {position: 1, visibility: 'public'}]->(Entity)"

  constraints:
    max_depth: 3  # Prevents over-nesting
