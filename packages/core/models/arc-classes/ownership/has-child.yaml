# packages/core/models/arc-classes/ownership/has-child.yaml
# ArcKind: HAS_CHILD — Entity hierarchy for URL structure (v10.9.0)
#
# v10.9.0: NEW arc for Entity hierarchies
#          Replaces generic CONTAINS (which is used for Knowledge Atoms)
#          Enables URL paths like /blog/category/article

arc:
  name: HAS_CHILD
  family: ownership
  scope: intra_realm

  source: Entity
  target: Entity

  cardinality: many_to_many  # Entity can have multiple parents (symlinks)

  inverse: CHILD_OF

  properties:
    position:
      type: int
      required: true
      description: "Sort order among siblings"

    visibility:
      type: string
      enum: ["public", "draft", "internal"]
      required: true
      description: "Content visibility status"

    featured:
      type: boolean
      required: false
      description: "Highlight in parent's featured section"

  cycle_protection: true  # Prevent A → B → A

  llm_context: |
    USE: when building entity hierarchies for URL structure.
    TRIGGERS: entity hierarchy, parent child, URL path, nested entities.
    NOT: entity content (use HAS_CONTENT), entity category (use BELONGS_TO).
    RELATES: Entity (source), Entity (target), CHILD_OF (inverse), max_depth=3.

  cypher_pattern: "(Entity)-[:HAS_CHILD {position: 1, visibility: 'public'}]->(Entity)"

  constraints:
    max_depth: 3  # Prevents over-nesting
