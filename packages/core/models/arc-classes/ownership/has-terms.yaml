# packages/core/models/arc-classes/ownership/has-terms.yaml
# v0.13.0: Added TIER 2 inverse (ADR-026)
arc:
  name: HAS_TERMS
  family: ownership
  scope: intra_realm
  source: Locale
  target: TermSet
  cardinality: one_to_many
  inverse: TERMS_OF
  llm_context: |
    USE: when loading terminology for a locale by domain.
    TRIGGERS: locale terms, terminology, domain vocabulary, glossary.
    NOT: individual terms (use CONTAINS_TERM), locale culture (use HAS_CULTURE).
    RELATES: Locale (source), TermSet (target), domain (property).
  cypher_pattern: "(Locale)-[:HAS_TERMS {domain: $domain}]->(TermSet)"
  properties:
    domain:
      type: string
      required: true
      description: "Term domain (pricing, features, technical, marketing, support, general)"
