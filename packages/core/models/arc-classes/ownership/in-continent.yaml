# packages/core/models/arc-classes/ownership/in-continent.yaml
# ArcKind: IN_CONTINENT - GeoRegion belongs to Continent
# v10.8: Geographic Taxonomy

arc:
  name: IN_CONTINENT
  family: ownership
  scope: intra_realm

  source: GeoRegion
  target: Continent
  cardinality: many_to_one

  inverse: HAS_REGION

  llm_context: |
    USE: when finding which continent a region belongs to.
    TRIGGERS: region continent, geographic hierarchy, UN M49, continent lookup.
    NOT: sub-regions (use IN_REGION), countries (use IN_COUNTRY).
    RELATES: GeoRegion (source), Continent (target), HAS_REGION (inverse).

  cypher_pattern: "(GeoRegion)-[:IN_CONTINENT]->(Continent)"
