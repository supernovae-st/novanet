# models/arc-classes/ownership/has-prompt-style.yaml
# HAS_PROMPT_STYLE - Brand owns PromptStyle(s) (ADR-028)

arc:
  name: HAS_PROMPT_STYLE
  family: ownership
  scope: intra_realm
  source: Brand
  target: PromptStyle
  cardinality: one_to_many
  required: false
  inverse: PROMPT_STYLE_OF
  llm_context: |
    USE: when loading locale-specific LLM generation hints.
    TRIGGERS: prompt style, locale hints, cultural context, market adaptation.
    NOT: visual design (use HAS_DESIGN), brand voice (use HAS_PRINCIPLES).
    RELATES: Brand (source), PromptStyle (target), PROMPT_STYLE_OF (inverse).
  cypher_pattern: "(Brand)-[:HAS_PROMPT_STYLE]->(PromptStyle)"
