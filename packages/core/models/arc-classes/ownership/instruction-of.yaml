# packages/core/models/arc-classes/ownership/instruction-of.yaml
# ArcClass: INSTRUCTION_OF — Inverse of HAS_INSTRUCTION — BlockInstruction points to owner

arc:
  name: INSTRUCTION_OF
  family: ownership
  scope: intra_realm

  source: BlockInstruction
  target:
    - Page
    - Block

  cardinality: many_to_one  # Inverse of one_to_many

  inverse_of: HAS_INSTRUCTION

  llm_context: |
    USE: when finding which Page/Block owns a BlockInstruction.
    TRIGGERS: instruction owner, instruction parent, which page/block.
    NOT: loading instructions for a page (use HAS_INSTRUCTION).
    RELATES: BlockInstruction (source), Page/Block (target), HAS_INSTRUCTION (inverse).

  cypher_pattern: "(BlockInstruction)-[:INSTRUCTION_OF]->(Page|Block)"
