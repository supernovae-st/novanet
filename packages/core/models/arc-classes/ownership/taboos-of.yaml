# packages/core/models/arc-classes/ownership/taboos-of.yaml
# v0.13.0: TIER 2 inverse arc (ADR-026) - inverse of HAS_TABOOS
arc:
  name: TABOOS_OF
  family: ownership
  scope: intra_realm
  source: TabooSet
  target: Locale
  cardinality: many_to_one
  inverse_of: HAS_TABOOS
  llm_context: |
    USE: when finding which locale owns a TabooSet.
    TRIGGERS: tabooset owner, taboo locale, which locale, constraints locale.
    NOT: loading taboos for locale (use HAS_TABOOS), individual taboos (use CONTAINS_TABOO).
    RELATES: TabooSet (source), Locale (target), HAS_TABOOS (inverse), severity (property).
  cypher_pattern: "(TabooSet)-[:TABOOS_OF {severity: $severity}]->(Locale)"
  properties:
    severity:
      type: string
      required: true
      description: "Taboo severity (mirrors HAS_TABOOS.severity for bidirectional traversal)"
