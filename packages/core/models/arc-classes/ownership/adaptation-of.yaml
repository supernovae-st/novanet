# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: ADAPTATION_OF — Adaptation belongs to Locale (inverse of HAS_ADAPTATION)
# v0.13.1: LLM-First property ordering
# v0.13.1: NEW TIER 2 inverse arc (ADR-026)
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: ADAPTATION_OF
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "Adaptation belongs to Locale (inverse of HAS_ADAPTATION)"
  llm_context: |
    USE: when finding which Locale uses this cultural adaptation.
    TRIGGERS: adaptation locale, which locale adaptation, adaptation owner.
    NOT: loading adaptation for locale (use HAS_ADAPTATION), culture (use CULTURE_OF).
    RELATES: Adaptation (source), Locale (target), HAS_ADAPTATION (inverse).

  # GRAPH STRUCTURE
  source: Adaptation
  target: Locale
  cardinality: one_to_one

  # FLAGS
  inverse_of: HAS_ADAPTATION

  # REFERENCE
  cypher_pattern: (Adaptation)-[:ADAPTATION_OF]->(Locale)
