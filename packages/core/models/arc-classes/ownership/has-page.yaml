# packages/core/models/arc-classes/ownership/has-page.yaml
# ArcKind: HAS_PAGE — Project owns its page structures

arc:
  name: HAS_PAGE
  family: ownership
  scope: intra_realm
  source: Project
  target: Page
  cardinality: one_to_many
  inverse: PAGE_OF

  llm_context: |
    USE: when loading pages for a project.
    TRIGGERS: project pages, page list, site structure.
    NOT: page content (use HAS_BLOCK), page output (use HAS_GENERATED).
    RELATES: Project (source), Page (target), PAGE_OF (inverse).

  cypher_pattern: (Project)-[:HAS_PAGE]->(Page)
