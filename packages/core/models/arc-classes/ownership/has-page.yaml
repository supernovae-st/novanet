# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: HAS_PAGE — Project owns its page structures
# v0.13.1: LLM-First property ordering
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: HAS_PAGE
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "Project owns its page structures"
  llm_context: |
    USE: when loading pages for a project.
    TRIGGERS: project pages, page list, site structure.
    NOT: page content (use HAS_BLOCK), page output (use HAS_NATIVE).
    RELATES: Project (source), Page (target), PAGE_OF (inverse).

  # GRAPH STRUCTURE
  source: Project
  target: Page
  cardinality: one_to_many

  # FLAGS
  inverse: PAGE_OF

  # REFERENCE
  cypher_pattern: (Project)-[:HAS_PAGE]->(Page)
