# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: HAS_ADAPTATION — Locale owns cultural adaptation rules
# v0.13.1: LLM-First property ordering
# v0.13.1: Added TIER 2 inverse (ADR-026)
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: HAS_ADAPTATION
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "Locale owns cultural adaptation rules"
  llm_context: |
    USE: when loading cultural adaptation rules for a locale.
    TRIGGERS: locale adaptation, cultural adaptation, market adaptation, localization.
    NOT: locale culture (use HAS_CULTURE), locale style (use HAS_STYLE).
    RELATES: Locale (source), Adaptation (target), 1:1 cardinality.

  # GRAPH STRUCTURE
  source: Locale
  target: Adaptation
  cardinality: one_to_one

  # FLAGS
  inverse: ADAPTATION_OF

  # REFERENCE
  cypher_pattern: (Locale)-[:HAS_ADAPTATION]->(Adaptation)
