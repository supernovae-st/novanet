# packages/core/models/arc-classes/ownership/slugification-of.yaml
# ArcClass: SLUGIFICATION_OF — Slugification belongs to Locale (inverse of HAS_SLUGIFICATION)
# v0.13.1: NEW TIER 2 inverse arc (ADR-026)

arc:
  name: SLUGIFICATION_OF
  family: ownership
  scope: intra_realm
  source: Slugification
  target: Locale
  cardinality: one_to_one
  inverse_of: HAS_SLUGIFICATION
  llm_context: |
    USE: when finding which Locale uses this URL slugification rules.
    TRIGGERS: slugification locale, which locale slugification, slugification owner.
    NOT: loading slugification for locale (use HAS_SLUGIFICATION), formatting (use FORMATTING_OF).
    RELATES: Slugification (source), Locale (target), HAS_SLUGIFICATION (inverse).
  cypher_pattern: (Slugification)-[:SLUGIFICATION_OF]->(Locale)
