# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: CULTURE_OF — Culture belongs to Locale (inverse of HAS_CULTURE)
# v0.13.1: LLM-First property ordering
# v0.13.0: TIER 2 inverse arc (ADR-026)
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: CULTURE_OF
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "Culture config belongs to Locale (inverse of HAS_CULTURE)"
  llm_context: |
    USE: when finding which locale owns a Culture config.
    TRIGGERS: culture owner, culture locale, which locale, formality locale.
    NOT: loading culture for locale (use HAS_CULTURE), culture atoms (use HAS_CULTURE_SET).
    RELATES: Culture (source), Locale (target), HAS_CULTURE (inverse).

  # GRAPH STRUCTURE
  source: Culture
  target: Locale
  cardinality: one_to_one

  # FLAGS
  inverse_of: HAS_CULTURE

  # REFERENCE
  cypher_pattern: (Culture)-[:CULTURE_OF]->(Locale)
