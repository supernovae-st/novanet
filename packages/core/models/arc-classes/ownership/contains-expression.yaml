# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: CONTAINS_EXPRESSION — ExpressionSet contains Expression atoms
# v0.13.1: LLM-First property ordering
# v10.9.0: Split from generic CONTAINS for semantic correctness
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: CONTAINS_EXPRESSION
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "ExpressionSet contains Expression atoms (each container type contains its specific atom type)"
  llm_context: |
    USE: when loading individual expressions from an expression set.
    TRIGGERS: expression atoms, idioms, phrases, locale expressions.
    NOT: expression set container (use HAS_EXPRESSIONS), patterns.
    RELATES: ExpressionSet (source), Expression (target).

  # GRAPH STRUCTURE
  source: ExpressionSet
  target: Expression
  cardinality: one_to_many

  # REFERENCE
  cypher_pattern: "(ExpressionSet)-[:CONTAINS_EXPRESSION]->(Expression)"
