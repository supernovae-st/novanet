# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: CONTAINS_AUDIENCE_TRAIT — AudienceSet contains AudienceTrait atoms
# v0.13.1: LLM-First property ordering
# v10.9.0: Split from generic CONTAINS for semantic correctness
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: CONTAINS_AUDIENCE_TRAIT
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "AudienceSet contains AudienceTrait atoms (each container type contains its specific atom type)"
  llm_context: |
    USE: when loading individual audience traits from an audience set.
    TRIGGERS: audience atoms, user traits, demographics, target audience.
    NOT: audience set container (use HAS_AUDIENCE), personas.
    RELATES: AudienceSet (source), AudienceTrait (target).

  # GRAPH STRUCTURE
  source: AudienceSet
  target: AudienceTrait
  cardinality: one_to_many

  # REFERENCE
  cypher_pattern: "(AudienceSet)-[:CONTAINS_AUDIENCE_TRAIT]->(AudienceTrait)"
