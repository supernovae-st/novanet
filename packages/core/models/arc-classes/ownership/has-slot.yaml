# packages/core/models/arc-classes/ownership/has-slot.yaml
# ArcClass: HAS_SLOT — Page defines content slot

arc:
  name: HAS_SLOT
  family: ownership
  scope: intra_realm
  source: Page
  target: ContentSlot
  cardinality: one_to_many
  properties:
    - name: position_override
      type: string
      required: false
  llm_context: |
    USE: when loading content slots for page layout.
    TRIGGERS: content slot, page layout, slot position, dynamic content.
    NOT: slot content (use FILLS_SLOT), slot constraints (use ACCEPTS_BLOCK_TYPE).
    RELATES: Page (source), ContentSlot (target), position_override (property).
  cypher_pattern: (Page)-[:HAS_SLOT {position_override}]->(ContentSlot)
