# packages/core/models/arc-classes/ownership/has-native.yaml
# ArcClass: HAS_NATIVE — Defined node links to its native content (v0.13.0 ADR-029)
#
# ═══════════════════════════════════════════════════════════════════════════════
# v0.13.0 CHANGES (ADR-029 *Native Pattern)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   MERGED: HAS_CONTENT + HAS_GENERATED → HAS_NATIVE
#   - Unified arc for ALL locale-specific content (authored + generated)
#   - Moved from localization/generation families → ownership family
#   - Trait on target node distinguishes authored vs generated
#
# SOURCES:
#   - Entity → EntityNative (authored)
#   - Project → ProjectNative (authored)
#   - Page → PageNative (generated)
#   - Block → BlockNative (generated)
#
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  name: HAS_NATIVE
  family: ownership
  scope: intra_realm

  source:
    - Entity
    - Project
    - Page
    - Block
  target:
    - EntityNative    # trait: authored
    - ProjectNative   # trait: authored
    - PageNative      # trait: generated
    - BlockNative     # trait: generated

  cardinality: one_to_many

  inverse: NATIVE_OF

  llm_context: |
    USE: when loading locale-specific native content for any defined node.
    TRIGGERS: has native, native content, locale content, entity native, page native.
    NOT: for invariant structure (use the defined node directly), for locale lookup (use FOR_LOCALE).
    RELATES: Entity/Project/Page/Block (source), *Native (target), NATIVE_OF (inverse).

  cypher_pattern: "(Entity)-[:HAS_NATIVE]->(EntityNative)"

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXAMPLES
  # ═══════════════════════════════════════════════════════════════════════════════

  examples:
    entity_native:
      cypher: "MATCH (e:Entity {key: 'qr-code-generator'})-[:HAS_NATIVE]->(en:EntityNative) WHERE en.locale_key = 'fr-FR' RETURN en"
      description: "Load French native content for an entity"

    page_native:
      cypher: "MATCH (p:Page {key: 'pricing'})-[:HAS_NATIVE]->(pn:PageNative) WHERE pn.locale_key = 'ja-JP' RETURN pn"
      description: "Load Japanese generated native content for a page"

    project_native:
      cypher: "MATCH (pr:Project {key: 'qrcode-ai'})-[:HAS_NATIVE]->(pn:ProjectNative) RETURN pn"
      description: "Load all native content variants for a project"
