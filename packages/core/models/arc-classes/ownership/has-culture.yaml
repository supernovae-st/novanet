# packages/core/models/arc-classes/ownership/has-culture.yaml
# v10.7: Updated to link Locale -> Culture config node (1:1)
# Note: For CultureSet (knowledge atoms), use HAS_CULTURE_SET arc
arc:
  name: HAS_CULTURE
  family: ownership
  scope: intra_realm
  source: Locale
  target: Culture
  cardinality: one_to_one
  llm_context: |
    USE: when loading cultural configuration for a locale.
    TRIGGERS: locale culture, cultural settings, locale config, formality level.
    NOT: culture atoms (use HAS_CULTURE_SET), expressions (use HAS_EXPRESSIONS).
    RELATES: Locale (source), Culture (target), 1:1 cardinality.
  cypher_pattern: (Locale)-[:HAS_CULTURE]->(Culture)
