# packages/core/models/arc-classes/ownership/terms-of.yaml
# v0.13.0: TIER 2 inverse arc (ADR-026) - inverse of HAS_TERMS
arc:
  name: TERMS_OF
  family: ownership
  scope: intra_realm
  source: TermSet
  target: Locale
  cardinality: many_to_one
  inverse_of: HAS_TERMS
  llm_context: |
    USE: when finding which locale owns a TermSet.
    TRIGGERS: term owner, termset locale, which locale, terminology locale.
    NOT: loading terms for locale (use HAS_TERMS), individual terms (use CONTAINS_TERM).
    RELATES: TermSet (source), Locale (target), HAS_TERMS (inverse), domain (property).
  cypher_pattern: "(TermSet)-[:TERMS_OF {domain: $domain}]->(Locale)"
  properties:
    domain:
      type: string
      required: true
      description: "Term domain (mirrors HAS_TERMS.domain for bidirectional traversal)"
