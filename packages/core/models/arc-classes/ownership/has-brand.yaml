# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: HAS_BRAND — Project owns Brand
# v0.13.1: LLM-First property ordering
# ADR-028: Replaces HAS_BRAND_IDENTITY
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: HAS_BRAND
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "Project owns Brand (identity, voice, pitch)"
  llm_context: |
    USE: when loading brand identity for content generation.
    TRIGGERS: project brand, brand voice, visual identity, content style.
    NOT: brand design details (use HAS_DESIGN), brand principles (use HAS_PRINCIPLES).
    RELATES: Project (source), Brand (target), BRAND_OF (inverse).

  # GRAPH STRUCTURE
  source: Project
  target: Brand
  cardinality: one_to_one

  # FLAGS
  inverse: BRAND_OF
  required: false

  # REFERENCE
  cypher_pattern: "(Project)-[:HAS_BRAND]->(Brand)"
