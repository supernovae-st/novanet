# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: DESIGN_OF — BrandDesign belongs to Brand (inverse of HAS_DESIGN)
# v0.13.1: LLM-First property ordering
# v0.12.5: ADR-028 Brand Architecture
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: DESIGN_OF
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "BrandDesign belongs to Brand (inverse of HAS_DESIGN)"
  llm_context: |
    USE: when finding which Brand owns a BrandDesign.
    TRIGGERS: "design owner", "design brand", "which brand".
    NOT: for loading design for a brand (use HAS_DESIGN).
    RELATES: BrandDesign (source), Brand (target), HAS_DESIGN (inverse).

  # GRAPH STRUCTURE
  source: BrandDesign
  target: Brand
  cardinality: one_to_one

  # FLAGS
  inverse_of: HAS_DESIGN

  # REFERENCE
  cypher_pattern: "(BrandDesign)-[:DESIGN_OF]->(Brand)"
