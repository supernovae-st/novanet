# packages/core/models/arc-classes/ownership/market-of.yaml
# ArcClass: MARKET_OF — Market belongs to Locale (inverse of HAS_MARKET)
# v0.13.1: NEW TIER 2 inverse arc (ADR-026)

arc:
  name: MARKET_OF
  family: ownership
  scope: intra_realm
  source: Market
  target: Locale
  cardinality: one_to_one
  inverse_of: HAS_MARKET
  llm_context: |
    USE: when finding which Locale uses this market configuration.
    TRIGGERS: market locale, which locale market, market owner.
    NOT: loading market for locale (use HAS_MARKET), SEO (use SEO_KEYWORDS_OF).
    RELATES: Market (source), Locale (target), HAS_MARKET (inverse).
  cypher_pattern: (Market)-[:MARKET_OF]->(Locale)
