# packages/core/models/arc-classes/ownership/supports-locale.yaml
# ArcClass: SUPPORTS_LOCALE — Project supports locales with activation status (active/pending/disabled)

arc:
  name: SUPPORTS_LOCALE
  family: ownership
  scope: cross_realm  # Project (org) → Locale (shared)
  source: Project
  target: Locale
  cardinality: many_to_many
  properties:
    - name: status
      type: string
      required: false
  llm_context: |
    USE: when loading which locales a project supports.
    TRIGGERS: project locales, supported locales, locale activation, locale status.
    NOT: default locale (use DEFAULT_LOCALE), entity content locales (use FOR_LOCALE).
    RELATES: Project (source), Locale (target), status (property: active/pending/disabled).
  cypher_pattern: (Project)-[:SUPPORTS_LOCALE {status}]->(Locale)
