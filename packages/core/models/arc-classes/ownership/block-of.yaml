# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: BLOCK_OF — Block points to its page (inverse of HAS_BLOCK)
# v0.13.1: LLM-First property ordering
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: BLOCK_OF
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "Block points to its page (inverse of HAS_BLOCK)"
  llm_context: |
    USE: when finding which page owns a block.
    TRIGGERS: block owner, block page, which page, parent page.
    NOT: block content (use HAS_INSTRUCTION), block siblings (use HAS_BLOCK).
    RELATES: Block (source), Page (target), HAS_BLOCK (inverse), order (property).

  # GRAPH STRUCTURE
  source: Block
  target: Page
  cardinality: many_to_one

  # FLAGS
  inverse_of: HAS_BLOCK

  # DATA
  properties:
    - name: order
      type: integer
      required: true
      description: "Block order within page (mirrors HAS_BLOCK.order for bidirectional traversal)"

  # REFERENCE
  cypher_pattern: "(Block)-[:BLOCK_OF {order}]->(Page)"
