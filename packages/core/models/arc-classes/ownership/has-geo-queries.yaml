# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: HAS_GEO_QUERIES — Locale owns GEO query container
# v0.13.1: LLM-First property ordering
# v10.7: GEO Schema v1 - Locale owns GEOQuery (same pattern as HAS_SEO_KEYWORDS)
# v11.4: Container pattern - Locale → GEOQuerySet (container) → GEOQuery (atoms)
# v11.5: Scope fix (cross_realm → intra_realm, both in shared realm)
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: HAS_GEO_QUERIES
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "Locale owns GEO query container (AI search queries)"
  llm_context: |
    USE: when loading GEO query container for a locale.
    TRIGGERS: locale GEO queries, AI search queries, GEO query set.
    NOT: individual queries (use CONTAINS_GEO_QUERY), GEO answers.
    RELATES: Locale (source), GEOQuerySet (target), 1:1 cardinality.

  # GRAPH STRUCTURE
  source: Locale
  target: GEOQuerySet
  cardinality: one_to_one

  # FLAGS
  inverse: GEO_QUERIES_OF

  # REFERENCE
  cypher_pattern: (Locale)-[:HAS_GEO_QUERIES]->(GEOQuerySet)

  example:
    description: "Get all GEO queries for a locale via container"
    cypher: |
      MATCH (l:Locale {key: $locale})-[:HAS_GEO_QUERIES]->(qs:GEOQuerySet)
            -[:CONTAINS_GEO_QUERY]->(q:GEOQuery)
      RETURN q.value, q.ai_visibility_score, q.share_of_voice
      ORDER BY q.ai_visibility_score DESC
