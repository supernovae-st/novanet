# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: HAS_ENTITY — Project owns Entity nodes
# v0.13.1: LLM-First property ordering
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: HAS_ENTITY
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "Project owns Entity nodes (v11.3: entities belong to projects)"
  llm_context: |
    USE: when loading entities for a project.
    TRIGGERS: project entities, semantic concepts, project vocabulary.
    NOT: entity content (use HAS_NATIVE), entity hierarchy (use HAS_CHILD).
    RELATES: Project (source), Entity (target), ENTITY_OF (inverse).

  # GRAPH STRUCTURE
  source: Project
  target: Entity
  cardinality: one_to_many

  # FLAGS
  inverse: ENTITY_OF

  # REFERENCE
  cypher_pattern: (Project)-[:HAS_ENTITY]->(Entity)
