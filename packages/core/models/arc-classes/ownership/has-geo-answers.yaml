# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: HAS_GEO_ANSWERS — GEOQuery owns LLM response samples
# v0.13.1: LLM-First property ordering
# v10.7: GEO Schema v1 - GEOQuery owns GEOAnswer snapshots
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: HAS_GEO_ANSWERS
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "GEOQuery owns GEOAnswer snapshots (one per engine, per observation)"
  llm_context: |
    USE: when loading AI engine responses for a GEO query.
    TRIGGERS: geo answers, AI responses, engine snapshots, visibility analysis.
    NOT: GEO query itself (use CONTAINS_GEO_QUERY), GEO metrics.
    RELATES: GEOQuery (source), GEOAnswer (target).

  # GRAPH STRUCTURE
  source: GEOQuery
  target: GEOAnswer
  cardinality: one_to_many

  # REFERENCE
  cypher_pattern: (GEOQuery)-[:HAS_GEO_ANSWERS]->(GEOAnswer)

  example:
    description: "Get all answers for a GEO query"
    cypher: |
      MATCH (q:GEOQuery {key: $query_key})-[:HAS_GEO_ANSWERS]->(a:GEOAnswer)
      RETURN a.engine, a.observed_at, a.cited_domains, a.brand_mentions
      ORDER BY a.observed_at DESC
