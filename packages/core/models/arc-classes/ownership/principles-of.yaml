# packages/core/models/arc-classes/ownership/principles-of.yaml
# ArcKind: PRINCIPLES_OF — BrandPrinciples belongs to Brand (inverse of HAS_PRINCIPLES)
#
# v0.12.5: ADR-028 Brand Architecture

arc:
  name: PRINCIPLES_OF
  family: ownership
  scope: intra_realm

  source: BrandPrinciples
  target: Brand
  cardinality: one_to_one

  inverse_of: HAS_PRINCIPLES

  llm_context: |
    USE: when finding which Brand owns BrandPrinciples.
    TRIGGERS: "principles owner", "principles brand", "which brand".
    NOT: for loading principles for a brand (use HAS_PRINCIPLES).
    RELATES: BrandPrinciples (source), Brand (target), HAS_PRINCIPLES (inverse).

  cypher_pattern: "(BrandPrinciples)-[:PRINCIPLES_OF]->(Brand)"
