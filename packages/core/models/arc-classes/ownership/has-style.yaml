# packages/core/models/arc-classes/ownership/has-style.yaml
# v0.13.1: Added TIER 2 inverse (ADR-026)
arc:
  name: HAS_STYLE
  family: ownership
  scope: intra_realm
  source: Locale
  target: Style
  cardinality: one_to_one
  inverse: STYLE_OF
  llm_context: |
    USE: when loading writing style preferences for a locale.
    TRIGGERS: locale style, writing style, formality, tone preferences.
    NOT: formatting (use HAS_FORMATTING), voice (use HAS_VOICE), culture (use HAS_CULTURE).
    RELATES: Locale (source), Style (target), 1:1 cardinality.
  cypher_pattern: (Locale)-[:HAS_STYLE]->(Style)
