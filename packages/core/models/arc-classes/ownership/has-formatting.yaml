# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: HAS_FORMATTING — Locale owns Formatting rules
# v0.13.1: LLM-First property ordering
# v0.13.1: Added TIER 2 inverse (ADR-026)
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: HAS_FORMATTING
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "Locale owns Formatting rules (number, date, currency)"
  llm_context: |
    USE: when loading number/date/currency formatting for a locale.
    TRIGGERS: locale formatting, number format, date format, currency format.
    NOT: locale style (use HAS_STYLE), locale culture (use HAS_CULTURE).
    RELATES: Locale (source), Formatting (target), 1:1 cardinality.

  # GRAPH STRUCTURE
  source: Locale
  target: Formatting
  cardinality: one_to_one

  # FLAGS
  inverse: FORMATTING_OF

  # REFERENCE
  cypher_pattern: (Locale)-[:HAS_FORMATTING]->(Formatting)
