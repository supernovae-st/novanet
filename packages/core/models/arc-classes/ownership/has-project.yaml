# packages/core/models/arc-classes/ownership/has-project.yaml
# ArcClass: HAS_PROJECT — OrgConfig owns projects (v11.3: unified from Tenant+Organization)

arc:
  name: HAS_PROJECT
  family: ownership
  scope: intra_realm
  source: OrgConfig
  target: Project
  cardinality: one_to_many
  inverse: PROJECT_OF

  llm_context: |
    USE: when loading projects for an organization.
    TRIGGERS: org projects, project list, multi-project.
    NOT: single project context (use Project directly).
    RELATES: OrgConfig (source), Project (target), PROJECT_OF (inverse).

  cypher_pattern: (OrgConfig)-[:HAS_PROJECT]->(Project)
