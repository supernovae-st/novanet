# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: AUDIENCE_OF — AudienceSet belongs to Locale (inverse of HAS_AUDIENCE)
# v0.13.1: LLM-First property ordering
# v0.13.0: TIER 2 inverse arc (ADR-026)
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: AUDIENCE_OF
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "AudienceSet belongs to Locale (inverse of HAS_AUDIENCE)"
  llm_context: |
    USE: when finding which locale owns an AudienceSet.
    TRIGGERS: audienceset owner, audience locale, which locale, segment locale.
    NOT: loading audience for locale (use HAS_AUDIENCE), individual traits (use CONTAINS_AUDIENCE_TRAIT).
    RELATES: AudienceSet (source), Locale (target), HAS_AUDIENCE (inverse), segment (property).

  # GRAPH STRUCTURE
  source: AudienceSet
  target: Locale
  cardinality: many_to_one

  # FLAGS
  inverse_of: HAS_AUDIENCE

  # DATA
  properties:
    segment:
      type: string
      required: true
      description: "Audience segment (mirrors HAS_AUDIENCE.segment for bidirectional traversal)"

  # REFERENCE
  cypher_pattern: "(AudienceSet)-[:AUDIENCE_OF {segment: $segment}]->(Locale)"
