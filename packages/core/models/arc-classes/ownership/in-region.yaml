# packages/core/models/arc-classes/ownership/in-region.yaml
# ArcClass: IN_REGION - GeoSubRegion belongs to GeoRegion
# v10.8: Geographic Taxonomy

arc:
  name: IN_REGION
  family: ownership
  scope: intra_realm

  source: GeoSubRegion
  target: GeoRegion
  cardinality: many_to_one

  inverse: HAS_SUBREGION

  llm_context: |
    USE: when finding which region a sub-region belongs to.
    TRIGGERS: sub-region parent, geographic hierarchy, UN M49 intermediate level.
    NOT: continent (use IN_CONTINENT), countries (use IN_COUNTRY).
    RELATES: GeoSubRegion (source), GeoRegion (target), HAS_SUBREGION (inverse).

  cypher_pattern: "(GeoSubRegion)-[:IN_REGION]->(GeoRegion)"
