# packages/core/models/arc-classes/ownership/seo-keywords-of.yaml
# ArcClass: SEO_KEYWORDS_OF — SEOKeywordSet belongs to Locale (inverse of HAS_SEO_KEYWORDS)
# v0.13.1: NEW TIER 2 inverse arc (ADR-026)

arc:
  name: SEO_KEYWORDS_OF
  family: ownership
  scope: intra_realm
  source: SEOKeywordSet
  target: Locale
  cardinality: one_to_one
  inverse_of: HAS_SEO_KEYWORDS
  llm_context: |
    USE: when finding which Locale owns this SEO keyword set.
    TRIGGERS: SEO keywords locale, which locale SEO, keyword set owner.
    NOT: loading SEO keywords for locale (use HAS_SEO_KEYWORDS), individual keywords (use CONTAINS_SEO_KEYWORD).
    RELATES: SEOKeywordSet (source), Locale (target), HAS_SEO_KEYWORDS (inverse).
  cypher_pattern: (SEOKeywordSet)-[:SEO_KEYWORDS_OF]->(Locale)
