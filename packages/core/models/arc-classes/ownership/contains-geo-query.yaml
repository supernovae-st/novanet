# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: CONTAINS_GEO_QUERY — GEOQuerySet contains GEOQuery atoms
# v0.13.1: LLM-First property ordering
# v11.4: Type-constrained container arc (ADR-016)
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: CONTAINS_GEO_QUERY
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "GEOQuerySet contains GEOQuery atoms (AI search query container)"
  llm_context: |
    USE: when loading individual GEO queries from a query set.
    TRIGGERS: geo queries, AI search queries, GEO atoms, query atoms.
    NOT: query set container (use HAS_GEO_QUERIES), GEO answers.
    RELATES: GEOQuerySet (source), GEOQuery (target).

  # GRAPH STRUCTURE
  source: GEOQuerySet
  target: GEOQuery
  cardinality: one_to_many

  # REFERENCE
  cypher_pattern: "(GEOQuerySet)-[:CONTAINS_GEO_QUERY]->(GEOQuery)"

  example:
    description: "Get all GEO queries in a locale's query set"
    cypher: |
      MATCH (l:Locale {key: $locale})-[:HAS_GEO_QUERIES]->(qs:GEOQuerySet)
      MATCH (qs)-[:CONTAINS_GEO_QUERY]->(q:GEOQuery)
      RETURN q.value, q.query_type
