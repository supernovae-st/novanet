# packages/core/models/arc-classes/ownership/belongs-to-project-content.yaml
# ArcClass: BELONGS_TO_PROJECT_CONTENT — Locale-aligned: PageGenerated (fr-FR) → ProjectContent (fr-FR)
#
# v11.0.0: Renamed from BELONGS_TO_PROJECT_L10N (ProjectL10n → ProjectContent refactor)

arc:
  name: BELONGS_TO_PROJECT_CONTENT
  family: ownership
  scope: intra_realm
  source: PageGenerated
  target: ProjectContent
  cardinality: many_to_one
  llm_context: |
    USE: when loading project-level content for page generation.
    TRIGGERS: project content, locale voice, project tagline, project CTAs.
    NOT: project config (use BELONGS_TO_ORG), page structure (use HAS_PAGE).
    RELATES: PageGenerated (source), ProjectContent (target), locale-aligned.
  cypher_pattern: (PageGenerated)-[:BELONGS_TO_PROJECT_CONTENT]->(ProjectContent)
