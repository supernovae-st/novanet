# ═══════════════════════════════════════════════════════════════════════════════
# ArcClass: ACCEPTS_BLOCK_TYPE — Slot accepts specific block types
# v0.13.1: LLM-First property ordering
# ═══════════════════════════════════════════════════════════════════════════════

arc:
  # IDENTITY
  name: ACCEPTS_BLOCK_TYPE
  family: ownership
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: "Content slot accepts specific block types (validation constraint)"
  llm_context: |
    USE: when validating block placement in content slots.
    TRIGGERS: slot validation, block constraints, allowed types.
    NOT: block content (use HAS_INSTRUCTION), slot assignment (use FILLS_SLOT).
    RELATES: ContentSlot (source), BlockType (target).

  # GRAPH STRUCTURE
  source: ContentSlot
  target: BlockType
  cardinality: one_to_many

  # REFERENCE
  cypher_pattern: (ContentSlot)-[:ACCEPTS_BLOCK_TYPE]->(BlockType)
