# packages/core/models/arc-classes/ownership/part-of-realm.yaml
# ArcClass: PART_OF_REALM - CulturalSubRealm belongs to CulturalRealm
# v10.8: Geographic Taxonomy

arc:
  name: PART_OF_REALM
  family: ownership
  scope: intra_realm

  source: CulturalSubRealm
  target: CulturalRealm
  cardinality: many_to_one

  inverse: HAS_SUBREALM

  llm_context: |
    USE: when finding which cultural realm a sub-realm belongs to.
    TRIGGERS: cultural hierarchy, Broek Webb, cultural sub-realm, culture grouping.
    NOT: geographic regions (use IN_REGION), language families (use BRANCH_OF).
    RELATES: CulturalSubRealm (source), CulturalRealm (target), HAS_SUBREALM (inverse).

  cypher_pattern: "(CulturalSubRealm)-[:PART_OF_REALM]->(CulturalRealm)"
