# packages/core/models/arc-classes/localization/has-internal-link.yaml
# ArcClass: HAS_INTERNAL_LINK — BlockGenerated contains link to PageGenerated (v10.3)

arc:
  name: HAS_INTERNAL_LINK
  family: localization
  scope: intra_realm

  source: BlockGenerated
  target: PageGenerated
  cardinality: many_to_many

  properties:
    - name: anchor_text
      type: string
      required: false
      description: "Visible anchor text of the link"
    - name: position
      type: integer
      required: false
      description: "Position of the link within the block content"
    - name: nofollow
      type: boolean
      required: false
      description: "Whether the link has rel=nofollow"

  llm_context: |
    USE: when analyzing internal linking structure from generated content.
    TRIGGERS: internal links, link structure, SEO links, anchor text, content linking.
    NOT: semantic page linking (use LINKS_TO), entity references (use USES_ENTITY).
    RELATES: BlockGenerated (source), PageGenerated (target), properties: anchor_text, position, nofollow.

  cypher_pattern: "(BlockGenerated)-[:HAS_INTERNAL_LINK {anchor_text, position, nofollow}]->(PageGenerated)"
