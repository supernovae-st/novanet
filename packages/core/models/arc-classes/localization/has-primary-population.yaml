# packages/core/models/arc-classes/localization/has-primary-population.yaml
# NovaNet v0.13.1 — LLM-First YAML Ordering
# ArcClass: HAS_PRIMARY_POPULATION — Locale's majority population cluster
# v10.8: Geographic Taxonomy

arc:
  # IDENTITY
  name: HAS_PRIMARY_POPULATION
  family: localization
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: >-
    Links a Locale to its primary/majority population cluster. Used for quick
    visual context when detailed demographic breakdown is not needed.
    Simpler than HAS_POPULATION for common use cases.
  llm_context: |
    USE: when loading primary/majority population for quick visual context.
    TRIGGERS: primary population, majority ethnicity, main demographic, quick population.
    NOT: detailed demographics (use HAS_POPULATION), regional population (use POPULATION_OF).
    RELATES: Locale (source), PopulationCluster (target), PRIMARY_FOR (inverse).

  # GRAPH STRUCTURE
  source: Locale
  target: PopulationCluster
  cardinality: many_to_one

  # FLAGS
  inverse: PRIMARY_FOR

  # REFERENCE
  cypher_pattern: "(Locale)-[:HAS_PRIMARY_POPULATION]->(PopulationCluster)"
