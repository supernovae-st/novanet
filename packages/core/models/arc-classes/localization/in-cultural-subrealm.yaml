# packages/core/models/arc-classes/localization/in-cultural-subrealm.yaml
# NovaNet v0.13.1 — LLM-First YAML Ordering
# ArcClass: IN_CULTURAL_SUBREALM — Locale belongs to CulturalSubRealm
# v10.8: Geographic Taxonomy

arc:
  # IDENTITY
  name: IN_CULTURAL_SUBREALM
  family: localization
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: >-
    Links a Locale to its cultural sub-realm for content adaptation.
    Cultural realms group locales with similar cultural characteristics,
    enabling shared cultural context across geographic boundaries.
  llm_context: |
    USE: when finding cultural context for content adaptation.
    TRIGGERS: cultural realm, content adaptation, cultural context, similar cultures.
    NOT: geographic region (use IN_SUBREGION), economic region (use IN_ECONOMIC_REGION).
    RELATES: Locale (source), CulturalSubRealm (target), HAS_LOCALE (inverse).

  # GRAPH STRUCTURE
  source: Locale
  target: CulturalSubRealm
  cardinality: many_to_one

  # FLAGS
  inverse: HAS_LOCALE

  # REFERENCE
  cypher_pattern: "(Locale)-[:IN_CULTURAL_SUBREALM]->(CulturalSubRealm)"
