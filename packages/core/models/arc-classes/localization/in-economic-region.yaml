# packages/core/models/arc-classes/localization/in-economic-region.yaml
# NovaNet v0.13.1 — LLM-First YAML Ordering
# ArcClass: IN_ECONOMIC_REGION — Locale's World Bank economic region
# v10.8: Geographic Taxonomy

arc:
  # IDENTITY
  name: IN_ECONOMIC_REGION
  family: localization
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: >-
    Links a Locale to its World Bank economic region for market analysis.
    Economic regions provide groupings of countries for regional market
    strategies and peer comparison.
  llm_context: |
    USE: when finding World Bank economic region for market analysis.
    TRIGGERS: economic region, World Bank region, regional peers, market grouping.
    NOT: income level (use HAS_INCOME_LEVEL), lending type (use HAS_LENDING_TYPE).
    RELATES: Locale (source), EconomicRegion (target), HAS_LOCALE (inverse).

  # GRAPH STRUCTURE
  source: Locale
  target: EconomicRegion
  cardinality: many_to_one

  # FLAGS
  inverse: HAS_LOCALE

  # REFERENCE
  cypher_pattern: "(Locale)-[:IN_ECONOMIC_REGION]->(EconomicRegion)"
