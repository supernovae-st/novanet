# packages/core/models/arc-classes/localization/speaks-branch.yaml
# NovaNet v0.13.1 — LLM-First YAML Ordering
# ArcClass: SPEAKS_BRANCH — Locale's primary language branch
# v10.8: Geographic Taxonomy

arc:
  # IDENTITY
  name: SPEAKS_BRANCH
  family: localization
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: >-
    Links a Locale to its primary language branch (e.g., Romance, Germanic).
    Used for finding linguistically similar locales and understanding
    language family relationships.
  llm_context: |
    USE: when finding language family/branch for a locale.
    TRIGGERS: language branch, language family, similar languages, Romance/Germanic.
    NOT: cultural realm (use IN_CULTURAL_SUBREALM), geographic region (use IN_SUBREGION).
    RELATES: Locale (source), LanguageBranch (target), SPOKEN_BY (inverse).

  # GRAPH STRUCTURE
  source: Locale
  target: LanguageBranch
  cardinality: many_to_one

  # FLAGS
  inverse: SPOKEN_BY

  # REFERENCE
  cypher_pattern: "(Locale)-[:SPEAKS_BRANCH]->(LanguageBranch)"
