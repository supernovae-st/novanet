# packages/core/models/arc-classes/localization/for-locale.yaml
# ArcClass: FOR_LOCALE — All localized content nodes point to their target Locale
# v10.2: SEOKeyword removed — now owned by Locale via HAS_SEO_KEYWORDS
# v0.12.4: Added PromptStyle as source (ADR-028)

arc:
  name: FOR_LOCALE
  family: localization
  scope: cross_realm  # org nodes → Locale (shared)
  source:
    - EntityContent
    - ProjectContent
    - BlockGenerated
    - PageGenerated
    - OutputArtifact
    - PromptStyle
  target: Locale
  cardinality: many_to_one
  llm_context: |
    USE: when finding the target locale for any localized content node.
    TRIGGERS: for locale, content locale, target language, localization target.
    NOT: locale fallback (use FALLBACK_TO), locale ownership (use HAS_LOCALE).
    RELATES: EntityContent/ProjectContent/BlockGenerated/PageGenerated/PromptStyle (source), Locale (target).
  cypher_pattern: (EntityContent, PromptStyle)-[:FOR_LOCALE]->(Locale)
