# packages/core/models/arc-classes/localization/in-country.yaml
# NovaNet v0.13.1 — LLM-First YAML Ordering
# ArcClass: IN_COUNTRY — Locale belongs to Country
# v0.12.4: ADR-028 Geographic Hierarchy (Country level)

arc:
  # IDENTITY
  name: IN_COUNTRY
  family: localization
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: >-
    Links a Locale to its Country (ISO 3166-1). Part of the geographic
    hierarchy: Locale -> Country -> GeoRegion -> Continent. Used for
    national context, legal requirements, and country-specific content.
  llm_context: |
    USE: when finding the country for a locale (ISO 3166-1).
    TRIGGERS: locale country, which country, national context, country lookup.
    NOT: geographic region (use IN_SUBREGION), cultural realm (use IN_CULTURAL_SUBREALM).
    RELATES: Locale (source), Country (target), HAS_LOCALE (inverse), hierarchy: Locale->Country->GeoRegion->Continent.

  # GRAPH STRUCTURE
  source: Locale
  target: Country
  cardinality: many_to_one

  # FLAGS
  inverse: HAS_LOCALE

  # REFERENCE
  cypher_pattern: "(Locale)-[:IN_COUNTRY]->(Country)"
