# packages/core/models/arc-classes/localization/has-locale-variant.yaml
# NovaNet v0.13.1 — LLM-First YAML Ordering
# ArcClass: HAS_LOCALE_VARIANT — Parent Locale has regional variant (inverse of LOCALE_VARIANT_OF)
# v0.12.5: ADR-026 Inverse Arc Policy

arc:
  # IDENTITY
  name: HAS_LOCALE_VARIANT
  family: localization
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: >-
    Links a parent Locale to its regional variants. The inverse of LOCALE_VARIANT_OF.
    Used for finding all regional adaptations of a base locale (e.g., en-GB has
    variants en-AU, en-NZ, en-IN).
  llm_context: |
    USE: when finding all regional variants of a parent Locale.
    TRIGGERS: "locale variants", "regional variations", "child locales".
    NOT: for finding a Locale's parent (use LOCALE_VARIANT_OF).
    RELATES: Locale (source/parent), Locale (target/variant), LOCALE_VARIANT_OF (inverse).
    Example: en-GB -[:HAS_LOCALE_VARIANT]-> en-AU

  # GRAPH STRUCTURE
  source: Locale
  target: Locale
  cardinality: one_to_many

  # FLAGS
  is_self_referential: true
  inverse_of: LOCALE_VARIANT_OF

  # REFERENCE
  cypher_pattern: "(Locale)-[:HAS_LOCALE_VARIANT]->(Locale)"
