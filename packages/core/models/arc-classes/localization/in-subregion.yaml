# packages/core/models/arc-classes/localization/in-subregion.yaml
# ArcClass: IN_SUBREGION - Locale belongs to GeoRegion/GeoSubRegion
# v10.8: Geographic Taxonomy

arc:
  name: IN_SUBREGION
  family: localization
  scope: intra_realm  # Both Locale and GeoRegion are in shared realm

  source: Locale
  target:
    - GeoRegion
    - GeoSubRegion
  cardinality: many_to_one

  inverse: HAS_LOCALE

  llm_context: |
    USE: when finding geographic region for a locale.
    TRIGGERS: geographic region, subregion, regional context, similar locales.
    NOT: country (use IN_COUNTRY), cultural realm (use IN_CULTURAL_SUBREALM).
    RELATES: Locale (source), GeoRegion/GeoSubRegion (target), HAS_LOCALE (inverse), traversal: Locale→Region→Continent.

  cypher_pattern: "(Locale)-[:IN_SUBREGION]->(GeoRegion|GeoSubRegion)"
