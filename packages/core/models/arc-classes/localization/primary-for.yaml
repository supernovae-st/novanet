# packages/core/models/arc-classes/localization/primary-for.yaml
# NovaNet v0.13.1 — LLM-First YAML Ordering
# ArcClass: PRIMARY_FOR — PopulationCluster is primary for Locale (inverse of HAS_PRIMARY_POPULATION)
# v0.12.5: ADR-026 Inverse Arc Policy

arc:
  # IDENTITY
  name: PRIMARY_FOR
  family: localization
  scope: intra_realm

  # SEMANTIC (LLM-CRITICAL)
  description: >-
    Links a PopulationCluster to all Locales where it is the primary/majority
    population. Inverse of HAS_PRIMARY_POPULATION. Used for finding which
    locales have a specific population cluster as their majority.
  llm_context: |
    USE: when finding all Locales where this population cluster is the majority.
    TRIGGERS: "primary population locales", "majority population where", "cluster primary locales".
    NOT: for finding a Locale's primary population (use HAS_PRIMARY_POPULATION).
    RELATES: PopulationCluster (source), Locale (target), HAS_PRIMARY_POPULATION (inverse).

  # GRAPH STRUCTURE
  source: PopulationCluster
  target: Locale
  cardinality: one_to_many

  # FLAGS
  inverse_of: HAS_PRIMARY_POPULATION

  # REFERENCE
  cypher_pattern: "(PopulationCluster)-[:PRIMARY_FOR]->(Locale)"
