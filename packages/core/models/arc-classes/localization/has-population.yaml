# packages/core/models/arc-classes/localization/has-population.yaml
# ArcKind: HAS_POPULATION - Locale's population sub-clusters with percentages
# v10.8: Geographic Taxonomy

arc:
  name: HAS_POPULATION
  family: localization
  scope: intra_realm

  source: Locale
  target: PopulationSubCluster
  cardinality: many_to_many

  properties:
    - name: percentage
      type: float
      required: true
      description: "Population percentage (0.0 to 1.0)"

    - name: is_majority
      type: boolean
      required: false
      description: "True if this population is >50%"

  inverse: POPULATION_OF

  llm_context: |
    USE: when loading population demographics for diverse image generation.
    TRIGGERS: population mix, demographics, visual diversity, ethnic composition.
    NOT: primary population (use HAS_PRIMARY_POPULATION), geographic region (use IN_SUBREGION).
    RELATES: Locale (source), PopulationSubCluster (target), POPULATION_OF (inverse), percentage property.

  cypher_pattern: "(Locale)-[:HAS_POPULATION {percentage, is_majority}]->(PopulationSubCluster)"
