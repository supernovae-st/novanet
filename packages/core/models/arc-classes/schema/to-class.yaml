# packages/core/models/arc-classes/schema/to-class.yaml
# ArcClass: TO_CLASS — ArcClass → Class (target node type definition)
# v0.13.1: Meta-schema arc defining the target node type for an ArcClass

arc:
  name: TO_CLASS
  family: schema
  scope: intra_realm

  description: "ArcClass defines target Class type"
  llm_context: |
    USE: when defining which node types can be the target of an arc relationship.
    TRIGGERS: "arc target", "relationship to", "arc schema definition".
    NOT: for instance relationships (use the actual arc), for validation (use schema constraints).
    RELATES: ArcClass (arc definition), Class (target node type), AUTO-GENERATED (by arc_class generator).

  source: ArcClass
  target: Class
  cardinality: many_to_many

  cypher_pattern: "(ArcClass)-[:TO_CLASS]->(Class)"
