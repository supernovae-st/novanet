# packages/core/models/arc-classes/schema/of-class.yaml
# ArcClass: OF_CLASS — Instance → Class (schema meta-graph)
# v0.13.1: Meta-schema arc connecting instance nodes to their Class definitions

arc:
  name: OF_CLASS
  family: schema
  scope: intra_realm

  description: "Instance belongs to Class (schema meta-graph)"
  llm_context: |
    USE: when connecting instance nodes to their Class definitions in the schema graph.
    TRIGGERS: "class membership", "instance-class bridge", "schema graph structure".
    NOT: for data relationships (use semantic arcs), for type validation (use OF_TYPE).
    RELATES: Instance (any node), Class (schema node), AUTO-GENERATED (by autowire generator).

  source: "*"
  target: Class
  cardinality: many_to_one

  cypher_pattern: "(Instance)-[:OF_CLASS]->(Class)"
