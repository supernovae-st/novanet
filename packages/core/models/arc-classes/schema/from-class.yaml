# packages/core/models/arc-classes/schema/from-class.yaml
# ArcClass: FROM_CLASS — ArcClass → Class (source node type definition)
# v0.13.1: Meta-schema arc defining the source node type for an ArcClass

arc:
  name: FROM_CLASS
  family: schema
  scope: intra_realm

  description: "ArcClass defines source Class type"
  llm_context: |
    USE: when defining which node types can be the source of an arc relationship.
    TRIGGERS: "arc source", "relationship from", "arc schema definition".
    NOT: for instance relationships (use the actual arc), for validation (use schema constraints).
    RELATES: ArcClass (arc definition), Class (source node type), AUTO-GENERATED (by arc_class generator).

  source: ArcClass
  target: Class
  cardinality: many_to_many

  cypher_pattern: "(ArcClass)-[:FROM_CLASS]->(Class)"
