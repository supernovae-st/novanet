# arc-classes/semantic/targets.yaml
# TARGETS - EntityNative targets SEO keywords (v10.6)
#
# v10.6: SEO Schema v2
#        - Localized content targets specific keywords for SEO
#        - Bidirectional with EXPRESSES (keyword → entity)
#        - Must respect locale alignment (EntityNative.locale == SEOKeyword.locale)
#
# v11.5: scope fix (intra_realm → cross_realm)
#        - EntityNative (org/semantic) → SEOKeyword (shared/knowledge)

arc:
  name: TARGETS
  family: semantic
  scope: cross_realm
  temperature_threshold: 0.6

  source: EntityNative
  target: SEOKeyword
  cardinality: many_to_many

  properties:
    - name: priority
      type: string
      required: false
      enum: [primary, secondary, tertiary]
      description: "Targeting priority for this keyword"
    - name: target_position
      type: int
      required: false
      description: "Target ranking position (1-10)"

  llm_context: |
    USE: when finding SEO keywords targeted by localized content.
    TRIGGERS: targets keyword, SEO targeting, keyword optimization, organic search.
    NOT: keyword expression (use EXPRESSES), persona targeting (use TARGETS_PERSONA).
    RELATES: EntityNative (source), SEOKeyword (target), cross_realm, locale must match.

  cypher_pattern: "(EntityNative)-[:TARGETS {priority, target_position}]->(SEOKeyword)"
