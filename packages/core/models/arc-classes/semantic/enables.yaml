# packages/core/models/arc-classes/semantic/enables.yaml
# ArcClass: ENABLES — Entity enables/unlocks another Entity
# v0.13.1: LLM-First field ordering (semantic fields before structure)

arc:
  # --- IDENTITY ---
  name: ENABLES
  family: semantic
  scope: intra_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    Entity unlocks or enables capability in another entity. Models
    prerequisite and dependency relationships where one entity makes
    another entity's functionality possible. Different from REQUIRES
    (hard dependency) and ENHANCES (optional improvement).
  llm_context: |
    USE: when finding what capabilities an entity unlocks.
    TRIGGERS: enables, unlocks, makes possible, facilitates, permits.
    NOT: requirement (use REQUIRES), enhancement (use ENHANCES).
    RELATES: Entity (source/enabler), Entity (target), ENABLED_BY (inverse).

  # --- GRAPH STRUCTURE ---
  source: Entity
  target: Entity
  cardinality: many_to_many

  # --- FLAGS ---
  inverse: ENABLED_BY
  is_self_referential: true
  temperature_threshold: 0.2

  # --- DATA ---
  properties:
    - name: strength
      type: float
      required: false
      default: 0.75
      description: "Enablement strength (0.0-1.0)"

    - name: temperature
      type: float
      required: false
      default: 0.8
      description: "Spreading activation weight"

    - name: enablement_type
      type: string
      required: false
      enum: [unlocks, enhances, permits, facilitates]
      description: "Type of enablement relationship"

  # --- REFERENCE ---
  cypher_pattern: "(Entity)-[:ENABLES {strength, temperature, enablement_type}]->(Entity)"
