# arc-classes/semantic/use-case-for.yaml
# USE_CASE_FOR - Preposition keyword references target entity (v11.4)

arc:
  name: USE_CASE_FOR
  family: semantic
  scope: cross_realm
  temperature_threshold: 0.5
  source: SEOKeyword
  target: Entity
  cardinality: many_to_one

  llm_context: |
    USE: when linking preposition keywords ("X for Y") to their target entity.
    TRIGGERS: use case, for keyword, preposition format, keyword target.
    NOT: keyword targeting (use TARGETS), keyword expression (use EXPRESSES).
    RELATES: SEOKeyword (source), Entity (target), requires HAS_FORMAT → preposition.

  cypher_pattern: "(SEOKeyword)-[:USE_CASE_FOR]->(Entity)"
