# packages/core/models/arc-classes/semantic/belongs-to.yaml
# ArcClass: BELONGS_TO - Entity belongs to a semantic category (org -> shared)
#
# v11.1.0: NEW arc replacing Entity.type property with proper graph relationship
#          Entity (org/semantic) -> EntityCategory (shared/config)
# v0.13.1: MOVED from ownership/ to semantic/ (ADR-026 audit)
#          Classification is semantic, not hierarchical ownership

arc:
  name: BELONGS_TO
  family: semantic
  scope: cross_realm  # org Entity -> shared EntityCategory (ADR-017)
  temperature_threshold: 0.10  # Lightweight taxonomy classification

  source: Entity
  target: EntityCategory

  cardinality: many_to_one  # Each Entity has exactly one category
  inverse: CATEGORY_OF

  llm_context: |
    USE: when filtering/clustering entities by semantic category.
    TRIGGERS: entity category, entity type, what is entity, categorization, taxonomy.
    NOT: entity content (use HAS_CONTENT), entity hierarchy (use HAS_CHILD), entity ownership (use HAS_ENTITY).
    RELATES: Entity (source), EntityCategory (target), CATEGORY_OF (inverse), cross_realm (scope).

  cypher_pattern: "(Entity)-[:BELONGS_TO]->(EntityCategory)"

  constraints:
    required: true           # Every Entity MUST have exactly one BELONGS_TO arc
    unique_source: true      # Each Entity can only belong to one category
    target_must_exist: true  # Target must be a valid EntityCategory node

  example:
    description: "QR Code entity belongs to THING category"
    cypher: |
      // Create the relationship
      MATCH (e:Entity {key: 'qr-code'})
      MATCH (c:EntityCategory {key: 'THING'})
      MERGE (e)-[:BELONGS_TO]->(c)

      // Query entities by category
      MATCH (e:Entity)-[:BELONGS_TO]->(c:EntityCategory {key: 'THING'})
      RETURN e.key, e.display_name
