# packages/core/models/arc-classes/semantic/belongs-to.yaml
# ArcClass: BELONGS_TO — Entity belongs to a semantic category (org -> shared)
# v0.13.1: LLM-First field ordering (semantic fields before structure)
# v11.1.0: NEW arc replacing Entity.type property with graph relationship

arc:
  # --- IDENTITY ---
  name: BELONGS_TO
  family: semantic
  scope: cross_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    Entity belongs to an EntityCategory for semantic classification.
    This is a cross-realm arc from org Entity to shared EntityCategory.
    Replaces the old Entity.type enum property with a proper graph
    relationship for better queryability and extensibility (ADR-017).
  llm_context: |
    USE: when filtering/clustering entities by semantic category.
    TRIGGERS: entity category, entity type, what is entity, categorization, taxonomy.
    NOT: entity content (use HAS_NATIVE), entity hierarchy (use HAS_CHILD), entity ownership (use HAS_ENTITY).
    RELATES: Entity (source), EntityCategory (target), CATEGORY_OF (inverse), cross_realm (scope).

  # --- GRAPH STRUCTURE ---
  source: Entity
  target: EntityCategory
  cardinality: many_to_one

  # --- FLAGS ---
  inverse: CATEGORY_OF
  temperature_threshold: 0.10

  # --- DATA ---
  constraints:
    required: true
    unique_source: true
    target_must_exist: true

  # --- REFERENCE ---
  cypher_pattern: "(Entity)-[:BELONGS_TO]->(EntityCategory)"

  examples:
    - description: "QR Code entity belongs to THING category"
      cypher: |
        // Create the relationship
        MATCH (e:Entity {key: 'qr-code'})
        MATCH (c:EntityCategory {key: 'THING'})
        MERGE (e)-[:BELONGS_TO]->(c)

        // Query entities by category
        MATCH (e:Entity)-[:BELONGS_TO]->(c:EntityCategory {key: 'THING'})
        RETURN e.key, e.display_name
