# packages/core/models/arc-classes/semantic/monitors-geo.yaml
# ArcClass: MONITORS_GEO — EntityNative monitors GEO queries for AI visibility
# v0.13.1: LLM-First field ordering (semantic fields before structure)

arc:
  # --- IDENTITY ---
  name: MONITORS_GEO
  family: semantic
  scope: cross_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    EntityNative monitors GEO queries for AI visibility tracking. Parallel
    to TARGETS (SEO) for GEO optimization. Enables tracking which entities
    care about which AI search queries for visibility monitoring.
    Cross-realm arc: EntityNative (org/semantic) -> GEOQuery (shared/knowledge).
  llm_context: |
    USE: when finding GEO queries monitored by an entity for AI visibility.
    TRIGGERS: GEO monitoring, AI visibility, entity queries, GEO tracking.
    NOT: SEO targeting (use TARGETS), GEO answers (use HAS_GEO_ANSWERS).
    RELATES: EntityNative (source), GEOQuery (target), priority (property).

  # --- GRAPH STRUCTURE ---
  source: EntityNative
  target: GEOQuery
  cardinality: many_to_many

  # --- FLAGS ---
  temperature_threshold: 0.6

  # --- DATA ---
  properties:
    - name: priority
      type: string
      required: false
      enum: [primary, secondary, tertiary]
      description: "Monitoring priority for this GEO query"

    - name: alert_threshold
      type: int
      required: false
      description: "Visibility drop threshold to trigger alert (percentage points)"

  # --- REFERENCE ---
  cypher_pattern: "(EntityNative)-[:MONITORS_GEO {priority, alert_threshold}]->(GEOQuery)"

  examples:
    - description: "Get all GEO queries monitored by an entity"
      cypher: |
        MATCH (e:EntityNative {key: $entity_key})-[r:MONITORS_GEO]->(q:GEOQuery)
        RETURN q.value, q.ai_visibility_score, r.priority
        ORDER BY r.priority, q.ai_visibility_score DESC
