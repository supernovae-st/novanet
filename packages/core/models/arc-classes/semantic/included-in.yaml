# packages/core/models/arc-classes/semantic/included-in.yaml
# ArcClass: INCLUDED_IN — Entity is included in another Entity (inverse of INCLUDES)
# v0.13.1: LLM-First field ordering (semantic fields before structure)

arc:
  # --- IDENTITY ---
  name: INCLUDED_IN
  family: semantic
  scope: intra_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    Inverse of INCLUDES. Entity is part of or contained in another entity.
    Models part-whole relationships. Different from CHILD_OF (hierarchical
    ownership) and TYPE_OF (classification hierarchy).
  llm_context: |
    USE: when finding the containing entity for a part.
    TRIGGERS: part of, belongs to, contained in, included in.
    NOT: parent (use CHILD_OF), type hierarchy (use TYPE_OF).
    RELATES: Entity (source/part), Entity (target/whole), INCLUDES (inverse).

  # --- GRAPH STRUCTURE ---
  source: Entity
  target: Entity
  cardinality: many_to_one

  # --- FLAGS ---
  inverse_of: INCLUDES
  is_self_referential: true
  temperature_threshold: 0.1

  # --- DATA ---
  properties:
    - name: strength
      type: float
      required: false
      default: 0.9
      description: "Containment strength (0.0-1.0)"

    - name: temperature
      type: float
      required: false
      default: 0.95
      description: "Spreading activation weight (high for parts)"

    - name: containment_type
      type: string
      required: false
      enum: [part, component, element, member, feature]
      description: "Type of containment relationship"

  # --- REFERENCE ---
  cypher_pattern: "(Entity)-[:INCLUDED_IN {strength, temperature, containment_type}]->(Entity)"
