# packages/core/models/arc-classes/semantic/for-channel.yaml
# ArcClass: FOR_CHANNEL - Content targets a specific channel/surface
arc:
  name: FOR_CHANNEL
  family: semantic
  scope: intra_realm

  source:
    - PageNative
    - BlockNative
  target: ChannelSurface
  cardinality: many_to_one

  llm_context: |
    USE: when finding content tailored for a specific channel.
    TRIGGERS: channel surface, mobile content, channel targeting, platform specific.
    NOT: locale targeting (use FOR_LOCALE), persona targeting (use TARGETS_PERSONA).
    RELATES: PageNative/BlockNative (source), ChannelSurface (target).

  cypher_pattern: "(PageNative, BlockNative)-[:FOR_CHANNEL]->(ChannelSurface)"
