# packages/core/models/arc-classes/semantic/alternative-to.yaml
# ArcClass: ALTERNATIVE_TO — Entity is an alternative to another Entity (symmetric)
# v0.13.1: LLM-First field ordering (semantic fields before structure)

arc:
  # --- IDENTITY ---
  name: ALTERNATIVE_TO
  family: semantic
  scope: intra_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    Symmetric relationship indicating two entities are substitutable.
    Different from COMPETES_WITH (market competition) and SIMILAR_TO
    (general similarity). Use for direct alternatives that can replace
    each other in most contexts.
  llm_context: |
    USE: when finding substitutable entities.
    TRIGGERS: alternative, substitute, instead of, similar option, fallback.
    NOT: competition (use COMPETES_WITH), similarity (use SIMILAR_TO).
    RELATES: Entity (source), Entity (target), symmetric (no inverse needed).

  # --- GRAPH STRUCTURE ---
  source: Entity
  target: Entity
  cardinality: many_to_many

  # --- FLAGS ---
  is_self_referential: true
  is_symmetric: true
  temperature_threshold: 0.25

  # --- DATA ---
  properties:
    - name: strength
      type: float
      required: false
      default: 0.7
      description: "Substitutability (0.0-1.0)"

    - name: temperature
      type: float
      required: false
      default: 0.75
      description: "Spreading activation weight"

    - name: alternative_type
      type: string
      required: false
      enum: [equivalent, similar, fallback, upgrade, downgrade]
      description: "Type of alternative relationship"

    - name: context
      type: string
      required: false
      description: "Context where this alternative applies"

  # --- REFERENCE ---
  cypher_pattern: "(Entity)-[:ALTERNATIVE_TO {strength, temperature, alternative_type, context}]->(Entity)"
