# packages/core/models/arc-classes/semantic/expression-used-by.yaml
# ArcClass: EXPRESSION_USED_BY — Inverse of USES_EXPRESSION
# v0.13.1: LLM-First field ordering (semantic fields before structure)

arc:
  # --- IDENTITY ---
  name: EXPRESSION_USED_BY
  family: semantic
  scope: cross_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    Inverse of USES_EXPRESSION. Navigates from Expression to find all
    EntityNative nodes that use this expression. Useful for tone analysis
    and voice consistency checks across content.
    Cross-realm arc: Expression (shared/knowledge) → EntityNative (org/semantic).
  llm_context: |
    USE: when finding which EntityNative nodes use a specific expression.
    TRIGGERS: expression usage, tone analysis, voice consistency check.
    NOT: expression containers (use CONTAINS_EXPRESSION), expression definitions.
    RELATES: Expression (source), EntityNative (target), USES_EXPRESSION (forward arc).
    EXAMPLE: Find all entities using energetic CTA expressions.

  # --- GRAPH STRUCTURE ---
  source: Expression
  target: EntityNative
  cardinality: many_to_many

  # --- FLAGS ---
  inverse_of: USES_EXPRESSION
  temperature_threshold: 0.5

  # --- DATA ---
  properties:
    - name: purpose
      type: string
      required: false
      enum: [cta, headline, tagline, description, warning, celebration]
      description: "Inherited from USES_EXPRESSION relationship"

    - name: temperature
      type: float
      required: false
      default: 0.7
      description: "Activation weight for spreading activation (0.0-1.0)"

    - name: context
      type: string
      required: false
      enum: [homepage, pricing, features, support, landing_page, email]
      description: "Inherited from USES_EXPRESSION relationship"

    - name: tone_match
      type: float
      required: false
      description: "Inherited from USES_EXPRESSION relationship"

  # --- REFERENCE ---
  cypher_pattern: "(Expression)-[:EXPRESSION_USED_BY {purpose, temperature, context, tone_match}]->(EntityNative)"

  examples:
    - cypher: |
        // Find all EntityNative using energetic CTAs
        MATCH (e:Expression {tone: "energetic", use_case: "greeting"})
        MATCH (e)-[r:EXPRESSION_USED_BY]->(en:EntityNative)
        WHERE r.purpose = "cta"
        RETURN en.key, en.display_name, e.text
        ORDER BY r.temperature DESC
