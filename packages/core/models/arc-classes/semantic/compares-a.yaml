# packages/core/models/arc-classes/semantic/compares-a.yaml
# ArcClass: COMPARES_A — Comparison keyword references first entity (X in "X vs Y")
# v0.13.1: LLM-First field ordering (semantic fields before structure)

arc:
  # --- IDENTITY ---
  name: COMPARES_A
  family: semantic
  scope: cross_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    Links a comparison SEOKeyword to the first entity being compared.
    For example, in "QR code vs barcode", this arc links to "QR code".
    Used with COMPARES_B to capture both sides of comparison keywords.
  llm_context: |
    USE: when linking comparison keyword to first entity (X in "X vs Y").
    TRIGGERS: comparison keyword, versus first, compared entity A.
    NOT: second entity (use COMPARES_B), keyword format (use HAS_FORMAT).
    RELATES: SEOKeyword (source), Entity (target), COMPARES_B (complement).

  # --- GRAPH STRUCTURE ---
  source: SEOKeyword
  target: Entity
  cardinality: many_to_one

  # --- FLAGS ---
  temperature_threshold: 0.6

  # --- REFERENCE ---
  cypher_pattern: "(SEOKeyword)-[:COMPARES_A]->(Entity)"
