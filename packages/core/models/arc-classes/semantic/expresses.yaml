# packages/core/models/arc-classes/semantic/expresses.yaml
# ArcClass: EXPRESSES — SEOKeyword expresses an Entity
# v0.13.1: LLM-First field ordering (semantic fields before structure)

arc:
  # --- IDENTITY ---
  name: EXPRESSES
  family: semantic
  scope: cross_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    SEOKeyword semantically expresses an Entity concept. Maps search keywords
    to the semantic entities they represent. Cross-realm arc from shared
    SEOKeyword to org Entity. Used for keyword-to-entity resolution in
    SEO content strategy.
  llm_context: |
    USE: when finding which entity an SEO keyword expresses.
    TRIGGERS: keyword entity, keyword expresses, semantic match, keyword mapping.
    NOT: entity keywords (use HAS_KEYWORD), keyword format (use HAS_FORMAT).
    RELATES: SEOKeyword (source), Entity (target), role (property: primary/secondary).

  # --- GRAPH STRUCTURE ---
  source: SEOKeyword
  target: Entity
  cardinality: many_to_one

  # --- FLAGS ---
  temperature_threshold: 0.5

  # --- DATA ---
  properties:
    - name: role
      type: string
      required: false
      enum: [primary, secondary, long_tail]
      description: "How the keyword expresses the entity"

    - name: match_score
      type: float
      required: false
      description: "Semantic similarity score (0.0-1.0)"

  # --- REFERENCE ---
  cypher_pattern: "(SEOKeyword)-[:EXPRESSES {role, match_score}]->(Entity)"
