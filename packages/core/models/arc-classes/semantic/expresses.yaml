# packages/core/models/arc-classes/semantic/expresses.yaml
# ArcClass: EXPRESSES — SEOKeyword expresses an Entity (v10.3)
#
# v11.5: scope fix (intra_realm → cross_realm)
#        - SEOKeyword (shared/knowledge) → Entity (org/semantic)

arc:
  name: EXPRESSES
  family: semantic
  scope: cross_realm
  temperature_threshold: 0.5  # v10.3: Keyword→entity mapping (moderate priority)

  source: SEOKeyword
  target: Entity
  cardinality: many_to_one

  properties:
    - name: role
      type: string
      required: false
      enum: [primary, secondary, long_tail]
      description: "How the keyword expresses the entity"
    - name: match_score
      type: float
      required: false
      description: "Semantic similarity score (0.0-1.0)"

  llm_context: |
    USE: when finding which entity an SEO keyword expresses.
    TRIGGERS: keyword entity, keyword expresses, semantic match, keyword mapping.
    NOT: entity keywords (use HAS_KEYWORD), keyword format (use HAS_FORMAT).
    RELATES: SEOKeyword (source), Entity (target), role (property: primary/secondary).

  cypher_pattern: "(SEOKeyword)-[:EXPRESSES {role, match_score}]->(Entity)"
