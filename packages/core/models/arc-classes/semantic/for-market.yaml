# packages/core/models/arc-classes/semantic/for-market.yaml
# ArcClass: FOR_MARKET — Brand targets Market (ADR-028)
# v0.13.1: LLM-First field ordering (semantic fields before structure)

arc:
  # --- IDENTITY ---
  name: FOR_MARKET
  family: semantic
  scope: cross_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    Brand targets a specific market segment. Cross-realm arc from org Brand
    to shared Market. Use to find which markets a brand actively targets
    for its products and services.
  llm_context: |
    USE: when finding which markets a brand targets.
    TRIGGERS: brand markets, target market, market segment, geographic market.
    NOT: locale market (use HAS_MARKET), locale support (use SUPPORTS_LOCALE).
    RELATES: Brand (source), Market (target), 1:N cardinality.

  # --- GRAPH STRUCTURE ---
  source: Brand
  target: Market
  cardinality: one_to_many

  # --- FLAGS ---
  required: false

  # --- REFERENCE ---
  cypher_pattern: "(Brand)-[:FOR_MARKET]->(Market)"
