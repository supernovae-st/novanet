# packages/core/models/arc-classes/semantic/pattern-used-by.yaml
# ArcClass: PATTERN_USED_BY — Inverse of USES_PATTERN
# v0.13.1: LLM-First field ordering (semantic fields before structure)

arc:
  # --- IDENTITY ---
  name: PATTERN_USED_BY
  family: semantic
  scope: cross_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    Inverse of USES_PATTERN. Navigates from Pattern to find all EntityNative
    nodes that use this structural pattern. Useful for structural consistency
    audits and pattern impact analysis.
    Cross-realm arc: Pattern (shared/knowledge) -> EntityNative (org/semantic).
  llm_context: |
    USE: when finding which EntityNative nodes use a specific pattern.
    TRIGGERS: pattern usage, content analysis, structural consistency check.
    NOT: pattern containers (use CONTAINS_PATTERN), pattern definitions.
    RELATES: Pattern (source), EntityNative (target), USES_PATTERN (forward arc).
    EXAMPLE: Find all entities using a specific headline pattern.

  # --- GRAPH STRUCTURE ---
  source: Pattern
  target: EntityNative
  cardinality: many_to_many

  # --- FLAGS ---
  inverse_of: USES_PATTERN
  temperature_threshold: 0.5

  # --- DATA ---
  properties:
    - name: usage_context
      type: string
      required: false
      enum: [headline, body, cta, tagline, meta_description, alt_text]
      description: "Inherited from USES_PATTERN relationship"

    - name: temperature
      type: float
      required: false
      default: 0.7
      description: "Activation weight for spreading activation (0.0-1.0)"

    - name: mandatory
      type: boolean
      required: false
      default: false
      description: "Inherited from USES_PATTERN relationship"

  # --- REFERENCE ---
  cypher_pattern: "(Pattern)-[:PATTERN_USED_BY {usage_context, temperature, mandatory}]->(EntityNative)"

  examples:
    - cypher: |
        // Find all EntityNative using a specific pattern
        MATCH (p:Pattern {key: $pattern_key})
        MATCH (p)-[r:PATTERN_USED_BY]->(en:EntityNative)
        RETURN en.key, en.display_name, r.usage_context
        ORDER BY r.temperature DESC
