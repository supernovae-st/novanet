# packages/core/models/arc-classes/semantic/references.yaml
# ArcKind: REFERENCES — Block references Entity
#
# v0.12.4: ADR-028 Page-Entity Architecture
# Aggregated from [:MENTIONS] arcs on BlockInstruction

arc:
  name: REFERENCES
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.7  # High priority - entity injection into blocks

  source: Block
  target: Entity
  cardinality: many_to_many

  properties:
    - name: purpose
      type: string
      required: true
      enum: [inject, link]
      description: "inject = embed entity content, link = create hyperlink"

    - name: count
      type: integer
      required: false
      default: 1
      description: "Number of times entity is referenced in block"

  inverse: REFERENCED_BY

  llm_context: |
    USE: when finding entities referenced by a block.
    TRIGGERS: block references, entity injection, block entities, content refs.
    NOT: instruction-level refs (use REFERENCES_ENTITY), page links (use LINKS_TO).
    RELATES: Block (source), Entity (target), REFERENCED_BY (inverse).

  cypher_pattern: "(Block)-[:REFERENCES {purpose, count}]->(Entity)"
