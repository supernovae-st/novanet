# arc-classes/semantic/compares-b.yaml
# COMPARES_B - Comparison keyword references second entity (v11.4)

arc:
  name: COMPARES_B
  family: semantic
  scope: cross_realm
  temperature_threshold: 0.6
  source: SEOKeyword
  target: Entity
  cardinality: many_to_one

  llm_context: |
    USE: when linking comparison keyword to second entity (Y in "X vs Y").
    TRIGGERS: comparison keyword, versus second, compared entity B.
    NOT: first entity (use COMPARES_A), keyword format (use HAS_FORMAT).
    RELATES: SEOKeyword (source), Entity (target), COMPARES_A (complement).

  cypher_pattern: "(SEOKeyword)-[:COMPARES_B]->(Entity)"
