# packages/core/models/arc-classes/semantic/compares-b.yaml
# ArcClass: COMPARES_B — Comparison keyword references second entity (Y in "X vs Y")
# v0.13.1: LLM-First field ordering (semantic fields before structure)

arc:
  # --- IDENTITY ---
  name: COMPARES_B
  family: semantic
  scope: cross_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    Links a comparison SEOKeyword to the second entity being compared.
    For example, in "QR code vs barcode", this arc links to "barcode".
    Used with COMPARES_A to capture both sides of comparison keywords.
  llm_context: |
    USE: when linking comparison keyword to second entity (Y in "X vs Y").
    TRIGGERS: comparison keyword, versus second, compared entity B.
    NOT: first entity (use COMPARES_A), keyword format (use HAS_FORMAT).
    RELATES: SEOKeyword (source), Entity (target), COMPARES_A (complement).

  # --- GRAPH STRUCTURE ---
  source: SEOKeyword
  target: Entity
  cardinality: many_to_one

  # --- FLAGS ---
  temperature_threshold: 0.6

  # --- REFERENCE ---
  cypher_pattern: "(SEOKeyword)-[:COMPARES_B]->(Entity)"
