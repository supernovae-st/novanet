# packages/core/models/arc-classes/semantic/represented-by.yaml
# ArcClass: REPRESENTED_BY — Entity is represented by its canonical Page (inverse of REPRESENTS)
#
# v0.12.5: ADR-026 Inverse Arc Policy (TIER 1 required inverse)

arc:
  name: REPRESENTED_BY
  family: semantic
  scope: intra_realm

  source: Entity
  target: Page
  cardinality: one_to_one

  inverse_of: REPRESENTS

  llm_context: |
    USE: when finding which Page is the canonical representation of an Entity.
    TRIGGERS: "entity's page", "where is entity displayed", "canonical page".
    NOT: for finding the Entity of a Page (use REPRESENTS instead).
    RELATES: Entity (source), Page (target), REPRESENTS (inverse).
    Example: Entity qr-code-generator -[:REPRESENTED_BY]-> Page qr-code-generator

  cypher_pattern: "(Entity)-[:REPRESENTED_BY]->(Page)"
