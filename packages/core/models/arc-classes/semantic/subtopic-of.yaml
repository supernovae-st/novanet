# packages/core/models/arc-classes/semantic/subtopic-of.yaml
# ArcClass: SUBTOPIC_OF — Cluster page is subtopic of pillar page for SEO topical authority

arc:
  name: SUBTOPIC_OF
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.2  # v9.9: SEO topical hierarchy (background context)
  source: Page
  target: Page
  cardinality: many_to_one
  is_self_referential: true
  llm_context: |
    USE: when building SEO topical hierarchy (cluster → pillar structure).
    TRIGGERS: subtopic of, cluster page, pillar page, topical authority, content hierarchy.
    NOT: page composition (use HAS_BLOCK), page linking (use LINKS_TO).
    RELATES: Page (source/cluster), Page (target/pillar), many_to_one cardinality.
  cypher_pattern: (Page)-[:SUBTOPIC_OF]->(Page)
