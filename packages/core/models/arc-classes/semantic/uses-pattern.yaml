# packages/core/models/arc-classes/semantic/uses-pattern.yaml
# ArcClass: USES_PATTERN — Direct EntityNative → Pattern connection
#
# v0.13.0: Direct knowledge atom loading (ADR-029 extension)
# Bypasses 4-hop: EntityNative → FOR_LOCALE → Locale → HAS_PATTERNS → PatternSet → Pattern
# Enables selective LLM context loading (~20 relevant patterns vs ALL patterns)

arc:
  name: USES_PATTERN
  family: semantic
  scope: cross_realm  # EntityNative (org/semantic) → Pattern (shared/knowledge)
  temperature_threshold: 0.6

  source: EntityNative
  target: Pattern
  cardinality: many_to_many

  properties:
    - name: usage_context
      type: string
      required: false
      enum: [headline, body, cta, tagline, meta_description, alt_text]
      description: "Where this pattern is applied in content"

    - name: temperature
      type: float
      required: false
      default: 0.7
      description: "Activation weight for spreading activation (0.0-1.0)"

    - name: mandatory
      type: boolean
      required: false
      default: false
      description: "If true, pattern MUST be used in generation"

  inverse: PATTERN_USED_BY

  llm_context: |
    USE: when loading locale-specific structural patterns for content generation.
    TRIGGERS: sentence pattern, structure, locale writing pattern, content template.
    NOT: expressions/tone (use USES_EXPRESSION), vocabulary (use USES_TERM).
    RELATES: EntityNative (source), Pattern (target), USES_EXPRESSION (sibling arc).
    EXAMPLE: Load headline patterns for French business content.

  cypher_pattern: "(EntityNative)-[:USES_PATTERN {usage_context, temperature, mandatory}]->(Pattern)"

  examples:
    cypher: |
      // Load patterns for an entity's native content
      MATCH (en:EntityNative {key: $entity_native_key})
      MATCH (en)-[r:USES_PATTERN]->(p:Pattern)
      RETURN p.key, p.template, p.domain, r.usage_context, r.mandatory
      ORDER BY r.mandatory DESC, r.temperature DESC
