# packages/core/models/arc-classes/semantic/references-page.yaml
# ArcClass: REFERENCES_PAGE — BlockInstruction references Page (v10.3)

arc:
  name: REFERENCES_PAGE
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.6  # v10.3: Instruction→page reference (moderate-high priority)

  source: BlockInstruction
  target: Page
  cardinality: many_to_many

  properties:
    - name: syntax
      type: string
      required: false
      description: "Original syntax used (e.g., @link:key)"
    - name: context
      type: string
      required: false
      description: "Surrounding context in the instruction"

  llm_context: |
    USE: when finding pages referenced by a block instruction.
    TRIGGERS: @link reference, instruction pages, page link, internal link.
    NOT: entity references (use REFERENCES_ENTITY), page-to-page (use LINKS_TO).
    RELATES: BlockInstruction (source), Page (target), auto-parsed from @ syntax.

  cypher_pattern: "(BlockInstruction)-[:REFERENCES_PAGE {syntax, context}]->(Page)"
