# packages/core/models/arc-classes/semantic/inspired-by-region.yaml
# ArcClass: INSPIRED_BY_REGION — PromptStyle inspired by GeoRegion (ADR-028)
# v0.13.1: LLM-First field ordering (semantic fields before structure)

arc:
  # --- IDENTITY ---
  name: INSPIRED_BY_REGION
  family: semantic
  scope: cross_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    PromptStyle is inspired by a geographic region's cultural aesthetics.
    Used to capture regional visual influences in AI-generated content style.
    Cross-realm arc from org PromptStyle to shared GeoRegion.
  llm_context: |
    USE: when finding the cultural inspiration for a prompt style.
    TRIGGERS: style inspiration, regional style, cultural aesthetic, visual culture.
    NOT: locale targeting (use FOR_LOCALE), brand design (use HAS_DESIGN).
    RELATES: PromptStyle (source), GeoRegion (target), optional relationship.

  # --- GRAPH STRUCTURE ---
  source: PromptStyle
  target: GeoRegion
  cardinality: many_to_one

  # --- FLAGS ---
  required: false

  # --- REFERENCE ---
  cypher_pattern: "(PromptStyle)-[:INSPIRED_BY_REGION]->(GeoRegion)"
