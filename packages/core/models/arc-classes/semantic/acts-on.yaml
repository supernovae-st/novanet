# packages/core/models/arc-classes/semantic/acts-on.yaml
# ArcClass: ACTS_ON — Action operates directly on entity
# v0.13.1: LLM-First field ordering (semantic fields before structure)

arc:
  # --- IDENTITY ---
  name: ACTS_ON
  family: semantic
  scope: intra_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    Action entity operates directly on target entity. Used to model
    action-object relationships where one entity (typically a verb/action)
    directly affects another entity (typically a noun/object).
  llm_context: |
    USE: when finding what entity an action operates on.
    TRIGGERS: action target, operates on, action entity, direct operation.
    NOT: capability (use ENABLES), domain relevance (use APPLIES_TO).
    RELATES: Entity (source/action), Entity (target/thing), OPERATED_BY (inverse).

  # --- GRAPH STRUCTURE ---
  source: Entity
  target: Entity
  cardinality: many_to_many

  # --- FLAGS ---
  inverse: OPERATED_BY
  is_self_referential: false
  temperature_threshold: 0.15

  # --- DATA ---
  properties:
    - name: strength
      type: float
      required: false
      default: 0.8
      description: "Relationship strength (0.0-1.0)"

    - name: temperature
      type: float
      required: false
      default: 0.85
      description: "Spreading activation weight"

    - name: operation_type
      type: string
      required: false
      enum: [create, read, update, delete, scan, download, print, customize, track]
      description: "Type of operation performed"

  # --- REFERENCE ---
  cypher_pattern: "(Entity)-[:ACTS_ON {strength, temperature, operation_type}]->(Entity)"
