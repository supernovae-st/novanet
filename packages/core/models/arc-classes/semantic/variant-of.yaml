# packages/core/models/arc-classes/semantic/variant-of.yaml
# ArcKind: VARIANT_OF - Entity is a variant/version of another Entity
# v10.7: Typed semantic arcs (replaces generic SEMANTIC_LINK)

arc:
  name: VARIANT_OF
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.2  # Follow in most spreading activation scenarios

  source: Entity
  target: Entity
  cardinality: many_to_one
  is_self_referential: true

  properties:
    - name: strength
      type: float
      required: false
      default: 0.8
      description: "Relationship intensity (0.0-1.0)"

    - name: temperature
      type: float
      required: false
      default: 0.85
      description: "Spreading activation weight"

    - name: variant_type
      type: string
      required: false
      enum: [version, flavor, edition, specialization, customization]
      description: "Type of variant relationship"

  inverse_of: HAS_VARIANT

  llm_context: |
    USE: when finding entity variants/versions (specialized forms).
    TRIGGERS: variant of, version of, flavor, edition, specialization.
    NOT: taxonomy (use TYPE_OF), alternatives (use ALTERNATIVE_TO).
    RELATES: Entity (source/specialized), Entity (target/base), HAS_VARIANT (inverse).

  cypher_pattern: "(Entity)-[:VARIANT_OF {strength, temperature, variant_type}]->(Entity)"
