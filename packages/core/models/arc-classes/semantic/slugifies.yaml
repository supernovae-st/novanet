# =============================================================================
# ArcClass: SLUGIFIES
# NovaNet v0.13.1 — LLM-First Ordering
# =============================================================================
# Inverse of SLUGIFIED_BY: Slugification rules that validate BlockNative slugs.
#
# Links a Slugification rule set to the head-seo-meta BlockNative nodes it
# VALIDATES. Enables "which blocks use these slugification rules?" traversal.
#
# Example:
#   Slugification:es-MX SLUGIFIES BlockNative:homepage:head-seo-meta:1@es-MX
#   -> The es-MX rules validate this block's slug "código-qr"
# =============================================================================

arc:
  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 2: IDENTITY
  # ─────────────────────────────────────────────────────────────────────────
  name: SLUGIFIES
  family: semantic
  scope: cross_realm  # Slugification (shared) -> BlockNative (org)

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 3: SEMANTIC (LLM-Critical)
  # ─────────────────────────────────────────────────────────────────────────
  description: >-
    Inverse of SLUGIFIED_BY. Links a Slugification rule set to the head-seo-meta
    BlockNative nodes whose slugs it validates. Enables "which blocks are
    validated by these locale-specific slugification rules?" queries.

  llm_context: |
    USE: when finding all blocks validated by a slugification rule set.
    TRIGGERS: "which blocks use these rules", "locale slug validation targets".
    NOT: block-to-rule traversal (use SLUGIFIED_BY), slug provenance (use DERIVED_SLUG_FROM).
    RELATES: Slugification (source rules), BlockNative:head-seo-meta (validated targets).

    This is the INVERSE of SLUGIFIED_BY for bidirectional traversal.

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 4: GRAPH STRUCTURE
  # ─────────────────────────────────────────────────────────────────────────
  source: Slugification
  target: BlockNative
  cardinality: one_to_many  # One Slugification validates many blocks

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 5: INVERSE
  # ─────────────────────────────────────────────────────────────────────────
  inverse_of: SLUGIFIED_BY

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 6: DATA
  # ─────────────────────────────────────────────────────────────────────────
  # No properties on inverse - properties live on SLUGIFIED_BY

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 7: REFERENCE
  # ─────────────────────────────────────────────────────────────────────────
  cypher_pattern: "(Slugification)-[:SLUGIFIES]->(BlockNative)"
