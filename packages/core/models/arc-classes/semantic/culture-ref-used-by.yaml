# packages/core/models/arc-classes/semantic/culture-ref-used-by.yaml
# ArcClass: CULTURE_REF_USED_BY — Inverse of USES_CULTURE_REF
# v0.13.1: LLM-First field ordering (semantic fields before structure)

arc:
  # --- IDENTITY ---
  name: CULTURE_REF_USED_BY
  family: semantic
  scope: cross_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    Inverse of USES_CULTURE_REF. Navigates from CultureRef to find all
    EntityNative nodes that reference this cultural element. Useful for
    cultural consistency audits and impact analysis.
    Cross-realm arc: CultureRef (shared/knowledge) → EntityNative (org/semantic).
  llm_context: |
    USE: when finding which EntityNative nodes use a specific cultural reference.
    TRIGGERS: cultural reference usage, content analysis, cultural consistency.
    NOT: culture containers (use CONTAINS_CULTURE_REF), culture definitions.
    RELATES: CultureRef (source), EntityNative (target), USES_CULTURE_REF (forward arc).
    EXAMPLE: Find all entities referencing a specific cultural element.

  # --- GRAPH STRUCTURE ---
  source: CultureRef
  target: EntityNative
  cardinality: many_to_many

  # --- FLAGS ---
  inverse_of: USES_CULTURE_REF
  temperature_threshold: 0.5

  # --- DATA ---
  properties:
    - name: relevance
      type: string
      required: false
      enum: [essential, recommended, optional]
      description: "Inherited from USES_CULTURE_REF relationship"

    - name: temperature
      type: float
      required: false
      default: 0.7
      description: "Activation weight for spreading activation (0.0-1.0)"

    - name: context_note
      type: string
      required: false
      description: "Inherited from USES_CULTURE_REF relationship"

  # --- REFERENCE ---
  cypher_pattern: "(CultureRef)-[:CULTURE_REF_USED_BY {relevance, temperature, context_note}]->(EntityNative)"

  examples:
    - cypher: |
        // Find all EntityNative using a specific cultural reference
        MATCH (cr:CultureRef {key: $culture_ref_key})
        MATCH (cr)-[r:CULTURE_REF_USED_BY]->(en:EntityNative)
        RETURN en.key, en.display_name, r.relevance
        ORDER BY r.temperature DESC
