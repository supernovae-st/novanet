# packages/core/models/arc-classes/semantic/enhanced-by.yaml
# ArcClass: ENHANCED_BY — Entity is enhanced by a feature (inverse of ENHANCES)
# v0.13.1: LLM-First field ordering (semantic fields before structure)

arc:
  # --- IDENTITY ---
  name: ENHANCED_BY
  family: semantic
  scope: intra_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    Inverse of ENHANCES. Entity gains additional capability through another
    entity (typically a feature). Use to find features that improve an entity.
    Different from ENABLED_BY (prerequisite) and REQUIRED_BY (hard dependency).
  llm_context: |
    USE: when finding features that enhance an entity.
    TRIGGERS: enhanced by, improved by, features, add-ons, extensions.
    NOT: enablement (use ENABLED_BY), requirement (use REQUIRED_BY).
    RELATES: Entity (source/thing), Entity (target/feature), ENHANCES (inverse).

  # --- GRAPH STRUCTURE ---
  source: Entity
  target: Entity
  cardinality: many_to_many

  # --- FLAGS ---
  inverse_of: ENHANCES
  is_self_referential: false
  temperature_threshold: 0.2

  # --- DATA ---
  properties:
    - name: strength
      type: float
      required: false
      default: 0.75
      description: "Enhancement strength (0.0-1.0)"

    - name: temperature
      type: float
      required: false
      default: 0.8
      description: "Spreading activation weight"

    - name: enhancement_type
      type: string
      required: false
      enum: [adds, improves, extends, optimizes, secures, tracks]
      description: "How the feature enhances the target"

  # --- REFERENCE ---
  cypher_pattern: "(Entity)-[:ENHANCED_BY {strength, temperature, enhancement_type}]->(Entity)"
