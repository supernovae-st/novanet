# packages/core/models/arc-classes/semantic/enabled-by.yaml
# ArcClass: ENABLED_BY — Entity is enabled by another Entity (inverse of ENABLES)
# v0.13.1: LLM-First field ordering (semantic fields before structure)

arc:
  # --- IDENTITY ---
  name: ENABLED_BY
  family: semantic
  scope: intra_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    Inverse of ENABLES. Entity gains capability through another entity.
    Use to find prerequisites and dependencies for an entity's functionality.
    Different from REQUIRED_BY (hard dependency) and ENHANCED_BY (optional improvement).
  llm_context: |
    USE: when finding what enables an entity's capability.
    TRIGGERS: enabled by, made possible by, unlocked by, prerequisites.
    NOT: requirement (use REQUIRED_BY), enhancement (use ENHANCED_BY).
    RELATES: Entity (source), Entity (target/enabler), ENABLES (inverse).

  # --- GRAPH STRUCTURE ---
  source: Entity
  target: Entity
  cardinality: many_to_many

  # --- FLAGS ---
  inverse_of: ENABLES
  is_self_referential: true
  temperature_threshold: 0.2

  # --- DATA ---
  properties:
    - name: strength
      type: float
      required: false
      default: 0.75
      description: "Enablement strength (0.0-1.0)"

    - name: temperature
      type: float
      required: false
      default: 0.8
      description: "Spreading activation weight"

    - name: enablement_type
      type: string
      required: false
      enum: [unlocks, enhances, permits, facilitates]
      description: "Type of enablement relationship"

  # --- REFERENCE ---
  cypher_pattern: "(Entity)-[:ENABLED_BY {strength, temperature, enablement_type}]->(Entity)"
