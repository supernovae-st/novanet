# packages/core/models/arc-classes/semantic/fills-slot.yaml
# ArcClass: FILLS_SLOT — Block fills slot (A/B testing)

arc:
  name: FILLS_SLOT
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.0  # v9.9: A/B testing slot (always follow)
  source: Block
  target: ContentSlot
  cardinality: many_to_many
  properties:
    - name: variant_id
      type: string
      required: false
    - name: traffic_allocation
      type: string
      required: false
    - name: is_control
      type: string
      required: false
  llm_context: |
    USE: when finding which blocks fill a content slot for A/B testing.
    TRIGGERS: A/B testing, variant, slot content, traffic allocation, control.
    NOT: slot acceptance (use ACCEPTS_BLOCK_TYPE), page slots (use HAS_SLOT).
    RELATES: Block (source), ContentSlot (target), variant_id (property).
  cypher_pattern: (Block)-[:FILLS_SLOT {variant_id, traffic_allocation, is_control}]->(ContentSlot)
