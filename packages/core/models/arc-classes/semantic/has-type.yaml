# packages/core/models/arc-classes/semantic/has-type.yaml
# ArcClass: HAS_TYPE — Entity has subtypes (inverse of TYPE_OF)
# v0.13.1: LLM-First field ordering (semantic fields before structure)

arc:
  # --- IDENTITY ---
  name: HAS_TYPE
  family: semantic
  scope: intra_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    Entity has subtypes in a taxonomy hierarchy. Models classification
    relationships where a general entity has more specific types. Different
    from HAS_VARIANT (variations of same thing) and HAS_CHILD (hierarchical
    ownership).
  llm_context: |
    USE: when finding subtypes of an entity.
    TRIGGERS: subtypes, types of, kinds of, taxonomy, classification.
    NOT: variants (use HAS_VARIANT), children (use HAS_CHILD).
    RELATES: Entity (source/general), Entity (target/specific), TYPE_OF (inverse).

  # --- GRAPH STRUCTURE ---
  source: Entity
  target: Entity
  cardinality: one_to_many

  # --- FLAGS ---
  inverse: TYPE_OF
  is_self_referential: true
  temperature_threshold: 0.15

  # --- DATA ---
  properties:
    - name: strength
      type: float
      required: false
      default: 0.85
      description: "Classification strength (0.0-1.0)"

    - name: temperature
      type: float
      required: false
      default: 0.9
      description: "Spreading activation weight"

    - name: taxonomy_level
      type: string
      required: false
      enum: [genus, species, subspecies, instance]
      description: "Level in taxonomy hierarchy"

  # --- REFERENCE ---
  cypher_pattern: "(Entity)-[:HAS_TYPE {strength, temperature, taxonomy_level}]->(Entity)"
