# packages/core/models/arc-classes/semantic/category-of.yaml
# ArcClass: CATEGORY_OF — EntityCategory classifies Entity (inverse of BELONGS_TO)
# v0.13.1: NEW TIER 2 inverse arc (ADR-026)

arc:
  name: CATEGORY_OF
  family: semantic
  scope: cross_realm  # shared EntityCategory -> org Entity
  temperature_threshold: 0.10  # Lightweight taxonomy traversal

  source: EntityCategory
  target: Entity

  cardinality: one_to_many  # One category can classify many entities
  inverse_of: BELONGS_TO

  llm_context: |
    USE: when finding all entities in a semantic category.
    TRIGGERS: entities in category, category members, what entities, taxonomy query.
    NOT: assigning category (use BELONGS_TO), entity content (use HAS_CONTENT).
    RELATES: EntityCategory (source), Entity (target), BELONGS_TO (inverse).

  cypher_pattern: "(EntityCategory)-[:CATEGORY_OF]->(Entity)"
