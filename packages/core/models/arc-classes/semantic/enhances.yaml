# packages/core/models/arc-classes/semantic/enhances.yaml
# ArcClass: ENHANCES — Feature enhances entity capabilities
# v0.13.1: LLM-First field ordering (semantic fields before structure)

arc:
  # --- IDENTITY ---
  name: ENHANCES
  family: semantic
  scope: intra_realm

  # --- SEMANTIC (LLM-critical) ---
  description: |
    Feature entity enhances capability of another entity. Models optional
    improvements and extensions. Different from ENABLES (prerequisite) and
    REQUIRES (hard dependency). Use for features that add value but aren't
    strictly necessary.
  llm_context: |
    USE: when finding what features enhance an entity.
    TRIGGERS: enhances, improves, adds capability, extends, feature.
    NOT: enablement (use ENABLES), containment (use INCLUDES).
    RELATES: Entity (source/feature), Entity (target/thing), ENHANCED_BY (inverse).

  # --- GRAPH STRUCTURE ---
  source: Entity
  target: Entity
  cardinality: many_to_many

  # --- FLAGS ---
  inverse: ENHANCED_BY
  is_self_referential: false
  temperature_threshold: 0.2

  # --- DATA ---
  properties:
    - name: strength
      type: float
      required: false
      default: 0.75
      description: "Enhancement strength (0.0-1.0)"

    - name: temperature
      type: float
      required: false
      default: 0.8
      description: "Spreading activation weight"

    - name: enhancement_type
      type: string
      required: false
      enum: [adds, improves, extends, optimizes, secures, tracks]
      description: "How the feature enhances the target"

  # --- REFERENCE ---
  cypher_pattern: "(Entity)-[:ENHANCES {strength, temperature, enhancement_type}]->(Entity)"
