# packages/core/models/arc-classes/semantic/has-variant.yaml
# ArcKind: HAS_VARIANT - Entity has variants/versions (inverse of VARIANT_OF)
# v10.7: Typed semantic arcs (replaces generic SEMANTIC_LINK)

arc:
  name: HAS_VARIANT
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.2  # Follow in most spreading activation scenarios

  source: Entity
  target: Entity
  cardinality: one_to_many
  is_self_referential: true

  properties:
    - name: strength
      type: float
      required: false
      default: 0.8
      description: "Relationship intensity (0.0-1.0)"

    - name: temperature
      type: float
      required: false
      default: 0.85
      description: "Spreading activation weight"

    - name: variant_type
      type: string
      required: false
      enum: [version, flavor, edition, specialization, customization]
      description: "Type of variant relationship"

  inverse: VARIANT_OF

  llm_context: |
    USE: when finding variants/versions of an entity.
    TRIGGERS: variants, versions, editions, specializations, customizations.
    NOT: subtypes (use HAS_TYPE), children (use HAS_CHILD).
    RELATES: Entity (source/base), Entity (target/variant), VARIANT_OF (inverse).

  cypher_pattern: "(Entity)-[:HAS_VARIANT {strength, temperature, variant_type}]->(Entity)"
