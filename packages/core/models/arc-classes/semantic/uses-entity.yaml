# packages/core/models/arc-classes/semantic/uses-entity.yaml
# ArcClass: USES_ENTITY — Page/Block references an Entity

arc:
  name: USES_ENTITY
  family: semantic
  scope: intra_realm
  temperature_threshold: 0.0  # v9.9: Always follow (primary content reference)

  source:
    - Page
    - Block
  target: Entity
  cardinality: many_to_many

  properties:
    - name: purpose
      type: string
      required: false
      enum: [primary, secondary, contextual]
      description: "How the entity is used: primary topic, secondary mention, or contextual"
    - name: temperature
      type: float
      required: false
      default: 1.0
      description: "Activation weight for spreading activation (0.0-1.0)"

  inverse: USED_BY

  llm_context: |
    USE: when loading entities referenced by a page or block for generation.
    TRIGGERS: uses entity, references, page entities, block context, content entities.
    NOT: entity hierarchy (use HAS_CHILD), block instructions (use MENTIONS).
    RELATES: Page/Block (source), Entity (target), USED_BY (inverse), purpose: primary/secondary/contextual.

  cypher_pattern: "(Page)-[:USES_ENTITY {purpose, temperature}]->(Entity)"
