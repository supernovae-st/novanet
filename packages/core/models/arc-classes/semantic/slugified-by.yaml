# =============================================================================
# ArcClass: SLUGIFIED_BY
# NovaNet v0.13.1 — LLM-First Ordering
# =============================================================================
# Validation arc for slug conformity to locale rules (ADR-032)
#
# Links a head-seo-meta BlockNative to the Slugification rules used to
# VALIDATE its slug. Works in tandem with DERIVED_SLUG_FROM (provenance).
#
# Two complementary arcs:
#   - DERIVED_SLUG_FROM = PROVENANCE (where slug came from)
#   - SLUGIFIED_BY = VALIDATION (is slug valid for locale rules)
#
# Example:
#   BlockNative:homepage:head-seo-meta:1@es-MX SLUGIFIED_BY Slugification:es-MX
#   -> slug "código-qr" is VALID (latin_preserve with preserve_diacritics=true)
#   -> slug "codigo-qr" would be INVALID (missing accent)
# =============================================================================

arc:
  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 2: IDENTITY
  # ─────────────────────────────────────────────────────────────────────────
  name: SLUGIFIED_BY
  family: semantic
  scope: cross_realm  # BlockNative (org) -> Slugification (shared)

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 3: SEMANTIC (LLM-Critical)
  # ─────────────────────────────────────────────────────────────────────────
  description: >-
    Links a head-seo-meta BlockNative to the Slugification rules that VALIDATE
    its slug. The slug must conform to the locale's slugification settings
    (latin_preserve, latin_strip, native_script, or transliterate). This arc
    enables validation that the slug has correct diacritics for the locale.

  llm_context: |
    USE: when validating slug conformity to locale rules.
    TRIGGERS: slug validation, diacritics check, accent validation, URL rules.
    NOT: slug provenance (use DERIVED_SLUG_FROM), page routing (use full_path).
    RELATES: BlockNative:head-seo-meta (source), Slugification (target rules).

    VALIDATION RULES by slug_rule:
    - latin_preserve (preserve_diacritics=true): "código-qr" VALID, "codigo-qr" INVALID
    - latin_strip (preserve_diacritics=false): "codigo-qr" VALID, "código-qr" INVALID
    - native_script: "コード" VALID (native characters allowed)
    - transliterate: ASCII-only after transliteration map applied

    CRITICAL: If slug fails validation, the arc property validated=false.

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 4: GRAPH STRUCTURE
  # ─────────────────────────────────────────────────────────────────────────
  source: BlockNative
  target: Slugification
  cardinality: many_to_one  # Many blocks validated by one Slugification

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 5: INVERSE
  # ─────────────────────────────────────────────────────────────────────────
  inverse: SLUGIFIES

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 6: DATA
  # ─────────────────────────────────────────────────────────────────────────
  properties:
    - name: validated
      type: boolean
      required: true
      description: "Whether the slug passed validation against the rules"

    - name: applied_rule
      type: string
      required: true
      enum: [latin_preserve, latin_strip, native_script, transliterate]
      description: "The slug_rule that was applied for validation"

    - name: validation_timestamp
      type: datetime
      required: false
      description: "When the validation was performed"

    - name: validation_errors
      type: array
      required: false
      description: "List of validation errors if validated=false"

  # ─────────────────────────────────────────────────────────────────────────
  # BLOC 7: REFERENCE
  # ─────────────────────────────────────────────────────────────────────────
  cypher_pattern: "(BlockNative)-[:SLUGIFIED_BY {validated, applied_rule}]->(Slugification)"
