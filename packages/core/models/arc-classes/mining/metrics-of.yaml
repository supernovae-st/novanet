# packages/core/models/arc-classes/mining/metrics-of.yaml
# ArcClass: METRICS_OF
# v0.13.1: LLM-First field ordering (TIER 2 inverse arc, ADR-026)

arc:
  # --- BLOC 2: IDENTITY ---
  name: METRICS_OF
  family: mining
  scope: intra_realm  # shared/knowledge -> shared/knowledge

  # --- BLOC 3: SEMANTIC (LLM-CRITICAL) ---
  description: >
    Inverse of HAS_METRICS. Links an SEOKeywordMetrics observation back to its parent
    SEOKeyword. Enables "which keyword does this metrics snapshot belong to?" queries.
  llm_context: |
    USE: when finding which keyword owns specific metrics data.
    TRIGGERS: metrics keyword, which keyword metrics, metrics lookup, keyword data.
    NOT: loading metrics for keyword (use HAS_METRICS), keyword targeting (use TARGETS_KEYWORD).
    RELATES: SEOKeywordMetrics (source), SEOKeyword (target), HAS_METRICS (inverse).

  # --- BLOC 4: GRAPH STRUCTURE ---
  source: SEOKeywordMetrics
  target: SEOKeyword
  cardinality: many_to_one

  # --- BLOC 5: FLAGS ---
  inverse_of: HAS_METRICS

  # --- BLOC 7: REFERENCE ---
  cypher_pattern: "(SEOKeywordMetrics)-[:METRICS_OF]->(SEOKeyword)"
