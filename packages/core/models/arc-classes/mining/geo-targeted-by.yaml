# packages/core/models/arc-classes/mining/geo-targeted-by.yaml
# ArcClass: GEO_TARGETED_BY — GEOQuery is targeted by Page/Block (inverse of TARGETS_GEO)
# v0.13.1: NEW TIER 1 inverse arc (ADR-026)

arc:
  name: GEO_TARGETED_BY
  family: mining
  scope: cross_realm  # shared (GEOQuery) → org (Page/Block)

  source: GEOQuery
  target:
    - Page
    - Block
  cardinality: many_to_many
  inverse_of: TARGETS_GEO

  llm_context: |
    USE: when finding which pages/blocks target a specific GEO query for AI visibility.
    TRIGGERS: GEO query pages, which pages target GEO, AI visibility audit, content coverage.
    NOT: loading GEO queries for page (use TARGETS_GEO), GEO answers (use HAS_GEO_ANSWERS).
    RELATES: GEOQuery (source), Page/Block (target), TARGETS_GEO (inverse).

  cypher_pattern: "(GEOQuery)-[:GEO_TARGETED_BY]->(Page|Block)"
