# packages/core/models/arc-classes/mining/targets-geo.yaml
# ArcClass: TARGETS_GEO — Page/Block targets GEOQuery for AI visibility optimization
# v0.13.1: NEW arc for mining family expansion (ADR-026 audit)

arc:
  name: TARGETS_GEO
  family: mining
  scope: cross_realm  # org (Page/Block) → shared (GEOQuery)

  source:
    - Page
    - Block
  target: GEOQuery
  cardinality: many_to_many
  inverse: GEO_TARGETED_BY

  properties:
    - name: priority
      type: string
      required: true
      enum: [primary, secondary, tertiary]
      description: "GEO query priority for this page/block"
    - name: target_engines
      type: array
      required: false
      description: "Target AI engines (gemini, gpt, perplexity, claude)"
    - name: visibility_goal
      type: float
      required: false
      description: "Target visibility score (0.0-1.0)"

  llm_context: |
    USE: when finding GEO queries targeted by a page or block for AI visibility (GEO).
    TRIGGERS: GEO targeting, AI visibility, generative search, LLM optimization, page GEO.
    NOT: SEO keywords (use TARGETS_KEYWORD), GEO answers (use HAS_GEO_ANSWERS), entity GEO (use MONITORS_GEO).
    RELATES: Page/Block (source), GEOQuery (target), visibility_goal/target_engines (properties).

  cypher_pattern: "(Page|Block)-[:TARGETS_GEO {priority, target_engines, visibility_goal}]->(GEOQuery)"
