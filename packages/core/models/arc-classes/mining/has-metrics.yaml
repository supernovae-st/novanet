# packages/core/models/arc-classes/mining/has-metrics.yaml
# ArcClass: HAS_METRICS
# v0.13.1: LLM-First field ordering (TIER 2 inverse, ADR-026)

arc:
  # --- BLOC 2: IDENTITY ---
  name: HAS_METRICS
  family: mining
  scope: intra_realm  # shared/knowledge -> shared/knowledge

  # --- BLOC 3: SEMANTIC (LLM-CRITICAL) ---
  description: >
    Links an SEOKeyword to its historical metrics observations. Each SEOKeywordMetrics
    node represents a time-series data point (volume, position, trend) for the keyword.
  llm_context: |
    USE: when loading historical metrics for an SEO keyword.
    TRIGGERS: keyword metrics, search volume, historical data, time series, trend analysis.
    NOT: keyword targeting (use TARGETS), keyword expression (use EXPRESSES).
    RELATES: SEOKeyword (source), SEOKeywordMetrics (target), one_to_many, not for spreading activation.

  # --- BLOC 4: GRAPH STRUCTURE ---
  source: SEOKeyword
  target: SEOKeywordMetrics
  cardinality: one_to_many

  # --- BLOC 5: FLAGS ---
  inverse: METRICS_OF

  # --- BLOC 7: REFERENCE ---
  cypher_pattern: "(SEOKeyword)-[:HAS_METRICS]->(SEOKeywordMetrics)"
