# packages/core/models/arc-classes/mining/has-metrics.yaml
# ArcClass: HAS_METRICS — Time-series observation link
# v0.13.1: Added TIER 2 inverse (ADR-026)

arc:
  name: HAS_METRICS
  family: mining
  scope: intra_realm
  source: SEOKeyword
  target: SEOKeywordMetrics
  cardinality: one_to_many
  inverse: METRICS_OF
  llm_context: |
    USE: when loading historical metrics for an SEO keyword.
    TRIGGERS: keyword metrics, search volume, historical data, time series, trend analysis.
    NOT: keyword targeting (use TARGETS), keyword expression (use EXPRESSES).
    RELATES: SEOKeyword (source), SEOKeywordMetrics (target), one_to_many, not for spreading activation.
  cypher_pattern: (SEOKeyword)-[:HAS_METRICS]->(SEOKeywordMetrics)
