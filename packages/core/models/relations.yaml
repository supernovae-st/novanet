# ═══════════════════════════════════════════════════════════════════════════════
# RELATIONS - All Neo4j relationships v9.9.0
# ═══════════════════════════════════════════════════════════════════════════════
#
# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║  ⛔ DEPRECATED (v10.7) - DO NOT EDIT THIS FILE                                ║
# ╠═══════════════════════════════════════════════════════════════════════════════╣
# ║                                                                               ║
# ║  Migration COMPLETE. This file is NO LONGER the source of truth.             ║
# ║                                                                               ║
# ║  ✅ NEW SOURCE OF TRUTH: arc-kinds/**/*.yaml (1 file per ArcKind)             ║
# ║     → 89 arc files organized by family (ownership, localization, etc.)        ║
# ║     → Generator reads from: packages/core/models/arc-kinds/                   ║
# ║     → Index file: packages/core/models/arc-kinds/_index.yaml                  ║
# ║                                                                               ║
# ║  This file is kept ONLY for:                                                  ║
# ║     • Historical reference                                                    ║
# ║     • Backward compatibility with legacy parsers                              ║
# ║                                                                               ║
# ║  To add/edit arcs, modify files in arc-kinds/{family}/{arc-name}.yaml         ║
# ║                                                                               ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝
#
# v9.5.0 FORMAT CHANGES (from v8.2.0):
#   - Dict → list format (each relation is a list entry)
#   - Every relation has `family` (maps to ArcFamily meta-node)
#   - `from`/`to` → `source`/`target`
#   - String-encoded lists "[A, B]" → proper YAML lists
#   - Wildcard `"*"` → explicit source/target lists
#   - Added `cardinality` field
#   - `description` → `llm_context`
#
# See organizing-principles.yaml for ArcFamily definitions.
# See _index.yaml for full graph diagram.
#
# ARC FAMILIES (5):
#   ownership     - Structural parent→child containment
#   localization  - Invariant↔locale-specific bridges + locale knowledge
#   semantic      - Entity connections + spreading activation
#   generation    - LLM pipeline: prompts → outputs → versions
#   mining        - SEO/GEO targeting, metrics, extraction
#
# ═══════════════════════════════════════════════════════════════════════════════

relations:

  # ═════════════════════════════════════════════════════════════════════════════
  # OWNERSHIP — structural backbone
  # ═════════════════════════════════════════════════════════════════════════════

  # v10.3: HAS_CONCEPT removed — Entity is now in global realm, not project
  # Projects use USES_ENTITY to reference global entities

  - type: HAS_PAGE
    family: ownership
    source: Project
    target: Page
    cardinality: one_to_many
    llm_context: "Project owns its page structures. Use to enumerate pages for generation."

  - type: HAS_BRAND_IDENTITY
    family: ownership
    source: Project
    target: BrandIdentity
    cardinality: one_to_one
    llm_context: "Project has exactly one brand identity. Use for visual/tone consistency."

  - type: SUPPORTS_LOCALE
    family: ownership
    source: Project
    target: Locale
    cardinality: many_to_many
    properties:
      - status
    llm_context: "Project supports locales with activation status (active/pending/disabled)."

  - type: DEFAULT_LOCALE
    family: ownership
    source: Project
    target: Locale
    cardinality: many_to_one
    llm_context: "Exactly one per project — the primary/fallback locale."

  # ═══════════════════════════════════════════════════════════════════════════════
  # v10 LOCALE KNOWLEDGE — Locale owns tiered knowledge nodes
  # ═══════════════════════════════════════════════════════════════════════════════

  # Technical Tier
  - type: HAS_FORMATTING
    family: ownership
    source: Locale
    target: Formatting
    cardinality: one_to_one
    llm_context: "Locale has exactly one formatting configuration."

  - type: HAS_SLUGIFICATION
    family: ownership
    source: Locale
    target: Slugification
    cardinality: one_to_one
    llm_context: "Locale has exactly one slugification configuration."

  - type: HAS_ADAPTATION
    family: ownership
    source: Locale
    target: Adaptation
    cardinality: one_to_one
    llm_context: "Locale has exactly one adaptation configuration."

  # Style Tier
  - type: HAS_STYLE
    family: ownership
    source: Locale
    target: Style
    cardinality: one_to_one
    llm_context: "Locale has exactly one style configuration."

  # v10.7: Config Tier (7-node locale knowledge architecture)
  - type: HAS_CULTURE
    family: ownership
    source: Locale
    target: Culture
    cardinality: one_to_one
    llm_context: "Locale has exactly one culture configuration node."

  - type: HAS_MARKET
    family: ownership
    source: Locale
    target: Market
    cardinality: one_to_one
    llm_context: "Locale has exactly one market intelligence configuration node."

  # Semantic Tier
  - type: HAS_TERMS
    family: ownership
    source: Locale
    target: TermSet
    cardinality: one_to_many
    properties:
      - domain
    llm_context: "Locale has multiple term sets, one per domain (pricing, features, technical, marketing, support, general)."

  - type: HAS_EXPRESSIONS
    family: ownership
    source: Locale
    target: ExpressionSet
    cardinality: one_to_one
    llm_context: "Locale has exactly one expression set containing all expressions across registers."

  - type: HAS_PATTERNS
    family: ownership
    source: Locale
    target: PatternSet
    cardinality: one_to_many
    properties:
      - usage
    llm_context: "Locale has multiple pattern sets, one per usage (cta, headlines, body, social)."

  - type: HAS_CULTURE_SET
    family: ownership
    source: Locale
    target: CultureSet
    cardinality: one_to_many
    properties:
      - type
    llm_context: "Locale has multiple culture sets, one per type (values, references, celebrities, calendar)."

  - type: HAS_TABOOS
    family: ownership
    source: Locale
    target: TabooSet
    cardinality: one_to_many
    properties:
      - severity
    llm_context: "Locale has multiple taboo sets, one per severity (avoid, careful, legal)."

  - type: HAS_AUDIENCE
    family: ownership
    source: Locale
    target: AudienceSet
    cardinality: one_to_many
    properties:
      - segment
    llm_context: "Locale has multiple audience sets, one per segment (b2b, b2c, general)."

  # Container → Atom (v10.7: generic pattern for all *Set containers)
  - type: CONTAINS
    family: ownership
    source:
      - ExpressionSet
      - TermSet
      - CultureSet
      - TabooSet
      - PatternSet
      - AudienceSet
    target:
      - Expression
      - Term
      - CultureRef
      - Taboo
      - Pattern
      - AudienceTrait
    cardinality: one_to_many
    llm_context: "Container holds multiple atoms. Use to traverse from set to individual knowledge items."

  # SEO Tier (v10.2: moved from SHARED to GLOBAL)
  - type: HAS_SEO_KEYWORDS
    family: ownership
    source: Locale
    target: SEOKeyword
    cardinality: one_to_many
    llm_context: "Locale owns its SEO keywords. Same pattern as HAS_TERMS, HAS_PATTERNS."

  - type: HAS_BLOCK
    family: ownership
    source: Page
    target: Block
    cardinality: one_to_many
    properties:
      - position
    llm_context: "Page contains blocks with position ordering. Blocks can be reused across pages."

  - type: OF_TYPE
    family: ownership
    source:
      - Page
      - Block
    target:
      - PageType
      - BlockType
    cardinality: many_to_one
    llm_context: "Page/Block references its type template (v7.10.0: Page→PageType, Block→BlockType)."

  - type: HAS_PROMPT
    family: ownership
    source:
      - Page
      - Block
    target:
      - PagePrompt
      - BlockPrompt
    cardinality: one_to_many
    llm_context: "Links structure nodes to their AI prompts (versioned)."

  - type: HAS_RULES
    family: ownership
    source: BlockType
    target: BlockRules
    cardinality: one_to_many
    llm_context: "BlockType defines generation rules templates."

  - type: BELONGS_TO_PROJECT_CONTENT
    family: ownership
    source: PageGenerated
    target: ProjectContent
    cardinality: many_to_one
    llm_context: "Locale-aligned: PageGenerated (fr-FR) → ProjectContent (fr-FR). Provides voice, tagline, CTAs."

  # Inverse
  - type: BLOCK_OF
    family: ownership
    source: Block
    target: Page
    cardinality: many_to_one
    inverse_of: HAS_BLOCK
    properties:
      - position
    llm_context: "Inverse of HAS_BLOCK — block points to its page."

  # ═════════════════════════════════════════════════════════════════════════════
  # LOCALIZATION — invariant↔locale bridges + locale knowledge
  # ═════════════════════════════════════════════════════════════════════════════

  - type: FOR_LOCALE
    family: localization
    source:
      - EntityContent
      - ProjectContent
      - BlockGenerated
      - PageGenerated
      - GenerationJob
      - OutputArtifact
    target: Locale
    cardinality: many_to_one
    llm_context: "All localized content nodes point to their target Locale."
    # v10.2: SEOKeyword removed — now owned by Locale via HAS_SEO_KEYWORDS

  - type: HAS_CONTENT
    family: localization
    source:
      - Entity
      - Project
    target:
      - EntityContent
      - ProjectContent
    cardinality: one_to_many
    llm_context: "Links invariant node to its human-curated localized definitions (one per locale)."

  - type: HAS_GENERATED
    family: localization
    source:
      - Page
      - Block
    target:
      - PageGenerated
      - BlockGenerated
    cardinality: one_to_many
    llm_context: "Links structure to its LLM-generated localized content."

  - type: FALLBACK_TO
    family: localization
    source: Locale
    target: Locale
    cardinality: many_to_one
    is_self_referential: true
    llm_context: "Fallback chain: (fr-CA)-[:FALLBACK_TO]->(fr-FR)-[:FALLBACK_TO]->(en-US)."

  - type: VARIANT_OF
    family: localization
    source: Locale
    target: Locale
    cardinality: many_to_one
    is_self_referential: true
    llm_context: "Regional variant: (en-AU)-[:VARIANT_OF]->(en-GB) for inheritance."

  # NOTE: Locale knowledge arcs moved to ownership family (v10)
  # See arc-kinds/ownership/has-*.yaml for HAS_FORMATTING, HAS_STYLE, etc.

  # Inverses
  - type: CONTENT_OF
    family: localization
    source:
      - EntityContent
      - ProjectContent
    target:
      - Entity
      - Project
    cardinality: many_to_one
    inverse_of: HAS_CONTENT
    llm_context: "Inverse of HAS_CONTENT — localized content points to parent."

  - type: GENERATED_FOR
    family: localization
    source:
      - PageGenerated
      - BlockGenerated
    target:
      - Page
      - Block
    cardinality: many_to_one
    inverse_of: HAS_GENERATED
    llm_context: "Inverse of HAS_GENERATED — generated content points to structure."

  - type: HAS_LOCALIZED_CONTENT
    family: localization
    source: Locale
    target:
      - ProjectContent
      - EntityContent
      - PageGenerated
      - BlockGenerated
    cardinality: one_to_many
    inverse_of: FOR_LOCALE
    llm_context: "Inverse of FOR_LOCALE — locale knows all its content."
    # v10.2: SEOKeyword removed — now via HAS_SEO_KEYWORDS (ownership)

  # ═════════════════════════════════════════════════════════════════════════════
  # SEMANTIC — concept connections + spreading activation
  # ═════════════════════════════════════════════════════════════════════════════

  - type: SEMANTIC_LINK
    family: semantic
    source: Entity
    target: Entity
    cardinality: many_to_many
    is_self_referential: true
    properties:
      - type
      - temperature
    llm_context: "Spreading activation links between concepts. temperature: 0.0-1.0, cutoff 0.3, max 2 hops."

  - type: USES_ENTITY
    family: semantic
    source:
      - Page
      - Block
    target: Entity
    cardinality: many_to_many
    properties:
      - purpose
      - temperature
    llm_context: "Page/Block references entities for generation context. purpose: primary/secondary/contextual."

  - type: LINKS_TO
    family: semantic
    source: Page
    target: Page
    cardinality: many_to_many
    is_self_referential: true
    properties:
      - concept_key
      - context
      - seo_weight
      - anchor_type
      - nofollow
    llm_context: "Explicit internal link for SEO. anchor_type: exact_match/partial_match/branded/generic."

  - type: SUBTOPIC_OF
    family: semantic
    source: Page
    target: Page
    cardinality: many_to_one
    is_self_referential: true
    llm_context: "Cluster page is subtopic of pillar page for SEO topical authority."

  # Inverse
  - type: USED_BY
    family: semantic
    source: Entity
    target:
      - Page
      - Block
    cardinality: many_to_many
    inverse_of: USES_ENTITY
    llm_context: "Inverse of USES_ENTITY — entity knows who uses it."

  # ═════════════════════════════════════════════════════════════════════════════
  # GENERATION — LLM pipeline: prompts → outputs → versions
  # ═════════════════════════════════════════════════════════════════════════════

  - type: GENERATED
    family: generation
    source:
      - PagePrompt
      - BlockPrompt
    target:
      - PageGenerated
      - BlockGenerated
    cardinality: one_to_many
    properties:
      - generated_at
    llm_context: "Provenance tracking: which prompt generated which output."

  - type: ASSEMBLES
    family: generation
    source: PageGenerated
    target: BlockGenerated
    cardinality: one_to_many
    properties:
      - position
    llm_context: "PageGenerated assembles BlockGenerateds with position for ordering."

  - type: PREVIOUS_VERSION
    family: generation
    source:
      - BlockGenerated
      - PageGenerated
      - OutputArtifact
    target:
      - BlockGenerated
      - PageGenerated
      - OutputArtifact
    cardinality: one_to_one
    is_self_referential: true
    llm_context: "Links to previous version in history chain. Query: (current)-[:PREVIOUS_VERSION*]->(old)."

  - type: INFLUENCED_BY
    family: generation
    source: BlockGenerated
    target: EntityContent
    cardinality: many_to_many
    properties:
      - weight
      - concept_version
    llm_context: "Provenance: which concepts influenced this output. weight: 0.0-1.0."

  - type: GENERATED_FROM
    family: generation
    source: BlockGenerated
    target: BlockType
    cardinality: many_to_one
    llm_context: "Direct link for fast structure validation (optimization shortcut)."

  # ─── Generation Pipeline (v9.6) ───────────────────────────────────────────────

  - type: TRIGGERED_BY
    family: generation
    source: GenerationJob
    target: Project
    cardinality: many_to_one
    properties:
      - trigger_type
    llm_context: "Project triggers generation job. trigger_type: manual/schedule/webhook/api."

  - type: USES_PROMPT
    family: generation
    source: GenerationJob
    target: PromptArtifact
    cardinality: many_to_many
    llm_context: "Generation job uses compiled prompt artifacts for generation."

  - type: COMPILED_FROM
    family: generation
    source: PromptArtifact
    target:
      - PagePrompt
      - BlockPrompt
    cardinality: many_to_one
    llm_context: "Prompt artifact was compiled from source prompt template."

  - type: INCLUDES_ENTITY
    family: generation
    source: PromptArtifact
    target: Entity
    cardinality: one_to_many
    properties:
      - weight
    llm_context: "Prompt artifact includes entity context for generation. weight: 0.0-1.0 influence on output."

  - type: INCLUDES_STYLE
    family: generation
    source: PromptArtifact
    target: Style
    cardinality: many_to_one
    llm_context: "Prompt artifact includes locale style parameters for tone/voice."

  - type: PRODUCES
    family: generation
    source: GenerationJob
    target: OutputArtifact
    cardinality: one_to_many
    properties:
      - produced_at
    llm_context: "Generation job produces output artifacts (bundles)."

  - type: CREATES_CONTENT
    family: generation
    source: GenerationJob
    target:
      - PageGenerated
      - BlockGenerated
    cardinality: one_to_many
    properties:
      - created_at
    llm_context: "Generation job creates localized content nodes."

  - type: INCLUDES
    family: generation
    source: OutputArtifact
    target:
      - PageGenerated
      - BlockGenerated
    cardinality: one_to_many
    properties:
      - position
      - checksum
    llm_context: "Output artifact bundles specific L10n nodes for deployment."

  - type: HAS_EVALUATION
    family: generation
    source:
      - PageGenerated
      - BlockGenerated
      - OutputArtifact
    target: EvaluationSignal
    cardinality: one_to_many
    properties:
      - evaluated_at
    llm_context: "Content has quality evaluation signals. Not traversed in spreading activation."

  - type: EVALUATED_BY_JOB
    family: generation
    source: EvaluationSignal
    target: GenerationJob
    cardinality: many_to_one
    llm_context: "Evaluation signal relates to generation job that produced evaluated content."

  # ─────────────────────────────────────────────────────────────────────────────
  # v10.3: Intent Layer removed — SearchIntent absorbed into Entity.type=ACTION
  # ─────────────────────────────────────────────────────────────────────────────

  # ─────────────────────────────────────────────────────────────────────────────
  # Audience & Channel (v9.7)
  # ─────────────────────────────────────────────────────────────────────────────

  - type: TARGETS_PERSONA
    family: semantic
    source: Page
    target: AudiencePersona
    cardinality: many_to_many
    properties:
      - relevance_score
      - is_primary
    llm_context: "Page targets specific audience persona. relevance_score: 0.0-1.0 fit. is_primary: true if main target."

  - type: FOR_CHANNEL
    family: semantic
    source: Page
    target: ChannelSurface
    cardinality: many_to_many
    properties:
      - optimization_level
      - is_primary
    llm_context: "Page optimized for distribution channel. optimization_level: basic/full. is_primary: true if main channel."

  # ─────────────────────────────────────────────────────────────────────────────
  # Content Slots (v9.7)
  # ─────────────────────────────────────────────────────────────────────────────

  - type: HAS_SLOT
    family: ownership
    source: Page
    target: ContentSlot
    cardinality: one_to_many
    properties:
      - position_override
    llm_context: "Page defines content slot. position_override: optional layout position."

  - type: FILLS_SLOT
    family: semantic
    source: Block
    target: ContentSlot
    cardinality: many_to_many
    properties:
      - variant_id
      - traffic_allocation
      - is_control
    llm_context: "Block fills slot (A/B testing). variant_id: unique variant. traffic_allocation: 0.0-1.0. is_control: baseline."

  - type: ACCEPTS_BLOCK_TYPE
    family: ownership
    source: ContentSlot
    target: BlockType
    cardinality: one_to_many
    llm_context: "Slot accepts specific block types. Constraint enforcement."

  # ─────────────────────────────────────────────────────────────────────────────
  # v10.3: Topic Clusters removed — Use Entity.is_pillar + SUBTOPIC_OF instead
  # ─────────────────────────────────────────────────────────────────────────────

  # NOTE: LINKS_TO already defined in semantic family for Page-to-Page internal linking

  # ═════════════════════════════════════════════════════════════════════════════
  # MINING — SEO targeting, metrics, extraction
  # ═════════════════════════════════════════════════════════════════════════════

  # v10.3: HAS_SEO_TARGET removed — Replaced by EXPRESSES (SEOKeyword → Entity)
  # See arc-kinds/semantic/expresses.yaml for the new pattern

  # Mining runs
  - type: SEO_MINES
    family: mining
    source: SEOMiningRun
    target: SEOKeyword
    cardinality: one_to_many
    llm_context: "SEO mining run produces keyword data."

  # Time-series metrics (v7.8.5 unified pattern)
  - type: HAS_METRICS
    family: mining
    source: SEOKeyword
    target: SEOKeywordMetrics
    cardinality: one_to_many
    llm_context: "Time-series observation link. Not used in spreading activation."

# ═══════════════════════════════════════════════════════════════════════════════
# SEMANTIC_LINK TYPES
# ═══════════════════════════════════════════════════════════════════════════════
#
# Defines how two concepts are semantically linked.
# temperature = link strength (0.0-1.0) for spreading activation.
#
# SPREADING ACTIVATION:
#   MATCH (c:Entity {key: $key})-[r:SEMANTIC_LINK*1..2]->(c2:Entity)
#   WHERE ALL(rel IN r WHERE rel.temperature >= 0.3)
#   WITH c2, reduce(a = 1.0, rel IN r | a * rel.temperature) AS activation
#   WHERE activation >= 0.3
#   RETURN c2.key, activation ORDER BY activation DESC

semantic_link_types:
  # Verb pairs (action relationships)
  - is_action_on    # A is an action on B (0.95 default temp)
  - has_action      # B has A as action (inverse of is_action_on, 0.90 default)

  # Container pairs (composition)
  - includes        # A includes B as feature (0.85 default temp)
  - included_in     # B is included in A (inverse of includes, 0.80 default)

  # Taxonomy pairs (classification)
  - type_of         # A is a type/variant of B (0.90 default temp)
  - has_type        # B has A as variant (inverse of type_of, 0.85 default)

  # Dependency pairs (requirements)
  - requires        # A requires B to function (0.80 default temp)
  - required_by     # B is required by A (inverse of requires, 0.75 default)

  # Generic/contrast (symmetric)
  - related         # A and B are loosely related (0.60 default temp, symmetric)
  - opposite        # A and B are contrasting alternatives (0.40 default temp)

# ═══════════════════════════════════════════════════════════════════════════════
# EXAMPLES
# ═══════════════════════════════════════════════════════════════════════════════

examples:
  uses_entity:
    description: "Page/Block uses an entity"
    cypher: |
      MATCH (p:Page {key:'pricing'})
      MATCH (e:Entity {key:'tier-pro'})
      CREATE (p)-[:USES_ENTITY {purpose: "primary", temperature: 1.0}]->(e)

  semantic_link:
    description: "Create semantic link between concepts"
    cypher: |
      MATCH (c1:Entity {key:'create-qr-code'})
      MATCH (c2:Entity {key:'qr-code-generator'})
      CREATE (c1)-[:SEMANTIC_LINK {type: "is_action_on", temperature: 0.95}]->(c2)

  has_seo_target:
    description: "EntityContent targets SEO keyword (locale-aligned primary)"
    cypher: |
      // v10.2: SEOKeyword now owned by Locale via HAS_SEO_KEYWORDS
      MATCH (c:Entity {key:'action-create-qr'})-[:HAS_CONTENT]->(cl:EntityContent)-[:FOR_LOCALE]->(l:Locale {key:'fr-FR'})
      MATCH (l)-[:HAS_SEO_KEYWORDS]->(kw:SEOKeyword {key:'seo-creer-qr-code-gratuit-fr'})
      CREATE (cl)-[:HAS_SEO_TARGET {role: "primary", priority: 1}]->(kw)

  locale_knowledge:
    description: "Get locale knowledge for LLM context (v10 model)"
    cypher: |
      MATCH (l:Locale {key:'fr-FR'})-[:HAS_STYLE]->(s:Style)
      MATCH (l)-[:HAS_EXPRESSIONS {register: 'neutral'}]->(e:ExpressionSet)
      RETURN s.formality_score, s.directness_score, e.phrases AS expressions

  spreading_activation:
    description: "Get related concepts via spreading activation"
    cypher: |
      MATCH (c:Entity {key: $key})-[r:SEMANTIC_LINK*1..2]->(c2:Entity)
      WHERE ALL(rel IN r WHERE rel.temperature >= 0.3)
      WITH c2, reduce(a = 1.0, rel IN r | a * rel.temperature) AS activation
      WHERE activation >= 0.3
      RETURN c2.key, activation ORDER BY activation DESC

  internal_links:
    description: "Get all internal links for a page with localized anchors"
    cypher: |
      MATCH (page:Page {key: $key})-[link:LINKS_TO]->(target:Page)
      MATCH (c:Entity {key: link.concept_key})-[:HAS_CONTENT]->(cl:EntityContent)-[:FOR_LOCALE]->(l:Locale {key: $locale})
      RETURN target.key AS target_page,
             cl.title AS anchor_text,
             link.context AS link_context,
             link.seo_weight AS weight
      ORDER BY link.seo_weight DESC
