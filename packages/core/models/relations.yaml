# ═══════════════════════════════════════════════════════════════════════════════
# RELATIONS - All Neo4j relationships v9.0.0
# ═══════════════════════════════════════════════════════════════════════════════
#
# v9.0.0 FORMAT CHANGES (from v8.2.0):
#   - Dict → list format (each relation is a list entry)
#   - Every relation has `family` (maps to EdgeFamily meta-node)
#   - `from`/`to` → `source`/`target`
#   - String-encoded lists "[A, B]" → proper YAML lists
#   - Wildcard `"*"` → explicit source/target lists
#   - Added `cardinality` field
#   - `description` → `llm_context`
#
# See organizing-principles.yaml for EdgeFamily definitions.
# See _index.yaml for full graph diagram.
#
# EDGE FAMILIES (5):
#   ownership     - Structural parent→child containment
#   localization  - Invariant↔locale-specific bridges + locale knowledge
#   semantic      - Concept connections + spreading activation
#   generation    - LLM pipeline: prompts → outputs → versions
#   mining        - SEO/GEO targeting, metrics, extraction
#
# ═══════════════════════════════════════════════════════════════════════════════

relations:

  # ═════════════════════════════════════════════════════════════════════════════
  # OWNERSHIP — structural backbone
  # ═════════════════════════════════════════════════════════════════════════════

  - type: HAS_CONCEPT
    family: ownership
    source: Project
    target: Concept
    cardinality: one_to_many
    llm_context: "Project owns its semantic concepts. Use to load all concepts for a project."

  - type: HAS_PAGE
    family: ownership
    source: Project
    target: Page
    cardinality: one_to_many
    llm_context: "Project owns its page structures. Use to enumerate pages for generation."

  - type: HAS_BRAND_IDENTITY
    family: ownership
    source: Project
    target: BrandIdentity
    cardinality: one_to_one
    llm_context: "Project has exactly one brand identity. Use for visual/tone consistency."

  - type: SUPPORTS_LOCALE
    family: ownership
    source: Project
    target: Locale
    cardinality: many_to_many
    properties:
      - status
    llm_context: "Project supports locales with activation status (active/pending/disabled)."

  - type: DEFAULT_LOCALE
    family: ownership
    source: Project
    target: Locale
    cardinality: many_to_one
    llm_context: "Exactly one per project — the primary/fallback locale."

  - type: HAS_BLOCK
    family: ownership
    source: Page
    target: Block
    cardinality: one_to_many
    properties:
      - position
    llm_context: "Page contains blocks with position ordering. Blocks can be reused across pages."

  - type: OF_TYPE
    family: ownership
    source:
      - Page
      - Block
    target:
      - PageType
      - BlockType
    cardinality: many_to_one
    llm_context: "Page/Block references its type template (v7.10.0: Page→PageType, Block→BlockType)."

  - type: HAS_PROMPT
    family: ownership
    source:
      - Page
      - Block
    target:
      - PagePrompt
      - BlockPrompt
    cardinality: one_to_many
    llm_context: "Links structure nodes to their AI prompts (versioned)."

  - type: HAS_RULES
    family: ownership
    source: BlockType
    target: BlockRules
    cardinality: one_to_many
    llm_context: "BlockType defines generation rules templates."

  - type: BELONGS_TO_PROJECT_L10N
    family: ownership
    source: PageL10n
    target: ProjectL10n
    cardinality: many_to_one
    llm_context: "Locale-aligned: PageL10n (fr-FR) → ProjectL10n (fr-FR). Provides voice, tagline, CTAs."

  # Inverse
  - type: BLOCK_OF
    family: ownership
    source: Block
    target: Page
    cardinality: many_to_one
    inverse_of: HAS_BLOCK
    properties:
      - position
    llm_context: "Inverse of HAS_BLOCK — block points to its page."

  # ═════════════════════════════════════════════════════════════════════════════
  # LOCALIZATION — invariant↔locale bridges + locale knowledge
  # ═════════════════════════════════════════════════════════════════════════════

  - type: FOR_LOCALE
    family: localization
    source:
      - ConceptL10n
      - ProjectL10n
      - BlockL10n
      - PageL10n
      - SEOKeywordL10n
      - GEOSeedL10n
    target: Locale
    cardinality: many_to_one
    llm_context: "All localized content nodes point to their target Locale."

  - type: HAS_L10N
    family: localization
    source:
      - Concept
      - Project
    target:
      - ConceptL10n
      - ProjectL10n
    cardinality: one_to_many
    llm_context: "Links invariant node to its human-curated localized definitions (one per locale)."

  - type: HAS_OUTPUT
    family: localization
    source:
      - Page
      - Block
    target:
      - PageL10n
      - BlockL10n
    cardinality: one_to_many
    llm_context: "Links structure to its LLM-generated localized content."

  - type: FALLBACK_TO
    family: localization
    source: Locale
    target: Locale
    cardinality: many_to_one
    is_self_referential: true
    llm_context: "Fallback chain: (fr-CA)-[:FALLBACK_TO]->(fr-FR)-[:FALLBACK_TO]->(en-US)."

  - type: VARIANT_OF
    family: localization
    source: Locale
    target: Locale
    cardinality: many_to_one
    is_self_referential: true
    llm_context: "Regional variant: (en-AU)-[:VARIANT_OF]->(en-GB) for inheritance."

  # ─── Locale Knowledge ───────────────────────────────────────────────────────

  - type: HAS_IDENTITY
    family: localization
    source: Locale
    target: LocaleIdentity
    cardinality: one_to_one
    llm_context: "Locale's basic identity: language name, native endonym, script info."

  - type: HAS_VOICE
    family: localization
    source: Locale
    target: LocaleVoice
    cardinality: one_to_one
    llm_context: "Locale's communication style: formality (0-1), directness, emotional range."

  - type: HAS_CULTURE
    family: localization
    source: Locale
    target: LocaleCulture
    cardinality: one_to_one
    llm_context: "Locale's cultural norms: taboos, sensitivities, Hofstede dimensions."

  - type: HAS_MARKET
    family: localization
    source: Locale
    target: LocaleMarket
    cardinality: one_to_one
    llm_context: "Locale's market context: currency, payment preferences, trust signals."

  - type: HAS_LEXICON
    family: localization
    source: Locale
    target: LocaleLexicon
    cardinality: one_to_one
    llm_context: "Locale's vocabulary: domain-specific terms, semantic field expressions."

  - type: HAS_EXPRESSION
    family: localization
    source: LocaleLexicon
    target: Expression
    cardinality: one_to_many
    llm_context: "Lexicon contains expressions: urgency/value/action phrases for CTAs."

  - type: HAS_RULES_ADAPTATION
    family: localization
    source: Locale
    target: LocaleRulesAdaptation
    cardinality: one_to_one
    llm_context: "Content adaptation rules: measurement units, date formats, honorifics."

  - type: HAS_RULES_FORMATTING
    family: localization
    source: Locale
    target: LocaleRulesFormatting
    cardinality: one_to_one
    llm_context: "Text formatting rules: number formats, currency placement, patterns."

  - type: HAS_RULES_SLUG
    family: localization
    source: Locale
    target: LocaleRulesSlug
    cardinality: one_to_one
    llm_context: "URL slug rules: character transliteration, word separators."

  - type: HAS_CULTURE_REFERENCES
    family: localization
    source: LocaleCulture
    target: LocaleCultureReferences
    cardinality: one_to_one
    llm_context: "Cultural touchpoints: celebrities, events, idioms for relatability."

  - type: HAS_REFERENCE
    family: localization
    source: LocaleCultureReferences
    target: Reference
    cardinality: one_to_many
    llm_context: "Cultural reference entity: person, event, or brand for localization."

  - type: HAS_METAPHOR
    family: localization
    source: LocaleCultureReferences
    target: Metaphor
    cardinality: one_to_many
    llm_context: "Cultural metaphor: locale-specific imagery and comparisons."

  - type: HAS_PATTERN
    family: localization
    source: LocaleRulesFormatting
    target: Pattern
    cardinality: one_to_many
    llm_context: "Formatting pattern: regex/template for dates, numbers, addresses."

  - type: HAS_CONSTRAINT
    family: localization
    source: LocaleCulture
    target: Constraint
    cardinality: one_to_many
    llm_context: "Cultural constraint: topics to avoid, sensitivities, legal restrictions."

  # Inverses
  - type: L10N_OF
    family: localization
    source:
      - ConceptL10n
      - ProjectL10n
    target:
      - Concept
      - Project
    cardinality: many_to_one
    inverse_of: HAS_L10N
    llm_context: "Inverse of HAS_L10N — localized content points to parent."

  - type: OUTPUT_OF
    family: localization
    source:
      - PageL10n
      - BlockL10n
    target:
      - Page
      - Block
    cardinality: many_to_one
    inverse_of: HAS_OUTPUT
    llm_context: "Inverse of HAS_OUTPUT — generated content points to structure."

  - type: HAS_LOCALIZED_CONTENT
    family: localization
    source: Locale
    target:
      - ProjectL10n
      - ConceptL10n
      - PageL10n
      - BlockL10n
      - SEOKeywordL10n
      - GEOSeedL10n
    cardinality: one_to_many
    inverse_of: FOR_LOCALE
    llm_context: "Inverse of FOR_LOCALE — locale knows all its content."

  # ═════════════════════════════════════════════════════════════════════════════
  # SEMANTIC — concept connections + spreading activation
  # ═════════════════════════════════════════════════════════════════════════════

  - type: SEMANTIC_LINK
    family: semantic
    source: Concept
    target: Concept
    cardinality: many_to_many
    is_self_referential: true
    properties:
      - type
      - temperature
    llm_context: "Spreading activation links between concepts. temperature: 0.0-1.0, cutoff 0.3, max 2 hops."

  - type: USES_CONCEPT
    family: semantic
    source:
      - Page
      - Block
    target: Concept
    cardinality: many_to_many
    properties:
      - purpose
      - temperature
    llm_context: "Page/Block references concepts for generation context. purpose: primary/secondary/contextual."

  - type: LINKS_TO
    family: semantic
    source: Page
    target: Page
    cardinality: many_to_many
    is_self_referential: true
    properties:
      - concept_key
      - context
      - seo_weight
      - anchor_type
      - nofollow
    llm_context: "Explicit internal link for SEO. anchor_type: exact_match/partial_match/branded/generic."

  - type: SUBTOPIC_OF
    family: semantic
    source: Page
    target: Page
    cardinality: many_to_one
    is_self_referential: true
    llm_context: "Cluster page is subtopic of pillar page for SEO topical authority."

  # Inverse
  - type: USED_BY
    family: semantic
    source: Concept
    target:
      - Page
      - Block
    cardinality: many_to_many
    inverse_of: USES_CONCEPT
    llm_context: "Inverse of USES_CONCEPT — concept knows who uses it."

  # ═════════════════════════════════════════════════════════════════════════════
  # GENERATION — LLM pipeline: prompts → outputs → versions
  # ═════════════════════════════════════════════════════════════════════════════

  - type: GENERATED
    family: generation
    source:
      - PagePrompt
      - BlockPrompt
    target:
      - PageL10n
      - BlockL10n
    cardinality: one_to_many
    properties:
      - generated_at
    llm_context: "Provenance tracking: which prompt generated which output."

  - type: ASSEMBLES
    family: generation
    source: PageL10n
    target: BlockL10n
    cardinality: one_to_many
    properties:
      - position
    llm_context: "PageL10n assembles BlockL10ns with position for ordering."

  - type: PREVIOUS_VERSION
    family: generation
    source:
      - BlockL10n
      - PageL10n
    target:
      - BlockL10n
      - PageL10n
    cardinality: one_to_one
    is_self_referential: true
    llm_context: "Links to previous version in history chain. Query: (current)-[:PREVIOUS_VERSION*]->(old)."

  - type: INFLUENCED_BY
    family: generation
    source: BlockL10n
    target: ConceptL10n
    cardinality: many_to_many
    properties:
      - weight
      - concept_version
    llm_context: "Provenance: which concepts influenced this output. weight: 0.0-1.0."

  - type: GENERATED_FROM
    family: generation
    source: BlockL10n
    target: BlockType
    cardinality: many_to_one
    llm_context: "Direct link for fast structure validation (optimization shortcut)."

  # ═════════════════════════════════════════════════════════════════════════════
  # MINING — SEO/GEO targeting, metrics, extraction
  # ═════════════════════════════════════════════════════════════════════════════

  # Primary: locale-aligned targeting (v7.7.0)
  - type: HAS_SEO_TARGET
    family: mining
    source: ConceptL10n
    target: SEOKeywordL10n
    cardinality: one_to_many
    properties:
      - role
      - priority
    llm_context: "Primary SEO targeting — locale-aligned. role: primary/secondary/long-tail."

  - type: HAS_GEO_TARGET
    family: mining
    source: ConceptL10n
    target: GEOSeedL10n
    cardinality: one_to_many
    properties:
      - role
      - priority
    llm_context: "Primary GEO targeting — locale-aligned. role: primary/contextual."

  # Shortcut: cross-locale view (management/reporting)
  - type: TARGETS_SEO
    family: mining
    source: Concept
    target: SEOKeywordL10n
    cardinality: one_to_many
    properties:
      - status
      - priority
    llm_context: "Cross-locale SEO shortcut for reporting. status: active/paused/archived."

  - type: TARGETS_GEO
    family: mining
    source: Concept
    target: GEOSeedL10n
    cardinality: one_to_many
    properties:
      - status
      - priority
    llm_context: "Cross-locale GEO shortcut for reporting. status: active/monitoring/archived."

  # Mining runs
  - type: SEO_MINES
    family: mining
    source: SEOMiningRun
    target: SEOKeywordL10n
    cardinality: one_to_many
    llm_context: "SEO mining run produces keyword data."

  - type: GEO_MINES
    family: mining
    source: GEOMiningRun
    target: GEOSeedL10n
    cardinality: one_to_many
    llm_context: "GEO mining run produces seed query data."

  # Time-series metrics (v7.8.5 unified pattern)
  - type: HAS_METRICS
    family: mining
    source:
      - SEOKeywordL10n
      - GEOSeedL10n
    target:
      - SEOKeywordMetrics
      - GEOSeedMetrics
    cardinality: one_to_many
    llm_context: "Time-series observation link. Not used in spreading activation."

# ═══════════════════════════════════════════════════════════════════════════════
# SEMANTIC_LINK TYPES
# ═══════════════════════════════════════════════════════════════════════════════
#
# Defines how two concepts are semantically linked.
# temperature = link strength (0.0-1.0) for spreading activation.
#
# SPREADING ACTIVATION:
#   MATCH (c:Concept {key: $key})-[r:SEMANTIC_LINK*1..2]->(c2:Concept)
#   WHERE ALL(rel IN r WHERE rel.temperature >= 0.3)
#   WITH c2, reduce(a = 1.0, rel IN r | a * rel.temperature) AS activation
#   WHERE activation >= 0.3
#   RETURN c2.key, activation ORDER BY activation DESC

semantic_link_types:
  # Verb pairs (action relationships)
  - is_action_on    # A is an action on B (0.95 default temp)
  - has_action      # B has A as action (inverse of is_action_on, 0.90 default)

  # Container pairs (composition)
  - includes        # A includes B as feature (0.85 default temp)
  - included_in     # B is included in A (inverse of includes, 0.80 default)

  # Taxonomy pairs (classification)
  - type_of         # A is a type/variant of B (0.90 default temp)
  - has_type        # B has A as variant (inverse of type_of, 0.85 default)

  # Dependency pairs (requirements)
  - requires        # A requires B to function (0.80 default temp)
  - required_by     # B is required by A (inverse of requires, 0.75 default)

  # Generic/contrast (symmetric)
  - related         # A and B are loosely related (0.60 default temp, symmetric)
  - opposite        # A and B are contrasting alternatives (0.40 default temp)

# ═══════════════════════════════════════════════════════════════════════════════
# EXAMPLES
# ═══════════════════════════════════════════════════════════════════════════════

examples:
  uses_concept:
    description: "Page/Block uses a concept"
    cypher: |
      MATCH (p:Page {key:'pricing'})
      MATCH (c:Concept {key:'tier-pro'})
      CREATE (p)-[:USES_CONCEPT {purpose: "primary", temperature: 1.0}]->(c)

  semantic_link:
    description: "Create semantic link between concepts"
    cypher: |
      MATCH (c1:Concept {key:'create-qr-code'})
      MATCH (c2:Concept {key:'qr-code-generator'})
      CREATE (c1)-[:SEMANTIC_LINK {type: "is_action_on", temperature: 0.95}]->(c2)

  has_seo_target:
    description: "ConceptL10n targets SEO keyword (locale-aligned primary)"
    cypher: |
      MATCH (c:Concept {key:'action-create-qr'})-[:HAS_L10N]->(cl:ConceptL10n)-[:FOR_LOCALE]->(l:Locale {key:'fr-FR'})
      MATCH (kw:SEOKeywordL10n {key:'seo-creer-qr-code-gratuit-fr'})-[:FOR_LOCALE]->(l)
      CREATE (cl)-[:HAS_SEO_TARGET {role: "primary", priority: 1}]->(kw)

  locale_knowledge:
    description: "Get locale knowledge for LLM context"
    cypher: |
      MATCH (l:Locale {key:'fr-FR'})-[:HAS_VOICE]->(v:LocaleVoice)
      MATCH (l)-[:HAS_LEXICON]->(lex:LocaleLexicon)-[:HAS_EXPRESSION]->(e:Expression)
      WHERE e.semantic_field = 'urgency'
      RETURN v.formality_score, collect(e.text) AS urgency_expressions

  spreading_activation:
    description: "Get related concepts via spreading activation"
    cypher: |
      MATCH (c:Concept {key: $key})-[r:SEMANTIC_LINK*1..2]->(c2:Concept)
      WHERE ALL(rel IN r WHERE rel.temperature >= 0.3)
      WITH c2, reduce(a = 1.0, rel IN r | a * rel.temperature) AS activation
      WHERE activation >= 0.3
      RETURN c2.key, activation ORDER BY activation DESC

  internal_links:
    description: "Get all internal links for a page with localized anchors"
    cypher: |
      MATCH (page:Page {key: $key})-[link:LINKS_TO]->(target:Page)
      MATCH (c:Concept {key: link.concept_key})-[:HAS_L10N]->(cl:ConceptL10n)-[:FOR_LOCALE]->(l:Locale {key: $locale})
      RETURN target.key AS target_page,
             cl.title AS anchor_text,
             link.context AS link_context,
             link.seo_weight AS weight
      ORDER BY link.seo_weight DESC
