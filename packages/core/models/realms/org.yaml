# packages/core/models/realms/org.yaml
# Organization realm definition
# v0.12.5

realm:
  key: org
  display_name: Organization
  description: |
    Organization-specific realm. Contains Projects, Entities, Pages, Blocks,
    and all generated outputs. Multi-tenant isolation: Org A cannot see Org B.
    Can traverse to Shared realm for universal knowledge.
  color: "#6c71c4"
  icon:
    web: "building-2"
    terminal: "◎"

  layers:
    - config
    - foundation
    - structure
    - semantic
    - instruction
    - output

  node_count: 20  # Computed by generator

  llm_context: |
    USE: when working with organization-specific content.
    TRIGGERS: "organization", "project", "entity", "page", "block", "generated".
    NOT: for universal locale knowledge (use shared realm).
    RELATES: Project (foundation), Entity (semantic), Page (structure), PageGenerated (output).
