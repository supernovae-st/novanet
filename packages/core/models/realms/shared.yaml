# packages/core/models/realms/shared.yaml
# Shared realm definition
# v0.12.5

realm:
  key: shared
  display_name: Shared
  description: |
    Universal knowledge (READ-ONLY). Content shared across all organizations.
    Includes locale definitions, geographic data, and knowledge atoms.
    Org realm can read Shared realm (one-way traversal).
  color: "#2aa198"
  icon:
    web: "globe"
    terminal: "◉"

  layers:
    - config
    - locale
    - geography
    - knowledge

  node_count: 40  # Computed by generator

  llm_context: |
    USE: when accessing universal locale knowledge.
    TRIGGERS: "shared data", "universal", "read-only", "locale knowledge".
    NOT: for organization-specific content (use org realm).
    RELATES: Locale (config layer), Term (knowledge layer), Culture (locale layer).
