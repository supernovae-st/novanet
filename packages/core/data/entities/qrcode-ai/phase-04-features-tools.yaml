# Phase 4: Features & Tools — 29 Entities
# QR Code AI Entity Data for NovaNet
# v11 Schema with Typed Semantic Arcs

project: qrcode-ai
phase: 4
name: Features & Tools
description: Platform features (analytics, tracking, etc.) and tools (generators, builders)

entities:
  # =============================================================================
  # PLATFORM FEATURES (19)
  # =============================================================================
  - key: analytics
    type: FEATURE
    display_name: Analytics
    description: Umbrella feature for all tracking and statistics
    llm_context: "USE: when discussing QR code analytics, scan tracking, click statistics, or performance metrics. TRIGGERS: analytics, statistics, tracking, metrics, reports, data, insights, performance. NOT: specific analytics types (use click-tracking, geo-tracking, etc.)."
    entity_summary: |
      Analytics is the comprehensive tracking and reporting system for QR codes
      and smart links. Includes click tracking, scan counting, geographic data,
      device detection, and time-series reporting.

  - key: click-tracking
    type: FEATURE
    display_name: Click Tracking
    description: Tracks link click events
    llm_context: "USE: when discussing link click tracking, click events, referrer data, or conversion tracking. TRIGGERS: click tracking, track clicks, click events, link clicks, click data, referrer tracking. NOT: scan counting (QR specific), analytics (umbrella term)."
    entity_summary: |
      Click tracking records every click on short links and smart links.
      Captures timestamp, referrer, and conversion data for marketing analysis.

  - key: scan-counting
    type: FEATURE
    display_name: Scan Counting
    description: Counts QR code scans
    llm_context: "USE: when discussing QR code scan counts, scan statistics, or scan volume metrics. TRIGGERS: scan counting, count scans, scan stats, scan volume, scan numbers, how many scans. NOT: click tracking (links), geo-tracking (location)."
    entity_summary: |
      Scan counting tracks the number of times a QR code is scanned.
      Essential for measuring campaign performance and ROI.

  - key: geo-tracking
    type: FEATURE
    display_name: Geographic Tracking
    description: Geographic location of scans
    llm_context: "USE: when discussing geographic tracking, location data, country/city analytics, or IP geolocation for scans. TRIGGERS: geo tracking, geographic, location tracking, country data, city data, ip location, where scanned. NOT: device detection (what device), time-series (when)."
    entity_summary: |
      Geographic tracking identifies the location of QR code scans and link
      clicks. Uses IP geolocation for country, region, and city data.

  - key: device-detection
    type: FEATURE
    display_name: Device Detection
    description: OS/browser/device information
    llm_context: "USE: when discussing device detection, OS tracking, browser detection, or mobile vs desktop analytics. TRIGGERS: device detection, os detection, browser detection, device type, mobile or desktop, what device, user agent. NOT: geo-tracking (location), contextual routing (redirect)."
    entity_summary: |
      Device detection identifies the operating system, browser, and device
      type of users who scan QR codes. Enables device-specific optimization.

  - key: time-series
    type: FEATURE
    display_name: Time Series Analytics
    description: Historical data over time
    llm_context: "USE: when discussing time-series analytics, historical scan data, trend analysis, or scans over time. TRIGGERS: time series, historical data, trends, over time, date range, peak times, daily scans, weekly stats. NOT: real-time (immediate), analytics (umbrella)."
    entity_summary: |
      Time series analytics provides historical scan and click data over time.
      Enables trend analysis, peak time identification, and forecasting.

  - key: contextual-routing
    type: FEATURE
    display_name: Contextual Routing
    description: OS/device/location-based redirect
    llm_context: "USE: when discussing contextual routing, device-based redirects, OS-specific destinations, or smart link routing rules. TRIGGERS: contextual routing, smart routing, device redirect, os redirect, app store redirect, conditional redirect, dynamic destination. NOT: device detection (analytics only), edit destination (manual change)."
    entity_summary: |
      Contextual routing redirects users to different destinations based on
      their device, operating system, or location. Essential for app download
      links that need to route to App Store or Play Store.

  - key: custom-domain-name
    type: FEATURE
    display_name: Custom Domain
    description: Branded short domains
    llm_context: "USE: when discussing custom domains, branded short links, white-label URLs, or vanity domains. TRIGGERS: custom domain, branded domain, own domain, vanity url, white label domain, custom short url. NOT: url shortener (action), white label (full branding)."
    entity_summary: |
      Custom domains allow using your own branded domain for short links
      instead of the platform's default. Improves trust and brand recognition.

  - key: custom-link-preview
    type: FEATURE
    display_name: Custom Link Preview
    description: OG meta customization
    llm_context: "USE: when discussing custom link previews, Open Graph meta tags, social media previews, or thumbnail customization. TRIGGERS: link preview, og tags, open graph, social preview, thumbnail, share preview, meta tags. NOT: landing page (full page), custom domain (url)."
    entity_summary: |
      Custom link preview lets you control how links appear when shared on
      social media. Customize title, description, and image for better CTR.

  - key: utm-builder
    type: FEATURE
    display_name: UTM Builder
    description: Campaign parameter builder
    llm_context: "USE: when discussing UTM parameters, campaign tracking, Google Analytics parameters, or marketing attribution. TRIGGERS: utm builder, utm parameters, campaign tracking, utm source, utm medium, utm campaign, google analytics tracking. NOT: analytics (viewing data), retargeting (ads)."
    entity_summary: |
      UTM builder helps create tracking parameters for marketing campaigns.
      Automatically appends utm_source, utm_medium, utm_campaign to URLs.

  - key: bulk-creation
    type: FEATURE
    display_name: Bulk Creation
    description: Mass QR code generation
    llm_context: "USE: when discussing bulk QR code creation, mass generation, spreadsheet import, or enterprise-scale QR codes. TRIGGERS: bulk creation, bulk generate, mass create, batch qr, spreadsheet import, csv upload, multiple qr codes at once. NOT: batch-qr-generator (tool), api (programmatic)."
    entity_summary: |
      Bulk creation enables generating hundreds or thousands of QR codes at
      once. Essential for enterprise use cases like product packaging or
      event ticketing.

  - key: team-workspaces
    type: FEATURE
    display_name: Team Workspaces
    description: Multi-user collaboration
    llm_context: "USE: when discussing team collaboration, multi-user access, shared QR code management, or role-based permissions. TRIGGERS: team workspace, collaboration, multi-user, shared access, team members, roles, permissions, organization. NOT: white-label (branding), api (integration)."
    entity_summary: |
      Team workspaces allow multiple users to collaborate on QR code and
      link management. Includes roles, permissions, and shared assets.

  - key: api
    type: FEATURE
    display_name: API Access
    description: Developer API access
    llm_context: "USE: when discussing API access, developer integration, programmatic QR code creation, or RESTful endpoints. TRIGGERS: api, api access, developer api, rest api, integration, programmatic, endpoints. NOT: webhooks (events), qr-code-api (specific tool)."
    entity_summary: |
      API access provides programmatic control over QR code and link creation.
      RESTful endpoints for integration with custom applications and workflows.

  - key: webhooks
    type: FEATURE
    display_name: Webhooks
    description: Event notifications
    llm_context: "USE: when discussing webhooks, event notifications, real-time callbacks, or scan event triggers. TRIGGERS: webhooks, webhook, event notification, callback, trigger, real-time event, scan webhook. NOT: api (request/response), analytics (viewing)."
    entity_summary: |
      Webhooks send real-time notifications to external systems when events
      occur. Useful for triggering workflows, updating CRMs, or logging.

  - key: white-label
    type: FEATURE
    display_name: White Label
    description: Remove platform branding
    llm_context: "USE: when discussing white-label solutions, removing platform branding, reseller programs, or agency branding. TRIGGERS: white label, whitelabel, remove branding, no branding, agency solution, reseller, own branding. NOT: custom domain (url only), team workspaces (collaboration)."
    entity_summary: |
      White label removes all platform branding, allowing agencies and
      enterprises to present QR Code AI as their own product.

  - key: password-protection
    type: FEATURE
    display_name: Password Protection
    description: Require password to access
    llm_context: "USE: when discussing password-protected QR codes, gated content, secure access, or password-required links. TRIGGERS: password protection, password protected, require password, gated content, secure qr, locked qr, access code. NOT: expiration (time limit), scan limit (count limit)."
    entity_summary: |
      Password protection adds a password gate before revealing QR code
      destinations. Useful for private content or limited access links.

  - key: expiration
    type: FEATURE
    display_name: Link Expiration
    description: Time-limited QR codes
    llm_context: "USE: when discussing link expiration, time-limited QR codes, expiry dates, or temporary access. TRIGGERS: expiration, expire, time limit, temporary qr, expiry date, auto-disable, limited time. NOT: scan limit (count), password protection (access control)."
    entity_summary: |
      Expiration sets a date/time after which the QR code or link stops
      working. Perfect for time-sensitive promotions or temporary access.

  - key: scan-limit
    type: FEATURE
    display_name: Scan Limit
    description: Maximum scan count
    llm_context: "USE: when discussing scan limits, maximum scans, limited-use QR codes, or scan quotas. TRIGGERS: scan limit, max scans, limited scans, scan quota, one-time scan, single use, limited use. NOT: expiration (time), password protection (access)."
    entity_summary: |
      Scan limit restricts the number of times a QR code can be scanned.
      Useful for limited offers, exclusive content, or contest entries.

  - key: retargeting-pixel
    type: FEATURE
    display_name: Retargeting Pixel
    description: Facebook/Google pixel integration
    llm_context: "USE: when discussing retargeting pixels, Facebook pixel, Google pixel, remarketing, or ad tracking integration. TRIGGERS: retargeting pixel, facebook pixel, google pixel, remarketing, ad tracking, pixel integration, audience building. NOT: utm-builder (attribution), analytics (internal)."
    entity_summary: |
      Retargeting pixel integration adds tracking pixels from Facebook,
      Google, or other ad platforms to link destinations for remarketing.

  # =============================================================================
  # TOOLS (10)
  # =============================================================================
  - key: qr-code-generator
    type: TOOL
    display_name: QR Code Generator
    description: Primary QR code creation tool
    llm_context: "USE: when discussing QR code creation tools, generating QR codes, or QR maker software. TRIGGERS: qr code generator, qr generator, qr maker, create qr, generate qr, make qr code, qr code creator. NOT: barcode generator (1D), qr code scanner (reading), qr code api (programmatic)."
    entity_summary: |
      A QR code generator is a tool that creates QR code images from data.
      Supports various content types (URL, text, vCard, WiFi) and allows
      customization of colors, size, and design.

  - key: qr-code-scanner
    type: TOOL
    display_name: QR Code Scanner
    description: QR code reader application
    llm_context: "USE: when discussing QR code scanning, reading QR codes, QR reader apps, or camera-based scanning. TRIGGERS: qr code scanner, qr scanner, qr reader, scan qr, read qr code, qr code app, camera scan. NOT: barcode scanner (1D), qr code generator (creation)."
    entity_summary: |
      A QR code scanner reads and decodes QR codes using a camera.
      Available as mobile apps or integrated into smartphone cameras.
      Returns the encoded data for the user.

  - key: qr-code-api
    type: TOOL
    display_name: QR Code API
    description: API for QR generation
    llm_context: "USE: when discussing QR code APIs, programmatic QR generation, developer QR tools, or REST QR endpoints. TRIGGERS: qr code api, qr api, programmatic qr, developer qr, rest qr, api qr generation. NOT: api access (general feature), qr code generator (ui tool)."
    entity_summary: |
      A QR code API provides programmatic access to QR code generation.
      Developers can create QR codes via HTTP requests without UI interaction.

  - key: landing-page-builder
    type: TOOL
    display_name: Landing Page Builder
    description: No-code page builder
    llm_context: "USE: when discussing landing page builders, no-code page creation, drag-and-drop page editors, or destination page tools. TRIGGERS: landing page builder, page builder, no-code page, drag and drop, page editor, bio page builder. NOT: link-in-bio builder (social specific), menu builder (restaurant)."
    entity_summary: |
      A landing page builder creates destination pages without coding.
      Drag-and-drop interface for creating bio pages, menus, forms, and more.

  - key: url-shortener
    type: TOOL
    display_name: URL Shortener
    description: Link shortening tool
    llm_context: "USE: when discussing URL shorteners, link shortening, creating short links, or compact URLs. TRIGGERS: url shortener, link shortener, short url, short link, shorten url, compact link, tiny url. NOT: smart link (intelligent routing), custom domain (branded)."
    entity_summary: |
      A URL shortener creates compact links from long URLs. Short links are
      easier to share and look cleaner in QR codes. Includes tracking.

  - key: link-in-bio-builder
    type: TOOL
    display_name: Link in Bio Builder
    description: Social bio page builder
    llm_context: "USE: when discussing link-in-bio pages, Instagram bio links, social media link hubs, or bio page tools. TRIGGERS: link in bio, bio link, instagram bio, tiktok bio, linktree alternative, bio page, social link hub. NOT: landing page builder (general), menu builder (restaurant)."
    entity_summary: |
      A link in bio builder creates one-page link hubs for social media
      profiles. Perfect for Instagram, TikTok, and other platforms with
      single-link limitations.

  - key: menu-builder
    type: TOOL
    display_name: Menu Builder
    description: Restaurant menu builder
    llm_context: "USE: when discussing digital menu builders, restaurant menu creation, or QR menu tools. TRIGGERS: menu builder, restaurant menu, digital menu, qr menu, menu creator, food menu builder, cafe menu. NOT: landing page builder (general), link-in-bio builder (social)."
    entity_summary: |
      A menu builder creates digital restaurant menus accessible via QR code.
      Supports categories, items, prices, images, and dietary information.

  - key: vcard-generator
    type: TOOL
    display_name: vCard Generator
    description: Digital business card creator
    llm_context: "USE: when discussing vCard generators, digital business card creators, contact QR tools, or VCF file creation. TRIGGERS: vcard generator, vcard creator, digital business card, contact qr, vcf generator, electronic business card. NOT: business cards (medium), qr code generator (general)."
    entity_summary: |
      A vCard generator creates digital business cards in VCF format.
      When scanned, automatically adds contact to phone. Includes name,
      phone, email, company, and social links.

  - key: wifi-qr-generator
    type: TOOL
    display_name: WiFi QR Generator
    description: WiFi credential QR creator
    llm_context: "USE: when discussing WiFi QR generators, WiFi password sharing via QR, or wireless network QR tools. TRIGGERS: wifi qr generator, wifi qr code, share wifi password, wifi qr, wireless qr, network qr code. NOT: qr code generator (general), qr code wifi (content type)."
    entity_summary: |
      A WiFi QR generator creates QR codes that connect devices to WiFi
      networks automatically. Encodes SSID, password, and security type.

  - key: batch-qr-generator
    type: TOOL
    display_name: Batch QR Generator
    description: Bulk QR creation tool
    llm_context: "USE: when discussing batch QR generation, bulk QR creation tools, spreadsheet QR generation, or mass QR production. TRIGGERS: batch qr generator, bulk qr tool, mass qr, spreadsheet qr, csv qr, multiple qr generator. NOT: bulk creation (feature), qr code generator (single)."
    entity_summary: |
      A batch QR generator creates multiple QR codes at once from
      spreadsheet data. Essential for mass production of product labels,
      asset tags, or event badges.

# =============================================================================
# SEMANTIC ARCS (~65 connections)
# =============================================================================

arcs:
  # ---------------------------------------------------------------------------
  # ANALYTICS HIERARCHY
  # ---------------------------------------------------------------------------
  - from: analytics
    to: smart-link
    type: APPLIES_TO
    strength: 0.85

  - from: analytics
    to: click-tracking
    type: INCLUDES
    strength: 0.85

  - from: analytics
    to: scan-counting
    type: INCLUDES
    strength: 0.85

  - from: analytics
    to: geo-tracking
    type: INCLUDES
    strength: 0.85

  - from: analytics
    to: device-detection
    type: INCLUDES
    strength: 0.85

  - from: analytics
    to: time-series
    type: INCLUDES
    strength: 0.85

  - from: click-tracking
    to: analytics
    type: TYPE_OF
    strength: 0.90

  - from: scan-counting
    to: analytics
    type: TYPE_OF
    strength: 0.90

  - from: geo-tracking
    to: analytics
    type: TYPE_OF
    strength: 0.90

  - from: device-detection
    to: analytics
    type: TYPE_OF
    strength: 0.90

  - from: time-series
    to: analytics
    type: TYPE_OF
    strength: 0.90

  - from: geo-tracking
    to: device-detection
