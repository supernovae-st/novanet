# Phase 14: Comparisons — 8 Entities
# QR Code AI Entity Data for NovaNet
# v11 Schema with Typed Semantic Arcs

project: qrcode-ai
phase: 14
name: Comparisons
description: Versus comparisons between QR code types and related technologies

entities:
  # =============================================================================
  # CODE TYPE COMPARISONS (4)
  # =============================================================================
  - key: qr-code-vs-barcode
    type: COMPARISON
    display_name: QR Code vs Barcode
    description: Comparing 2D QR codes with 1D barcodes
    llm_context: "USE: when discussing differences between QR codes and traditional barcodes or 1D vs 2D codes. TRIGGERS: qr vs barcode, barcode vs qr, 1d vs 2d, qr or barcode, qr code barcode difference. NOT: qr vs nfc (wireless), qr vs data matrix (both 2D)."
    entity_summary: |
      Comparison between QR codes and traditional barcodes. QR codes hold
      more data (4,000+ chars vs 20), work at any angle, and support
      error correction. Barcodes are simpler for basic inventory.

  - key: dynamic-vs-static-qr-code
    type: COMPARISON
    display_name: Dynamic vs Static QR Code
    description: Comparing editable vs fixed QR codes
    llm_context: "USE: when discussing differences between dynamic and static QR codes or editable vs permanent QR. TRIGGERS: dynamic vs static qr, editable qr, trackable qr, static vs dynamic, permanent qr vs editable. NOT: guide (how-to), qr vs barcode (different formats)."
    entity_summary: |
      Comparison between dynamic and static QR codes. Dynamic codes are
      editable after printing and trackable, but require subscriptions.
      Static codes are free and permanent but cannot be changed.

  - key: qr-code-vs-nfc
    type: COMPARISON
    display_name: QR Code vs NFC
    description: Comparing QR codes with NFC technology
    llm_context: "USE: when discussing differences between QR codes and NFC or visual vs tap technology. TRIGGERS: qr vs nfc, nfc vs qr, scan vs tap, qr or nfc, contactless comparison. NOT: qr vs barcode (both visual), qr vs data matrix (both 2D)."
    entity_summary: |
      Comparison between QR codes and NFC (Near Field Communication).
      QR codes work universally with cameras, are visible, and free.
      NFC requires special hardware but enables seamless tap interactions.

  - key: qr-code-vs-data-matrix
    type: COMPARISON
    display_name: QR Code vs Data Matrix
    description: Comparing QR codes with Data Matrix codes
    llm_context: "USE: when discussing differences between QR codes and Data Matrix or consumer vs industrial 2D codes. TRIGGERS: qr vs data matrix, data matrix vs qr, which 2d code, qr or datamatrix. NOT: qr vs barcode (1D), qr vs nfc (wireless)."
    entity_summary: |
      Comparison between QR codes and Data Matrix codes. Both are 2D,
      but Data Matrix is better for small items (electronics, pharma).
      QR codes are better for consumer-facing applications.

  # =============================================================================
  # PLATFORM COMPARISONS (4)
  # =============================================================================
  - key: free-vs-paid-qr-generator
    type: COMPARISON
    display_name: Free vs Paid QR Generator
    description: Comparing free and premium QR code tools
    llm_context: "USE: when discussing free vs paid QR generators, pricing tiers, or premium QR features. TRIGGERS: free vs paid qr, qr generator pricing, premium qr, free qr limitations, paid qr benefits. NOT: platform comparison (specific tools), dynamic vs static (code types)."
    entity_summary: |
      Comparison between free and paid QR generators. Free tools have
      limited customization and no tracking. Paid tools offer analytics,
      dynamic codes, bulk creation, and custom branding.

  - key: qr-code-ai-vs-competitors
    type: COMPARISON
    display_name: QR Code AI vs Competitors
    description: How QR Code AI compares to other platforms
    llm_context: "USE: when discussing QR Code AI platform comparisons or competitive analysis. TRIGGERS: qr code ai vs, compare qr platforms, qr code ai alternative, qr generator comparison, best qr platform. NOT: free vs paid (pricing), dynamic vs static (code types)."
    entity_summary: |
      Comparison of QR Code AI with other QR platforms. Evaluates
      features, pricing, ease of use, design options, and analytics
      capabilities across major QR code generators.

  - key: short-link-vs-qr-code
    type: COMPARISON
    display_name: Short Link vs QR Code
    description: When to use short links vs QR codes
    llm_context: "USE: when discussing short links vs QR codes or when to use each technology. TRIGGERS: short link vs qr, url vs qr, link or qr, bitly vs qr, when to use qr. NOT: dynamic vs static (both QR), qr vs nfc (hardware)."
    entity_summary: |
      Comparison between short links and QR codes. Short links work
      for digital sharing and typing. QR codes work for physical media
      and instant mobile access. Often used together for best results.

  - key: spotify-code-vs-qr-code
    type: COMPARISON
    display_name: Spotify Code vs QR Code
    description: Comparing Spotify Codes with standard QR codes
    llm_context: "USE: when discussing Spotify Codes vs standard QR codes or proprietary vs universal codes. TRIGGERS: spotify code vs qr, spotify qr, spotify code difference, proprietary qr, music qr comparison. NOT: qr vs barcode (format), platform comparison (generators)."
    entity_summary: |
      Comparison between Spotify Codes and standard QR codes. Spotify
      Codes use proprietary format requiring the Spotify app. Standard
      QR codes work universally but lack Spotify's visual branding.

