# Phase 9: Integrations — 12 Entities
# QR Code AI Entity Data for NovaNet
# v11 Schema with Typed Semantic Arcs

project: qrcode-ai
phase: 9
name: Integrations
description: Third-party integrations connecting QR Code AI with external services

entities:
  # =============================================================================
  # AUTOMATION INTEGRATIONS (3)
  # =============================================================================
  - key: zapier-integration
    type: INTEGRATION
    display_name: Zapier Integration
    description: Workflow automation via Zapier
    llm_context: "USE: when discussing Zapier integration with QR Code AI, automated QR workflows, or zap connections. TRIGGERS: zapier integration, qr zapier, zap qr, automate qr, zapier connection. NOT: make integration (different platform), direct api (not integration)."
    entity_summary: |
      Zapier integration connects QR Code AI with 5,000+ apps.
      Automate actions when QR codes are scanned - create leads,
      send notifications, update spreadsheets, and more.

  - key: make-integration
    type: INTEGRATION
    display_name: Make Integration
    description: Visual automation via Make (Integromat)
    llm_context: "USE: when discussing Make/Integromat integration with QR Code AI or visual scenario automation. TRIGGERS: make integration, integromat integration, qr make, qr integromat, visual automation integration. NOT: zapier integration (different platform), n8n integration (self-hosted)."
    entity_summary: |
      Make integration enables complex visual automation workflows.
      Create multi-step scenarios triggered by QR scans with
      advanced logic, filters, and data transformation.

  - key: n8n-integration
    type: INTEGRATION
    display_name: n8n Integration
    description: Self-hosted automation via n8n
    llm_context: "USE: when discussing n8n integration with QR Code AI or self-hosted privacy-first automation. TRIGGERS: n8n integration, qr n8n, self-hosted qr automation, privacy qr automation. NOT: zapier integration (hosted), make integration (hosted)."
    entity_summary: |
      n8n integration for self-hosted automation workflows.
      Privacy-focused option for enterprises requiring data
      to stay on-premises while automating QR workflows.

  # =============================================================================
  # CRM INTEGRATIONS (3)
  # =============================================================================
  - key: hubspot-integration
    type: INTEGRATION
    display_name: HubSpot Integration
    description: CRM and marketing automation via HubSpot
    llm_context: "USE: when discussing HubSpot integration with QR Code AI or QR-to-CRM lead syncing. TRIGGERS: hubspot integration, qr hubspot, crm qr integration, hubspot qr sync, marketing automation qr. NOT: salesforce integration (enterprise), mailchimp integration (email)."
    entity_summary: |
      HubSpot integration syncs QR scan data to HubSpot CRM.
      Create contacts, log activities, and trigger marketing
      automation based on QR code interactions.

  - key: salesforce-integration
    type: INTEGRATION
    display_name: Salesforce Integration
    description: Enterprise CRM via Salesforce
    llm_context: "USE: when discussing Salesforce integration with QR Code AI or enterprise CRM QR connections. TRIGGERS: salesforce integration, qr salesforce, enterprise crm qr, salesforce qr sync. NOT: hubspot integration (smb), dynamics integration (microsoft)."
    entity_summary: |
      Salesforce integration connects QR codes to enterprise CRM.
      Log scan events, create leads, and track customer journeys
      from physical touchpoints to digital engagement.

  - key: mailchimp-integration
    type: INTEGRATION
    display_name: Mailchimp Integration
    description: Email marketing via Mailchimp
    llm_context: "USE: when discussing Mailchimp integration with QR Code AI or QR-to-email list building. TRIGGERS: mailchimp integration, qr mailchimp, email qr integration, newsletter qr signup, list building qr. NOT: hubspot integration (full crm), sendgrid (api only)."
    entity_summary: |
      Mailchimp integration adds QR code contacts to email lists.
      Automate welcome sequences, segment by scan location, and
      track offline-to-email conversion rates.

  # =============================================================================
  # PRODUCTIVITY INTEGRATIONS (3)
  # =============================================================================
  - key: google-sheets-integration
    type: INTEGRATION
    display_name: Google Sheets Integration
    description: Spreadsheet sync via Google Sheets
    llm_context: "USE: when discussing Google Sheets integration with QR Code AI or spreadsheet QR data sync. TRIGGERS: google sheets integration, qr google sheets, spreadsheet qr, sheets qr sync, batch qr from sheets. NOT: notion integration (workspace), airtable (database)."
    entity_summary: |
      Google Sheets integration logs QR scan data to spreadsheets.
      Create batch QR codes from sheet data and track scan
      analytics in real-time within Google Workspace.

  - key: notion-integration
    type: INTEGRATION
    display_name: Notion Integration
    description: Workspace sync via Notion
    llm_context: "USE: when discussing Notion integration with QR Code AI or workspace QR management. TRIGGERS: notion integration, qr notion, notion qr sync, workspace qr, notion database qr. NOT: google sheets integration (spreadsheet), coda (alternative)."
    entity_summary: |
      Notion integration connects QR codes to Notion databases.
      Log scans, create pages, and manage QR campaigns alongside
      other project documentation.

  - key: slack-integration
    type: INTEGRATION
    display_name: Slack Integration
    description: Team notifications via Slack
    llm_context: "USE: when discussing Slack integration with QR Code AI or QR scan notifications. TRIGGERS: slack integration, qr slack, slack notifications qr, team alert qr, slack channel qr. NOT: teams integration (microsoft), discord (community)."
    entity_summary: |
      Slack integration sends notifications when QR codes are scanned.
      Real-time alerts for sales opportunities, event check-ins,
      and campaign milestones to team channels.

  # =============================================================================
  # E-COMMERCE INTEGRATIONS (3)
  # =============================================================================
  - key: shopify-integration
    type: INTEGRATION
    display_name: Shopify Integration
    description: E-commerce QR codes via Shopify
    llm_context: "USE: when discussing Shopify integration with QR Code AI or e-commerce product QR codes. TRIGGERS: shopify integration, qr shopify, shopify product qr, e-commerce qr integration, shopify store qr. NOT: woocommerce integration (wordpress), amazon (marketplace)."
    entity_summary: |
      Shopify integration creates QR codes for products and orders.
      Link product packaging to reviews, add QR to receipts for
      reordering, and track physical-to-digital conversions.

  - key: woocommerce-integration
    type: INTEGRATION
    display_name: WooCommerce Integration
    description: WordPress e-commerce via WooCommerce
    llm_context: "USE: when discussing WooCommerce integration with QR Code AI or WordPress e-commerce QR codes. TRIGGERS: woocommerce integration, qr woocommerce, wordpress qr store, woo qr integration. NOT: shopify integration (hosted), magento (enterprise)."
    entity_summary: |
      WooCommerce integration connects QR codes to WordPress stores.
      Generate product QR codes, embed in pages, and track scans
      within the WordPress admin dashboard.

  - key: wordpress-integration
    type: INTEGRATION
    display_name: WordPress Integration
    description: CMS integration via WordPress
    llm_context: "USE: when discussing WordPress integration with QR Code AI or embedding QR codes in WordPress. TRIGGERS: wordpress integration, qr wordpress, wordpress qr plugin, wp qr shortcode, cms qr integration. NOT: woocommerce integration (e-commerce), squarespace (different cms)."
    entity_summary: |
      WordPress integration embeds QR codes directly in posts and pages.
      Plugin or shortcode access for content creators. Works with
      page builders and the block editor.

# =============================================================================
# SEMANTIC ARCS (~35 connections)
# =============================================================================

