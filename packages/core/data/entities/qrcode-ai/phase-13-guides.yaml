# Phase 13: Guides — 10 Entities
# QR Code AI Entity Data for NovaNet
# v11 Schema with Typed Semantic Arcs

project: qrcode-ai
phase: 13
name: Guides
description: How-to guides and tutorials for QR code creation and usage

entities:
  # =============================================================================
  # CREATION GUIDES (4)
  # =============================================================================
  - key: how-to-create-qr-code
    type: GUIDE
    display_name: How to Create QR Code
    description: Step-by-step QR code creation guide
    llm_context: "USE: when discussing how to create QR codes, QR creation tutorials, or step-by-step QR generation. TRIGGERS: how to create qr, make qr code, qr tutorial, create qr guide, generate qr how to. NOT: design guide (aesthetics), print guide (physical output)."
    entity_summary: |
      A comprehensive guide to creating QR codes. Covers choosing content
      type, designing appearance, generating the code, and downloading
      for use. Suitable for beginners.

  - key: qr-code-design-guide
    type: GUIDE
    display_name: QR Code Design Guide
    description: Best practices for QR code aesthetics
    llm_context: "USE: when discussing QR code design, styling, customization best practices, or visual aesthetics. TRIGGERS: qr design, qr styling, qr aesthetics, beautiful qr, custom qr design, qr appearance. NOT: creation guide (basic), print guide (output)."
    entity_summary: |
      Design guide for creating visually appealing QR codes. Covers color
      theory, logo placement, contrast requirements, and balancing
      aesthetics with scannability.

  - key: qr-code-print-guide
    type: GUIDE
    display_name: QR Code Print Guide
    description: Guidelines for printing scannable QR codes
    llm_context: "USE: when discussing QR code printing, print requirements, or physical QR production. TRIGGERS: qr print, print qr guide, qr printing tips, physical qr, qr size for print, print quality qr. NOT: design guide (digital), creation guide (generation)."
    entity_summary: |
      Printing guide for QR codes on physical materials. Covers minimum
      size requirements, resolution, quiet zones, material considerations,
      and testing before production runs.

  - key: dynamic-vs-static-guide
    type: GUIDE
    display_name: Dynamic vs Static Guide
    description: When to use dynamic vs static QR codes
    llm_context: "USE: when discussing choosing between dynamic and static QR codes or comparing QR types. TRIGGERS: dynamic vs static, which qr type, qr type comparison, editable qr, trackable qr choice. NOT: comparison entity (detailed), creation guide (how-to)."
    entity_summary: |
      Decision guide for choosing between dynamic and static QR codes.
      Explains trade-offs: editability, tracking, cost, and use cases
      for each type.

  # =============================================================================
  # USE CASE GUIDES (3)
  # =============================================================================
  - key: qr-code-marketing-guide
    type: GUIDE
    display_name: QR Marketing Guide
    description: Using QR codes for marketing campaigns
    llm_context: "USE: when discussing QR codes for marketing, campaign strategies, or print-to-digital marketing. TRIGGERS: qr marketing, marketing qr guide, campaign qr, advertising qr, roi qr, print to digital. NOT: restaurant guide (industry), business card guide (specific use)."
    entity_summary: |
      Marketing guide for QR code campaigns. Covers placement strategies,
      call-to-action design, tracking setup, and measuring ROI on
      print-to-digital conversions.

  - key: qr-code-restaurant-guide
    type: GUIDE
    display_name: Restaurant QR Guide
    description: QR codes for restaurants and cafes
    llm_context: "USE: when discussing QR codes specifically for restaurants, cafes, or food service. TRIGGERS: restaurant qr guide, menu qr, cafe qr, food service qr, dining qr, table qr guide. NOT: marketing guide (general), business card guide (networking)."
    entity_summary: |
      Restaurant guide for QR code implementation. Covers digital menus,
      ordering systems, payment integration, and table tent placement
      for optimal customer experience.

  - key: qr-code-business-card-guide
    type: GUIDE
    display_name: Business Card QR Guide
    description: Adding QR codes to business cards
    llm_context: "USE: when discussing QR codes on business cards, networking cards, or professional contact sharing. TRIGGERS: business card qr guide, vcard qr, networking card qr, professional qr, contact card qr. NOT: restaurant guide (food), marketing guide (campaigns)."
    entity_summary: |
      Business card guide for QR code integration. Covers vCard encoding,
      placement options, size considerations, and connecting physical
      cards to digital profiles.

  # =============================================================================
  # TECHNICAL GUIDES (3)
  # =============================================================================
  - key: qr-code-api-guide
    type: GUIDE
    display_name: QR Code API Guide
    description: Developer guide for QR code API integration
    llm_context: "USE: when discussing QR code API documentation, developer integration, or programmatic QR generation. TRIGGERS: qr api guide, developer qr, api integration qr, programmatic qr, qr api docs. NOT: analytics guide (tracking), security guide (safety)."
    entity_summary: |
      API integration guide for developers. Covers authentication,
      endpoint documentation, code examples, rate limits, and
      building QR code features into applications.

  - key: qr-code-analytics-guide
    type: GUIDE
    display_name: Analytics Guide
    description: Understanding QR code scan analytics
    llm_context: "USE: when discussing QR scan analytics, tracking interpretation, or campaign measurement. TRIGGERS: qr analytics guide, scan tracking guide, qr metrics, analytics interpretation, campaign analytics. NOT: api guide (development), marketing guide (strategy)."
    entity_summary: |
      Analytics guide for QR code tracking. Covers metrics interpretation,
      geographic data, device analytics, time-series analysis, and
      using data for campaign optimization.

  - key: qr-code-security-guide
    type: GUIDE
    display_name: QR Security Guide
    description: Security best practices for QR codes
    llm_context: "USE: when discussing QR code security, phishing prevention, or safe QR practices. TRIGGERS: qr security, safe qr, qr phishing, qr safety, malicious qr, secure qr. NOT: api guide (development), analytics guide (tracking)."
    entity_summary: |
      Security guide for QR code safety. Covers phishing risks, URL
      verification, secure short links, and protecting both creators
      and scanners from malicious codes.

