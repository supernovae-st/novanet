  # ═══════════════════════════════════════════════════════════════════════════
  - key: qr-code-social
    type: THING
    display_name: Social Media QR Code
    description: Category for social media platform QR codes
    llm_context: "USE: when discussing social media QR codes generally. TRIGGERS: social qr, social media qr, social link qr. NOT: specific platforms (use Instagram QR, LinkedIn QR, etc.)."
    entity_summary: |
