      Used on printed resumes, business cards, and portfolios. Can
      link to LinkedIn, personal website, or PDF.

  - key: qr-code-certificate
    type: CONTENT_TYPE
    display_name: Certificate QR Code
    description: Verifies authenticity of certificates and credentials
    llm_context: "USE: when discussing certificate verification, credential QR. TRIGGERS: certificate qr, diploma qr, credential qr, verification qr. NOT: ticket (use Ticket QR), ID badge."
    entity_summary: |
      A certificate QR code enables verification of diplomas, licenses,
      and credentials. Links to issuer database for authenticity
      check. Used in education, healthcare, and professional fields.

  - key: qr-code-ticket
    type: CONTENT_TYPE
    display_name: Ticket QR Code
    description: Event or transport ticket
    llm_context: "USE: when discussing event tickets, transport tickets, entry QR. TRIGGERS: ticket qr, event ticket qr, boarding pass qr, concert ticket qr. NOT: attendance check-in (use Attendance QR), coupon (use Coupon QR)."
    entity_summary: |
      A ticket QR code encodes event entry or transport ticket data.
      Scanned at entry for validation. Used for concerts, flights,
      trains, and venues. Can be static or dynamic.

  - key: qr-code-attendance
    type: CONTENT_TYPE
    display_name: Attendance QR Code
    description: Check-in for events, classes, or meetings
    llm_context: "USE: when discussing check-in QR, attendance tracking. TRIGGERS: attendance qr, check-in qr, sign-in qr, class attendance qr. NOT: event ticket (use Ticket QR), access badge."
    entity_summary: |
      An attendance QR code enables quick check-in by scanning.
      Used in schools, conferences, gyms, and offices. Links to
      attendance tracking system with timestamp.

  - key: qr-code-pet-tag
    type: CONTENT_TYPE
    display_name: Pet Tag QR Code
    description: Pet identification with owner contact info
    llm_context: "USE: when discussing pet ID QR, lost pet tags. TRIGGERS: pet tag qr, pet id qr, dog tag qr, cat tag qr. NOT: medical ID (use Medical ID QR), vCard (use vCard QR)."
    entity_summary: |
      A pet tag QR code links to owner contact information if a
      pet is lost. Can include pet name, medical info, and multiple
      contact methods. Always dynamic for updates.

  - key: qr-code-medical-id
    type: CONTENT_TYPE
    display_name: Medical ID QR Code
    description: Emergency medical information
    llm_context: "USE: when discussing medical alert QR, health info QR. TRIGGERS: medical id qr, health qr, emergency info qr, medical alert qr. NOT: pet tag (use Pet Tag QR), certificate (use Certificate QR)."
    entity_summary: |
      A medical ID QR code provides emergency access to critical
      health information (blood type, allergies, medications,
      emergency contacts). Worn as bracelet or necklace.

  - key: qr-code-file
    type: CONTENT_TYPE
    display_name: File Download QR Code
    description: Links to any downloadable file
    llm_context: "USE: when discussing file download QR, document download links. TRIGGERS: file qr, download qr, zip qr, document download qr. NOT: PDF specifically (use PDF QR), image gallery (use Image Gallery QR)."
    entity_summary: |
      A file download QR code links to any downloadable file (ZIP,
      DOC, XLS, etc.). Used for sharing documents, software, and
      media. Dynamic for download tracking and updates.

  - key: qr-code-calendar
    type: CONTENT_TYPE
    display_name: Calendar Event QR Code
    description: Adds event to calendar
    llm_context: "USE: when discussing calendar event QR, iCal links. TRIGGERS: calendar qr, event qr, ical qr, add to calendar qr. NOT: event RSVP page (use Event RSVP), ticket (use Ticket QR)."
    entity_summary: |
      A calendar event QR code encodes event details (date, time,
      location, description) in iCal format. Scanning adds the event
      directly to the user's calendar app.

