# Phase 5: Mediums — 20 Entities
# QR Code AI Entity Data for NovaNet
# v11 Schema with Typed Semantic Arcs

project: qrcode-ai
phase: 5
name: Mediums
description: Physical and digital mediums where QR codes are placed (print, product, digital)

entities:
  # =============================================================================
  # PRINT MEDIUMS (10)
  # =============================================================================
  - key: business-cards
    type: MEDIUM
    display_name: Business Cards
    description: Professional contact cards
    llm_context: "USE: when discussing QR codes on business cards, networking cards, or professional contact materials. TRIGGERS: business cards, business card qr, card qr code, networking card, contact card, visiting card. NOT: vcard (digital format), flyers (larger print)."
    entity_summary: |
      Business cards are traditional print mediums for professional networking.
      QR codes on business cards link to digital profiles, vCards, or portfolios.
      Compact size requires small, high-contrast QR codes.

  - key: flyers
    type: MEDIUM
    display_name: Flyers
    description: Promotional flyers
    llm_context: "USE: when discussing QR codes on flyers, promotional handouts, or single-sheet marketing materials. TRIGGERS: flyers, flyer qr, handout, leaflet, promotional flyer, marketing flyer. NOT: brochures (folded), posters (large format)."
    entity_summary: |
      Flyers are single-sheet printed materials for promotions and announcements.
      QR codes on flyers link to landing pages, coupons, or event registration.
      Allow larger QR codes with more design freedom.

  - key: posters-billboards
    type: MEDIUM
    display_name: Posters & Billboards
    description: Large format displays
    llm_context: "USE: when discussing QR codes on posters, billboards, outdoor advertising, or large-format displays. TRIGGERS: poster qr, billboard qr, outdoor qr, large qr, signage qr, advertising poster. NOT: banners (fabric), flyers (small print)."
    entity_summary: |
      Posters and billboards are large-format print for high-visibility advertising.
      QR codes must be scannable from distance - require high contrast and size.
      Often link to campaigns, apps, or promotional content.

  - key: brochures
    type: MEDIUM
    display_name: Brochures
    description: Folded informational materials
    llm_context: "USE: when discussing QR codes on brochures, tri-folds, pamphlets, or folded marketing materials. TRIGGERS: brochure qr, tri-fold, pamphlet, folded brochure, informational brochure. NOT: flyers (single sheet), catalogs (bound)."
    entity_summary: |
      Brochures are folded print materials for detailed information.
      QR codes can link to videos, downloads, or interactive content that
      expands on printed information.

  - key: catalogs
    type: MEDIUM
    display_name: Catalogs
    description: Product catalogs
    llm_context: "USE: when discussing QR codes in product catalogs, print catalogs, or catalog shopping materials. TRIGGERS: catalog qr, product catalog, print catalog, shopping catalog, catalogue. NOT: brochures (folded), magazines (editorial)."
    entity_summary: |
      Catalogs showcase products with detailed descriptions and images.
      QR codes next to products link directly to e-commerce pages for
      instant purchasing or additional product information.

  - key: magazines
    type: MEDIUM
    display_name: Magazines
    description: Print publications
    llm_context: "USE: when discussing QR codes in magazines, print publications, or editorial content. TRIGGERS: magazine qr, print magazine, editorial qr, publication qr, magazine ad. NOT: newspapers (daily), brochures (marketing)."
    entity_summary: |
      Magazines are periodic print publications. QR codes in magazines
      link to interactive content, videos, or exclusive online offers.
      Higher-quality paper allows detailed QR code designs.

  - key: newspapers
    type: MEDIUM
    display_name: Newspapers
    description: News publications
    llm_context: "USE: when discussing QR codes in newspapers, print news, or daily/weekly publications. TRIGGERS: newspaper qr, print news, daily paper, news publication, newspaper ad. NOT: magazines (glossy), digital news (websites)."
    entity_summary: |
      Newspapers are daily or weekly news publications. QR codes link to
      full articles, video reports, or subscription pages. Lower paper
      quality requires simpler, higher-contrast QR codes.

  - key: direct-mail
    type: MEDIUM
    display_name: Direct Mail
    description: Mailed marketing materials
    llm_context: "USE: when discussing QR codes on direct mail, postcards, mailers, or shipped marketing materials. TRIGGERS: direct mail qr, postcard qr, mailer, mailed marketing, postal qr. NOT: flyers (handed out), email (digital)."
    entity_summary: |
      Direct mail includes postcards, letters, and packages sent to recipients.
      QR codes enable tracking of physical mail campaigns and link to
      personalized landing pages or special offers.

  - key: stickers-labels
    type: MEDIUM
    display_name: Stickers & Labels
    description: Adhesive prints
    llm_context: "USE: when discussing QR codes on stickers, adhesive labels, or peel-and-stick materials. TRIGGERS: sticker qr, label qr, adhesive qr, peel and stick, vinyl sticker. NOT: product labels (packaging), product packaging (boxes)."
    entity_summary: |
      Stickers and labels are adhesive materials applied to surfaces.
      QR codes on stickers can appear anywhere - products, windows, equipment.
      Compact format requires clear, simple QR designs.

  - key: banners
    type: MEDIUM
    display_name: Banners
    description: Event and trade show banners
    llm_context: "USE: when discussing QR codes on banners, trade show displays, event signage, or fabric/vinyl banners. TRIGGERS: banner qr, trade show banner, event banner, fabric banner, vinyl banner, roll-up banner. NOT: posters (paper), billboards (outdoor)."
    entity_summary: |
      Banners are large fabric or vinyl displays for events and trade shows.
      QR codes must be visible from distance and scannable in busy environments.
      Often link to contact forms, catalogs, or lead capture.

  # =============================================================================
  # PRODUCT MEDIUMS (6)
  # =============================================================================
  - key: product-packaging
    type: MEDIUM
    display_name: Product Packaging
    description: Product boxes and containers
    llm_context: "USE: when discussing QR codes on product packaging, boxes, containers, or retail packaging. TRIGGERS: packaging qr, product box, container qr, retail packaging, package qr code. NOT: product labels (adhesive), shipping labels (logistics)."
    entity_summary: |
      Product packaging includes boxes, bottles, and containers holding products.
      QR codes provide access to user manuals, registration, authenticity
      verification, and promotional content.

  - key: product-labels
    type: MEDIUM
    display_name: Product Labels
    description: Applied product labels
    llm_context: "USE: when discussing QR codes on product labels, applied labels, or product tag labels. TRIGGERS: product label qr, applied label, product tag, label qr code, item label. NOT: stickers (decorative), product packaging (boxes)."
    entity_summary: |
      Product labels are adhesive tags applied to products. QR codes on labels
      provide product information, nutritional data, or traceability for food
      and pharmaceutical industries.

  - key: receipts
    type: MEDIUM
    display_name: Receipts
    description: Transaction receipts
    llm_context: "USE: when discussing QR codes on receipts, transaction slips, or purchase confirmations. TRIGGERS: receipt qr, transaction receipt, purchase receipt, pos receipt, sales receipt. NOT: tickets (entry), invoices (billing)."
    entity_summary: |
      Receipts are proof of purchase documents. QR codes on receipts link to
      digital receipts, loyalty programs, feedback forms, or warranty registration.

  - key: table-tents
    type: MEDIUM
    display_name: Table Tents
    description: Restaurant table displays
    llm_context: "USE: when discussing QR codes on table tents, restaurant table stands, or tabletop displays. TRIGGERS: table tent qr, table stand, restaurant table qr, tabletop display, table card. NOT: printed menus (booklet), flyers (handed out)."
    entity_summary: |
      Table tents are folded standing displays on restaurant tables.
      QR codes provide access to digital menus, ordering, payment, or feedback.
      Common in the post-COVID contactless dining trend.

  - key: menus-printed
    type: MEDIUM
    display_name: Printed Menus
    description: Physical restaurant menus
    llm_context: "USE: when discussing QR codes on printed menus, physical restaurant menus, or paper menus. TRIGGERS: printed menu qr, paper menu, physical menu, restaurant menu qr, laminated menu. NOT: digital menu (online), table tents (standing)."
    entity_summary: |
      Printed menus are traditional paper or laminated restaurant menus.
      QR codes link to digital versions, allergen info, or ordering systems
      while maintaining traditional dining experience.

  - key: tickets-physical
    type: MEDIUM
    display_name: Physical Tickets
    description: Event tickets
    llm_context: "USE: when discussing QR codes on physical tickets, event tickets, admission tickets, or printed tickets. TRIGGERS: ticket qr, event ticket, physical ticket, admission ticket, printed ticket, concert ticket. NOT: digital tickets (mobile), receipts (purchase)."
    entity_summary: |
      Physical tickets provide entry to events, transportation, or venues.
      QR codes enable quick scanning for entry and can link to event
      information, maps, or schedules.

  # =============================================================================
  # DIGITAL MEDIUMS (4)
  # =============================================================================
  - key: emails
    type: MEDIUM
    display_name: Emails
    description: Email signatures and campaigns
    llm_context: "USE: when discussing QR codes in emails, email signatures, email campaigns, or email marketing. TRIGGERS: email qr, email signature, email campaign, email marketing qr, newsletter qr. NOT: websites (web pages), documents (pdfs)."
    entity_summary: |
      Emails are digital messages for communication and marketing.
      QR codes in email signatures or campaigns enable quick actions
      like adding contacts, downloading apps, or accessing exclusive content.

  - key: presentations
    type: MEDIUM
    display_name: Presentations
    description: Slides and decks
    llm_context: "USE: when discussing QR codes in presentations, slide decks, PowerPoint, or meeting materials. TRIGGERS: presentation qr, slide qr, powerpoint qr, deck qr, meeting slides, conference presentation. NOT: documents (static), websites (interactive)."
    entity_summary: |
      Presentations are slide-based documents for meetings and conferences.
      QR codes in slides provide quick access to resources, polls,
      downloads, or follow-up materials during live presentations.

  - key: documents
    type: MEDIUM
    display_name: Documents
    description: PDFs, reports, and contracts
    llm_context: "USE: when discussing QR codes in documents, PDFs, reports, contracts, or printed documents. TRIGGERS: document qr, pdf qr, report qr, contract qr, printed document. NOT: presentations (slides), emails (messages)."
    entity_summary: |
      Documents include PDFs, reports, and contracts. QR codes in documents
      link to related resources, verification systems, or interactive content
      that complements printed or digital documents.

  - key: websites
    type: MEDIUM
    display_name: Websites
    description: Web pages
    llm_context: "USE: when discussing QR codes displayed on websites, web pages, or online platforms. TRIGGERS: website qr, web page qr, online qr, site qr, desktop to mobile. NOT: emails (messages), presentations (slides)."
    entity_summary: |
      Websites display QR codes for cross-device experiences.
      Desktop users can scan to continue on mobile, download apps,
      or save content for offline access.

# =============================================================================
# SEMANTIC ARCS (~35 connections)
# =============================================================================

arcs:
  # ---------------------------------------------------------------------------
  # PRINT → FRAME CONNECTIONS
  # ---------------------------------------------------------------------------
  - from: business-cards
    to: qr-code-business-card
    type: SIMILAR_TO
    strength: 0.85

  - from: business-cards
    to: qr-code-vcard
    type: ENABLES
    strength: 0.70

  - from: flyers
    to: qr-code-flyer
    type: SIMILAR_TO
    strength: 0.85

  - from: posters-billboards
    to: qr-code-poster
    type: SIMILAR_TO
    strength: 0.85

  - from: table-tents
    to: qr-code-table-tent
    type: SIMILAR_TO
    strength: 0.85

  - from: product-packaging
    to: qr-code-packaging-label
    type: SIMILAR_TO
    strength: 0.85

  - from: emails
    to: qr-code-email-signature
    type: SIMILAR_TO
    strength: 0.85

  # ---------------------------------------------------------------------------
  # PRINT MEDIUM SIMILARITIES
  # ---------------------------------------------------------------------------
  - from: flyers
    to: brochures
    type: SIMILAR_TO
    strength: 0.70

  - from: posters-billboards
    to: banners
    type: SIMILAR_TO
    strength: 0.70

  - from: magazines
    to: newspapers
    type: SIMILAR_TO
    strength: 0.65

  - from: catalogs
    to: brochures
    type: SIMILAR_TO
    strength: 0.60

  - from: stickers-labels
    to: product-labels
    type: SIMILAR_TO
    strength: 0.80

  - from: menus-printed
    to: table-tents
    type: SIMILAR_TO
    strength: 0.65

  # ---------------------------------------------------------------------------
  # DIGITAL MEDIUM SIMILARITIES
  # ---------------------------------------------------------------------------
  - from: presentations
    to: documents
    type: SIMILAR_TO
    strength: 0.60

  - from: emails
    to: websites
    type: SIMILAR_TO
    strength: 0.50

  # ---------------------------------------------------------------------------
  # MEDIUM → CONTENT TYPE CONNECTIONS
  # ---------------------------------------------------------------------------
  - from: product-packaging
    to: barcode
    type: ENABLES
    strength: 0.80

  - from: product-labels
    to: barcode
    type: ENABLES
    strength: 0.80

  - from: tickets-physical
    to: qr-code-event
    type: ENABLES
    strength: 0.75

  - from: receipts
    to: qr-code-url
    type: ENABLES
    strength: 0.65
