[book]
title = "NovaNet Documentation"
authors = ["SuperNovae Studio"]
description = "Knowledge graph localization orchestrator - technical documentation"
language = "en"
multilingual = false
src = "docs/src"

[build]
build-dir = "docs/book"
create-missing = true

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/supernovae-st/novanet-dev"
edit-url-template = "https://github.com/supernovae-st/novanet-dev/edit/main/{path}"
site-url = "/"
cname = ""
additional-css = []
additional-js = []
no-section-label = false
fold = { enable = true, level = 1 }

[output.html.playground]
editable = false
copyable = true
copy-js = true
line-numbers = true

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-hierarchical-search = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
copy-js = true

[preprocessor.mermaid]
command = "mdbook-mermaid"
