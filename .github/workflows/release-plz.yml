# 🌌 ARMADA: Release-plz Automation
# Creates release PRs automatically when commits land on main
# Part of ARMADA quality checkpoints
#
# How it works:
# 1. Push to main triggers this workflow
# 2. release-plz analyzes commits since last release
# 3. Creates a PR with: version bump + CHANGELOG update
# 4. You review and merge the Release PR
# 5. release.yml triggers on tag to build binaries

name: 🚀 Release PR

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: Create Release PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
          manifest_path: tools/novanet/Cargo.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
