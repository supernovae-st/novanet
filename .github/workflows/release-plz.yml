# release-plz workflow
# Automates version bumping, CHANGELOG generation, and release PRs
#
# Flow:
#   push to main → validates → creates/updates Release PR
#   merge Release PR → creates git tag → triggers release.yml
#
# Documentation: https://release-plz.ieni.dev/docs/github

name: Release-plz

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release:
        description: 'Create release (tag + publish)'
        required: false
        type: boolean
        default: false

permissions:
  pull-requests: write
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # =============================================================================
  # Validation - Run before creating release PR
  # =============================================================================
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/novanet

      - name: Check formatting (Rust)
        run: cargo fmt --all --check --manifest-path tools/novanet/Cargo.toml

      - name: Run clippy
        run: cargo clippy --all-targets --all-features --manifest-path tools/novanet/Cargo.toml -- -D warnings

      # Note: Rust tests skipped here - they run in CI workflow with brain/ submodule
      # Integration tests require schema files from private brain/ repo

      - name: Run TypeScript tests
        run: pnpm test

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      - name: Check semver compatibility
        run: cargo semver-checks check-release --manifest-path tools/novanet/Cargo.toml
        continue-on-error: true

  # =============================================================================
  # Release PR - Creates/updates PR with version bumps and CHANGELOG
  # =============================================================================
  release-plz-pr:
    name: Create Release PR
    needs: validate
    runs-on: ubuntu-latest
    # Only run on push to main, not on workflow_dispatch with release=true
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.release)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
          manifest_path: tools/novanet/Cargo.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # =============================================================================
  # Release - Triggered when release PR is merged (or manual dispatch)
  # =============================================================================
  release-plz-release:
    name: Release
    runs-on: ubuntu-latest
    # Only run on manual dispatch with release=true
    if: github.event_name == 'workflow_dispatch' && inputs.release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
          manifest_path: tools/novanet/Cargo.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
