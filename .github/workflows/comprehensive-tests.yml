# NovaNet MCP Comprehensive Test Suite
# Runs extended tests: MCP tools, Neo4j integration, benchmarks
#
# Jobs:
# 1. mcp-tools-tests: Test all 12 MCP tools
# 2. smoke-tests: Binary compilation and MCP validation
# 3. neo4j-integration: (optional) Neo4j integration tests
# 4. benchmarks: Performance benchmarks
#
# NovaNet MCP v0.15.3 - 12 Tools | 430 tests

name: Comprehensive Tests

on:
  push:
    branches: [main]
    paths:
      - 'tools/novanet-mcp/**'
      - '.github/workflows/comprehensive-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tools/novanet-mcp/**'
  workflow_dispatch:
    inputs:
      run_neo4j_tests:
        description: 'Run Neo4j integration tests (requires Docker)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: comprehensive-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

defaults:
  run:
    working-directory: tools/novanet-mcp

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # MCP Tools Tests - All 12 MCP tools
  # ─────────────────────────────────────────────────────────────────────────────
  mcp-tools-tests:
    name: MCP Tools Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/novanet-mcp
          shared-key: mcp-tools-tests

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Run MCP tools unit tests
        run: |
          cargo nextest run --lib \
            --filter-expr 'test(/^tools::/)' \
            2>&1 | tee mcp-tools-results.txt

      - name: Run validation tests
        run: |
          cargo nextest run --lib \
            --filter-expr 'test(/^validation::/)' \
            2>&1 | tee validation-results.txt

      - name: Run cache tests
        run: |
          cargo nextest run --lib \
            --filter-expr 'test(/^cache::/)' \
            2>&1 | tee cache-results.txt

      - name: Upload MCP test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mcp-tools-test-results
          path: |
            tools/novanet-mcp/mcp-tools-results.txt
            tools/novanet-mcp/validation-results.txt
            tools/novanet-mcp/cache-results.txt
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Smoke Tests - Binary compilation and MCP validation
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/novanet-mcp
          shared-key: smoke-tests-${{ matrix.os }}

      - name: Build release binary
        run: cargo build --release

      - name: Verify binary exists
        run: |
          BINARY="target/release/novanet-mcp"
          if [ -f "$BINARY" ]; then
            echo "Binary exists"
            du -h "$BINARY" | cut -f1
            file "$BINARY"
          else
            echo "Binary not found"
            exit 1
          fi

      - name: Run format check
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run all unit tests
        run: cargo test --lib

  # ─────────────────────────────────────────────────────────────────────────────
  # Error Handling Tests - Error hints and validation
  # ─────────────────────────────────────────────────────────────────────────────
  error-handling-tests:
    name: Error Handling Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/novanet-mcp
          shared-key: error-tests

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Run error tests
        run: |
          cargo nextest run --lib \
            --filter-expr 'test(/^error::/)' \
            2>&1 | tee error-results.txt

      - name: Run hints tests
        run: |
          cargo nextest run --lib \
            --filter-expr 'test(/^hints::/)' \
            2>&1 | tee hints-results.txt

      - name: Upload error test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: error-test-results
          path: |
            tools/novanet-mcp/error-results.txt
            tools/novanet-mcp/hints-results.txt
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Benchmarks - Performance testing
  # ─────────────────────────────────────────────────────────────────────────────
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/novanet-mcp
          shared-key: benchmarks

      - name: Run micro-benchmarks
        run: |
          cargo test bench_ --release -- --nocapture 2>&1 | tee benchmark-results.txt || true

      - name: Run Criterion benchmarks (if exist)
        run: |
          if [ -d "benches" ]; then
            cargo bench 2>&1 | tee -a benchmark-results.txt || true
          else
            echo "No Criterion benchmarks found"
          fi

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: tools/novanet-mcp/benchmark-results.txt
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Neo4j Integration Tests (Optional) - Requires Docker
  # ─────────────────────────────────────────────────────────────────────────────
  neo4j-integration:
    name: Neo4j Integration Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.run_neo4j_tests == 'true'
    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/novanetpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NOVANET_MCP_NEO4J_URI: bolt://localhost:7687
      NOVANET_MCP_NEO4J_USER: neo4j
      NOVANET_MCP_NEO4J_PASSWORD: novanetpassword
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/novanet-mcp
          shared-key: neo4j-integration

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Wait for Neo4j
        run: |
          echo "Waiting for Neo4j to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:7474 > /dev/null; then
              echo "Neo4j is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Run integration tests
        run: |
          cargo nextest run --test '*' \
            --filter-expr 'test(/integration/)' \
            2>&1 | tee integration-results.txt || true

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: neo4j-integration-results
          path: tools/novanet-mcp/integration-results.txt
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Summary
  # ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [mcp-tools-tests, smoke-tests, error-handling-tests, benchmarks]
    if: always()
    steps:
      - name: Generate summary
        env:
          MCP_RESULT: ${{ needs.mcp-tools-tests.result }}
          SMOKE_RESULT: ${{ needs.smoke-tests.result }}
          ERROR_RESULT: ${{ needs.error-handling-tests.result }}
          BENCHMARK_RESULT: ${{ needs.benchmarks.result }}
        run: |
          echo "## NovaNet MCP Comprehensive Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Tools Tests | $MCP_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | $SMOKE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Error Handling Tests | $ERROR_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Benchmarks | $BENCHMARK_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Run Neo4j integration tests via workflow_dispatch with run_neo4j_tests=true*" >> $GITHUB_STEP_SUMMARY
