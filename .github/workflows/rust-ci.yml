# NovaNet Rust CI Pipeline
# Runs on: push to main, pull requests
#
# Jobs:
# 1. check: Format + Clippy
# 2. test: Unit + integration tests
# 3. security: cargo-deny + cargo-audit
# 4. semantic: Semantic coherence validation

name: Rust CI

on:
  push:
    branches: [main]
    paths:
      - 'tools/novanet/**'
      - 'packages/core/models/**'
      - '.github/workflows/rust-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tools/novanet/**'
      - 'packages/core/models/**'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  NOVANET_VERSION: v11.5
  NOVANET_NODE_COUNT: '60'

defaults:
  run:
    working-directory: tools/novanet

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Quick Check (runs first, fast feedback)
  # ─────────────────────────────────────────────────────────────────────────────
  check:
    name: Check (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/novanet -> target

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

  # ─────────────────────────────────────────────────────────────────────────────
  # Test Suite
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/novanet -> target

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests with nextest
        run: cargo nextest run --lib

      - name: Run doc tests
        run: cargo test --doc

  # ─────────────────────────────────────────────────────────────────────────────
  # Security Audit
  # ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Run cargo-deny
        run: cargo deny check

  # ─────────────────────────────────────────────────────────────────────────────
  # Semantic Coherence Validation
  # ─────────────────────────────────────────────────────────────────────────────
  semantic:
    name: Semantic Audit
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Verify YAML node count
        env:
          EXPECTED_COUNT: ${{ env.NOVANET_NODE_COUNT }}
        run: |
          YAML_COUNT=$(find ../../packages/core/models/node-kinds -name "*.yaml" | wc -l)
          echo "YAML node count: $YAML_COUNT"
          if [ "$YAML_COUNT" -ne "$EXPECTED_COUNT" ]; then
            echo "::error::YAML node count ($YAML_COUNT) does not match expected ($EXPECTED_COUNT)"
            exit 1
          fi

      - name: Check for deprecated realm names
        run: |
          DEPRECATED=$(grep -rn --include="*.rs" '"global"\|"tenant"' src/ 2>/dev/null | grep -v "test" | grep -v "// v11" || true)
          if [ -n "$DEPRECATED" ]; then
            echo "::warning::Deprecated realm names found (use 'shared'/'org'):"
            echo "$DEPRECATED" | head -10
          fi

      - name: Check for edge-family terminology
        run: |
          EDGE=$(grep -rn --include="*.rs" "edge.family\|edge-family" src/ 2>/dev/null || true)
          if [ -n "$EDGE" ]; then
            echo "::error::edge-family terminology found (use arc-family):"
            echo "$EDGE"
            exit 1
          fi

      - name: Verify layer structure
        run: |
          SHARED=$(ls -d ../../packages/core/models/node-kinds/shared/*/ | wc -l)
          ORG=$(ls -d ../../packages/core/models/node-kinds/org/*/ | wc -l)
          TOTAL=$((SHARED + ORG))
          echo "Layer count: $TOTAL ($SHARED shared + $ORG org)"
          if [ "$TOTAL" -ne 10 ]; then
            echo "::error::Layer count ($TOTAL) does not match expected (10)"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Build (only on main)
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, security, semantic]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/novanet -> target

      - name: Build release
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: novanet-linux
          path: tools/novanet/target/release/novanet
          retention-days: 7
