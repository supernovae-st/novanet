# 🌌 ARMADA Quality Checkpoints
# 10 checkpoints that must clear before merge
# "The galaxy fleet protecting the code treasure"

name: 🌌 ARMADA Checkpoints

on:
  pull_request:
    branches: [main]

concurrency:
  group: armada-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_VERSION: stable
  NODE_VERSION: 20

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # STATION 1-2: Format & Lint (Fast, parallel)
  # ═══════════════════════════════════════════════════════════════════════════
  station-1-format:
    name: "🔧 Station 1: Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TypeScript formatting
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check || echo "::warning::TypeScript format issues found"

      # Rust formatting
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt
      - run: cargo fmt --all --check
        working-directory: tools/novanet

  station-2-lint:
    name: "📎 Station 2: Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TypeScript linting
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

      # Rust linting
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/novanet
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
        working-directory: tools/novanet

  # ═══════════════════════════════════════════════════════════════════════════
  # STATION 3-4: Tests & Coverage (Medium, parallel)
  # ═══════════════════════════════════════════════════════════════════════════
  station-3-tests:
    name: "🧪 Station 3: Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TypeScript tests
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

      # Rust tests
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/novanet
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --all-features
        working-directory: tools/novanet
        env:
          NEXTEST_RETRIES: 2

  station-4-coverage:
    name: "📊 Station 4: Coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Rust coverage
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/novanet
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --all-features --codecov --output-path codecov.json
        working-directory: tools/novanet
      - name: Check coverage threshold
        working-directory: tools/novanet
        run: |
          COVERAGE=$(cargo llvm-cov --workspace --all-features --json 2>/dev/null | jq -r '.data[0].totals.lines.percent // 0')
          echo "Coverage: ${COVERAGE}%"
          if [ -n "$COVERAGE" ] && [ "$(echo "$COVERAGE < 70" | bc -l 2>/dev/null || echo 0)" = "1" ]; then
            echo "::warning::Coverage below 70%: ${COVERAGE}%"
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # STATION 5-6: Docs & Security (Medium, parallel)
  # ═══════════════════════════════════════════════════════════════════════════
  station-5-docs:
    name: "📖 Station 5: Docs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TypeScript type-check (docs proxy)
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

      # Rust docs
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/novanet
      - run: cargo doc --workspace --no-deps --all-features
        working-directory: tools/novanet
        env:
          RUSTDOCFLAGS: "-D warnings"

  station-6-security:
    name: "🔒 Station 6: Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TypeScript audit
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=moderate || echo "::warning::pnpm audit found issues"

      # Rust security
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/novanet
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check
        working-directory: tools/novanet

      # Secrets scan
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # ═══════════════════════════════════════════════════════════════════════════
  # STATION 7-8: AI Reviews (Slow, parallel)
  # ═══════════════════════════════════════════════════════════════════════════
  station-7-coderabbit:
    name: "🤖 Station 7: CodeRabbit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "CodeRabbit AI review"
          echo "If CodeRabbit GitHub App is installed, it reviews automatically."
          echo "Otherwise, this station passes without AI review."

  station-8-claude:
    name: "🧠 Station 8: Claude AI"
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Claude AI Review (placeholder)
        run: |
          echo "Claude AI Review"
          echo "This station is a placeholder for future Claude API integration."
          echo "For now, manual review suffices."

  # ═══════════════════════════════════════════════════════════════════════════
  # STATION 9-10: Process Checkpoints (Fast, parallel)
  # ═══════════════════════════════════════════════════════════════════════════
  station-9-commits:
    name: "📝 Station 9: Ship's Log"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check commit messages
        run: |
          echo "Checking conventional commits format..."
          PATTERN="^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert|security)(\(.+\))?: .+"
          FAILED=0
          for commit in $(git log --format="%H" origin/main..HEAD 2>/dev/null || git log --format="%H" -10); do
            MSG=$(git log --format="%s" -1 "$commit")
            if [[ -n "$MSG" ]] && ! [[ "$MSG" =~ $PATTERN ]]; then
              echo "::warning::Non-conventional: $MSG"
              FAILED=1
            else
              echo "Valid: $MSG"
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "::warning::Some commits don't follow conventional commits format"
          fi

  station-10-schema:
    name: "📐 Station 10: Schema Sync"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Schema validation via pnpm (runs Rust CLI internally)
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/novanet

      - name: Validate Schema
        run: |
          echo "Validating schema YAML coherence..."
          cd tools/novanet && cargo run -- schema validate
          echo "Schema validation passed!"

  # ═══════════════════════════════════════════════════════════════════════════
  # FINAL: Fleet Cleared for Launch
  # ═══════════════════════════════════════════════════════════════════════════
  fleet-cleared:
    name: "🚀 Fleet Cleared for Launch"
    runs-on: ubuntu-latest
    needs:
      - station-1-format
      - station-2-lint
      - station-3-tests
      - station-4-coverage
      - station-5-docs
      - station-6-security
      - station-7-coderabbit
      - station-8-claude
      - station-9-commits
      - station-10-schema
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo ""
          echo "╔═══════════════════════════════════════════════════════════════╗"
          echo "║          🌌 ARMADA FLEET CLEARED FOR LAUNCH 🌌                ║"
          echo "╠═══════════════════════════════════════════════════════════════╣"
          echo "║                                                               ║"
          echo "║   Station 1:  Format          CLEARED                         ║"
          echo "║   Station 2:  Lint            CLEARED                         ║"
          echo "║   Station 3:  Tests           CLEARED                         ║"
          echo "║   Station 4:  Coverage        CLEARED                         ║"
          echo "║   Station 5:  Docs            CLEARED                         ║"
          echo "║   Station 6:  Security        CLEARED                         ║"
          echo "║   Station 7:  CodeRabbit      CLEARED                         ║"
          echo "║   Station 8:  Claude AI       CLEARED                         ║"
          echo "║   Station 9:  Ship's Log      CLEARED                         ║"
          echo "║   Station 10: Schema Sync     CLEARED                         ║"
          echo "║                                                               ║"
          echo "╚═══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "All systems nominal! This PR is ready for merge!"
