# .github/workflows/design-system-validation.yml
# Design System Coherence Validation Pipeline
#
# Validates taxonomy, visual encoding, and artifact consistency
# Runs on PRs that touch design system files

name: Design System Validation

on:
  pull_request:
    paths:
      - 'packages/core/models/taxonomy.yaml'
      - 'packages/core/models/visual-encoding.yaml'
      - 'packages/core/models/_index.yaml'
      - 'packages/core/models/node-classes/**'
      - 'packages/core/models/arc-classes/**'
      - 'packages/core/src/graph/**'
      - 'packages/core/src/types/nodes.ts'
      - 'apps/studio/src/components/graph/edges/system/**'
      - 'tools/novanet/src/tui/theme.rs'
      - 'tools/novanet/src/parsers/taxonomy.rs'
      - 'tools/novanet/src/generators/**'
      - 'tools/scripts/validate-design-system.mjs'
      - 'tools/scripts/verify-design-system.sh'
  push:
    branches:
      - main
    paths:
      - 'packages/core/models/taxonomy.yaml'
      - 'packages/core/models/visual-encoding.yaml'

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

jobs:
  # ==========================================================================
  # Stage 1: Quick Validation (YAML + TypeScript)
  # ==========================================================================
  quick-validation:
    name: Quick Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate YAML syntax
        run: |
          echo "Validating YAML syntax..."
          npx yaml-lint packages/core/models/taxonomy.yaml
          npx yaml-lint packages/core/models/visual-encoding.yaml

      - name: TypeScript type check
        run: pnpm type-check --filter=@novanet/core

      - name: Design system validation
        run: pnpm validate:design-system

  # ==========================================================================
  # Stage 2: Full Validation (includes Rust + all tests)
  # ==========================================================================
  full-validation:
    name: Full Validation
    runs-on: ubuntu-latest
    needs: quick-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/novanet

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Schema validation (Rust)
        run: |
          cargo build --manifest-path tools/novanet/Cargo.toml
          cargo run --manifest-path tools/novanet/Cargo.toml -- schema validate

      - name: Core package tests
        run: pnpm test --filter=@novanet/core

      - name: Design system sync tests
        run: pnpm test --filter=@novanet/studio -- DesignSystemSync

      - name: Design system coherence tests
        run: pnpm test --filter=@novanet/core -- design-system-coherence

  # ==========================================================================
  # Stage 3: Rust Tests
  # ==========================================================================
  rust-validation:
    name: Rust Validation
    runs-on: ubuntu-latest
    needs: quick-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/novanet

      - name: Cargo check
        run: cargo check --manifest-path tools/novanet/Cargo.toml

      - name: Cargo clippy
        run: cargo clippy --manifest-path tools/novanet/Cargo.toml -- -D warnings

      - name: Cargo test
        run: cargo test --manifest-path tools/novanet/Cargo.toml --lib

  # ==========================================================================
  # Stage 4: Deprecated Terms Audit
  # ==========================================================================
  deprecated-audit:
    name: Deprecated Terms Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for deprecated realm names
        run: |
          echo "Checking for deprecated realm names (global, tenant)..."
          if grep -r "realm.*['\"]global['\"]" packages/core/src --include="*.ts"; then
            echo "Found deprecated realm 'global' - use 'shared' instead"
            exit 1
          fi
          if grep -r "realm.*['\"]tenant['\"]" packages/core/src --include="*.ts"; then
            echo "Found deprecated realm 'tenant' - use 'org' instead"
            exit 1
          fi
          echo "No deprecated realm names found"

      - name: Check for deprecated trait names
        run: |
          echo "Checking for deprecated trait names (derived, job)..."
          if grep -r "trait.*['\"]derived['\"]" packages/core/src --include="*.ts"; then
            echo "Found deprecated trait 'derived' - use 'generated' or 'aggregated' instead"
            exit 1
          fi
          if grep -r "trait.*['\"]job['\"]" packages/core/src --include="*.ts"; then
            echo "Found deprecated trait 'job' - job nodes were removed in v11.2"
            exit 1
          fi
          echo "No deprecated trait names found"

      - name: Check for deprecated L10n suffix
        run: |
          echo "Checking for deprecated L10n suffix..."
          if grep -rE "(Entity|Page|Block|Project)L10n" packages/core/src --include="*.ts" | grep -v ".test.ts" | grep -v ".d.ts"; then
            echo "Found deprecated L10n suffix - use Content/Generated instead"
            exit 1
          fi
          echo "No deprecated L10n suffix found"

      - name: Check for deprecated layer names
        run: |
          echo "Checking for deprecated layer names (seo, geo, locale-knowledge)..."
          for layer in seo geo locale-knowledge; do
            if grep -r "layer.*['\"]$layer['\"]" packages/core/src --include="*.ts"; then
              echo "Found deprecated layer '$layer'"
              exit 1
            fi
          done
          echo "No deprecated layer names found"

  # ==========================================================================
  # Summary Job
  # ==========================================================================
  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [quick-validation, full-validation, rust-validation, deprecated-audit]
    if: always()
    steps:
      - name: Check validation results
        env:
          QUICK_RESULT: ${{ needs.quick-validation.result }}
          FULL_RESULT: ${{ needs.full-validation.result }}
          RUST_RESULT: ${{ needs.rust-validation.result }}
          DEPRECATED_RESULT: ${{ needs.deprecated-audit.result }}
        run: |
          echo "Design System Validation Results:"
          echo "================================="
          echo "Quick Validation: $QUICK_RESULT"
          echo "Full Validation: $FULL_RESULT"
          echo "Rust Validation: $RUST_RESULT"
          echo "Deprecated Audit: $DEPRECATED_RESULT"

          if [[ "$QUICK_RESULT" != "success" ]] || \
             [[ "$FULL_RESULT" != "success" ]] || \
             [[ "$RUST_RESULT" != "success" ]] || \
             [[ "$DEPRECATED_RESULT" != "success" ]]; then
            echo ""
            echo "One or more validation stages failed"
            exit 1
          fi

          echo ""
          echo "All validation stages passed!"
