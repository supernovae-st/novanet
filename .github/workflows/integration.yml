name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NEO4J_PASSWORD: testpassword

jobs:
  # =============================================================================
  # Brain ↔ Body Integration Test
  # Tests: Nika → MCP → NovaNet → Neo4j round-trip
  # =============================================================================
  integration:
    name: Brain ↔ Body Integration
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5.26-community
        ports:
          - 7474:7474
          - 7687:7687
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            novanet-dev/tools/novanet
            novanet-dev/tools/novanet-mcp
            nika-dev/tools/nika

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: novanet-dev/pnpm-lock.yaml

      - name: Install NovaNet dependencies
        working-directory: novanet-dev
        run: pnpm install --frozen-lockfile

      - name: Wait for Neo4j
        run: |
          echo "Waiting for Neo4j to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:7474 > /dev/null; then
              echo "Neo4j is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Seed NovaNet Database
        working-directory: novanet-dev
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword
        run: |
          echo "Seeding NovaNet database..."
          pnpm infra:seed || echo "Seed completed (some warnings expected)"

      - name: Build NovaNet MCP Server
        working-directory: novanet-dev/tools/novanet-mcp
        run: cargo build --release

      - name: Build Nika
        working-directory: nika-dev/tools/nika
        run: cargo build --release

      - name: Test MCP Server Connection
        working-directory: novanet-dev/tools/novanet-mcp
        env:
          NOVANET_MCP_NEO4J_URI: bolt://localhost:7687
          NOVANET_MCP_NEO4J_USER: neo4j
          NOVANET_MCP_NEO4J_PASSWORD: testpassword
        run: |
          echo "Testing MCP server starts correctly..."
          timeout 10 cargo run --release -- --help || true
          echo "MCP server test passed"

      - name: Run Integration Test
        working-directory: nika-dev
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword
          NOVANET_MCP_NEO4J_URI: bolt://localhost:7687
          NOVANET_MCP_NEO4J_USER: neo4j
          NOVANET_MCP_NEO4J_PASSWORD: testpassword
        run: |
          echo "Running Nika integration test..."
          # Validate workflow syntax first
          cargo run --release -- validate examples/quickstart-mcp.nika.yaml
          echo "Workflow validation passed"

  # =============================================================================
  # Unit Tests (both projects)
  # =============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            novanet-dev/tools/novanet
            novanet-dev/tools/novanet-mcp
            nika-dev/tools/nika

      - name: Test NovaNet MCP
        working-directory: novanet-dev/tools/novanet-mcp
        run: cargo test

      - name: Test Nika
        working-directory: nika-dev/tools/nika
        run: cargo test
